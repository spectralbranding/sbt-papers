methodology:
  type: empirical
  design: 'The five-layer PRISM scaffold: PL0 pre-registered specification (hypotheses, stopping rules,
    alpha allocation; confirmatory-exploratory boundary frozen before data), PL1 declarative configuration
    (backends, observer cohorts, format parameters), PL2 versioned prompts (the only layer that differs
    across variants), PL3 append-only immutable session records, PL4 deterministic scoring scripts. PRISM-B
    administration: eight items (one per SBT dimension, common stem ''how strongly does [BRAND] communicate
    through [signal domain]'') on a 1--5 ordinal scale; for AI observers a no-persona, label-only JSON-output
    prompt at temperature .7 with three repetitions, JSON-parsed and range-validated; for human respondents
    randomized item order with demographic covariates. PRISM-B scoring (PL4): mean the per-repetition
    response vectors into an observer-brand profile, simplex-normalize to a weight vector, compute the
    Dimensional Collapse Index (DCI = w_Economic + w_Semiotic, uniform baseline .250) with a repetition-variance
    standard error, compute mean pairwise cosine convergence across observers, and report per-dimension
    deviations from the .125 uniform baseline alongside the aggregates.'
  analysis:
    method: PL1-declared model/version identifiers or survey platform
