    - scale development
    - observer heterogeneity
    - PRISM
  abstract: >
    Measuring brand perception requires instruments that capture multi-dimensional structure
    rather than collapsing it to a single equity score. This paper specifies PRISM (Perception
    Response Instrument for Structured Measurement), a family of standardized instruments for
    eliciting multi-dimensional brand perception from both artificial intelligence and human
    observers within the Spectral Brand Theory framework. The paper makes three contributions.
    First, it formalizes the PRISM architecture as a five-layer scaffold (L0 specification,
    L1 configuration, L2 prompts, L3 sessions, L4 analysis) that is domain-neutral and
    reproducible. Second, it provides the complete PRISM-B (Brand) specification: eight scale
    items mapped one-to-one to SBT dimensions, a 1--5 ordinal response format empirically
    demonstrated as the minimum-distortion operating point for AI observers across 17 large
    language model architectures, an exact prompt template, and a scoring algorithm comprising
    the Dimensional Collapse Index and cross-observer cosine convergence. Third, it situates
    PRISM-B within a measurement family (PRISM-M for metamerism discrimination, PRISM-T for
    temporal tracking, PRISM-C for choice prediction) and establishes connection to multi-observer
    triangulation via Perception DOP. The instrument is specified here; validation against
    human-subject data is a separate future study.

claims:
  - id: P1
    type: proposition
    description: >
      Convergent Validity: PRISM-B's DCI (computed from 8 ordinal items) will
      converge with R15's DCI (computed from 100-point allocation) at r > .80
      when both are administered to the same AI observers on the same brand set.
    status: proposed
    falsification: >
      P1 is falsified if the correlation between PRISM-B DCI and R15 allocation-DCI
      falls below .60 across a sample of at least 10 AI models.

  - id: P2
    type: proposition
    description: >
      Discriminant Validity: PRISM-B's eight-dimensional profile will exhibit
      discriminant validity from single-construct brand attitude measures
      (correlation below .50 with first principal component).
    status: proposed
    falsification: >
      P2 is falsified if the first principal component accounts for more than
      60% of total variance and correlates above .70 with a single-item brand
      attitude measure.

  - id: P3
    type: proposition
    description: >
      Observer-Type Sensitivity: PRISM-B will detect systematic dimensional
      profile differences between AI observers and human observers of the same
      brand, with cosine similarity below .95 between aggregate profiles.
    status: proposed
    falsification: >
      P3 is falsified if aggregate AI and human profiles for the same brand
      produce cosine similarity above .98 across a sample of at least 5 brands,
      indicating that observer-type differences are negligible.

  - id: P4
    type: proposition
    description: >
      Cross-Study Reproducibility: two independent PRISM-B administrations
      to the same AI model set, separated by at least 30 days, will produce
      DCI vectors with cosine similarity above .95.
    status: proposed
    falsification: >
      P4 is falsified if test-retest cosine similarity falls below .85.

