limitations:
- description: No human validation data exist for PRISM-B as specified. The 1--5 format is the minimum-distortion
    point for AI observers, but its psychometric properties (internal consistency, test-retest, convergent/discriminant
    validity) for human respondents are unknown. This is the highest-priority future study (Gap 1 in the
    SBT research atlas), sharpened by evidence that consumers may penalize AI-derived content for perceived
    inauthenticity.
  severity: moderate
  addressable: true
- description: Items are theoretically derived (Rossiter 2002 C-OAR-SE, single item per dimension), not
    empirically generated from a large item pool (Churchill 1979). This trades internal-consistency estimation
    for parsimony and dimensional completeness; the assumption that the eight dimensions are conceptually
    independent and empirically separable requires verification.
  severity: moderate
  addressable: true
- description: 'Cross-language equivalence is assumed but not demonstrated. The specification is English-only;
    other languages require item-stem translation and verification of equivalent dimensional-label meaning.
    R15 cross-cultural evidence (15 languages, null home-market bias H10: mean +.001, p = .716) suggests
    linguistic robustness for AI observers but not for humans without formal translation-back-translation
    and measurement-invariance testing.'
  severity: moderate
  addressable: true
