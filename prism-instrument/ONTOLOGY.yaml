owns:
  - term_key: prism-instrument
    label: "PRISM"
    canonical_form: "PRISM"
    definition: "A family of standardized instruments for eliciting multi-dimensional brand perception from both AI and human observers within SBT, built on a domain-neutral five-layer scaffold."
    first_section: "PRISM Architecture"
  - term_key: prism-five-layer-scaffold
    label: "PRISM Five-Layer Scaffold"
    canonical_form: "five-layer scaffold (PL0-PL4)"
    definition: "The reusable PRISM protocol architecture separating specification (PL0), configuration (PL1), prompts (PL2), sessions (PL3), and analysis (PL4) so instrument variants share infrastructure while varying items."
    first_section: "PRISM Architecture: The Five-Layer Scaffold"
  - term_key: prism-b
    label: "PRISM-B"
    canonical_form: "PRISM-B"
    definition: "The brand-perception PRISM variant: eight scale items mapped one-to-one to SBT dimensions on a 1-5 ordinal format measuring perceived signal-reception intensity, with an exact prompt template and scoring algorithm."
    first_section: "PRISM-B Specification"

