  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand perception
  - geometric methods
  - multidimensional scaling
  - conceptual spaces
  - non-ergodicity
  - high-dimensional geometry
  - Spectral Brand Theory
  abstract: 'This paper surveys geometric and topological methods applied to brand perception across ten
    intellectual traditions: multidimensional scaling, characteristics-space economics, conceptual spaces,
    non-Euclidean perceptual geometry, individual-differences modeling, topological data analysis, quantum
    cognition, opinion dynamics, and non-ergodicity research. The central finding is that a significant
    compound gap persists: no existing framework combines high-dimensional geometric structure, a generative
    signal mechanism, observer heterogeneity, and non-ergodic temporal dynamics into an integrated theory
    of brand perception. Multidimensional scaling operates in two to three dimensions and offers no generative
    mechanism. Conceptual spaces provide geometric foundations for cognition but lack temporal dynamics
    and observer-specific processing. Non-Euclidean perceptual geometry demonstrates that Euclidean distance
    is insufficient for modeling perception, yet this insight has not penetrated brand theory. Non-ergodicity
    has been formalized in psychology, decision science, and evolutionary biology, but has never been
    applied to brand perception. Six open problems with formal mathematical statements — concerning formal
    metrics on brand space, projection bounds, concentration of measure, positioning capacity, specification
    impossibility, and diffusion dynamics on perceptual manifolds — constitute a research agenda for mathematical
    brand theory; companion papers [@zharnikov-2026-brand-space-geometry-formal-metric; @zharnikov-2026-spectral-metamerism-brand-perception-projection;
    @zharnikov-2026-cohort-boundaries-high-dimensional-perception; @zharnikov-2026-many-brands-can-market-hold;
    @zharnikov-2026-specification-impossibility-organizational-design-high; @zharnikov-2026-non-ergodic-brand-perception-diffusion]
    resolve each.'
claims:
- id: P1
  type: proposition
  statement: 'Foundational brand-theory frameworks (Aaker''s brand equity, Keller''s CBBE pyramid, Kapferer''s
    identity prism, Aaker''s brand-personality scale) are taxonomic and factor-analytic rather than mathematical:
    they specify no formal space, no metric, and no dynamical law for how brand perception forms and evolves.'
  testable: false
  tested_in_paper: false
  status: not_tested
- id: P2
  type: proposition
  statement: A comprehensive geometric theory of brand perception should satisfy six criteria — high dimensionality
    (>3 with examined geometric consequences), a formal metric with proved properties, observer heterogeneity
    beyond preference parameters, temporal dynamics (decay, compounding, path dependence), a generative
    signal mechanism, and empirical validation. These criteria define the evaluative axes of the survey.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: Multidimensional scaling (MDS) and its Bayesian/latent-class extensions operate in two-to-three
    dimensions, assume Euclidean structure, and are purely descriptive — they embed dissimilarity data
    but supply no generative mechanism and no temporal dynamics; the two-to-three dimensional convention
    may reflect visual-interpretability limits rather than the true dimensionality of brand perception.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P4
  type: proposition
  statement: Characteristics-space economics (Lancaster, Hotelling) place products as points in attribute
    space but assume objective, universally perceived characteristics, static positions, and flat Euclidean
    geometry — ruling out the observer heterogeneity central to brand experience.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P5
  type: proposition
  statement: 'Gardenfors''s conceptual spaces give the most explicit geometric foundation for cognition
    (Criterion P: natural concepts are convex regions, empirically supported by cross-language color-naming),
    but lack temporal dynamics, observer heterogeneity, a generative mechanism, and assume Euclidean/metric
    quality dimensions.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P6
  type: proposition
  statement: Human perceptual space is non-Euclidean — "at best Riemannian" for spatial vision and demonstrably
    non-Riemannian for color — so the default Euclidean-distance assumption in perceptual mapping, conjoint,
    and MDS systematically misrepresents perceptual differences in multi-attribute brand space; information
    geometry (Fisher-Rao) is a candidate metric that also accommodates Tversky's documented asymmetries
    via directed divergences.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
  - P3
- id: P7
  type: proposition
  statement: Individual-differences scaling (INDSCAL) and latent-class unfolding (DeSarbo) come closest
    to modeling observer heterogeneity via dimension weights and latent classes — the statistical precursor
    to the observer spectral profile — but their weights/classes are static, low-dimensional, non-generative,
    and never cast as geometric objects on a formal space (the simplex or positive orthant).
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P8
  type: proposition
  statement: Topological data analysis (persistent homology) supplies coordinate-free, high-dimensional
    tools that could reveal structural features (holes, loops, voids) in brand-perception point clouds
    invisible to MDS, but has seen essentially no adoption in marketing — a missed opportunity attributable
    to disciplinary boundaries rather than unsuitability.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P9
  type: proposition
  statement: Quantum cognition models observer-dependent, non-classical single decisions in Hilbert space
    (order effects, conjunction fallacy), but its snapshot collapse formalism does not address the cumulative,
    temporal formation of brand perception through repeated signal encounters, decay, and prior accumulation.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P10
  type: proposition
  statement: Opinion-dynamics and multi-agent models (Hegselmann-Krause, Deffuant-Weisbuch, DeGroot) supply
    temporal dynamics and emergent clustering, but operate in flat Euclidean space, lack absorbing states,
    model symmetric peer influence rather than asymmetric brand-to-observer signal emission, and have
    no generative production of meaning.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P11
  type: proposition
  statement: Non-ergodicity research (Peters's ergodicity economics; Molenaar's idiographic psychology)
    establishes that individual time-average trajectories diverge from population ensemble averages under
    multiplicative dynamics, absorbing states, and observer heterogeneity — precisely the hallmarks brand
    perception exhibits (multiplicative signal-prior interaction, permanent negative conviction as an
    absorbing state, path dependence) — yet has never been applied to brand perception or any marketing
    metric.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P12
  type: proposition
  statement: 'The compound gap is the central finding: no surveyed tradition satisfies all five core criteria
    (high-D geometry, formal metric, observer heterogeneity, non-ergodic dynamics, generative mechanism)
    simultaneously. Each tradition excels on one or two while leaving the rest unaddressed; the gap is
    the absence of the combination, not of any single ingredient. The classification matrix shows the
    five-way intersection is unoccupied.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P3
  - P4
  - P5
  - P6
  - P7
  - P8
  - P9
  - P10
  - P11
- id: P13
  type: proposition
  statement: Spectral Brand Theory (Zharnikov 2026a) is positioned as a candidate framework at the five-way
    intersection — eight signal-emission dimensions, observer spectral profiles, perception clouds with
    path-dependent dynamics, and absorbing states producing non-ergodic behavior — but as currently formulated
    it lacks a formally defined metric, a geometrically situated observer space, and a derived stochastic
    model; the "spectral" metaphor is a signal-profile metaphor, distinct from spectral graph theory and
    spectral clustering.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P12
- id: P14
  type: proposition
  statement: The compound gap is converted from diagnosis into a research agenda of six formally-stated
    open problems — (1) a formal metric on multi-dimensional brand space, (2) Johnson-Lindenstrauss projection
    bounds proving metameric collapse is geometrically inevitable, (3) concentration of measure giving
    cohort-boundary fuzziness, (4) sphere-packing positioning capacity with the E8 kissing number as an
    adjacency ceiling, (5) specification impossibility in high-dimensional organizational space, and (6)
    diffusion dynamics on the perceptual manifold proving non-ergodicity under absorbing boundaries —
    each delegated to a companion paper.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P12
  - P13
- id: P15
  type: proposition
  statement: 'The coincidence that SBT proposes exactly eight dimensions and that eight is the dimension
    where the E8 lattice achieves provably optimal sphere packing (kissing number 240) is strictly motivational,
    not load-bearing: SBT''s eight dimensions were derived from phenomenological completeness and independence/exhaustiveness
    arguments, and the E8 alignment merely suggests a question worth formal exploration in the companion
    paper.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P14
