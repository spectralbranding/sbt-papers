results:
  - claim_id: "G1"
    status: supported
    notes: >
      The classification matrix (Tables 1a and 1b) is presented and argued in Sections 2-11.
      Each tradition's assessment is argued with citations and reasoning. No tradition
      satisfies more than 2 of 6 criteria. SBT is assessed as satisfying 5 criteria
      conceptually but lacking formal proof and empirical validation at the time of writing.
      Independent reviewer replication has not been conducted.

  - claim_id: "G2"
    status: supported
    notes: >
      The JL calculation showing 123%+ distortion for 2D MDS in marketing contexts is
      presented analytically. The claim that MDS studies recover 2-3 dimensions due to
      interpretability constraints rather than genuine low-dimensionality is argued from
      the literature (stress function monotonicity, elbow subjectivity). No reanalysis of
      specific MDS datasets has been conducted.

  - claim_id: "G3"
    status: supported
    notes: >
      The four hallmarks of non-ergodicity in brand perception (multiplicative compounding,
      absorbing states, path dependence, observer heterogeneity) are argued by analogy with
      Peters (2019), Molenaar (2004), and the literature on marketing path dependence
      (Layton & Duffy, 2018). No empirical EII measurement on brand perception data has
      been conducted.

  - claim_id: "G4"
    status: supported
    notes: >
      The Fisher-Rao selection is argued from Cencov's uniqueness theorem and the four
      criteria for an appropriate observer-space metric. The competing metrics are analyzed
      and their deficiencies identified (Hellinger lacks Cencov invariance; Aitchison is
      boundary-singular). The argument is theoretical; no empirical predictive-validity
      comparison has been conducted.

  - claim_id: "OP1"
    status: not_tested
    notes: >
      This is a formulated open problem, not a result. Companion paper Zharnikov (2026d)
      addresses this problem and reports results (three metric spaces, proved properties,
      geodesics, concentration bounds).

  - claim_id: "OP2"
    status: not_tested
    notes: >
      This is a formulated open problem, not a result. Companion paper Zharnikov (2026e)
      addresses this problem and proves the metamerism theorems with JL bounds.

  - claim_id: "OP3"
    status: not_tested
    notes: >
      This is a formulated open problem, not a result. Companion papers Zharnikov (2026d)
      and Zharnikov (2026f) address concentration-of-measure bounds.

limitations:
  - description: >
      The classification matrix relies on the author's judgment about whether each tradition
      satisfies each criterion. Reasonable researchers may disagree, particularly for
      criteria like "observer heterogeneity" (INDSCAL partially satisfies this). The matrix
      is presented as an analytical argument, not an empirical measurement.
    severity: major
    addressable: true

  - description: >
      The survey covers the traditions the author identified as relevant to the compound
      gap. Other traditions (e.g., activity theory, ecological psychology, semiotic
      traditions in marketing) are not covered. The absence of a tradition from the matrix
      does not mean it could not address the gap.
    severity: moderate
    addressable: true

  - description: >
      The six open problems are defined relative to SBT's framework (8 dimensions, observer
      simplex Delta^7). If a different number of dimensions proves empirically correct,
      the mathematical formulations require rescaling. The problem statements are not
      falsifiable from within the survey paper itself.
    severity: minor
    addressable: true

  - description: >
      The survey is a single-author work, increasing the risk that the gap identification
      reflects the author's research agenda rather than an objectively neutral assessment
      of the literature. An independent systematic review using the same six criteria would
      provide stronger evidence for the gap claim.
    severity: moderate
    addressable: true

