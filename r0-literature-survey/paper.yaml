meta:
  title: 'Geometric Approaches to Brand Perception: A Critical Survey and Research Agenda'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.18945217
