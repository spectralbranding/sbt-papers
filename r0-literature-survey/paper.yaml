claims:
  - id: "G1"
    type: proposition
    statement: >
      A compound gap persists in the literature on brand perception: no existing framework
      combines (1) high-dimensional geometric structure, (2) a formal metric on brand space
      with proved properties, (3) observer heterogeneity beyond preference parameters,
      (4) non-ergodic temporal dynamics, and (5) a generative signal mechanism, into an
      integrated theory. Each existing tradition satisfies at most two of these five criteria.
    formal: >
      Let T_1,...,T_n be the surveyed traditions (MDS, Lancaster, conceptual spaces,
      non-Euclidean perception, information geometry, INDSCAL, TDA, quantum cognition,
      opinion dynamics, non-ergodicity). Define criteria set C = {C1,...,C5}. For all i:
      |{c in C : T_i satisfies c}| <= 2. No T_i satisfies all 5 criteria simultaneously.
      Proved by classification matrix (Table 1a, Table 1b in the paper).
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "G2"
    type: proposition
    statement: >
      The two-to-three dimensionality convention in MDS marketing research reflects a
      visual-interpretability constraint and the properties of standard stress-plot elbow
      criteria, not evidence that brand perception is genuinely low-dimensional. The
      Johnson-Lindenstrauss lemma, which has not previously been connected to the MDS
      dimensionality-selection problem in marketing, implies that low-dimensional MDS
      solutions are systematically distorted projections of higher-dimensional perceptual
      space.
    formal: >
      JL lemma: for n points in R^d, projection to k dimensions preserves pairwise distances
      within (1 +/- epsilon) provided k >= C * log(n) / epsilon^2. For marketing MDS
      studies with d = 8 (SBT dimensions), k = 2, n = 20 brands: required epsilon for
      (1 +/- epsilon) preservation is epsilon >= sqrt(ln(20) / 2) >= 1.23 (123% distortion).
      MDS 2D solutions are therefore not faithful distance representations.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "G3"
    type: proposition
    statement: >
      Non-ergodicity — the divergence between time averages and ensemble averages in
      multiplicative dynamics — is structurally present in brand perception but has never
      been applied to brand perception, customer loyalty, or marketing metrics. Brand
      perception exhibits all four hallmarks of non-ergodic dynamics: multiplicative signal
      compounding, absorbing states (permanent negative conviction), path dependence
      (signal order effects on final conviction), and observer heterogeneity.
    formal: >
      Ergodicity condition: lim_{T->inf} (1/T) sum_{t=0}^T X_t = E[X] for any trajectory.
      Brand perception violates this: signals compound multiplicatively (new signal interacts
      with existing conviction, not just adds), absorbing states exist (permanent rejection
      conviction cannot be undone by positive signals), and individual trajectories are
      governed by person-specific observer spectral profiles making population averages
      uninformative about individual trajectories (Molenaar, 2004).
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "G4"
    type: proposition
    statement: >
      The Fisher-Rao information metric on the probability simplex Delta^7, derived from
      Cencov's (1982) uniqueness theorem, is the appropriate metric for observer weight
      spaces in brand theory. Of four candidate metrics (Fisher-Rao, Hellinger, Jensen-Shannon,
      Aitchison), only Fisher-Rao satisfies invariance under sufficient-statistic embeddings
      — the property that distances are consistent regardless of how the dimensional taxonomy
      is refined or coarsened.
    formal: >
      Cencov uniqueness: the Fisher information metric g_{ij}(w) = delta_{ij}/w_i is the
      unique Riemannian metric on {probability distributions} invariant under Markov morphisms.
      Closed-form distance: d_FR(w_A, w_B) = 2 arccos(sum_i sqrt(w_{A,i} * w_{B,i})).
      Competing metrics: Hellinger lacks Cencov invariance; Jensen-Shannon lacks it;
      Aitchison is singular at boundary (w_i = 0), blocking representation of dimension-blind
      observers. Fisher-Rao handles all cases.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "OP1"
    type: proposition
    statement: >
      Open Problem 1 (Formal Metric): Define a mathematically rigorous metric space for
      multi-dimensional brand profiles and prove its fundamental properties. The target
      result is a formally verified metric space with at least three non-trivial theorems
      about its geometric properties. Addressed by companion paper Zharnikov (2026d).
    formal: >
      Let B = R^8_+ (brand emission profiles) and O = Delta^7 (observer weight profiles).
      Define d_B: B x B -> R_+ and d_O: O x O -> R_+ satisfying metric axioms (M1)-(M4).
      Derive geodesics, curvature, and volume elements. Define observer-dependent
      pseudo-metric d_w(A,B) = ||W_w circ (s_A - s_B)||, characterize its kernel.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["G1"]

  - id: "OP2"
    type: proposition
    statement: >
      Open Problem 2 (Projection Bounds): Apply the Johnson-Lindenstrauss lemma to quantify
      information loss when reducing 8-dimensional brand profiles to scalar grades. Target
      result: a "metamerism is inevitable" theorem proving scalar grades necessarily conflate
      brands that differ in full spectral profiles. Addressed by companion paper Zharnikov
      (2026e).
    formal: >
      For any linear projection phi: R^8 -> R^1 and N brand profiles, the distortion
      epsilon satisfies epsilon >= sqrt(ln N). For N=10: epsilon >= 1.52 (152% distortion).
      Null-space dimension = 8 - 1 = 7, making 7/8 of brand identity invisible to any
      scalar grade. Information retention: log_2(5) / (8 * 2.5) = 11.6% for a 5-level grade.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["G1", "G2"]

  - id: "OP3"
    type: proposition
    statement: >
      Open Problem 3 (Concentration of Measure): Establish concentration-of-measure bounds
      for the 8-dimensional brand space and observer simplex. Target result: explicit bounds
      on pairwise distances among random brand profiles and observer weight vectors, providing
      a null-model baseline for statistically meaningful brand differentiation.
    formal: >
      For w drawn from Dirichlet(1,...,1) on Delta^7: E[||w_A - w_B||^2] = 7/36 approx
      0.194. For normalized brand profiles on S^7_+: positive-octant restriction compresses
      available brand space to 1/256 of full sphere, raising the geometric difficulty of
      differentiation. Addressed by Zharnikov (2026d), Zharnikov (2026f).
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["G1"]

methodology:
  type: review
  design: >
    Systematic survey of nine distinct research traditions at the intersection of formal
    geometry and brand/consumer perception theory: (1) multidimensional scaling in marketing,
    (2) characteristics-space economics (Lancaster, Hotelling), (3) conceptual spaces
    (Gardenfors), (4) non-Euclidean perceptual geometry (Todd, Bujack), (5) information
    geometry (Amari), (6) individual differences and dimension weighting (INDSCAL, DeSarbo),
    (7) topological data analysis in marketing, (8) quantum cognition models, (9) opinion
    dynamics and multi-agent models, (10) non-ergodicity beyond economics (Peters, Molenaar).
    Each tradition is assessed against six criteria (dimensionality, metric structure,
    observer heterogeneity, temporal dynamics, generative mechanism, empirical validation)
    and classified in two matrices. Six open problems are formulated with mathematical
    specifications and target results. No primary data collection.
  analysis:
    method: >
      Structured narrative review; classification matrix (6 criteria x 10 traditions);
      gap identification through pairwise absence of criterion satisfaction; mathematical
      formulation of 6 open problems with companion paper cross-references
    software: "None"

acceptance:
  - claim_id: "G1"
    criterion: >
      Systematic replication of the classification matrix by an independent reviewer using
      the same six criteria and the same set of traditions produces a matrix that agrees
      with Table 1a/1b on at least 50 of 60 cells (83% agreement). Disagreements should
      be attributable to reasonable differences in how "satisfied" is defined for a given
      criterion, not to factual errors.
    falsification: >
      An existing framework is identified that satisfies all five criteria simultaneously,
      invalidating the compound-gap claim. Alternatively, the independent reviewer's matrix
      shows widespread disagreement (< 70% cell concordance), indicating the criteria are
      too subjective to support the gap claim.

  - claim_id: "G2"
    criterion: >
      Reanalysis of an existing MDS marketing dataset (e.g., Green & Rao 1972 or a
      contemporary equivalent) shows that (a) the recovered 2-3D solution has stress
      values consistent with JL-predicted distortion at epsilon > 1.0 for the sample size,
      and (b) brands rated as similar in 2D are rated as distinct in 8D when evaluated on
      SBT dimensions by independent raters.
    falsification: >
      The 2-3D MDS solution achieves stress levels consistent with epsilon < 0.3, suggesting
      that 2-3 dimensions do faithfully represent the pairwise distances and the JL
      argument does not apply in this domain.

  - claim_id: "G3"
    criterion: >
      An empirical study measures individual-level brand perception trajectories (N >= 50
      observers, T >= 12 time points, 3+ brands) and computes the ergodicity information
      index (EII) for each observer-brand pair. If brand perception is non-ergodic:
      EII >> 0 across observers; time-average brand evaluations should differ systematically
      from ensemble-average (cross-sectional) evaluations on the same brands.
    falsification: >
      EII is near zero across observers and brands, indicating that cross-sectional brand
      tracking data is a faithful representation of individual trajectories and brand
      perception is approximately ergodic.

  - claim_id: "G4"
    criterion: >
      For a sample of N >= 100 observers each evaluated with an 8-item brand perception
      instrument (one item per SBT dimension), distance calculations under Fisher-Rao and
      the three competing metrics (Hellinger, Jensen-Shannon, Aitchison) are compared for
      predictive validity against an external criterion (e.g., brand choice consistency over
      time). Fisher-Rao distances should predict the external criterion more reliably.
    falsification: >
      A competing metric (e.g., Aitchison or Hellinger) shows equal or superior predictive
      validity for the external criterion, indicating that the Cencov theoretical uniqueness
      does not translate to practical superiority in this domain.

