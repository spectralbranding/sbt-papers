meta:
  title: 'The Producer-Observer Seam: Joining Spectral Brand Theory and Organizational Schema Theory at
    Meaning, Meaningfulness, and the Perception Cloud'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.21114525
  date: '2026-07-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - perception cloud
  - meaning
  - meaningfulness
  - organizational tiers
  - brand specification
  - cultural transmission
  - observer completion
  - model collapse
  abstract: 'Two frameworks in this research program draw the same boundary from opposite sides without
    naming it. Organizational Schema Theory''s six-tier producer stack terminates at the rendered Tier-4
    instance and hands off to the observer perceptual filter; the meaning/meaningfulness cost-asymmetry
    framework''s pipeline — substrate to meaning to rendered instance — ends at exactly the artifact that
    filter consumes. This note makes the seam explicit. The producer side owns substrate, meaning, and
    rendering (Tiers 1 through 4); the observer side owns the projection of the rendered instance into
    a perception cloud; and the meaning/meaningfulness/perception triad is a join of the two frameworks,
    not a slice of either alone. Three results follow: a seam map with two honesty guards (meaningfulness
    is multi-tier in general; perception is definitionally outside the tier stack); a flattening parametrization
    in which the triad attaches to whatever tier a business''s value concentrates toward, with software
    as the limit existence proof; and an endogenous-intent closure in which perception clouds sediment
    into the next generation''s substrate through human transducers, yielding a measurable loop-health
    diagnostic: perception-cloud variance over time.'
claims:
- id: P1
  type: proposition
  statement: 'The seam map (the join claim). The meaning/meaningfulness pipeline and the six-tier stack
    describe one pipeline seen from two ends: the producer side runs the published log -> meaning S ->
    rendered instance R hierarchy (Tiers 1-4, with meaning as the transmissible producer specification
    concentrated at Tier 4), extended one step upstream by this note with the SUBSTRATE - the working
    material below the log, sitting loosely at Tier-1 Owner Intent - and SBT owns R -> observer projection
    -> perception cloud (the observer side, outside the tier stack). The hand-off at the rendered instance
    is clean - no overlap and no gap: it is textually pre-confirmed on the OST side (the tier stack names
    its own terminus and cedes perception downstream) and pre-confirmed BY SCOPE CONSTRUCTION on the meaning/meaningfulness
    side (its pipeline terminates at R; the reader''s completion is outside its boundary conditions by
    design). The tier stack has no observer tier by design, and that absence is the insertion point. The
    meaning/meaningfulness/perception triad is therefore a JOIN of the two frameworks, not a slice of
    either alone - a boundary that co-creation theory reads as porous and that the closure (P4) reconciles:
    co-creation operates THROUGH the loop, not by erasing the specification/perception distinction within
    one turn.'
  testable: false
  tested_in_paper: false
  status: not_tested
- id: P2
  type: proposition
  statement: 'The flattening parametrization. The meaning/meaningfulness/perception triad is the (specification,
    rendered specification, observer perception) slice of the DOMINANT TIER a given business''s value
    concentrates toward, with Tier-1 intent always upstream: for brand-led and software firms that tier
    is Tier 4; for process-moat firms it is Tier 5 (their meaning is a codified process specification
    and their consumer-facing perception cloud may be negligible). Software is the limit existence proof:
    with Process and Organization tiers approaching zero, a software business reduces to intent, source
    (meaning), built artifact (meaningfulness), and the user''s perception cloud - nothing else is left
    in the stack for the triad to be confused with.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'Levels of reading and observer depth. Observers of the same rendered artifact differ in
    the deepest level their extraction reaches - perception cloud only, meaningfulness (the rendered work
    as an object), meaning (the recoverable specification), or substrate (the upstream intent) - and this
    observer depth is operationalizable as coverage of the source specification recovered by the observer''s
    extraction, increasing with observer maturation. Ascending the levels is progressively decentering:
    away from the observer''s own projection toward the work itself. Observer depth connects the seam
    map to rendering equivalence: a reading at meaning-depth recovers the spine that any faithful rendering
    preserves.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P4
  type: proposition
  statement: 'The endogenous-intent closure. Tier-1 owner intent is endogenous to a human-mediated loop:
    perception clouds sediment into the next generation''s substrate through human transducers who are
    both receivers of perception and formers of intent (an owner intends a yacht because, as a prior observer,
    they inhabited a perception cloud where yachts encode status). Intent is therefore a fixed point of
    the loop rather than an exogenous primitive; producer and consumer are one population of humans wearing
    two hats; and human judgment is the mutation term that makes the loop an expanding spiral rather than
    a repeating circle. The loop is scale-invariant: the same structure repeats across one reading, one
    biography, and cultural succession across generations. Cultural-evolution theory supplies the transmission
    formalism for the sedimentation step (guided variation: individual learning biases what is transmitted);
    iconic-brand theory documents the same circuit at the brand level without the producer/observer decomposition.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P5
  type: proposition
  statement: 'The variance diagnostic (the falsifiable shadow). As machine observers occupy more positions
    in the loop, the health of the loop is measurable as perception-cloud variance over time: a closed
    text-in/text-out machine loop is a variance sink (training on recursively generated data degrades
    models; aligned LLM outputs homogenize; machine observers dimensionally collapse brand perception),
    so monotonically shrinking cohort spread indicates an autophagic loop, while a machine coupled to
    reality with exploratory reward can be a variance source. Two testable predictions follow: (i) a brand
    category''s perception-cloud variance at time T predicts the diversity of successor specifications
    at T+1 (sedimentation is measurable as cultural diffusion); (ii) categories with rising machine-observer
    share show declining cloud variance relative to human-observer baselines.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P4
