spine_version: "0.2"
spine_doc_version: "0.1.0"     # retrofit spine first lock (2026-06-14)
paper_key: "2026f"
provenance: retrofit
title: >-
  Geometric Necessity of Fuzzy Cohort Boundaries: A Concentration Analysis of
  the 7-Simplex
target_venue_primary: "TBD (SBT geometric-program working paper, v1.2.0)"
status: >-
  Retrofit backbone spine extracted 2026-06-14 from completed paper.md
  (Working Paper v1.2.0, March 2026; Zenodo DOI 10.5281/zenodo.18945477).

thesis: |
  In the eight-dimensional probability simplex Delta^7 that serves as Spectral
  Brand Theory's observer weight space, the fuzziness of perceptual cohort
  boundaries is not a measurement artifact, an algorithmic limitation, or an
  empirical curiosity — it is a geometric necessity under the uniform
  Dirichlet(1,...,1) null. Concentration of measure forces (i) pairwise
  distances to concentrate around their mean, degrading the distance contrast
  ratio to ~7.5 at n=8 (a transitional regime: clustering is informative but
  noisy); (ii) at least 52.2% of Delta^7 to lie within relative distance
  delta=.10 of ANY convex partition boundary, so a majority of observer
  profiles sit near a cohort boundary and discrete assignment is inherently
  unstable; and (iii) Levy concentration on S^7 to bound 1-Lipschitz deviations.
  Monte Carlo with 10^5 draws confirms the bounds within sampling error. The
  uniform null is the WORST case: symmetric Dirichlet(alpha,...,alpha) with
  alpha>=3 reduces the boundary fraction by alpha^{-7/2}, producing
  operationally crisp boundaries (below 2%) for empirically plausible alpha.
  Together these give a geometric foundation for preferring continuous observer
  profiles ("vectorized") over discrete cohort labels ("rasterized") once
  perceptual dimensionality exceeds five, and define a capacity-resolution
  duality dual to the R4 sphere-packing bound.

# ============================================================================
# Boundary conditions — when the claims hold
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      Observer perception is represented as a compositional weight vector
      w in Delta^{n-1} (the SBT observer spectral profile's weight component),
      with the eight SBT dimensions taken as given (n=8); the perceptual
      dimensionality exceeds about five.
    observable: "An 8-dimensional sum-to-one observer weight vector on Delta^7."
    excludes: "Low-dimensional (n<=3) perceptual maps where boundaries stay sharp."
  - id: C2
    statement: >-
      Cohort regions are CONVEX partitions of Delta^{n-1} (satisfied by k-means
      Voronoi cells and well-separated Gaussian mixtures; not by density-based
      clustering that yields non-convex regions).
    observable: "A convex k-partition (k>=2) of the simplex."
    excludes: "DBSCAN/HDBSCAN non-convex regions; subspace-restricted clustering."
  - id: C3
    statement: >-
      Observer weights are drawn from the symmetric Dirichlet(alpha,...,alpha)
      family on the simplex; the headline bounds use the uniform alpha=1 null,
      with alpha>1 treated as the empirically relevant calibration.
    observable: "A symmetric-alpha Dirichlet model of the observer population."
    excludes: "Asymmetric Dirichlet(alpha_1,...,alpha_8) or sparse (alpha<1) regimes (left to future work)."

# ============================================================================
# Assumption atoms — load-bearing modeling assumptions
# ============================================================================
assumption_atoms:
  - id: AA1
    statement: >-
      The uniform Dirichlet(1,...,1) distribution is a WORST-CASE mathematical
      null for boundary fuzziness, NOT an empirical model claiming observer
      populations are uniformly distributed.
    body_sections: ["§3.2 Concentration on Delta^7 via the Dirichlet Distribution"]
  - id: AA2
    statement: >-
      Distance computations in §§3.1-3.3 and 4-5 use Euclidean distance on
      Delta^{n-1} for tractability, while SBT's canonical observer-space metric
      is Fisher-Rao; via the square-root isometry to S^7_+, Levy concentration
      applies directly and the bounds transfer (recomputed in §3.4).
    body_sections: ["§3.1 (Assumption box)", "§3.4 Fisher-Rao Recalculation"]

