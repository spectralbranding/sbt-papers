# ============================================================================
# Methods — analytic derivations and the simulation harness
# ============================================================================
methods:
  - id: M1
    statement: >-
      Dirichlet moment computation: from the marginal moment formulas for
      Dir(alpha,...,alpha), derive component mean 1/n, variance
      (1/n)(1-1/n)/(n alpha+1), and negative covariance, then propagate to the
      expected squared pairwise Euclidean distance E[||w_i - w_j||^2] =
      2(n-1)/(n(n+1)) = 7/36 at n=8 (Proposition 2, Theorem 1a).
    type: "analytic_derivation"
    inputs: ["Dirichlet moment formulas (Johnson & Kotz 1972)"]
    outputs: ["component moments; expected pairwise distance 7/36"]
    code_anchor: "paper §3.2 Prop 2; §3.3 Thm 1a proof"
    body_sections: ["§3.2", "§3.3 Beyer's Distance Contrast Phenomenon"]
  - id: M2
    statement: >-
      Brunn-Minkowski peeling on convex partitions: the homothet of each cell
      scaled by (1-delta) bounds the interior-volume fraction; since Delta^{n-1}
      has intrinsic dimension n-1, Lebesgue measure scales as the (n-1)th power
      of linear size, yielding the boundary volume fraction lower bound
      BVF(n,delta) >= 1 - (1-delta)^{n-1}.
    type: "analytic_derivation"
    inputs: ["convex k-partition", "Schneider 2014 Brunn-Minkowski toolkit"]
    outputs: ["BVF(n,delta) >= 1 - (1-delta)^{n-1}"]
    code_anchor: "paper §4.2 Theorem 2 proof"
    body_sections: ["§4.2 Boundary Fraction Theorem for Convex Partitions"]
  - id: M3
    statement: >-
      Sphere-isometry route to concentration: the square-root transform maps
      Delta^{n-1} isometrically to S^{n-1}_+ so that Fisher-Rao distance becomes
      geodesic distance; Levy's lemma / the Gaussian isoperimetric inequality on
      the sphere (log-Sobolev constant (n-1)^{-1}, Herbst argument) yields
      P(|f - M_f| >= eps) <= 4 exp(-(n-1)eps^2/8). The Dirichlet is not a product
      measure, so Talagrand's product-space bounds do not apply directly.
    type: "analytic_derivation"
    inputs: ["square-root isometry Delta^{n-1} -> S^{n-1}_+", "Milman-Schechtman 1986"]
    outputs: ["Levy bound on S^7: 4 exp(-7 eps^2/8)"]
    code_anchor: "paper §3.1 Proposition 1 proof"
    body_sections: ["§3.1 Levy's Lemma and Spherical Concentration"]
  - id: M4
    statement: >-
      Monte Carlo harness: draw Dirichlet samples, compute Euclidean and
      Fisher-Rao distance statistics, run k-means at k=4, and report boundary
      volume fractions under both metrics; seed fixed at 42, run via
      `uv run --with numpy --with scikit-learn python r3_concentration_mc.py`.
    type: "simulation"
    inputs: ["Dir(1,...,1) on Delta^{n-1}"]
    outputs: ["Tables 2, 5, 7"]
    code_anchor: "code/r3_concentration_mc.py"
    reproducibility:
      seed: "42"
      runtime_environment: "Python 3.12 + uv (numpy, scikit-learn)"
    body_sections: ["§5.3 Companion Computation Script"]
  - id: M5
    statement: >-
      Concentrated-Dirichlet scaling derivation: via Stirling on the normalizing
      constant Gamma(n alpha)/Gamma(alpha)^n and log-concavity of f_alpha for
      alpha>=1, the probability mass of a fixed convex boundary zone contracts by
      the product of (n-1) per-direction factors alpha^{-1/2}, giving
      V_boundary(alpha) <= V_boundary(1) * alpha^{-(n-1)/2} = alpha^{-3.5} at n=8.
    type: "analytic_derivation"
    inputs: ["Dir(alpha,...,alpha) density", "Frigyik et al. 2010 concentration scaling"]
    outputs: ["V_boundary(alpha) <= V_boundary(1) * alpha^{-7/2}"]
    code_anchor: "paper §8.2 Proposition 3 proof"
    body_sections: ["§8.2 Boundary Volume Fraction Under Dirichlet(alpha)"]

