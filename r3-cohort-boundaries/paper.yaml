# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026f): Cohort Boundaries in High-Dimensional Perception Space
spec_version: "0.1.0"

meta:
  title: "Cohort Boundaries in High-Dimensional Perception Space: A Concentration of Measure Analysis"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.18945477"
