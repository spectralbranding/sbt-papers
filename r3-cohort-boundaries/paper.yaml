methodology:
  type: mixed
  design: 'Dirichlet moment computation: from the marginal moment formulas for Dir(alpha,...,alpha), derive
    component mean 1/n, variance (1/n)(1-1/n)/(n alpha+1), and negative covariance, then propagate to
    the expected squared pairwise Euclidean distance E[||w_i - w_j||^2] = 2(n-1)/(n(n+1)) = 7/36 at n=8
    (Proposition 2, Theorem 1a). Brunn-Minkowski peeling on convex partitions: the homothet of each cell
    scaled by (1-delta) bounds the interior-volume fraction; since Delta^{n-1} has intrinsic dimension
    n-1, Lebesgue measure scales as the (n-1)th power of linear size, yielding the boundary volume fraction
    lower bound BVF(n,delta) >= 1 - (1-delta)^{n-1}. Sphere-isometry route to concentration: the square-root
    transform maps Delta^{n-1} isometrically to S^{n-1}_+ so that Fisher-Rao distance becomes geodesic
    distance; Levy''s lemma / the Gaussian isoperimetric inequality on the sphere (log-Sobolev constant
    (n-1)^{-1}, Herbst argument) yields P(|f - M_f| >= eps) <= 4 exp(-(n-1)eps^2/8). The Dirichlet is
    not a product measure, so Talagrand''s product-space bounds do not apply directly.'
  analysis:
    software: paper §3.2 Prop 2; §3.3 Thm 1a proof
    method: Python 3.12 + uv (numpy, scikit-learn)
