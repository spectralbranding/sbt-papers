results:
  - claim_id: "P1"
    status: supported
    notes: >
      Follows from the Gaussian isoperimetric inequality on S^(n-1) via the
      Herbst argument. The numerical bound is confirmed by the Monte Carlo
      simulations in Section 5.

  - claim_id: "T1"
    status: supported
    notes: >
      Theoretical formula for E[D^2] = 7/36 proved analytically. Contrast
      ratio R_8 = 8.35 confirmed by Monte Carlo (10^4 trials, m=1000 points).
      Empirical mean distance 0.3659 consistent with theoretical value 0.4410
      up to Jensen inequality correction.

  - claim_id: "T2"
    status: supported
    notes: >
      Lower bound 1-(1-delta)^n proved via the Brunn-Minkowski peeling argument.
      Empirical BVF at delta=0.10: 60.8 +/- 0.3% (10^5 samples, k=4),
      exceeding the 57.0% bound by 3.8 percentage points. Monte Carlo
      verification in Section 5.2 confirms bound is tight.

  - claim_id: "C1"
    status: supported
    notes: >
      Direct consequence of T2 and P2. No additional computation required.
      The geometric necessity argument applies under uniform Dirichlet null model;
      empirical validation with real observer data would require survey collection.

  - claim_id: "P3"
    status: supported
    notes: >
      Section 8 (concentrated Dirichlet) derives the alpha^(-(n-1)/2) scaling
      factor analytically. Shows uniform model is worst-case; real populations
      with alpha > 1 have sharper boundaries than the main theorems predict.

limitations:
  - description: >
      The uniform Dirichlet(1,...,1) null model is the worst-case bound, but real
      observer populations may exhibit asymmetric concentration (dimension-specific
      alpha_i) that the symmetric Dirichlet does not capture. The boundary fraction
      scaling for asymmetric Dirichlet depends on the geometric mean of alpha_i,
      requiring empirical estimation of dimension-specific parameters.
    severity: moderate
    addressable: true

  - description: >
      Distance contrast ratios (Theorem 1) use Euclidean distances on Delta^7,
      while SBT's canonical metric is Fisher-Rao (Zharnikov, 2026d). The two
      metrics are related by the square-root diffeomorphism and qualitative
      conclusions are expected to be unchanged, but exact quantitative bounds
      in the Fisher-Rao metric are not computed in this paper.
    severity: minor
    addressable: true

  - description: >
      Theorem 2 assumes convex cohort regions (satisfied by k-means Voronoi cells).
      Density-based clustering methods (DBSCAN, HDBSCAN) can produce non-convex
      regions for which the boundary volume bound may not hold in its current form.
    severity: minor
    addressable: true

  - description: >
      The Dirichlet model imposes negative correlations between dimension weights
      (sum-to-one constraint) but does not capture positive correlations that may
      exist empirically (e.g., observers who weight ideological highly may also
      weight cultural highly). Copula-based models on the simplex would extend
      the analysis but are not developed here.
    severity: moderate
    addressable: true

  - description: >
      If empirical observer profiles cluster along a lower-dimensional submanifold
      of Delta^7, effective dimensionality d_eff < 8 would reduce concentration
      effects and sharpen cohort boundaries relative to the theoretical bounds.
      Estimating d_eff from survey data is an important empirical open question.
    severity: moderate
    addressable: true

