limitations:
- description: The headline bounds assume the uniform (or symmetric-alpha) Dirichlet null. Real populations
    may show HETEROGENEOUS concentration (dimension-specific alpha_i), for which the alpha^{-(n-1)/2}
    scaling no longer applies directly (the effective contraction depends on the geometric mean of the
    alpha_i); the sparse alpha<1 (vertex-concentrated) regime is also left to future work.
  severity: moderate
  addressable: true
- description: The Monte Carlo and contrast computations use Euclidean distance while SBT's formal metric
    is Fisher-Rao; the two differ by a nonlinear transform, and although §3.4 recomputes the headline
    figures under Fisher-Rao, higher-precision recalculation across all dimensions is left open.
  severity: moderate
  addressable: true
- description: Theorem 2 assumes CONVEX cohort regions (k-means Voronoi, well-separated GMMs). Density-based
    clustering (DBSCAN/HDBSCAN) yields non-convex regions for which the bound may not hold in its current
    form; the Minkowski-content extension is possible but needs additional machinery.
  severity: moderate
  addressable: true
- description: The Dirichlet imposes only the sum-to-one negative-correlation structure and does not model
    empirical dimension-specific correlations (e.g., Ideological-Cultural co-weighting) or integral-vs-separable
    perceptual dimensions (Garner 1974), which could require a non-Euclidean (Minkowski r<2) metric and
    revisiting the bounds; effective dimensionality d_eff<8 if profiles cluster on a submanifold would
    also reduce concentration.
  severity: moderate
  addressable: true
