    - probability simplex
    - Levy's lemma
    - brand perception
    - high-dimensional geometry
    - Spectral Brand Theory
    - observer cohorts

claims:
  - id: "P1"
    type: proposition
    statement: >
      For a 1-Lipschitz function f on the 7-sphere S^7, deviations from the median
      M_f satisfy P(|f(x) - M_f| >= epsilon) <= 4 exp(-7*epsilon^2 / 8). This
      is the Levy concentration bound for n=8. For the general sphere S^(n-1):
      P(|f(x) - M_f| >= epsilon) <= 4 exp(-(n-1)*epsilon^2 / 8).
    formal: "P(|f(x) - M_f| >= epsilon) <= 4 exp(-7*epsilon^2/8) for f: S^7 -> R, 1-Lipschitz"
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "P2"
    type: proposition
    statement: >
      For X = (X_1, ..., X_8) ~ Dir(1,...,1) (uniform on Delta^7), each component
      satisfies E[X_i] = 1/8 and Var[X_i] = (1/8)(7/8)/9 = 0.012153, giving
      SD[X_i] = 0.1102. Components are negatively correlated: Cov[X_i, X_j] = -1/(64*9).
    formal: "E[X_i] = 1/8, Var[X_i] = (n-1)/(n^2(n+1)) at n=8"
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "T1"
    type: theorem
    statement: >
      Distance concentration on Delta^7: for m i.i.d. draws from Dir(1,...,1)
      on Delta^7, the Euclidean distance contrast ratio max_d / min_d equals
      approximately 8.35 at n=8 (versus 5801 at n=2). The coefficient of
      variation CV_8 = 0.271. Distances concentrate but the regime at n=8 is
      transitional — clustering is possible but inherently noisy.
    formal: "R_8 = max_j ||w_j - w_0|| / min_j ||w_j - w_0|| approx 8.35 (Monte Carlo, m=1000)"
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["P2"]

  - id: "T2"
    type: theorem
    statement: >
      Boundary fuzziness on Delta^7: for any partition of Delta^(n-1) into k >= 2
      convex regions, the boundary volume fraction satisfies BVF(n, delta) >= 1 - (1-delta)^n.
      At n=8, delta=0.10: BVF(8, 0.10) >= 57.0%. A majority of the observer-weight
      space lies within 10% relative distance of a cohort boundary.
    formal: "BVF(n, delta) >= 1 - (1-delta)^n; BVF(8, 0.10) = 57.0%"
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["P1"]

  - id: "C1"
    type: proposition
    statement: >
      Dynamic cohort membership is geometrically necessary: in 8-dimensional
      perception space, for any convex partition into k >= 2 cohort regions,
      a majority of observer profiles lie within 10% of a cohort boundary.
      Therefore (a) cohort membership is sensitive to small perturbations,
      (b) discrete assignment is unstable, and (c) the fuzzy-cohort claim of
      Zharnikov (2026a) is a geometric necessity, not merely an empirical observation,
      under Dirichlet-uniform observer-weight distributions on Delta^7.
    formal: "BVF(8, 0.10) = 57.0% > 50%, SD[X_i] = 0.1102 implies typical perturbations cross boundaries"
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["T2", "P2"]

  - id: "P3"
    type: proposition
    statement: >
      Dirichlet(alpha,...,alpha) with alpha > 1 is the best-case model for cohort
      sharpness: boundary volume fractions shrink by a factor of alpha^(-(n-1)/2)
      relative to the uniform (alpha=1) case. The uniform distribution is the
      worst-case bound. Real populations with empirical clustering (alpha > 1)
      have strictly sharper cohort boundaries than the theoretical bounds predict.
      For the concentrated Dirichlet case, the boundary fraction at delta satisfies
      BVF(n, delta; alpha) <= (1/alpha)^((n-1)/2) * BVF(n, delta; 1).
    formal: "BVF(n, delta; alpha) shrinks by alpha^(-(n-1)/2) relative to alpha=1 case"
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["T2"]

methodology:
  type: mixed
  design: >
    Theoretical proofs using concentration of measure theory (Levy's lemma,
    Brunn-Minkowski inequality, Dirichlet distribution theory) applied to
    the 8-dimensional probability simplex Delta^7. Monte Carlo simulations
    with 10^3 to 10^5 sample points drawn from Dir(1,...,1) on Delta^(n-1)
    for n in {2, 4, 8, 16, 32} verify all theoretical predictions.
    The square-root transform maps Delta^7 isometrically to S^7_+, enabling
    application of known sphere-concentration results.
  analysis:
    method: >
      Concentration inequalities (Levy lemma, Brunn-Minkowski); Dirichlet
      distribution moment calculations; Monte Carlo distance ratio simulations
      (10^4 independent trials); boundary proximity simulation (k-means on
      10^5 samples from Dir(1,...,1) at n=8, k=4)
    software: "Python (NumPy, SciPy); standard statistical computing"

acceptance:
  - claim_id: "T1"
    criterion: >
      Monte Carlo simulation with m >= 1000 draws from Dir(1,...,1) on Delta^7
      produces distance contrast ratio in the range [7.0, 10.0] and mean Euclidean
      distance approximately 0.37, consistent with the theoretical prediction
      sqrt(7/36) = 0.4410 (Jensen inequality accounts for the gap).
    falsification: >
      Empirical contrast ratio substantially exceeds 20 or falls below 2 for n=8,
      indicating the Dirichlet-uniform model is a poor null model for observer
      profiles, or that n=8 is not in the transitional regime described.

  - claim_id: "T2"
    criterion: >
      For k=4 convex partition of Delta^7 (obtained by k-means on 10^5 Dirichlet
      samples), the empirical fraction of points within relative distance 0.10
      of the nearest boundary is >= 57.0% (matching or exceeding the theoretical
      lower bound).
    falsification: >
      Empirical boundary volume fraction is substantially below 57.0% at delta=0.10
      for k >= 2 convex partitions on Delta^7, contradicting Theorem 2.

  - claim_id: "C1"
    criterion: >
      Observer profiles measured in a real brand perception study exhibit
      cross-rater variability on the order of SD[w_i] ~ 0.10, consistent with
      the Dirichlet-uniform prediction. Different analysts/algorithms recover
      different cohort counts (3 vs. 5-6) for the same dataset.
    falsification: >
      Empirical observer weight profiles cluster sharply with low within-cohort
      variance and unambiguous cross-cohort separation, or all analysts consistently
      recover the same cohort count regardless of threshold or algorithm.

  - claim_id: "P3"
    criterion: >
      For concentrated Dirichlet(alpha,...,alpha) with alpha = 5, boundary volume
      fraction at delta=0.10 is reduced by approximately 5^(-7/2) = 0.036 relative
      to the alpha=1 case, yielding BVF ~ 2% (vs. 57%).
    falsification: >
      Boundary volume fraction does not decrease systematically with alpha,
      contradicting the worst-case property of the uniform distribution.

data:
  available: false
  url: ""
  notes: >
    No primary empirical data collected. All simulations are synthetic draws
    from the Dirichlet distribution and are fully reproducible from the
    simulation code. Observer profiles used for cross-model comparison
    (Claude: 5-6 cohorts, Gemini: 3 cohorts) are from the SBT case study
    analysis in Zharnikov (2026a), not a separate dataset.

code:
  available: true
  url: "https://github.com/spectralbranding/sbt-framework"
  notes: >
    Monte Carlo simulations (distance ratio and boundary proximity) are
    described in the paper with sufficient precision for independent
    reproduction. The sbt-framework repository implements observer cohort
    clustering using the Fisher-Rao metric on Delta^7, directly operationalizing
    the theoretical results of this paper.

