meta:
  title: 'Geometric Necessity of Fuzzy Cohort Boundaries: A Concentration Analysis of the 7-Simplex'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
