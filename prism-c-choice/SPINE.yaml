    use: >-
      The first-proposal advantage (60-100 percent selection rates) motivating
      the counterbalanced design; this campaign refines the picture — position
      bias appears at full strength only when options are perceptually
      indistinguishable (the twin calibration) and vanishes on real brands.
  - citation_key: allouah-2025-ai-agent-buying
    use: >-
      The ACES choice-audit line: position effects, choice homogeneity, and
      model-dependent demand concentration; the .972 cross-family pick
      unanimity measured here replicates the homogeneity finding at the brand
      level and extends it across four provider families.
  - citation_key: sabbah-2026-marketing-machines-how
    use: >-
      The machine-audience framing (models as targets of marketing cues) and
      the simulated-choice-platform precedent.
  - citation_key: samuelson-1938-note-pure-theory
    use: >-
      The classical revealed-preference anchor: choice as the primitive that
      reveals preference, transplanted to a setting where the same observer
      also states its perception.
  - citation_key: mcfadden-1974-conditional-logit-analysis
    use: "The conditional-logit foundation of the H2 choice-weight model."
  - citation_key: louviere-2000-stated-choice-methods
