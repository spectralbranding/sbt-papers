# SPINE.yaml — PRISM-C (2026bb)
#
# SPINE-FIRST (provenance: generative): authored BEFORE body prose. Every prose
# claim in paper.md must trace to a node here; new claims require FORK (extend
# spine first) or REBASE (drop the claim).
#
# Schema v0.2 ([internal path removed]): the paper reports an
# author-produced pre-registered choice campaign (pilot + confirmatory battery
# under cross-family operators and choosers) with derived floors, a divergence
# estimator, a conditional-logit choice-weight model, and controls —
# observations / methods / measurements / findings / negative_findings are
# first-class nodes.

spine_version: "0.2"
spine_doc_version: "0.1.0"
paper_key: "2026bb"
provenance: generative
title: >-
  From Stated Perception to Revealed Choice: A Pre-Registered Instrument for
  the Choice-Perception Gap in AI Brand Perception (PRISM-C)
status: >-
  Spine locked after the frozen PL0 campaign completed (pilot + confirmatory
  battery + controls + robustness, 2026-07-02). Drafting proceeds against this
  spine.

thesis: |
  What an AI observer says about brands does not predict what it does when it
  chooses among them — and the size and structure of that wedge is measurable,
  not assertable. PRISM-C measures the choice-perception gap: the rate at
  which a model's revealed pick in a simulated agentic choice task diverges
  from the pick its own stated eight-dimension readings predict, evaluated
  against the choice elicitation's own cross-family operator floor. The
  pre-registered campaign returns an unusually clean verdict: four chooser
  families are near-unanimous with one another (mean within-scenario pick
  unanimity .972; choice floor .044) yet diverge from the cosine-predicted
  pick on .633 of 1,144 trials — a gap fourteen times the instrument's noise
  floor, surviving counterbalancing, threshold and metric alternates, and
  both controls. The dimensional choice-weight model localizes the wedge:
  choice weights the stated dimensions unequally, with sign reversals, and a
  pre-registered mechanism battery rules out presentation order and
  tie-breaking noise while implicating a systematic brand-level choice policy
  the stated profile only partially carries. The practical payload is a
  validity bound the agentic-commerce era needs: perception-level measurement
  does not transfer to choice-level prediction for free, and the gap between
  them is now an instrument-measured quantity with controls and floors rather
  than an anecdote.

# ============================================================================
# Boundary conditions
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      PRISM-C measures the AI-observer surface under controlled simulated
      elicitation: stated readings and choices are elicited from models via
      standardized prompts, not harvested from deployed agentic-commerce
      transaction logs. Deployment validity is a scoped boundary, the same
      boundary the simulated choice-audit environments accept for the same
      reason (control and reproducibility).
  - id: C2
    statement: >-
      Single-epoch instrument: all readings and choices come from pinned model
      versions (July 2026); version drift across model generations is a
      separate instrument's province.
  - id: C3
    statement: >-
      The gap is predictor-relative and bank-relative: it is measured against
      the pre-registered cosine-nearest-need predictor (and, secondarily, the
      fitted choice-weight model) over a frozen 40-brand / 40-scenario bank
      from one public index frame, and is reported per (bank, predictor,
      operator set), never as a universal constant.
  - id: C4
    statement: >-
      English-language elicitation only; non-English agentic surfaces require
      native-language operators before any claim extends to them.
  - id: C5
    statement: >-
      Resolution claims are conditional on the pre-registered operator
      screening: the stated-reading floor spans the operator pairs kept by the
      mechanical exclusion rule, with the excluded discordant pair collected
      and reported as an exploratory observer.

# ============================================================================
# Assumption atoms
# ============================================================================
assumption_atoms:
  - id: AA1
    statement: >-
      For claims about AI-mediated choice surfaces, AI observers are the
      measurement construct itself, not a proxy for human raters; human
      convergent validity is required only for human-perception or
      human-choice claims (the human-subjects companion line).
    evidence:
      - type: citation
        anchor: >-
          LLM-derived measurement validates against human gold standards where
          humans are the construct; the deployed-surface argument inverts the
          direction of the validity burden.
        citation_keys:
          [
            rathje-2024-gpt-effective-multilingual,
            abdurahman-2024-perils-opportunities-llms,
            trott-2024-augment-psycholinguistic-datasets,
          ]
        citation_role: supports
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "carried unchanged from the 2026az validity argument"
    body_sections: ["The AI-Observer Surface"]
  - id: AA2
    statement: >-
      Temperature-0 elicitation is treated as operator-deterministic; repeat
      draws of an identical prompt are not separately estimable and are
      absorbed into the cross-family and cross-arrangement dispersion.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "Anthropic 4.7+ rejects sampling params; omitted and logged as-sent"
    body_sections: ["The Instrument"]
  - id: AA3
    statement: >-
      A buyer need is expressible in the same eight-dimension space as brand
      readings: the need-vector elicitation (ideal-brand prose rendered from
      the stated need, extracted with the unchanged PRISM-B extractor) is
      taken as the stated instrument's own account of the need, so the
      cosine-nearest brand is the prediction the stated instrument itself
      implies.
    provenance:
      created_by: author
      created_at: "2026-07-01T00:00:00Z"
      under_conditions: "need renderer forbids naming real brands"
    body_sections: ["Scenario Bank and Need Vectors"]
  - id: AA4
    statement: >-
      Because every trial is an independent stateless API call, cross-set
      order carryover is removed by construction; option position within the
      presented list is the operative presentation factor and is the one
      counterbalanced.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "PL0 §9.1 pre-collection amendment"
    body_sections: ["The Choice Battery"]

