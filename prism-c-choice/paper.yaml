meta:
  title: 'From Stated Perception to Revealed Choice: A Pre-Registered Instrument for the Choice-Perception
    Gap in AI Brand Perception (PRISM-C)'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.21128342
  date: '2026-07-02'
  venue: International Journal of Research in Marketing
  license: CC-BY-4.0
  keywords:
  - agentic commerce
  - revealed preference
  - stated preference
  - brand perception
  - AI observers
  - choice modeling
  - measurement instrument
  - preregistration
  abstract: 'As language models move from describing brands to choosing them on users'' behalf, an unexamined
    assumption carries the weight: that what a model says about brands predicts what it does. PRISM-C
    measures that assumption. The instrument elicits a model''s stated eight-dimension brand readings,
    projects each buyer need into the same space, and compares the need-nearest predicted pick with the
    model''s revealed pick in a simulated agentic choice task — with the divergence judged against the
    choice elicitation''s own cross-family operator floor, so a gap is measured, never asserted. In the
    pre-registered campaign (40 brands, 40 scenarios, 1,144 counterbalanced trials across four model families),
    the families were near-unanimous with one another (mean pick unanimity .972; floor .044) yet diverged
    from the predicted pick on .633 of trials — fourteen times the floor. Choice weighted the stated dimensions
    unequally, with sign reversals; position effects appeared only when options were perceptually indistinguishable;
    and pre-registered contrasts ruled out presentation order and tie-breaking noise in favor of a systematic
    brand-level choice policy the stated profile only partially carries. Stated-perception measurement
    does not transfer to agentic choice for free; the wedge between them is now an instrument-measured
    quantity.'
claims:
- id: P1
  type: proposition
  statement: 'The choice-perception gap is an instrument-measured quantity: revealed agentic choice diverges
    from stated-perception prediction at a rate measurable against the choice elicitation''s own cross-family
    operator floor, with controls certifying sensitivity and specificity.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: Agentic choice weights the stated dimensions unequally — the pre-registered choice-weighty
    set carries incremental weight, the effective dimensionality of choice is below the full eight, and
    some dimensions reverse sign — so the eight-dimension stated profile is consumed selectively, not
    uniformly, by choice.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P3
  type: proposition
  statement: 'The gap is a perception-policy phenomenon, not a presentation artifact: position effects
    are confined to perception-free option sets (the twin calibration), vanish on real brands, and the
    stated-to-revealed relationship survives counterbalancing unchanged.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P4
  type: proposition
  statement: The dominant residual account is a systematic brand-level choice policy — informed, near-unanimous
    across model families, tracking category fit rather than raw prominence — that the eight-dimension
    stated reading only partially carries; presentation order and tie-breaking noise are excluded as accounts
    by the pre-registered contrasts.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P5
  type: proposition
  statement: 'Stated-perception instruments under-resolve agentic choice: the nearest-need predictor''s
    margins sit below the stated instrument''s own operator floor for most contested choice-sets, so perception-level
    measurement does not transfer to choice-level prediction without a choice-side model — the validity
    bound PRISM-C exists to measure.'
  testable: false
  tested_in_paper: true
  status: not_tested
methodology:
  type: empirical
  design: 'Frozen pre-registered protocol (PL0): H1 (a choice-perception gap exists beyond the choice
    operator floor at S/N > 2), H2 (a pre-registered choice-weighty dimension subset — Economic, Experiential,
    Social — carries incremental predictive weight in a conditional-logit choice model, alpha .017), H3
    (the stated-to-revealed relationship survives position/order counterbalancing, alpha .017); family-wise
    alpha .05 Bonferroni-split; stopping rules; confirmatory/exploratory boundary; and a pre-collection
    amendment (frozen before any pilot or confirmatory call) fixing the design constants, the mechanical
    operator-exclusion rule, four candidate mechanisms with discriminating secondary contrasts, and two
    boundary-condition heterogeneity tests. Reused frozen stimulus frame: the 40-brand stratified bank
    of the sibling metamerism campaign (a named public brand index stratified by five coherence types
    x B2C/B2B with a pre-registered supplementation rule) is reused unchanged as the brand pool, and 40
    pre-registered need scenarios (20 consumer, 20 business) each carry a 3-5 brand choice-set from that
    pool, mixing coherence types and price tiers, with no brand named in any need text. Stated side: every
    bank brand is read through four standardized public-artifact channels by cross-family renderer-extractor
    operator pairs (renderer and extractor families never coincide), using the unchanged PRISM-B prompt
    set; every scenario''s need is rendered as ideal-brand prose (no real brand nameable) and extracted
    with the same unchanged extractor, so brand and need live in one eight-dimension space.'
