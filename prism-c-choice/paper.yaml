limitations:
- description: 'Single epoch, pinned operators: the concordance structure (four unanimous choosers; one
    discordant stated-side renderer) is a property of these model versions at this date.'
  severity: moderate
  addressable: true
- description: 'Simulated elicitation, not deployed logs: choices are elicited under a controlled assistant
    frame with nominative option lists, not harvested from production agentic checkouts; the boundary
    is scoped (C1) and shared with the choice-audit environments.'
  severity: moderate
  addressable: true
- description: The gap is predictor-relative, and part of it is the stated instrument's compression rather
    than choice-side reweighting (D1); anchor-calibrated extraction is the designated protocol remedy
    before the stated space is blamed alone.
  severity: moderate
  addressable: true
- description: 'Bank-relative and English-only: 40 brands from one index frame, 40 authored scenarios,
    English prompts; the fraction is a property of the (bank, predictor, operator set) triple.'
  severity: moderate
  addressable: true
- description: The brand-intercept diagnostic suffers complete separation (choosers are near-unanimous,
    so some brands are never chosen given the features); its likelihood ratio is reported as a diagnostic
    magnitude, not a calibrated test.
  severity: moderate
  addressable: true
