# ---------------- Controls (outside the confirmatory 40) ----------------
positive_controls:
  # One bank brand dominating on every dimension FOR THE SCENARIO, among
  # low-fit alternatives; must be reliably chosen (PL0 §5).
  - id: P01
    need: >-
      A law firm must send signed original contracts from New York to
      Singapore with guaranteed overnight-tier international delivery and
      tracking.
    choice_set: [FedEx, LEGO, Sephora]
    dominant: FedEx
  - id: P02
    need: >-
      A buyer wants a hand-finished silk scarf from a storied luxury house
      as a gift that signals classic European craftsmanship.
    choice_set: [Hermès, McDonald's, Caterpillar]
    dominant: Hermès
  - id: P03
    need: >-
      A machine-learning team needs top-tier accelerator hardware for
      training large neural networks this quarter.
    choice_set: [Nvidia, Starbucks, Ryanair]
    dominant: Nvidia
  - id: P04
    need: >-
      A parent wants a creative construction toy that a seven-year-old can
      build with safely and expand set by set.
    choice_set: [LEGO, Goldman Sachs, Cisco]
    dominant: LEGO
  - id: P05
    need: >-
      A traveler on a highway stop wants a fast, inexpensive, predictable
      burger-and-fries meal within ten minutes.
    choice_set: [McDonald's, Rolex, SAP]
    dominant: McDonald's

negative_controls:
  # Fictional near-duplicate twins: identical one-line descriptions, names
  # matched in structure. Counterbalanced across positions; no stable pick
  # beyond chance is the pass criterion (PL0 §5). The raw per-position pick
  # rates double as a position-bias calibration.
  - id: N01
    need: >-
      An office manager is choosing a supplier for standard A4 copy paper on
      a recurring monthly order.
    options:
      - {name: Nordvale Supply Co., descriptor: office paper supplier}
      - {name: Nordgale Supply Co., descriptor: office paper supplier}
  - id: N02
    need: >-
      A household is picking a brand of still bottled spring water for
      weekly delivery.
    options:
      - {name: Clearbrook Springs, descriptor: bottled spring water}
      - {name: Clearbrook Waters, descriptor: bottled spring water}
  - id: N03
    need: >-
      A student needs a pack of plain ruled notebooks for the semester.
    options:
      - {name: Meridian Paper Works, descriptor: stationery maker}
      - {name: Meridian Paper Goods, descriptor: stationery maker}
  - id: N04
    need: >-
      A facilities team is restocking AA alkaline batteries for office
      devices.
    options:
      - {name: Voltane Cells, descriptor: alkaline battery brand}
      - {name: Voltaire Cells, descriptor: alkaline battery brand}
  - id: N05
    need: >-
      A small clinic is hiring a weekly commercial cleaning service for its
      waiting rooms.
    options:
      - {name: BrightPath Cleaning, descriptor: commercial cleaning service}
      - {name: BrightPoint Cleaning, descriptor: commercial cleaning service}

