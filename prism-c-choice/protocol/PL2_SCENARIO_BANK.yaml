# PRISM-C PL2 Scenario + Choice-Set Bank — provisional until the pre-flight
# pilot passes; frozen before confirmatory collection.
# Version: prism-c/v1.0.0
# Date authored: 2026-07-02
#
# 40 pre-registered need-scenarios, each with a 3-5 brand choice-set drawn
# from the REUSED FROZEN brand bank (research/prism_m/PL2_BRAND_BANK.yaml,
# prism-m/v1.0.0: Interbrand index frame, five coherence types x B2C/B2B).
# Construction rules (ex ante):
#   - the need text names NO brand and no proprietary product line;
#   - every choice-set member is a plausible spend of the same budget for the
#     stated need (heterogeneous categories allowed - the agentic setting is
#     "which BRAND gets this need", not a within-category shelf test);
#   - sets mix coherence types and price tiers wherever the need allows;
#   - each option enters the choice prompt as "<Brand> - <category>" exactly
#     as recorded in the brand bank (nominative reference only, matching the
#     PRISM-B renderer discipline).
# Controls (PL0 §5) are OUTSIDE the 40 confirmatory scenarios: positive =
# dominating option among low-fit alternatives; negative = fictional
# near-duplicate twins with identical one-line descriptions.

version: prism-c/v1.0.0
brand_bank: ../prism_m/PL2_BRAND_BANK.yaml

scenarios:
  # ---------------- B2C (S01-S20) ----------------
  - id: S01
    sector: b2c
    need: >-
      A senior manager wants a memorable status gift for a long-standing
      business partner celebrating a career milestone. Budget is generous;
