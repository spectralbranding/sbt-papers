methodology:
  type: empirical
  design: 'The six-module analytical pipeline: (1) Brand Decomposition, (2) Observer Mapping, (3) Cloud
    Prediction, (4) Coherence Audit (seven-metric scorecard + A+..F grade + coherence-type classification),
    (5) Emission Strategy, (6) Re-collapse Simulation; each module''s structured YAML output feeds the
    next. Insight Validation Protocol: each surfaced insight is accepted only if it simultaneously satisfies
    four criteria — non-obvious, dimensionally specific, actionable, observer-differentiated — assessed
    by the framework''s author. Cross-model inter-rater reliability: run the identical pipeline under
    a second independent analytical instrument (Gemini 3.1 Pro) and compare structural classifications
    (coherence type + grade), treating convergence as inter-coder agreement.'
  analysis:
    software: paper §3.2 (prompt kit available from corresponding author)
acceptance:
- claim_id: PF1
  criterion: Holds if (Formal Proposition 1 — Observer heterogeneity) Different observer cohorts exposed
    to identical brand signal environments form systematically different brand convictions as a function
    of their spectral-profile differences (weights, tolerances, priors, encounter mode) — profile-predictable
    divergence, not random variation.
  falsification: Falsified if cohorts with measurably different profiles produce conviction distributions
    that do not differ after controlling for signal exposure — i.e. profile predicts no incremental variance
    beyond demographics.
- claim_id: PF2
  criterion: Holds if (Formal Proposition 2 — Non-ergodicity of perception) The temporal sequence in which
    brand signals are encountered affects the resulting conviction even when the signal set is identical,
    because signals compound multiplicatively through priors rather than summing additively.
  falsification: Falsified if matched cohorts exposed to the same signals in different temporal orders
    converge on statistically indistinguishable convictions.
- claim_id: PF3
  criterion: Holds if (Formal Proposition 3 — Structural absence as signal) Designed restriction of signal
    emission in specific dimensions generates perceived value that cannot be replicated by signal addition
    in other dimensions; restriction on one dimension produces a signal on a different dimension.
  falsification: Falsified if restriction shows no perceived-value premium over matched brands with equivalent
    positive signal strength, or the premium is fully replicable by signal addition.
- claim_id: PF4
  criterion: Holds if (Formal Proposition 4 — Coherence type over coherence score) Brands with identical
    aggregate coherence scores exhibit different resilience properties depending on coherence TYPE (ecosystem,
    signal, identity, experiential asymmetry, incoherent).
  falsification: Falsified if brands of different coherence type matched on aggregate score show statistically
    indistinguishable disruption-response patterns in longitudinal cohort tracking.
- claim_id: PF5
  criterion: Holds if (Formal Proposition 5 — Conviction asymmetry) Evidence-free negative brand convictions
    are more resistant to disconfirmation than evidence-rich positive convictions, because the negative
    holder's profile excludes the dimensions where disconfirming evidence would have to arrive (the experiential
    gate is effectively closed).
  falsification: Falsified if evidence-free negative and evidence-rich positive convictions require equivalent
    counter-attitudinal information to shift when conviction strength is held constant.
