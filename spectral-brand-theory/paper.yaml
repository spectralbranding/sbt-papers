results:
- claim_id: PF3
  status: supported
  notes: 'Structural absence: Hermès achieves the study''s highest coherence grade (A+) and emission efficiency
    (9/10) not through what it emits but through what it withholds. Economic restriction (never discounting)
    produces a social signal; experiential restriction (in-store only) produces an economic signal; social
    restriction (purchase rituals) produces an experiential signal — a multiplicative, cross-dimensional
    mechanism that requires heritage legitimization and existing demand to read as intention rather than
    failure.'
- claim_id: PF4
  status: supported
  notes: 'Five coherence types: coherence is not a continuum but a nominal classification with qualitatively
    distinct resilience profiles — ecosystem (selective absorption / purification, Hermès), signal (uniform
    transmission, IKEA), identity (binary ideological split, Patagonia), experiential asymmetry (geographic
    split by evidence base, Erewhon), and incoherent (amplifying fragility, Tesla). Type is set by cohort
    interdependence, ideological centrality, and encounter-mode variance.'
- claim_id: PF5
  status: supported
  notes: 'Asymmetric conviction resilience: an evidence-free negative conviction (Tesla Boycotter, experiential
    weight .03, confidence .82) was more stable than an evidence-rich positive one (Tesla Loyalist, experiential
    weight .15, confidence .78). In disruption simulations negative convictions strengthen under stress
    while positive convictions weaken; conversion of structurally locked negative cohorts is therefore
    wasted effort.'
- claim_id: P3
  status: supported
  notes: Brand power and brand health are independent variables. Tesla has maximum emission power (universal
    awareness, 7/8 dimensions at strength >=4, gate permeability 10/10) yet minimum architectural health
    (cloud coherence 2/10, D/A 30/65, C-). The D/A ratio most powerfully discriminates power from health;
    an exploratory 55-65% designed-signal optimal zone emerges from the five-brand comparison (requiring
    larger-sample validation).
- claim_id: P7
  status: supported
  notes: Brand power and brand health are independent variables. Tesla has maximum emission power (universal
    awareness, 7/8 dimensions at strength >=4, gate permeability 10/10) yet minimum architectural health
    (cloud coherence 2/10, D/A 30/65, C-). The D/A ratio most powerfully discriminates power from health;
    an exploratory 55-65% designed-signal optimal zone emerges from the five-brand comparison (requiring
    larger-sample validation).
limitations:
- description: The five-brand application is an illustrative proof-of-concept using SBT's own pipeline,
    not an empirical study; the four mechanisms are candidates, not validated findings. Independent human-subject
    validation of the propositions — especially PF2 (non-ergodicity) and PF5 (conviction asymmetry) via
    conjoint-based spectral weight measurement — is the priority next step.
  severity: moderate
  addressable: true
- description: Observer dimensional weights are expert estimates, not empirically measured; cloud confidence
    scores are calibrated within each brand but not across brands (ordinal weak/moderate/strong is more
    defensible than cross-brand decimal comparison).
  severity: moderate
  addressable: true
- description: All five case brands are well-known Western consumer brands; applicability to non-Western,
    B2B, cooperative, or newly launched brands is untested (boundary condition C1).
  severity: moderate
  addressable: true
- description: The eight dimensions are a working decomposition treated as independent; substantial inter-dimensional
    correlation would lower effective dimensionality below eight and require adjusting the framework's
    precision claims. Eight is justified as the resolution needed for reliable multi-observer positioning
    (Perception DOP), not claimed as the true dimensionality of brand perception.
  severity: moderate
  addressable: true
- description: 'LLM and human observers are not assumed interchangeable: LLM cohorts share a structural
    Economic-Default bias absent in human samples. The framework''s illustrative findings rest on LLM
    analytical instruments; this divergence is itself made measurable by the observer parameterization
    rather than assumed away.'
  severity: moderate
  addressable: true
