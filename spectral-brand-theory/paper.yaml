meta:
  title: 'Spectral Brand Theory: A Computational Framework for Multi-Dimensional Brand Perception'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.18945912
  date: '2026-02-01'
  venue: Working paper (Zenodo; corpus conceptual hub)
  license: CC-BY-4.0
  keywords:
  - brand perception
  - dimensional decomposition
  - computational branding
  - observer heterogeneity
  - brand coherence
  - structural absence
  - non-ergodic dynamics
  - AI-native framework
  - brand architecture
  - perceptual geometry
  abstract: 'Brand measurement collapses multi-dimensional perception into single scores, destroying the
    information that explains why different observers form irreconcilable perceptions of the same brand.
    Prior dimensional approaches decompose brand meaning into attribute-level dimensions but treat those
    dimensions as properties of the brand rather than perceptual channels through which heterogeneous
    observers filter signals. This paper develops Spectral Brand Theory (SBT), arguing that brand perception
    is irreducibly observer-dependent. The framework decomposes brand signals across eight perceptual
    dimensions, defines observer cohorts through formal spectral profiles, and models perception as probabilistic
    cloud formation that collapses into conviction through evidence accumulation. Five formal propositions
    address observer heterogeneity, non-ergodic perception, structural absence, coherence types, and conviction
    asymmetry. An illustrative application to five brands articulates four candidate mechanisms: structural
    absence as brand strategy, a five-type coherence taxonomy, asymmetric conviction resilience, and independence
    of brand power from brand health. Cross-model replication suggests structural conclusions are framework-driven
    rather than model-specific. SBT contributes a computationally implementable, observer-centric architecture
    that extends customer-based brand equity theory. A companion proof-of-concept study replicating SBT''s
    cohort-divergence patterns across 17 LLM architectures confirms dimensional collapse as a systematic
    property of AI-mediated perception [@zharnikov-2026-dimensional-collapse-ai-mediated-search]; independent
    human-subject validation of the framework''s propositions is identified as the priority for future
    empirical work.'
claims:
- id: P1
  type: proposition
  statement: A brand is not an object with properties but a perceptual process with observers; "the brand"
    as commonly understood is always already a collapse — a conviction assembled in an observer's mind
    from whichever signals they could perceive through their spectral profile. These convictions are not
    errors against a true brand; they are the only brands that exist.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: Brand signals decompose across eight independent perceptual dimensions — Semiotic, Narrative,
    Ideological, Experiential, Social, Economic, Cultural, Temporal — each a distinct channel carrying
    information the others cannot. The dimensions measure brand OUTPUT (what is emitted and how it is
    perceived), not internal organizational process.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'Each signal carries a source type (designed / ambient / synthetic), an emission type (positive
    / null / structural absence), and a strength (0-5). The designed/ambient (D/A) ratio is a diagnostic
    metric: a brand whose perception is predominantly ambient (D/A < .40) faces a structural problem no
    communication strategy can solve, because its story is being written by others.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
- id: P4
  type: proposition
  statement: Each observer cohort is defined by a formal spectral profile — spectrum (which dimensions
    are visible), weights (priority per dimension, summing to 1), tolerances (accepted inconsistency),
    priors (stored convictions), identity gate (recognition), and encounter mode (direct / mediated /
    mixed). This converts "different people perceive differently" from a qualitative observation into
    a parameterized scoring function.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
  - P2
- id: P5
  type: proposition
  statement: 'A cohort is a CLUSTER IN SPECTRAL-PROFILE SPACE, not a demographic segment. Demographic
    variables (age, income, geography) are metadata that may correlate with but do not determine perceptual
    behavior; two observers sharing every demographic attribute may belong to different cohorts if their
    profiles diverge. Cohort membership is dynamic: signal events physically redistribute observers across
    cohort boundaries.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P4
- id: P6
  type: proposition
  statement: 'Brand perception follows a three-stage epistemic pipeline: (1) cloud formation — perceived
    signals cluster, weighted by the profile, into a probabilistic perception cloud with valence and confidence;
    (2) conviction collapse — sufficient consistent evidence collapses the cloud into a stable conviction
    at an observer-specific threshold; (3) re-collapse — strong contradicting evidence dissolves the conviction,
    which is then rebuilt from surviving + crystallized + new signals, never patched.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P4
- id: P7
  type: proposition
  statement: Coherence is a STRUCTURAL property — the degree to which different cohorts' convictions are
    compatible (not identical) — not the consistency of messaging. It is measured by a seven-metric spectral
    scorecard (dimensional coverage, gate permeability, cloud coherence, collapse strength, re-collapse
    resistance, emission efficiency, D/A ratio) yielding an A+..F grade.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P5
  - P6
