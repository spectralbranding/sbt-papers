meta:
  title: 'Forming a Perception: Campaigns as Forcing Functions and the Relaxation of the Brand Perception
    Cloud'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.20769594
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand dynamics
  - perception formation
  - forcing function
  - relaxation time
  - Ornstein-Uhlenbeck process
  - advertising decay
  - brand distinctiveness
  - Spectral Brand Theory
  abstract: 'A companion paper routes a signal to a perceptual cohort that already exists and defers the
    distinct mode that moves the perception itself — demand creation and belief maintenance — to a dynamics
    treatment. This paper develops that mode. It represents a campaign as a time-varying forcing function
    on the brand perception cloud, whose centroid follows a forced Ornstein-Uhlenbeck process on the eight-dimensional
    perceptual manifold: formation is the forced transient toward a target, maintenance is sustained forcing
    against a restoring force, and the practitioner observation that perception decays when advertising
    stops is the unforced relaxation toward a brand-specific stable point at a measurable perception-decay
    time constant. The instrument recovers that constant from time-sliced atoms spanning a spend pulse.
    The unifying result ties formation to reach: a brand''s off-generic distinctiveness — the same quantity
    that is a metamerism loss in the parent theory and a self-selection sharpness in the reach companion
    — lower-bounds the persistence of its formed perception, so a distinctive brand holds its perception
    with less forcing and decays more slowly. A calibrated simulation demonstrates the ordering; the confirmatory
    panel design is specified. It keeps the metrology posture: the instrument measures the forcing-versus-relaxation
    budget; the manager runs the campaign.'
claims:
- id: P1
  type: proposition
  statement: Forced-SDE representation. Brand-perception formation and maintenance are represented by
    the forced Ornstein-Uhlenbeck SDE dX = [-A(X - x*) + F(t)] dt + Sigma dW on the eight-dimensional
    SBT manifold, with F(t) the campaign forcing vector. Formation = forced transient toward a target
    displacement; maintenance = sustained F balancing the restoring force; 'stop advertising -> decay'
    = the unforced (F=0) relaxation of the centroid toward x*. This subsumes the scalar advertising-stock-with-decay
    tradition (Nerlove-Arrow goodwill, Vidale-Wolfe response) as the one-dimensional projection onto a
    single sales/goodwill axis.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: 'tau identification from time-sliced atoms. The perception-decay time constant tau = 1/lambda_min(A)
    is identified from the post-pulse decay of the centroid displacement: after forcing stops, ||x_bar(t)
    - x*|| decays as exp(-t/tau) along the slowest eigen-direction, so tau is estimable from a time-sliced
    atom series spanning a spend pulse and its aftermath. The estimator is the OU mean-reversion-rate
    fit to the centroid trajectory.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'Distinctiveness lower-bounds persistence (THE UNIFYING ORDERING). The persistence time tau
    of a brand''s off-generic perceptual displacement is increasing in its distinctiveness sin^2(beta):
    a more distinctive brand sits at a deeper, better-separated stable point whose basin resists relaxation
    toward the generic centroid, so its formed perception decays more slowly. d tau / d sin^2(beta) >
    0. This is the same sin^2(beta) that is the perception-metamerism LOSS in 2026au and the self-selection
    SHARPNESS in 2026av — distinctiveness simultaneously sharpens reach and slows decay.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P4
  type: proposition
  statement: Maintenance forcing = relaxation loss at equilibrium. To HOLD the centroid at a target displacement
    d from the intrinsic stable point x*, the required steady-state forcing is F_hold = A d (the forcing
    exactly cancels the restoring force). The maintenance budget therefore equals the relaxation loss
    A d and falls to zero as the target approaches the brand's own stable point. A distinctive brand whose
    target perception IS its stable point (d ~ 0) needs ~0 maintenance forcing; an undifferentiated brand
    held away from a generic x* pays continuous forcing and collapses fast when it stops.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
  - P3
methodology:
  type: empirical
  design: 'EXECUTED demonstration (the realized path; calibrated simulation, NOT a field test — mirrors
    2026av''s ME2 posture). A deterministic fixed-seed forced-OU simulation calibrated to the five canonical
    PUBLIC brand profiles (de-branding standing; NOT the WIP atom instrument): for each anchor''s distinctiveness
    sin^2(beta), simulate a forcing pulse + post-pulse relaxation of the centroid, recover tau by exponential
    fit, and show tau monotone increasing in sin^2(beta). Reports the recovered-tau ordering + a maintenance-budget
    curve with bootstrap intervals. Reproducible script code/forced_relaxation_demo.py (fixed seed), PAQS
    37a-e. PRIMARY confirmatory design (roadmap, not executed): a high-frequency perceptual panel — weekly/biweekly
    perceptual batteries (YouGov BrandIndex or Kantar BrandZ) reduced to R^8 centroids via the same spectral
    procedure as the public demo — for >=30 brands over 24-36 months merged with GRP/spend data at the
    same grain; recover per-brand tau from post-pulse decay and test d tau/d sin^2(beta) > 0 with power
    >.8 for a .25 correlation. Constructs measured at the theory''s grain (centroid in spectral space).
    CAUSAL IDENTIFICATION design (Grok-gap-2, pre-committed): to recover F and tau causally, instrument
    own forcing with EXOGENOUS shifters — advertising-tax changes, competitor scandals, political-ad-cycle
    crowd-out of ad inventory — and run a PLACEBO on non-advertised perceptual dimensions (which should
    show no forced response). Addresses (1) omitted competitive forcing, (2) atom-provenance measurement
    error, (3) reverse causality (spend ramps when perception decays). Ranking by feasibility: natural
    experiments > IV (political cycles) > full structural SDE estimation (avoid as primary).'
acceptance:
- claim_id: P1
  criterion: Holds if forced-SDE representation.
  falsification: A category where perceptual-centroid response to a spend pulse shows no relaxation toward
    a fixed point (random walk / non-mean-reverting), within the C3 positive scope, refutes the forced-OU
    representation.
- claim_id: P2
  criterion: Holds if tau identification from time-sliced atoms.
  falsification: If the post-pulse centroid trajectory is not better fit by exponential relaxation than
    by a no-decay (persistent random walk) null, tau is not identified and P2 fails.
- claim_id: P3
  criterion: Holds if distinctiveness lower-bounds persistence (THE UNIFYING ORDERING).
  falsification: 'QUANTITATIVE (Grok): across >=20 brands after exogenous spend pulses, if recovered tau
    shows zero or negative correlation with measured sin^2(beta) — or if brands with sin^2(beta)>.6 require
    no less maintenance forcing than brands with sin^2(beta)<.3 — the ordering is refuted.'
- claim_id: P4
  criterion: Holds if maintenance forcing = relaxation loss at equilibrium.
  falsification: If maintenance spend required to hold perceptual position is uncorrelated with the target's
    displacement from the brand's estimated stable point (or with distinctiveness), P4 fails.
