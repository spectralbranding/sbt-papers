    RELOCATES the stable point x* itself (product-harm crisis, scandal). The forced-OU model holds x*
    fixed; a Poisson-jump extension (jump-diffusion relocating x*) is flagged in the discussion as a boundary
    extension, not developed. Connects to the 2026z stationarity/crisis remark and coherence-resilience.'
  severity: moderate
