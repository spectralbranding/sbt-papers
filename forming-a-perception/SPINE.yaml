spine_version: "0.2"
paper_key: "2026aw"
title: "Forming a Perception: Campaigns as Forcing Functions and the Relaxation of the Brand Perception Cloud"
self_citation_key: "zharnikov-2026aw-forming-a-perception"
concept_doi: "10.5281/zenodo.20769594"   # concept DOI (stays across versions)
version_doi: "10.5281/zenodo.20769595"   # v1.0.0 (same-day file replacement on Zenodo; no version bump)
thesis: |
  A marketing campaign is an exogenous force on a multi-dimensional perceptual state, and the
  observable practitioners call "perception decay when advertising stops" is the unforced
  relaxation of that state back toward a brand-specific stable point. This paper formalizes
  perception formation and maintenance as a FORCED DYNAMICAL SYSTEM whose results stand on the
  stochastic-dynamics math alone, independent of any one perceptual instrument. The perception
  cloud is a probability measure mu_t on a fixed K-dimensional perceptual space (here K=8, but the
  results hold for any fixed perceptual basis); its centroid x_bar(t) = E[X_t] obeys a forced
  Ornstein-Uhlenbeck SDE
      dX = [ -A (X - x*) + F(t) ] dt + Sigma dW,
  where x* is the brand's intrinsic stable point (the perception it relaxes toward unforced),
  A is the positive-definite restoring/relaxation operator, F(t) is the campaign's FORCING
  FUNCTION (a vector in the same perceptual basis as the cloud), and Sigma dW is generic
  perceptual diffusion. FORMATION is the forced transient toward a target; MAINTENANCE is sustained
  forcing balancing relaxation; the "stop advertising -> perception decays" folklore is the
  unforced (F=0) relaxation of the centroid toward x*, with a measurable PERCEPTION-DECAY TIME
  CONSTANT tau = 1 / lambda_min(A) (inverse of the slowest relaxation rate). The instrument
  recovers F and tau from a TIME-SLICED perceptual series (any dated perceptual-tracking series)
  spanning a spend pulse. The unifying result ties formation to reach: a brand's off-generic
  DISTINCTIVENESS — the off-generic energy share of its centered profile — LOWER-BOUNDS the
  persistence time tau of its formed perception, because a more distinctive brand sits FARTHER
  OUTSIDE the dense, localized generic attractor, where that attractor adds LESS restoring
  curvature to its well, so lambda_min is smaller and the perception relaxes more slowly. This
  ordering, ASSERTED in v1.0.0 through the toy law lambda(s)=lambda_0(1-kappa*s), is DERIVED in the
  Electronic Companion (EC.3) from a single stated, defended curvature primitive (P-CURV: a dense
  localized attractor contributes restoring curvature that falls with separation), and the toy law
  is recovered as its local linearization. The forced-OU vector model NESTS the scalar prior art:
  project onto one dimension and add an information reading of F and the Erdem-Keane Bayesian
  scalar-quality-learning updating is recovered as the 1-D special case, just as Nerlove-Arrow
  goodwill and Vidale-Wolfe response are its 1-D shadow. Spectral Brand Theory is named ONCE as
  the empirical instantiation (the K=8 perceptual basis); the paper is otherwise corpus-independent
  — a reader with zero corpus access verifies every proposition. Metrology posture holds: the
  instrument measures cloud position, the campaign's forcing, and the forcing-vs-relaxation budget;
  the manager runs the campaign. NARROWED lead claim: we FORMALIZE perception formation as forced
  relaxation on a perceptual manifold and DEMONSTRATE (calibrated simulation — an existence proof
  of the ordering mechanism, NOT a field test) that distinctiveness lower-bounds persistence; the
  confirmatory panel design is a roadmap.

# ---------------------------------------------------------------------------
# Boundary conditions (incl. the market-scope 2x2)
# ---------------------------------------------------------------------------
boundary_conditions:
  - id: C1
    statement: "Inherits the SBT/2026z substrate: a brand is an observer-completed probability measure mu_t on the eight-dimensional SBT perception manifold; the cloud's drift follows the non-ergodic-diffusion SDE (2026e/2026z). The managerial problem is to move or hold mu_t; SBT supplies the measurement, the manager the campaign."
  - id: C2
    statement: "UNIT OF ANALYSIS: the cloud is the FIRST MOMENT of a distribution of individual observer perceptions; all dynamics are stated for the centroid x_bar(t) = E[X_t], and tau is identified from the CENTROID TRAJECTORY, not from any single observer. Cohort heterogeneity enters as the spread of mu_t (higher moments), held fixed in the minimal model and relaxed in robustness."
  - id: C3
    statement: "MARKET-SCOPE 2x2 (stated in the RQ paragraph, not an appendix). The tau<-distinctiveness link is SCOPED to: established consumer-packaged-goods and service categories with habitual/repeat purchase and a stable basis of perceptual dimensions. It is EXPECTED TO FAIL for (i) RADICAL INNOVATIONS that redefine the basis vectors of the perceptual space itself (e.g. iPhone-2007-type category genesis — the manifold itself moves, so a fixed-x* relaxation model does not apply); and (ii) B2B / procurement-dominated contexts where institutional routines, not perceptual drift, govern choice. Outside the positive scope the forced-relaxation model is mis-specified and the paper makes no claim."
  - id: C4
    statement: "Provenance/atom requirement: tau-recovery (P2) needs atoms carrying content_date (time-slicing) and a reduction from raw atoms to R^8 centroid coordinates; absent a time-resolved perceptual series the decay constant is unidentified (the confirmatory design supplies it; the demonstration uses public illustrative profiles)."

# ---------------------------------------------------------------------------
assumption_atoms:
  - id: AA1
    statement: "Linear restoring force: the unforced drift is -A (X - x*) with A positive-definite (Ornstein-Uhlenbeck mean reversion toward the intrinsic stable point x*). Used for closed-form tau."
    type: dynamics_form
    relaxable: true
    relaxation_consequence: "A nonlinear (e.g. double-well) potential changes the closed form but preserves the qualitative tau-ordering near a stable point (local linearization); tested in RC-DRIFT."
    affects: [P1, P3, P4, M1]
  - id: AA2
    statement: "Linear, additive forcing F(t) entering the drift in the same spectral basis as the cloud (a campaign is a force vector in R^8). Markov dynamics (no long memory beyond the state)."
    type: forcing_form
    relaxable: true
    relaxation_consequence: "Convex/saturating forcing rescales the maintenance budget (P4) without changing its form; non-Markov carryover adds an adstock kernel, recovering the classic scalar adstock as the 1-D projection."
    affects: [P1, P2, P4]
  - id: AA3
    statement: "Distinctiveness s = sin^2(beta) is the off-generic energy share of the centered profile, a self-contained construct defined inline (NOT imported as a corpus dependency). Its link to well geometry — that larger s places x* at greater off-generic separation from the generic centroid, where the dense localized generic attractor adds LESS restoring curvature — is no longer ASSERTED but DERIVED from primitive P-CURV (see derivation EC.3 / curvature primitive). The central claim is now a theorem from a stated geometric primitive, not an imposed toy law."
    type: construct_link
    relaxable: true
    relaxation_consequence: "If the generic attractor's curvature did NOT fall with separation (P-CURV false — e.g. a non-localized attractor), P3 fails — P-CURV is the central primitive and the falsifier now targets the curvature-vs-separation law g'(d)<0 directly on a fitted perceptual landscape."
    affects: [P3, P4]
    derived_from: PRIM-CURV
  - id: AA4
    statement: "The centroid is identified from time-sliced atoms up to sampling error that is mean-zero and independent of the forcing schedule (no provenance-selection co-moving with spend). Used for P2 identification; threatened by AE-ID, addressed by ME-ID."
    type: measurement
    relaxable: true
    relaxation_consequence: "Provenance selection co-moving with spend biases tau; bounded by the ME-ID placebo + IV design."
    affects: [P2]

# ---------------------------------------------------------------------------
# Propositions — 4 numbered (IJRM house style)
# ---------------------------------------------------------------------------
propositions:
  - id: P1
    statement: "Forced-SDE representation. Brand-perception formation and maintenance are represented by the forced Ornstein-Uhlenbeck SDE dX = [-A(X - x*) + F(t)] dt + Sigma dW on the eight-dimensional SBT manifold, with F(t) the campaign forcing vector. Formation = forced transient toward a target displacement; maintenance = sustained F balancing the restoring force; 'stop advertising -> decay' = the unforced (F=0) relaxation of the centroid toward x*. This subsumes the scalar advertising-stock-with-decay tradition (Nerlove-Arrow goodwill, Vidale-Wolfe response) as the one-dimensional projection onto a single sales/goodwill axis."
    type: representation
    conditions: "C1, C2"
    antecedents: []
    assumptions: [AA1, AA2]
    evidence:
      - type: analytic
        anchor: "Construction: the forced OU SDE extends the 2026z drift SDE by an exogenous F(t); the unforced solution is exponential relaxation of the centroid displacement."
      - type: citation
        anchor: "Advertising-capital forcing+decay tradition this geometrizes (scalar goodwill/response with depreciation)."
        citation_keys: [nerlove-1962-optimal-advertising-policy, vidale-1957-operations-research-advertising, sethi-1977-dynamic-optimal-control]
        citation_role: theoretical_predecessor
      - type: citation
        anchor: "OU mean-reversion relaxation operator + generic perceptual-diffusion Sigma dW (standard linear-SDE result, written out in EC.1; not corpus-dependent — the noise term is generic Brownian)."
        citation_keys: [uhlenbeck-1930-theory-brownian-motion, ikeda-1989-stochastic-differential-equations]
        citation_role: methodological_source
    falsifier: "A category where perceptual-centroid response to a spend pulse shows no relaxation toward a fixed point (random walk / non-mean-reverting), within the C3 positive scope, refutes the forced-OU representation."
    body_sections: ["A Forced-Dynamics Model of Perception Formation"]
  - id: P2
    statement: "tau identification from time-sliced atoms. The perception-decay time constant tau = 1/lambda_min(A) is identified from the post-pulse decay of the centroid displacement: after forcing stops, ||x_bar(t) - x*|| decays as exp(-t/tau) along the slowest eigen-direction, so tau is estimable from a time-sliced atom series spanning a spend pulse and its aftermath. The estimator is the OU mean-reversion-rate fit to the centroid trajectory."
    type: mechanism
    conditions: "C2, C4"
    antecedents: [P1]
    assumptions: [AA4]
    evidence:
      - type: analytic
        anchor: "Closed-form: unforced linear OU centroid relaxes exponentially; tau is the inverse slowest eigenvalue, recoverable by regressing log-displacement on time."
      - type: simulation
        anchor: "ME-DEMO calibrated forced-OU run reproduces a post-pulse decay curve and recovers the seeded tau (existence proof, not field test)."
        source: ME-DEMO
      - type: citation
        anchor: "Persistence-estimation toolkit the perceptual-state-space estimator is the analogue of (pre-empts 'why not a VAR on perceptual indices?'); stabler-2023 = the modern brand-STRENGTH-OVER-TIME analogue (the dynamic perceptual-state object, post-2016); edeling-2016 = the firm-value persistence meta-analysis anchor."
        citation_keys: [dekimpe-1995-persistence-marketing-effects, ataman-2010-longterm-effect-marketing, naik-2003-understanding-impact-synergy, stabler-2023-firm-communication-layoffs, edeling-2016-marketings-impact-firm]
        citation_role: methodological_source
    falsifier: "If the post-pulse centroid trajectory is not better fit by exponential relaxation than by a no-decay (persistent random walk) null, tau is not identified and P2 fails."
    body_sections: ["Recovering the Decay Constant from a Dated Perceptual Series", "Empirical Strategy"]
  - id: P3
    statement: "Distinctiveness lower-bounds persistence (THE UNIFYING ORDERING). The persistence time tau of a brand's off-generic perceptual displacement is increasing in its distinctiveness sin^2(beta): a more distinctive brand sits at a deeper, better-separated stable point whose basin resists relaxation toward the generic centroid, so its formed perception decays more slowly. d tau / d sin^2(beta) > 0. This is the same sin^2(beta) that is the perception-metamerism LOSS in 2026au and the self-selection SHARPNESS in 2026av — distinctiveness simultaneously sharpens reach and slows decay."
    type: mechanism
    conditions: "C2, C3"
    antecedents: [P1]
    assumptions: [AA1, AA3]
    evidence:
      - type: derivation
        anchor: "EC.3 (PRIM-CURV): the off-generic direction is the SLOWEST restoring direction; a dense, localized generic attractor contributes curvature c*g(d) that DECREASES in off-generic separation d (g'(d)<0), so lambda_min(s)=kappa_b+c*g(d(s)) falls in s and tau=1/lambda_min rises: d tau/d sin^2(beta) > 0 DERIVED, not imposed. The 2-brand R^2 minimal model (M1) is the closed-form instance."
        source: PRIM-CURV
      - type: simulation
        anchor: "ME-DEMO: across the public-anchor-calibrated distinctiveness population, recovered tau is monotone increasing in sin^2(beta) — an existence-proof DEMONSTRATION of the derived ordering (the toy law lambda(s)=lambda_0(1-kappa*s) is the local linearization of PRIM-CURV, not an imposed slope)."
        source: ME-DEMO
      - type: note
        anchor: "BROADER-PROGRAM CONTEXT (not a dependency): the same off-generic energy share appears as a perception-metamerism loss (2026au) and a self-selection sharpness (2026av) elsewhere in the author's program; P3 does NOT depend on those papers — distinctiveness is defined inline and the ordering is derived from PRIM-CURV."
    falsifier: "QUANTITATIVE: across >=20 brands after exogenous spend pulses, if recovered tau shows zero or negative correlation with measured sin^2(beta) — or if brands with sin^2(beta)>.6 require no less maintenance forcing than brands with sin^2(beta)<.3 — the ordering is refuted. PRIMITIVE-LEVEL: if a fitted perceptual landscape shows the generic attractor's restoring curvature does NOT fall with separation (g'(d) >= 0), PRIM-CURV and hence P3 are refuted."
    body_sections: ["Distinctiveness and Persistence", "A Forced-Dynamics Model of Perception Formation"]
  - id: P4
    statement: "Maintenance forcing = relaxation loss at equilibrium. To HOLD the centroid at a target displacement d from the intrinsic stable point x*, the required steady-state forcing is F_hold = A d (the forcing exactly cancels the restoring force). The maintenance budget therefore equals the relaxation loss A d and falls to zero as the target approaches the brand's own stable point. A distinctive brand whose target perception IS its stable point (d ~ 0) needs ~0 maintenance forcing; an undifferentiated brand held away from a generic x* pays continuous forcing and collapses fast when it stops."
    type: management_outcome
    conditions: "C1, C2"
    antecedents: [P1, P3]
    assumptions: [AA1, AA2]
    evidence:
      - type: analytic
        anchor: "Steady state of the forced OU: dX=0 in expectation => F = A(x_target - x*); the maintenance budget is the restoring force at the held displacement."
      - type: citation
        anchor: "Mental-availability/adstock decay evidence that maintenance is needed and effects fade unrefreshed (the phenomenon P4 explains structurally); becker-2023 = advertising-content/repeated-exposure dynamics supporting the forcing-and-refresh thread; aaker-1991 = the brand-equity-as-asset-to-maintain nod (static-equilibrium camp)."
        citation_keys: [sharp-2010-how-brands-grow, romaniuk-2016-how-brands-grow, gijsenberg-2011-adstock-advertising-decisions, broadbent-1979-one-way-tv-advertisements, binet-2013-long-short-of-it, becker-2023-consistency-commonality-advertising, aaker-1991-managing-brand-equity]
        citation_role: empirical_anchor
    falsifier: "If maintenance spend required to hold perceptual position is uncorrelated with the target's displacement from the brand's estimated stable point (or with distinctiveness), P4 fails."
    body_sections: ["Maintenance as a Forcing Budget", "Managerial Translation"]

# ---------------------------------------------------------------------------
# Primitives (the defended structural assumptions the EC derivations rest on)
# ---------------------------------------------------------------------------
primitives:
  - id: PRIM-CURV
    name: "Dense-localized-attractor curvature primitive (P-CURV)"
    statement: "The restoring curvature along the off-generic escape direction e at a brand's stable point is lambda_e(d) = kappa_b + c*g(d), where kappa_b>0 is the brand's intrinsic well curvature (fixed across brands at first order), c>0, and g(d) is the curvature CONTRIBUTED by the generic attractor at off-generic separation d, with g'(d)<0 (strictly decreasing in separation). JUSTIFICATION (not convenience): the generic attractor is a DENSE, LOCALIZED region of finite spatial scale ell (it is the mode of the brand population); any smooth localized attractor kernel — Gaussian U_gen = -G*exp(-||x-x_gen||^2/2ell^2), inverse-quadratic, or finite-support spline — has radial curvature that falls to zero for d>ell, the regime a distinctive brand lives in. So P-CURV is a property of the generic region being dense and localized, not of a functional form. Robustness check RC-KERNEL verifies kernel-independence."
    justification_kernel: "U_gen(x) = -G*exp(-||x - x_gen||^2 / 2 ell^2); d^2 U_gen/dr^2|_d = (G/ell^2) exp(-d^2/2ell^2)(1 - d^2/ell^2) < 0-slope for d>ell."
    derives: [AA3, P3]
    falsifier: "On a fitted perceptual landscape, if the generic attractor's restoring curvature does NOT decrease with off-generic separation (g'(d) >= 0), P-CURV is false and P3 collapses."

derivations:
  - id: M1
    statement: "Smallest sufficient model: two brands in R^2, one stable point each, linear restoring force with rate decreasing in (1 - sin^2(beta)) along the off-generic direction, a sinusoidal/box forcing pulse F(t). Yields analytically: (a) the closed-form exponential post-pulse relaxation (P2), (b) d tau/d sin^2(beta) > 0 (P3), (c) F_hold = A d at equilibrium (P4). Generalizes to R^8 by eigen-decomposition of A; the slowest eigen-direction sets tau. Realized numerically by ME-DEMO (fixed seed, public anchors)."
    supports: [P1, P2, P3, P4]

# ---------------------------------------------------------------------------
# Electronic Companion (results in body, proofs in the EC).
# Body keeps the SDE displayed once, the four propositions as RESULTS, and the
# managerial reading; the EC carries every derivation. So a referee verifies
# each proposition line-by-line.
# ---------------------------------------------------------------------------
electronic_companion:
  - id: EC.1
    title: "The forced-OU solution"
    statement: "From dX = [-A(X - x*) + F(t)] dt + Sigma dW, derive the closed form x_bar(t) = x* + e^{-At}(x_bar_0 - x*) + integral_0^t e^{-A(t-s)} F(s) ds, with the noise contributing a mean-zero Gaussian term of stationary covariance solving the Lyapunov equation A V + V A^T = Sigma Sigma^T. Standard linear-SDE result, steps written out (not imported)."
    cites: [uhlenbeck-1930-theory-brownian-motion, ikeda-1989-stochastic-differential-equations]
    supports: [P1]
  - id: EC.2
    title: "Post-pulse relaxation and the tau estimator"
    statement: "Set F=0 after the pulse; project the centroid displacement onto the slowest eigen-direction of A; obtain ||x_bar(t) - x*|| proportional to exp(-t/tau) with tau = 1/lambda_min(A) exactly. Derive the log-linear regression estimator (regress log displacement on time) and its bias under the three identification threats (competitive co-forcing, provenance sampling error, reverse causality), upgrading P2 from assertion to derivation."
    cites: [dekimpe-1995-persistence-marketing-effects, ataman-2010-longterm-effect-marketing]
    supports: [P2]
  - id: EC.3
    title: "The distinctiveness->well-depth link (closes AA3 / review WARNING AA3)"
    statement: "Derive d tau/d sin^2(beta) > 0 from PRIM-CURV + the linking lemma d=d(s), d'(s)>0: lambda_min(s)=kappa_b+c*g(d(s)), so dlambda_min/ds = c*g'(d)*d'(s) < 0 and dtau/ds = -(1/lambda_min^2)(dlambda_min/ds) > 0. Recover the toy law lambda(s)=lambda_0(1-kappa*s) as the LOCAL LINEARIZATION about an operating separation. The single highest-value change in the rewrite: converts the headline ordering from imposed to derived. Drafted in ec3_curvature_primitive_derivation.md."
    source: PRIM-CURV
    supports: [P3, AA3]
    draft_file: "ec3_curvature_primitive_derivation.md"
  - id: EC.4
    title: "The maintenance-budget identity"
    statement: "Steady-state of the forced OU: dX=0 in expectation => F_hold = A(x_target - x*) = A d, with the zero-at-the-stable-point corollary (F_hold -> 0 as d -> 0). The 2.17x quartile maintenance-forcing ratio emerges as a model property of the calibrated population."
    supports: [P4]
  - id: EC.5
    title: "Nesting: scalar Bayesian learning as the 1-D belief-interpreted projection (closes review WARNING W1)"
    statement: "Project the K-dim forced OU onto a single perceived-quality eigen-axis u of A (eigenvalue lambda_u): q(t)=<u, x_bar - x*> obeys dq = (-lambda_u q + f(t)) dt + sigma_u dW, a 1-D linear-Gaussian state equation with scalar forcing f=<u,F>. Give f an information reading (a campaign delivers signals about true quality theta); the Erdem-Keane posterior-mean belief update dm = K(t)(signal - m) dt is exactly this scalar mean-reverting equation with the reversion rate = Kalman gain / forgetting rate and the target = signal-implied belief. So the forced-OU model CONTAINS scalar Bayesian quality learning as its 1-D belief-interpreted projection, exactly as it contains Nerlove-Arrow goodwill (q=goodwill, lambda_u=depreciation, f=spend response) and Vidale-Wolfe response. What the projection CANNOT recover is P3: a single axis has no off-generic direction, so dtau/ds is undefined in the scalar reduction. Upgrades AE-LEARN from asserted to derived."
    cites: [erdem-1996-decisionmaking-under-uncertainty, nerlove-1962-optimal-advertising-policy, vidale-1957-operations-research-advertising]
    supports: [P1, AE-LEARN]
  - id: RC-KERNEL
    title: "Kernel-robustness of P-CURV"
    statement: "Verify g'(d)<0 (and hence the tau-ordering) for two alternate localized attractor kernels — an inverse-quadratic and a finite-support spline — so a referee cannot dismiss the ordering as Gaussian-specific."
    supports: [P3, PRIM-CURV]

methods:
  - id: ME-DEMO
    statement: "EXECUTED demonstration (the realized path; calibrated simulation, NOT a field test — mirrors 2026av's ME2 posture). A deterministic fixed-seed forced-OU simulation calibrated to the five canonical PUBLIC brand profiles (de-branding standing; NOT the WIP atom instrument): for each anchor's distinctiveness sin^2(beta), simulate a forcing pulse + post-pulse relaxation of the centroid, recover tau by exponential fit, and show tau monotone increasing in sin^2(beta). Reports the recovered-tau ordering + a maintenance-budget curve with bootstrap intervals. Reproducible script code/forced_relaxation_demo.py (fixed seed), PAQS 37a-e."
    supports: [P2, P3, P4]
    status: planned
    script: "code/forced_relaxation_demo.py"
  - id: ME-PANEL
    statement: "PRIMARY confirmatory design (roadmap, not executed): a high-frequency perceptual panel — weekly/biweekly perceptual batteries (YouGov BrandIndex or Kantar BrandZ) reduced to R^8 centroids via the same spectral procedure as the public demo — for >=30 brands over 24-36 months merged with GRP/spend data at the same grain; recover per-brand tau from post-pulse decay and test d tau/d sin^2(beta) > 0 with power >.8 for a .25 correlation. Constructs measured at the theory's grain (centroid in spectral space)."
    supports: [P2, P3]
  - id: ME-ID
    statement: "CAUSAL IDENTIFICATION design (pre-committed): to recover F and tau causally, instrument own forcing with EXOGENOUS shifters — advertising-tax changes, competitor scandals, political-ad-cycle crowd-out of ad inventory — and run a PLACEBO on non-advertised perceptual dimensions (which should show no forced response). Addresses (1) omitted competitive forcing, (2) atom-provenance measurement error, (3) reverse causality (spend ramps when perception decays). Ranking by feasibility: natural experiments > IV (political cycles) > full structural SDE estimation (avoid as primary)."
    supports: [P2, P3]

observations:
  - id: OB-DEMO
    type: simulation
    statement: "TO BE FILLED by code/forced_relaxation_demo.py at a fixed seed: recovered tau for each of the five public anchors (increasing in distinctiveness), the tau~sin^2(beta) monotonicity statistic with bootstrap CI, and the maintenance-budget-vs-displacement curve. Calibrated demonstration; magnitudes are model properties, the monotone ordering is the robust claim."
    source: ME-DEMO

findings:
  - id: F-DEMO
    type: simulation_demonstration
    statement: "DEMONSTRATION (not field evidence): in the calibrated forced-OU model the recovered perception-decay time constant tau increases monotonically with distinctiveness sin^2(beta) across the public-anchor population, and the maintenance forcing to hold a fixed displacement falls toward zero as the target approaches the stable point — consistent with P3/P4. A calibrated simulation, not a test; ME-PANEL/ME-ID remain confirmatory."
    supports: [P3, P4]
    caveat: "Calibration anchored on 5 public profiles; the recovered magnitudes are model properties under documented constants, the monotone ordering is the robust claim."

robustness_checks:
  - id: RC-DRIFT
    statement: "Alternative drift specifications: linear vs nonlinear (double-well) restoring force; the tau-ordering should survive local linearization near a stable point."
    addresses: [P1, P3, AA1]
  - id: RC-EST
    statement: "Alternative estimators: continuous-time OU fit vs discrete-time VAR on perceptual indices (the Dekimpe-Hanssens persistence-decomposition benchmark); 2-D vs 8-D; split-sample by category."
    addresses: [P2]
  - id: RC-ID
    statement: "Placebo on non-advertised dimensions; controls for competitive spend + earned-media volume; IV vs natural-experiment vs structural identification (ME-ID)."
    addresses: [P2, P3, AA4]

alternative_explanations:
  - id: AE-LEARN
    statement: "Scalar Bayesian learning (Erdem & Keane 1996) could be said to already model advertising-as-input updating brand beliefs with decay."
    rebuttal: "NESTING (not mere 'differs'): the forced-OU vector model CONTAINS scalar Bayesian learning as its 1-D, belief-interpreted special case. Project the forced-OU centroid onto a single perceived-quality dimension and read F(t) as an information-accumulation input; the resulting 1-D forced mean-reversion with a precision-weighted update IS the Erdem-Keane scalar-quality updating. So the vector-field model does not merely differ from scalar learning — it nests it, exactly as it nests Nerlove-Arrow goodwill and Vidale-Wolfe response as 1-D shadows. What the 1-D projection cannot recover is the distinctiveness->tau ordering (P3), which is a property of the OFF-generic eigen-direction of A and has no scalar analogue: a single dimension has no 'off-generic' geometry. The nesting is DERIVED (not asserted) in EC.5: the 1-D projection q=<u,x_bar-x*> obeys a scalar OU dq=(-lambda_u q + f) dt + sigma_u dW that, under an information reading of f, IS the Erdem-Keane precision-weighted belief update."
    citation_keys: [erdem-1996-decisionmaking-under-uncertainty]
  - id: AE-LATENT
    statement: "A simpler latent-state model (generic state-space / VAR on perceptual indices) might suffice without the spectral geometry."
    rebuttal: "Only the geometric distinctiveness measure sin^2(beta) recovers the tau-ordering (P3); a structure-free latent state predicts decay but not its dependence on off-generic well depth. Shown via the RC-EST VAR benchmark lacking the ordering."
    citation_keys: [dekimpe-1995-persistence-marketing-effects]

limitations:
  - id: L1
    statement: "JUMP-TERM / SCANDAL boundary: distinctive brands CAN decay fast if an EXOGENOUS shock RELOCATES the stable point x* itself (product-harm crisis, scandal). The forced-OU model holds x* fixed; a Poisson-jump extension (jump-diffusion relocating x*) is flagged in the discussion as a boundary extension, not developed. Connects to the 2026z stationarity/crisis remark and coherence-resilience."
    anchor_keys: [zharnikov-2026z-spectral-dynamics]
  - id: L2
    statement: "Proprietary-instrument / construct-validity objection (predicted lead reviewer objection): the demonstration uses public illustrative profiles and an open reduction procedure; any perceptual tracking battery reduced via the same spectral procedure recovers cloud position. The prediction is about observer perception, not the particular instrument. De-branding standing (Brand Spectrometer WIP)."
  - id: L3
    statement: "Causal identification is a design, not yet executed: F and tau are recovered correlationally in the demonstration; ME-ID pre-commits the IV/natural-experiment + placebo needed for causal recovery. Magnitudes are calibrated-model properties; only the monotone tau-ordering is the robust claim."

