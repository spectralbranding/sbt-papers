# SPINE.yaml — Spectral Metamerism in Brand Perception (2026e / R2)
#
# RETROFIT spine: extracted descriptively from the completed paper.md
# ([internal path removed], Working Paper v1.5.0), NOT authored
# generatively before prose. Per the SPINE-for-all-active-canonical project
# ([internal path removed], decision D4).
#
# Schema v0.2 ([internal path removed] §"Schema v0.2"):
# the paper reports author-produced Monte Carlo simulation results and computed
# table values (the 31--39% metameric fraction, the 152%/198% JL distortion
# bounds, the 11.6% information-retention ratio), so observations / methods /
# measurements / findings are first-class. The geometric and
# information-theoretic results (Theorems 1-5, Propositions, Corollary 1) remain
# analytic propositions (D-prefixed derivations carry the formal proofs).
#
# R2 is the metamerism-family ROOT: it supplies the foundational definition of
# spectral metamerism in brand perception that the specialization papers
# (2026v LLM observers, 2026w canon, 2026x behavioral AI) each reuse.

spine_version: "0.2"
spine_doc_version: "0.1.0"
paper_key: "2026e"
provenance: retrofit
title: >-
  Spectral Metamerism in Brand Perception: Projection Bounds from
  High-Dimensional Geometry
target_venue_primary: "TBD (working paper; geometry-of-perception SBT line)"
status: >-
  Retrofit spine extracted 2026-06-14 from completed paper.md (Working Paper
  v1.5.0, March 2026, DOI 10.5281/zenodo.18945352). Descriptive, not generative.

thesis: |
  Scalar brand metrics compress an eight-dimensional perceptual signal into a
  single number, and the information cost of that compression is a geometric
  inevitability, not an implementation detail. Spectral metamerism — structurally
  distinct brand profiles that produce identical scalar evaluations — is the
  brand-perception analogue of metamerism in colour science: the projection from
  R^8_+ to R^1 (SBT's L1-to-L2 grade map) creates a 7-dimensional null space of
  invisible profile differences. Three independent lines of argument converge:
  (1) the Johnson-Lindenstrauss lower bound forces distortion exceeding 152% for
  10 brands and 198% for 50 under any 1D projection; (2) the rank-nullity theorem
  guarantees a 7-dimensional family of metameric profiles for every grade; and
  (3) an information-theoretic channel bound caps a 5-level grade at 2.32 bits of
  a ~20-bit profile, ~11.6% retention. Monte Carlo simulation confirms 31--39% of
  well-separated brand pairs collapse to metameric coincidence under a random 1D
  projection. The practical consequence is the distinction between rasterized
  brand management (a human operator lossily projecting the full specification
  through cognitive and communicative bottlenecks) and vectorized brand
  management (the full eight-dimensional spectral profile as single source of
  truth, with channel outputs computed as projections of known, bounded loss).

# ============================================================================
# Boundary conditions — when the paper's bounds apply
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      The source space is the eight typed SBT dimensions (Semiotic, Narrative,
      Ideological, Experiential, Social, Economic, Cultural, Temporal), so the
      brand emission profile is a vector s in R^8_+ and the grade map is a
      projection phi: R^8_+ -> R^1.
    observable: "Brand represented as an 8-dimensional spectral profile per SBT."
    excludes: "Brand models that are natively scalar with no underlying dimensional structure."
    body_sections: ["Preliminaries — SBT Framework and Notation"]
  - id: C2
    statement: >-
      The JL distortion bounds (Theorems 1-2) are worst-case guarantees over
      ARBITRARY point configurations; real brand profiles lie on a constrained
      lower-dimensional manifold within R^8_+, so practical sets may tolerate
      lower distortion than the worst case.
    observable: "Whether the brand set is structured (manifold-restricted) or arbitrary."
    excludes: "Reading the JL k_min figures as the literal dimensionality SBT requires."
    body_sections: ["Johnson-Lindenstrauss Bounds — Minimum Faithful Dimension (Remark on manifold restriction)"]

# ============================================================================
# Observations — the Monte Carlo simulation as a produced-data event
# ============================================================================
observations:
  - id: O1
    statement: >-
      A Monte Carlo simulation generates N = 50 random brand profiles in R^8_+
      (log-normal, mu = 0.5, sigma = 0.5), draws a uniformly random unit
      projection direction on S^7, projects all profiles to 1D, and counts
      metameric pairs across all 1225 pairwise comparisons in three independent
      seeded trials.
    raw_data_pointer: "R2_R3_computations.py (sbt-framework repo); paper Appendix A.3"
    instrument: "R2_R3_computations.py (shared with 2026f concentration-of-measure tests)"
    timestamp: "2026-03 (paper v1.5.0)"
    body_sections: ["Monte Carlo Verification — Simulation Design", "Appendix A.3"]

# ============================================================================
# Methods — how the bounds and the simulation are constructed
# ============================================================================
methods:
  - id: M1
    statement: >-
      Metameric-fraction estimation: classify a pair (s_i, s_j) as metameric
      when d_8D > 1.0 (substantial separation in 8D Euclidean on log-profiles)
      AND d_1D < 0.3 (near-indistinguishable after the random 1D projection);
      report the fraction of all C(50,2) = 1225 pairs that qualify, with a
      +/-20% threshold-sensitivity check.
    type: "monte_carlo_simulation"
    inputs: ["50 log-normal R^8_+ profiles", "uniform random unit direction on S^7"]
    outputs: ["metameric pair count + fraction per trial"]
    code_anchor: "R2_R3_computations.py"
    reproducibility:
      seed: "three independent random seeds (trials 1-3)"
      runtime_environment: "Python (sbt-framework repo)"
    body_sections: ["Monte Carlo Verification", "Appendix A.3"]
  - id: M2
    statement: >-
      JL distortion derivation: set the target dimension k = 1 in the
      Larsen-Nelson tight lower bound k = Omega(eps^-2 log N), rearrange to
      eps >= sqrt(C ln N), and evaluate with the conservative constant C = 1 to
      obtain eps >= sqrt(ln N) for competitive-set sizes N.
    type: "analytic_derivation"
    inputs: ["Larsen-Nelson (2017) lower bound", "Dasgupta-Gupta (2003) form for the converse"]
    outputs: ["distortion bounds (Table 4); minimum faithful dimension k_min (Tables 5-6)"]
    code_anchor: "paper Appendix A.1"
    body_sections: ["Johnson-Lindenstrauss Bounds — The JL Lemma, Application", "Appendix A.1"]
  - id: M3
    statement: >-
      Information-retention computation: a discrete L-level grade has channel
      capacity log_2 L; an 8-dimensional profile with B bits per dimension carries
      n*B bits; the retention ratio rho = log_2 L / (n*B), evaluated at L = 5,
      n = 8, B = 2.5 bits/dimension.
    type: "analytic_derivation"
    inputs: ["noiseless discrete-channel capacity (Cover & Thomas 2006)"]
    outputs: ["rho = 2.32/20 = 11.6% (Theorem 5)"]
    code_anchor: "paper §Information-Theoretic Bounds"
    body_sections: ["Information-Theoretic Bounds — Grade Information Capacity"]

# ============================================================================
# Measurements — the computed numbers the paper cites
# ============================================================================
measurements:
  - id: m_metameric_fraction
    statement: >-
      Across three independent trials the metameric fraction is 38.7% (474/1225),
      31.7% (388/1225), and 30.5% (374/1225) — stable at 31--39%.
    source_observations: [O1]
    generating_method: M1
    value: "31--39% (474 / 388 / 374 of 1225 pairs)"
    units: "fraction of pairwise comparisons"
    body_sections: ["Monte Carlo Verification — Results (Table 7)"]
  - id: m_jl_distortion
    statement: >-
      Required distortion eps_min = sqrt(ln N): 127% for N=5, 152% for N=10,
      198% for N=50, 215% for N=100, 249% for N=500.
    source_observations: []
    generating_method: M2
    value: "eps >= 1.27 / 1.52 / 1.98 / 2.15 / 2.49"
    units: "JL distortion parameter (fraction)"
    body_sections: ["Johnson-Lindenstrauss Bounds (Table 4)"]
  - id: m_info_retention
    statement: >-
      A 5-level grade captures 2.32 bits (log_2 5) of a ~20-bit profile (8 x 2.5
      bits), retaining 11.6%; the 7D null-space variance loss is 87.5% (1 - 1/8);
      finer output scales (e.g. [0,100]) raise retention to ~33.2% but the 7D
      null space persists.
    source_observations: []
    generating_method: M3
    value: "11.6% information retention; 87.5% variance lost; null-space dim 7"
    units: "bits / fraction / dimension count"
    body_sections: ["Information-Theoretic Bounds — Grade Information Capacity; Variance Retention"]

# ============================================================================
# Propositions — the formal theoretical claims
# ============================================================================
propositions:
  - id: P1
    statement: >-
      (Definition 1) Two brand profiles s_A, s_B in R^8_+ are metameric with
      respect to a projection phi when phi(s_A) = phi(s_B) while the Aitchison
      distance d_B(s_A, s_B) > 0; more generally (eps,delta)-metameric when the
      grades differ by less than eps and the profiles by more than delta. The
      analogy to colour-science metamerism is structural, not metaphorical.
    conditions: "C1"
    antecedents: []
    evidence:
      - type: definition
        anchor: "Spectral metamerism in brand perception, by analogy to the Fundamental Theorem of Colorimetry."
        citation_keys: [cohen-1982-metameric-color-stimuli, grassmann-1853-zur-theorie-der, wyszecki-1982-color-science-concepts, trigt-1990-smoothest-fit-solution-fundamental]
    body_sections: ["Metamerism in Brand Perception — Definition, The Color Science Parallel"]
  - id: P2
    statement: >-
      (Theorem 1) For any set of N brand profiles in R^8 and any linear
      projection f: R^8 -> R^1, the distortion eps required for (1 +/- eps)
      distance preservation satisfies eps >= sqrt(ln N): the single number is not
      merely imprecise but systematically misleading, capable of reversing
      orderings and collapsing distinct brands.
    conditions: "C1, C2"
    antecedents: [D1]
    evidence:
      - type: theorem
        anchor: "JL lower bound at k=1, conservative constant C=1."
        citation_keys: [larsen-2017-optimality-johnsonlindenstrauss-lemma, johnson-1984-extensions-lipschitz-mappings, dasgupta-2003-elementary-proof-theorem]
    falsifier: "If a linear R^8 -> R^1 map achieves (1 +/- eps) preservation for N=10 with eps < sqrt(ln 10), Theorem 1 fails."
    body_sections: ["Johnson-Lindenstrauss Bounds — Application to 8D-to-1D Projection (Table 4)"]
  - id: P3
    statement: >-
      (Theorem 2, Corollary 1) Faithful (1 +/- eps) preservation of N brands
      requires k >= 4 ln N / (eps^2/2 - eps^3/3) dimensions (e.g. >= 435 for N=50
      at eps=0.3); consequently no scalar grade scale (5-, 7-, 10-point,
      continuous) resolves the problem, because the null space stays 7-dimensional
      regardless of output granularity. Human working memory (~4 +/- 1 chunks)
      cannot perform the projection faithfully for more than a handful of brands.
    conditions: "C1, C2"
    antecedents: [P2, D2]
    evidence:
      - type: theorem
        anchor: "Dasgupta-Gupta minimum-dimension bound; rank-nullity invariance of the null space to output discretization."
        citation_keys: [dasgupta-2003-elementary-proof-theorem, cowan-2001-magical-number-4, miller-1956-magical-number-seven]
    body_sections: ["Johnson-Lindenstrauss Bounds — Minimum Faithful Dimension (Tables 5-6, Corollary 1)"]
  - id: P4
    statement: >-
      (Theorem 3) For any linear projection phi: R^8 -> R^1 the null space
      ker(phi) is a 7-dimensional subspace; for every profile s the set of
      metameric profiles is the intersection of the affine subspace s + ker(phi)
      with the positive orthant — a convex continuum of dimension at most 7, not a
      sparse set of edge cases. Metameric pairs of arbitrarily large profile
      separation but identical grade exist.
    conditions: "C1"
    antecedents: [D3]
    evidence:
      - type: theorem
        anchor: "Rank-nullity theorem; openness of the positive-orthant interior; constructive null-space perturbation."
    falsifier: "If ker(phi) for some R^8 -> R^1 projection has dimension other than 7, Theorem 3 fails."
    body_sections: ["Null Space Analysis — Dimension of the Null Space, Constructive Metameric Pairs"]
  - id: P5
    statement: >-
      (Proposition 1, null-space complementarity) In SBT the projection is
      observer-dependent: phi_w(s) = <w, clr(s)> for w in the simplex Delta^7.
      Distinct observers have distinct 7D null spaces; two distinct observers
      reduce the joint effective null space to 6D, m linearly independent
      observers to (8-m)D. Cohorts with similar Fisher-Rao-close weight profiles
      share nearly identical null spaces and therefore agree on which brands are
      equivalent — disagreement between cohorts is geometric, not noise.
    conditions: "C1"
    antecedents: [P4]
    evidence:
      - type: proposition
        anchor: "Generic hyperplane intersection in R^8 (7+7-8=6); simplex normalization forces non-proportional weights."
    falsifier: >-
      Proposition 1 is falsified if two observers with Fisher-Rao distance > delta
      produce identical metameric-pair classifications across >= 20 brand profiles.
    body_sections: ["Null Space Analysis — Observer-Dependent Null Spaces"]
  - id: P6
    statement: >-
      (Theorem 4) For n independent equal-variance dimensions projected to k, the
      maximum retained variance is k/n; for n=8, k=1 the optimal 1D projection
      captures at most 12.5%, leaving 87.5% in the 7 null-space dimensions.
      Correlated real profiles can exceed this worst-case (empirically PC1 = 54.9%
      on the five canonical brands), but PCA maximizes variance, not
      interpretability, and metameric collapse persists at the finer structure PC1
      ignores.
    conditions: "C1"
    antecedents: []
    evidence:
      - type: theorem
        anchor: "Equal-eigenvalue covariance; PCA top-k capture; empirical PCA on canonical case set."
        citation_keys: [aitchison-1986-statistical-analysis-compositional]
    body_sections: ["Information-Theoretic Bounds — Variance Retention"]
  - id: P7
    statement: >-
      (Theorem 5) A discrete L-level grade has channel capacity log_2 L bits; the
      8-dimensional profile carries n*B bits; the retention ratio is
      log_2 L/(n*B). For L=5, B=2.5 this is 2.32/20 = 11.6%, so ~88.4% of the
      brand's identity is invisible to the grade. The bound is independent of
      linearity (nonlinear phi cannot exceed log_2 L) and, under sequential
      (non-memoryless) evaluation, log_2 L is an upper bound — strengthening, not
      weakening, the deficit conclusion.
    conditions: "C1"
    antecedents: []
    evidence:
      - type: theorem
        anchor: "Noiseless discrete-channel capacity; per-dimension entropy sum."
        citation_keys: [cover-2006-elements-information-theory, shannon-1948-mathematical-theory-communication]
    body_sections: ["Information-Theoretic Bounds — Grade Information Capacity"]
  - id: P8
    statement: >-
      The rate-distortion function for an equal-eigenvalue Gaussian R^8 source
      under 1D representation incurs expected distortion 7*sigma^2 = 87.5% of total
      variance — Berger's reverse water-filling allocates all rate to the single
      largest-variance direction and ignores the other seven. Rate-distortion
      theory and the null-space analysis are two expressions of the same
      compression bound.
    conditions: "C1"
    antecedents: [P6]
    evidence:
      - type: theorem
        anchor: "Reverse water-filling on equal eigenvalues; log-normal/CLR reparameterization preserves the qualitative result."
        citation_keys: [berger-1971-rate-distortion-theory, shannon-1948-mathematical-theory-communication]
    body_sections: ["Information-Theoretic Bounds — Rate-Distortion Perspective"]
  - id: P9
    statement: >-
      Rasterized brand management — a human operator (and their own observer
      weight profile w) projecting the full specification into decks, briefs, and
      pyramids, with recipients reconstructing divergent null-space components —
      is provably and quantifiably lossy. Vectorized brand management retains the
      eight-dimensional spectral profile as single source of truth, computes
      channel outputs as subspace projections with documented null spaces, and
      recasts the brand manager as custodian of an auditable vector rather than
      keeper of a mental vision.
    conditions: "C1"
    antecedents: [P2, P4, P7, m_metameric_fraction]
    evidence:
      - type: synthesis
        anchor: "Practical consequence of the JL, null-space, and information bounds; vectorized audits as Aitchison-distance comparisons against a 7/36 null-model baseline."
    body_sections: ["From Rasterized to Vectorized Brand Management", "Connection to MDS and Survey Design"]

# ============================================================================
# Derivations — the formal proof chains underlying the propositions
# ============================================================================
derivations:
  - id: D1
    statement: >-
      Setting k=1 in the Larsen-Nelson bound 1 = Omega(eps^-2 log N) gives
      eps^2 = Omega(log N), hence eps = Omega(sqrt(log N)); with conservative
      constant C=1, eps >= sqrt(ln N) (e.g. sqrt(ln 10) ~ 1.52).
    supports: [P2]
    body_sections: ["Appendix A.1"]
  - id: D2
    statement: >-
      The null-space dimension n-k = 8-1 = 7 is invariant to the discretization
      of the 1D output; refining the scale raises available bits (log_2 5 -> log_2
      100) and retention (11.6% -> 33.2%) but the 7D kernel and hence metamerism
      persist.
    supports: [P3]
    body_sections: ["Johnson-Lindenstrauss Bounds — Corollary 1 proof"]
  - id: D3
    statement: >-
      For nonzero v in ker(phi) and s interior to R^8_+, small t makes s+tv stay
      in R^8_+ with phi(s+tv) = phi(s); choosing t > delta/||v|| yields a
      metameric pair separated by more than delta. Under the Aitchison metric the
      null set is a level set of u^T clr(s) = c, a curved 7-dimensional surface
      (implicit function theorem on the clr diffeomorphism).
    supports: [P4]
    body_sections: ["Null Space Analysis — Theorem 3 proof", "Appendix A.2"]

# ============================================================================
# Findings — what the simulation demonstrates
# ============================================================================
findings:
  - id: F1
    statement: >-
      Metamerism is not a rare pathology but a prevalent phenomenon: in a
      competitive set of 50 brands roughly one-third of all pairwise comparisons
      are metameric under any given scalar grade, and the FRACTION is stable at
      ~30--40% regardless of projection direction (the specific pairs depend on
      direction). When a tracking study reports two brands as "similar" there is
      ~one-in-three chance the similarity is a projection artifact.
    type: "simulation_confirmation"
    source_measurements: [m_metameric_fraction]
    generating_method: M1
    antecedents: [O1, P4]
    falsifier: >-
      If purpose-designed composites or non-uniform observer ensembles drive the
      metameric fraction far below ~30%, F1's prevalence claim weakens (the
      projection-independent null-space result P4 is unaffected).
    body_sections: ["Monte Carlo Verification — Results, Interpretation"]

# ============================================================================
# Robustness checks
# ============================================================================
robustness_checks:
  - id: RC1
    statement: >-
      The metameric fraction is robust to +/-20% variation in the d_8D > 1.0 /
      d_1D < 0.3 thresholds, and the qualitative "substantial fraction is
      metameric" conclusion holds for any generating distribution that spreads
      profiles over the ambient space (log-normal used; uniform and empirically
      calibrated are future-work alternatives).
    type: "sensitivity_analysis"
    sensitivity_of: [F1]
    body_sections: ["Monte Carlo Verification — Simulation Design, Results (Table 7 notes)", "Appendix A.3"]

# ============================================================================
# Alternative explanations — rivals the paper rules out
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      A compressed-sensing reader could object that sparse brand profiles are
      recoverable from a scalar grade, so the information loss is not fundamental.
    rules_out_required: [P3, P7]
    ruled_out_by: [P3]
    rules_out_status: "rejected"
    reasoning: >-
      No sparsity basis for brand profiles exists in Aitchison geometry; CS
      recovery needs Omega(k log(8/k)) measurements, not one; and the standard
      grade design does not exploit any sparsity, so the worst-case JL lower bound
      applies regardless.
    evidence:
      citation_keys: [cands-2006-nearoptimal-signal-recovery, donoho-2006-compressed-sensing, aitchison-1986-statistical-analysis-compositional]
    body_sections: ["Johnson-Lindenstrauss Bounds — Application (compressed-sensing objection)"]
  - id: A2
    statement: >-
      Nonlinear or modern manifold dimensionality reduction (Isomap, t-SNE, UMAP)
      could escape the bound by preserving local structure better than linear
      projection.
    rules_out_required: [P7]
    ruled_out_by: [P7]
    rules_out_status: "rejected"
    reasoning: >-
      These methods optimize for visualization, not faithful distance
      preservation; embedding distances are not proportional to Aitchison
      distances and the lost null-space dimensions are not recovered for
      analytical use. Nonlinear phi still cannot exceed the log_2 L channel bound.
    evidence:
      citation_keys: [tenenbaum-2000-global-geometric-framework, maloney-1986-evaluation-linear-models, bourgain-1985-lipschitz-embedding-finite]
    body_sections: ["Discussion and Limitations — Relationship to Factor Analysis and PCA, Beyond Linear Projections"]

# ============================================================================
# Limitations — honest scope
# ============================================================================
limitations:
  - id: L1
    statement: >-
      The case-study profiles (Hermes, IKEA, Patagonia, Erewhon, Tesla) are
      illustrative, derived from qualitative assessment rather than empirical
      measurement; the 31--39% metameric-fraction prediction is not yet tested on
      real brand data. Empirical validation requires 8-dimensional survey
      instruments, paired scalar-grade instruments, and direct metameric-frequency
      measurement.
    severity: "empirical-gap"
    affects: [F1, P9]
    body_sections: ["Discussion and Limitations — Empirical Validation"]
  - id: L2
    statement: >-
      The JL minimum-dimension figures (e.g. k_min >= 435 for N=50) are worst-case
      over arbitrary point configurations and should NOT be read as the
      dimensionality SBT requires; real brand profiles are manifold-constrained,
      so practical distortion is lower. The analysis treats phi as a fixed
      function; the full observer-dependent metamerism on the warped-product
      manifold is left to future work.
    severity: "scope-bounding"
    affects: [P2, P3, P5]
    body_sections: ["Johnson-Lindenstrauss Bounds — Minimum Faithful Dimension (Remark)", "Discussion — Observer-Dependent Metamerism"]
  - id: L3
    statement: >-
      The rate-distortion result (P8) adopts a Gaussian source for tractability;
      a fully correct treatment needs log-normal or truncated-Gaussian sources
      respecting R^8_+ positivity. The Theorem-5 channel bound assumes a
      memoryless channel; sequential evaluation violates this (the bound then
      becomes an upper bound, which only strengthens the conclusion).
    severity: "assumption-bounding"
    affects: [P7, P8]
    body_sections: ["Information-Theoretic Bounds — Rate-Distortion (distributional note), Memoryless-channel caveat"]

# ============================================================================
# Negative findings — what the paper notes is absent in prior work
# ============================================================================
negative_findings:
  - id: NF1
    statement: >-
      No published work has previously established formal distortion bounds for
      scalar brand grades or quantified the metameric fraction in competitive
      brand sets; MDS practice (Bijmolt & Wedel; Wedel & Kamakura) and composite
      brand-equity metrics (Aaker; Keller) use low-dimensional projection as the
      workhorse but never formally bound the information loss it incurs.
    expected_observation: "A prior formal information-loss bound for scalar brand grades / perceptual maps."
    source_method: M2
    affects_nodes: [P2, P7, P9]
    motivates: [P9]
    evidence:
      citation_keys: [bijmolt-1999-comparison-multidimensional-scaling, wedel-2000-market-segmentation-conceptual, wedel-2016-marketing-analytics-datarich, aaker-1991-managing-brand-equity, keller-1993-conceptualizing-measuring-managing]
    body_sections: ["Connection to MDS and Survey Design", "Conclusion"]

