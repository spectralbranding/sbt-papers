  - paper_key: 2026d
    relationship: extends
    spine_nodes: [P4, P6, P9]
    note: >-
      Takes the Aitchison / Fisher-Rao / warped-product metrics from Brand Space
      Geometry as given and studies what happens when those equipped spaces are
      projected to lower dimensions; uses its 7/36 null-model baseline for
      vectorized audits.
  - paper_key: 2026f
    relationship: extends
    spine_nodes: [P5, F1, RC1]
