results:
  - claim_id: "D1"
    status: supported
    notes: >
      Definition 1 is established with both the exact and (epsilon, delta) forms. The color
      science analogy (Table comparing color science to brand perception domains) is presented.
      Constructive example with Hermes profile demonstrates metameric pair construction in Section 3.3.

  - claim_id: "T1"
    status: supported
    notes: >
      Full derivation presented in Section 4.2. Distortion table for N=5,10,50,100,500 computed
      using epsilon >= sqrt(ln N). The plain-English interpretation (252% maximum misrepresentation
      for N=10) is explicitly stated.

  - claim_id: "T2"
    status: supported
    notes: >
      Minimum faithful dimension table presented for epsilon=0.3 and epsilon=0.1. The human
      working-memory connection (Miller, 1956) is drawn. The JL result is shown to be a
      worst-case bound, not a practical target for well-structured brand data.

  - claim_id: "T3"
    status: supported
    notes: >
      Full proof presented in Section 5.1. Constructive example: Hermes + delta perturbation
      produces metameric pair at Aitchison distance sqrt(2) approx 1.41 under equal-weight
      projection. Explicit CLR perturbation vector provided.

  - claim_id: "P1"
    status: supported
    notes: >
      Null-space complementarity proposition proved in Section 5.3. Strategic interpretation
      (diversity of observer perspectives is geometrically necessary) developed. The (8-m)D
      formula for m independent observers stated and argued.

  - claim_id: "T4"
    status: supported
    notes: >
      PCA variance retention bound proved in Section 6.1. Rate-distortion convergence
      (87.5% distortion for 1D representation of 8D Gaussian source) derived via reverse
      water-filling in Section 6.3.

  - claim_id: "T5"
    status: supported
    notes: >
      Information retention calculation presented in Section 6.2. Corollary 1 (7D null
      space persists regardless of output scale) proved. Finer output scale comparison
      (L=100 gives 33.2% retention) presented.

  - claim_id: "MC1"
    status: supported
    notes: >
      Three Monte Carlo trials reported: 38.7%, 31.7%, 30.5% metameric pairs. Simulation
      design (log-normal profiles, random projection vector, thresholds d_{8D}>1.0 and
      d_{1D}<0.3) described. Code referenced as R2_R3_computations.py.

limitations:
  - description: >
      The JL bounds and null-space analysis assume linear projections. Real brand evaluation
      may involve nonlinear aggregation (e.g., identity-gate minimum score). Nonlinear
      projections from R^8 to R^1 cannot exceed the channel capacity bound of log_2(L) bits
      (T5 is linear-independent), but the JL distortion bounds may differ for specific
      nonlinear functions.
    severity: moderate
    addressable: true

  - description: >
      The Monte Carlo simulation uses randomly generated log-normal brand profiles, not
      profiles from an empirical brand survey. If real brand profiles concentrate on a
      lower-dimensional manifold within R^8_+ (due to structural constraints from market
      forces), the empirical metamerism rate may differ from 31-39%. The qualitative
      conclusion (metamerism is prevalent) is likely robust, but the specific fraction
      is a worst-case estimate.
    severity: moderate
    addressable: true

  - description: >
      The B=2.5 bits per dimension assumption in T5 is stated as conservative. Empirical
      calibration using signal detection theory for 10-point rating scales would improve
      the precision of the information retention estimate. The 11.6% figure should be
      treated as an order-of-magnitude bound, not a precise measurement.
    severity: minor
    addressable: true

  - description: >
      The paper treats the projection phi as a fixed observer-independent function.
      Observer-dependent metamerism (Section 10.6) — where different observer cohorts have
      different null spaces — is analyzed in Proposition 1 only at the level of two-observer
      null-space intersection. The full analysis for the warped product manifold metric from
      R1 is deferred to future work.
    severity: minor
    addressable: true

  - description: >
      The vectorized brand management framework is presented as the normative alternative to
      rasterized management. However, the practical transition costs (tooling for 8D profile
      elicitation, training for brand managers, organizational change management) are not
      analyzed. The mathematical case for vectorization is strong; the implementation path
      requires further development.
    severity: minor
    addressable: true

