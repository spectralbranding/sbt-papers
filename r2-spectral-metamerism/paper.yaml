# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026e): R2 — Spectral Metamerism (Johnson-Lindenstrauss projections)
spec_version: "0.1.0"

meta:
  title: "Spectral Metamerism in Brand Perception: Projection Bounds from High-Dimensional Geometry"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.18945352"
  date: "2026-01-01"
  version: "1.0"
  venue: "Working Paper (Zenodo)"
  license: "CC-BY-4.0"
  keywords:
    - spectral metamerism
    - Johnson-Lindenstrauss lemma
    - dimensionality reduction
    - brand perception
    - null space
    - information loss
    - Spectral Brand Theory
    - rasterized brand management
    - vectorized brand management
    - scalar grades

claims:
  - id: "D1"
    type: definition
    statement: >
      Two brand profiles s_A, s_B in R^8_+ are metameric with respect to a projection
      phi: R^8_+ -> R if phi(s_A) = phi(s_B) and d_B(s_A, s_B) > 0 (i.e., same grade,
      distinct spectral profiles). More generally, two brands are (epsilon, delta)-metameric
      if |phi(s_A) - phi(s_B)| < epsilon and d_B(s_A, s_B) > delta. The analogy to color
      science is structural: in both cases, a high-dimensional physical stimulus is projected
      through a lower-dimensional sensor array, and the projection's null space creates
      equivalence classes of physically distinct stimuli that produce identical responses.
    formal: >
      metameric(s_A, s_B, phi) := phi(s_A) = phi(s_B) AND d_B(s_A, s_B) > 0
      (epsilon, delta)-metameric: |phi(s_A) - phi(s_B)| < epsilon AND d_B(s_A, s_B) > delta
      Cohen (1982) Fundamental Metamerism: S = S* + B_metameric where S* in row-space(phi),
      B_metameric in ker(phi). For R^8 -> R^1: dim(ker(phi)) = 8 - 1 = 7.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "T1"
    type: theorem
    statement: >
      For any set of N brand profiles in R^8 and any linear projection f: R^8 -> R^1, the
      distortion parameter epsilon required for (1 +/- epsilon) distance preservation satisfies
      epsilon >= sqrt(ln N). Specifically: for N=5, epsilon >= 1.27 (127% distortion);
      for N=10, epsilon >= 1.52 (152%); for N=50, epsilon >= 1.98 (198%); for N=100,
      epsilon >= 2.15 (215%). Scalar grades are geometrically unfaithful representations
      of 8-dimensional brand profiles.
    formal: >
      Johnson-Lindenstrauss (1984) lower bound (Larsen-Nelson, 2017 tight form):
      For k-dimensional target and n points: epsilon >= sqrt(C * ln(n) / k).
      Setting k=1, C=1 (conservative): epsilon >= sqrt(ln N).
      N=10: sqrt(ln 10) = sqrt(2.303) approx 1.52.
      N=50: sqrt(ln 50) = sqrt(3.912) approx 1.98.
      Interpretation: distortion epsilon = 1.52 means 1D grade can represent two brands
      as 252% of their true distance or as 0% (same point). Grade similarity is not
      geometric similarity.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["D1"]

  - id: "T2"
    type: theorem
    statement: >
      To preserve pairwise Euclidean distances among N brands within factor (1 +/- epsilon),
      the projection dimension must satisfy k >= 4 * ln(N) / (epsilon^2/2 - epsilon^3/3).
      For epsilon = 0.3 (30% distortion tolerance): N=10 requires k >= 256; N=50 requires
      k >= 435; N=100 requires k >= 512. Human working memory capacity (~7 +/- 2 chunks)
      makes faithful brand identity representation impossible for competitive sets larger
      than a handful of brands.
    formal: >
      Dasgupta-Gupta (2003) bound: k >= 4*ln(N) / (epsilon^2/2 - epsilon^3/3).
      For epsilon=0.3, N=10: k >= 4*ln(10)/(0.045 - 0.009) = 4*2.303/0.036 approx 256.
      Miller (1956): human working memory = 7 +/- 2 chunks approx k_human in {5,...,9}.
      Therefore: for any N > exp(k_human^2 * 0.036 / 4) approx exp(0.56) approx 1.7 brands,
      the human brand manager cannot faithfully preserve pairwise distances in working memory.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["T1"]

  - id: "T3"
    type: theorem
    statement: >
      For any linear projection phi: R^8 -> R^1, the null space ker(phi) is a 7-dimensional
      linear subspace of R^8. For any brand profile s in R^8_+, the set of metameric profiles
      M_s = {s' in R^8_+: phi(s') = phi(s)} is the intersection of a 7-dimensional affine
      subspace with the positive orthant — a convex set of dimension at most 7. For any
      delta > 0, there exist metameric pairs (s_A, s_B) with ||s_A - s_B|| > delta and
      |phi(s_A) - phi(s_B)| = 0.
    formal: >
      Rank-nullity theorem: dim(ker(phi)) = 8 - rank(phi) = 8 - 1 = 7 for any nonzero phi.
      Preimage phi^{-1}(phi(s)) = s + ker(phi): a 7D affine subspace of R^8.
      Intersection with R^8_+ (convex cone): convex set of dimension at most 7.
      For any delta > 0: let v in ker(phi), ||v||=1. For small t: s + tv in R^8_+ (by openness
      of interior). phi(s + tv) = phi(s) + t*phi(v) = phi(s). Pair (s, s+tv) is metameric
      with ||s - (s+tv)|| = t. Choose t > delta. QED.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["D1"]

  - id: "P1"
    type: proposition
    statement: >
      For two distinct observers w_A, w_B in Delta^7_circ with w_A != w_B, the intersection
      ker(phi_{w_A}) intersect ker(phi_{w_B}) has dimension 6 (generically). Two distinct
      observers reduce the effective null space from 7D to 6D; m independent observers reduce
      it to (8-m)D. Eight independent observers eliminate the null space entirely, recovering
      the full 8D structure from 8 scalar evaluations.
    formal: >
      Each ker(phi_w) is a hyperplane in R^8 (dimension 7). Two distinct hyperplanes in R^8
      generically intersect in a subspace of dimension 7 + 7 - 8 = 6.
      General case: m hyperplanes in R^8 with linearly independent normal vectors have
      intersection of dimension 8 - m.
      Consequence: perceptual diversity across m >= 8 independent observers is geometrically
      necessary for faithful brand representation — not merely desirable but required by
      the rank-nullity theorem.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["T3"]

  - id: "T4"
    type: theorem
    statement: >
      Variance retention bound: For n independent, identically-distributed dimensions projected
      to k dimensions, the maximum fraction of variance retained is k/n. For n=8, k=1:
      at most 12.5% of variance is retained. The optimal 1D projection (first principal
      component) captures exactly 1/8 of total variance under equal-variance assumption.
      The remaining 87.5% is distributed across the 7 null-space dimensions.
    formal: >
      For Sigma = sigma^2 * I_8 (equal variance, independent dimensions): eigenvalues all equal.
      PCA captures top k eigenvalues: fraction = k*sigma^2 / (8*sigma^2) = k/8.
      For k=1: 1/8 = 12.5%.
      Rate-distortion convergence: for Gaussian source in R^8 with equal eigenvalues,
      1D representation incurs distortion D = 7*sigma^2 = 87.5% of total variance (reverse
      water-filling assigns all rate to largest eigenvalue direction).
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["T3"]

  - id: "T5"
    type: theorem
    statement: >
      Information-theoretic bound on scalar grade capacity: a discrete grade scale with L
      levels has channel capacity C = log_2(L) bits. An 8-dimensional profile with B bits
      of resolution per dimension has total information content I = 8*B bits. For SBT's
      5-point grade (L=5) and B=2.5 bits per dimension: information retention ratio
      rho = log_2(5) / (8*2.5) = 2.32 / 20 = 11.6%. The 5-point grade compresses a
      ~1,000,000-state profile space into 5 bins.
    formal: >
      C_grade = log_2(L) bits (channel capacity of uniform L-symbol output).
      I_profile = n * B bits (total information content of n-dimensional profile).
      rho = C_grade / I_profile = log_2(L) / (n * B).
      For L=5, n=8, B=2.5: rho = 2.32 / 20 = 11.6%.
      Finer scale (L=100): rho = log_2(100) / 20 = 6.64/20 = 33.2%; 7D null space persists.
      Corollary 1: the 7D null space exists for any phi: R^8 -> R^1 regardless of output
      scale granularity. A continuous grade scale does not resolve the geometric problem.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["T3"]

  - id: "MC1"
    type: proposition
    statement: >
      Monte Carlo verification: in a competitive set of 50 randomly generated brand profiles,
      31-39% of all pairwise comparisons are metameric under a random 1D projection (defined
      as: 8D Aitchison distance > 1.0 but 1D Euclidean distance < 0.3). This confirms that
      metamerism is not a rare pathological case but a prevalent geometric phenomenon affecting
      approximately one-third of all competitive brand comparisons.
    formal: >
      Simulation: N=50 log-normal profiles in R^8_+, random unit projection vector u in R^8.
      All C(50,2) = 1225 pairwise distances computed in 8D (Euclidean on log-profiles) and 1D.
      Metameric pair: d_{8D} > 1.0 AND d_{1D} < 0.3.
      Three independent trials: 474/1225 = 38.7%, 388/1225 = 31.7%, 374/1225 = 30.5%.
      Code: R2_R3_computations.py (see companion paper Zharnikov, 2026f).
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["T3"]

methodology:
  type: mixed
  design: >
    Three independent lines of argument establishing that spectral metamerism is a geometric
    inevitability, not a correctable measurement artifact: (1) Johnson-Lindenstrauss projection
    bounds — deriving explicit distortion lower bounds for R^8 -> R^1 projection; (2) null-space
    analysis — proving the 7-dimensional null space structure via rank-nullity theorem and
    constructing explicit metameric pairs from the case-study brand data; (3) information-theoretic
    bounds — deriving channel capacity limits for discrete grade scales. The rasterized-vs-vectorized
    brand management framework is developed as the practical implication. Color science metamerism
    (Cohen, 1982) is formalized as the structural analogy. Monte Carlo simulation is conducted
    to verify theoretical predictions on randomly generated brand profiles. The companion code
    (R2_R3_computations.py) implements the simulation.
  analysis:
    method: >
      Analytical proof (JL lemma application, rank-nullity theorem, information theory);
      constructive example (explicit metameric pairs from CLR perturbations of case-study profiles);
      Monte Carlo simulation (N=50 profiles, 3 independent trials, random projection);
      connections to MDS dimensionality selection and survey instrument design
    software: "Python (numpy) for Monte Carlo simulation. Code: R2_R3_computations.py"

acceptance:
  - claim_id: "T1"
    criterion: >
      The JL lower bound derivation is verified against the Larsen-Nelson (2017) paper.
      The specific epsilon values for N=5,10,50,100,500 are recomputed independently
      using the formula epsilon >= sqrt(ln N) (setting C=1 as conservative constant)
      and confirmed to match the table in Section 4.2.
    falsification: >
      The Larsen-Nelson (2017) lower bound is shown not to apply in the R^8 -> R^1 setting
      (e.g., because the target dimension k=1 violates the proof assumptions), or the
      constant C in the tight lower bound exceeds 1 and produces materially different
      epsilon values that weaken the practical claim.

  - claim_id: "T3"
    criterion: >
      The rank-nullity theorem application is verified: for any nonzero linear phi: R^8 -> R^1,
      rank(phi) = 1 and dim(ker(phi)) = 7. The constructive metameric pair is verified:
      for Hermes profile with equal-weight projection phi(s) = (1/8)*sum(s), the perturbation
      delta = (0.5, 0.5, -0.5, -0.5, 0.5, -0.5, 0.5, -0.5) (sum = 0) lies in ker(phi);
      Aitchison distance between original and perturbed CLR profiles = ||delta||_2 = sqrt(2) approx 1.41.
    falsification: >
      The rank-nullity analysis is incorrect for nonlinear projection functions phi
      (e.g., threshold-based grade assignment). Note: the claim is stated for linear phi;
      the paper acknowledges nonlinear phi has >= as much information loss (Section 10.1).

  - claim_id: "T5"
    criterion: >
      The information retention calculation is reproduced: log_2(5) = 2.322 bits; 8 dimensions
      x 2.5 bits/dimension = 20 bits; ratio = 2.322/20 = 11.6%. The B=2.5 bits/dimension
      assumption (approximately 6 reliably distinguishable levels on [1,10]) is verified by
      comparison with signal detection theory (d' analysis for 10-point scales in
      psychophysics literature).
    falsification: >
      B per dimension substantially exceeds 2.5 bits (e.g., B=4 bits, corresponding to 16
      distinguishable levels), which would raise information retention to 23.2% — still low
      but less extreme. The paper's conservative B=2.5 assumption should be treated as a
      lower bound rather than a point estimate.

  - claim_id: "MC1"
    criterion: >
      The Monte Carlo simulation is reproduced by running R2_R3_computations.py with three
      different random seeds. The fraction of metameric pairs across trials should fall in
      [25%, 45%] to confirm the paper's finding of 31-39%. If the fraction falls consistently
      outside this range, the specific thresholds (d_{8D} > 1.0, d_{1D} < 0.3) may require
      adjustment.
    falsification: >
      Replication consistently produces < 10% metameric pairs, indicating that the
      31-39% finding is highly sensitive to the threshold choice and does not reflect a
      robust property of the metric structure.

