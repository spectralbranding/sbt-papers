spec_version: 0.1.0
meta:
  title: 'Spectral Metamerism in Brand Perception: Projection Bounds from High-Dimensional Geometry'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.18945352
  date: '2026-03-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - spectral metamerism
  - Johnson-Lindenstrauss lemma
  - dimensionality reduction
  - brand perception
  - null space
  - information loss
  - Spectral Brand Theory
  abstract: 'Scalar brand metrics compress high-dimensional perceptual signals into single numbers, yet
    the information cost of this compression has never been formally quantified. This paper introduces
    *spectral metamerism* to brand theory: structurally distinct brand profiles that produce identical
    scalar evaluations. Drawing on Spectral Brand Theory (SBT), which models brands across eight typed
    dimensions perceived by heterogeneous observers, the paper proves metamerism is a geometric inevitability
    of dimensionality reduction. Applying the Johnson-Lindenstrauss lemma, it establishes that projecting
    $\mathbb{R}^8$ to $\mathbb{R}^1$ requires distortion exceeding 152% for 10 brands and 198% for 50
    brands. Any such projection creates a 7-dimensional null space of "invisible" brand differences. Information-theoretically,
    a 5-point grade captures 2.32 bits of a $\sim 20$-bit spectral profile, retaining 11.6% of available
    information. Monte Carlo simulations confirm that 31--39% of brand pairs are metameric under random
    projection. The analysis yields a fundamental distinction between *rasterized* brand management --
    human projection through cognitive and communicative bottlenecks -- and *vectorized* brand management,
    in which the full spectral profile serves as single source of truth and channel outputs are computed
    projections with known, bounded loss. These results provide the first formal geometric and information-theoretic
    lower bounds on the fidelity of scalar brand grades.'
claims:
- id: P1
  type: proposition
  statement: (Definition 1) Two brand profiles s_A, s_B in R^8_+ are metameric with respect to a projection
    phi when phi(s_A) = phi(s_B) while the Aitchison distance d_B(s_A, s_B) > 0; more generally (eps,delta)-metameric
    when the grades differ by less than eps and the profiles by more than delta. The analogy to colour-science
    metamerism is structural, not metaphorical.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: '(Theorem 1) For any set of N brand profiles in R^8 and any linear projection f: R^8 -> R^1,
    the distortion eps required for (1 +/- eps) distance preservation satisfies eps >= sqrt(ln N): the
    single number is not merely imprecise but systematically misleading, capable of reversing orderings
    and collapsing distinct brands.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P3
  type: proposition
  statement: (Theorem 2, Corollary 1) Faithful (1 +/- eps) preservation of N brands requires k >= 4 ln
    N / (eps^2/2 - eps^3/3) dimensions (e.g. >= 435 for N=50 at eps=0.3); consequently no scalar grade
    scale (5-, 7-, 10-point, continuous) resolves the problem, because the null space stays 7-dimensional
    regardless of output granularity. Human working memory (~4 +/- 1 chunks) cannot perform the projection
    faithfully for more than a handful of brands.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
- id: P4
  type: proposition
  statement: '(Theorem 3) For any linear projection phi: R^8 -> R^1 the null space ker(phi) is a 7-dimensional
    subspace; for every profile s the set of metameric profiles is the intersection of the affine subspace
    s + ker(phi) with the positive orthant — a convex continuum of dimension at most 7, not a sparse set
    of edge cases. Metameric pairs of arbitrarily large profile separation but identical grade exist.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P5
  type: proposition
  statement: '(Proposition 1, null-space complementarity) In SBT the projection is observer-dependent:
    phi_w(s) = <w, clr(s)> for w in the simplex Delta^7. Distinct observers have distinct 7D null spaces;
    two distinct observers reduce the joint effective null space to 6D, m linearly independent observers
    to (8-m)D. Cohorts with similar Fisher-Rao-close weight profiles share nearly identical null spaces
    and therefore agree on which brands are equivalent — disagreement between cohorts is geometric, not
    noise.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P4
- id: P6
  type: proposition
  statement: (Theorem 4) For n independent equal-variance dimensions projected to k, the maximum retained
    variance is k/n; for n=8, k=1 the optimal 1D projection captures at most 12.5%, leaving 87.5% in the
    7 null-space dimensions. Correlated real profiles can exceed this worst-case (empirically PC1 = 54.9%
    on the five canonical brands), but PCA maximizes variance, not interpretability, and metameric collapse
    persists at the finer structure PC1 ignores.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P7
  type: proposition
  statement: (Theorem 5) A discrete L-level grade has channel capacity log_2 L bits; the 8-dimensional
    profile carries n*B bits; the retention ratio is log_2 L/(n*B). For L=5, B=2.5 this is 2.32/20 = 11.6%,
    so ~88.4% of the brand's identity is invisible to the grade. The bound is independent of linearity
    (nonlinear phi cannot exceed log_2 L) and, under sequential (non-memoryless) evaluation, log_2 L is
    an upper bound — strengthening, not weakening, the deficit conclusion.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P8
  type: proposition
  statement: The rate-distortion function for an equal-eigenvalue Gaussian R^8 source under 1D representation
    incurs expected distortion 7*sigma^2 = 87.5% of total variance — Berger's reverse water-filling allocates
    all rate to the single largest-variance direction and ignores the other seven. Rate-distortion theory
    and the null-space analysis are two expressions of the same compression bound.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P6
- id: P9
  type: proposition
  statement: Rasterized brand management — a human operator (and their own observer weight profile w)
    projecting the full specification into decks, briefs, and pyramids, with recipients reconstructing
    divergent null-space components — is provably and quantifiably lossy. Vectorized brand management
    retains the eight-dimensional spectral profile as single source of truth, computes channel outputs
    as subspace projections with documented null spaces, and recasts the brand manager as custodian of
    an auditable vector rather than keeper of a mental vision.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
  - P4
  - P7
methodology:
  type: mixed
  design: 'Metameric-fraction estimation: classify a pair (s_i, s_j) as metameric when d_8D > 1.0 (substantial
    separation in 8D Euclidean on log-profiles) AND d_1D < 0.3 (near-indistinguishable after the random
    1D projection); report the fraction of all C(50,2) = 1225 pairs that qualify, with a +/-20% threshold-sensitivity
    check. JL distortion derivation: set the target dimension k = 1 in the Larsen-Nelson tight lower bound
    k = Omega(eps^-2 log N), rearrange to eps >= sqrt(C ln N), and evaluate with the conservative constant
    C = 1 to obtain eps >= sqrt(ln N) for competitive-set sizes N. Information-retention computation:
    a discrete L-level grade has channel capacity log_2 L; an 8-dimensional profile with B bits per dimension
    carries n*B bits; the retention ratio rho = log_2 L / (n*B), evaluated at L = 5, n = 8, B = 2.5 bits/dimension.'
  analysis:
    software: R2_R3_computations.py
    method: Python (sbt-framework repo)
