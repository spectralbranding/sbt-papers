  available: false
  url: ""
  notes: >
    No empirical brand data collected. Case-study brand profiles (Hermes, IKEA, Patagonia,
    Erewhon, Tesla) are the canonical profiles from Zharnikov (2026a): Hermes [9.5,9.0,7.0,
    9.0,8.5,3.0,9.0,9.5], IKEA [8.0,7.5,6.0,7.0,5.0,9.0,7.5,6.0], Patagonia [6.0,9.0,
    9.5,7.5,8.0,5.0,7.0,6.5], Erewhon [7.0,6.5,5.0,9.0,8.5,3.5,7.5,2.5], Tesla [7.5,8.5,
    3.0,6.0,7.0,6.0,4.0,2.0]. Monte Carlo simulation uses randomly generated profiles,
    not empirical survey data. Empirical validation would require survey instruments
    measuring brand perception on all 8 SBT dimensions across a competitive brand set.

