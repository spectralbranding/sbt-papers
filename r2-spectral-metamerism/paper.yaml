results:
- claim_id: P4
  status: supported
  notes: 'Metamerism is not a rare pathology but a prevalent phenomenon: in a competitive set of 50 brands
    roughly one-third of all pairwise comparisons are metameric under any given scalar grade, and the
    FRACTION is stable at ~30--40% regardless of projection direction (the specific pairs depend on direction).
    When a tracking study reports two brands as "similar" there is ~one-in-three chance the similarity
    is a projection artifact.'
limitations:
- description: The case-study profiles (Hermes, IKEA, Patagonia, Erewhon, Tesla) are illustrative, derived
    from qualitative assessment rather than empirical measurement; the 31--39% metameric-fraction prediction
    is not yet tested on real brand data. Empirical validation requires 8-dimensional survey instruments,
    paired scalar-grade instruments, and direct metameric-frequency measurement.
  severity: moderate
  addressable: true
- description: The JL minimum-dimension figures (e.g. k_min >= 435 for N=50) are worst-case over arbitrary
    point configurations and should NOT be read as the dimensionality SBT requires; real brand profiles
    are manifold-constrained, so practical distortion is lower. The analysis treats phi as a fixed function;
    the full observer-dependent metamerism on the warped-product manifold is left to future work.
  severity: moderate
  addressable: true
- description: The rate-distortion result (P8) adopts a Gaussian source for tractability; a fully correct
    treatment needs log-normal or truncated-Gaussian sources respecting R^8_+ positivity. The Theorem-5
    channel bound assumes a memoryless channel; sequential evaluation violates this (the bound then becomes
    an upper bound, which only strengthens the conclusion).
  severity: moderate
  addressable: true
