limitations:
- description: DCI is a new metric not yet validated against human perceptual data; the null finding is
    robust to this (a null is a null) but the compression/ bandwidth interpretation depends on DCI's construct
    validity.
  severity: moderate
  addressable: true
- description: With 20 tests and FDR correction the study has limited brand-level power; the Lexus effect
    (p = .004, d = .52) would be significant per-comparison, so P3 (asymmetry) cannot be evaluated and
    remains insufficient-evidence.
  severity: moderate
  addressable: true
- description: All models are general-purpose LLMs; domain-specific fine-tuned models may carry higher
    bandwidth for organizational context. The portfolio condition uses in-context disclosure, not pre-training-only
    awareness, and the two may differ. Native-language conclusions rest on a single model per tradition,
    so tradition-level effects cannot be separated from model- specific idiosyncrasy.
  severity: moderate
  addressable: true
