meta:
  title: 'Spectral Immunity: Why Brand Portfolio Interference Disappears for AI Observers'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19765401
  date: '2026-04-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - spectral immunity
  - brand portfolio
  - awareness gate
  - portfolio interference
  - large language models
  - TOST equivalence
  - cross-cultural AI
  - Spectral Brand Theory
  abstract: 'Brand portfolio theory predicts perceptual interference when observers recognize shared corporate
    ownership, requiring only an open awareness gate. Large language models (LLMs), whose training data
    permanently saturate this gate, provide a critical test. This paper formalizes spectral interference
    across eight perceptual dimensions and tests three propositions in a fully crossed experiment with
    13 LLMs from seven training traditions, 40 brands, seven portfolio archetypes, and four prompt modalities
    (N = 9,925). Using the Dimensional Concentration Index and two-one-sided equivalence tests, the results
    reveal near-zero portfolio-induced change (mean $|\Delta\text{DCI}|$ = .26; equivalence holds for
    18/20 brands). Variance decomposition attributes .1% of perceptual concentration to portfolio framing
    versus 37.4% to brand identity. The sole exception occurs in multi-turn conversation for a reverse-aspiration
    structure (Geely Auto, d = -1.11), where extended context converts coordination information into output
    inferences. These results resolve the awareness-gate paradox: awareness is necessary but insufficient.
    A bandwidth constraint rooted in rate-distortion theory and rational inattention is also required.
    General-purpose LLMs are rationally inattentive to organizational-coordination signals because these
    contribute negligibly to output-fidelity reconstruction. As AI mediation of brand interactions grows,
    portfolio architecture becomes strategically invisible to the general-purpose LLM class tested here.'
claims:
- id: P0
  type: proposition
  statement: 'The awareness-gate paradox: standard portfolio theory predicts interference scales with
    awareness, so LLMs (permanently saturated gate) should show maximal interference; but if LLM brand
    encodings are already compressed to near-minimum-distortion representations, added portfolio context
    provides no information the encoding can absorb, predicting complete immunity. These competing predictions
    are testable.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P1
  type: proposition
  statement: '(Proposition 1 — Interference conditionality) Spectral interference between brands B_i and
    B_j within a portfolio operates iff three conditions hold simultaneously: (a) the brands share at
    least one observer cohort, (b) the awareness gate exceeds a minimum threshold, and (c) the brands''
    emission profiles differ on at least one dimension weighted above a salience threshold by the shared
    cohort. Absence of any one condition suppresses interference entirely.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
- id: P2
  type: proposition
  statement: (Proposition 2 — Awareness-gate sufficiency inversion) The awareness gate is necessary but
    not sufficient for spectral interference. When an observer's brand encoding operates near minimum-distortion
    compression, maximal awareness (alpha ≈ 1) does not produce interference because the portfolio context
    provides no additional information the compressed encoding can absorb; a perception channel with adequate
    bandwidth to encode portfolio context is also required.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
  - P1
- id: P3
  type: proposition
  statement: '(Proposition 3 — Interference asymmetry) Spectral interference is asymmetric: the perturbation
    of a higher-coherence brand by a lower- coherence sibling exceeds the reverse perturbation, proportional
    to the difference in perception cloud dispersion between the two brands.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P4
  type: proposition
  statement: '(Bandwidth constraint as generalized rational inattention) The bandwidth constraint generalizes
    rational inattention from discrete-choice settings to continuous perceptual encodings: the unit of
    capacity allocation is the perceptual dimension, not the brand alternative, and AI observers are architecturally
    (rate-distortion) and behaviorally (rational-inattention) inattentive to organizational-coordination
    signals because their expected return for output reconstruction is near zero.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
- id: P5
  type: proposition
  statement: (Output-coordination / WHAT-DO distinction) Output specification (WHAT layer — emission profile,
    quality gates, category positioning) and coordination specification (DO layer — ownership, portfolio
    membership, parent-brand relations) are separable. Portfolio framing is a pure DO- layer signal; compressed
    AI encoders retain the WHAT layer and discard the DO layer. AI brand profiles are therefore WHAT-layer
    valid (Type-I instruments) but DO-layer invalid (not Type-II instruments).
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
  - P4
methodology:
  type: empirical
  design: 'Formalize spectral interference: brand emission profile e_B(t) in R^8_+, observer spectral
    profile w_j in the 7-simplex, perception cloud Pi_{C_k}(B,t) as the cohort distribution of brand convictions,
    and per- dimension interference I_d = alpha * w_d * (e_d^{B_j} - mu_d) aggregated into total interference
    magnitude (Eqs. 1-4). Four portfolio archetypes (spectral cluster / contradiction / spread / layer)
    follow from spectral proximity x cohort overlap. Quantify portfolio-induced change per brand as ΔDCI
    (portfolio minus solo), with paired t-tests, Cohen''s d, and TOST equivalence tests (Lakens 2017;
    Lakens, Scheel & Isager 2018) at ±1.0 DCI bounds; Benjamini-Hochberg FDR correction across all 20
    brand-level tests; and a variance decomposition attributing DCI variance to brand / portfolio / model
    / condition factors. Power analysis for the equivalence design: with N = 65 per cell, TOST power for
    ±1.0 DCI bounds at alpha = .05 exceeds .80 for population effects up to |d| = .30, so the study can
    detect substantively meaningful non-equivalence while classifying smaller effects as equivalent.'
  analysis:
    software: paper Theoretical Framework
    method: Python 3.12 + uv; published at sbt-papers/r21-spectral-immunity/code/
