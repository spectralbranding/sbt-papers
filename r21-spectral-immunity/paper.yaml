claims:
  - id: P1
    type: proposition
    statement: >
      Spectral interference between brands in a portfolio operates if and only if
      three conditions hold simultaneously: shared observer cohorts, awareness gate
      above threshold, and dimensional differences on weighted dimensions.
    status: conditions_met_interference_absent
    evidence:
      - "All three conditions hold for LLM observers, yet interference is near zero"
      - "Does not falsify P1 -- falsifies sufficiency assumption"

  - id: P2
    type: proposition
    statement: >
      The awareness gate is necessary but not sufficient for spectral interference.
      When an observer's brand encoding operates near minimum-distortion compression,
      maximal awareness does not produce interference because the portfolio context
      provides no additional information that the compressed encoding can absorb.
    status: supported
    evidence:
      - "9,925 observations, 40 brands, 13 models, 7 traditions"
      - "Mean |delta DCI| = .26, TOST equivalent for 18/20 brands"
      - "0/20 FDR-significant portfolio effects"

  - id: P3
    type: proposition
    statement: >
      Spectral interference is asymmetric: the perturbation of a higher-coherence
      brand by a lower-coherence sibling exceeds the reverse perturbation.
    status: insufficient_evidence
    evidence:
      - "Lexus d = +.52 vs Toyota d = -.30 -- directionally consistent"
      - "Neither survives FDR correction"
      - "Dedicated aspiration-focused design needed"

  - id: H5
    type: hypothesis
    statement: >
      Across all portfolios and prompt modalities, the magnitude of portfolio-induced
      perception change is equivalent to zero within meaningful bounds.
    status: supported
    evidence:
      - "TOST equivalence confirmed for 18/20 brands within +/-1.0 DCI"
      - "Cosine similarity > .999 for all brands"

