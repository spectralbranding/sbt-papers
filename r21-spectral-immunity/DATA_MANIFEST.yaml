# DATA_MANIFEST.yaml -- R21: Spectral Immunity
# Links to data sources used in this paper

datasets:
  - name: "R20 Portfolio AI Perception Dataset"
    location: "https://huggingface.co/datasets/spectralbranding/r20-portfolio-ai-perception"
    doi: "10.57967/hf/8380"
    records: 9925
    description: >
      Combined dataset from main experiment (7,975 observations, 20 brands,
      13 models, 7 training traditions, 4 prompt modalities) and published-brand
      extension (1,950 observations, 20 additional brands, zero overlap).
    used_in:
      - "Tables 3-7"
      - "All hypothesis tests (H1-H9)"
      - "Variance decomposition (Table 4)"
      - "Cross-cultural analysis (Table 5)"

code:
  - name: "R20 experiment scripts"
    location: "https://github.com/spectralbranding/sbt-papers/r20-portfolio-ai"
    description: "Original experiment code for data collection and analysis"

  - name: "SBT Framework"
    location: "https://github.com/spectralbranding/sbt-framework"
    description: "Open-source toolkit implementing the SBT computational pipeline"
