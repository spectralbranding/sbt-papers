  severity: moderate
  addressable: true
- description: The mean-cosine metric is scale-invariant and blind to magnitude; this is now COMPLEMENTED
    by the distribution-level energy/MMD metric (M7), which recovers the magnitude separation. Both are
    reported; neither is silently swapped for the other.
  severity: moderate
  addressable: true
- description: n=36 artifacts/window is marginal for source-floor stability; the calibration + learning
