    stability.
  severity: moderate
  addressable: true
- description: V6 (public-signal criterion association, GDELT) was available but not run; the criterion
    claim is left open.
  severity: moderate
  addressable: true
- description: The distribution-level resolution (F6) is EXPLORATORY — the metric was chosen after the
    confirmatory null — so it must be confirmed on a new case before it is treated as established (P8).
  severity: moderate
  addressable: true
- description: The distributional test is low-powered (5-8 sources/cohort), so the suggestive-but-unresolved
