methodology:
  type: empirical
  design: 'The instrument is a fixed pipeline acquire->render->extract->aggregate-> sensitivity; each
    cohort yields an 8-dim spec vector; pairwise cohort distance = 1 - cosine similarity. Two noise floors
    are computed by the instrument: operator floor = max distance from primary over cross-family alt-pairs;
    artifact floor = max distance from primary over leave-one-out artifact subsets. Per-pair signal-to-noise
    = cohort distance / max(endpoint operator floors); resolved (>2) / marginal (1-2) / sub-resolution
    (<1).'
