meta:
  title: 'The Brand Spectrometer: A Reproducible Instrument for Cohort-Resolved, Multi-Dimensional Brand-Perception
    Measurement from Public Artifacts'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.20775963
  date: '2026-06-01'
  venue: Behavior Research Methods
  license: CC-BY-4.0
  keywords:
  - brand perception
  - measurement instrument
  - metameric psychometrics
  - reproducibility
  - reliability
  - structural validity
  - large language models
  - noise floor
  abstract: 'This paper introduces metameric psychometrics, a validation framework for instruments that
    operate without a latent true score. In place of an oracle it substitutes instrument-computed noise
    floors — operator variance across cross-family model pairs and source sensitivity under signal-source
    resampling — so every cohort comparison becomes a falsifiable signal-to-noise test with a computed
    interval. The framework is realized in the Brand Spectrometer, an open pipeline that reconstructs
    cohort-resolved, eight-dimensional perception vectors from dated public artifacts by aggregating per-artifact
    reflections over signal sources; the unit of analysis is the cohort pair. Because cohort metameric
    variance is the measurement, not error around a true specification, the instrument is validated for
    measurement properties, never criterion accuracy. A pre-registered battery across two windows shows
    convergent validity, reproducibility, and four-of-five test-retest reliability. Discriminant resolution
    depends on the metric: a scale-invariant mean-cosine signal-to-noise abstains, whereas a distribution-level,
    operator-floored separation between whole cohort clouds resolves the owner cohort from the press in
    one window (signal-to-noise 3.6, permutation p = .003, triangulated) while abstaining elsewhere. The
    cohort signal lives in magnitude, not mean shape; the instrument resolves real separations and abstains
    where none clears. The framework may extend to perceptual constructs measured from public text without
    ground truth.'
