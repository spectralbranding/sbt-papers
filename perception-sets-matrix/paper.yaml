meta:
  title: 'Perception Sets the Matrix: Spectral Match as the Generative Layer of Stochastic Brand-Choice
    Propensities'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.21319716
  date: '2026-07-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand-choice propensity
  - NBD-Dirichlet
  - switching matrix
  - spectral match
  - self-congruity
  - processing fluency
  - preregistration
  - LLM observers
  abstract: 'The stochastic brand-choice tradition — Markov switching models and the NBD-Dirichlet — earns
    its descriptive success by taking brand-choice propensities as exogenous givens: the models locate
    the equilibrium the propensities imply and are silent on what sets them. This paper supplies and tests
    the missing generative layer. At cohort level, spectral match — a similarity statistic between an
    observer cohort''s eight-dimensional perception profile and a brand''s profile — is proposed as a
    monotone predictor of the cohort''s stated choice propensity within its category consideration set.
    A propensity vector induces the zero-order Dirichlet switching matrix in closed form. The perceptual
    layer therefore sets the matrix the tradition starts from: the double-jeopardy diagonal is inherited,
    the intermediate-propensity band becomes model-derived, and perceptually metameric brand pairs must
    receive statistically indistinguishable propensity vectors — a prediction no utility-based or congruity-based
    account makes. In a pre-registered LLM-cohort campaign under strict instrument separation with four
    kill conditions, the link held experimentally (τ_b = .323, p < .001; a random-profile placebo destroys
    it), replicated in quick-service coffee, failed in athletic footwear, and showed no common-method
    inflation (Δτ = −.002); metameric brand pairs violated propensity equality, bounding the perceptual
    layer''s sufficiency exactly where real brand profiles converge.'
claims:
- id: P1
  type: proposition
  statement: (The match-propensity link) At cohort level, stated choice propensity p(c,b) within a category
    consideration set is monotone increasing in spectral match m(c,b) between the cohort's observer spectral
    profile and the brand's profile.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: '(The induced-matrix bridge) A cohort-weighted propensity vector over a consideration set
    determines, under the zero-order Dirichlet parameterization, the closed-form purchase-level switching
    matrix P = (I + S*1s^T)/(S+1) — hence equilibrium shares and the double-jeopardy diagonal. Combined
    with P1, the perceptual layer determines the switching structure the stochastic tradition treats as
    exogenous: perception sets the matrix.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: (The derived intermediate band) Under the monotone link, the intermediate-propensity band
    is the image of intermediate spectral match, and its population mass is a function of cohort-profile
    dispersion in the category — the practitioner "movable middle" becomes a model-derived prediction
    target rather than an imported probability cut.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P4
  type: proposition
  statement: (Metameric-equality corollary) Brand pairs whose eight-dimensional profiles are perceptually
    indistinguishable to a cohort (metameric pairs) must exhibit statistically indistinguishable stated
    propensity vectors for that cohort, whatever their signal-level differences.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P5
  type: proposition
  statement: '(Fluency auxiliary) If the monotone link is carried by processing fluency — brand stimuli
    congruent with the cohort''s activated schema are processed more fluently and evaluated more favorably
    — then congruence on the dimensions salient to the cohort should carry more of the link than congruence
    on non-salient dimensions: spectral match computed with the cohort''s per-dimension salience weights
    predicts stated propensity at least as strongly as unweighted match (pre-registered auxiliary comparison
    delta_tau_w = tau_b(weighted) - tau_b(unweighted) >= 0 among floor-passing operators).'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
methodology:
  type: empirical
  design: 'Study 1 (causal core): synthetic within-category brand stimuli whose eight-dimensional profiles
    are manipulated over a design grid; cohort persona specifications span the profile space by maximin
    Latin hypercube; match is set experimentally. Stimulus validity gated on reading-recovery of target
    profiles within tolerance before the propensity arm runs. Study 2 (replication): two real product
    categories x five brands; brand profiles measured in-study by reading operators; propensities elicited
    from disjoint eliciting operators; observational replication and boundary check of the Study-1 experimental
    link. Instrument separation protocol: perception readings and propensity elicitations from disjoint
    operator instances sharing only the cohort persona specification; a same-call contrast arm quantifies
    common-method inflation as delta-tau = tau(same-call) - tau(separated). Frozen primary analysis: Kendall
    tau_b over cohort x brand cells, permutation null (within-cohort brand-label shuffle), median pooling
    across floor-passing operators; frozen robustness list (cosine match, salience weights, Spearman,
    leave-one-brand-out, leave-one-operator-out, brand fixed effects, familiarity/salience controls, random-profile
    falsification).'
  analysis:
    software: PREREG_STUDY_DESIGN.md (frozen pre-registration, published with the paper's repository)
acceptance:
- claim_id: P1
  criterion: Holds if (The match-propensity link) At cohort level, stated choice propensity p(c,b) within
    a category consideration set is monotone increasing in spectral match m(c,b) between the cohort's
    observer spectral profile and the brand's profile.
  falsification: Falsified if the pre-registered monotone association is absent (pooled tau_b < .20 or
    permutation p >= .05) in both study categories among floor-passing operators; or if the association's
    sign flips between floor-passing operator families.
- claim_id: P2
  criterion: Holds if (The induced-matrix bridge) A cohort-weighted propensity vector over a consideration
    set determines, under the zero-order Dirichlet parameterization, the closed-form purchase-level switching
    matrix P = (I + S*1s^T)/(S+1) — hence equilibrium shares and the double-jeopardy diagonal.
  falsification: Falsified as a bridge if induced matrices from measured propensity vectors systematically
    fail the double-jeopardy diagonal ordering that the direct switching probes exhibit in the same data.
- claim_id: P3
  criterion: Holds if (The derived intermediate band) Under the monotone link, the intermediate-propensity
    band is the image of intermediate spectral match, and its population mass is a function of cohort-profile
    dispersion in the category — the practitioner "movable middle" becomes a model-derived prediction
    target rather than an imported probability cut.
  falsification: Weakened if intermediate-band mass fails to track cohort-profile dispersion across the
    study categories (pre-registered secondary analysis).
- claim_id: P4
  criterion: Holds if (Metameric-equality corollary) Brand pairs whose eight-dimensional profiles are
    perceptually indistinguishable to a cohort (metameric pairs) must exhibit statistically indistinguishable
    stated propensity vectors for that cohort, whatever their signal-level differences.
  falsification: Falsified if metameric pairs (profile distance below the operator floor) show propensity
    differences exceeding the elicitation floor among floor-passing operators — this would show the perceptual
    layer is not sufficient for the propensity input, bounding P1.
- claim_id: P5
  criterion: 'Holds if (Fluency auxiliary) If the monotone link is carried by processing fluency — brand
    stimuli congruent with the cohort''s activated schema are processed more fluently and evaluated more
    favorably — then congruence on the dimensions salient to the cohort should carry more of the link
    than congruence on non-salient dimensions: spectral match computed with the cohort''s per-dimension
    salience weights predicts stated propensity at least as strongly as unweighted match (pre-registered
    auxiliary comparison delta_tau_w = tau_b(weighted) - tau_b(unweighted) >= 0 among floor-passing operators).'
  falsification: The fluency account is unsupported (P1 itself unaffected) if salience-weighted match
    systematically underperforms unweighted match across floor-passing operators (pooled delta_tau_w <
    0 with permutation p < .05) in both studies.
