    persona_text: 'A cohort of specialty coffee roasters (Study 1, synthetic brands)
      buyers. This cohort pays little attention to logos, packaging, or visual style;
      enjoys a good origin story but does not require one; prefers responsible brands
      when the choice is otherwise equal; appreciates a well-made product experience
      when it is offered. It is mildly aware of what a brand choice says about them;
      weighs price against quality like most careful shoppers; keeps an eye on what
      is culturally current without chasing it; prefers the new - novelty and the
      latest thing over any tradition. When choosing in this category, the aspects
      that carry the most weight for this cohort, in order, are: ideological, then
      semiotic, then temporal.'
