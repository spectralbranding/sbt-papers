limitations:
- description: The coherence-type classifications in the case studies are author-assigned qualitative
    assessments, not empirical measurements; the predictions cannot be rigorously tested until validated
    measurement instruments for the eight dimensions exist.
  severity: moderate
  addressable: true
- description: Dimensions are treated as conditionally independent given the drift field (a first-order
    approximation); real cross-dimensional coupling can raise absorption probabilities, especially for
    identity-coherent brands.
  severity: moderate
  addressable: true
- description: The model holds the drift field constant before and after a crisis, excluding crisis-response
    strategy (which would endogenize the post-crisis drift field).
  severity: moderate
  addressable: true
- description: The dimension-volatility ordering (Definition 3) is proposed on theoretical grounds and
    not empirically validated; its specific quantitative relationships remain to be established.
  severity: moderate
  addressable: true
- description: A fully rigorous proof of the absorption-probability ordering (the convexity of the hitting
    probability at the boundary alpha=0) is deferred to a forthcoming technical companion note; Appendix
    A records only the structural argument plus a planned 10,000-path numerical verification.
  severity: moderate
  addressable: true
