results:
- claim_id: P8
  status: supported
  notes: 'Four documented crises instantiate the predicted ordering: J&J/Tylenol (1982, ecosystem) recovered
    fully within ~2 years with post-crisis share above pre-crisis; BP Deepwater Horizon (2010, experiential
    asymmetry) shows incomplete recovery a decade on after a crisis on its unprotected Ideological dimension;
    VW Dieselgate (2015, signal) recovered sales in ~3 years while Ideological reputation stayed damaged
    and was reconstructed via an EV pivot; Tesla Cybertruck window (2019, incoherent, LOW severity) recovered
    within weeks — consistent with Result 4 (type gap small at low eta).'
