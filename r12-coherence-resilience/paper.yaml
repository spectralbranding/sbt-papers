  title: "Coherence Type as Crisis Predictor: A Formal Derivation from Non-Ergodic Dynamics"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
