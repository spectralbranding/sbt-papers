methodology:
  type: mixed
  design: 'Monte Carlo simulation of the Stratonovich SDE on S^7_+: 2,000 paths per cell, fixed seed 1729,
    horizon T = 60 months, working parameters gamma = 0.020, delta = 0.050, sigma_0 = 0.080, dt = 0.25
    months; a crisis is applied as an instantaneous per-dimension drop and the trajectory is classified
    as recovered or absorbed. Scale-function / comparison-theorem analysis of the one-dimensional Wright-Fisher
    diffusion: stochastic monotonicity of the hitting probability in the drift parameter alpha (Ikeda
    & Watanabe 1989, Theorem VI.1.1), plus a convexity claim (diminishing marginal value of drift) that
    enables the Jensen-inequality step comparing isotropic to anisotropic drift fields.'
  analysis:
    software: code/coherence_resilience_mc.py
    method: 'Python 3.12 + uv; run: uv run python code/coherence_resilience_mc.py'
