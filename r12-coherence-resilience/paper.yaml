results:
  - claim_id: "T1"
    status: not_tested
    notes: >
      Formally derived via union bound and Jensen's inequality. Proof sketch provided.
      Not empirically tested. Assumption of conditional dimensional independence noted
      as an approximation; cross-dimensional coupling would increase absorption
      probabilities beyond the model's predictions.

  - claim_id: "C1"
    status: not_tested
    notes: >
      Derived from volatility ordering of SBT dimensions (Definition 3). Ordering is
      proposed on theoretical grounds (heritage changes slowly, product experience
      fluctuates rapidly) and consistent with Urde et al. (2007) and Brakus et al.
      (2009), but not empirically validated.

  - claim_id: "P1"
    status: not_tested
    notes: >
      Derived from T1 and C1. Formally establishes that SBT's qualitative coherence
      grading (A+ > A- > B+ > B- > C-) is a mathematical consequence of drift geometry,
      not an ad hoc ranking. Not empirically tested against crisis recovery data.

  - claim_id: "T2"
    status: not_tested
    notes: >
      Illustrated through four case studies. J&J Tylenol (ecosystem, full recovery
      consistent with prediction), BP Deepwater Horizon (experiential asymmetry,
      incomplete recovery consistent), VW Dieselgate (signal coherent, moderate
      recovery consistent), Tesla Cybertruck (incoherent, but low-severity crisis
      — consistent with T3 Result 4 that type gap is small at low severity). All
      classifications are qualitative; empirical test requires measured emission profiles.

  - claim_id: "P2"
    status: not_tested
    notes: >
      Formally derived from recovery time scaling in Zharnikov (2026j) Proposition 6.
      Ordering is consistent with Dawar & Pillutla (2000) and Roehm & Brady (2007)
      finding that multi-dimensional equity brands recover faster. No direct test.

  - claim_id: "T3"
    status: not_tested
    notes: >
      Central theorem of the paper. Three falsifiable predictions specified (Section 7).
      Illustrated through four case studies. Aaker, Fournier & Brasel (2004) apparent
      contradiction resolved: their finding that sincere (identity-coherent) brands are
      punished more harshly for transgressions is consistent with T2(c) — crises on
      protected dimensions involve larger effective shocks because the brand has set
      higher expectations, not because identity coherence reduces protection per se.

limitations:
  - description: >
      Coherence-type classifications for all four case studies are author-assigned
      qualitative assessments, not empirical measurements. Until validated measurement
      instruments for the 8 SBT dimensions are available, the framework's predictions
      cannot be rigorously tested against the specified falsification criteria.
    severity: major
    addressable: true

  - description: >
      The drift-isotropy model assumes conditional independence of dimensional dynamics
      given the drift field. In practice, dimensions interact: a crisis on the
      Ideological dimension may cascade to the Narrative dimension. The model is a
      first-order approximation; cross-dimensional coupling would increase absorption
      probabilities for all coherence types and may alter the ordering for correlated
      dimensions.
    severity: major
    addressable: true

  - description: >
      The model holds the drift field constant before and after the crisis, isolating
      the structural effect of pre-crisis coherence type from the strategic effect of
      post-crisis response. In practice, crisis response modifies the drift field.
      A well-managed response increases signal-driven drift on the affected dimension.
      The model predicts a lower bound on resilience; actual outcomes depend on both
      structural coherence and response quality.
    severity: moderate
    addressable: true

  - description: >
      The dimension-volatility ordering (Definition 3) is proposed on theoretical
      grounds and has not been empirically validated. The specific ranking
      (nu_Tem < nu_Sem < ... < nu_Exp) is plausible but the quantitative relationships
      between volatility levels are unspecified and untested.
    severity: moderate
    addressable: true

