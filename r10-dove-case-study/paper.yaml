meta:
  title: 'Dimensional Activation and Cohort Divergence: A Longitudinal Decomposition of Purpose Advertising
    Effectiveness'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19139258
  date: '2026-06-01'
  venue: advertising / marketing (JAR-adjacent; purpose-advertising)
  license: CC-BY-4.0
  keywords:
  - brand purpose
  - purpose advertising
  - brand activism
  - observer cohorts
  - portfolio interference
  - counter-cultural decay
  - multi-dimensional perception
  - spectral brand theory
  abstract: 'Purpose campaigns are evaluated by aggregate metrics that cannot distinguish structural success
    from surface popularity. This paper presents what is, to the author''s knowledge, the first formal
    application of the SBT eight-dimension decomposition to a longitudinal purpose-campaign case study:
    Dove''s "Campaign for Real Beauty" (2004--2026) across four temporal cross-sections. Four observer
    cohorts -- Purpose-Aligned, Product-Pragmatist, Social-Signal Reader, and Skeptic-Critic -- receive
    identical signals but form structurally different brand convictions. Within the case set considered
    here, disproportionate commercial impact is traced to *dimensional creation*: the activation of a
    previously null dimension that opens new perceptual territory rather than competing within existing
    space. Five propositions address dimensional creation, observer heterogeneity, portfolio interference,
    counter-cultural decay, and dimensional specificity. Independent quantitative evidence from a large-scale
    AI-observer study replicates the cohort-divergence and Patagonia-as-exception patterns, providing
    an empirical anchor across a controllable observer population. The framework extends brand-equity,
    authenticity, and cultural-branding literatures by supplying a formal, cohort-contingent account of
    simultaneous positive and negative conviction formation.'
claims:
- id: P0
  type: proposition
  statement: 'Three Dove phenomena are unexplained by single-construct brand frameworks (Aaker brand equity/personality,
    Keller equity-as-stock, Kapferer identity prism): observer heterogeneity in purpose perception, portfolio-level
    spectral interference, and temporal counter-cultural decay. Sender-focused, aggregate-construct models
    cannot represent structurally different perceptions of the same brand at the same moment.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P1
  type: proposition
  statement: (Proposition 1 — Dimensional Creation) Purpose campaigns produce disproportionate commercial
    impact when they activate a previously null dimension, creating new perceptual signal space rather
    than competing within existing dimensional territory. Activating a null dimension requires observers
    to form a new conviction, not overwrite an existing one — a state change distinct from repositioning.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
- id: P2
  type: proposition
  statement: (Proposition 2 — Observer Heterogeneity) Identical brand signals produce structurally different
    perception clouds in different observer cohorts, with the divergence structure predictable from the
    interaction between emission profiles and cohort spectral weight vectors. Purpose-Aligned and Skeptic-Critic
    cohorts share near-identical Narrative/Ideological weights but assign opposite conviction valence
    to the same signal (the mirror-cohort structure).
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
- id: P3
  type: proposition
  statement: (Proposition 3 — Portfolio Spectral Interference) When brands within a corporate portfolio
    emit contradictory signals on the same dimension, the resulting spectral interference generates a
    coherence penalty proportional to contradiction magnitude, the observer's dimensional weight, and
    the observer's awareness of the corporate relationship. The penalty is zero for unaware observers
    and maximal for high-Ideological-weight Skeptic-Critics.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
- id: P4
  type: proposition
  statement: (Proposition 4 — Counter-Cultural Decay) The perceptual intensity of counter-cultural brand
    signals decays as a function of their adoption by competitors and cultural institutions, following
    an inverted-U trajectory on the Cultural dimension. A counter-cultural signal that achieves cultural
    victory ceases to be counter-cultural — a structural property, not a campaign failure.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
- id: P5
  type: proposition
  statement: (Proposition 5 — Dimensional Specificity Over Intensity) Brand revenue growth correlates
    with new-dimension activation events rather than with total campaign investment, because new-dimension
    activation creates perceptual territory that does not compete with existing convictions.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
  - P1
methodology:
  type: mixed
  design: 'Spectral case analysis: a five-step interpretive procedure applying the SBT eight-dimension
    framework to a focal brand — (1) signal decomposition across eight dimensions at four time points,
    (2) cohort identification from perception studies, (3) perception-cloud reconstruction (emission ->
    conviction per cohort), (4) coherence audit (five-type taxonomy), and (5) financial mapping of activation
    events to revenue. Interpretive, not econometric: emission intensities are qualitative assessments,
    not survey instrumentation. Supplementary competitive-interference experiment: 5 focal brands paired
    with direct, adjacent, and distant competitors; 240 API calls (gpt-4o-mini, temperature .7; 16 reps
    per condition); 40 one-way ANOVAs, Bonferroni-corrected alpha = .00125. Reproducible via the companion
    script competitive_interference_250.py (fixed protocol, public mirror).'
  analysis:
    software: r10-dove-case-study/code/competitive_interference_250.py
    method: Python 3.12 + uv (openai, scipy, numpy)
acceptance:
- claim_id: P1
  criterion: Holds if (Proposition 1 — Dimensional Creation) Purpose campaigns produce disproportionate
    commercial impact when they activate a previously null dimension, creating new perceptual signal space
    rather than competing within existing dimensional territory.
  falsification: Falsified if null-activation campaigns produce equivalent-or-lower revenue growth than
    intensity-amplification campaigns (p > .05, d < .20) in the same category, controlling for spend and
    baseline growth.
- claim_id: P2
  criterion: Holds if (Proposition 2 — Observer Heterogeneity) Identical brand signals produce structurally
    different perception clouds in different observer cohorts, with the divergence structure predictable
    from the interaction between emission profiles and cohort spectral weight vectors.
  falsification: Falsified if PA and SC cohorts converge in conviction valence on identical signals (cohort
    variance indistinguishable from within-cohort variance), or if divergence is not predictable from
    independently-estimated weight vectors.
- claim_id: P3
  criterion: Holds if (Proposition 3 — Portfolio Spectral Interference) When brands within a corporate
    portfolio emit contradictory signals on the same dimension, the resulting spectral interference generates
    a coherence penalty proportional to contradiction magnitude, the observer's dimensional weight, and
    the observer's awareness of the corporate relationship.
  falsification: Falsified if the coherence penalty for observers aware of shared Dove/Axe parentage is
    indistinguishable from unaware observers after controlling for prior Ideological weight.
- claim_id: P4
  criterion: Holds if (Proposition 4 — Counter-Cultural Decay) The perceptual intensity of counter-cultural
    brand signals decays as a function of their adoption by competitors and cultural institutions, following
    an inverted-U trajectory on the Cultural dimension.
  falsification: Falsified if Cultural dimension intensity does not decline as competitor adoption of
    body-positive messaging rises — no inverted-U across multiple purpose campaigns tracked against a
    competitor-adoption index.
- claim_id: P5
  criterion: Holds if (Proposition 5 — Dimensional Specificity Over Intensity) Brand revenue growth correlates
    with new-dimension activation events rather than with total campaign investment, because new-dimension
    activation creates perceptual territory that does not compete with existing convictions.
  falsification: Falsified if revenue growth correlates more strongly with total campaign spend than with
    new-dimension activation events, controlling for category baseline growth.
