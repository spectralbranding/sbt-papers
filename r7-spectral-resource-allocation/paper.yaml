meta:
  title: 'Spectral Resource Allocation: Demand-Driven Investment in Multi-Dimensional Brand Space'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19009268
  date: '2026-03-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand resource allocation
  - spectral perception
  - alignment gap
  - founder bias
  - multi-dimensional optimization
  - cohort targeting
  abstract: Brand managers allocate resources across perceptual dimensions — design, storytelling, pricing,
    heritage — yet rarely ground those decisions in measured customer salience weights. This paper develops
    a resource allocation model in which a brand's signal portfolio $s \in \mathbb{R}^8_+$ is evaluated
    by observer cohorts whose weight vectors $w(c) \in \Delta^7$ reside on the probability simplex, and
    perceived value is $\langle w(c), s \rangle$ net of a separable convex cost. Five results follow.
    First, optimal investment is proportional to cohort weight divided by marginal cost, generalizing
    Dorfman-Steiner [-@dorfman-1954-optimal-advertising-optimal] to multi-dimensional perceptual space
    (Theorem 1). Second, the economic loss from optimizing under founder rather than cohort weights —
    the alignment gap — is bounded below by the Fisher-Rao distance between weight vectors (Theorem 2).
    Third, a single portfolio efficiently serves multiple cohorts only when their weights lie inside a
    Fisher-Rao ball of radius $r < \pi/4$ (Theorem 3). Fourth, the cost-minimizing portfolio achieving
    a target perception is unique when all dimensions are active (Theorem 4). Fifth, cohort-specific interaction
    terms shift investment toward complementary dimensions, generalizing Naik and Raman [-@naik-2003-understanding-impact-synergy]
    (Theorem 5). The framework supplies a diagnostic (alignment audit) and a prescriptive tool (dimension-specific
    budget ratios), providing the optimization layer missing from current brand-tracking systems.
claims:
- id: P0
  type: proposition
  statement: 'No existing brand-theory framework connects multi-dimensional brand perception measurement
    to operational resource allocation: CBBE / identity / marketing-response traditions diagnose what
    a brand stands for but supply no prescriptive optimization layer, because they lack a formal metric
    space in which the distance between brand position and customer preference is a computable quantity.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P1
  type: proposition
  statement: '(Theorem 1) The signal portfolio maximizing V(s,c) − lambda·C(s) under quadratic costs is
    s_i*(c) = w_i(c) / (lambda·alpha_i): invest in dimension i proportionally to cohort weight and inversely
    to marginal cost. For general convex costs the optimum satisfies w_i(c) = lambda·c_i''(s_i*) on each
    active dimension. This generalizes the Dorfman–Steiner (1954) scalar condition to eight perceptual
    dimensions.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P0
- id: P2
  type: proposition
  statement: '(Corollary 1) For two active dimensions the optimal signal-strength ratio depends only on
    the weight ratio and the inverse cost ratio: s_i*/s_j* = (w_i(c)/w_j(c))·(alpha_j/alpha_i). This makes
    the allocation decision operational at the budget-review level.'
  testable: false
  tested_in_paper: true
  status: not_tested
