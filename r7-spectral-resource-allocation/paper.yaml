  statement: (Proposition 1, concentration premium) Under uniform costs the optimal value is V*(c) = H(c)/(lambda·alpha-bar)
    where H(c) = sum_i w_i(c)^2 is the Herfindahl index; concentrated cohorts (high H) achieve strictly
    higher optimal value than diffuse ones, formalizing "a narrow audience you can delight beats a broad
    one you can only satisfy."
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
