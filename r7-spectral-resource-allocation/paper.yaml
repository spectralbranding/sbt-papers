  type: proposition
  statement: Each of five established strategy frameworks — Blue Ocean (Kim & Mauborgne 2005), Jobs-to-Be-Done
    (Christensen et al. 2016), Lean Startup (Ries 2011), Porter's Five Forces (1980), Resource-Based View
    (Barney 1991) — is an implicit low-dimensional projection of the spectral resource-allocation problem;
    the structural reason each fails to yield the allocation theorem is the absence of a metric on brand-perception
    space, which the Aitchison and Fisher–Rao metrics supply.
