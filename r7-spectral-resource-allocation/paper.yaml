  type: proposition
  statement: The linear value function excludes dimensional interactions empirically attested by multiattribute-utility
    and scanner-data work (Lancaster 1966; McAlister 1982; Chintagunta 1993). A cohort-dependent quadratic
    value function V_Q(s,c) = sum_i w_i s_i + sum_{i<j} w_ij(c) s_i s_j captures complementary (w_ij >
    0, e.g. heritage premium narrative×temporal) and substitutive (w_ij < 0, e.g. luxury-paradox ideological×temporal)
    pairs, with interaction weights measurable per cohort rather than fixed media properties.
  testable: false
  tested_in_paper: true
  status: not_tested
