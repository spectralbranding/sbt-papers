results:
  - claim_id: "T1"
    status: supported
    notes: >
      Lagrangian derivation: FOC w_i(c) = lambda*alpha_i*s_i gives s*_i = w_i(c)/(lambda*alpha_i).
      Second-order condition satisfied by strict convexity of c_i. Non-negativity
      automatic from w_i >= 0. Interpretively: invest proportionally to cohort weight
      and inversely to production cost.

  - claim_id: "C1"
    status: supported
    notes: >
      Direct ratio of T1 solutions: s*_i/s*_j = [w_i(c)/alpha_i] / [w_j(c)/alpha_j].
      Operationally: a cohort weighting experiential 2.5x more than economic but
      with 3x cost disadvantage should receive nearly equal investment.

  - claim_id: "P1"
    status: supported
    notes: >
      V*(c) = sum_i w_i^2/(lambda*alpha_bar) = H(c)/(lambda*alpha_bar).
      Since H(c) >= 1/8 with equality at uniform weights, concentrated cohorts
      achieve strictly higher V*. Niche cohort premium is exact under uniform costs.

  - claim_id: "T2"
    status: supported
    notes: >
      Proof via Hellinger distance: H(f,c)^2 = 1 - BC(f,c) where BC is Bhattacharyya
      coefficient. Cauchy-Schwarz gives ||w(f)||^2 - <w(f),w(c)> >= ||w(f)||^2 * H^2.
      Since ||w(f)||^2 >= 1/8: A(f,c) >= H^2/(8*lambda*alpha_bar). Fisher-Rao
      connection: d_FR approx 2H for small distances. Lower bound is tight at
      w(f) = w(c) (zero gap).

  - claim_id: "P2"
    status: supported
    notes: >
      Direct calculation: V(s*_f, f) = ||w(f)||^2/(lambda*alpha_bar),
      V(s*_f, c) = <w(f),w(c)>/(lambda*alpha_bar). Difference = P2 formula.
      Two components: founder concentration (||w(f)||^2) and disagreement
      (<w(f),w(c)> low when weights diverge).

  - claim_id: "P3"
    status: supported
    notes: >
      The blind-spot founder assigns s*_j = 0, losing the full cohort value
      w_j(c)*s^opt_j(c). The projection founder with w_j(f) = epsilon > 0
      partially serves the cohort's need. Difference is positive for any epsilon > 0,
      establishing strict inequality. Undetectability follows from w_j(f) = 0
      making the dimension invisible.

  - claim_id: "T3"
    status: supported
    notes: >
      Proof sketch: optimum for aggregate cohort is w_bar = weighted mean of cohort
      profiles. Efficiency loss is bounded by the variance of profiles around w_bar,
      which is bounded by the Fisher-Rao spread via the curvature of V*. Threshold
      r(0.10) approx 0.32 computed from arccos(1 - 0.10/2).

  - claim_id: "T5"
    status: supported
    notes: >
      Section 6 (quadratic value function): FOC for V_Q - lambda*C gives the
      linear system (Lambda - W)*s* = w(c). Positive definiteness of Lambda - W
      required for a maximum (guarantees unique solution). Heritage premium
      (w_{narrative,temporal} > 0) and luxury paradox (w_{ideological,economic} < 0)
      are empirically motivated sign patterns. Corollary 3 follows directly.

  - claim_id: "C3"
    status: supported
    notes: >
      Follows from T5: partial derivative of s*_i with respect to w_{ij} shows
      investment in dimension i increases with positive w_{ij} (complements)
      and decreases with negative w_{ij} (substitutes). Heritage premium and
      luxury paradox are two named examples with sign structure confirmed by
      brand case analysis.

limitations:
  - description: >
      The case-study analysis uses hypothetical founder and cohort profiles.
      Empirical validation requires measuring actual spectral profiles through
      consumer surveys (MaxDiff, conjoint) and founder self-assessment.
      Large-scale empirical implementation of cohort weight measurement remains
      future work.
    severity: major
    addressable: true

  - description: >
      The quadratic cost assumption c_i(s_i) = (alpha_i/2)*s_i^2 is convenient
      but not empirically validated. Real cost functions may exhibit non-convexities
      (threshold effects where signals below a minimum strength are imperceptible).
      Estimating alpha_i requires operational data at the dimensional level that
      few organizations currently track.
    severity: moderate
    addressable: true

  - description: >
      The model is static: it optimizes the signal portfolio at a single point
      in time. Zharnikov (2026j) establishes that brand perception evolves
      non-ergodically, with early investments compounding multiplicatively.
      Integrating the static resource allocation model with non-ergodic dynamics
      to produce a dynamic investment trajectory is a necessary extension for
      capital budgeting applications.
    severity: moderate
    addressable: true

  - description: >
      Interaction effects (Section 6) are introduced on the value side through
      the quadratic value function, but cost interaction terms c_{ij}(s_i, s_j)
      are excluded by the separable cost assumption. In practice, narrative and
      semiotic signals share creative infrastructure, and experiential and economic
      signals interact through pricing psychology. Cost cross-terms would alter
      optimal allocation quantitatively.
    severity: minor
    addressable: true

  - description: >
      The model treats the firm as a unified optimizer. In practice, dimensional
      investment is distributed across departments (marketing owns semiotic/narrative,
      operations owns experiential, finance owns economic). Coordinating distributed
      optimization introduces organizational specification complexity (Zharnikov, 2026h).
    severity: minor
    addressable: true

  - description: >
      The interaction weight matrix W(c) = (w_{ij}(c)) is observer-dependent and
      must be estimated empirically per cohort. No measurement protocol for W(c)
      is provided in this paper. The heritage premium and luxury paradox are
      qualitatively motivated but not empirically estimated.
    severity: moderate
    addressable: true

