- id: P4
  type: proposition
  statement: The alignment gap A(f,c) = V(s*_f, f) − V(s*_f, c) is the economic loss from optimizing the
    portfolio for the founder's weights w(f) rather than the cohort's w(c); it is asymmetric and is the
