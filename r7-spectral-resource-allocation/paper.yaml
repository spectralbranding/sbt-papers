methodology:
  type: empirical
  design: 'Constrained optimization of V(s,c) − lambda·C(s) with quadratic costs c_i(s_i) = (alpha_i/2)
    s_i^2: form the Lagrangian, set first-order conditions w_i(c) = lambda·c_i''(s_i*), apply strict convexity
    for the second-order condition. Yields the Theorem 1 / Theorem 4 / Theorem 5 closed forms. Alignment-gap
    computation: A(f,c) = ||w(f)||^2 − <w(f), w(c)>, with the Hellinger distance H(f,c) = (1/sqrt2)||sqrt(w(f))
    − sqrt(w(c))||_2 and the Fisher–Rao floor d_FR = 2·arccos(BC); evaluated under uniform costs (alpha_i
    = 1, lambda = 1) for the five illustrative brands and reproduced by the fixed-seed companion script.'
