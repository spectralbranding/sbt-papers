- id: P12
  type: proposition
  statement: (Theorem 5, interaction-adjusted allocation) With symmetric interaction matrix W and Lambda
    = lambda·diag(alpha), the optimum solves (Lambda − W) s* = w(c), unique as s* = (Lambda − W)^{-1}
    w(c) when Lambda − W is positive definite (diagonal dominance lambda·alpha_i > sum_{j≠i}|w_ij|). By
    Corollary 3 the adjustment delta_i shifts investment toward complementary dimensions and away from
    substitutive ones; W = 0 recovers Theorem 1. This is the eight-dimensional, cohort-dependent generalization
    of Naik & Raman (2003).
