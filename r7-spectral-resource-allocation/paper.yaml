results:
- claim_id: P5
  status: supported
  notes: 'Across the five illustrative brands the alignment gap orders Hermès < Erewhon < Patagonia <
    Tesla < IKEA, tracking founder–cohort perceptual spread: IKEA''s founder allocates half its weight
    to the economic dimension against the cohort''s .35, producing the largest gap; Hermès and Erewhon
    show small spreads on every dimension and the smallest gaps. The ordering illustrates (does not validate)
    Theorem 2''s distance-predicts-loss claim.'
- claim_id: P12
  status: supported
  notes: 'The interaction model corrects single-dimension allocation for the two illustrative cases: Hermès''s
    positive narrative×temporal interaction (w = +.05) raises optimal investment in both dimensions above
    the linear benchmark (the heritage-investment case is stronger than dimension-by- dimension analysis
    suggests), while Tesla''s negative ideological×temporal interaction (w = −.03) lowers optimal temporal
    investment below it, so Tesla''s minimal temporal signal is a structurally correct response, not an
    under-investment gap.'
limitations:
- description: All numerical examples use hypothetical founder and cohort profiles, not empirically measured
    ones; large-scale empirical validation via consumer surveys (MaxDiff, conjoint) and founder self-assessment
    remains future work.
  severity: moderate
  addressable: true
- description: The quadratic cost assumption and separability are convenient but not empirically validated;
    cost cross-terms c_ij and per-dimension non- convexities (threshold/imperceptibility effects) are
    omitted, and few organizations track alpha_i at the dimensional level.
  severity: moderate
  addressable: true
- description: The model is static (single-period) and treats the firm as a unified optimizer; the non-ergodic,
    compounding dynamics of perception (Zharnikov 2026j), a capital-stock/depreciation dynamic extension
    (Nerlove–Arrow 1962), and the organizational coordination of distributed dimensional investment are
    all open.
  severity: moderate
  addressable: true
- description: All five case-study brands are consumer-facing (B2C); the eight SBT dimensions are calibrated
    for consumer perception, so B2B application would require dimension reweighting, though the formal
    apparatus of Theorems 1–5 is agnostic to whether a cohort is consumers or procurement committees.
  severity: moderate
  addressable: true
