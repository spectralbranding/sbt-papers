# SPINE.yaml — Spectral Resource Allocation (2026k / R7)
#
# RETROFIT spine: extracted descriptively from the completed paper.md
# ([internal path removed]), NOT authored generatively
# before prose. Part of the SPINE-for-all-active-canonical project
# ([internal path removed], decision D4).
#
# Scope: the paper's argument backbone — five optimization theorems (T1–T5,
# here P1/P5/P7/P9/P12), the alignment-gap construct, the multi-cohort
# efficiency bound, the economic reading of metamerism, the strategy-framework
# projections, plus the illustrative (non-empirical) numerical example with its
# companion-script-reproduced figures. R7 refines 2026a's per-dimension
# allocation premise (P4) by supplying the optimization layer SBT lacked.
#
# Schema v0.2 ([internal path removed] §"Schema v0.2"):
# the paper reports computed numerical values (Tables 4–8, Appendix A.2) that
# are reproduced by a fixed-seed companion script, so the illustrative example
# is represented as observation → method → measurement → finding, not asserted
# in prose. The five theorems remain analytic derivations (D-prefixed where
# they carry a formal proof, P-prefixed for the headline propositions).

spine_version: "0.2"
spine_doc_version: "0.1.0"     # retrofit spine first lock (2026-06-14, D4)
paper_key: "2026k"
provenance: retrofit
title: >-
  Spectral Resource Allocation: Demand-Driven Investment in Multi-Dimensional
  Brand Space
target_venue_primary: "TBD (formal/optimization marketing-science paper)"
status: >-
  Retrofit backbone spine extracted from the completed Working Paper v1.0.0
  (March 2026, DOI 10.5281/zenodo.19009268). Descriptive, not generative.

thesis: |
  Brand managers allocate operational resources across perceptual dimensions —
  design, storytelling, pricing, heritage — yet rarely ground those decisions
  in measured cohort salience weights. Modeling a brand's signal portfolio
  s in R^8_+ as evaluated by observer cohorts whose weight vectors w(c) lie on
  the probability simplex Delta^7, with perceived value the inner product
  <w(c), s> net of a separable convex cost, yields a closed-form optimal
  allocation (invest in proportion to cohort weight over marginal cost) that
  generalizes Dorfman–Steiner to eight perceptual dimensions. The central
  construct is the alignment gap: the economic loss incurred when the portfolio
  is optimized for the founder's spectral profile rather than the cohort's,
  which is bounded below by the Fisher–Rao distance between the two weight
  vectors — giving "product-market fit failure" a geometric floor that improved
  execution cannot recover, only reallocation toward the cohort's measured
  weights closes it. The framework further characterizes when one portfolio
  efficiently serves multiple cohorts (a Fisher–Rao ball of radius r < pi/4),
  reads spectral metamerism as cost minimization (the cheapest portfolio
  achieving a target perception), and extends the two-media synergy model to a
  cohort-dependent interaction matrix W(c). It supplies the optimization layer
  missing from current brand-tracking systems: a diagnostic (alignment audit)
  and a prescriptive tool (dimension-specific budget ratios). The numerical
  examples are illustrative, not empirically measured.

# ============================================================================
# Boundary conditions — the domain within which the quantitative predictions hold
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      Cohort weight profiles are measurable on the probability simplex Delta^7
      using the SBT measurement protocol (Zharnikov 2026a, Section 5).
    observable: "An empirically identifiable, stable target cohort with an elicitable w(c)."
    excludes: "Settings where no stable target cohort weight profile can be measured."
    provenance:
      created_by: "author"
      created_at: "2026-03"
  - id: C2
    statement: >-
      The operational cost function is convex and approximately separable across
      dimensions, so cross-dimensional cost interactions are second-order
      relative to own-dimension costs.
    observable: "Per-dimension cost parameters alpha_i estimable from operational data."
    excludes: "Strongly coupled production where cost cross-terms c_ij dominate."
    provenance:
      created_by: "author"
      created_at: "2026-03"
  - id: C3
    statement: >-
      The signal-perception map is approximately linear within the operational
      investment range, so V(s,c) = <w(c), s> captures the dominant effects.
    observable: "No strong perceptual saturation over the planning horizon."
    excludes: "High-signal regimes with strong diminishing returns (Weber–Fechner)."
    provenance:
      created_by: "author"
      created_at: "2026-03"

