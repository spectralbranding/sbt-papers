# ============================================================================
# Methods — how the closed forms and the numerical values are produced
# ============================================================================
methods:
  - id: M1
    statement: >-
      Constrained optimization of V(s,c) − lambda·C(s) with quadratic costs
      c_i(s_i) = (alpha_i/2) s_i^2: form the Lagrangian, set first-order
      conditions w_i(c) = lambda·c_i'(s_i*), apply strict convexity for the
      second-order condition. Yields the Theorem 1 / Theorem 4 / Theorem 5
      closed forms.
    type: "analytic_derivation"
    inputs: ["w(c) on Delta^7", "quadratic cost parameters alpha_i", "shadow price lambda"]
    outputs: ["optimal portfolio s*(c)", "cost-minimizing metamer s†", "interaction solution s* = (Lambda − W)^{-1} w(c)"]
    code_anchor: "[internal path removed]"
    reproducibility:
      seed: "SEED = 42"
      runtime_environment: "Python 3.12 + uv"
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§Optimal Allocation for a Single Cohort", "§Economic Interpretation of Spectral Metamerism", "§Dimensional Interaction Effects"]
  - id: M2
    statement: >-
      Alignment-gap computation: A(f,c) = ||w(f)||^2 − <w(f), w(c)>, with the
      Hellinger distance H(f,c) = (1/sqrt2)||sqrt(w(f)) − sqrt(w(c))||_2 and the
      Fisher–Rao floor d_FR = 2·arccos(BC); evaluated under uniform costs
      (alpha_i = 1, lambda = 1) for the five illustrative brands and reproduced
      by the fixed-seed companion script.
    type: "closed_form_evaluation"
    inputs: ["founder weights w(f)", "cohort weights w(c)"]
    outputs: ["A(f,c)", "Hellinger H(f,c)", "rank ordering of brands"]
    code_anchor: "[internal path removed]"
    reproducibility:
      seed: "SEED = 42"
      runtime_environment: "Python 3.12 + uv"
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§The Alignment Gap", "§Alignment Gap Computation", "Appendix A.2"]

