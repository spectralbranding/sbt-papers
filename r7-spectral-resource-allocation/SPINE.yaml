# ============================================================================
# Propositions and derivations — the five theorems and their corollaries
# ============================================================================
propositions:
  - id: P0
    statement: >-
      No existing brand-theory framework connects multi-dimensional brand
      perception measurement to operational resource allocation: CBBE / identity
      / marketing-response traditions diagnose what a brand stands for but supply
      no prescriptive optimization layer, because they lack a formal metric space
      in which the distance between brand position and customer preference is a
      computable quantity.
    conditions: ""
    antecedents: []
    evidence:
      - type: analytic
        anchor: "Survey of CBBE (Keller 1993), brand-equity assets (Aaker 1991), identity prism (Kapferer 2008), brand-personality dimensions (Aaker 1997), market-response models (Hanssens et al. 2001)."
    body_sections: ["§ (opening), the structural-gap argument"]
  - id: P1
    statement: >-
      (Theorem 1) The signal portfolio maximizing V(s,c) − lambda·C(s) under
      quadratic costs is s_i*(c) = w_i(c) / (lambda·alpha_i): invest in dimension
      i proportionally to cohort weight and inversely to marginal cost. For
      general convex costs the optimum satisfies w_i(c) = lambda·c_i'(s_i*) on
      each active dimension. This generalizes the Dorfman–Steiner (1954) scalar
      condition to eight perceptual dimensions.
    conditions: "C1, C2, C3"
    antecedents: [P0]
    evidence:
      - type: derivation
        anchor: "Lagrangian first-order condition; strict convexity gives the second-order condition (Theorem 1 proof)."
    falsifier: "If the value-net-cost optimum is not proportional to w_i(c)/alpha_i under quadratic costs, Theorem 1 fails."
    body_sections: ["§First-Order Conditions", "Theorem 1"]
  - id: P2
    statement: >-
      (Corollary 1) For two active dimensions the optimal signal-strength ratio
      depends only on the weight ratio and the inverse cost ratio:
      s_i*/s_j* = (w_i(c)/w_j(c))·(alpha_j/alpha_i). This makes the allocation
      decision operational at the budget-review level.
    conditions: "C1, C2, C3"
    antecedents: [P1]
    evidence:
      - type: derivation
        anchor: "Direct ratio of the Theorem 1 closed form (Corollary 1, Remark 3)."
    body_sections: ["Corollary 1", "Remark 3"]
  - id: P3
    statement: >-
      (Proposition 1, concentration premium) Under uniform costs the optimal
      value is V*(c) = H(c)/(lambda·alpha-bar) where H(c) = sum_i w_i(c)^2 is the
      Herfindahl index; concentrated cohorts (high H) achieve strictly higher
      optimal value than diffuse ones, formalizing "a narrow audience you can
      delight beats a broad one you can only satisfy."
    conditions: "C1, C2, C3"
    antecedents: [P1]
    evidence:
      - type: derivation
        anchor: "V*(c) = sum_i w_i(c)^2 / (lambda·alpha-bar); H(c) >= 1/8 with equality at uniform weights (Proposition 1 proof)."
    body_sections: ["§Optimal Value and the Value of Information", "Proposition 1"]
  - id: P4
    statement: >-
      The alignment gap A(f,c) = V(s*_f, f) − V(s*_f, c) is the economic loss
      from optimizing the portfolio for the founder's weights w(f) rather than
      the cohort's w(c); it is asymmetric and is the geometric formalization of
      "product-market fit failure" — the cost of being in the wrong place on the
      probability simplex, not a psychological bias.
    conditions: "C1, C2, C3"
    antecedents: [P1]
    evidence:
      - type: analytic
        anchor: "Definition 1, Remark 4; portfolio-theoretic reading vs Markowitz (1952) tracking error."
    body_sections: ["§The Alignment Gap", "Definition 1"]
  - id: P5
    statement: >-
      (Theorem 2) The alignment gap is bounded below by a geometric quantity:
      A(f,c) >= H(f,c)^2 / (2·lambda·alpha-bar) via the Hellinger distance, and
      equivalently by the Fisher–Rao distance d_FR between w(f) and w(c). Perceptual
      distance predicts economic loss; the gap has a floor that improved execution
      on the chosen dimensions cannot recover — only reallocation toward the
      cohort's weights closes it.
    conditions: "C1, C2, C3"
    antecedents: [P4]
    evidence:
      - type: derivation
        anchor: "Bhattacharyya coefficient, Cauchy–Schwarz on Delta^7, ||w(f)||^2 >= 1/8, d_FR = 2·arccos(BC) (Theorem 2 + Appendix A.1)."
    falsifier: "If a portfolio with d_FR(w(f),w(c)) large can attain a near-zero alignment gap under the model assumptions, Theorem 2 fails."
    body_sections: ["§The Alignment Gap and Fisher-Rao Distance", "Theorem 2", "Appendix A.1"]
  - id: P6
    statement: >-
      (Propositions 2–3, two failure modes) The gap decomposes into weight
      projection (founder positive but mis-magnitude on every dimension) and
      spectral blind spots (founder zero weight where the cohort weights
      positively). Blind spots produce strictly larger gaps than equal-magnitude
      projections and are additionally undetectable by the founder; SBT's
      eight-dimensional decomposition makes blind spots testable (deliberate dark
      signal vs invisible blind spot).
    conditions: "C1, C2, C3"
    antecedents: [P4]
    evidence:
      - type: derivation
        anchor: "Proposition 2 (quadratic-cost gap form), Proposition 3 (blind-spot loss = full cohort-expected value on the dimension), Remark 5."
    body_sections: ["§Two Failure Modes", "Proposition 2", "Proposition 3", "Remark 5"]
  - id: P7
    statement: >-
      (Theorem 3, multi-cohort efficiency bound) A single signal portfolio
      attains at least (1−epsilon) of the sum of individual optima iff the cohort
      weight profiles lie within a Fisher–Rao ball of radius r(epsilon) ≈
      sqrt(epsilon) on Delta^7 (r ≈ .32 at epsilon = .10; efficiency condition
      r < pi/4). High-dimensional concentration of measure (Zharnikov 2026f)
      keeps inter-cohort spread generically small, giving mass markets a
      structural single-portfolio advantage.
    conditions: "C1, C2, C3"
    antecedents: [P1, P3]
    evidence:
      - type: derivation
        anchor: "Convexity of V* in w bounds aggregate-portfolio loss by weight variance; Fisher–Rao distance bounds the variance (Theorem 3 proof sketch); Corollary 2 covering-number bound k_max ~ (pi/2r)^7."
    falsifier: "If a single portfolio attains (1−epsilon) efficiency for cohorts whose Fisher–Rao spread exceeds r(epsilon), Theorem 3 fails."
    body_sections: ["§Multi-Cohort Allocation", "Theorem 3", "Corollary 2"]
  - id: P8
    statement: >-
      The sub-brand decision is a soft Fisher–Rao threshold: when cohort spread
      exceeds r(epsilon) the firm weighs single-portfolio efficiency loss against
      duplication, coherence, and complexity costs of separate portfolios. Fuzzy
      cohort boundaries (Zharnikov 2026f) mitigate but do not eliminate the loss,
      so the trigger is a soft threshold, not a binary switch.
    conditions: "C1, C2, C3"
    antecedents: [P7]
    evidence:
      - type: analytic
        anchor: "Sub-brand cost decomposition + concentration-of-measure fuzziness (decision tree, Figure 2)."
    body_sections: ["§The Sub-Brand Decision", "Figure 2"]
  - id: P9
    statement: >-
      (Theorem 4, economic metamerism) The cost-minimizing portfolio achieving a
      target perceived value V-hat for cohort c is unique when all weights are
      positive: s_i† = (w_i(c)/alpha_i) / (sum_j w_j(c)^2/alpha_j) · V-hat, with
      zero on unweighted dimensions. Spectral metamerism (Zharnikov 2026e) is
      thus a cost-optimization lever — among portfolios yielding identical
      perception, the brand should choose the cheapest; investment on a
      zero-weight dimension is structural waste.
    conditions: "C1, C2, C3"
    antecedents: [P1]
    evidence:
      - type: derivation
        anchor: "Lagrangian for min C(s) s.t. <w(c),s> = V-hat; alpha_i s_i = mu w_i; zero-weight dimensions driven to zero (Theorem 4 proof)."
    falsifier: "If two equal-perception portfolios cannot differ in cost, or the cost-min portfolio is non-unique under all-positive weights, Theorem 4 fails."
    body_sections: ["§Economic Interpretation of Spectral Metamerism", "Theorem 4"]
  - id: P10
    statement: >-
      The linear value function excludes dimensional interactions empirically
      attested by multiattribute-utility and scanner-data work (Lancaster 1966;
      McAlister 1982; Chintagunta 1993). A cohort-dependent quadratic value
      function V_Q(s,c) = sum_i w_i s_i + sum_{i<j} w_ij(c) s_i s_j captures
      complementary (w_ij > 0, e.g. heritage premium narrative×temporal) and
      substitutive (w_ij < 0, e.g. luxury-paradox ideological×temporal) pairs,
      with interaction weights measurable per cohort rather than fixed media
      properties.
    conditions: "C1, C2, C3"
    antecedents: [P1]
    evidence:
      - type: analytic
        anchor: "Quadratic value as 2nd-order Taylor expansion (Remark 6); Naik & Raman (2003) two-channel synergy as the fixed-coefficient special case."
    body_sections: ["§Dimensional Interaction Effects", "§The Quadratic Value Function"]
  - id: P11
    statement: >-
      Each of five established strategy frameworks — Blue Ocean (Kim & Mauborgne
      2005), Jobs-to-Be-Done (Christensen et al. 2016), Lean Startup (Ries 2011),
      Porter's Five Forces (1980), Resource-Based View (Barney 1991) — is an
      implicit low-dimensional projection of the spectral resource-allocation
      problem; the structural reason each fails to yield the allocation theorem
      is the absence of a metric on brand-perception space, which the Aitchison
      and Fisher–Rao metrics supply.
    conditions: "C1"
    antecedents: [P1, P5, P7, P9]
    evidence:
      - type: analytic
        anchor: "Framework-by-framework structural correspondences (strategy-canvas = low-res spectral profile; job = weight vector; MVP = L0 hypothesis; rivalry = sphere-packing density; VRIN = spectral-position properties); Tables 2, 3, 10."
    body_sections: ["§Strategy Frameworks as Spectral Projections", "Tables 2, 3, 10"]
  - id: P12
    statement: >-
      (Theorem 5, interaction-adjusted allocation) With symmetric interaction
      matrix W and Lambda = lambda·diag(alpha), the optimum solves
      (Lambda − W) s* = w(c), unique as s* = (Lambda − W)^{-1} w(c) when
      Lambda − W is positive definite (diagonal dominance lambda·alpha_i >
      sum_{j≠i}|w_ij|). By Corollary 3 the adjustment delta_i shifts investment
      toward complementary dimensions and away from substitutive ones; W = 0
      recovers Theorem 1. This is the eight-dimensional, cohort-dependent
      generalization of Naik & Raman (2003).
    conditions: "C1, C2, C3"
    antecedents: [P10, P1]
    evidence:
      - type: derivation
        anchor: "Hessian W − Lambda; strict concavity when Lambda − W positive definite; gradient zero gives the linear system (Theorem 5 + Corollary 3 proofs)."
    falsifier: "If the interaction-adjusted optimum is not (Lambda − W)^{-1} w(c) under positive-definite Lambda − W, Theorem 5 fails."
    body_sections: ["§Optimal Allocation with Interactions", "Theorem 5", "Corollary 3"]

# ============================================================================
# Findings — what the illustrative numerical example demonstrates
# ============================================================================
findings:
  - id: F1
    statement: >-
      Across the five illustrative brands the alignment gap orders Hermès <
      Erewhon < Patagonia < Tesla < IKEA, tracking founder–cohort perceptual
      spread: IKEA's founder allocates half its weight to the economic dimension
      against the cohort's .35, producing the largest gap; Hermès and Erewhon
      show small spreads on every dimension and the smallest gaps. The ordering
      illustrates (does not validate) Theorem 2's distance-predicts-loss claim.
    type: "illustrative_demonstration"
    source_measurements: [m_align_gaps, m_hellinger]
    generating_method: M2
    antecedents: [O2, P5]
    falsifier: "If the script does not reproduce the stated gaps and ordering from Tables 5–6, F1 fails."
    citation_role_in_paper: "illustrative_evidence_for_P5"
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§Alignment Gap Computation", "Figure 4"]
  - id: F2
    statement: >-
      The interaction model corrects single-dimension allocation for the two
      illustrative cases: Hermès's positive narrative×temporal interaction
      (w = +.05) raises optimal investment in both dimensions above the linear
      benchmark (the heritage-investment case is stronger than dimension-by-
      dimension analysis suggests), while Tesla's negative ideological×temporal
      interaction (w = −.03) lowers optimal temporal investment below it, so
      Tesla's minimal temporal signal is a structurally correct response, not an
      under-investment gap.
    type: "illustrative_demonstration"
    source_measurements: []
    generating_method: M1
    antecedents: [O1, P12]
    falsifier: "If the interaction-adjusted allocations in Figure 3 are not reproduced by the companion script, F2 fails."
    citation_role_in_paper: "illustrative_evidence_for_P12"
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§Application: Heritage Premium and Luxury Paradox", "Figure 3"]

# ============================================================================
# Alternative explanations / rivals the model must clear
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      The inner product on the raw simplex is the wrong geometry: Aitchison
      (1986) compositional data analysis prescribes log-ratio (alr/clr/ilr)
      operations on probability vectors, so the spectral value function might
      violate compositional structure.
    rules_out_required: [P1, P5]
    ruled_out_by: [P1]
    rules_out_status: "scoped"
    reasoning: >-
      V(s,c) is a PERCEPTUAL inner product (a weighted sum of perceived signal
      intensities), not a statistical model of proportions; the directional
      implications of Theorems 1–5 depend on the relative magnitudes of w_i(c),
      not the absolute simplex geometry, so they are expected to survive a
      log-ratio reformulation, which is flagged as future work (Remark 1).
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["Remark 1"]
  - id: A2
    statement: >-
      Linearity of V in s is unrealistic: diminishing marginal perception
      (Weber–Fechner) would make V concave in each s_i, potentially changing the
      Theorem 2 bound.
    rules_out_required: [P1, P5]
    ruled_out_by: [P1]
    rules_out_status: "scoped"
    reasoning: >-
      Diminishing returns are carried on the production side via the convex cost
      function; the perceptual side generalizes to V = sum_i w_i(c) u_i(s_i) with
      concave u_i and all results extend with minor modifications, though the
      specific Hellinger bound form may change (Remark 2). Concave-utility
      extension is future work.
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["Remark 2"]

# ============================================================================
# Limitations — honest scope
# ============================================================================
limitations:
  - id: L1
    statement: >-
      All numerical examples use hypothetical founder and cohort profiles, not
      empirically measured ones; large-scale empirical validation via consumer
      surveys (MaxDiff, conjoint) and founder self-assessment remains future
      work.
    severity: "scope-bounding"
    affects: [F1, F2]
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§Empirical Validation"]
  - id: L2
    statement: >-
      The quadratic cost assumption and separability are convenient but not
      empirically validated; cost cross-terms c_ij and per-dimension non-
      convexities (threshold/imperceptibility effects) are omitted, and few
      organizations track alpha_i at the dimensional level.
    severity: "modeling-assumption"
    affects: [P1, P9, P12]
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§Cost Function Estimation", "§Interaction Effects in Value and Cost"]
  - id: L3
    statement: >-
      The model is static (single-period) and treats the firm as a unified
      optimizer; the non-ergodic, compounding dynamics of perception (Zharnikov
      2026j), a capital-stock/depreciation dynamic extension (Nerlove–Arrow
      1962), and the organizational coordination of distributed dimensional
      investment are all open.
    severity: "scope-bounding"
    affects: [P1, P7]
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§Dynamic Extension", "§Organizational Context"]
  - id: L4
    statement: >-
      All five case-study brands are consumer-facing (B2C); the eight SBT
      dimensions are calibrated for consumer perception, so B2B application would
      require dimension reweighting, though the formal apparatus of Theorems 1–5
      is agnostic to whether a cohort is consumers or procurement committees.
    severity: "external-validity"
    affects: [F1, F2]
    provenance:
      created_by: "author"
      created_at: "2026-03"
    body_sections: ["§B2B Applicability"]

