    relationship: refines
    spine_nodes: [P0, P1, P4]
    note: >-
      SBT supplies the eight-dimensional signal space, the Delta^7 observer
      weight model, dark signals, and the measurement protocol (Section 5); R7
      refines SBT's per-dimension allocation premise (SBT P4) into a closed-form
      optimization, adding the prescriptive layer SBT lacked.
  - paper_key: 2026d
    relationship: applies
    spine_nodes: [P5, P11]
    note: >-
      R1's formal metric — the Fisher–Rao metric on Delta^7 and the Aitchison
      metric on R^8_+ — is the distance function on which the alignment-gap lower
      bound (Theorem 2) and the framework projections rest.
  - paper_key: 2026e
    relationship: applies
    spine_nodes: [P9]
    note: >-
      R2's spectral metamerism (distinct portfolios, identical scalar perception)
      is given its economic interpretation as cost minimization (Theorem 4).
  - paper_key: 2026f
    relationship: applies
    spine_nodes: [P7, P8]
    note: >-
      R3's concentration-of-measure result (cohort weights concentrate near the
      centroid; boundaries are fuzzy) underwrites the multi-cohort efficiency
      condition r < pi/4 and the soft sub-brand threshold.
  - paper_key: 2026g
    relationship: applies
    spine_nodes: [P7, P11]
    note: >-
      R4's sphere-packing capacity bound supplies the cohort-coverage number
      (Corollary 2, consistent at epsilon = .10) and the Porter rivalry-density
      and Blue Ocean capacity correspondences.
  - paper_key: 2026h
    relationship: applies
    spine_nodes: [P9, P11]
    note: >-
      R5's specification impossibility (only K of the 48 OST dimensions can be
      fully specified) is resolved by Theorem 4: specify the dimensions the
      cohort weights positively, in weight-to-cost proportion.
  - paper_key: 2026i
    relationship: applies
    spine_nodes: [P5, P11]
    note: >-
      OST's L0 demand-validation gate is given its formal justification — using
      founder rather than measured cohort weights as the L1–L5 input incurs an
      expected loss of at least the alignment gap (Theorem 2).
  - paper_key: 2026j
    relationship: extends
    spine_nodes: [L3]
    note: >-
      R6's non-ergodic perception dynamics are the basis for the (future)
      dynamic extension: early investment in high-weight dimensions compounds and
      is not recoverable by averaging, so static misallocation is costly.
  - paper_key: 2026c
    relationship: refines
    spine_nodes: [P0]
    note: >-
      R0's critical survey of geometric approaches to brand perception space
      frames the structural gap (no metric, no optimization layer) that R7 fills.

