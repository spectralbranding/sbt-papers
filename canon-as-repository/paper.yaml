spec_version: 0.1.0
meta:
  title: 'Canon as Repository: A Specification-Driven Architecture for Transmedia Intellectual Property'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19355800
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-NC-ND-4.0
  keywords:
  - transmedia storytelling
  - intellectual property
  - version control
  - canon
  - narrative consistency
  - creative AI
  abstract: 'Creative intellectual property management is the conspicuous exception among mature domains
    of complex designed systems: engineering, medicine, software, and scientific publishing have each
    independently developed formal mechanisms to verify that artifacts satisfy their specifications; creative
    IP has not. Transmedia franchises accumulate contradictions as intellectual property is rendered across
    novels, films, games, and merchandise because no formal specification governs what the story *is*
    independently of how it is expressed. Building on transmedia storytelling theory [@jenkins-2006-convergence-culture-where;
    @jenkins-2011-august-1-transmedia; @ryan-2001-narrative-as-virtual; @ryan-2015-transmedia-storytelling-industry;
    @dena-2009-transmedia-practice-theorising], world-building research [@wolf-2012-building-imaginary-worlds],
    and the rendering problem framework [@zharnikov-2026l-rendering-problem-genetic], this paper proposes
    a specification-driven architecture to close the gap. The canonical specification is reconceived as
    a version-controlled repository: editions are tagged commits; translations and adaptations are forks;
    canon governance operates through pull requests; and consistency validation functions as continuous
    integration. Style is a rendering parameter rather than a property of the specification; actors and
    translators function as rendering operators; and artificial intelligence clarifies the authorship
    question by distinguishing specification (the creative act) from rendering (the craft act). Seven
    testable propositions address franchise consistency, IP licensing as fork governance, and a future
    in which audiences become renderers — generating personalized expressions from a published canonical
    specification.'
claims:
- id: P-DIAG
  type: proposition
  statement: Creative intellectual property management is the only mature domain of complex designed systems
    that lacks a formal consistency-verification construct, despite semi-formal attempts (story bibles,
    continuity databases, fan wikis) that demonstrate the need — these remain unversioned, unvalidated,
    and medium-coupled (specifications in intent but not in architecture).
  testable: false
  tested_in_paper: false
  status: not_tested
- id: P-RP
  type: proposition
  statement: 'The franchise consistency problem is an instance of the rendering problem: the specification
    is the canon (characters, world rules, timeline, themes, constraints), the rendering is the medium-specific
    expression (novel, film, game, translation), and the emergent layer is audience perception. Three
    structural properties hold — a specification gap, a configuration layer, and emergence — making creative
    IP a fourth (now fifth, with scientific knowledge) domain of the same cross-domain pattern.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-DIAG
- id: P-BOUND
  type: proposition
  statement: 'The specification-rendering boundary is defined by a single criterion — medium independence:
    an element that must be preserved across all valid renderings belongs in the specification; an element
    that may legitimately vary between renderings belongs in the rendering. The boundary is itself a governance
    design decision (moving an element toward specification raises consistency but lowers renderer freedom,
    and conversely).'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-RP
- id: P1
  type: proposition
  statement: (Paper Proposition 1) Every change to a creative work's specification can be represented
    as a commit to a version-controlled repository, preserving the change, its author, its timestamp,
    and its rationale, enabling complete reconstruction of any prior canonical state.
  testable: true
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-BOUND
- id: P2
  type: proposition
  statement: (Paper Proposition 2) Every adaptation, translation, or derivative work from a creative specification
    can be represented as a fork from a tagged version of the canon repository, inheriting the specification's
    constraints while introducing medium-specific rendering decisions.
  testable: true
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-BOUND
- id: P3
  type: proposition
  statement: (Paper Proposition 3) Canon governance — the process by which proposed changes to a creative
    specification are reviewed, approved, or rejected — can be formalized as a pull request workflow with
    defined approval authorities, review criteria, and merge conditions, structurally resolving the canonical/non-canonical
    ambiguity (merged-via-approved-PR = canonical; fork-only = not).
  testable: true
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-BOUND
- id: P4
  type: proposition
  statement: (Paper Proposition 4) Consistency validation across renderings of a creative specification
    can be automated through structured validation rules that check character properties, timeline chronology,
    world rules, and cross-rendering compatibility against the canonical specification, transforming consistency
    from a human editorial process that fails at scale into a governance process that scales.
  testable: true
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-BOUND
- id: P-MERGE
  type: proposition
  statement: Canon contradictions correspond to merge conflicts — two authorized renderings imply incompatible
    facts; established canon-management strategies (Proctor's reboot/retcon/relaunch/revival/refresh)
    map onto merge-conflict resolution strategies (branch-priority rules, hard reset, deliberate ambiguity).
    The architecture does not prescribe a resolution strategy; it provides tooling to detect, record,
    and resolve contradictions transparently.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-BOUND
- id: P5
  type: proposition
  statement: (Paper Proposition 5) Each medium constitutes a dimensional subspace of the full specification
    space, preserving some specification dimensions with high fidelity while structurally losing others,
    such that every rendering is an incomplete but valid projection of the canonical specification (the
    specification gap at each projection is structural, not a failure of craft).
  testable: true
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-RP
  - P-BOUND
- id: P-STYLE
  type: proposition
  statement: 'A rendering is a PARAMETERIZED projection: output = render(spec, medium, style). The same
    specification in the same medium yields radically different renderings under different style parameters,
    and style is itself a formalizable specification — so a rendering function takes two specifications
    (content + style), explaining why style transfer is possible and why AI generation models (content
    prompt + style parameter) work. Human rendering professionals — actors, translators, illustrators
    — are rendering operators; a ''miscast'' actor outputs a specification violation, not a failure to
    match prior renderings.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P5
- id: P6
  type: proposition
  statement: (Paper Proposition 6) When specification and rendering are formally separated, and rendering
    technology is sufficiently capable, observers with access to capable rendering tools can generate
    personalized renderings from a published canonical specification, transforming the author's role from
    renderer to specifier (the pre-rendered product becomes one curated rendering among many).
  testable: true
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-STYLE
- id: P-AI
  type: proposition
  statement: 'AI clarifies the authorship question by locating originality in specification (the creative
    act of deciding WHAT the story is), not rendering (the craft act of HOW it is expressed): AI at the
    specification level is genuine co-authorship and is attributable via the commit log; AI at the rendering
    level is a sophisticated tool, not an author. As AI rendering capability improves, human creative
    value moves up the stack from rendering to specification.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P-STYLE
  - P-BOUND
- id: P7
  type: proposition
  statement: (Paper Proposition 7) Observer-specific rendering — the generation of personalized renderings
    from a canonical specification, parameterized by observer preferences, language, medium, and reception
    context — preserves specification-level consistency while maximizing rendering-level accessibility
    (mirroring observer-relative perception frameworks).
  testable: true
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P6
  - P-AI
- id: P-LICENSE
  type: proposition
  statement: 'IP licensing maps to fork governance: a license is a fork authorization with constraints
    (which version may be forked, which elements may be modified, which validation rules must pass, whether
    PRs to main are permitted). Fan fiction forks without authorization — ''fix-it fics'' are community-authored
    pull requests the official repository has declined to merge — and the specification-compliant vs.
    specification-divergent distinction is structural and measurable, not evaluative.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
  - P3
methodology:
  type: theoretical
  design: Theoretical derivation.
acceptance:
- claim_id: P1
  criterion: Holds if (Paper Proposition 1) Every change to a creative work's specification can be represented
    as a commit to a version-controlled repository, preserving the change, its author, its timestamp,
    and its rationale, enabling complete reconstruction of any prior canonical state.
  falsification: If a specification change cannot be recorded with attributable author + timestamp + rationale
    enabling prior-state reconstruction, P1 fails.
- claim_id: P2
  criterion: Holds if (Paper Proposition 2) Every adaptation, translation, or derivative work from a creative
    specification can be represented as a fork from a tagged version of the canon repository, inheriting
    the specification's constraints while introducing medium-specific rendering decisions.
  falsification: If an adaptation/translation cannot be expressed as a constraint-inheriting fork from
    a tagged version, P2 fails.
- claim_id: P3
  criterion: Holds if (Paper Proposition 3) Canon governance — the process by which proposed changes to
    a creative specification are reviewed, approved, or rejected — can be formalized as a pull request
    workflow with defined approval authorities, review criteria, and merge conditions, structurally resolving
    the canonical/non-canonical ambiguity (merged-via-approved-PR = canonical; fork-only = not).
  falsification: If canon-change governance cannot be expressed with approval authorities, review criteria,
    and merge conditions, P3 fails.
- claim_id: P4
  criterion: Holds if (Paper Proposition 4) Consistency validation across renderings of a creative specification
    can be automated through structured validation rules that check character properties, timeline chronology,
    world rules, and cross-rendering compatibility against the canonical specification, transforming consistency
    from a human editorial process that fails at scale into a governance process that scales.
  falsification: If specification compliance cannot be checked by structured rules against the canon,
    P4 fails (Technological-maturity limitation L5 bounds this in practice).
- claim_id: P5
  criterion: Holds if (Paper Proposition 5) Each medium constitutes a dimensional subspace of the full
    specification space, preserving some specification dimensions with high fidelity while structurally
    losing others, such that every rendering is an incomplete but valid projection of the canonical specification
    (the specification gap at each projection is structural, not a failure of craft).
  falsification: If a medium could preserve all specification dimensions with no structural loss, the
    dimensional-subspace claim fails.
- claim_id: P6
  criterion: Holds if (Paper Proposition 6) When specification and rendering are formally separated, and
    rendering technology is sufficiently capable, observers with access to capable rendering tools can
    generate personalized renderings from a published canonical specification, transforming the author's
    role from renderer to specifier (the pre-rendered product becomes one curated rendering among many).
  falsification: If observer-generated renderings from a published specification cannot satisfy its constraints,
    the audience-as-renderer claim fails.
- claim_id: P7
  criterion: Holds if (Paper Proposition 7) Observer-specific rendering — the generation of personalized
    renderings from a canonical specification, parameterized by observer preferences, language, medium,
    and reception context — preserves specification-level consistency while maximizing rendering-level
    accessibility (mirroring observer-relative perception frameworks).
  falsification: If observer-parameterized renderings cannot preserve specification consistency while
    varying accessibility, P7 fails.
