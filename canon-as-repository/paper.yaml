limitations:
- description: 'Specification completeness: some creative works resist specification — a lyric poem or
    work of abstract art may have no separable specification, its meaning entirely constituted by its
    rendering. The architecture is least applicable where meaning is inseparable from form.'
  severity: moderate
  addressable: true
- description: 'Specification-rendering co-evolution: specification and rendering often co-evolve (works
    discovered through their making). The architecture is most applicable to franchises past the discovery
    phase; for works in active creation it offers retrospective formalization, not prospective governance.'
  severity: moderate
  addressable: true
- description: 'Specification formalization: mood, sensibility, and aesthetic ''feel'' resist decomposition
    into discrete testable propositions. A validator can check whether a character is alive at a timeline
    point but not whether a scene ''feels like Star Wars''; the architecture handles discrete testable
    elements better than continuous tonal ones.'
  severity: moderate
  addressable: true
- description: 'Creative constraint: formalization may constrain creative discovery; the architecture
    is most useful for collaborative, multi-rendering contexts where cross-renderer consistency is essential,
    and for single-author works the overhead may exceed the benefit.'
  severity: moderate
  addressable: true
- description: 'Technological maturity: the automated validators (§4.4) require natural language understanding
    not yet reliable for production; current AI detects simple timeline contradictions but struggles with
    nuanced character consistency requiring interpretive judgment.'
  severity: moderate
  addressable: true
