results:
- claim_id: P1
  status: supported
  notes: 'The threshold correctly predicts regime divergence at the Dove-calibrated parameters: 32/32
    high-regime cells preserve their spectral gaps (terminal mean 1.10) while all 32 sign-inverted low-regime
    cells collapse (terminal mean .02) — a 52-fold difference — and the IRF half-life contrast (1.4 vs
    13.1 months) confirms the threshold separates recoverable from absorbing dynamics.'
- claim_id: P7
  status: supported
  notes: 'The regime difference is invisible to centroid-level diagnostics: ADF classes all 64 cells stationary
    and cosine drift is near-identical (.023 vs .027), so MDS-visible centroid positions do not distinguish
    the regimes — spectral gap dynamics, not centroid positions, are the diagnostic.'
- claim_id: P8
  status: supported
  notes: 'The μ = λ threshold is a genuine bifurcation rather than a smooth gradient: the parameter sweep
    shows mean terminal gap collapsing to zero below ratio 1.0 and rising monotonically above it, consistent
    with the Lyapunov sign-flip condition (P8).'
limitations:
- description: The Monte Carlo demonstration is an exploratory illustration under author-proposed Dove-calibrated
    parameters, NOT a confirmatory test against observed data; no Dove tracking-panel data were used to
    fit the model and no confidence intervals on λ and μ are available. Confirmatory estimation from real
    Dove longitudinal data is deferred to a companion paper using R10 source data (2026p).
  severity: moderate
  addressable: true
- description: Cohort compositions are assumed time-invariant; cohort migration is itself a source of
    effective leakage not captured by the current λ estimator. The GRP-to-perception mapping is assumed
    linear, defensible only near low dimensional baselines — μ would be lower per unit GRP for established
    dimensional positions, requiring re-parameterization.
  severity: moderate
  addressable: true
- description: The self-adjoint assumption is most defensible in steady state; coherence shocks producing
    asymmetric cross-cohort flows may violate it (Davies pseudospectral extension applies). The operator-theoretic
    abstraction may be over-specified for routine applications, and the sufficient condition does not
    prescribe a unique estimation procedure — VECM-, MDS-, and cohort-drift-based estimators of λ and
    μ will not in general agree exactly.
  severity: moderate
  addressable: true
