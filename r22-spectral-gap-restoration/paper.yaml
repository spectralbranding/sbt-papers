methodology:
  type: mixed
  design: 'Kato–Rellich perturbation analysis: for a coherence shock −L̃ = −L + εQ with Q bounded and
    symmetric and ε‖Q‖ < λ*/2, |λ̃₁ − λ₁| ≤ ε‖Q‖, so the perturbed gap λ̃* ≥ λ* − ε‖Q‖ > 0; the correction
    capacity μ enters as a damping term giving dε/dt = (λ_L − μ)ε, whose sign governs the entire long-run
    trajectory. Establishes Proposition 1 constructively. Monte Carlo regime simulation: evolve the per-cell
    spectral gap series under each regime''s drift, identical noise SD .12, then compute per-cell augmented
    Dickey–Fuller tests (AIC lag selection, α = .05), IRF half-lives (AR(1) local linearization), terminal
    gap, and cosine drift from initial centroid. Dove parameter calibration: λ ≈ .10/year from passive
    Cultural-dimension drift (~3.0 units over 2013–2023) calibrated via Clarke''s (1976) meta-analytic
    range for established brands; μ ≈ 4.50/year from the Ideological-dimension activation slope (near-zero
    to 9.0 over 2004–2006) via the Srinivasan, Vanhuele, and Pauwels (2010) wear-in IRF method. Author-proposed
    calibrations, not estimates confirmed from continuous panel data.'
  analysis:
    software: 'Mathematical Appendix: Perturbation Analysis and Proof of Proposition 1'
    method: Python 3.12 + uv (statsmodels, numpy, scipy)
