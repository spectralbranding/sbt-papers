limitations:
  - id: L1
    statement: "Four-wave qualitative scores treated as continuous-time process; state-space measurement model not yet validated for SBT"
    bounded_by: "Order-of-magnitude lambda and mu calibration only; confidence intervals unavailable without continuous tracking data; four observations per cell = low statistical power, results are illustrative calibrations not regime-diagnostic findings"
    future_research: "Validate state-space measurement model using continuous brand-tracking panel"
  - id: L2
    statement: "Cohort compositions assumed time-invariant 2003-2023; no longitudinal panel tracks individual cohort membership"
    bounded_by: "Cohort migration biases lambda estimator if compositions shifted substantially"
    future_research: "Longitudinal panel study with individual cohort-membership tracking"
  - id: L3
    statement: "GRP-to-perception mapping assumed linear; Erdem-Keane (1996) shows nonlinearity near scale boundaries"
    bounded_by: "mu = 4.50 estimated from near-zero baseline where nonlinearity is smallest; limit generalizability at high-saturation levels; brands with established dimensional positions exhibit lower mu per unit GRP"
    future_research: "Nonlinear structural model following Erdem-Keane (1996) with brand-specific saturation parameters"

