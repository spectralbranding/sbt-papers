claims:
  - id: P1
    type: proposition
    statement: >
      Cohort separability survives a coherence shock if the corrective
      coherence emission rate mu exceeds the spectral leakage rate lambda at the
      detection scale of the dominant observer cohort (sufficient condition).
    status: theoretically_derived
    evidence:
      - "Kato-Rellich perturbation bound: if epsilon * norm(Q) < spectral_gap / 2, gap persists"
      - "Semi-structural re-analysis of Dove 2003-2023: mu approx 4.50 >> lambda approx 0.10 for Purpose-Aligned cohort"
      - "Sign-inverted mu for Skeptic-Critic cohort consistent with predicted separability decline"
      - "Danthinne et al. (2022) peer-reviewed anchor: cohort-heterogeneous Real Beauty effects consistent with sign-inverted mu prediction"
    falsification: >
      P1 is falsified if a brand maintains cohort separability over an extended post-shock
      window with mu < lambda by independent measurement, or if a brand with documented
      mu >> lambda loses separability following a coherence shock.
    note: >
      Sufficient condition only. The converse (necessity) is not claimed: there may exist
      mu < lambda configurations where separability is transiently preserved by geometric
      features not captured in the scalar ODE model.

  - id: C1
    type: corollary
    statement: >
      If mu < lambda for an interval exceeding the mixing time tau_mix <= C / lambda_star,
      cohort-level perception distinctions almost surely collapse to the stationary distribution.
    status: theoretically_derived
    evidence:
      - "Follows from Diaconis-Stroock (1991) spectral gap theorem and R9 absorbing-state result"
    falsification: >
      C1 is falsified if a brand with documented mu < lambda for an interval exceeding
      tau_mix shows statistically significant cohort centroid separation in a post-shock
      measurement.

  - id: C2
    type: corollary
    statement: >
      Pulse emissions can maintain mu > lambda on average even when the inequality fails
      locally during low-emission intervals, provided the pulse period is shorter than tau_mix.
    status: theoretically_derived
    evidence:
      - "Spectral gap decay bounded below by exp(-lambda * t); Montenegro-Tetali (2006)"
      - "Naik (1999) canonical adstock half-life treatment as qualitative pulsing precedent"

  - id: H22
    type: hypothesis
    statement: >
      Spectral gap collapse precedes brand conviction reorientation by 6 to 18 months.
    status: pending_empirical_test
    evidence:
      - "Effie Awards (2006) case documents conviction-metric shifts approximately 12 months post-launch"
      - "Directionally consistent with predicted lead time; confirmatory test requires R10 timing data"
    falsification: >
      H22 is falsified if gap collapse in R10 dimensional score data coincides with or
      follows conviction shift documented by Effie (2006), rather than preceding it
      by 6-18 months.

design:
  type: theoretical_with_empirical_reanalysis
  empirical_source: "Zharnikov 2026p (R10 Dove case study)"
  data_waves: 4
  time_span: "2003-2023"
  cohorts: 4
  dimensions: 8
  cells: 32
  estimation_approach: >
    Three-step semi-structural: (1) VECM error-correction (Srinivasan et al. 2004)
    for net mu-lambda residual; (2) activation-window IRF for mu
    (Srinivasan et al. 2010; Ataman et al. 2010 benchmarks); (3) Procrustes robustness
    (Rohlf 2005; Moore & Winer 1987; DeSarbo et al. 1993).
  lambda_estimate: 0.10
  lambda_units: "dimension-units per year"
  lambda_source: "Cultural dimension passive drift 2013-2023, Clarke 1976 calibrated"
  lambda_decomposition: "lambda = lambda_emission (off-eigenvector signal; Harris 1978) + lambda_inattention (observer channel capacity; Sims 2003; Matejka & McKay 2015)"
  mu_estimate: 4.50
  mu_units: "dimension-units per year"
  mu_source: "Ideological dimension activation 2004-2006 via Srinivasan et al. wear-in IRF"

