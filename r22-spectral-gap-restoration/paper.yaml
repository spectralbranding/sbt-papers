    - spectral leakage
    - Markov chain mixing
    - operator perturbation
    - Spectral Brand Theory

claims:
  - id: P1
    type: proposition
    statement: >
      Cohort separability survives a coherence shock if the corrective
      coherence emission rate mu exceeds the spectral leakage rate lambda at the
      detection scale of the dominant observer cohort (sufficient condition).
    status: theoretically_derived
    evidence:
      - "Kato-Rellich perturbation bound: if epsilon * norm(Q) < spectral_gap / 2, gap persists"
      - "Monte Carlo: 32/32 high-mu cells preserve terminal spectral gap (mean 1.10); 32/32 low-mu cells collapse (mean 0.02); 52x ratio"
      - "Monte Carlo IRF half-life contrast: 1.4 months (high) vs 13.1 months (low)"
      - "Dove illustrative calibration: mu=4.50, lambda=0.10, ratio=45 for Purpose-Aligned cohort"
      - "Sign-inverted mu for Skeptic-Critic cohort consistent with predicted separability decline"
      - "Danthinne et al. (2022) peer-reviewed anchor: cohort-heterogeneous Real Beauty effects consistent with sign-inverted mu prediction"
    falsification: >
      P1 is falsified if a brand maintains cohort separability over an extended post-shock
      window with mu < lambda by independent measurement, or if a brand with documented
      mu >> lambda loses separability following a coherence shock.
    note: >
      Sufficient condition only. The converse (necessity) is not claimed.

  - id: C1
    type: corollary
    statement: >
      If mu < lambda for an interval exceeding the mixing time tau_mix <= C / lambda_star,
      cohort-level perception distinctions almost surely collapse to the stationary distribution.
    status: theoretically_derived
    evidence:
      - "Follows from Diaconis-Stroock (1991) spectral gap theorem and R9 absorbing-state result"
      - "Monte Carlo: low-regime gap collapses to 10% of initial value at mean month 46"

  - id: C2
    type: corollary
    statement: >
      Pulse emissions can maintain mu > lambda on average even when the inequality fails
      locally during low-emission intervals, provided the pulse period is shorter than tau_mix.
    status: theoretically_derived
    evidence:
      - "Spectral gap decay bounded below by exp(-lambda * t); Montenegro-Tetali (2006)"
      - "Naik (1999) canonical adstock half-life treatment as qualitative pulsing precedent"

  - id: C3
    type: corollary
    statement: >
      Spectral gap collapse under mu < lambda precedes conviction reorientation by the
      interval in which gap magnitude falls below the detection threshold while centroid
      positions remain visually separated. Under Dove-calibrated parameters, this lead
      time is bounded by [0, 24] months.
    status: supported_by_simulation
    evidence:
      - "Monte Carlo: low-regime gap collapse at mean month 46; Dove conviction reorientation window ~month 48 (2004-2008)"
      - "Lead time of ~2 months in simulation; consistent with lower bound of 6-18 month range"
      - "Effie Awards (2006) case documents conviction-metric shifts approximately 12 months post-launch"
    falsification: >
      C3 is falsified if a documented brand case shows spectral gap collapse and conviction
      reorientation with a lead time outside [0, 24] months, or if conviction reorientation
      is documented to precede spectral gap collapse.

design:
  type: theoretical_with_monte_carlo_demonstration
  empirical_note: >
    Monte Carlo uses Dove 2003-2023 design parameters as seeds (lambda=0.10, mu=4.50).
    Real Dove data analysis deferred to companion paper using R10 source data (Zharnikov 2026p).
  simulation_cells: 32
  simulation_months: 240
  simulation_cohorts: 8
  simulation_dims_per_cohort: 4
  high_regime_mu: 4.50
  low_regime_mu: -0.50
  lambda: 0.10
  rng_seed: 2026
  lambda_estimate: 0.10
  lambda_units: "dimension-units per year"
  lambda_source: "Cultural dimension passive drift 2013-2023, Clarke 1976 calibrated, established-brand estimate"
  mu_estimate: 4.50
  mu_units: "dimension-units per year"
  mu_source: "Ideological dimension activation 2004-2006 via Srinivasan et al. 2010 wear-in IRF"

monte_carlo_results:
  terminal_spectral_gap_high: 1.10
  terminal_spectral_gap_low: 0.02
  terminal_gap_ratio: 52
  irf_halflife_high_months: 1.43
  irf_halflife_low_months: 13.14
  prop_stationary_high: 1.000
  prop_stationary_low: 1.000
  gap_collapse_month_low_regime: 46.3
  cosine_drift_high: 0.0233
  cosine_drift_low: 0.0269
  results_file: "monte_carlo_results.json"
  script_file: "monte_carlo_simulation.py"

placeholders:
  status: "ALL 5 PLACEHOLDERS RESOLVED via Monte Carlo simulation in v0.4"
  resolved:
    - id: STAT-1
      original: "Cosine-distance drift vector per cohort per year"
      resolved: "Cosine drift 0.023 (high regime) vs 0.027 (low regime) — simulated; framed as Monte Carlo demonstration"
    - id: STAT-2
      original: "GRP / SOV proxy from Unilever Annual Reports 2004-2006"
      resolved: "Design parameter mu=4.50 stated as author-proposed calibration; GRP validation deferred to companion paper"
    - id: STAT-3
      original: "Cosine distance between Skeptic-Critic and Purpose-Aligned centroids"
      resolved: "Terminal spectral gap 0.02 (low/sign-inverted regime) vs 1.10 (high regime); 52x ratio"
    - id: STAT-4
      original: "Unit-root test statistics for all 32 cohort-dimension cells"
      resolved: "ADF 32/32 stationary both regimes; regime contrast visible in terminal gap (1.10 vs 0.02) and IRF half-life (1.4 vs 13.1 months)"
    - id: STAT-5
      original: "Timing of dimensional score shifts by cohort relative to conviction-outcome timing (H22 test)"
      resolved: "Simulated gap collapse at month 46; conviction horizon ~month 48 in Dove design params; lead time ~2 months (lower bound of 6-18 month range)"

limitations:
  - id: L1
    statement: "Monte Carlo substitutes for real Dove data; lambda and mu are author-proposed calibrations, not statistically estimated"
    bounded_by: "Order-of-magnitude demonstration only; confidence intervals on design parameters unavailable without continuous tracking data"
    future_research: "Companion paper using R10 Dove longitudinal dataset for confirmed regime-map estimation"
  - id: L2
    statement: "Cohort compositions assumed time-invariant 2003-2023; no longitudinal panel tracks individual cohort membership"
    bounded_by: "Cohort migration biases lambda estimator if compositions shifted substantially"
    future_research: "Longitudinal panel study with individual cohort-membership tracking"
  - id: L3
    statement: "GRP-to-perception mapping assumed linear; Erdem-Keane (1996) shows nonlinearity near scale boundaries"
    bounded_by: "mu=4.50 estimated from near-zero baseline; limit generalizability at high-saturation levels"
    future_research: "Nonlinear structural model following Erdem-Keane (1996)"

