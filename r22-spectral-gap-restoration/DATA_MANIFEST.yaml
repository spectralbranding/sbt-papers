# DATA_MANIFEST.yaml -- R22: Spectral Gap Restoration
# Links to data sources used in this paper

datasets:
  - name: "R10 Dove Longitudinal Case Data (2003–2023)"
    location: "https://github.com/spectralbranding/sbt-papers/tree/main/r10-dove-case-study"
    paper_doi: "10.5281/zenodo.19139258"
    description: >
      Longitudinal perception data from R10 Dove "Real Beauty" case study.
      Five placeholder statistics in this paper require computation from
      this data (cohort drift vectors, GRP/SOV proxies from Unilever
      Annual Reports 2004–2006, cohort centroid distances at 2003/2006/
      2013/2023 waves, unit-root tests across 32 cohort×dimension cells,
      timing of dimensional shifts vs. Effie 2006).
    used_in:
      - "Section 4 Empirical Re-analysis"
      - "Hypothesis H22 (separability test + lead-time test)"
    status: "Used for Monte Carlo calibration parameters; full re-analysis deferred to companion paper"

  - name: "Unilever Annual Reports 2004–2006"
    location: "https://www.unilever.com/investor-relations/annual-report-and-accounts/"
    description: >
      Public financial filings used to derive Share-of-Voice (SOV) and
      campaign emission-rate (μ) proxies for the Real Beauty activation
      window.
    status: "Required for μ estimation in companion paper"

empirical_methods:
  - approach: "VECM error-correction term as μ estimand"
    primary_reference: "Srinivasan, Pauwels, Hanssens & Dekimpe (2004) Mgmt Sci"
    supporting:
      - "Dekimpe & Hanssens (1995) MKSC"
      - "Ataman, van Heerde & Mela (2010) JMR (IRF half-life calibration)"
      - "Dekimpe, Franses, Hanssens & Naik (2006) ERIM (review)"
      - "Hanssens, Leeflang & Wittink (2005) ASMB (model selection)"

  - approach: "Procrustes-aligned MDS for cohort drift (λ proxy)"
    primary_reference: "Rohlf (2005) JASA reviewing Gower & Dijksterhuis (2004)"
    supporting:
      - "Moore & Winer (1987) MKSC"
      - "DeSarbo, Manrai & Manrai (1993) Handbook OR/MS Vol 5 Ch 5"

  - approach: "Adstock half-life calibration"
    primary_reference: "Naik, Mantrala & Sawyer (1998) MKSC"
    note: >
      Cite qualitatively only. The empirical case in Naik et al. (1998) is
      cereal data; specific decimal values should be verified against the
      original source before use.

code:
  - name: "Monte Carlo simulation script"
    location: "https://github.com/spectralbranding/sbt-papers/blob/main/r22-spectral-gap-restoration/monte_carlo_simulation.py"
    description: "Reproducible 32-cell × 2-regime × 240-month simulation. Run with: uv run --with statsmodels --with numpy --with scipy python3 monte_carlo_simulation.py. Seed: 2026."
  - name: "Monte Carlo full outputs"
    location: "https://github.com/spectralbranding/sbt-papers/blob/main/r22-spectral-gap-restoration/monte_carlo_results.json"
    description: "Per-cell outputs across all 64 cohort-dimension cells in both regimes (high-μ and sign-inverted low-μ). Includes terminal spectral gap, IRF half-life, ADF stationarity test statistics, gap-collapse month, cosine drift."
  - name: "SBT Framework"
    location: "https://github.com/spectralbranding/sbt-framework"
    description: "Open-source toolkit implementing the SBT computational pipeline (used for placeholder stat computation when R10 re-analysis runs)"
