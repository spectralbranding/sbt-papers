# ============================================================================
# Limitations
# ============================================================================
limitations:
  - id: L1
    statement: >-
      Single epoch, four pinned operator pairs: the concordance structure is a
      property of these model versions at this date, not of the families in
      general.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations"]
  - id: L2
    statement: >-
      Four artifact channels per brand bound the channel-resampled bootstrap:
      the strict H1 interval criterion is underpowered at this design size, so
      H1's failure at the interval criterion is partly a design-resolution
      statement (a larger channel set is the remedy, not a different
      criterion).
    antecedents: [NF1]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations"]
  - id: L3
    statement: >-
      AI-observer surface only: readings elicit the models' internalized
      public-artifact exposure through channel-conditioned prompts rather than
      grounding on fetched artifact excerpts; fetched-artifact grounding and
      human panels are separate instruments' provinces.
    antecedents: [AA1, C1]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations", "Convergent Validity and the AI-Observer Surface"]
  - id: L4
    statement: >-
      Fractions are bank-relative: the frozen bank spans five coherence types
      and two sectors but is 40 brands from one index frame; the fraction is a
      property of (bank, aggregator, operator set), reported as such.
    antecedents: [C2]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations"]
  - id: L5
    statement: >-
      English-language readings only: all renders and extractions are
      English-prompted, so the measured surface is the English-language
      AI-observer surface; native-language operators are required before any
      claim extends to non-English observation, per the base instrument's own
      language discipline.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations"]
  - id: AA3
    statement: >-
      Two stated modeling choices: brand vectors pool the four channels with
      equal weight (channel salience is not modeled), and the eleven-grade
      A-SCORE scale maps linearly onto [0,1] (ordinal-to-interval linearity
      assumed, mitigated by measuring the scalar floor on the same mapped
      scale).
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Metameric-Fraction Estimator", "The Aggregator Battery"]

# ============================================================================
# Propositions
# ============================================================================
propositions:
  - id: P1
    statement: >-
      Indistinguishability under a coarse readout is a measurable quantity:
      the dual-floor procedure (full-instrument operator floor + the coarse
      readout's own floor, both measured from cross-family operator
      dispersion) turns "these two are indistinguishable" from an assertion
      into a falsifiable classification with planted-positive and same-brand
      negative controls, and the procedure is instrument-general — any
      high-dimensional perceptual readout paired with any coarser projection
      of it can be tested the same way.
    conditions: "C3, C5"
    antecedents: [M5, M6, F2]
    evidence:
      - type: citation
        anchor: "observational-equivalence formal family"
        citation_keys:
          [koopmans-1949-172125144, manski-1995-untitled]
        citation_role: extends
      - type: citation
        anchor: "color metamerism source structure"
        citation_keys: [wyszecki-1982-color-science-concepts]
        citation_role: uses_method_of
    falsifier: >-
      A planted scalar-equal profile-distinct pair the estimator fails to
      flag, or a same-brand pseudo-pair population it flags at the frozen
      floor, falsifies the procedure's sensitivity/specificity claims.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["A Dual-Floor Procedure for Indistinguishability"]
  - id: P2
    statement: >-
      The metameric fraction operationalizes spectral metamerism for AI brand
      perception: the share of resolvable brand distinctions an aggregate
      readout destroys, per frozen bank and aggregator, with a source-cluster
      bootstrap interval — moving the corpus claim "aggregate scores destroy
      brand distinctions" from geometric theorem and demonstration to a
      reusable measured quantity, whose first pre-registered campaign returns
      sub-resolution at the four-family floor and .500 (scalar) within the
      concordant triplet, exploratorily.
    conditions: "C1, C2, C4"
    antecedents: [P1, F1, F6]
    evidence:
      - type: citation
        anchor: "the geometric prediction being operationalized"
        citation_keys: [zharnikov-2026-spectral-metamerism-brand-perception-projection]
        citation_role: operationalizes
      - type: citation
        anchor: "behavioral metamerism and the observational-equivalence formalization"
        citation_keys: [zharnikov-2026-ai-native-brand-identity-from]
        citation_role: extends
      - type: citation
        anchor: "the demonstration runs being standardized"
        citation_keys: [zharnikov-2026-dimensional-collapse-ai-mediated-search]
        citation_role: extends
    falsifier: >-
      A campaign under the same frozen protocol finding the scalar fraction
      indistinguishable from zero at a concordant floor would bound the
      garbling claim at the measured scale.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Metameric Fraction as an Instrument Output"]
  - id: P3
    statement: >-
      Garbling severity is an ordered, testable property of aggregators: the
      battery formalizes scalar score, ranking, and binary pick as projections
      with measured floors, and the campaign's point estimates run in the
      predicted monotone direction (binary > scalar > ranking > full = 0),
      with the paired scalar-versus-ranking contrast below confirmatory
      strength at the achieved resolved-pair count.
    conditions: "C2"
    antecedents: [M4, F7, D2]
    evidence:
      - type: citation
        anchor: "aggregators as garbling operators of the perception vector"
        citation_keys: [zharnikov-2026au-correspondence-principle-brand]
        citation_role: tests
      - type: citation
        anchor: "single-item versus multi-attribute predictive-validity literature the ladder speaks to"
        citation_keys:
          [
            bergkvist-2007-predictive-validity-multipleitem,
            diamantopoulos-2012-guidelines-single-item,
            ailawadi-2003-revenue-premium-outcome,
          ]
        citation_role: engages
    falsifier: >-
      A reversed ordering (ranking destroying more than the scalar, or the
      full readout destroying anything) under a concordant floor.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Aggregator Battery", "The Concordant-Triplet Picture"]
  - id: P4
    statement: >-
      Resolution claims are operator-conditional, and that conditionality is
      itself measurable: the concordance diagnostic (per-operator-pair
      distance table plus cross-extractor localization) tells the consumer of
      an aggregate metric whether the instrument's floors permit any
      distinction claims at all, and localizes discordance to a role
      (renderer versus extractor) when they do not — the refusal-to-resolve
      discipline of the substrate-floor account applied to indistinguishability
      measurement.
    conditions: "C5"
    antecedents: [D1, F4, F5, F8]
    evidence:
      - type: citation
        anchor: "no-rescue nested-floor logic"
        citation_keys: [zharnikov-2026ay-substrate-floor]
        citation_role: applies
      - type: citation
        anchor: "cross-family operator discipline that makes the diagnostic possible"
        citation_keys: [zharnikov-2026ap-same-meaning-different-prose]
        citation_role: applies
    falsifier: >-
      An operator set whose concordance diagnostic shows tight agreement while
      leave-one-out floors still flip the resolution verdict.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["What the Floors Measured", "Localizing the Discordant Operator"]
  - id: P5
    statement: >-
      For claims about the deployed AI-mediated surface, AI observers are the
      construct rather than a proxy: the readouts under test (scores,
      rankings, picks produced by AI systems) are consumed as-is downstream,
      so validating them against human panels would validate a different
      construct; human convergent validity becomes necessary exactly when the
      claim extends to human perception.
    conditions: "C1"
    antecedents: [AA1]
    evidence:
      - type: citation
        anchor: "validity conditions for LLM-based measurement"
        citation_keys:
          [
            abdurahman-2024-perils-opportunities-llms,
            rathje-2024-gpt-effective-multilingual,
            trott-2024-augment-psycholinguistic-datasets,
          ]
        citation_role: engages
    falsifier: >-
      Evidence that downstream consumption surfaces re-anchor on human panels
      rather than AI readouts would shift the validity burden back.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Convergent Validity and the AI-Observer Surface"]

