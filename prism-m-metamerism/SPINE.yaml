# ============================================================================
# Methods
# ============================================================================
methods:
  - id: M1
    statement: >-
      Frozen pre-registered protocol (PL0): three hypotheses (H1 existence of
      measured metamers; H2 garbling-severity monotonicity; H3 cross-operator
      stability), the metamer criterion (resolved on the full readout at
      S/N > 2 AND unresolved on the aggregator at S/N < 1, floors measured),
      the Stage-1 retention rule, family-wise alpha .05 Bonferroni-split to
      .017 per hypothesis, stopping rules, and the confirmatory/exploratory
      boundary.
    evidence:
      - type: citation
        anchor: "preregistration + measurement-discipline anchors"
        citation_keys:
          [
            nosek-2018-the-preregistration-revolution,
            flake-2020-measurement-schmeasurement-questionable,
          ]
        citation_role: uses_method_of
    provenance:
      created_by: author
      created_at: "2026-07-01T00:00:00Z"
      under_conditions: "PL0 locked before any API spend"
    body_sections: ["Pre-Registered Protocol"]
  - id: M2
    statement: >-
      Stratified stimulus frame: a named public brand index (Interbrand Best
      Global Brands top-100) stratified by five SBT coherence types x
      B2C/B2B, four brands per cell (40 total), with a pre-registered
      supplementation rule for structurally thin strata, per-brand goods-type
      covariate, and balance diagnostics reported at PL4.
    evidence:
      - type: citation
        anchor: "coherence-type typology spanning the bank"
        citation_keys: [zharnikov-2026-coherence-type-as-crisis-predictor]
        citation_role: uses_method_of
      - type: citation
        anchor: "brand stimulus norms precedent for explicit stimulus frames"
        citation_keys: [raffaelli-2024-brand-recognition-norms]
        citation_role: supports
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "assignments made from public brand knowledge before any Stage-1 readout"
    body_sections: ["The Stimulus Frame"]
  - id: M3
    statement: >-
      Channel-conditioned AI-observer reading: each brand is read through four
      standardized public-artifact channels (official, press, experience,
      social); a renderer model writes 250-400 words of channel-conditioned
      analytical prose from its public-artifact exposure, and a
      different-family extractor converts the prose to the eight-dimension
      vector — renderer and extractor families never coincide, and each family
      carries both roles across the operator set.
    evidence:
      - type: citation
        anchor: "cross-family renderer/extractor discipline"
        citation_keys: [zharnikov-2026ap-same-meaning-different-prose]
        citation_role: uses_method_of
      - type: citation
        anchor: "direct-elicitation precedent: models queried about brands as observers"
        citation_keys: [zharnikov-2026-dimensional-collapse-ai-mediated-search]
        citation_role: extends
      - type: citation
        anchor: "LLM-as-experimental-subject paradigm"
        citation_keys:
          [horton-2023-large-language-models, filippas-2024-large-language-models]
        citation_role: supports
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "operator IDs pinned to exact model-version strings; live catalog ping before launch"
    body_sections: ["Reading Brands Through Channels"]
  - id: M4
    statement: >-
      The aggregator battery: A-SCORE (11-grade brand-health scalar mapped to
      [0,1]), A-RANK (ten-slot recommendation ranking position), A-PICK
      (binary recommend call), each extracted from the same rendered prose by
      the same cross-family extractor and each carrying its OWN operator
      floor, so "unresolved on the aggregator" is measured, never asserted.
    evidence:
      - type: citation
        anchor: "aggregators as projection operators; the garbling account under test"
        citation_keys: [zharnikov-2026au-correspondence-principle-brand]
        citation_role: tests
      - type: citation
        anchor: "comparison-of-experiments ordering behind the severity ladder"
        citation_keys:
          [blackwell-1951-comparison-of-experiments, blackwell-1953-equivalent-comparisons]
        citation_role: uses_method_of
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "structured-JSON outputs; redraw-once-then-flag policy"
    body_sections: ["The Aggregator Battery"]
  - id: M5
    statement: >-
      Deterministic seeded estimator (PL4): full-readout distance = 1 - cosine
      between brand vectors; aggregator distance = absolute difference of
      normalized scalars; operator floor per brand per readout = maximum
      pairwise distance among the brand's per-operator-pair values; pair floor
      = max of the endpoints' floors; S/N = distance / pair floor; metameric
      fraction per aggregator over resolved pairs; source-cluster bootstrap
      (brands as clusters, 2,000 replicates, seed 20260702) for 95 percent
      intervals.
    evidence:
      - type: citation
        anchor: "floor apparatus and per-pair S/N rule inherited from the base instrument"
        citation_keys: [zharnikov-2026ax-brand-spectrometer]
        citation_role: uses_method_of
      - type: citation
        anchor: "cluster-robust bootstrap precedent for non-independent observations"
        citation_keys:
          [
            mackinnon-2023-cluster-robust-inference,
            cheung-2023-diy-bootstrapping,
            yang-2026-bootstrap-confidence-intervals,
          ]
        citation_role: uses_method_of
    provenance:
      created_by: "tool:estimator.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "unit-tested on synthetic data before any API spend (10 tests incl. both controls)"
    body_sections: ["The Metameric-Fraction Estimator"]
  - id: M6
    statement: >-
      Two pre-registered controls: a planted positive (synthetic scalar-equal,
      profile-distinct pair the estimator MUST flag) and a same-brand negative
      (cross-channel pseudo-pairs of one brand must NOT be flagged metameric),
      both evaluated against the same measured floors as real pairs.
    provenance:
      created_by: author
      created_at: "2026-07-01T00:00:00Z"
      under_conditions: "positive control synthetic by design; negative control uses collected data"
    body_sections: ["Controls"]
  - id: M7
    statement: >-
      Robustness battery: resolution-threshold sweep k in {1.5, 2, 3};
      Euclidean and Mahalanobis full-readout distance alternates; a
      prompt-ablation subsample (10 brands, terse renderer prompt) read
      against the operator floor; and a symmetric leave-one-operator-out
      sensitivity analysis re-running the full frozen pipeline with each
      operator pair held out.
    provenance:
      created_by: "tool:estimator.py --robustness"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "all exploratory analyses labelled per PL0 section 1"
    body_sections: ["Robustness"]

