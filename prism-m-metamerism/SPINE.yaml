# ============================================================================
# Findings
# ============================================================================
findings:
  - id: F1
    statement: >-
      Confirmatory H1 at the pre-registered criterion: 0 of 136 frozen-bank
      pairs resolved on the full readout above the four-operator floor
      (maximum S/N 1.63 < 2), so no measured metamer exists at the four-family
      floor and H1 is not supported under the frozen criterion.
    antecedents: [m1, m3, M1, M5]
    falsifier: >-
      Any pair whose channel-bootstrap full-readout S/N lower bound exceeded 2
      under the four-operator floor would overturn this finding.
    provenance:
      created_by: "tool:estimator.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "k = 2, cosine distance, all four operator pairs"
    body_sections: ["Confirmatory Results"]
  - id: F2
    statement: >-
      Both pre-registered controls behaved: the planted scalar-equal,
      profile-distinct pair was flagged metameric (estimator sensitivity), and
      0 of 102 same-brand cross-channel pseudo-pairs were flagged metameric at
      the four-operator floor (estimator specificity).
    antecedents: [M6, m1]
    provenance:
      created_by: "tool:estimator.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "positive control on seeded synthetic records; negative on collected data"
    body_sections: ["Controls"]
  - id: F3
    statement: >-
      The sub-resolution verdict is robust: k = 3, Euclidean distance, and
      Mahalanobis distance all yield 0 resolved pairs; relaxing to k = 1.5
      resolves exactly one pair (which the scalar then collapses, fraction
      1/1).
    antecedents: [F1, M7]
    provenance:
      created_by: "tool:estimator.py --robustness"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "same data, alternate thresholds/metrics"
    body_sections: ["Robustness"]
  - id: F4
    statement: >-
      Exploratory operator-concordance diagnostic: three of four operator
      pairs are mutually concordant (median per-brand full-readout distance
      .0009-.0020 across OP1/OP2/OP3 combinations) while every OP4-involving
      combination is five-to-ten-fold larger (median .0101-.0125, max .0755) —
      the floor inflation localizes to one operator pair.
    antecedents: [m1, m3]
    provenance:
      created_by: "tool:estimator.py exploratory.operator_concordance"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "exploratory; no protected alpha"
    body_sections: ["Localizing the Discordant Operator"]
  - id: F5
    statement: >-
      The cross-extractor diagnostic localizes the OP4 discordance primarily
      to the renderer role: all four extractor families score the
      OP4-rendered prose substantially lower on Economic and Temporal
      dimensions than the OP1-rendered prose of the same brand-channel cell,
      while on OP1 prose the four extractors agree; the OP4 extractor
      additionally amplifies the divergence with the most extreme readings.
    antecedents: [O3, F4]
    provenance:
      created_by: "tool:crossextract diagnostic"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "exploratory; single brand-channel cell; 8 calls"
    body_sections: ["Localizing the Discordant Operator"]
  - id: F6
    statement: >-
      Exploratory leave-one-operator-out sensitivity: holding out OP4 restores
      resolution (14 of 136 pairs resolved) while holding out any concordant
      pair leaves 0 resolved; within the concordant triplet the metameric
      fractions are .500 for the scalar score (7/14; bootstrap 95 percent CI
      .000-.846), .286 for the ranking (4/14; CI .000-1.000), and .929 for the
      binary pick (13/14; CI .750-1.000).
    antecedents: [F4, M7, m1]
    provenance:
      created_by: "tool:estimator.py exploratory.leave_one_operator_out + concordant_subset"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "exploratory; operator subset selected post hoc by the symmetric leave-one-out table"
    body_sections: ["The Concordant-Triplet Picture"]
  - id: F7
    statement: >-
      Within the concordant triplet the severity ordering runs in the frozen
      prediction's direction — fraction(pick) > fraction(score) >
      fraction(rank) > fraction(full) = 0 — but the score-versus-rank paired
      contrast does not reach the pre-registered threshold (McNemar exact,
      6 score-only vs 3 rank-only discordant pairs, p = .254), while
      fraction(rank) > 0 does (Holm-adjusted p < .001).
    antecedents: [F6]
    provenance:
      created_by: "tool:estimator.py test_h2 on the concordant subset"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "exploratory; n_resolved = 14 limits power"
    body_sections: ["The Concordant-Triplet Picture"]
  - id: F8
    statement: >-
      Within the concordant triplet the scalar fraction is stable across
      operator pairs (per-pair fractions .277 / .563 / .419 under
      leave-one-operator-out floors; dispersion .286 within the pooled
      bootstrap half-width .423) — the H3 stability pattern holds
      exploratorily where concordance holds.
    antecedents: [F6]
    provenance:
      created_by: "tool:estimator.py test_h3 on the concordant subset"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "exploratory"
    body_sections: ["The Concordant-Triplet Picture"]
  - id: F9
    statement: >-
      Prompt-ablation robustness: 19 of 20 ablated-prompt readings (95
      percent) sit within one operator floor of their main-prompt readings
      (median shift .24 floors, maximum 1.99), so prompt wording is not the
      dominant noise source.
    antecedents: [O2, M7]
    provenance:
      created_by: "tool:estimator.py exploratory.prompt_ablation"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "10 brands x official channel x OP1+OP3, terse renderer prompt"
    body_sections: ["Robustness"]
  - id: F10
    statement: >-
      At the tighter concordant-triplet floor, 10 of 102 same-brand
      cross-channel pseudo-pairs flag as metameric (9.8 percent): a brand's
      official-channel and social-channel readings can be structurally
      distinct on the full readout yet carry identical scalar grades —
      within-brand channel-facet metamerism that doubles as the specificity
      boundary of the tighter floor.
    antecedents: [F6, M6]
    provenance:
      created_by: "tool:estimator.py negative_control on the concordant subset"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "exploratory"
    body_sections: ["The Concordant-Triplet Picture", "Limitations"]

negative_findings:
  - id: NF1
    statement: >-
      Even within the concordant triplet no single pair clears the strict
      pre-registered H1 interval criterion (channel-resampled bootstrap
      full-readout S/N lower bound > 2 AND aggregator S/N upper bound < 1):
      with four channels per brand the per-pair bootstrap intervals are too
      wide, so H1 remains unconfirmed at every floor tested.
    antecedents: [F6]
    provenance:
      created_by: "tool:estimator.py test_h1 on the concordant subset"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "4 channels/brand bounds the resampling resolution"
    body_sections: ["Confirmatory Results", "Limitations"]

# ============================================================================
# Derivations
# ============================================================================
derivations:
  - id: D1
    statement: >-
      The wholesale sub-resolution verdict is the no-rescue floor rule
      operating as designed: one discordant cross-family operator inflates
      every brand's operator floor (floor = max pairwise across operator
      pairs), and the pre-registered discipline forbids dropping the
      discordant operator to rescue findings — the instrument's refusal IS the
      measurement.
    antecedents: [F1, F4, C5]
    evidence:
      - type: citation
        anchor: "nested-floor no-rescue logic"
        citation_keys: [zharnikov-2026ay-substrate-floor]
        citation_role: applies
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["What the Floors Measured"]
  - id: D2
    statement: >-
      The concordant-triplet point estimates are consistent with the
      garbling-severity account (coarser readouts destroy more resolvable
      structure) but the design's resolved-pair count (14) is below the n
      needed for the paired ladder contrast at alpha .017 — the ladder is
      demonstrated as instrument output, not confirmed as hypothesis.
    antecedents: [F6, F7]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Concordant-Triplet Picture"]

# ============================================================================
# Alternative explanations
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      Rival: scalar collisions merely reflect the 11-grade quantization of the
      score, not perceptual garbling. Partially addressed: the scalar floor is
      measured on the same quantized scale, so sub-floor collisions are the
      deployed readout's real behavior; and the ten-slot ranking (comparable
      cardinality) destroys fewer distinctions than the eleven-grade score,
      which a pure-quantization account does not predict.
    antecedents: [F6, F7]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Alternative Explanations"]
  - id: A2
    statement: >-
      Rival: OP4 is a malfunctioning operator rather than a different
      observer. Rejected: its renders are coherent prose that all four
      extractor families read consistently (lower on the same dimensions), it
      passed the same smoke and parse gates as the other operators, and its
      extreme-but-systematic readings are exactly what a differently-trained
      observer looks like to a metameric instrument.
    antecedents: [F5, O3]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Localizing the Discordant Operator"]
  - id: A3
    statement: >-
      Rival: the concordant extractors' positivity compression (readings
      concentrated in the 6-9 band) could deflate true profile distances and
      thereby inflate apparent scalar collisions. Acknowledged as a
      limitation; the planted positive control shows the estimator flags
      genuinely distinct profiles when they exist, but compression bounds the
      separations the full readout can exhibit for real prominent brands.
    antecedents: [F6]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Alternative Explanations", "Limitations"]

