spine_version: "0.2"
spine_doc_version: "0.1.0"
paper_key: "2026az"
self_citation_key: zharnikov-2026az-prism-m-metamerism
concept_doi: 10.5281/zenodo.21125785                  # always resolves to latest version
version_doi: 10.5281/zenodo.21125786                  # v1.0.0
provenance: generative
title: >-
  Measuring Perceptual Indistinguishability: A Pre-Registered Metamerism
  Instrument for AI Brand Perception (PRISM-M)
status: >-
  Spine locked after the frozen PL0 campaign completed (Stage 1 + Stage 2 +
  controls + robustness, 2026-07-02). Drafting proceeds against this spine.

thesis: |
  Indistinguishability under a coarse readout is measurable, not assertable.
  PRISM-M supplies a general dual-floor procedure for testing observational
  equivalence in any high-dimensional perceptual instrument — a pair of
  entities counts as a measured metamer only when the full readout resolves
  them beyond the instrument's own operator noise floor while the coarse
  readout (its own floor measured separately) does not — and demonstrates the
  procedure end-to-end on AI brand perception, where the eight-dimension
  profile is the full readout and a brand-health score, a recommendation
  ranking, and a binary pick are the aggregators under test. The pre-registered
  campaign returns a boundary result that showcases the discipline: with four
  cross-family operator pairs, one renderer reads brands so differently that
  every brand's operator floor swallows every pairwise distinction — the
  instrument reports wholesale sub-resolution rather than manufacturing
  findings (the no-rescue rule), while its diagnostics localize the discordance
  to a single operator role and its exploratory concordant-triplet analysis
  shows the predicted metameric structure (half of resolvable distinctions
  destroyed by the scalar score; the binary pick destroying nearly all;
  the ranking fewest) below confirmatory strength. The metameric fraction is
  thereby delivered as an instrument: frozen protocol, measured floors,
  planted-positive and same-brand-negative controls, seeded estimator, and a
  concordance diagnostic that tells the consumer of any aggregate metric
  exactly when the question "what did this number destroy?" can and cannot be
  answered.

# ============================================================================
# Boundary conditions
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      PRISM-M measures the deployed AI-observer surface: model-internalized
      public-artifact exposure elicited through four standardized artifact
      channels (official communications, press, experience reports, social
      discourse). Human-panel metamerism is out of scope (a separate
      human-subjects instrument is required for human-perception claims).
  - id: C2
    statement: >-
      Metameric fractions are reported per frozen bank and per aggregator,
      never as universal constants; the bank spans five coherence types and
      two sectors under an explicit stratified frame.
  - id: C3
    statement: >-
      Floors are informative only with at least two cross-family operator
      pairs and at least two artifact channels per brand; below that the
      instrument reports sub-resolution by construction.
  - id: C4
    statement: >-
      Single-epoch instrument: all readings taken from one model generation
      (pinned operator IDs, July 2026); temporal drift across model versions
      is a separate instrument's province.
  - id: C5
    statement: >-
      Resolution claims are conditional on cross-family operator concordance;
      a discordant operator pair legitimately suppresses resolution under the
      no-rescue floor rule rather than being dropped to rescue findings.

