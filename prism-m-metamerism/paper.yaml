limitations:
- description: 'Single epoch, four pinned operator pairs: the concordance structure is a property of these
    model versions at this date, not of the families in general.'
  severity: moderate
  addressable: true
- description: 'Four artifact channels per brand bound the channel-resampled bootstrap: the strict H1
    interval criterion is underpowered at this design size, so H1''s failure at the interval criterion
    is partly a design-resolution statement (a larger channel set is the remedy, not a different criterion).'
  severity: moderate
  addressable: true
- description: 'AI-observer surface only: readings elicit the models'' internalized public-artifact exposure
    through channel-conditioned prompts rather than grounding on fetched artifact excerpts; fetched-artifact
    grounding and human panels are separate instruments'' provinces.'
  severity: moderate
  addressable: true
- description: 'Fractions are bank-relative: the frozen bank spans five coherence types and two sectors
    but is 40 brands from one index frame; the fraction is a property of (bank, aggregator, operator set),
    reported as such.'
  severity: moderate
  addressable: true
- description: 'English-language readings only: all renders and extractions are English-prompted, so the
    measured surface is the English-language AI-observer surface; native-language operators are required
    before any claim extends to non-English observation, per the base instrument''s own language discipline.'
  severity: moderate
  addressable: true
- description: 'Two stated modeling choices: brand vectors pool the four channels with equal weight (channel
    salience is not modeled), and the eleven-grade A-SCORE scale maps linearly onto [0,1] (ordinal-to-interval
    linearity assumed, mitigated by measuring the scalar floor on the same mapped scale).'
  severity: moderate
  addressable: true
