spec_version: 0.1.0
meta:
  title: 'Measuring Perceptual Indistinguishability: A Pre-Registered Metamerism Instrument for AI Brand
    Perception (PRISM-M)'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.21125785
  date: '2026-07-01'
  venue: Behavior Research Methods
  license: CC-BY-4.0
  keywords:
  - metamerism
  - observational equivalence
  - measurement instrument
  - noise floor
  - signal detection
  - brand perception
  - AI observers
  - preregistration
  abstract: 'When two entities with structurally distinct multi-dimensional perception profiles receive
    identical aggregate readouts — one health score, one ranking slot, one binary pick — the distinction
    the full instrument could see has been destroyed. Existing treatments assert such indistinguishability;
    this paper measures it. PRISM-M is a pre-registered instrument built on a dual-floor procedure: a
    pair counts as a measured metamer only when the full readout resolves it beyond the instrument''s
    own operator noise floor while the aggregate readout, with its own separately measured floor, does
    not. The procedure is demonstrated end-to-end on AI brand perception: 40 brands from a stratified
    public-index frame, read through four artifact channels by four cross-family operator pairs, against
    a battery of three aggregators (scalar score, ranking, binary pick), with planted-positive and same-brand-negative
    controls. The pre-registered campaign returns a boundary result that exhibits the discipline: one
    discordant renderer inflates every noise floor, and the instrument reports wholesale sub-resolution
    rather than manufacturing findings, while its concordance diagnostic localizes the discordance and
    exploratory analysis of the concordant operator triplet shows the predicted metameric structure —
    half of resolvable brand distinctions destroyed by a scalar score.'
claims:
- id: P1
  type: proposition
  statement: 'Indistinguishability under a coarse readout is a measurable quantity: the dual-floor procedure
    (full-instrument operator floor + the coarse readout''s own floor, both measured from cross-family
    operator dispersion) turns "these two are indistinguishable" from an assertion into a falsifiable
    classification with planted-positive and same-brand negative controls, and the procedure is instrument-general
    — any high-dimensional perceptual readout paired with any coarser projection of it can be tested the
    same way.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: 'The metameric fraction operationalizes spectral metamerism for AI brand perception: the
    share of resolvable brand distinctions an aggregate readout destroys, per frozen bank and aggregator,
    with a source-cluster bootstrap interval — moving the corpus claim "aggregate scores destroy brand
    distinctions" from geometric theorem and demonstration to a reusable measured quantity, whose first
    pre-registered campaign returns sub-resolution at the four-family floor and .500 (scalar) within the
    concordant triplet, exploratorily.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'Garbling severity is an ordered, testable property of aggregators: the battery formalizes
    scalar score, ranking, and binary pick as projections with measured floors, and the campaign''s point
    estimates run in the predicted monotone direction (binary > scalar > ranking > full = 0), with the
    paired scalar-versus-ranking contrast below confirmatory strength at the achieved resolved-pair count.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P4
  type: proposition
  statement: 'Resolution claims are operator-conditional, and that conditionality is itself measurable:
    the concordance diagnostic (per-operator-pair distance table plus cross-extractor localization) tells
    the consumer of an aggregate metric whether the instrument''s floors permit any distinction claims
    at all, and localizes discordance to a role (renderer versus extractor) when they do not — the refusal-to-resolve
    discipline of the substrate-floor account applied to indistinguishability measurement.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P5
  type: proposition
  statement: 'For claims about the deployed AI-mediated surface, AI observers are the construct rather
    than a proxy: the readouts under test (scores, rankings, picks produced by AI systems) are consumed
    as-is downstream, so validating them against human panels would validate a different construct; human
    convergent validity becomes necessary exactly when the claim extends to human perception.'
  testable: true
  tested_in_paper: true
  status: not_tested
methodology:
  type: empirical
  design: 'Frozen pre-registered protocol (PL0): three hypotheses (H1 existence of measured metamers;
    H2 garbling-severity monotonicity; H3 cross-operator stability), the metamer criterion (resolved on
    the full readout at S/N > 2 AND unresolved on the aggregator at S/N < 1, floors measured), the Stage-1
    retention rule, family-wise alpha .05 Bonferroni-split to .017 per hypothesis, stopping rules, and
    the confirmatory/exploratory boundary. Stratified stimulus frame: a named public brand index (Interbrand
    Best Global Brands top-100) stratified by five SBT coherence types x B2C/B2B, four brands per cell
    (40 total), with a pre-registered supplementation rule for structurally thin strata, per-brand goods-type
    covariate, and balance diagnostics reported at PL4. Channel-conditioned AI-observer reading: each
    brand is read through four standardized public-artifact channels (official, press, experience, social);
    a renderer model writes 250-400 words of channel-conditioned analytical prose from its public-artifact
    exposure, and a different-family extractor converts the prose to the eight-dimension vector — renderer
    and extractor families never coincide, and each family carries both roles across the operator set.'
acceptance:
- claim_id: P1
  criterion: 'Holds if indistinguishability under a coarse readout is a measurable quantity: the dual-floor
    procedure (full-instrument operator floor + the coarse readout''s own floor, both measured from cross-family
    operator dispersion) turns "these two are indistinguishable" from an assertion into a falsifiable
    classification with planted-positive and same-brand negative controls, and the procedure is instrument-general
    — any high-dimensional perceptual readout paired with any coarser projection of it can be tested the
    same way.'
  falsification: A planted scalar-equal profile-distinct pair the estimator fails to flag, or a same-brand
    pseudo-pair population it flags at the frozen floor, falsifies the procedure's sensitivity/specificity
    claims.
- claim_id: P2
  criterion: 'Holds if the metameric fraction operationalizes spectral metamerism for AI brand perception:
    the share of resolvable brand distinctions an aggregate readout destroys, per frozen bank and aggregator,
    with a source-cluster bootstrap interval — moving the corpus claim "aggregate scores destroy brand
    distinctions" from geometric theorem and demonstration to a reusable measured quantity, whose first
    pre-registered campaign returns sub-resolution at the four-family floor and.'
  falsification: A campaign under the same frozen protocol finding the scalar fraction indistinguishable
    from zero at a concordant floor would bound the garbling claim at the measured scale.
- claim_id: P3
  criterion: 'Holds if garbling severity is an ordered, testable property of aggregators: the battery
    formalizes scalar score, ranking, and binary pick as projections with measured floors, and the campaign''s
    point estimates run in the predicted monotone direction (binary > scalar > ranking > full = 0), with
    the paired scalar-versus-ranking contrast below confirmatory strength at the achieved resolved-pair
    count.'
  falsification: A reversed ordering (ranking destroying more than the scalar, or the full readout destroying
    anything) under a concordant floor.
- claim_id: P4
  criterion: 'Holds if resolution claims are operator-conditional, and that conditionality is itself measurable:
    the concordance diagnostic (per-operator-pair distance table plus cross-extractor localization) tells
    the consumer of an aggregate metric whether the instrument''s floors permit any distinction claims
    at all, and localizes discordance to a role (renderer versus extractor) when they do not — the refusal-to-resolve
    discipline of the substrate-floor account applied to indistinguishability measurement.'
  falsification: An operator set whose concordance diagnostic shows tight agreement while leave-one-out
    floors still flip the resolution verdict.
- claim_id: P5
  criterion: 'Holds if for claims about the deployed AI-mediated surface, AI observers are the construct
    rather than a proxy: the readouts under test (scores, rankings, picks produced by AI systems) are
    consumed as-is downstream, so validating them against human panels would validate a different construct;
    human convergent validity becomes necessary exactly when the claim extends to human perception.'
  falsification: Evidence that downstream consumption surfaces re-anchor on human panels rather than AI
    readouts would shift the validity burden back.
