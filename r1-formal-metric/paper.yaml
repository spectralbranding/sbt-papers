results:
  - claim_id: "D1"
    status: supported
    notes: >
      The Aitchison distance is defined and its three justifying properties (scale invariance,
      Weber-Fechner consistency, subcompositional coherence) are demonstrated. The clr and ilr
      transforms are standard from Aitchison (1986).

  - claim_id: "T1"
    status: supported
    notes: >
      Full proof presented in Section 3.3. All four metric axioms verified via ilr isometry.
      The proof is complete and rigorous by standard mathematical standards.

  - claim_id: "D2"
    status: supported
    notes: >
      Fisher-Rao metric defined; four candidate metrics compared against three selection
      criteria; Cencov uniqueness theorem cited as decisive justification for Fisher-Rao.

  - claim_id: "T2"
    status: supported
    notes: >
      Full proof presented in Section 4.4. M1-M4 verified via embedding into S^7_+.
      Entropy-bulge Proposition 1 proved via Schur-concavity of Shannon entropy.

  - claim_id: "D3"
    status: supported
    notes: >
      Warped product metric defined; INDSCAL connection (Prop 2) proved; pseudo-metric
      kernel characterized (Prop 3). Full mathematical definition provided.

  - claim_id: "T3"
    status: supported
    notes: >
      Metric axioms for combined space proved in Section 5.2. Triangle inequality proof
      references O'Neill (1983) for the warped product case with a note that the full
      derivation is in the Mathematical Appendix.

  - claim_id: "T4"
    status: supported
    notes: >
      Closed-form computation presented using Dirichlet distribution moments (Johnson & Kotz,
      1972). Result: 7/36 for n=8. Monte Carlo verification not performed in-paper but
      trivially executable.

  - claim_id: "P4"
    status: supported
    notes: >
      Volume fraction 1/256 proved by sphere symmetry under sign reflections. Expected inner
      product positivity on S^7_+ proved by non-negativity of coordinates. Maximum geodesic
      distance pi/2 established.

  - claim_id: "D7"
    status: supported
    notes: >
      SSI formally defined. Curvature properties of Aitchison geometry near boundary analyzed.
      Corollary (structural absence amplifies sensitivity) proved. Application to case study
      brands not computed numerically in-paper.

  - claim_id: "P6"
    status: supported
    notes: >
      Observer-dependent curvature formula derived from O'Neill (1983). Strategic implication
      (specialist observers face higher trajectory sensitivity) argued from formula structure.

limitations:
  - description: >
      All case study brand profiles are author-assigned (Hermes, IKEA, Patagonia, Erewhon,
      Tesla). The metric is applied to illustrative profiles, not survey-derived measurements.
      The distance matrix and geometric properties are demonstrated on these author-assigned
      profiles only.
    severity: major
    addressable: true

  - description: >
      The Aitchison metric treats the eight SBT dimensions as independent compositional
      components. If dimensions are empirically correlated (semiotic and cultural may co-vary),
      the metric systematically underestimates distances along correlated dimensions. A
      Mahalanobis-like extension incorporating empirical correlation structure is discussed
      in Section 10 but not implemented.
    severity: moderate
    addressable: true

  - description: >
      The Jacobi field analysis and spectral sensitivity index are derived for the theoretical
      perception manifold. The SSI is not computed numerically for the case-study brands;
      only qualitative implications are drawn. Numerical computation requires specifying the
      warping function f(w) explicitly.
    severity: minor
    addressable: true

  - description: >
      The combined space metric (D3) uses a symmetrized average weight w_bar_k = (w_{A,k} +
      w_{B,k})/2. An asymmetric version using only w_{A,k} would model "perceived distance
      from observer A's perspective" — a directed metric useful for modeling asymmetric brand
      relationships. This case is not developed.
    severity: minor
    addressable: true

