results:
- claim_id: P7
  status: supported
  notes: 'Brand distance is NOT an objective property of brands but a function of the observer''s attentional
    structure: the same brand pair can be perceived as close by one cohort and far by another (the Hermes-IKEA
    reversal). This is the paper''s central result — different observer cohorts inhabit metrically distinct
    brand landscapes — turning SBT''s qualitative claim into a theorem.'
- claim_id: P9
  status: supported
  notes: 'Brand distance is NOT an objective property of brands but a function of the observer''s attentional
    structure: the same brand pair can be perceived as close by one cohort and far by another (the Hermes-IKEA
    reversal). This is the paper''s central result — different observer cohorts inhabit metrically distinct
    brand landscapes — turning SBT''s qualitative claim into a theorem.'
- claim_id: P10
  status: supported
  notes: 'The n=8 concentration baseline (~.44) and the 1/256 octant compression jointly establish that
    meaningful brand differentiation is geometrically constrained: random observer variation alone produces
    a non-trivial expected distance, and the non-negativity constraint shrinks the available brand space,
    so differentiation requires deliberate positioning, not random dimensional variation.'
limitations:
- description: The Aitchison metric and warped product assume dimensional independence; empirically correlated
    dimensions would require a Mahalanobis-Aitchison variant with an estimated correlation matrix (§10.2).
  severity: moderate
  addressable: true
- description: The five case-study numerical profiles are ILLUSTRATIVE (constructed from qualitative assessments),
    not empirical measurements; the distance results demonstrate the framework's behavior, not empirical
    facts about the brands.
  severity: moderate
  addressable: true
- description: The core metric treats brand profiles and observer weights as STATIC points; the dynamic
    extension (perception evolution as an SDE on S^7_+, with feedback coupling between w and s) is deferred
    to R6 (2026j) / R9 (2026o). Jacobi-field analysis (§8) is only the deterministic bridge.
  severity: moderate
  addressable: true
- description: 'Boundary incompleteness: the brand space is the OPEN orthant and the observer space the
    OPEN simplex; true-zero structural absence and dimension-blind observers lie outside the strict domain
    and require zero-replacement / limiting arguments. The Riemannian framework is itself a first-order
    approximation (brand perception may be non-Riemannian, an open empirical question by analogy to color
    space).'
  severity: moderate
  addressable: true
- description: All five case-study brands are Western B2C brands; cross-cultural and B2B applications
    (where experiential/temporal may dominate and semiotic may be minimal) are untested.
  severity: moderate
  addressable: true
- description: 'Ordinal-data caveat: brand surveys typically yield ordinal (Likert) responses; applying
    the Aitchison metric to raw ordinal scores assumes interval scale. A monotone/latent-variable transformation
    (Liddell-Kruschke) should precede metric application.'
  severity: moderate
  addressable: true
