methodology:
  type: mixed
  design: 'Compute the pairwise Aitchison distance matrix for the five brands: centered-log-ratio transform
    each profile (geometric mean, then log(s_k / g(s))), then take the Euclidean norm of clr differences.
    Compute observer-dependent brand distances d_w(s_A,s_B) = sqrt(sum_k w_k (clr_k(s_A) - clr_k(s_B))^2)
    for the aesthete and pragmatist observers on selected brand pairs (Hermes-IKEA, Hermes-Patagonia).
    Derive the n=8 distance-concentration baseline analytically: for points uniform on Delta^7 (symmetric
    Dirichlet), use the Dirichlet moments to compute E[||w_A - w_B||^2] = 2(n-1)/(n(n+1)) and the volume
    fraction of the positive octant from sphere-orthant symmetry.'
  analysis:
    software: sbt-papers/r1-formal-metric/code/ (Python reference implementation; NumPy)
    method: Python 3.12 + NumPy
