results:
- claim_id: P1
  status: supported
  notes: No prior brand-dynamics model combines a multi-dimensional metric state space, Riemannian geometry,
    absorbing boundaries, and conditional non-ergodicity simultaneously; the SDE on S^7_+ does, recovering
    the Sriram et al. (2007) scalar AR(1) dynamics as the low-dimensional, no-boundary limit and differing
    structurally from the Netzer et al. (2008) finite-state resurrecting HMM.
