results:
  - claim_id: "T1"
    status: supported
    notes: >
      Proved analytically using Ito existence and uniqueness theorem applied to
      manifold-valued SDEs. The Lipschitz conditions are verified for the specific
      drift and diffusion coefficients used.

  - claim_id: "T2"
    status: supported
    notes: >
      Proved analytically using first-passage time theory for diffusions on bounded
      intervals. Numerical illustration confirms the exponential decay rate formula.
      Empirical validation pending.

  - claim_id: "T3"
    status: supported
    notes: >
      Proved using spectral theory of the generator. The spectral gap Delta is bounded
      below by a function of the manifold curvature and the diffusion coefficient.

  - claim_id: "T4"
    status: supported
    notes: >
      Proved analytically from the definition of ergodicity and the existence of
      absorbing boundaries. This is the central result of the paper. Empirical
      validation pending — see Zharnikov (2026o) for the bridge to consumer-language
      predictions.

  - claim_id: "P5"
    status: supported
    notes: >
      Derived as a corollary of T4 using stochastic dominance arguments. Not
      independently tested.

  - claim_id: "P6"
    status: supported
    notes: >
      Derived analytically using Dynkin's formula for expected first-passage times.
      The O(1/epsilon^2) scaling is confirmed by numerical simulation.

  - claim_id: "P7"
    status: supported
    notes: >
      Derived analytically for the baseline parameter regime. The interval [0.55, 0.65]
      is sensitive to sigma_0 and lambda — see sensitivity analysis in Section 7.6.
      This result transforms the D/A Goldilocks claim from assertion to derivation.

limitations:
  - description: >
      The Brownian motion model on S^7_+ assumes perception updates are multiplicative
      (each signal scales prior perception). If perception updates are additive, the
      dynamics are ergodic and T4 does not apply. Sufficiency conditions for the
      multiplicative regime are derived in companion paper Zharnikov (2026o) Section 4.5.
    severity: major
    addressable: true

  - description: >
      The absorbing boundary at X_i = 0 implies total perception loss is irreversible.
      This is inconsistent with observed brand rehabilitations (Tylenol 1982, Samsung
      Note 7). Version 3 of this paper introduces semi-permeable boundaries (P6)
      to address this. The pure absorbing model remains in T1-T4 as a limiting case.
    severity: major
    addressable: true

  - description: >
      The D/A Goldilocks interval [0.55, 0.65] in P7 is derived for a specific
      parameter regime. The interval shifts with sigma_0 and lambda. No calibration
      of these parameters to real brand data has been performed.
    severity: moderate
    addressable: true

  - description: >
      The model uses a homogeneous diffusion coefficient sigma. Real brand perception
      may have dimension-specific volatility (e.g., Economic dimension is more volatile
      during price changes than Temporal dimension).
    severity: moderate
    addressable: true

  - description: >
      The critique of Peters (2019) by Doctor et al. (2020) is addressed in Section 9.2.
      Their critique targets the wealth-dynamics application of Peters' framework;
      the non-ergodicity in this paper arises from a different mechanism (absorbing
      boundaries, not multiplicative wealth dynamics) and is not invalidated by their argument.
    severity: minor
    addressable: false

