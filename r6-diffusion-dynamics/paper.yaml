methodology:
  type: mixed
  design: Formulate perception evolution as a Stratonovich SDE on S^7_+ with three forces — signal-encounter
    drift toward the normalized emission profile s/||s||, decay drift toward the neutral prior x* = (1,...,1)/sqrt(8),
    and isotropic diffusion sigma_0 P_x — each kept tangent to the sphere by the orthogonal projection
    P_x = I - x x^T; absorbing Dirichlet conditions at partial S^7_+. Compute the first Dirichlet eigenfunction
    phi_1(x) = prod_i x_i (a degree-8 homogeneous harmonic polynomial) and its eigenvalue via lambda_ell
    = ell(ell + n - 2); expand survival probability in the Dirichlet eigenbasis (backward heat equation),
    retaining the leading term as t -> infinity. Parametrize the SDE by the designed/ambient ratio r (drift
    scales with r, diffusion with the ambient fraction); set the net absorption rate gamma(r) = lambda_{D,1}
    sigma_0^2 (2 - r)/2 - r alpha lambda_enc d_partial to zero to read off the survival lower bound, sweep
    the drift-strength parameter alpha lambda_enc d_partial over [1.0, 3.0], and combine with the crystallization
    upper bound to bracket r*.
  analysis:
    software: paper §The Brand Perception SDE
    method: Python 3.12 + NumPy (companion script r6_diffusion_dynamics.py)
