limitations:
- description: Headline theorems assume isotropic diffusion and scalar, constant parameters (kappa, alpha,
    sigma_0, lambda_enc); anisotropic Sigma and dimension-specific kappa_i / kappa_R(i) change absorption-risk
    profiles (and could alter the Proposition 7 ordering) but are only sketched.
  severity: moderate
  addressable: true
- description: Observers are modeled independently; real observers influence each other (word-of-mouth,
    social amplification), and positive correlation would raise aggregate variance and accelerate absorption.
    A full treatment needs interacting / mean-field SDEs on S^7_+.
  severity: moderate
  addressable: true
- description: phi_1 = prod_i x_i is treated as the leading Dirichlet eigenfunction candidate, but formal
    minimality on the non-smooth (cornered) octant boundary, and regularity of the higher eigenfunctions
    used for the gap, are reserved for specialist spectral-geometry verification.
  severity: moderate
  addressable: true
- description: All five case studies are global English-language consumer brands; the absorption ordering
    and drift-diffusion parameters may not generalize to B2B, regional/East-Asian, or service-dominant
    brands without recalibration, and the SDE parameters are not yet empirically estimated.
  severity: moderate
  addressable: true
