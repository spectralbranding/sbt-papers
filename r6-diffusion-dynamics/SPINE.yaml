# ============================================================================
# Propositions — the four theorems and three propositions (the argument backbone)
# ============================================================================
propositions:
  - id: P1
    statement: >-
      (Theorem 1, Well-posedness) The brand-perception SDE on S^7_+ with
      absorbing boundary conditions admits a unique strong solution up to the
      first hitting time tau of partial S^7_+; the drift and diffusion
      coefficients are locally Lipschitz with linear growth on compact subsets
      of the interior.
    conditions: "C1, C2"
    antecedents: [M1]
    evidence:
      - type: derivation
        anchor: >-
          Smoothness of P_x, x*, and s/||s|| on the interior + standard SDE
          existence/uniqueness on manifolds, exhausting S^7_+ by compact sets.
        citation_keys: [hsu-2002-stochastic-analysis-manifolds, stroock-2000-introduction-analysis-paths]
    body_sections: ["Well-Posedness"]
  - id: P2
    statement: >-
      (Theorem 2, Survival probability) For zero drift and isotropic diffusion,
      the survival probability decays as S(t,x) ~ C(x) exp(-lambda_{D,1}
      sigma_0^2 t / 2) with lambda_{D,1} = 112; higher noise sigma_0 and
      proximity to the boundary (smaller prefactor C(x)) both accelerate
      absorption.
    conditions: "C1, C2, C3"
    antecedents: [P1, M2, m_eigenvalue]
    evidence:
      - type: derivation
        anchor: "Dirichlet-eigenbasis expansion of the backward heat equation; leading-eigenfunction asymptotics."
      - type: computed
        anchor: "Survival probability table (Table 9) and tau_char ≈ 1.78 at sigma_0 = .1."
    falsifier: "If absorption rate is not proportional to sigma_0^2, or the leading eigenvalue is not 112, Theorem 2 fails."
    body_sections: ["Survival Probability", "Survival Time Estimates"]
  - id: P2a
    statement: >-
      (Corollary to absorption analysis) Under pure Brownian motion (no signal
      drift), absorption is certain — every observer eventually loses at least
      one perceptual dimension for every brand — so signal maintenance is not
      optional but mathematically necessary.
    conditions: "C1, C2"
    antecedents: [P2]
    evidence:
      - type: derivation
        anchor: "Recurrence of Brownian motion on S^7 + Borel-Cantelli: A(x) = 1 for all x in S^7_+."
    body_sections: ["Absorption Probability as a Function of Position"]
  - id: P3
    statement: >-
      (Theorem 3, Mixing time) Conditioned on survival, the process mixes to a
      quasi-stationary distribution pi_QSD ∝ phi_1 with mixing time governed by
      the Dirichlet spectral gap lambda_{D,2} - lambda_{D,1} = 48, which is
      FASTER than the full-sphere mixing time (gap 7): confinement to the deep
      interior of the octant shrinks the explorable volume.
    conditions: "C1, C2"
    antecedents: [P1, P2, m_eigenvalue]
    evidence:
      - type: derivation
        anchor: "Spectral-gap control of QSD mixing; degree-8 vs degree-10 odd-in-every-coordinate eigenfunctions."
        citation_keys: [cattiaux-2009-quasistationary-distributions-diffusion]
    falsifier: "If the second odd-parity Dirichlet eigenfunction is not degree 10, the gap (and the faster-mixing claim) changes."
    body_sections: ["Mixing Time on S^7_+", "Mixing Time and Non-Ergodicity"]
  - id: P4
    statement: >-
      (Theorem 4, Non-ergodicity) For the absorbed process with zero drift, the
      time average of any bounded observable with nonzero spatial mean converges
      to 0 almost surely while the ensemble average is generically nonzero —
      time and ensemble averages diverge with probability 1. Ensemble surveys
      therefore systematically overstate any individual observer's time-averaged
      perception (brand health is not brand power).
    conditions: "C1, C2"
    antecedents: [P2a, P3]
    evidence:
      - type: derivation
        anchor: >-
          Absorption at finite tau freezes the time-integral numerator while the
          1/T factor sends the time average to 0; ensemble mean is nonzero by
          assumption.
        citation_keys: [collet-2013-quasistationary-distributions-markov]
    falsifier: "If absorption were not almost sure (no absorbing boundary), the time and ensemble averages would coincide."
    body_sections: ["Non-Ergodicity Theorem", "The Ergodicity Coefficient"]
  - id: P4a
    statement: >-
      (Conditional non-ergodicity corollary) With active drift, the time average
      is 0 with probability (1 - p_inf) and equals the QSD mean with probability
      p_inf; it equals the ensemble average only when p_inf = 1 (no absorption).
      Brands with higher absorption risk are thus more non-ergodic — their
      ensemble surveys are less representative of individual trajectories.
    conditions: "C1, C2"
    antecedents: [P4]
    evidence:
      - type: derivation
        anchor: "Mixture decomposition of the long-run time average over the survival/absorption event."
    body_sections: ["Conditional Non-Ergodicity with Drift"]
  - id: P5
    statement: >-
      (Proposition 5, Recovery time scaling) Under the semi-permeable boundary
      model (reflecting drift on the open near-death zone (0, epsilon), absorbing
      at 0), the expected return time to threshold epsilon from residual
      perception delta scales as tau_return(delta) ~ C_R / delta^2: halving the
      distance to zero quadruples recovery time — a gravitational-well effect
      near total loss.
    conditions: "C1, C2"
    antecedents: [P2, m_eigenvalue]
    evidence:
      - type: derivation
        anchor: >-
          One-dimensional diffusion scale-function / speed-measure hitting-time
          analysis with degenerate drift kappa_R(epsilon - y)/y.
        citation_keys: [collet-2013-quasistationary-distributions-markov, casteras-2024-stickyreflecting-diffusion-as]
      - type: case_evidence
        anchor: "Tylenol (large delta, high epsilon) recovers fast; BP (small delta, weak reserves) does not — illustrative, not a precise prediction."
        citation_keys: [coombs-2007-protecting-organization-reputations]
    falsifier: "Falsified if documented brand-crisis recovery times do not scale ~1/delta^2 in residual-dimension severity, controlling for response strategy and pre-crisis profile."
    body_sections: ["Recovery Time Scaling", "Application: Tylenol vs. BP"]
  - id: P6
    statement: >-
      (Proposition 6, D/A Goldilocks zone) The designed/ambient ratio r trades
      absorption against exploration: too little design (r < .55) risks
      absorption, too much (r > .65) suppresses the stochastic exploration that
      crystallizes perception. A sensitivity analysis at the representative
      drift-strength midpoint recovers r* in [.55, .65], consistent with the
      empirically observed optimal D/A range — a calibration that is coherent
      with the observed interval, not a unique first-principles derivation.
    conditions: "C1, C2, C3"
    antecedents: [M3, m_da_zone]
    evidence:
      - type: computed
        anchor: "gamma(r) = 0 survival bound + crystallization upper bound; Table 5 drift-strength sensitivity sweep."
    falsifier: "Falsified if the empirically optimal D/A ratio across 50+ brands does not concentrate in [.55, .65], or varies with sigma_0 unpredictably."
    body_sections: ["The Optimal Range", "Deriving the D/A Goldilocks Zone"]
  - id: P7
    statement: >-
      (Proposition 7, Absorption ordering) For the five case-study brands the
      drift-adjusted absorption ordering Tesla > Erewhon > IKEA > Patagonia >
      Hermès nearly matches the SBT coherence grading (C- > B- > B+ > A- > A+),
      with one inversion: IKEA (A-) outranks Patagonia (B+) in risk because
      identity coherence generates stronger directional drift than signal
      coherence — coherence TYPE, not the letter grade, determines dynamical
      stability.
    conditions: "C1, C2"
    antecedents: [M4, m_brand_dpartial, P2]
    evidence:
      - type: computed
        anchor: "Distance-from-boundary ordering (Table 6) reordered by coherence-conditional drift strength (Table 8)."
    falsifier: "Falsified if observed frequency of dimensional collapse in tracking data does not rank Tesla > Erewhon > IKEA > Patagonia > Hermès, controlling for encounter rate and noise."
    body_sections: ["Absorption Risk Ordering"]
  - id: P8
    statement: >-
      The dynamical framework formalizes the vectorized-vs-rasterized
      distinction: a single snapshot X_t carries no information about the
      trajectory's velocity, drift direction, boundary proximity, or absorption
      probability — these are trajectory-level quantities, so managing a brand
      is a trajectory-optimization problem, not a position-optimization problem.
    conditions: "C1, C2"
    antecedents: [P4, P7]
    evidence:
      - type: analytic
        anchor: "Snapshot X_t determines none of dot-X_t, d_partial(X_t), or P[tau < t+T]."
    body_sections: ["The Vectorized-Rasterized Distinction Revisited", "Implications for Brand Strategy"]

# ============================================================================
# Findings — what the computed results demonstrate
# ============================================================================
findings:
  - id: F1
    statement: >-
      No prior brand-dynamics model combines a multi-dimensional metric state
      space, Riemannian geometry, absorbing boundaries, and conditional
      non-ergodicity simultaneously; the SDE on S^7_+ does, recovering the
      Sriram et al. (2007) scalar AR(1) dynamics as the low-dimensional,
      no-boundary limit and differing structurally from the Netzer et al. (2008)
      finite-state resurrecting HMM.
    type: "modeling_gap_closed"
    source_measurements: [m_eigenvalue]
    generating_method: M2
    antecedents: [P1, P2, P3, P4]
    citation_role_in_paper: "positioning_against_prior_art"
    body_sections: ["Introduction (Table 1 comparison)", "Contributions"]
  - id: F2
    statement: >-
      Coherence type is the determinant of absorption-risk ordering: the
      near-match between the dynamical absorption ordering and the SBT coherence
      grades — with the single IKEA/Patagonia inversion — is, to the author's
      knowledge, the first formal derivation within SBT connecting coherence type
      to dynamical stability from first principles.
    type: "first_formal_derivation"
    source_measurements: [m_brand_dpartial]
    generating_method: M4
    antecedents: [P7]
    citation_role_in_paper: "primary_evidence_for_P7"
    body_sections: ["Absorption Risk Ordering"]

# ============================================================================
# Alternative explanations — rivals the non-ergodicity claim must clear
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      The non-ergodicity result is merely a restatement of Peters' (2019)
      ergodicity-economics claim and stands or falls with it.
    rules_out_required: [P4]
    ruled_out_by: [P4]
    rules_out_status: "rejected"
    reasoning: >-
      Peters' argument depends on multiplicative dynamics in unbounded wealth
      space; Theorem 4 depends on absorbing boundaries on a compact manifold
      (finite-time killing). The machinery — Dirichlet spectral gap, stopping
      time tau, QSD — predates and is independent of Peters' economic model, and
      time-ensemble divergence for absorbed processes is a standard
      quasi-stationary-distribution result.
    body_sections: ["The Time-Average Perspective"]
  - id: A2
    statement: >-
      The non-ergodicity is just classical Birkhoff non-ergodicity (a
      measure-preserving transformation failing to be ergodic).
    rules_out_required: [P4]
    ruled_out_by: [P4]
    rules_out_status: "rejected"
    reasoning: >-
      Birkhoff's theorem requires a measure-preserving transformation, but
      absorption removes probability mass from S^7_+, violating
      measure-preservation; the mechanism is boundary-absorption, distinct from
      both Birkhoff and Peters.
    body_sections: ["The Time-Average Perspective"]

# ============================================================================
# Limitations — honest scope
# ============================================================================
limitations:
  - id: L1
    statement: >-
      Headline theorems assume isotropic diffusion and scalar, constant
      parameters (kappa, alpha, sigma_0, lambda_enc); anisotropic Sigma and
      dimension-specific kappa_i / kappa_R(i) change absorption-risk profiles
      (and could alter the Proposition 7 ordering) but are only sketched.
    severity: "scope-bounding"
    affects: [P2, P5, P7]
    body_sections: ["Limitations (items 1, 2, 6)", "Encounter Modes and Diffusion Anisotropy"]
  - id: L2
    statement: >-
      Observers are modeled independently; real observers influence each other
      (word-of-mouth, social amplification), and positive correlation would raise
      aggregate variance and accelerate absorption. A full treatment needs
      interacting / mean-field SDEs on S^7_+.
    severity: "scope-bounding"
    affects: [P4, P7]
    body_sections: ["Limitations (item 3)"]
  - id: L3
    statement: >-
      phi_1 = prod_i x_i is treated as the leading Dirichlet eigenfunction
      candidate, but formal minimality on the non-smooth (cornered) octant
      boundary, and regularity of the higher eigenfunctions used for the gap,
      are reserved for specialist spectral-geometry verification.
    severity: "rigor-gap"
    affects: [P2, P3]
    body_sections: ["The Dirichlet Laplacian on S^7_+", "Limitations (item 5)"]
  - id: L4
    statement: >-
      All five case studies are global English-language consumer brands; the
      absorption ordering and drift-diffusion parameters may not generalize to
      B2B, regional/East-Asian, or service-dominant brands without recalibration,
      and the SDE parameters are not yet empirically estimated.
    severity: "scope-bounding"
    affects: [P6, P7]
    body_sections: ["Limitations (item 7)", "Empirical Identification Strategy"]

