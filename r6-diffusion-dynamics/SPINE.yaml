# SPINE.yaml — Non-Ergodic Brand Perception: Diffusion Dynamics (2026j / R6)
#
# extracted DESCRIPTIVELY from the completed paper.md, not authored generatively
# before prose. The four theorems (T1–T4) and three propositions (P5–P7) are the
# paper's stated results; the eigenvalue/spectral-gap/survival-table values and
# the five-brand normalized profiles are author-computed (companion script
# r6_diffusion_dynamics.py), so the schema is v0.2 — the headline computed results
# carry an observation → method → measurement → finding chain rather than being
# asserted as bare propositions.
#
# Node-id convention (SPINE_FIRST_DRAFTING_PROTOCOL.md): P proposition,
# O observation, M method, m measurement, F finding, D derivation,
# A alternative_explanation, RC robustness_check, L limitation, C boundary_condition.

spine_version: "0.2"
spine_doc_version: "0.1.0"      # retrofit lock (2026-06-14)
paper_key: "2026j"
provenance: retrofit
title: >-
  Non-Ergodic Brand Perception: Diffusion Dynamics on Multi-Dimensional
  Perceptual Manifolds
target_venue_primary: "TBD (formal-mathematical SBT foundation paper; Working Paper v1.2.0)"
status: >-
  Retrofit spine extracted 2026-06-14 from the completed paper.md (v1.2.0,
  Zenodo 10.5281/zenodo.18945659). Descriptive, not generative.

thesis: |
  An observer's brand conviction can be modeled as a stochastic process on
  S^7_+ — the positive octant of the 7-sphere — the natural state space for a
  normalized eight-dimensional observer spectral profile. Signal encounters
  drive Brownian motion on the manifold, signal decay introduces drift toward a
  neutral prior, and negative conviction creates absorbing Dirichlet boundaries
  where a perceptual dimension collapses to zero (re-collapse). A Stratonovich
  SDE on S^7_+ is well-posed up to absorption (Theorem 1); survival probability
  decays exponentially at rate lambda_{D,1} sigma_0^2 / 2 with exact first
  Dirichlet eigenvalue lambda_{D,1} = 112 (Theorem 2); the Dirichlet spectral
  gap lambda_{D,2} - lambda_{D,1} = 48 yields faster mixing to the
  quasi-stationary distribution than on the full sphere (Theorem 3); and time
  averages diverge from ensemble averages with probability 1, establishing
  non-ergodicity through an absorbing-boundary mechanism independent of Peters'
  (2019) multiplicative framing (Theorem 4). Applied to five case-study brands,
  absorption risk nearly matches SBT coherence grading with a single inversion
  explained by coherence-type-dependent drift (Proposition 7); recovery time
  from a near-death dimension scales as 1/delta^2 (Proposition 5); and a
  sensitivity analysis recovers the empirically observed D/A Goldilocks zone
  r* in [.55, .65] from the absorption-exploration tradeoff (Proposition 6).
  The model gives SBT its missing dynamical foundation and formalizes the
  distinction between vectorized and rasterized brand management.

# ============================================================================
# Boundary conditions — the modeling assumptions under which the results hold
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      The observer's perception state is a normalized eight-component vector on
      the positive octant S^7_+ (all coordinates strictly positive in the
      interior), evolving in continuous time.
    observable: "An 8-dimensional observer spectral profile constrained to the unit sphere."
    excludes: "Scalar attitude scales; finite discrete state lattices; unbounded Euclidean opinion space."
    body_sections: ["Preliminaries / SBT Framework Recap", "Riemannian Geometry of the 7-Sphere"]
  - id: C2
    statement: >-
      The boundary partial S^7_+ (any dimension at zero) is absorbing: once a
      dimension collapses, no subsequent signaling restores it from the
      observer's perspective (irreversible re-collapse).
    observable: "A killed trajectory at the first hitting time tau of partial S^7_+."
    excludes: "Resurrecting / fully reflecting boundaries that permit return from every state."
    body_sections: ["The Absorption Model", "Well-Posedness"]
  - id: C3
    statement: >-
      The continuous-time Brownian approximation is valid when the encounter
      rate lambda_enc is large relative to the observation time scale, and the
      headline theorems assume isotropic diffusion.
    observable: "High-frequency signal encounter regime; isotropic noise sigma_0 P_x."
    excludes: "Niche brands with very low encounter rates; strongly anisotropic Sigma without recalibration."
    body_sections: ["Diffusion: Signal Noise", "Limitations (items 1, 4)"]

# ============================================================================
# Observations — the inputs the computed results rest on
# ============================================================================
observations:
  - id: O1
    statement: >-
      The five case-study brands have canonical emission profiles (Hermès,
      IKEA, Patagonia, Erewhon, Tesla; 8 dimensions on a 1–10 intensity scale)
      carried over from the SBT framework and the formal-metric paper.
    raw_data_pointer: "Table 4 (canonical emission profiles)"
    instrument: "SBT canonical profiles (Zharnikov 2026a, 2026d)"
    body_sections: ["Preliminaries / SBT Framework Recap"]
  - id: O2
    statement: >-
      S^7_+ has constant sectional curvature K = 1, volume Vol(S^7) = pi^4/3,
      and the positive octant has volume Vol(S^7_+) = pi^4/768 ≈ .1269 (a 1/256
      compression of the full sphere), with Laplace-Beltrami eigenvalues
      lambda_ell = ell(ell + 6) on S^7.
    raw_data_pointer: "Riemannian Geometry of the 7-Sphere; Laplace-Beltrami section; Table A1"
    instrument: "Spectral geometry of S^{n-1} (closed form)"
    body_sections: ["Riemannian Geometry of the 7-Sphere", "The Laplace-Beltrami Operator on S^{n-1}"]

# ============================================================================
# Methods — how the SDE is constructed and its quantities computed
# ============================================================================
methods:
  - id: M1
    statement: >-
      Formulate perception evolution as a Stratonovich SDE on S^7_+ with three
      forces — signal-encounter drift toward the normalized emission profile
      s/||s||, decay drift toward the neutral prior x* = (1,...,1)/sqrt(8), and
      isotropic diffusion sigma_0 P_x — each kept tangent to the sphere by the
      orthogonal projection P_x = I - x x^T; absorbing Dirichlet conditions at
      partial S^7_+.
    type: "stochastic_model_construction"
    inputs: ["emission profile s", "kappa", "alpha lambda_enc", "sigma_0"]
    outputs: ["the complete SDE on S^7_+ (Stratonovich and Ito forms)"]
    code_anchor: "paper §The Brand Perception SDE"
    body_sections: ["The Brand Perception SDE", "Stratonovich Formulation"]
  - id: M2
    statement: >-
      Compute the first Dirichlet eigenfunction phi_1(x) = prod_i x_i (a
      degree-8 homogeneous harmonic polynomial) and its eigenvalue via
      lambda_ell = ell(ell + n - 2); expand survival probability in the
      Dirichlet eigenbasis (backward heat equation), retaining the leading term
      as t -> infinity.
    type: "spectral_eigenvalue_computation"
    inputs: ["Dirichlet Laplacian on S^7_+", "n = 8"]
    outputs: ["lambda_{D,1} = 112", "lambda_{D,2} = 160", "survival asymptotics"]
    code_anchor: "paper §The Dirichlet Laplacian on S^7_+; §Survival Probability"
    reproducibility:
      seed: "42"
      runtime_environment: "Python 3.12 + NumPy (companion script r6_diffusion_dynamics.py)"
    body_sections: ["The Dirichlet Laplacian on S^7_+", "Survival Probability"]
  - id: M3
    statement: >-
      Parametrize the SDE by the designed/ambient ratio r (drift scales with r,
      diffusion with the ambient fraction); set the net absorption rate
      gamma(r) = lambda_{D,1} sigma_0^2 (2 - r)/2 - r alpha lambda_enc d_partial
      to zero to read off the survival lower bound, sweep the drift-strength
      parameter alpha lambda_enc d_partial over [1.0, 3.0], and combine with the
      crystallization upper bound to bracket r*.
    type: "sensitivity_analysis"
    inputs: ["sigma_0 = .1", "lambda_{D,1} = 112", "alpha lambda_enc d_partial in [1.0, 3.0]"]
    outputs: ["survival-lower-bound table (Table 5)", "r* in [.55, .65]"]
    code_anchor: "paper §Deriving the D/A Goldilocks Zone; r6_diffusion_dynamics.py"
    body_sections: ["The Absorption-Exploration Tradeoff", "The Optimal Range"]
  - id: M4
    statement: >-
      For each case-study brand, compute the normalized emission profile
      s_hat = s/||s||_2 and the boundary distance d_partial(s_hat) = min_i
      s_hat_i, then rank absorption risk by combining distance-from-boundary
      with coherence-conditional drift strength.
    type: "applied_ranking_computation"
    inputs: ["Table 4 canonical profiles", "coherence grades"]
    outputs: ["Tables 6–8 (normalized profiles, d_partial, drift verdict)", "absorption ordering"]
    code_anchor: "paper §Numerical Demonstration; r6_diffusion_dynamics.py"
    body_sections: ["Case Study: Five Brands", "Absorption Risk Ordering"]

