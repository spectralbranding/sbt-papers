# ============================================================================
# Methods — measurement, design, and inference procedures
# ============================================================================
methods:
  - id: M1
    statement: >-
      DCI elicitation: each (brand, condition, model, repetition) cell produces
      an 8-dimension brand profile via the PRISM-B 1-5 scoring protocol, from
      which the Dimensional Concentration Index DCI = (sum_d |w_d - 1/8| / 2) x
      100 is computed (the 8-dimension L1 generalization of the two-dimension
      DCI_R15 used in the dimensional-collapse companion).
    type: "ai_invocation_and_scoring"
    inputs: [O1, O2, O3, O4]
    outputs: ["per-cell DCI values", "solo vs portfolio DCI per brand"]
    code_anchor: "https://doi.org/10.5281/zenodo.19555282 (source code + analysis scripts)"
    reproducibility:
      seed: "preregistered design; 5 repetitions per cell; temperature .7"
      runtime_environment: "cloud APIs + local Ollama v0.20.0 on Apple Mac mini M4 Pro"
    provenance:
      created_by: "author + AI-assisted analysis scripts"
      created_at: "2026"
    body_sections: ["§Metrics"]
  - id: M2
    statement: >-
      Confirmatory-null inference: brand-level paired t-tests of solo vs.
      portfolio DCI with Cohen's d effect sizes; Benjamini-Hochberg FDR
      correction across all 20 brand-level tests; two one-sided tests (TOST)
      for statistical equivalence to zero within +/-1.0 DCI bounds; a power
      analysis (70% power for d=.50 at N=50/group in v1; >80% at N=65/cell in
      v2.0) motivating TOST as the appropriate frame.
    type: "statistical_analysis"
    inputs: ["per-cell DCI values"]
    outputs: ["delta DCI, t, p, d, TOST p, equivalence verdict per brand"]
    code_anchor: "https://doi.org/10.5281/zenodo.19555282"
    reproducibility:
      seed: "deterministic given the elicited DCI dataset"
      runtime_environment: "analysis scripts (Zenodo)"
    provenance:
      created_by: "author + AI-assisted analysis scripts"
      created_at: "2026"
    body_sections: ["§Power Analysis", "§Metrics", "§Results"]
  - id: M3
    statement: >-
      Variance decomposition: partition DCI variance into Brand, Portfolio
      (parent company), Model, and Condition (solo vs. portfolio) components to
      quantify how little of perceptual variation the portfolio condition
      explains.
    type: "statistical_analysis"
    inputs: ["per-cell DCI values"]
    outputs: ["% variance by factor (Table 5)"]
    code_anchor: "https://doi.org/10.5281/zenodo.19555282"
    provenance:
      created_by: "author + AI-assisted analysis scripts"
      created_at: "2026"
    body_sections: ["§Variance Decomposition"]

# ============================================================================
# Measurements — the headline computed values cited in the body
# ============================================================================
measurements:
  - id: m_direct_null
    statement: >-
      Direct-rating solo vs. portfolio: 0/20 brands FDR-significant at .05;
      mean |delta DCI| = .26; effect sizes small (per-brand |d| <= .52);
      cosine similarity > .999 for all brands; TOST equivalence within +/-1.0
      DCI confirmed for 18/20 brands (Geely Auto and Yandex Taxi inconclusive).
    source_observations: [O1]
    generating_method: M2
    value: "0/20 FDR-sig; mean |delta DCI| = .26; 18/20 TOST-equivalent; cosine > .999"
    units: "DCI points / Cohen's d / cosine"
    provenance:
      created_by: "author + analysis scripts"
      created_at: "2026"
    body_sections: ["§Main Results", "Table 3"]
  - id: m_lexus
    statement: >-
      Lexus (Toyota spectral-layer aspirational brand) shows delta DCI = +.59,
      d = .52, paired p = .004 — directionally consistent with aspiration
      dynamics and the largest positive delta — but does NOT survive FDR
      correction across 20 tests, so it is suggestive but not statistically
      robust.
    source_observations: [O1]
    generating_method: M2
    value: "Lexus delta +.59, d = .52, p = .004; not FDR-significant"
    units: "DCI points / Cohen's d / p"
    provenance:
      created_by: "author + analysis scripts"
      created_at: "2026"
    body_sections: ["§Hypothesis Tests", "§Discussion — The Lexus finding"]
  - id: m_multiturn
    statement: >-
      Multi-turn portfolio reveal: 4/20 brands show FDR-significant DCI shifts,
      all DECREASES (flattening) — Geely Auto delta = -2.93 (d = -1.11, the
      largest effect in the experiment), Polestar -1.47 (d = -.54), Toyota -.80
      (d = -.61), Yandex -1.06 (d = -.49); mean delta across all 20 brands was
      -.03 (effectively zero).
    source_observations: [O2]
    generating_method: M2
    value: "4/20 FDR-sig, all decreases; Geely Auto d = -1.11; overall mean delta = -.03"
    units: "DCI points / Cohen's d"
    provenance:
      created_by: "author + analysis scripts"
      created_at: "2026"
    body_sections: ["§Extensions", "Table 6"]
  - id: m_native
    statement: >-
      Native-language ablation: framing activates model-specific discourse
      registers without systematic directional amplification — Swallow
      (Japanese) under Japanese Toyota framing delta -2.35 (vs -.37 English),
      YandexGPT (Russian) under Russian Yandex framing +.72 (vs -.01 English),
      but Qwen3 (Chinese) under Chinese Geely framing shows a Volvo-specific
      +2.07 OPPOSITE to the home-model amplification prediction; no
      native-language effect survives FDR correction.
    source_observations: [O3]
    generating_method: M2
    value: "model-portfolio-specific (Swallow -2.35, YandexGPT +.72, Qwen3/Volvo +2.07); 0 FDR-sig"
    units: "DCI points"
    provenance:
      created_by: "author + analysis scripts"
      created_at: "2026"
    body_sections: ["§Extensions", "§Hypothesis Tests"]
  - id: m_variance
    statement: >-
      Variance decomposition of DCI: Brand 37.4%, Portfolio (parent company)
      19.3%, Model 8.6%, Condition (solo vs. portfolio) .1% — brand identity
      dominates and the portfolio CONDITION explains essentially none of the
      variance.
    source_observations: [O1]
    generating_method: M3
    value: "Brand 37.4% / Portfolio 19.3% / Model 8.6% / Condition .1%"
    units: "% variance explained"
    provenance:
      created_by: "author + analysis scripts"
      created_at: "2026"
    body_sections: ["§Variance Decomposition"]
  - id: m_extension_null
    statement: >-
      Published-stimulus extension: 0/10 portfolio-condition brands
      FDR-significant; no brand shows |d| > .50; TOST equivalence confirmed for
      all 10 within +/-1.0 DCI; largest effects Audi d = -.44 (VW Group) and
      Pepsi d = +.34 (PepsiCo), both sub-threshold; combined corpus reaches
      9,925 observations across 40 zero-overlap brands.
    source_observations: [O4]
    generating_method: M2
    value: "0/10 FDR-sig; all |d| < .50; 10/10 TOST-equivalent; combined 9,925 obs / 40 brands"
    units: "Cohen's d / DCI points / observation count"
    provenance:
      created_by: "author + analysis scripts"
      created_at: "2026"
    body_sections: ["§Replication with Published Brand Stimuli", "Table 7"]

# ============================================================================
# Propositions — the theoretical backbone
# ============================================================================
propositions:
  - id: P1
    statement: >-
      In human perception, corporate portfolios create perceptual
      interdependencies whose direction depends on the structural relationship
      between siblings: constructive interference for spectrally proximate
      brands, destructive for contradictory ones, negligible for distant ones —
      and in every account the necessary moderator is the AWARENESS GATE, the
      degree to which the observer recognizes shared ownership.
    conditions: ""
    antecedents: []
    evidence:
      - type: citation
        anchor: "Classic portfolio / brand-extension theory: ownership salience drives correlated quality expectations and fit-dependent spillover."
        citation_keys: [keller-1993-conceptualizing-measuring-managing, aaker-1990-consumer-evaluations-brand, erdem-1998-empirical-analysis-umbrella, lei-2008-negative-spillover-brand]
        citation_role: theoretical_predecessor
    body_sections: ["§Theoretical Background — Portfolio Interference in Human Perception"]
  - id: P2
    statement: >-
      LLMs constitute a new class of brand observer whose perceptual structure
      differs systematically from humans: their brand responses are systematic,
      measurable, and exhibit consistent dimensional compression (cross-model
      cosine similarity ~.977 with compression of Cultural, Temporal, and
      Economic dimensions), making them validatable brand-perception
      instruments.
    conditions: "C1"
    antecedents: []
    evidence:
      - type: citation
        anchor: "LLMs validated as brand-perception instruments (>75% human agreement); systematic dimensional patterns across model traditions."
        citation_keys: [li-2024-frontiers-determining-validity, brand-2023-using-gpt-market, zharnikov-2026-dimensional-collapse-ai-mediated-search]
        citation_role: theoretical_predecessor
    body_sections: ["§Theoretical Background — AI as Brand Observer"]
  - id: P3
    statement: >-
      (The Awareness Gate Paradox) Because portfolio ownership is encoded
      permanently in LLM parameters, the awareness gate is structurally
      saturated (alpha approx 1) and cannot be experimentally manipulated. If
      interference scales with awareness, LLMs should show MAXIMAL portfolio
      interference; if their encodings are already near-minimum-distortion,
      added portfolio context carries no absorbable signal and interference
      should be ABSENT. These two regimes are competing predictions the study
      adjudicates.
    conditions: "C1"
    antecedents: [P1, P2]
    evidence:
      - type: analytic
        anchor: "SBT interference equation I_d = alpha_Ck * w_d * (e_d - mu_d): under immunity alpha is maximal but the compression constraint keeps the interference term from propagating into the observable profile."
        citation_keys: [zharnikov-2026-spectral-brand-theory-computational-framework]
        citation_role: definitional_source
    falsifier: >-
      The maximal-interference regime is the prediction the immunity finding
      rules out; the paradox itself is falsified if neither regime fits (e.g.
      effects are large, systematic, AND scale with gate saturation).
    body_sections: ["§The Awareness Gate Paradox"]
  - id: P4
    statement: >-
      (Spectral Immunity — the central proposition) Across portfolio archetypes
      and single-turn prompt modalities, the magnitude of portfolio-induced
      perception change is statistically equivalent to zero within meaningful
      bounds (+/-1.0 DCI points): adding portfolio context does not
      systematically alter how LLMs perceive brands.
    conditions: "C1, C2"
    antecedents: [P3]
    evidence:
      - type: dataset_anchor
        anchor: "0/20 FDR-significant in direct rating; mean |delta DCI| = .26; 18/20 TOST-equivalent; cosine > .999 (Table 3, H5)."
        citation_keys: []
        citation_role: data_source
    falsifier: >-
      Falsified (paper's stated condition) if a future study with >=7 models
      from >=3 traditions finds systematic portfolio-induced DCI shifts > 2.0
      points with d > .50 surviving multiple-testing correction across >=5
      archetypes and >=3 modalities simultaneously.
    body_sections: ["§Research Hypotheses — H5", "§Results — Main Results", "§Conclusion"]
  - id: P5
    statement: >-
      (Resolution of the paradox) Maximal awareness is NECESSARY BUT NOT
      SUFFICIENT for portfolio interference when observers operate near
      minimum-distortion encodings: LLMs encode brand knowledge holistically,
      so the solo profile already incorporates portfolio relationships
      implicitly. The saturated gate amplifies an interference term that is
      structurally near zero — not an absent gate suppressing a nonzero term.
    conditions: "C1, C2"
    antecedents: [P3, P4]
    evidence:
      - type: analytic
        anchor: "Rate-distortion / compression reading of the immunity result; the interference term in eq. (1) is near zero under compression."
        citation_keys: [zharnikov-2026-spectral-brand-theory-computational-framework]
        citation_role: definitional_source
    body_sections: ["§Discussion — Theoretical Contribution"]
  - id: P6
    statement: >-
      Immunity is ARCHITECTURAL, not knowledge-based: all seven training
      traditions (Western, Chinese, Russian, Indian, Japanese, European,
      Korean) exhibit the same immunity. The single tradition-level effect (the
      Japanese model on Toyota-related brands, p = .011, d = -.63) is driven by
      market-specific knowledge, is one model, and does not survive
      tradition-level FDR correction — so it does not break the pattern.
    conditions: "C1"
    antecedents: [P4]
    evidence:
      - type: dataset_anchor
        anchor: "Sub-group analysis by tradition (Table 4): all traditions immune; only Japanese p<.05, FDR-inconclusive across 7 comparisons."
        citation_keys: []
        citation_role: data_source
    body_sections: ["§Cross-Cultural Generalizability", "§Discussion — Immunity is architectural"]
  - id: P7
    statement: >-
      Spectral immunity GENERALIZES across portfolio archetypes (all 7 —
      spectral cluster, contradiction, spread, layer, prestige spread, reverse
      aspiration, branded house — show the same direct-framing immunity) and
      across independent stimulus sets (the published-brand extension
      replicates the null with zero exceptions, combining to 9,925 observations
      over 40 zero-overlap brands).
    conditions: "C1, C2"
    antecedents: [P4]
    evidence:
      - type: dataset_anchor
        anchor: "7 archetypes immune in direct framing; extension 0/10 FDR-sig, all |d|<.50, 10/10 TOST-equivalent (Table 7)."
        citation_keys: []
        citation_role: data_source
    body_sections: ["§Discussion — Spectral immunity generalizes", "§Replication with Published Brand Stimuli"]
  - id: P8
    statement: >-
      The immunity result is regime-bounded, not universal: reverse-aspiration
      structures can be UNLOCKED through extended conversational revelation but
      not direct framing (Geely Auto multi-turn d = -1.11 via conversational
      anchoring — Turn 1 establishes a premium anchor that makes the Turn 2
      reveal effective), a dynamic specific to ownership structures that violate
      the quality-hierarchy expectation and absent for non-reverse-aspiration
      portfolios.
    conditions: "C1, C3"
    antecedents: [P4]
    evidence:
      - type: dataset_anchor
        anchor: "Multi-turn 4/20 FDR-sig, all decreases; Geely Auto -2.93 (d=-1.11), strongest effect; pattern absent for LVMH/P&G (Table 6)."
        citation_keys: []
        citation_role: data_source
    body_sections: ["§Extensions — Multi-turn", "§Discussion — Reverse aspiration"]
  - id: P9
    statement: >-
      Native-language framing activates model-specific discourse layers rather
      than a general amplification principle: home-language prompts shift
      discourse registers for specific model-portfolio pairs, but the effects
      are not unidirectional, not consistent across portfolios, and do not
      survive FDR correction — consistent with cross-cultural AI differences
      being discourse-layer activation rather than systematic cultural bias.
    conditions: "C1"
    antecedents: [P4]
    evidence:
      - type: replication_anchor
        anchor: "Discourse-layer (not systematic-bias) reading aligns with the dimensional-collapse companion's cross-cultural finding."
        citation_keys: [zharnikov-2026-dimensional-collapse-ai-mediated-search]
        citation_role: replication_anchor
    body_sections: ["§Extensions — Native-language", "§Discussion — Native-language framing"]
  - id: P10
    statement: >-
      Managerially, portfolio architecture is invisible to AI across all
      archetype types: in AI-mediated ("Share of Model") markets, house-of-
      brands shielding from destructive interference is AUTOMATIC, but
      constructive interference is equally IMPOSSIBLE — brand managers cannot
      use portfolio architecture to reshape LLM perceptions except in extended
      conversational contexts (a conditional vulnerability for reverse-aspiration
      portfolios). Brand coherence, not portfolio coherence, drives AI
      perception (brand explains 37% of DCI variance; condition explains .1%).
    conditions: "C1, C3"
    antecedents: [P4, P7, P8]
    evidence:
      - type: dataset_anchor
        anchor: "Variance decomposition Table 5 (brand 37.4% vs condition .1%); 'Share of Model' framing."
        citation_keys: [dubois-2025-forget-what-you]
        citation_role: motivating_problem
    body_sections: ["§Discussion — Managerial Contribution"]

# ============================================================================
# Findings — what the experiment establishes
# ============================================================================
findings:
  - id: F1
    statement: >-
      Spectral immunity holds: portfolio framing produces no systematic change
      in LLM brand perception in single-turn modalities — 0/20 brands
      FDR-significant in direct rating, mean |delta DCI| = .26, 18/20
      TOST-equivalent within +/-1.0 DCI, identical pattern in naturalistic
      recommendation (mean delta -.23, 0/20 FDR-sig) and prompt-location
      ablation (no difference; condition explains .1% of variance).
    type: "experimental_outcome"
    source_measurements: [m_direct_null, m_variance]
    generating_method: M2
    antecedents: [O1, P4]
    falsifier: "See P4 falsifier — systematic >2.0 DCI shifts, d>.50, surviving FDR across >=5 archetypes and >=3 modalities."
    citation_role_in_paper: "primary_result"
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Results", "§Conclusion"]
  - id: F2
    statement: >-
      Immunity replicates across model traditions and independent stimulus
      sets: all 7 training traditions show immunity (only the Japanese model is
      FDR-inconclusive), and the 20-brand published-stimulus extension
      reproduces the null with zero exceptions, bringing the corpus to 9,925
      observations across 40 zero-overlap brands.
    type: "experimental_outcome"
    source_measurements: [m_variance, m_extension_null]
    generating_method: M2
    antecedents: [O1, O4, P6, P7]
    falsifier: "If an independent stimulus set or additional traditions showed systematic FDR-significant portfolio effects, generalization would fail."
    citation_role_in_paper: "primary_result"
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Cross-Cultural Generalizability", "§Replication with Published Brand Stimuli"]
  - id: F3
    statement: >-
      The only conditional exception is multi-turn conversational revelation
      for reverse-aspiration structure: 4/20 brands show FDR-significant DCI
      DECREASES after portfolio reveal, led by Geely Auto (d = -1.11, the
      strongest effect in the experiment), via conversational anchoring — a
      regime-specific vulnerability, not a general exception to immunity (mean
      multi-turn delta across all 20 brands was -.03).
    type: "experimental_outcome"
    source_measurements: [m_multiturn]
    generating_method: M2
    antecedents: [O2, P8]
    falsifier: "If the multi-turn flattening appeared equally for non-reverse-aspiration portfolios, the regime-specific reading would fail."
    citation_role_in_paper: "qualifying_result"
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Extensions", "§Conclusion"]

# ============================================================================
# Alternative explanations — rivals the immunity claim must clear
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      The maximal-interference regime: if portfolio interference scales with
      awareness and the LLM awareness gate is permanently saturated, AI brand
      perception should exhibit permanent MAXIMAL portfolio interference.
    rules_out_required: [P4]
    ruled_out_by: [F1, F2]
    rules_out_status: "rejected"
    reasoning: >-
      The data show near-zero, FDR-non-significant, TOST-equivalent effects
      across 40 brands, 13 models, 7 traditions, and 7 archetypes — the
      opposite of maximal interference. Resolved by P5: maximal awareness is
      necessary but not sufficient when encodings are near minimum-distortion.
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§The Awareness Gate Paradox", "§Discussion"]
  - id: A2
    statement: >-
      Immunity is knowledge-based, not architectural: models simply lack the
      market knowledge to register portfolio relations, so the null reflects
      ignorance rather than a structural compression property.
    rules_out_required: [P6]
    ruled_out_by: [m_variance, m_native]
    rules_out_status: "rejected"
    reasoning: >-
      All 7 traditions — including home-tradition models with deep local market
      knowledge (Japanese/Toyota, Russian/Yandex) — show the same immunity; the
      Japanese model's market-specific sensitivity is the exception that proves
      knowledge is present yet still does not produce systematic interference,
      indicating the immunity is architectural.
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Cross-Cultural Generalizability", "§Discussion"]
  - id: A3
    statement: >-
      The near-zero result is an artifact of the DCI metric: a different
      perceptual metric would reveal portfolio effects the DCI smooths over.
    rules_out_required: [P4]
    ruled_out_by: [F1]
    rules_out_status: "partially-mitigated"
    reasoning: >-
      The paper concedes DCI is not yet human-validated (C2), but argues a null
      is a null regardless of the specific metric (cosine similarity > .999 and
      the variance decomposition corroborate it); only the rate-distortion
      INTERPRETATION, not the null itself, is conditional on DCI construct
      validity. Human validation is named the priority future direction.
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Boundary Conditions and Limitations"]

# ============================================================================
# Robustness checks — sensitivity analyses already run in the paper
# ============================================================================
robustness_checks:
  - id: RC1
    statement: >-
      Naturalistic recommendation modality reproduces the direct-rating null
      (mean delta DCI = -.23, cosine > .999, 0/20 FDR-significant), confirming
      the immunity is not an artifact of the rating-prompt format.
    varied_parameter: "prompt modality (direct rating -> conversational recommendation)"
    range_explored: "20 brands x 2 conditions x 13 models x 5 reps"
    result_stability: "confirmed"
    affects_nodes: [F1, P4]
    source_method: M2
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Robustness Checks"]
  - id: RC2
    statement: >-
      Prompt-location ablation (portfolio context in system vs. user message)
      produces no difference (paired t = .91, p = .368, d = .15), confirming
      portfolio-information placement is irrelevant to perception outcomes.
    varied_parameter: "portfolio-context location (user message vs. system prompt)"
    range_explored: "4 models, 20 brands"
    result_stability: "confirmed"
    affects_nodes: [F1, P4]
    source_method: M2
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Robustness Checks"]
  - id: RC3
    statement: >-
      Independent published-brand stimulus set (20 brands from canonical
      marketing studies, zero overlap) replicates immunity with zero exceptions
      (0/10 FDR-significant, all |d| < .50, 10/10 TOST-equivalent), addressing
      the external-validity concern about the theoretically-motivated main panel.
    varied_parameter: "brand stimulus set (theory-motivated -> literature-sampled)"
    range_explored: "20 additional brands, 1,950 observations"
    result_stability: "confirmed"
    affects_nodes: [F2, P7]
    source_method: M2
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Replication with Published Brand Stimuli"]

# ============================================================================
# Limitations — honest scope of the result
# ============================================================================
limitations:
  - id: L1
    statement: >-
      DCI is a new metric not yet validated against human perceptual data; the
      null finding is robust to this (a null is a null regardless of metric),
      but the rate-distortion / compression INTERPRETATION depends on DCI's
      construct validity — the primary boundary condition on the conclusions.
      Human validation is the most important future direction.
    severity: "high"
    affects: [P5, C2, m_direct_null]
    mitigation: "Future validation of DCI against human brand-perception data."
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Boundary Conditions and Limitations", "§Future Research"]
  - id: L2
    statement: >-
      With 20 tests and FDR correction the study has limited power at the
      brand level (the Lexus finding would be significant under per-comparison
      alpha); a dedicated within-archetype replication with larger samples
      would provide cleaner evidence on suggestive cases.
    severity: "medium"
    affects: [m_lexus, P4]
    mitigation: "Dedicated within-archetype (aspirational-layer) replication with larger samples."
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Boundary Conditions and Limitations", "§Future Research"]
  - id: L3
    statement: >-
      The multi-turn design uses only a two-turn protocol; longer conversations
      with more gradual portfolio disclosure might accumulate larger effects,
      so the conversational-unlock result is a lower bound on multi-turn
      sensitivity.
    severity: "medium"
    affects: [F3, P8, C3]
    mitigation: "Extended (5+ turn) multi-turn and agentic-simulation designs."
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Boundary Conditions and Limitations", "§Future Research"]
  - id: L4
    statement: >-
      Native-language results rest on a single model per tradition (except
      Western and Chinese), limiting the generalizability of tradition-level
      conclusions about language-dependent effects.
    severity: "medium"
    affects: [P9, m_native]
    mitigation: "Multiple models per tradition for native-language ablation."
    provenance:
      created_by: "author"
      created_at: "2026"
    body_sections: ["§Boundary Conditions and Limitations"]

# ============================================================================
# Cross-paper engagement
# ============================================================================
corpus_precedents:
  - paper_key: 2026a
    relationship: applies
    spine_nodes: [P3, P5]
    note: >-
      Spectral Brand Theory (Zharnikov 2026a) supplies the eight perceptual
      dimensions, the awareness-gate / interference formalism (eq. 1), and the
      compression account from which spectral immunity is predicted (though the
      paper stresses the null follows from any compressed-stable-encoding
      account, not SBT specifically).
  - paper_key: 2026v
    relationship: extends
    spine_nodes: [P2, P4]
    note: >-
      R15 (Zharnikov 2026v) established AI observers as a metameric class with
      dimensional collapse; this paper extends that line by testing whether the
      stable LLM brand encoding is sensitive to portfolio context, finding it is
      not (spectral immunity).
  - paper_key: 2026ac
    relationship: extends
    spine_nodes: [P4, P7]
    note: >-
      R21 (Zharnikov 2026ac) reports the portfolio-ownership near-zero
      AI-perception-variance result (d <= .18) that this R20 study tests
      comprehensively across archetypes, modalities, traditions, and an
      independent stimulus set.

