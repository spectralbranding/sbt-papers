      (direct rating, naturalistic recommendation, multi-turn conversation,
      native-language ablation) plus a prompt-location ablation, on a 1-5
      PRISM-B scale at temperature .7, yielding 7,975 successfully parsed
      observations (98.1% parse rate of 8,129 cells).
    raw_data_pointer: "https://doi.org/10.57967/hf/8380 (7,975 observations)"
    instrument: "13-model panel (Claude Sonnet 4, GPT-4o-mini, Gemini 2.5 Flash, Grok-3-mini, Llama 3.3 70B, Gemma 4 27B, DeepSeek V3, Qwen3 235B, YandexGPT 5 Pro, Sarvam M, GPT-OSS-Swallow 20B, Mistral Large, EXAONE 3.5 32B) + PRISM-B prompts"
