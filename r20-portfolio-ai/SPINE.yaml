spine_version: "0.2"
spine_doc_version: "0.1.0"        # retrofit lock 2026-06-18
provenance: retrofit
paper_key: "2026ab"
title: >-
  Does Corporate Ownership Matter to AI? Portfolio Interference in Large
  Language Model Brand Perception
target_venue_primary: "Working paper (Zenodo; SBT empirical companion)"
status: >-
  Retrofit spine extracted 2026-06-18 from completed paper.md (Working Paper
  v1.2.0, April 2026, revised June 2026). Paper status is superseded.
  Faithful description of the paper as written; no new claims introduced.

thesis: |
  Brand portfolio theory predicts that revealing corporate ownership produces
  perceptual interference through an awareness gate — constructive for
  spectrally similar siblings, destructive for contradictory ones. Large
  language models present a paradox: the awareness gate is permanently
  saturated (ownership relations are encoded in their parameters and cannot be
  experimentally hidden), so interference-scales-with-awareness predicts
  permanent maximal interference, while a compression account predicts
  complete immunity. A preregistered experiment across 13 LLMs from seven
  training traditions, 20 brands from seven portfolio archetypes, and four
  prompt modalities (direct rating, naturalistic recommendation, multi-turn
  conversation with mid-dialogue portfolio reveal, native-language framing)
  yields 7,975 parsed observations; a preregistered published-stimulus
  extension adds 1,950 zero-overlap observations (combined 9,925 across 40
  brands). The predominant finding is SPECTRAL IMMUNITY: portfolio framing
  produces near-zero change in the Dimensional Concentration Index
  (mean |delta DCI| = .26), 0/20 brands are FDR-significant in direct rating,
  TOST equivalence holds for 18/20 brands within +/-1.0 DCI points, and the
  null replicates with zero exceptions on the independent stimulus set. The
  paradox resolves because LLMs operate near minimum-distortion encodings that
  already incorporate portfolio relations implicitly — maximal awareness is
  necessary but not sufficient for interference. Immunity is architectural,
  not knowledge-based (all seven traditions show it). Exceptions are confined
  and conditional: multi-turn conversational revelation unlocks modest
  flattening for reverse-aspiration structures (Geely Auto d = -1.11), and
  native-language framing activates model-specific discourse layers without
  systematic directional amplification. Managerially, house-of-brands
  shielding is automatic in AI-mediated ("Share of Model") markets while
  constructive interference is impossible.

# ============================================================================
# Boundary conditions — the scope under which the immunity result holds
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      Observer class: the result concerns LLM brand observers, for whom the
      awareness gate is structurally saturated (alpha approx 1) because
      portfolio ownership is encoded in parameters and cannot be experimentally
      manipulated into "not knowing." The distinction from human observers (for
      whom portfolio knowledge is experimentally NEW) is the load-bearing
      boundary; findings do not transfer to human samples.
    observable: "Observer is an LLM whose brand encoding already incorporates ownership relations."
    excludes: "Human respondents whose awareness gate can be experimentally manipulated."
    provenance:
      created_by: "author"
      created_at: "2026-04"
  - id: C2
    statement: >-
      Metric construct: conclusions about compression/rate-distortion depend on
      the construct validity of the Dimensional Concentration Index (DCI), a new
      metric not yet validated against human perceptual data. The near-zero
      effect (the null) is robust to this regardless of metric, but the
      rate-distortion INTERPRETATION is conditional on DCI validity — the
      primary boundary condition on the theoretical reading.
    observable: "A human-validated dimensional-concentration instrument exists."
    excludes: "Theoretical (compression) interpretation absent DCI construct validation."
    provenance:
      created_by: "author"
      created_at: "2026-04"
  - id: C3
    statement: >-
      Conversational scope: the immunity result governs single-turn modalities
      (direct rating, naturalistic recommendation, prompt-location). Extended
      multi-turn conversation with mid-dialogue portfolio reveal is a distinct
      regime where conditional, portfolio-specific effects can appear; the
      immunity claim is not asserted for arbitrarily long conversational
      accumulation.
    observable: "Prompt modality is single-turn vs. multi-turn with reveal."
    excludes: "Conclusions about 5+ turn conversations with gradual disclosure (open)."
    provenance:
      created_by: "author"
      created_at: "2026-04"

