  abstract: 'Large language models (LLMs) increasingly shape how consumers discover and evaluate brands.
    Brand portfolio theory predicts that revealing corporate ownership produces perceptual interference
    via an awareness gate [@keller-1993-conceptualizing-measuring-managing; @aaker-1990-consumer-evaluations-brand].
    Because LLMs encode portfolio relationships permanently in their parameters, they should exhibit either
    maximal interference or complete immunity. This preregistered study tests these hypotheses across
    13 LLMs spanning seven training traditions. Twenty brands from seven portfolio archetypes were rated
    under four prompt modalities---direct rating, naturalistic recommendation, multi-turn conversation
    with mid-dialogue portfolio reveal, and native-language framing---yielding 7,975 observations. A preregistered
    extension added 20 brands from published marketing research (1,950 observations, zero overlap), replicating
    immunity and bringing the combined dataset to 9,925 observations across 40 brands. Portfolio framing
    produces near-zero change in Dimensional Concentration Index (mean $|\Delta\mathrm{DCI}| = .26$);
    equivalence testing confirms the null for 18 of 20 brands within $\pm 1.0$ DCI points. Multi-turn
    revelation unlocks modest flattening for reverse-aspiration structures (Geely Auto $d = -1.11$, FDR-significant),
    but effects remain portfolio- and modality-specific. These results generalize spectral immunity across
    model traditions and portfolio types: house-of-brands shielding is automatic in AI-mediated markets,
    while constructive interference is impossible except in extended conversational contexts. Implications
    for awareness-gate mechanisms and "Share of Model" strategy are discussed.'
