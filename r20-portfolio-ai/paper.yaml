methodology:
  type: empirical
  design: 'DCI elicitation: each (brand, condition, model, repetition) cell produces an 8-dimension brand
    profile via the PRISM-B 1-5 scoring protocol, from which the Dimensional Concentration Index DCI =
    (sum_d |w_d - 1/8| / 2) x 100 is computed (the 8-dimension L1 generalization of the two-dimension
    DCI_R15 used in the dimensional-collapse companion). Confirmatory-null inference: brand-level paired
    t-tests of solo vs. portfolio DCI with Cohen''s d effect sizes; Benjamini-Hochberg FDR correction
    across all 20 brand-level tests; two one-sided tests (TOST) for statistical equivalence to zero within
    +/-1.0 DCI bounds; a power analysis (70% power for d=.50 at N=50/group in v1; >80% at N=65/cell in
    v2.0) motivating TOST as the appropriate frame. Variance decomposition: partition DCI variance into
    Brand, Portfolio (parent company), Model, and Condition (solo vs. portfolio) components to quantify
    how little of perceptual variation the portfolio condition explains.'
  analysis:
    software: https://doi.org/10.5281/zenodo.19555282 (source code + analysis scripts)
    method: cloud APIs + local Ollama v0.20.0 on Apple Mac mini M4 Pro
