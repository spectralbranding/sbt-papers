hypothesis_results:
  - id: H1
    description: "LVMH constructive interference"
    status: not_supported
  - id: H2
    description: "Unilever destructive interference"
    status: not_supported
  - id: H3
    description: "P&G negligible interference"
    status: supported
  - id: H4
    description: "Toyota/Lexus aspirational interference"
    status: partially_supported
    note: "Lexus +.59 (d = .52, p = .004). Suggestive but 0/20 FDR-significant. Toyota -.37 (n.s.)."
  - id: H5
    description: "Spectral immunity (TOST equivalence)"
    status: supported
    note: "TOST equivalence confirmed for 18/20 brands within +/-1.0 DCI bounds. Mean |delta DCI| = .26. 0/20 FDR-significant in direct or recommendation conditions."
  - id: H7
    description: "Reverse aspiration (Geely Auto)"
    status: supported
    note: "Geely Auto multi-turn d = -1.11, FDR-significant."
  - id: H8
    description: "Language-dependent immunity (native-language ablation)"
    status: partially_supported
    note: "Native-language prompts activate model-specific discourse layers without directional amplification."

