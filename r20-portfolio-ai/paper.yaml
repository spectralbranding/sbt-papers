results:
- claim_id: P4
  status: supported
  notes: 'Spectral immunity holds: portfolio framing produces no systematic change in LLM brand perception
    in single-turn modalities — 0/20 brands FDR-significant in direct rating, mean |delta DCI| = .26,
    18/20 TOST-equivalent within +/-1.0 DCI, identical pattern in naturalistic recommendation (mean delta
    -.23, 0/20 FDR-sig) and prompt-location ablation (no difference; condition explains .1% of variance).'
- claim_id: P6
  status: supported
  notes: 'Immunity replicates across model traditions and independent stimulus sets: all 7 training traditions
    show immunity (only the Japanese model is FDR-inconclusive), and the 20-brand published-stimulus extension
    reproduces the null with zero exceptions, bringing the corpus to 9,925 observations across 40 zero-overlap
    brands.'
- claim_id: P7
  status: supported
  notes: 'Immunity replicates across model traditions and independent stimulus sets: all 7 training traditions
    show immunity (only the Japanese model is FDR-inconclusive), and the 20-brand published-stimulus extension
    reproduces the null with zero exceptions, bringing the corpus to 9,925 observations across 40 zero-overlap
    brands.'
- claim_id: P8
  status: supported
  notes: 'The only conditional exception is multi-turn conversational revelation for reverse-aspiration
    structure: 4/20 brands show FDR-significant DCI DECREASES after portfolio reveal, led by Geely Auto
    (d = -1.11, the strongest effect in the experiment), via conversational anchoring — a regime-specific
    vulnerability, not a general exception to immunity (mean multi-turn delta across all 20 brands was
    -.03).'
limitations:
- description: DCI is a new metric not yet validated against human perceptual data; the null finding is
    robust to this (a null is a null regardless of metric), but the rate-distortion / compression INTERPRETATION
    depends on DCI's construct validity — the primary boundary condition on the conclusions. Human validation
    is the most important future direction.
  severity: major
  addressable: true
- description: With 20 tests and FDR correction the study has limited power at the brand level (the Lexus
    finding would be significant under per-comparison alpha); a dedicated within-archetype replication
    with larger samples would provide cleaner evidence on suggestive cases.
  severity: moderate
  addressable: true
- description: The multi-turn design uses only a two-turn protocol; longer conversations with more gradual
    portfolio disclosure might accumulate larger effects, so the conversational-unlock result is a lower
    bound on multi-turn sensitivity.
  severity: moderate
  addressable: true
- description: Native-language results rest on a single model per tradition (except Western and Chinese),
    limiting the generalizability of tradition-level conclusions about language-dependent effects.
  severity: moderate
  addressable: true
