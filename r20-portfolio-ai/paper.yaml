meta:
  title: Does Corporate Ownership Matter to AI? Portfolio Interference in Large Language Model Brand Perception
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19555282
  date: '2026-04-01'
  venue: Working paper (Zenodo; SBT empirical companion)
  license: CC-BY-4.0
  keywords:
  - brand perception
  - large language models
  - portfolio interference
  - awareness gate
  - TOST equivalence
  - cross-cultural AI
  - multi-turn conversation
  - native-language framing
