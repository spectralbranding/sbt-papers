    tracking: the tracked ensemble average rises while the true population average falls, with the gap
    widening over time. The bias direction is always positive (tracking is more optimistic than reality).
    This is not a pathological edge case — any brand with non-zero absorption risk exhibits it.'
limitations:
- description: The framework is scoped to high-involvement B2C brand perception; B2B settings introduce
    potential ergodicity-restoring mechanisms (committee decisions, competitive bidding, contractual reset
    points, formal review cycles). Whether the three sources operate with equal force in B2B is an open
    empirical question.
  severity: moderate
  addressable: true
- description: The propositions are derived theoretically and supported by existing evidence generated
    to test narrower hypotheses (order effects, primacy, path dependence), not designed to test non-ergodicity
    directly. Direct tests require longitudinal individual-level tracking, absorption-rate measurement,
    multi-dimensional trajectory analysis, and experimental signal- sequence manipulation.
  severity: moderate
  addressable: true
- description: The non-ergodicity results do not depend on the specific number/identity of dimensions,
    but the managerial recommendations (managing structural absence across eight dimensions) depend on
    SBT's eight-dimensional structure, whose empirical validation (Zharnikov 2026a) is ongoing.
  severity: moderate
  addressable: true
- description: 'Absorbing states are hard to measure: negative conviction (a categorical judgment) is
    not a low score on a standard Likert scale; instruments that distinguish recoverable negative perception
    from absorbing negative conviction are a prerequisite for testing P2 and P3 directly.'
  severity: moderate
  addressable: true
