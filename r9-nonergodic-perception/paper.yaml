meta:
  title: 'From Order Effects to Absorbing States: A Non-Ergodic Framework for Multi-Dimensional Brand
    Perception Dynamics'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19138860
  date: '2026-06-01'
  venue: consumer psychology / brand management (working paper v2.2)
  license: CC-BY-4.0
  keywords:
  - non-ergodicity
  - belief updating
  - order effects
  - absorbing states
  - brand perception
  - path dependence
  - brand tracking
  - Spectral Brand Theory
  abstract: 'Brand tracking assumes cross-sectional averages (ensemble averages) yield the same information
    as individual trajectories over time (time averages)—an ergodicity assumption violated in brand perception.
    Drawing on Peters'' [-@peters-2019-ergodicity-problem-economics] framework from statistical physics,
    this paper identifies three structural sources of non-ergodicity: absorbing states from negative brand
    conviction, multiplicative signal dynamics, and path-dependent dimension weighting. Five formal propositions
    establish that signal order produces different perception profiles from identical signals; negative
    conviction functions as an absorbing state while positive conviction does not; cross-sectional tracking
    systematically overestimates brand health for absorption-risk brands; first signals anchor all subsequent
    updates in a dimension; and observer cohorts with different dimension weights produce divergent trajectories
    from identical signals. The paper specifies sufficient conditions for multiplicative perception updates
    and shows these conditions are empirically testable via longitudinal panel data. These propositions
    unify 80 years of scattered evidence on order effects, primacy, and belief updating within Spectral
    Brand Theory''s eight-dimensional perception framework. The measurement implication is concrete: ensemble
    averages systematically misrepresent individual trajectories, and the bias direction and magnitude
    are predictable from brand coherence.'
claims:
- id: P_nonergodic
  type: proposition
  statement: 'Brand perception is non-ergodic: the individual time average x_i^(T) does not converge to
    the ensemble (cross-sectional) average x^(E)(t) in general. Whenever dynamics are non-ergodic, cross-sectional
    averages provide systematically misleading information about individual trajectories. This is the
    paper''s central claim, formalized via Definitions 1–3 (ensemble average, time average, ergodicity).'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P_source1
  - P_source2
  - P_source3
- id: P_source1
  type: proposition
  statement: 'Source 1 — Absorbing states: deeply negative brand conviction is a perceptual configuration
    from which transition probability is negligible; it corresponds to the boundary of the positive octant
    S^7_+ in SBT''s dynamic model. Progressive absorption depletes the active population and produces
    survivorship-bias non-ergodicity, mathematically identical to ruin in Peters'' wealth dynamics.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P_source2
  type: proposition
  statement: 'Source 2 — Multiplicative dynamics: signals do not add to perception; they interact multiplicatively
    with the existing perceptual state and its cross-dimensional context, x_i^(d)(t+1) = f(x_i^(d)(t),
    s^(d), x_i^(-d)(t)). Because f is concave/nonlinear in the signal when the state is large, Jensen''s
    inequality makes the ensemble (arithmetic-mean) average exceed the time (geometric-mean) average —
    overstating the growth typical individuals experience, even without strict multiplicativity.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P_source3
  type: proposition
  statement: 'Source 3 — Path-dependent dimension weighting: each observer''s spectral profile (dimension
    weights w) is shaped by signal history, so identical subsequent signals produce divergent trajectories;
    divergence accumulates even within a single cohort and the ensemble average tracks the centroid of
    a dispersing cloud, not any individual.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P1
  type: proposition
  statement: (Proposition 1, Signal Order Effect) The same set of brand signals, encountered in different
    temporal orders, produces structurally different perception profiles. The difference is a systematic
    function of the interaction between signal sequence and the observer's evolving perceptual state,
    not noise; geometrically the sequences trace different paths on the curved manifold S^7_+ and arrive
    at structurally different locations.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P_source2
  - P_source3
- id: P2
  type: proposition
  statement: '(Proposition 2, Absorbing State Asymmetry) Negative brand conviction is an absorbing state
    — once crossed, the probability of return to neutral or positive perception is negligible — whereas
    positive conviction is not: even strongly positive conviction can be disrupted by sufficiently negative
    signals. The asymmetry reflects "bad is stronger than good" (Baumeister et al. 2001) and trust asymmetry
    (Slovic 1993), and is the direct analog of ruin at zero wealth in Peters (2019).'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P_source1
- id: P3
  type: proposition
  statement: '(Proposition 3, Ensemble-Time Divergence) Cross-sectional brand tracking systematically
    OVERestimates brand health for brands with absorbing-state risk via survivorship bias: the ensemble
    average is computed only over non-absorbed survivors, a positively selected subpopulation. Overestimation
    increases with (a) proximity to absorbing boundaries (lower coherence), (b) variance of signal quality,
    and (c) duration of tracking. Low-coherence brands (e.g. Tesla) show large divergence; ecosystem-coherent
    brands (e.g. Hermès) show minimal divergence.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P_source1
  - P_source2
- id: P4
  type: proposition
  statement: '(Proposition 4, First-Signal Anchoring) The first signal an observer encounters in a given
    dimension anchors all subsequent updates in that dimension; the anchoring diminishes with each subsequent
    signal but never vanishes — the first signal permanently biases steady-state perception toward its
    valence. The mechanism is the interaction between structural absence (an empty dimension) and multiplicative
    compounding: the first signal sets the initial value, which every multiplicative update carries forward.
    Distinct from mere recency/primacy — a "first-signal premium."'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P_source2
  - P_source3
- id: P5
  type: proposition
  statement: (Proposition 5, Cohort Trajectory Divergence) Observer cohorts with different dimension weights,
    exposed to identical signal sequences, produce divergent perception trajectories; divergence increases
    over time and does not converge — there is no long-run equilibrium in which different cohorts perceive
    the brand identically. Because the stationarity condition fails, cohort-specific weight × sequence
    interactions yield permanently different long-run states. This is the theoretical foundation of SBT's
    cohort concept (perceptual communities, not demographic segments).
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P_source3
- id: P_belief_bridge
  type: proposition
  statement: 'The three sources connect to Hogarth & Einhorn''s (1992) belief-adjustment model S_k = S_{k-1}
    + w_k[s(x_k) - R]: the reference point R is path-dependent (interaction of current state and new information
    = multiplicative dynamics) and the adjustment weight w_k produces an asymmetry between positive and
    negative updates. The model is reinterpreted — not contradicted — as evidence of non-ergodic dynamics,
    embedded in a more general framework operating across all eight dimensions simultaneously.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P_source1
  - P_source2
  - P_source3
methodology:
  type: mixed
  design: 'Discrete-time absorbing Markov chain: N = 1000 observers, initial perception 7.0 on a 0–10
    scale, per-period absorption probability lambda calibrated to each brand''s profile CV (Tesla''s high-CV
    profile = the reference lambda = .020). New absorptions drawn 70% from the lowest tertile of active
    observers and 30% at random (survivorship-selection mechanism); surviving observers receive a small
    positive drift (multiplicative-update dynamics). Six periods.'
  analysis:
    software: https://github.com/spectralbranding/sbt-papers/tree/main/r9-nonergodic-perception/code/simulate_absorption.py
    method: Python 3.12 + uv + numpy
acceptance:
- claim_id: P1
  criterion: Holds if (Proposition 1, Signal Order Effect) The same set of brand signals, encountered
    in different temporal orders, produces structurally different perception profiles.
  falsification: Repeated experimental manipulations of signal order (signal set held constant) producing
    statistically indistinguishable final profiles across all eight dimensions — no sequence × state interaction
    term, permutation tests no larger than measurement noise — would reduce the framework to an additive
    (ergodic) special case.
- claim_id: P2
  criterion: 'Holds if (Proposition 2, Absorbing State Asymmetry) Negative brand conviction is an absorbing
    state — once crossed, the probability of return to neutral or positive perception is negligible —
    whereas positive conviction is not: even strongly positive conviction can be disrupted by sufficiently
    negative signals.'
  falsification: Longitudinal absorption-rate measurement showing symmetric recovery probabilities — return
    from negative conviction statistically comparable to return from mere negative perception, or strong
    positive signals predictably restoring absorbed observers — would reduce P2 to a standard asymmetric-updating
    model.
- claim_id: P3
  criterion: 'Holds if (Proposition 3, Ensemble-Time Divergence) Cross-sectional brand tracking systematically
    OVERestimates brand health for brands with absorbing-state risk via survivorship bias: the ensemble
    average is computed only over non-absorbed survivors, a positively selected subpopulation.'
  falsification: A matched longitudinal panel with inverse-probability-weighting for attrition in which
    individual time averages converge to the ensemble average with probability approaching 1 as T grows
    (the deviation variance |x_i^(T) - x^(E)(t)| decreasing to zero) for a high-absorption-risk brand
    would indicate the survivorship-bias mechanism is empirically negligible.
- claim_id: P4
  criterion: Holds if (Proposition 4, First-Signal Anchoring) The first signal an observer encounters
    in a given dimension anchors all subsequent updates in that dimension; the anchoring diminishes with
    each subsequent signal but never vanishes — the first signal permanently biases steady-state perception
    toward its valence.
  falsification: A within-subject design (matched first signals of different valence in randomly assigned
    dimensions, then identical subsequent sequence) in which the first-signal coefficient decays to non-significance
    within a short window (3–5 subsequent signals) — effectively resetting the anchor — would reduce P4
    to a transient primacy effect.
- claim_id: P5
  criterion: Holds if (Proposition 5, Cohort Trajectory Divergence) Observer cohorts with different dimension
    weights, exposed to identical signal sequences, produce divergent perception trajectories; divergence
    increases over time and does not converge — there is no long-run equilibrium in which different cohorts
    perceive the brand identically.
  falsification: Cohorts with verified-different observer spectral profiles converging to indistinguishable
    trajectories after sufficient shared signals — no cohort × time interaction, within-cohort end-state
    variance not exceeding between-cohort variance — would indicate ergodicity-restoring forces the framework
    does not capture.
