results:
- claim_id: P3
  status: supported
  notes: 'Survivorship bias makes a deteriorating brand LOOK like a strengthening one under cross-sectional
    tracking: the tracked ensemble average rises while the true population average falls, with the gap
    widening over time. The bias direction is always positive (tracking is more optimistic than reality).
    This is not a pathological edge case — any brand with non-zero absorption risk exhibits it.'
- claim_id: P_source1
