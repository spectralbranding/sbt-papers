claims:
  - id: P1
    type: proposition
    statement: >
      The same set of brand signals, encountered in different temporal
      orders, produces structurally different perception profiles in the
      observer. The difference is a systematic function of the interaction
      between signal sequence and the observer's evolving perceptual state.
    testable: true
    tested_in_paper: true
    status: supported
    falsification: >
      P1 would be challenged if repeated experimental manipulations of
      signal order (holding the signal set constant) produce statistically
      indistinguishable final perception profiles across all eight SBT
      dimensions, or if a log-linear model of sequential belief updating
      shows no significant sequence x state interaction term.
    depends_on: []

  - id: P2
    type: proposition
    statement: >
      Negative brand conviction functions as an absorbing state: once an
      observer crosses the threshold from negative perception to negative
      conviction, the probability of return to neutral or positive
      perception is negligible. Positive brand conviction does not function
      as an absorbing state.
    testable: true
    tested_in_paper: true
    status: supported
    falsification: >
      P2 would be challenged if longitudinal absorption-rate measurement
      shows symmetric recovery probabilities across the conviction
      threshold, undermining the absorbing-boundary interpretation.
    depends_on: []

  - id: P3
    type: proposition
    statement: >
      Cross-sectional brand tracking systematically overestimates brand
      health for brands with absorbing-state risk. The magnitude of
      overestimation increases with the brand's proximity to absorbing
      boundaries (lower coherence), the variance of signal quality, and
      the duration of the tracking period.
    testable: true
    tested_in_paper: true
    status: supported
    falsification: >
      P3 would be challenged if a carefully matched longitudinal panel
      study, correcting for attrition through inverse probability
      weighting, finds individual time averages converging to ensemble
      averages as the panel duration increases.
    depends_on: [P2]

  - id: P4
    type: proposition
    statement: >
      The first signal an observer encounters in a given perceptual
      dimension anchors all subsequent updates in that dimension. The
      anchoring effect diminishes with each subsequent signal but does not
      vanish: the first signal permanently biases the steady-state
      perception in the direction of its valence.
    testable: true
    tested_in_paper: true
    status: supported
    falsification: >
      P4 would be challenged if a within-subject experimental design
      finds no significant long-run difference in steady-state perception
      attributable to the first-signal manipulation, or if first-signal
      coefficients decay to non-significance within a short window of
      subsequent signals.
    depends_on: []

  - id: P5
    type: proposition
    statement: >
      Observer cohorts with different dimension weights, exposed to
      identical signal sequences, produce divergent perception
      trajectories. The divergence increases over time and does not
      converge.
    testable: true
    tested_in_paper: true
    status: supported
    falsification: >
      P5 would be challenged if cohorts defined by significantly
      different observer spectral profiles converge to indistinguishable
      perception trajectories after exposure to a sufficient number of
      shared brand signals.
    depends_on: []

methodology:
  type: theoretical_with_simulation
  design: >
    Theoretical translation of the formal stochastic-dynamic model in
    Zharnikov (2026j) into a propositional framework accessible to consumer
    psychology and brand management researchers. Five propositions derived
    from three structural sources of non-ergodicity (absorbing states,
    multiplicative dynamics, path-dependent dimension weighting). Existing
    consumer-psychology and brand-tracking evidence is reinterpreted under
    the non-ergodic frame. Numerical illustrations (Tables 2 and 3) are
    generated by a discrete-time absorbing Markov chain simulation
    documented in the companion computation script and calibrated to the
    five canonical SBT brand profiles.
  simulation:
    script: "code/simulate_absorption.py"
    seed: 42
    n_observers: 1000
    periods: 6
    reproduces:
      - "Table 2"
      - "Table 3"
  instrument: "Propositional derivation; Markov-chain absorption simulation"
  analysis:
    primary:
      - "Mapping of consumer-psychology order-effect literature to non-ergodic mechanisms"
      - "Discrete-time absorbing Markov chain simulation across five canonical SBT brand profiles"
      - "Correspondence table between propositions and theorems in Zharnikov (2026j)"
    software: "Python 3.12, numpy"

