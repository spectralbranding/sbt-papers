# SPINE.yaml — Non-Ergodic Perception (2026o / R9)
#
# RETROFIT spine: extracted descriptively from the completed paper.md, NOT
# authored generatively before prose (CLAUDE.md rule 0aa / Publication Pipeline
# decision D4, [internal path removed]). The
# backbone is the paper's five formal propositions (P1–P5), the three structural
# sources of non-ergodicity, the multiplicative-update sufficiency conditions
# (C1–C3), the boundary conditions, and the two illustrative Monte-Carlo
# absorption simulations (Tables 2–3) that make the ensemble-time divergence
# concrete.
#
# Schema v0.2 ([internal path removed] §"Schema v0.2"): the
# paper reports author-produced simulated table values (Tables 2 and 3,
# generated by simulate_absorption.py with fixed seed 42), so the
# observation→method→measurement→finding chain is first-class for the headline
# survivorship-bias result. The five propositions remain analytic theory
# propositions translated from the formal model in Zharnikov (2026j).

spine_version: "0.2"
spine_doc_version: "0.1.0"
paper_key: "2026o"
provenance: retrofit
title: >-
  From Order Effects to Absorbing States: A Non-Ergodic Framework for
  Multi-Dimensional Brand Perception Dynamics
status: >-
  Retrofit spine extracted 2026-06-14 from completed working paper v2.2.
  Descriptive, not generative.

thesis: |
  Brand perception is non-ergodic: the time average of an individual observer's
  brand perception does not converge to the cross-sectional (ensemble) average
  across observers. Drawing on Peters' (2019) ergodicity framework from
  statistical physics, three structural sources produce the divergence —
  absorbing states from deeply negative brand conviction, multiplicative
  (rather than additive) signal-update dynamics, and path-dependent dimension
  weighting. Five formal propositions follow: signal order produces structurally
  different perception profiles from identical signals (P1); negative conviction
  is an absorbing state while positive conviction is not (P2); cross-sectional
  brand tracking systematically overestimates brand health for absorption-risk
  brands via survivorship bias (P3); the first signal in a dimension persistently
  anchors all subsequent updates (P4); and observer cohorts with different
  dimension weights diverge permanently under identical signals (P5). These
  propositions unify roughly eighty years of scattered order-effect, primacy,
  and belief-updating evidence within Spectral Brand Theory's eight-dimensional
  perception space, and the bias direction and magnitude are predictable from
  brand coherence. The framework is scoped to high-involvement B2C brand
  perception under multiplicative update dynamics.

# ============================================================================
# Boundary conditions — when the propositions hold (paper §3.4)
# ============================================================================
boundary_conditions:
  - id: C_lowinvolve
    statement: >-
      In low-involvement categories (commodity goods, habitual repurchase,
      low-stakes service) the multiplicative update mechanism (Source 2) is
      attenuated: heuristic processing makes the update function approximately
      additive, restoring ergodicity. The propositions apply where consumers
      actively integrate signals across multiple dimensions.
    observable: "Degree of deliberative cross-dimensional integration in the category."
    excludes: "Commodity / habitual / heuristic-processed categories."
    body_sections: ["§3.4 Boundary Conditions"]
  - id: C_commodity
    statement: >-
      Source 3 (path-dependent dimension weighting) requires heterogeneous
      observer spectral profiles. In undifferentiated commodity categories
      dimension weights cluster tightly, suppressing the cohort-divergence
      mechanism; the propositions assume sufficient brand dimensionality to
      activate differential weighting.
    observable: "Dispersion of observer spectral profiles across the eight dimensions."
    excludes: "Commodity / minimally differentiated brands."
    body_sections: ["§3.4 Boundary Conditions"]
  - id: C_shorthorizon
    statement: >-
      Absorbing states (Source 1) develop through sustained accumulation of
      negative conviction; for single-occasion or very short-horizon decisions
      the trajectory is too short for absorption to form. P2 and P3 are most
      relevant in ongoing brand relationships with repeated encounters.
    observable: "Length of the observer's encounter trajectory with the brand."
    excludes: "Single-occasion purchases / very short evaluation horizons."
    body_sections: ["§3.4 Boundary Conditions"]
  - id: C_elicitation
    statement: >-
      The primacy mechanism operates through sequential allocation processes,
      not perceptual encoding per se; measurement designs that elicit
      independent per-dimension ratings can suppress path-dependent effects.
      A methodological boundary condition: instruments must preserve sequential
      structure to detect the predicted dynamics.
    observable: "Whether the elicitation format preserves sequential signal structure."
    excludes: "Independent-Likert designs that strip sequence (suppress the signal)."
    body_sections: ["§3.4 Boundary Conditions", "§5.15 reference via Zharnikov 2026v"]

# ============================================================================
# Assumption atoms — the multiplicative-regime sufficiency conditions (§4.5)
# (each independently SUFFICIENT for multiplicative dynamics)
# ============================================================================
assumption_atoms:
  - id: AA_C1
    statement: >-
      (C1, Signal relativity) Each new signal is interpreted relative to current
      perception, not on an absolute scale: f(x,s) = x·g(s/x) rather than
      f(x,s) = x + h(s). Comparative evaluation ("is this twice as good as I
      believed?") makes the dynamics multiplicative.
    antecedents: []
    body_sections: ["§4.5 Sufficiency Conditions"]
  - id: AA_C2
    statement: >-
      (C2, Confirmation-bias modulation) Prior perception modulates signal
      interpretation strength; the adjustment weight scales with the current
      state (Hogarth & Einhorn 1992 belief-adjustment) — the defining property
      of multiplicative dynamics.
    antecedents: []
    body_sections: ["§4.5 Sufficiency Conditions"]
  - id: AA_C3
    statement: >-
      (C3, Proportional decay) Forgetting reduces perception by a fraction per
      unit time (Weber-Fechner / exponential decay dx/dt = -lambda·x), not by a
      constant amount; exponential decay is multiplicative, linear decay would be
      additive and ergodic.
    antecedents: []
    body_sections: ["§4.5 Sufficiency Conditions"]

# ============================================================================
# Stylized facts — the prior empirical record the framework unifies
# ============================================================================
stylized_facts:
  - id: SF_ordereffects
    statement: >-
      Roughly eighty years of consumer/social psychology converge on a single
      structural fact: the temporal order in which signals are encountered shapes
      the perception formed from them in ways not recoverable by aggregation
      (Asch 1946 primacy; Hogarth & Einhorn 1992 belief-adjustment; Anderson
      1981 information integration; Kardes & Kalyanaram 1992 order-of-entry).
      Each tradition treated its finding as domain-specific.
    antecedents: []
    evidence:
      - type: citation
        anchor: "Asch primacy; Hogarth-Einhorn belief-adjustment; Kardes-Kalyanaram order-of-entry."
        citation_keys: [asch-1946-forming-impressions-personality, hogarth-1992-order-effects-belief, kardes-1992-orderofentry-effects-consumer]
    body_sections: ["§intro", "§2.2 Path Dependence in Consumer Psychology"]
  - id: SF_tracking
    statement: >-
      Every major brand-tracking system (Kantar BrandZ, YouGov BrandIndex, NPS)
      surveys a cross-section, computes averages, and reports them as brand
      health — treating the population average at time t as informationally
      equivalent to any individual's trajectory through time (an ergodicity
      assumption).
    antecedents: []
    body_sections: ["§intro", "§6.1 The Tracking Fallacy"]

# ============================================================================
# Propositions — the three structural sources + the five formal propositions
# ============================================================================
propositions:
  - id: P_nonergodic
    statement: >-
      Brand perception is non-ergodic: the individual time average
      x_i^(T) does not converge to the ensemble (cross-sectional) average
      x^(E)(t) in general. Whenever dynamics are non-ergodic, cross-sectional
      averages provide systematically misleading information about individual
      trajectories. This is the paper's central claim, formalized via
      Definitions 1–3 (ensemble average, time average, ergodicity).
    conditions: "C_lowinvolve, C_commodity"
    antecedents: [SF_tracking, P_source1, P_source2, P_source3]
    evidence:
      - type: citation
        anchor: "Peters (2019) ergodicity problem; Peters & Gell-Mann (2016); Doctor et al. (2020) boundary conditions."
        citation_keys: [peters-2019-ergodicity-problem-economics, peters-2016-evaluating-gambles-using, doctor-2020-economists-views-ergodicity]
    body_sections: ["§3.1 Formal Definition", "§7.2 Relationship to Classical Brand Theory"]
  - id: P_source1
    statement: >-
      Source 1 — Absorbing states: deeply negative brand conviction is a
      perceptual configuration from which transition probability is negligible;
      it corresponds to the boundary of the positive octant S^7_+ in SBT's
      dynamic model. Progressive absorption depletes the active population and
      produces survivorship-bias non-ergodicity, mathematically identical to
      ruin in Peters' wealth dynamics.
    conditions: "C_shorthorizon"
    antecedents: []
    evidence:
      - type: citation
        anchor: "Peters (2019) ruin/survivorship; Kemeny & Snell (1960) absorbing Markov chains; SBT dynamic model Zharnikov 2026j."
        citation_keys: [peters-2019-ergodicity-problem-economics, kemeny-1960-finite-markov-chains]
    body_sections: ["§3.2 Source 1: Absorbing States"]
  - id: P_source2
    statement: >-
      Source 2 — Multiplicative dynamics: signals do not add to perception; they
      interact multiplicatively with the existing perceptual state and its
      cross-dimensional context, x_i^(d)(t+1) = f(x_i^(d)(t), s^(d), x_i^(-d)(t)).
      Because f is concave/nonlinear in the signal when the state is large,
      Jensen's inequality makes the ensemble (arithmetic-mean) average exceed the
      time (geometric-mean) average — overstating the growth typical individuals
      experience, even without strict multiplicativity.
    conditions: "AA_C1, AA_C2, AA_C3, C_lowinvolve"
    antecedents: [AA_C1, AA_C2, AA_C3]
    evidence:
      - type: analytic
        anchor: "Jensen's inequality on the concave update function; SBT cross-dimensional interaction term."
    body_sections: ["§3.2 Source 2: Multiplicative Dynamics", "§4.5 Sufficiency Conditions"]
  - id: P_source3
    statement: >-
      Source 3 — Path-dependent dimension weighting: each observer's spectral
      profile (dimension weights w) is shaped by signal history, so identical
      subsequent signals produce divergent trajectories; divergence accumulates
      even within a single cohort and the ensemble average tracks the centroid of
      a dispersing cloud, not any individual.
    conditions: "C_commodity"
    antecedents: []
    evidence:
      - type: citation
        anchor: "Dzyabura & Hauser (2019) learned preference weights; Kruschke (2008) attention-shifting; LLM weighting baseline Zharnikov 2026v."
        citation_keys: []
    body_sections: ["§3.2 Source 3: Path-Dependent Dimension Weighting"]
  - id: P1
    statement: >-
      (Proposition 1, Signal Order Effect) The same set of brand signals,
      encountered in different temporal orders, produces structurally different
      perception profiles. The difference is a systematic function of the
      interaction between signal sequence and the observer's evolving perceptual
      state, not noise; geometrically the sequences trace different paths on the
      curved manifold S^7_+ and arrive at structurally different locations.
    conditions: "C_lowinvolve, C_elicitation"
    antecedents: [P_source2, P_source3]
    evidence:
      - type: citation
        anchor: "Hogarth & Einhorn (1992) 128-condition belief-adjustment; Smith & Vogt (1995) ad-vs-WOM order; Asch (1946) trait order."
        citation_keys: [hogarth-1992-order-effects-belief, asch-1946-forming-impressions-personality]
    falsifier: >-
      Repeated experimental manipulations of signal order (signal set held
      constant) producing statistically indistinguishable final profiles across
      all eight dimensions — no sequence × state interaction term, permutation
      tests no larger than measurement noise — would reduce the framework to an
      additive (ergodic) special case.
    body_sections: ["§Proposition 1", "§5.1 Evidence for P1", "Table 1"]
  - id: P2
    statement: >-
      (Proposition 2, Absorbing State Asymmetry) Negative brand conviction is an
      absorbing state — once crossed, the probability of return to neutral or
      positive perception is negligible — whereas positive conviction is not:
      even strongly positive conviction can be disrupted by sufficiently negative
      signals. The asymmetry reflects "bad is stronger than good" (Baumeister
      et al. 2001) and trust asymmetry (Slovic 1993), and is the direct analog of
      ruin at zero wealth in Peters (2019).
    conditions: "C_shorthorizon"
    antecedents: [P_source1]
    evidence:
      - type: citation
        anchor: "Baumeister et al. (2001) negativity bias; Slovic (1993) trust asymmetry; SBT boundary Zharnikov 2026j."
        citation_keys: [baumeister-2001-bad-is-stronger, slovic-1993-perceived-risk-trust]
    falsifier: >-
      Longitudinal absorption-rate measurement showing symmetric recovery
      probabilities — return from negative conviction statistically comparable to
      return from mere negative perception, or strong positive signals predictably
      restoring absorbed observers — would reduce P2 to a standard
      asymmetric-updating model.
    body_sections: ["§Proposition 2", "§5.2 Evidence for P2", "Table 1"]
  - id: P3
    statement: >-
      (Proposition 3, Ensemble-Time Divergence) Cross-sectional brand tracking
      systematically OVERestimates brand health for brands with absorbing-state
      risk via survivorship bias: the ensemble average is computed only over
      non-absorbed survivors, a positively selected subpopulation. Overestimation
      increases with (a) proximity to absorbing boundaries (lower coherence),
      (b) variance of signal quality, and (c) duration of tracking. Low-coherence
      brands (e.g. Tesla) show large divergence; ecosystem-coherent brands
      (e.g. Hermès) show minimal divergence.
    conditions: "C_shorthorizon"
    antecedents: [P_source1, P_source2]
    evidence:
      - type: citation
        anchor: "Peters (2019) survivorship bias; coherence-typed profiles Zharnikov 2026a; NPS bimodality and panel attrition (indirect)."
        citation_keys: [peters-2019-ergodicity-problem-economics]
      - type: simulation
        anchor: "Tables 2 and 3 (simulate_absorption.py) — see findings F_table2 / F_table3."
    falsifier: >-
      A matched longitudinal panel with inverse-probability-weighting for
      attrition in which individual time averages converge to the ensemble
      average with probability approaching 1 as T grows (the deviation variance
      |x_i^(T) - x^(E)(t)| decreasing to zero) for a high-absorption-risk brand
      would indicate the survivorship-bias mechanism is empirically negligible.
    body_sections: ["§Proposition 3", "§5.3 Evidence for P3", "§6.1 The Tracking Fallacy", "Tables 1–3"]
  - id: P4
    statement: >-
      (Proposition 4, First-Signal Anchoring) The first signal an observer
      encounters in a given dimension anchors all subsequent updates in that
      dimension; the anchoring diminishes with each subsequent signal but never
      vanishes — the first signal permanently biases steady-state perception
      toward its valence. The mechanism is the interaction between structural
      absence (an empty dimension) and multiplicative compounding: the first
      signal sets the initial value, which every multiplicative update carries
      forward. Distinct from mere recency/primacy — a "first-signal premium."
    conditions: "C_elicitation"
    antecedents: [P_source2, P_source3]
    evidence:
      - type: citation
        anchor: "Kardes & Kalyanaram (1992) order-of-entry; Hogarth & Einhorn (1992) reference point; LLM serial-position baseline Zharnikov 2026v §5.15."
        citation_keys: [kardes-1992-orderofentry-effects-consumer, hogarth-1992-order-effects-belief]
    falsifier: >-
      A within-subject design (matched first signals of different valence in
      randomly assigned dimensions, then identical subsequent sequence) in which
      the first-signal coefficient decays to non-significance within a short
      window (3–5 subsequent signals) — effectively resetting the anchor —
      would reduce P4 to a transient primacy effect.
    body_sections: ["§Proposition 4", "§5.4 Evidence for P4", "§6.3 The First-Signal Premium", "Table 1"]
  - id: P5
    statement: >-
      (Proposition 5, Cohort Trajectory Divergence) Observer cohorts with
      different dimension weights, exposed to identical signal sequences, produce
      divergent perception trajectories; divergence increases over time and does
      not converge — there is no long-run equilibrium in which different cohorts
      perceive the brand identically. Because the stationarity condition fails,
      cohort-specific weight × sequence interactions yield permanently different
      long-run states. This is the theoretical foundation of SBT's cohort concept
      (perceptual communities, not demographic segments).
    conditions: "C_commodity"
    antecedents: [P_source3]
    evidence:
      - type: citation
        anchor: "Grier & Brumbaugh (1999) target vs non-target meaning; Puntoni et al. (2011) bilingual processing; McCracken (1986) meaning transfer."
        citation_keys: [grier-1999-noticing-cultural-differences]
    falsifier: >-
      Cohorts with verified-different observer spectral profiles converging to
      indistinguishable trajectories after sufficient shared signals — no cohort ×
      time interaction, within-cohort end-state variance not exceeding
      between-cohort variance — would indicate ergodicity-restoring forces the
      framework does not capture.
    body_sections: ["§Proposition 5", "§5.5 Evidence for P5", "Table 1"]
  - id: P_belief_bridge
    statement: >-
      The three sources connect to Hogarth & Einhorn's (1992) belief-adjustment
      model S_k = S_{k-1} + w_k[s(x_k) - R]: the reference point R is
      path-dependent (interaction of current state and new information =
      multiplicative dynamics) and the adjustment weight w_k produces an asymmetry
      between positive and negative updates. The model is reinterpreted — not
      contradicted — as evidence of non-ergodic dynamics, embedded in a more
      general framework operating across all eight dimensions simultaneously.
    conditions: ""
    antecedents: [P_source1, P_source2, P_source3]
    evidence:
      - type: citation
        anchor: "Hogarth & Einhorn (1992) belief-adjustment model."
        citation_keys: [hogarth-1992-order-effects-belief]
    body_sections: ["§3.3 The Belief-Adjustment Mechanism"]

# ============================================================================
# Derivations — the formal-model backbone the propositions translate
# ============================================================================
derivations:
  - id: D_multiplicative_sufficiency
    statement: >-
      When any of C1–C3 (AA_C1/AA_C2/AA_C3) holds uniformly across the population
      the dynamics are multiplicative and P1–P5 apply; when all three fail
      uniformly the dynamics are additive and ergodic, time averages converge to
      ensemble averages, and classical brand tracking (Keller 1993; Aaker 1991)
      is valid — revealing the classical framework as a special case.
    antecedents: [AA_C1, AA_C2, AA_C3, P_nonergodic]
    body_sections: ["§4.5 Sufficiency Conditions"]
  - id: D_formal_correspondence
    statement: >-
      Each proposition is a conceptual translation of a formal result in
      Zharnikov (2026j): P1↔path dependence / non-commutativity of stochastic
      integrals on S^7_+; P2↔Theorem 2 survival-probability decay at the absorbing
      boundary; P3↔Theorem 4 formal non-ergodicity (time-average ≠ ensemble-average
      a.s.); P4↔drift-term dependence on initial condition (C(x) factor); P5↔
      weight-dependent diffusion coefficient sigma(w) (Table 4).
    antecedents: [P1, P2, P3, P4, P5]
    body_sections: ["§7.1 Relationship to SBT's Formal Dynamic Model", "Table 4"]

# ============================================================================
# Observations / Methods / Measurements / Findings — the illustrative
# absorption simulations (Tables 2–3) that operationalize P3
# ============================================================================
observations:
  - id: O_canonical_profiles
    statement: >-
      The five canonical SBT brand profiles (IKEA, Patagonia, Hermès, Erewhon,
      Tesla) supply eight-dimension emission vectors whose coefficient of
      variation (CV) indexes coherence: low CV = coherent, high CV = incoherent
      (Zharnikov 2026a).
    raw_data_pointer: "CLAUDE.md §3 canonical brand profiles; Zharnikov 2026a"
    instrument: "canonical SBT profile vectors"
    timestamp: "2026-05"
    body_sections: ["Table 3"]

methods:
  - id: M_absorption_sim
    statement: >-
      Discrete-time absorbing Markov chain: N = 1000 observers, initial
      perception 7.0 on a 0–10 scale, per-period absorption probability lambda
      calibrated to each brand's profile CV (Tesla's high-CV profile = the
      reference lambda = .020). New absorptions drawn 70% from the lowest tertile
      of active observers and 30% at random (survivorship-selection mechanism);
      surviving observers receive a small positive drift (multiplicative-update
      dynamics). Six periods.
    type: "monte_carlo_simulation"
    inputs: ["canonical SBT profile CVs", "N=1000", "lambda calibrated to CV"]
    outputs: ["Table 2 (single-brand trajectory)", "Table 3 (five-brand gaps)"]
    code_anchor: "https://github.com/spectralbranding/sbt-papers/tree/main/r9-nonergodic-perception/code/simulate_absorption.py"
    reproducibility:
      seed: "42 (fixed)"
      run_command: "uv run --with numpy python simulate_absorption.py --seed 42 --periods 6"
      runtime_environment: "Python 3.12 + uv + numpy"
    body_sections: ["§6.1 (Table 2)", "Table 3", "§Companion Computation Script"]

measurements:
  - id: m_table2_gap
    statement: >-
      Illustrative single low-coherence brand (lambda = .020): the active-only
      ensemble average RISES from 7.0 to 7.3 over six periods while the true
      population average (including absorbed observers) FALLS from 7.0 to 6.5 —
      the divergence grows monotonically and the bias is consistently positive.
    source_observations: [O_canonical_profiles]
    generating_method: M_absorption_sim
    value: "ensemble 7.0->7.3 vs population 7.0->6.5 at t=6"
    units: "perception points (0–10 scale)"
    body_sections: ["Table 2", "§6.1 The Tracking Fallacy"]
  - id: m_table3_gaps
    statement: >-
      Across the five canonical profiles at t=6 the ensemble average converges to
      ~7.3 for all brands while the population average stratifies by coherence:
      IKEA gap .4 (CV .171), Patagonia .4 (CV .193), Hermès .6 (CV .255), Erewhon
      .8 (CV .352), Tesla .9 (CV .388). The gap ordering tracks profile dispersion
      (CV), not profile mean.
    source_observations: [O_canonical_profiles]
    generating_method: M_absorption_sim
    value: "gaps IKEA .4 / Patagonia .4 / Hermès .6 / Erewhon .8 / Tesla .9"
    units: "ensemble-minus-population perception points"
    body_sections: ["Table 3"]

findings:
  - id: F_table2
    statement: >-
      Survivorship bias makes a deteriorating brand LOOK like a strengthening one
      under cross-sectional tracking: the tracked ensemble average rises while the
      true population average falls, with the gap widening over time. The bias
      direction is always positive (tracking is more optimistic than reality).
      This is not a pathological edge case — any brand with non-zero absorption
      risk exhibits it.
    type: "simulation_demonstration"
    source_measurements: [m_table2_gap]
    generating_method: M_absorption_sim
    antecedents: [P3, P_source1]
    citation_role_in_paper: "illustrative_evidence_for_P3"
    body_sections: ["Table 2", "§6.1 The Tracking Fallacy"]
  - id: F_table3
    statement: >-
      The ensemble-time gap orders by coherence (Tesla > Erewhon > Hermès >
      Patagonia ≈ IKEA), tracking profile dispersion (CV) rather than profile
      mean — confirming P3's prediction that overestimation is worse for
      low-coherence brands. Ensemble averages can converge across brands of very
      different underlying populations, masking real differences visible only when
      individual trajectories are tracked.
    type: "simulation_demonstration"
    source_measurements: [m_table3_gaps]
    generating_method: M_absorption_sim
    antecedents: [P3, O_canonical_profiles]
    citation_role_in_paper: "illustrative_evidence_for_P3"
    body_sections: ["Table 3"]

# ============================================================================
# Alternative explanations — rivals the framework rules out / distinguishes from
# ============================================================================
alternative_explanations:
  - id: A_additive_ergodic
    statement: >-
      Perception updates are additive (each touchpoint adds independently to a
      cumulative score) and memory decays linearly, so the process is ergodic and
      cross-sectional tracking is valid — the implicit assumption of classical
      brand tracking (Aaker 1991; Keller 1993).
    rules_out_required: [P_nonergodic]
    ruled_out_by: [D_multiplicative_sufficiency, P_source2]
    rules_out_status: "scoped_as_special_case"
    reasoning: >-
      The additive/ergodic regime is not refuted but located: it is the special
      case where all of C1–C3 fail uniformly. Where any of C1–C3 holds (the
      common high-involvement case), dynamics are multiplicative and the
      propositions apply; the log-linear vs linear panel-fit test distinguishes
      the regimes empirically.
    body_sections: ["§4.5 Sufficiency Conditions", "§7.2 Relationship to Classical Brand Theory"]
  - id: A_bayesian_convergence
    statement: >-
      Sequential belief updating is Bayesian and therefore inherently ergodic:
      posteriors converge across agents with different priors given enough data,
      so order ultimately washes out.
    rules_out_required: [P2, P_nonergodic]
    ruled_out_by: [P_source1]
    rules_out_status: "rejected"
    reasoning: >-
      Absorbing states are structurally non-Bayesian: an observer convinced a
      brand is fundamentally dishonest occupies a collapsed likelihood where no
      evidence is deemed diagnostic positively — a state from which no data
      updates the belief, which Bayesian models cannot accommodate. Brand
      perception violates exchangeability of observations, a necessary condition
      for ergodicity.
    body_sections: ["§2.2 (Bayesian updating paragraph)"]

# ============================================================================
# Limitations — honest scope (paper §7.4)
# ============================================================================
limitations:
  - id: L_b2c_scope
    statement: >-
      The framework is scoped to high-involvement B2C brand perception; B2B
      settings introduce potential ergodicity-restoring mechanisms (committee
      decisions, competitive bidding, contractual reset points, formal review
      cycles). Whether the three sources operate with equal force in B2B is an
      open empirical question.
    severity: "scope-bounding"
    affects: [P_nonergodic, P1, P2, P3, P4, P5]
    body_sections: ["§7.4 Limitations and Future Empirical Research", "§intro (unification scope note)"]
  - id: L_reused_evidence
    statement: >-
      The propositions are derived theoretically and supported by existing
      evidence generated to test narrower hypotheses (order effects, primacy,
      path dependence), not designed to test non-ergodicity directly. Direct
      tests require longitudinal individual-level tracking, absorption-rate
      measurement, multi-dimensional trajectory analysis, and experimental signal-
      sequence manipulation.
    severity: "evidential"
    affects: [P1, P2, P3, P4, P5]
    body_sections: ["§7.4 Limitations and Future Empirical Research", "§Empirical Foundations"]
  - id: L_sbt_dependence
    statement: >-
      The non-ergodicity results do not depend on the specific number/identity of
      dimensions, but the managerial recommendations (managing structural absence
      across eight dimensions) depend on SBT's eight-dimensional structure, whose
      empirical validation (Zharnikov 2026a) is ongoing.
    severity: "scope-bounding"
    affects: [P5]
    body_sections: ["§7.4 Limitations and Future Empirical Research"]
  - id: L_measuring_absorption
    statement: >-
      Absorbing states are hard to measure: negative conviction (a categorical
      judgment) is not a low score on a standard Likert scale; instruments that
      distinguish recoverable negative perception from absorbing negative
      conviction are a prerequisite for testing P2 and P3 directly.
    severity: "measurement"
    affects: [P2, P3]
    body_sections: ["§7.4 Limitations and Future Empirical Research", "§6.5 Implications for Consumer-Psychology Research"]

