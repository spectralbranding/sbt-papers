# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026g): Sphere Packing Bounds for Multi-Dimensional Brand Positioning
spec_version: "0.1.0"

meta:
  title: "How Many Brands Can a Market Hold? Sphere Packing Bounds for Multi-Dimensional Positioning"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.18945522"
  date: "2026-01-01"
  version: "1.0"
  venue: "Working Paper (Zenodo)"
  license: "CC-BY-4.0"
  keywords:
    - sphere packing
    - E8 lattice
    - brand positioning
    - market capacity
    - kissing number
    - perceptual threshold
    - high-dimensional geometry
    - Spectral Brand Theory

claims:
  - id: "D1"
    type: definition
    statement: >
      Two brands A and B are distinguishable if their Aitchison distance in
      the clr-transformed brand space exceeds the perceptual threshold epsilon.
      They are confusable if d_B(s_A, s_B) <= epsilon. The threshold epsilon
      is a parameter (not a constant) depending on observer expertise, dimensional
      salience, comparison context, and engagement level.
    formal: "Distinguishable iff d_B(s_A, s_B) > epsilon; confusable iff d_B(s_A, s_B) <= epsilon"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: []

  - id: "P1"
    type: proposition
    statement: >
      Positioning capacity: for a perceptual threshold epsilon > 0 in the unit
      8-ball of the clr-transformed brand space, the number of distinguishable
      brand positions N satisfies (1/epsilon)^8 <= N <= ((2+epsilon)/epsilon)^8.
      At epsilon=0.10: 10^8 <= N <= 3.78*10^10. At epsilon=0.20: ~3.91*10^5 <= N <= ~2.14*10^8.
    formal: "(1/epsilon)^8 <= N <= ((2+epsilon)/epsilon)^8"
    testable: false
    tested_in_paper: false
    status: supported
    depends_on: ["D1"]

  - id: "P2"
    type: proposition
    statement: >
      Local competition structure: each brand position in the E8 lattice packing
      has exactly 240 nearest-neighbor positions (the maximum possible in 8 dimensions).
      These decompose into 112 specialist vectors of the form (+-1, +-1, 0,...,0)
      concentrated on exactly 2 of 8 dimensions, and 128 generalist vectors of
      the form (+-1/2,...,+-1/2) with even number of minus signs distributed
      across all 8 dimensions.
    formal: "E8 kissing number = 240 = 112 (specialist) + 128 (generalist)"
    testable: false
    tested_in_paper: false
    status: supported
    depends_on: ["P1"]

  - id: "P3"
    type: proposition
    statement: >
      White space abundance: for n_b brands in the unit 8-ball with perceptual
      threshold epsilon, the fraction of positioning space not covered by any
      brand's perceptual neighborhood is approximately 1 - n_b * epsilon^8.
      At epsilon=0.10 with 10,000 brands: white space fraction = 99.99%.
      Even 1,000,000 brands leave 99.0% of the space unoccupied.
    formal: "f_white approx 1 - n_b * epsilon^8 (for n_b * epsilon^8 << 1)"
    testable: false
    tested_in_paper: false
    status: supported
    depends_on: ["P1"]

  - id: "P4"
    type: proposition
    statement: >
      Category saturation criterion: a product category with effective dimensionality
      d_eff and perceptual threshold epsilon is saturated when the number of brands
      n_b approaches (1/epsilon)^d_eff. Categories with d_eff = 2 saturate at ~100
      brands; d_eff = 8 saturates at ~10^8 brands.
    formal: "Saturation when n_b ~ (1/epsilon)^d_eff"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["P1"]

  - id: "P5"
    type: proposition
    statement: >
      Correlation-induced capacity collapse: when SBT dimensions are correlated
      at average pairwise correlation rho = 0.3, effective dimensionality drops
      from 8 to approximately d_eff = 8 * (1 - rho) / (1 + (8-1)*rho) approx 2.6,
      collapsing positioning capacity from 10^8 to approximately 10^3.
    formal: "d_eff = n(1-rho) / (1+(n-1)rho); at n=8, rho=0.3: d_eff approx 2.6"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["P1"]

methodology:
  type: theoretical
  design: >
    Mathematical derivation applying sphere packing theory to Spectral Brand
    Theory's 8-dimensional brand space equipped with the Aitchison metric
    (Zharnikov, 2026d). The clr transform maps R^8_+ isometrically to a
    7-dimensional hyperplane where the Aitchison metric becomes Euclidean,
    enabling direct application of sphere packing results. Viazovska's (2017)
    proof of E8 optimality provides the packing density. Capacity bounds
    derived from standard volume ratio arguments; white space from direct
    volume calculation; correlation collapse from effective dimensionality
    estimation via principal component analysis argument.
  analysis:
    method: >
      Volume ratio bounds (Minkowski-Hlawka lower bound, covering upper bound);
      E8 lattice geometry (Conway & Sloane 1999); effective dimensionality
      estimation under dimensional correlation; conceptual application to
      five SBT case-study brands
    software: "None (analytical)"

acceptance:
  - claim_id: "P1"
    criterion: >
      Empirical perceptual discrimination studies with trained observers establish
      a just-noticeable difference threshold epsilon in the Aitchison-metric brand
      space; the resulting capacity bounds are non-trivially large (> 1000 positions
      at the measured epsilon).
    falsification: >
      The perceptual threshold epsilon is so large (e.g., > 0.5) that capacity
      bounds collapse to fewer than 100 distinguishable positions, making the
      framework trivially equivalent to low-dimensional perceptual maps.

  - claim_id: "P4"
    criterion: >
      In product categories where effective dimensionality is measurable (e.g.,
      via factor analysis of consumer perception data), brand counts correlate
      positively with (1/epsilon)^d_eff, and categories with known saturation
      exhibit n_b close to the capacity bound.
    falsification: >
      Brand counts show no systematic relationship to estimated positioning
      capacity across categories, or capacity bounds are consistently exceeded
      without competitive pressure.

  - claim_id: "P5"
    criterion: >
      Factor analysis of SBT dimension scores across a large sample of brands
      yields effective dimensionality substantially below 8 (e.g., 2-4 factors),
      consistent with dimensional correlation reducing capacity as predicted.
    falsification: >
      Factor analysis yields 7-8 independent factors with low cross-loadings,
      indicating near-zero dimensional correlation and full 8-dimensional capacity.

data:
  available: false
  url: ""
  notes: >
    No primary data collected. Five SBT case-study brand profiles (Hermes,
    IKEA, Patagonia, Erewhon, Tesla) are used for illustrative application
    only; they are author-assigned from Zharnikov (2026a), not survey-derived.
    Perceptual threshold epsilon is treated as a parameter; empirical calibration
    is explicitly deferred to future work.

code:
  available: true
  url: "https://github.com/spectralbranding/sbt-framework"
  notes: >
    No simulation code required for this paper (all results are analytical).
    The sbt-framework repository implements brand profile computation and
    the Aitchison distance metric on which the distinguishability definition (D1)
    is based. The capacity bounds of Proposition 1 can be computed with trivial
    arithmetic given epsilon.

