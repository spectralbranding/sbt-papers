limitations:
- description: 'Anisotropy: the analysis assumes isotropic space, but SBT dimensions are unlikely to be
    symmetric (per-dimension perceptual ranges and thresholds differ; integral vs separable dimensions
    per Garner 1974 / Shepard 1987). Under anisotropy the epsilon-balls become ellipsoids, E_8 no longer
    optimal; the bounds survive as order-of-magnitude estimates but exact constants change.'
  severity: moderate
  addressable: true
- description: 'Observer dependence: the analysis fixes a single Aitchison metric, but brand distance
    is observer-dependent (2026d); under the observer-weighted metric the packing "spheres" become observer-dependent
    ellipsoids and capacity is observer-dependent (a market saturated for one cohort may have white space
    for another). Full treatment requires integrating over the observer distribution on Delta^7 — future
    work.'
  severity: moderate
  addressable: true
- description: 'Noise and bounded-region assumptions: real brand positions are distributions (perception
    clouds), not points; noise inflates the effective threshold to epsilon + 2 sigma and reduces capacity
    by ((epsilon+2sigma)/ epsilon)^8. The unit-ball / convex feasible-region assumption may overstate
    capacity if the achievable region is smaller or non-convex.'
  severity: moderate
  addressable: true
- description: Empirical calibration of the perceptual threshold epsilon (via JND experiments) and empirical
    estimation of category effective dimensionality (via PCA on observer-perceived profiles to test Proposition
    5) remain future work; the category examples in Tables 7-8 are illustrative, not empirical.
  severity: moderate
  addressable: true
