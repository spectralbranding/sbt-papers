meta:
  title: How Many Brands Can a Market Hold? Sphere Packing Bounds for Multi-Dimensional Positioning
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.18945522
  date: '2026-06-01'
  venue: Working Paper (Zenodo); marketing-science / quant-marketing venue TBD
  license: CC-BY-4.0
  keywords:
  - sphere packing
  - $E_8$ lattice
  - brand positioning
  - market capacity
  - kissing number
  - perceptual threshold
  - high-dimensional geometry
  - Spectral Brand Theory
  abstract: 'How many distinguishable brand positions can a market sustain? We formalize brand perception
    as points in $\mathbb{R}^8_+$ under the Aitchison metric [@aitchison-1986-statistical-analysis-compositional;
    @egozcue-2003-isometric-logratio-transformations], which is isometric to Euclidean distance on a 7-dimensional
    hyperplane after centered log-ratio transformation. Two brands are distinguishable if their distance
    exceeds perceptual threshold $\varepsilon$. The problem maps onto sphere packing. Because the $E_8$
    lattice achieves the unique optimal packing in eight dimensions [@viazovska-2017-sphere-packing-problem],
    its density ($\pi^4/384 \approx .2537$) and kissing number (240) supply structural bounds. We derive
    five results: (1) volume-ratio capacity is at least $(1/\varepsilon)^8$, equaling $10^8$ positions
    at $\varepsilon = .10$; (2) each position has at most 240 nearest neighbors decomposing into 112 specialist
    (two-dimensional) and 128 generalist (eight-dimensional) vectors; (3) 10,000 brands occupy less than
    .01% of the unit 8-ball; (4) category saturation occurs near $(1/\varepsilon)^{d_\text{eff}}$; (5)
    average inter-dimension correlation $\rho = .3$ collapses effective dimensionality to approximately
    2.6 and capacity by five orders of magnitude. An LLM stability experiment (250 calls, five models)
    finds null competitive-interference effects, consistent with fixed geometry. The $E_8$ connection
    is structural, not literal: it establishes the mathematical ceiling on positioning capacity. We discuss
    implications for white-space strategy, correlation management, and observer-dependent capacity.'
claims:
- id: P0
  type: proposition
  statement: The marketing metaphor of a "positioning space" has never been made geometrically literal;
    given an 8-dimensional perception space with a formal metric, the basic quantitative question — how
    many distinguishable positions the space contains — is a sphere-packing problem and is answerable
    with proved results.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P1
  type: proposition
  statement: (Proposition 1, Positioning capacity) For perceptual threshold epsilon > 0 in the unit 8-ball
    of clr-transformed brand space, the number of distinguishable positions N satisfies (1/epsilon)^8
    <= N <= ((2+epsilon)/epsilon)^8; at epsilon = .10 the lower bound is 10^8. The argument is structurally
    the Hamming bound applied geometrically and is formally equivalent to Shannon channel capacity.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: (Proposition 2, Local competition) Each position in the E_8 packing has exactly 240 nearest
    neighbors — the maximum in eight dimensions — decomposing into 112 specialist vectors (two coordinates
    +/-1, six zeros) and 128 generalist vectors (all eight coordinates +/-1/2, even sign parity). Tightness
    tau(8) = 240 follows from the Kabatyanskii-Levenshtein LP bound. The specialist/generalist competitive
    reading is a structurally-motivated analogy, not an empirical regularity.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P3
  type: proposition
  statement: (Proposition 3, White space abundance) For n_b brands at threshold epsilon with non-overlapping
    neighborhoods, the unoccupied fraction is ~ 1 - n_b * epsilon^8; at epsilon = .10 even 10,000 brands
    leave 99.99% of the positioning space unoccupied — a direct consequence of high-dimensional volume
    (curse of dimensionality).
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P4
  type: proposition
  statement: (Proposition 4, Category saturation) A category with effective dimensionality d_eff and threshold
    epsilon is saturated when the number of brands approaches (1/epsilon)^d_eff; saturation depends on
    effective dimensionality, not raw brand count (commodity d_eff ~ 2 saturates near 100; luxury d_eff
    ~ 8 admits 10^8).
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P5
  type: proposition
  statement: (Proposition 5, Correlation collapses capacity) If the eight SBT dimensions have average
    pairwise correlation rho, effective dimensionality is d_eff = n / (1 + (n-1) rho) and capacity is
    ~ (1/epsilon)^d_eff; at rho = .3 (n = 8) d_eff ~ 2.6 and capacity collapses from 10^8 to ~10^3 — making
    de-correlation of a brand's dimensional profile a primary strategic asset. The capacity-collapse curve
    is steepest in the low-rho regime.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P6
  type: proposition
  statement: 'The E_8 connection is structural, not literal: it bounds the mathematical ceiling of positioning
    order — it does NOT claim brands arrange on a lattice, that 240 literally describes competition, that
    the 112/128 decomposition is a market law, or that E_8 plays any causal role. Real brand distributions
    are noisy, irregular, non-uniform, and far from any lattice.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
- id: P7
  type: proposition
  statement: 'Eight dimensions is mathematically exceptional: optimal packing is proved only in n = 1,2,3,8,24,
    so in n = 8 the density (pi^4/384), kissing number (240), and full nearest-neighbor configuration
    are known exactly; the coincidence with SBT''s eight (qualitatively derived) dimensions is fortunate
    but not evidence of a deeper structural connection. SBT''s dimensional choice is independently grounded
    by the completeness/necessity argument (2026r).'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P8
  type: proposition
  statement: Projection from 8D to a low-dimensional perceptual map (typically 2D) collapses capacity
    from 10^8 to ~10^2 — the positioning analog of spectral metamerism (2026e). The "crowded market" complaint
    is largely a projection artifact, not genuine scarcity of distinguishable positions.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
methodology:
  type: empirical
  design: 'Distinguishability-to-packing reduction: two brands are distinguishable iff their Aitchison
    distance exceeds perceptual threshold epsilon, so each brand occupies an epsilon/2 ball; the maximum
    number of distinguishable positions equals the packing number of epsilon/2 balls in the region. Volume-ratio
    bounding: lower bound N >= V_8(1)/V_8(epsilon) = (1/epsilon)^8 via the maximality/covering argument;
    upper bound N <= V_8(1+epsilon/2) / V_8(epsilon/2) = ((2+epsilon)/epsilon)^8 via containment in B(0,
    1+epsilon/2); E_8 density gives the intermediate estimate Delta_8 * V_8(1)/V_8(epsilon/2). Effective-dimensionality
    reduction: for an equicorrelation matrix with average pairwise correlation rho, the participation
    ratio d_eff = (sum lambda_k)^2 / sum lambda_k^2 simplifies to n / (1 + (n-1) rho); capacity is then
    (1/epsilon)^d_eff.'
  analysis:
    software: R4_R5_computations.py / r4_capacity_bounds.py (SEED = 42)
    method: Python 3.12 + numpy + scipy
