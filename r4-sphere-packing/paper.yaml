results:
  - claim_id: "D1"
    status: not_tested
    notes: >
      Distinguishability definition adopted from psychophysics (Weber-Fechner JND).
      The Aitchison-metric threshold has not been empirically calibrated; epsilon
      is treated as a free parameter throughout.

  - claim_id: "P1"
    status: supported
    notes: >
      Lower bound follows from volume ratio: N >= V_8(1)/V_8(epsilon) = (1/epsilon)^8.
      Upper bound from covering argument: N <= V_8(1+epsilon/2)/V_8(epsilon/2) = ((2+epsilon)/epsilon)^8.
      Analytical derivation in Section 4.1. No empirical validation.

  - claim_id: "P2"
    status: supported
    notes: >
      240 nearest neighbors of E8 are well-known (Conway & Sloane 1999, Ch. 4).
      The 112/128 decomposition follows from counting vectors with 2 nonzero
      coordinates (C(8,2)*4 = 112) and all-half-integer vectors with even
      negative count (2^8/2 = 128). The specialist/generalist interpretation
      is structurally motivated; the competitive analogy is explicitly marked
      as interpretive throughout the paper.

  - claim_id: "P3"
    status: supported
    notes: >
      Direct consequence of P1: white space fraction = 1 - n_b * V_8(epsilon)/V_8(1) = 1 - n_b * epsilon^8.
      The calculation shows that even 10^6 brands at epsilon=0.10 leave 99% of
      the space unoccupied. No empirical data required.

  - claim_id: "P4"
    status: not_tested
    notes: >
      Saturation criterion is proposed as a theoretical tool. Empirical test
      requires measuring d_eff per category and comparing to brand counts.
      Not tested in this paper.

  - claim_id: "P5"
    status: not_tested
    notes: >
      Effective dimensionality formula derived analytically. At rho=0.3: d_eff approx 2.6.
      Empirical correlation structure of SBT dimensions has not been measured.

limitations:
  - description: >
      The E8 connection is structural, not literal. The analysis provides the
      mathematical ceiling on packing efficiency; it does not claim brands arrange
      themselves as lattice points. Real competitive dynamics are asymmetric,
      category-bounded, and observer-dependent in ways no lattice model captures.
    severity: moderate
    addressable: false

  - description: >
      The analysis assumes isotropic brand space (equal scaling in all 8 dimensions).
      SBT dimensions are likely anisotropic — different dimensions may have different
      ranges of distinguishable values. In anisotropic space, spheres become
      ellipsoids and E8 no longer provides optimal packing. Capacity bounds remain
      valid as order-of-magnitude estimates but exact constants change.
    severity: moderate
    addressable: true

  - description: >
      Perceptual threshold epsilon is treated as a fixed parameter with no empirical
      calibration. The entire framework depends on knowing epsilon; without empirical
      JND studies in the Aitchison-metric brand space, capacity numbers are hypothetical.
    severity: major
    addressable: true

  - description: >
      Brand positions are modeled as point estimates (perception clouds in SBT
      terminology are reduced to centers). When positions are stochastic
      distributions, effective threshold increases to epsilon + 2*sigma, reducing
      capacity by ((epsilon + 2*sigma)/epsilon)^8 — potentially orders of magnitude.
    severity: moderate
    addressable: true

  - description: >
      Observer-dependent distance: SBT's canonical distance is observer-weighted
      d_k(A,B) = ||W_k * (clr(s_A) - clr(s_B))||, making positioning capacity
      cohort-specific. The analysis uses the unweighted Aitchison distance.
      A full treatment would integrate over the observer distribution on Delta^7.
    severity: moderate
    addressable: true

