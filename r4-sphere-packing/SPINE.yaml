# SPINE.yaml — How Many Brands Can a Market Hold? (2026g / R4)
#
# RETROFIT spine: extracted descriptively from the completed paper.md
# ([internal path removed], Working Paper v1.3.0), NOT authored
# generatively before prose. Part of the SPINE-for-all-active-canonical
# project ([internal path removed], D4).
#
# Schema v0.2: the paper reports both (a) proved mathematical capacity bounds
# with computed table values (Tables 4-8, A1, B1) and (b) an author-produced
# LLM stability experiment (Experiment C, 250 calls, five models) returning a
# null competitive-interference result. The computed bounds and the empirical
# null are therefore represented as observation -> method -> measurement ->
# finding chains, not asserted in prose.

spine_version: "0.2"
spine_doc_version: "0.1.0"
paper_key: "2026g"
provenance: retrofit
title: >-
  How Many Brands Can a Market Hold? Sphere Packing Bounds for
  Multi-Dimensional Positioning
target_venue_primary: "Working Paper (Zenodo); marketing-science / quant-marketing venue TBD"
status: >-
  Retrofit spine extracted 2026-06-14 from completed paper.md (v1.3.0). Edits
  to the argument belong in the paper; this spine is a faithful backbone
  description for the bundle anti-drift gate.

thesis: |
  Brand perception in Spectral Brand Theory is formalized as points in the
  positive orthant R^8_+ under the Aitchison metric, which the centered
  log-ratio transform renders isometric to Euclidean distance on a
  7-dimensional hyperplane, so the question "how many distinguishable brand
  positions can a market sustain?" maps exactly onto sphere packing in eight
  dimensions. Because the E_8 lattice is the proved optimal packing in R^8
  (Viazovska 2017) — packing density pi^4/384 ~ .2537, kissing number 240 —
  it supplies structural ceilings: positioning capacity is at least
  (1/epsilon)^8 (10^8 distinguishable positions at epsilon = .10), each
  position has at most 240 nearest competitors decomposing into 112 specialist
  and 128 generalist vectors, 10,000 brands occupy under .01% of the unit
  8-ball, category saturation occurs near (1/epsilon)^d_eff, and average
  inter-dimension correlation rho = .3 collapses effective dimensionality to
  ~2.6 and capacity by roughly five orders of magnitude. The E_8 connection is
  structural, not literal — a ceiling on positioning order, not a claim that
  brands sit on lattice points. An LLM stability experiment (250 calls, five
  models) finds null competitive-interference effects, supporting the
  fixed-geometry assumption on which the bounds rest.

# ============================================================================
# Boundary conditions — when the capacity bounds and E_8 apparatus apply
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      Dimensional independence: the eight SBT dimensions generate an
      effectively eight-dimensional space (d_eff ~ 8); if dimensions collapse
      through correlation, the applicable bounds are those for d_eff < 8.
    observable: "Participation-ratio effective dimensionality of observed brand profiles ~ 8."
    excludes: "Highly correlated categories where d_eff approaches 1-2."
  - id: C2
    statement: >-
      Aitchison-metric assumption: the flat-Euclidean geometry holds only under
      the clr transform and the compositional-ratio model of perception; an
      observer-weighted Fisher-Rao metric would introduce curvature and require
      spherical or hyperbolic packing bounds instead.
    observable: "Brand-perception data satisfy the compositional / ratio-invariant distributional assumptions."
    excludes: "Curved observer-weighted metrics; non-compositional perception models."
  - id: C3
    statement: >-
      Salience-of-differentiation regime: the bounds are tight when observer
      cohorts are sensitive to differences across all eight dimensions; in
      low-salience categories effective capacity converges toward Sharp's
      mental-availability model rather than the geometric ceiling.
    observable: "Observer cohorts discriminate brands on all eight dimensions."
    excludes: "Low-salience categories where differentiation is cognitively discounted."
  - id: C4
    statement: >-
      Interior vs boundary positioning: the 240 kissing bound applies to
      interior lattice positions; concentration of measure (Zharnikov 2026f)
      pushes brand profiles toward the feasible-region boundary, where
      positions have fewer nearest-competitor slots.
    observable: "Brand profiles lie in the interior of the feasible region."
    excludes: "Boundary-concentrated finite brand spaces."

# ============================================================================
# Observations — the inputs the capacity results and experiment rest on
# ============================================================================
observations:
  - id: O1
    statement: >-
      The clr transform maps R^8_+ under the Aitchison metric isometrically
      onto a 7-dimensional Euclidean hyperplane, so Euclidean sphere-packing
      results in R^8 apply directly to brand-perception distance.
    raw_data_pointer: "Zharnikov 2026d (Aitchison metric); Aitchison 1986; Egozcue et al. 2003"
    instrument: "Centered log-ratio transform clr_k(s) = log(s_k / g(s))"
    timestamp: "2026-05"
    body_sections: ["Preliminaries — Brand Space with the Aitchison Metric"]
  - id: O2
    statement: >-
      E_8 is the proved optimal sphere packing in R^8 (Viazovska 2017): packing
      density pi^4/384 ~ .2537, kissing number 240 (exact), with 240 minimal
      vectors at squared norm 2.
    raw_data_pointer: "Viazovska 2017; Conway & Sloane 1999 ch. 4; Pfender & Ziegler 2004"
    instrument: "Established results of discrete geometry / lattice theory"
    timestamp: "2017"
    body_sections: ["Sphere Packing Fundamentals", "Positioning Capacity — The E_8 Lattice and Its Properties"]
  - id: O3
    statement: >-
      An LLM competitive-interference experiment (Experiment C): five focal
      brands x three competitor distances (direct/adjacent/distant) x four
      prompt conditions x five models = 250 calls, 250 valid responses (100%
      completion).
    raw_data_pointer: "Experiment C design; companion experiment record"
    instrument: "Five LLMs (Claude Haiku 4.5, GPT-4o-mini, Gemini 2.5 Flash, DeepSeek V3, Grok 4.1 Fast)"
    timestamp: "2026-05"
    body_sections: ["Discussion — Empirical Test: Competitive Interference in LLM Perception Space"]

# ============================================================================
# Methods — derivation apparatus + the experiment's analysis
# ============================================================================
methods:
  - id: M1
    statement: >-
      Distinguishability-to-packing reduction: two brands are distinguishable
      iff their Aitchison distance exceeds perceptual threshold epsilon, so each
      brand occupies an epsilon/2 ball; the maximum number of distinguishable
      positions equals the packing number of epsilon/2 balls in the region.
    type: "geometric_derivation"
    inputs: ["O1", "perceptual threshold epsilon (.05 / .10 / .20)"]
    outputs: ["capacity-as-packing-number formulation"]
    code_anchor: "R4_R5_computations.py / r4_capacity_bounds.py (SEED = 42)"
    body_sections: ["Preliminaries — From Distinguishability to Sphere Packing", "Sphere Packing Fundamentals — Packing Density Bounds"]
  - id: M2
    statement: >-
      Volume-ratio bounding: lower bound N >= V_8(1)/V_8(epsilon) = (1/epsilon)^8
      via the maximality/covering argument; upper bound N <= V_8(1+epsilon/2) /
      V_8(epsilon/2) = ((2+epsilon)/epsilon)^8 via containment in B(0, 1+epsilon/2);
      E_8 density gives the intermediate estimate Delta_8 * V_8(1)/V_8(epsilon/2).
    type: "volume_ratio_bound"
    inputs: ["M1", "V_n(r) = pi^(n/2)/Gamma(n/2+1) * r^n", "Delta_8 = pi^4/384"]
    outputs: ["Table 4 capacity bounds", "E_8 estimate 6.49e9 at epsilon=.10"]
    code_anchor: "r4_capacity_bounds.py"
    body_sections: ["Positioning Capacity — Volume Ratio Bounds"]
  - id: M3
    statement: >-
      Effective-dimensionality reduction: for an equicorrelation matrix with
      average pairwise correlation rho, the participation ratio
      d_eff = (sum lambda_k)^2 / sum lambda_k^2 simplifies to
      n / (1 + (n-1) rho); capacity is then (1/epsilon)^d_eff.
    type: "eigenvalue_participation_ratio"
    inputs: ["correlation rho", "n = 8", "Proposition 1 bound"]
    outputs: ["Table 8 d_eff and capacity-collapse values"]
    code_anchor: "r4_capacity_bounds.py (d_eff(n, rho))"
    body_sections: ["Effective Dimensionality and Correlation"]
  - id: M4
    statement: >-
      Competitive-interference test (Experiment C analysis): per-dimension
      profile shifts compared across solo / self-comparison / paired / context
      conditions; H1 a one-sided binomial sign test over 8 dimensions, H2 an
      ANOVA of shift magnitude vs competitor distance, H3 a t-test of
      contrast-vs-assimilation by competitor type, with a self-comparison
      prompt-format control.
    type: "null_hypothesis_significance_test"
    inputs: ["O3 (250 LLM responses)"]
    outputs: ["m_H1", "m_H2", "m_H3", "m_control"]
    reproducibility:
      seed: "SEED = 42 (capacity script); experiment record archives the LLM calls"
      runtime_environment: "Python 3.12 + numpy + scipy"
    body_sections: ["Discussion — Empirical Test (Design / Results)"]

