# ============================================================================
# Propositions — the five capacity results + structural framing
# ============================================================================
propositions:
  - id: P0
    statement: >-
      The marketing metaphor of a "positioning space" has never been made
      geometrically literal; given an 8-dimensional perception space with a
      formal metric, the basic quantitative question — how many distinguishable
      positions the space contains — is a sphere-packing problem and is
      answerable with proved results.
    conditions: ""
    antecedents: [O1]
    body_sections: ["Positioning in High-Dimensional Space"]
  - id: P1
    statement: >-
      (Proposition 1, Positioning capacity) For perceptual threshold epsilon > 0
      in the unit 8-ball of clr-transformed brand space, the number of
      distinguishable positions N satisfies (1/epsilon)^8 <= N <=
      ((2+epsilon)/epsilon)^8; at epsilon = .10 the lower bound is 10^8. The
      argument is structurally the Hamming bound applied geometrically and is
      formally equivalent to Shannon channel capacity.
    conditions: "C1, C2"
    antecedents: [M2, m_cap_010]
    evidence:
      - type: derivation
        anchor: "Simple volume bound (lower) + covering bound (upper); Table 4."
        citation_keys: [viazovska-2017-sphere-packing-problem, hamming-1950-error-detecting-error, shannon-1948-mathematical-theory-communication]
    falsifier: >-
      Falsified if more than ((2+epsilon)/epsilon)^8 mutually distinguishable
      profiles (pairwise Aitchison distance > epsilon) exist in the unit 8-ball,
      or fewer than (1/epsilon)^8 non-overlapping epsilon-balls fit.
    body_sections: ["Positioning Capacity — Volume Ratio Bounds (Proposition 1)"]
  - id: P2
    statement: >-
      (Proposition 2, Local competition) Each position in the E_8 packing has
      exactly 240 nearest neighbors — the maximum in eight dimensions —
      decomposing into 112 specialist vectors (two coordinates +/-1, six zeros)
      and 128 generalist vectors (all eight coordinates +/-1/2, even sign
      parity). Tightness tau(8) = 240 follows from the Kabatyanskii-Levenshtein
      LP bound. The specialist/generalist competitive reading is a
      structurally-motivated analogy, not an empirical regularity.
    conditions: "C4"
    antecedents: [O2, m_kiss]
    evidence:
      - type: derivation
        anchor: "C(8,2)*2^2 = 112; 2^8/2 = 128; both shells at squared norm 2."
        citation_keys: [conway-1999-sphere-packings-lattices, kabatyanskii-1978-bounds-packings-sphere]
    falsifier: >-
      Falsified if E_8's minimal vectors number other than 240 or more than 240
      unit spheres can simultaneously kiss a central sphere in R^8 (both proved
      impossible — falsification would be mathematical, not empirical).
    body_sections: ["Positioning Capacity — The Kissing Number (Proposition 2)", "Figure 1"]
  - id: P3
    statement: >-
      (Proposition 3, White space abundance) For n_b brands at threshold epsilon
      with non-overlapping neighborhoods, the unoccupied fraction is
      ~ 1 - n_b * epsilon^8; at epsilon = .10 even 10,000 brands leave 99.99% of
      the positioning space unoccupied — a direct consequence of high-dimensional
      volume (curse of dimensionality).
    conditions: "C1, C2"
    antecedents: [m_white]
    evidence:
      - type: derivation
        anchor: "Neighborhood volume V_8(epsilon)/V_8(1) = epsilon^8; Table 6."
    falsifier: >-
      Falsified if the measured covered fraction of brand space exceeds
      n_b * epsilon^8 by a margin inconsistent with the non-overlap assumption.
    body_sections: ["White Space and Market Saturation — Proposition 3"]
  - id: P4
    statement: >-
      (Proposition 4, Category saturation) A category with effective
      dimensionality d_eff and threshold epsilon is saturated when the number of
      brands approaches (1/epsilon)^d_eff; saturation depends on effective
      dimensionality, not raw brand count (commodity d_eff ~ 2 saturates near
      100; luxury d_eff ~ 8 admits 10^8).
    conditions: "C1, C3"
    antecedents: [P1]
    evidence:
      - type: derivation
        anchor: "Proposition 1 bound applied with n = d_eff; Table 7."
        citation_keys: [sharp-2010-how-brands-grow]
    falsifier: >-
      Falsified if a category's observed brand count consistently and
      substantially exceeds (1/epsilon)^d_eff (d_eff estimated via PCA) without
      measurable perceptual overlap.
    body_sections: ["White Space and Market Saturation — Category Saturation (Proposition 4)"]
  - id: P5
    statement: >-
      (Proposition 5, Correlation collapses capacity) If the eight SBT
      dimensions have average pairwise correlation rho, effective dimensionality
      is d_eff = n / (1 + (n-1) rho) and capacity is ~ (1/epsilon)^d_eff; at
      rho = .3 (n = 8) d_eff ~ 2.6 and capacity collapses from 10^8 to ~10^3 —
      making de-correlation of a brand's dimensional profile a primary strategic
      asset. The capacity-collapse curve is steepest in the low-rho regime.
    conditions: "C1"
    antecedents: [M3, m_deff_030]
    evidence:
      - type: derivation
        anchor: "Equicorrelation eigenvalues 1+(n-1)rho and (n-1) of 1-rho; participation ratio; Table 8 / Figure 2."
    falsifier: >-
      Falsified if an empirically estimated SBT correlation matrix yields a
      participation-ratio d_eff that does not predict observed capacity at the
      rate (1/epsilon)^d_eff, or if the equicorrelation assumption systematically
      misrepresents the real eigenvalue structure.
    body_sections: ["Effective Dimensionality and Correlation — Proposition 5"]
  - id: P6
    statement: >-
      The E_8 connection is structural, not literal: it bounds the mathematical
      ceiling of positioning order — it does NOT claim brands arrange on a
      lattice, that 240 literally describes competition, that the 112/128
      decomposition is a market law, or that E_8 plays any causal role. Real
      brand distributions are noisy, irregular, non-uniform, and far from any
      lattice.
    conditions: ""
    antecedents: [P2]
    body_sections: ["Important caveat (Introduction)", "Limitations — The E_8 Connection Is Interpretive, Not Literal"]
  - id: P7
    statement: >-
      Eight dimensions is mathematically exceptional: optimal packing is proved
      only in n = 1,2,3,8,24, so in n = 8 the density (pi^4/384), kissing number
      (240), and full nearest-neighbor configuration are known exactly; the
      coincidence with SBT's eight (qualitatively derived) dimensions is fortunate
      but not evidence of a deeper structural connection. SBT's dimensional choice
      is independently grounded by the completeness/necessity argument (2026r).
    conditions: ""
    antecedents: [O2]
    body_sections: ["Why Eight Dimensions Is Special"]
  - id: P8
    statement: >-
      Projection from 8D to a low-dimensional perceptual map (typically 2D)
      collapses capacity from 10^8 to ~10^2 — the positioning analog of spectral
      metamerism (2026e). The "crowded market" complaint is largely a projection
      artifact, not genuine scarcity of distinguishable positions.
    conditions: ""
    antecedents: [P1]
    evidence:
      - type: derivation
        anchor: "Capacity (1/epsilon)^n by dimension; Table 5."
    body_sections: ["Positioning Capacity — Comparison Across Dimensions", "Discussion — Connection to R2"]

# ============================================================================
# Findings — the empirical null and its support for fixed geometry
# ============================================================================
findings:
  - id: F1
    statement: >-
      The LLM competitive-interference experiment returns a null result on all
      three hypotheses (H1 0/8, p = 1.00; H2 F = .623, p = .538; H3 t = -.502,
      p = .616): brand profiles do not shift with the presence, distance, or
      type of a named competitor. PRISM-B measures stable internal
      representations, not context-dependent judgments.
    type: "negative_empirical_finding"
    source_measurements: [m_H1, m_H2, m_H3]
    generating_method: M4
    antecedents: [O3]
    falsifier: "If a higher-powered replication detects systematic competitor-driven profile shifts across models, F1 weakens."
    citation_role_in_paper: "supports_fixed_geometry_assumption_of_P1_to_P5"
    body_sections: ["Discussion — Empirical Test (Results / Interpretation)"]
  - id: F2
    statement: >-
      The null competitive-interference result is the empirical warrant for the
      fixed-geometry assumption underlying Propositions 1-5: because positions
      are context-independent, the capacity bounds hold as intrinsic constraints
      rather than context-dependent artifacts. Had interference been large,
      effective dimensionality would be context-dependent and the framework
      would require qualification.
    type: "assumption_validation"
    source_measurements: [m_H1, m_H2, m_H3]
    generating_method: M4
    antecedents: [F1]
    falsifier: "If competitive context were shown to shift profiles materially, the fixed-geometry premise of P1-P5 fails."
    body_sections: ["Discussion — Empirical Test (Interpretation)"]

# ============================================================================
# Negative findings — what the experiment did NOT find (the headline null)
# ============================================================================
negative_findings:
  - id: NF1
    statement: >-
      No competitive-interference effect (contrast or assimilation) was detected
      on aggregate cross-model tests; the self-comparison prompt-format control
      was also null (Euclidean shift 2.10, no dimension significant). Exploratory
      anomalies (GPT-4o-mini mean shift 15.37; Erewhon most susceptible at 11.73,
      consistent with its weak Temporal anchoring of 2.5) did not reach
      per-dimension significance; a high-replication single-model follow-up
      (2026p) confirms the GPT-4o-mini instability at higher power.
    expected_observation: "A measurable competitor-driven shift in perceived brand profiles."
    source_method: M4
    affects_nodes: [F1, F2]
    motivates: [F2]
    body_sections: ["Discussion — Empirical Test (Results / Exploratory finding)"]

# ============================================================================
# Alternative explanations — rivals the capacity claim must clear
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      Mental-availability rival (Sharp 2010): markets converge on a few highly
      salient brands regardless of theoretical positioning space, so "exploit
      8-dimensional white space" overstates differentiation's role.
    rules_out_required: [P3, P4]
    ruled_out_by: [P4, P5]
    rules_out_status: "boundary_condition_not_contradiction"
    reasoning: >-
      The two frameworks answer different questions — how many brands a market
      CAN hold vs how many consumers DO consider. They are boundary conditions on
      each other: geometric capacity governs when differentiation is salient (low
      rho); mental availability dominates when differentiation is cognitively
      discounted (high rho -> d_eff ~ 1-2). The gap is an opportunity cost for
      future empirical work, not a contradiction.
    body_sections: ["Discussion — Tension with Empirical Brand Growth Research"]
  - id: A2
    statement: >-
      Context-dependence rival: contrast (Simonson & Tversky 1992) or assimilation
      (Herr 1986) effects could make brand positions context-dependent, undermining
      the fixed-geometry premise.
    rules_out_required: [P1, F2]
    ruled_out_by: [F1]
    rules_out_status: "rejected"
    reasoning: >-
      Experiment C tests this directly and finds null competitive interference
      across five models, so positions are treated as fixed for the capacity
      derivation.
    body_sections: ["Discussion — Empirical Test"]

# ============================================================================
# Limitations — honest scope of the bounds
# ============================================================================
limitations:
  - id: L1
    statement: >-
      Anisotropy: the analysis assumes isotropic space, but SBT dimensions are
      unlikely to be symmetric (per-dimension perceptual ranges and thresholds
      differ; integral vs separable dimensions per Garner 1974 / Shepard 1987).
      Under anisotropy the epsilon-balls become ellipsoids, E_8 no longer
      optimal; the bounds survive as order-of-magnitude estimates but exact
      constants change.
    severity: "scope-bounding"
    affects: [P1, P2]
    body_sections: ["Limitations — Anisotropy"]
  - id: L2
    statement: >-
      Observer dependence: the analysis fixes a single Aitchison metric, but
      brand distance is observer-dependent (2026d); under the observer-weighted
      metric the packing "spheres" become observer-dependent ellipsoids and
      capacity is observer-dependent (a market saturated for one cohort may have
      white space for another). Full treatment requires integrating over the
      observer distribution on Delta^7 — future work.
    severity: "scope-bounding"
    affects: [P1, P3, P4]
    body_sections: ["Limitations — Observer Dependence"]
  - id: L3
    statement: >-
      Noise and bounded-region assumptions: real brand positions are
      distributions (perception clouds), not points; noise inflates the effective
      threshold to epsilon + 2 sigma and reduces capacity by ((epsilon+2sigma)/
      epsilon)^8. The unit-ball / convex feasible-region assumption may overstate
      capacity if the achievable region is smaller or non-convex.
    severity: "scope-bounding"
    affects: [P1, P3]
    body_sections: ["Limitations — Noise and Measurement Uncertainty", "Limitations — Bounded Region Assumption"]
  - id: L4
    statement: >-
      Empirical calibration of the perceptual threshold epsilon (via JND
      experiments) and empirical estimation of category effective dimensionality
      (via PCA on observer-perceived profiles to test Proposition 5) remain
      future work; the category examples in Tables 7-8 are illustrative, not
      empirical.
    severity: "future-work"
    affects: [P4, P5]
    body_sections: ["The Perceptual Threshold", "Future Directions"]

