# native_localization.yaml -- native-language content for R15 prompts
#
# Supplies grammatically-correct native-language brand names, city names,
# category descriptors, and purchase-target noun phrases for each
# (brand_pair, language) combination used in R15 native-language runs.
# The ai_search_metamerism.py templates reference these values via
# {brand}, {place}, {what}, {brand_a}, {brand_b}, {category} placeholders
# so that the rendered prompt is natural native-speaker prose (correct
# case marking, word order, and script) rather than a word-by-word
# transliteration.
#
# SCHEMA
#
# pairs:
#   <pair_id>:
#     type: framing | weighted
#     english:
#       brand / brand_a / brand_b: <English name>
#       category / product: <English descriptor>
#       city_a / city_b: <English city name, framing only>
#     localizations:
#       <lang_code>:
#         # weighted pairs
#         brand_a / brand_b: <native brand name>
#         category: <native category noun phrase>
#         # framing pairs
#         brand: <native brand name>
#         place_a / place_b: <full prepositional phrase with the correct
#           preposition and case, e.g. ru "в Москве", uk "у Києві",
#           sv "i Stockholm", zh "在斯德哥尔摩">
#         what: <full noun phrase for the purchase target, in whatever
#           case the template requires at the insertion point, e.g.
#           ru "шоколада Рошен" (genitive after "покупки"),
#           sv "en Volvo-bil", zh "一辆沃尔沃汽车">
#
# Lang codes follow ISO 639-1 (zh, ru, uk, ja, ko, ar, hi, sv, el, lv,
# vi, sr, mn, sw).
#
# JSON OUTPUT KEY POLICY
#
# The output schema (JSON keys: weights, semiotic, narrative, ...,
# reasoning) stays English across all languages. This is a mechanical
# parsing constraint: the analysis pipeline expects a fixed key set.
# The "reasoning" field VALUE is produced in the target language by the
# model; only the field NAMES are English. The native-language prompt
# templates include an explicit instruction to this effect.

schema_version: "1.0"

# ----------------------------------------------------------------------------
# Brand pairs with native-language coverage.
# ----------------------------------------------------------------------------

pairs:

  # ===========================================================================
  # FRAMING PAIRS (Run 7 / Run 7d) — same brand evaluated in two cities
  # ===========================================================================

  roshen_ru_ua:
    type: framing
    english:
      brand: "Roshen"
      product: "chocolate"
      category: "confectionery"
      city_a: "Moscow"
      country_a: "Russia"
      city_b: "Kyiv"
      country_b: "Ukraine"
    localizations:
      # Framing templates use three placeholders:
      #   {brand}   -- invariable brand name
      #   {place_a} -- full prepositional phrase "in <city>" with correct case
      #   {what}    -- grammatical noun phrase "purchase of <product of brand>"
      ru:
        brand: "Рошен"
        place_a: "в Москве"
        place_b: "в Киеве"
        what: "шоколада Рошен"        # genitive required after "покупку"
      uk:
        brand: "Рошен"
        place_a: "у Москві"
        place_b: "у Києві"
        what: "шоколаду Рошен"        # Ukrainian genitive required after "придбання"

  burgerking_us_ru:
    type: framing
    english:
      brand: "Burger King"
      product: "fast food meal"
      category: "fast food restaurant"
      city_a: "New York"
      country_a: "United States"
      city_b: "Moscow"
      country_b: "Russia"
    localizations:
      ru:
        brand: "Бургер Кинг"  # commonly transliterated in Russian-language media
        place_a: "в Нью-Йорке"
        place_b: "в Москве"
        what: "обеда в ресторане «Бургер Кинг»"  # genitive after "покупки"

  volvo_eu_cn:
    type: framing
    english:
      brand: "Volvo"
      product: "car"
      category: "automotive"
      city_a: "Stockholm"
      country_a: "Sweden"
      city_b: "Shanghai"
      country_b: "China"
    localizations:
      sv:
        brand: "Volvo"  # native Swedish brand, name stays Latin
        place_a: "i Stockholm"
        place_b: "i Shanghai"
        what: "en Volvo-bil"
      zh:
        brand: "沃尔沃"  # standard Mainland Chinese transliteration
        place_a: "在斯德哥尔摩"
        place_b: "在上海"
        what: "一辆沃尔沃汽车"

  # ===========================================================================
  # CROSS-CULTURAL WEIGHTED PAIRS (Run 5) — VkusVill, mongolia_beer, china_water
  # ===========================================================================

  china_water:
    type: weighted
    english:
      brand_a: "Nongfu Spring"
      brand_b: "Evian"
      category: "bottled water"
    localizations:
      zh:
        brand_a: "农夫山泉"
        brand_b: "依云"
        category: "瓶装水"

  mongolia_beer:
    type: weighted
    english:
      brand_a: "APU Chinggis"
      brand_b: "Heineken"
      category: "beer brand"
    localizations:
      mn:
        brand_a: "АПУ Чингис"
        brand_b: "Heineken"  # international brand, common in Latin script in MN media
        category: "шар айраг"
      zh:
        brand_a: "APU 成吉思"  # APU Chinggis is rarely localized to Chinese; verify
        brand_b: "喜力"
        category: "啤酒品牌"

  russia_ukraine_banking:
    type: weighted
    english:
      brand_a: "Tinkoff"
      brand_b: "PrivatBank"
      category: "digital consumer banking"
    localizations:
      ru:
        brand_a: "Тинькофф"  # also commonly written "Т-Банк" since 2024 rebrand
        brand_b: "ПриватБанк"
        category: "цифровой потребительский банкинг"

  # ===========================================================================
  # LOCAL-BRAND PAIRS (Run 8) — supplementary 5-language tests
  # ===========================================================================

  cyprus_supermarket:
    type: weighted
    english:
      brand_a: "AlphaMega"
      brand_b: "Carrefour"
      category: "supermarket chain"
    localizations:
      el:
        brand_a: "AlphaMega"  # AlphaMega uses Latin script in Cyprus marketing
        brand_b: "Carrefour"
        category: "αλυσίδα σούπερ μάρκετ"

  latvia_chocolate:
    type: weighted
    english:
      brand_a: "Laima"
      brand_b: "Lindt"
      category: "chocolate"
    localizations:
      lv:
        brand_a: "Laima"
        brand_b: "Lindt"
        category: "šokolāde"

  serbia_water:
    type: weighted
    english:
      brand_a: "Knjaz Milos"
      brand_b: "San Pellegrino"
      category: "mineral water"
    localizations:
      sr:
        brand_a: "Књаз Милош"  # Cyrillic; also commonly written "Knjaz Miloš" in Latin
        brand_b: "Сан Пелегрино"
        category: "минерална вода"

  vietnam_dairy:
    type: weighted
    english:
      brand_a: "Vinamilk"
      brand_b: "Nestle"
      category: "dairy products"
    localizations:
      vi:
        brand_a: "Vinamilk"  # Vietnamese brand, name stays Latin
        brand_b: "Nestle"
        category: "sản phẩm sữa"

  kenya_beer:
    type: weighted
    english:
      brand_a: "Tusker"
      brand_b: "Heineken"
      category: "beer brand"
    localizations:
      sw:
        brand_a: "Tusker"
        brand_b: "Heineken"
        category: "chapa ya bia"

# ============================================================================
# NOTES
# ============================================================================
#
# Authoritative sources used for brand/geographic names (consulted in the
# target language):
#
#   ru: https://ru.wikipedia.org/ -- brand and city case forms
#   uk: https://uk.wikipedia.org/ -- brand and city case forms
#   zh: https://zh.wikipedia.org/ -- Simplified transliterations (e.g., 沃尔沃)
#   mn: https://mn.wikipedia.org/ -- APU Group and its products
#   sv: https://sv.wikipedia.org/ -- Stockholm, Shanghai, Volvo
#   el: natural Greek renderings for the retail and supermarket domains
#   lv: full diacritics verified against Latvian orthography
#   sr: Cyrillic (primary Serbian script) used throughout
#   vi: full diacritics verified against Vietnamese orthography
#   sw: natural Swahili noun phrases for the beer and beverage domains
#
# Where a native-language source did not have a widely-used transliteration
# (e.g., APU Chinggis in Chinese), the Latin-script form is kept.
