# R15 Run 5 Model Configuration
# Generated: 2026-04-05
# Source of truth: ai_search_metamerism.py (API_CALLERS, API_KEY_VARS, MODEL_IDS)
#
# Tier classification:
#   1 = 30B+ parameters (primary analysis)
#   2 = 7-30B parameters (capacity comparison, H9)
#
# Culture: primary training corpus language/region
# Backend: ollama | anthropic | openai | google | deepseek | dashscope |
#          cerebras | sambanova | groq | xai | sarvam | gigachat | yandex

models:

