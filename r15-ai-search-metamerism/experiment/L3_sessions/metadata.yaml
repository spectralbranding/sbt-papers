    date: '2026-04-10'
    jsonl: run10_corrective.jsonl
    n_records: 126
    script: run10_corrective.py
    design: >
      Corrective comparators experiment. 3 focal brands (VkusVill, Calbee, Roshen)
      x 2 conditions (control comparator vs corrective same-culture comparator)
      x 7 models x 3 runs. Tests whether the choice of comparator brand drives
      dimensional weight profiles, or whether collapse is intrinsic to the focal brand.
      Supplementary to the main 9-run study. v2.1-final canonical total across all 10 runs (Runs 2-11) is 21,350 calls.
    models:
      - claude
      - gpt
      - gemini
      - deepseek
      - qwen3_local
      - gemma4_local
      - yandexgpt_pro
    pairs:
      - vkusvill_vs_whole_foods
      - vkusvill_vs_trader_joes
      - calbee_vs_frito_lay
      - calbee_vs_koikeya
      - roshen_vs_cadbury
      - roshen_vs_hershey
