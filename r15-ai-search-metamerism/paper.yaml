- id: P3
  type: proposition
  statement: LLMs are a structurally distinct observer class that lacks embodied experience, social context,
    and cultural memory; they operate on statistical regularities in overlapping text corpora, are near-
    deterministic, and hold a utilitarian-competence advantage. Established frameworks describe what consumers
    perceive but cannot predict how an AI mediating layer transforms perception before it reaches the
    consumer (the prediction gap).
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
- id: P4
  type: proposition
  statement: 'Spectral metamerism: projecting brand perception from eight dimensions to fewer (Johnson-Lindenstrauss
    distortion) causes well-separated brands to overlap, because the observer''s spectral weights assign
    near-zero weight to the differentiating dimensions — structurally analogous to optical metamerism
    and to Tversky''s elimination by aspects. The count of metameric pairs increases combinatorially (not
    merely linearly) as effective dimensionality falls.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
