meta:
  title: 'Dimensional Collapse in AI-Mediated Search: Large Language Models as Metameric Observers of
    Brand Advertising'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19422427
  date: '2026-04-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - AI-mediated search
  - brand perception
  - spectral metamerism
  - large language models
  - dimensional collapse
  - observer heterogeneity
  - cross-cultural
  - PRISM-B
  abstract: 'Large language models (LLMs) increasingly mediate consumer brand evaluation in search and
    agentic commerce. This study demonstrates that LLMs systematically collapse brand perception to Experiential
    and Economic dimensions, rendering brands differentiated on narrative, ideological, cultural, or temporal
    dimensions metameric --- structurally different but functionally equivalent in AI recommendations.
    Using PRISM-B across 21,350 API calls to 24 models spanning nine cultural traditions and 15 languages,
    a Dimensional Collapse Index (DCI; uniform baseline = .250) is computed. Mean DCI equals .291 for
    global brands ($p = .017$) and .356 cross-culturally ($d = 3.373$). Cross-model convergence is near-perfect
    (cosine = .977). Local brands collapse 25% more severely than global brands ($d = .878$, in five FMCG
    pairs tested). Native-language prompting is null in home markets ($p = .716$) but reduces collapse
    up to 9.5 DCI points in foreign-market frames ($p = .002$). Geopolitical context independently modulates
    weights ($p < .001$). Structured Brand Function specifications recover approximately 20% of lost dimensionality.
    Collapse is stable across model versions. For search advertising, these findings reframe strategy
    from platform selection to dimensional defensibility: advertisers must encode soft brand dimensions
    in verifiable, machine-readable form or risk effective erasure by LLM intermediaries. Patterns reflect
    the text-conditioned LLM observers tested here.'
claims:
- id: P1
  type: proposition
  statement: Brand perception is a multi-dimensional construct that established frameworks (Aaker personality,
    Keller CBBE, Brakus experience, Kapferer prism) partition separately; Spectral Brand Theory unifies
    them as eight typed emission dimensions (Semiotic, Narrative, Ideological, Experiential, Social, Economic,
    Cultural, Temporal), with Temporal as SBT's unique contribution having no predecessor.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: 'Emission is not perception: each observer type applies a characteristic spectral weight
    vector on the simplex that determines which dimensions are salient in forming brand conviction; observers
    with similar weights cluster into cohorts, and two observers can form structurally different brand
    convictions from identical emission. This replaces the single-observer assumption shared by the established
    frameworks.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
