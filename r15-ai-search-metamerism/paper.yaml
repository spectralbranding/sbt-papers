limitations:
  - id: L1
    description: "Prompt-based protocol does not capture multimodal AI-brand interactions"
    severity: moderate
    addressable: true
  - id: L2
    description: "LLM responses sensitive to prompt engineering; 5-repetition design mitigates but does not eliminate"
    severity: minor
    addressable: true
  - id: L3
    description: "Measures LLM output, not downstream consumer purchase behavior"
    severity: major
    addressable: true
  - id: L4
    description: "Models evolve rapidly; profiles may shift with updates"
    severity: moderate
    addressable: true
  - id: L5
    description: "Human coding introduces subjectivity despite inter-rater reliability controls"
    severity: minor
    addressable: true

