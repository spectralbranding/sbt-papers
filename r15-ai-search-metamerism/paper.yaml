# paper.yaml — R15: Spectral Metamerism in AI-Mediated Brand Perception
# Citation key: 2026v
# Paper Spec schema: https://github.com/spectralbranding/paper-spec/SPECIFICATION.md

paper_spec_version: "0.1.0"

metadata:
  title: "Spectral Metamerism in AI-Mediated Brand Perception: How Large Language Models Collapse Multi-Dimensional Brand Differentiation in Consumer Search"
  authors:
    - name: "Dmitry Zharnikov"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
      corresponding: true
  citation_key: "2026v"
  doi: "10.5281/zenodo.19422427"
  date: "2026-04-11"
  version: "2.2"
  status: preprint  # v2.2 (2026-04-11): H10 recomputation on the full clean dataset (52/116 positive, mean = -.002, binomial sign test p = .307 two-sided -- NOT significant; H10 framed as a null result rather than significantly negative); supplementary Run 10 corrective comparators included; abstract refinements
  license: "CC-BY-NC-ND-4.0"
  keywords:
    - AI-mediated search
    - brand perception
    - spectral metamerism
    - large language models
    - advertising effectiveness
    - consumer search
    - dimensionality reduction
    - observer heterogeneity

claims:
  - id: H1
    type: hypothesis
    statement: >
      LLMs assign systematically higher implicit weights to Economic and
      Semiotic dimensions than to Narrative, Ideological, Cultural, and
      Temporal dimensions when processing brand comparison queries.
    testable: true
    tested_in_paper: true
    status: supported  # global DCI = 0.291 vs 0.250 baseline, p = 0.0170; local DCI = 0.353, p = 0.0006; cross-cultural DCI = 0.357, d = 3.449. BH-corrected across H1-H4.
    falsification: >
      H1 is falsified if LLM spectral profiles show uniform or near-uniform
      dimensional weights (no statistically significant departure from equal
      weighting across all eight SBT dimensions, Bonferroni-corrected p > 0.05).
    depends_on: []

  - id: H2
    type: hypothesis
    statement: >
      Brand pairs that are spectrally distinct to human observers on Narrative,
      Ideological, Cultural, or Temporal dimensions become functionally
      equivalent in LLM-mediated recommendations, producing cross-model
      convergence in dimensional weight profiles.
    testable: true
    tested_in_paper: true
    status: supported  # cosine similarity across 24 models from 7 training traditions = 0.976; collapse structural not model-specific
    falsification: >
      H2 is falsified if pairwise cosine similarity of spectral profiles across
      LLM architectures is low (< 0.70), indicating that dimensional collapse
      is model-specific rather than structural.
    depends_on: [H1]

  - id: H3
    type: hypothesis
    statement: >
      Different LLM architectures and training origins (Western cloud, Chinese
      cloud, local open-weight) and deployment contexts (cloud-aligned vs.
      local open-weight) exhibit measurably different spectral profiles,
      constituting distinct AI observer cohorts.
    testable: true
    tested_in_paper: true
    status: not_supported  # MANOVA: cross-model heterogeneity non-significant; collapse uniform across architectures
    falsification: >
      H3 is falsified if MANOVA shows no significant effect of model identity
      on the eight-dimensional weight vector (p > 0.05), indicating that all
      six LLMs produce statistically indistinguishable spectral profiles.
      [This is the actual result: H3 not supported.]
    depends_on: []

  - id: H4
    type: hypothesis
    statement: >
      Among the soft dimensions (Narrative, Ideological, Cultural, Temporal),
      collapse is differential rather than uniform: Narrative and Ideological
      dimensions collapse more severely than Cultural and Temporal dimensions
      because they are harder to operationalize in training data.
    testable: true
    tested_in_paper: true
    status: not_supported  # collapse is approximately uniform across all soft dimensions
    falsification: >
      H4 is falsified if paired t-tests show no significant between-soft-dimension
      differences in collapse rates, indicating uniform rather than differential
      collapse across Narrative, Ideological, Cultural, and Temporal dimensions.
      [This is the actual result: H4 not supported; collapse is uniform.]
    depends_on: [H1]

methodology:
  type: empirical
  design: >
    Structured weight elicitation design measuring implicit spectral profiles of
    24 LLMs across brand pairs in 9 runs. Runs 2-4 used 6 LLMs across 15
    brand pairs (10 global, 5 local) for 4,860 API calls. Run 5 (cross-cultural)
    used 22 LLMs across 7 cross-cultural brand pairs in 8 cultural contexts
    (11,410 calls, 7,999 successful, 70.1% success rate) plus 69 native-language
    prompt calls. Run 6 added a banking sector pair with backfill models Qwen Plus
    (DashScope) and Fireworks GLM, bringing total unique models to 24 (1,018 calls).
    Run 7 (framing experiment) tested H12 prompt-framing effects. Run 8 (native
    language expansion) tested H10 across 815 native-language calls in 11 languages.
    A Brand Function resolution test (Run 4, 90 calls) demonstrates that providing
    behavioral specifications reduces local-brand collapse by 20%. Models directly
    allocate 100 points across SBT's eight dimensions via structured JSON output.
    Three prompt types: weighted recommendation, dimensional differentiation, and
    dimension-specific probes. Each prompt administered 3 times per model at
    temperature 0.7. Total: 21601 clean calls across all 9 runs; ~6.1M tokens;
    $5.52 total cost.
  sample:
    size: 21601  # 15 JSONL files across main study Runs 2-9; clean calls; Run 10 supplementary adds 126 more
    description: "9 runs (main study) across 15 JSONL files. Runs 2-4: 4,860 calls (6 models, 15 pairs). Run 5: 11,410 calls (22 active models, 7 cross-cultural pairs, 8 cultures, 69 native-language calls). Run 6: 1,018 calls (banking pair, 24 models). Run 7: framing experiment (H12 test). Run 8: native language expansion (815 calls in 11 languages, H10 test — NOT SUPPORTED). Run 9: temperature sensitivity. Total unique models: 24; 9 cultural traditions; ~6.1M tokens; $5.52 total cost. Supplementary Run 10 (corrective comparators, 2026-04-10): 126 calls, 7 models, 6 pairs — not included in main study totals."
    models: 24  # 24 unique models across all runs; T-Pro 2.0 excluded from Run 5 analysis due to infrastructure cost
    brand_pairs: 23  # 10 global + 5 local + 7 cross-cultural + 1 banking (Run 6)
  instrument: "PRISM-B (Perception Response Instrument for Structured Measurement — Brand variant)"
  measures:
    - variable: "dimensional_weight_allocation"
      instrument: "Structured JSON weight allocation (100 points across 8 SBT dimensions)"
      reliability: "Automated parsing; < 3% call failure rate; renormalization applied"
    - variable: "dimensional_collapse_index"
      instrument: "DCI = (w_Economic + w_Semiotic) / 100; baseline 0.250 under uniform allocation"
    - variable: "cross_model_convergence"
      instrument: "Pairwise cosine similarity of 8D spectral profiles across LLM pairs"
  analysis:
    primary:
      - "One-sample t-test of DCI against 0.250 baseline (H1)"
      - "Pairwise cosine similarity across 6 model spectral profiles (H2)"
      - "MANOVA with model identity as IV, 8D weight vector as DV (H3)"
      - "Paired t-tests on mean dimensional weights within soft-dimension set (H4)"
      - "Conditional metamerism: independent samples t-test, global vs. local DCI"
    secondary:
      - "Johnson-Lindenstrauss information loss quantification"
      - "Brand Function resolution: DCI change with behavioral specifications (Run 4)"
      - "Planned contrast: Gemini Flash (cloud) vs. Gemma 4 (local) — alignment-layer effect"
    software: "Python 3.12, scipy, numpy"
  tools:
    - "Python 3.12 (experiment script)"
    - "Anthropic API (Claude Sonnet 4.6)"
    - "OpenAI API (GPT-4o)"
    - "Google AI Studio (Gemini 2.5 Flash)"
    - "DeepSeek API (DeepSeek V3)"
    - "Ollama (Qwen3 30B, Gemma 4 27B)"
    - "DashScope API (Qwen Plus) — Run 6 backfill model"
    - "Fireworks AI API (GLM) — Run 6 backfill model"

