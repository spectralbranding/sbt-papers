# paper.yaml — R15: Dimensional Collapse in AI-Mediated Brand Perception
# Citation key: 2026v
# Paper Spec schema: https://github.com/spectralbranding/paper-spec/SPECIFICATION.md

paper_spec_version: "0.1.0"

metadata:
  title: "Dimensional Collapse in AI-Mediated Brand Perception: Large Language Models as Metameric Observers"
  authors:
    - name: "Dmitry Zharnikov"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
      corresponding: true
  citation_key: "2026v"
  doi: "10.5281/zenodo.19422427"
  date: "2026-04-17"
  version: "3.0"
  status: preprint  # v3.0 JMR revision (2026-04-17). Previous: H10 recomputed on the updated dataset including a Mongolian-language re-test of mongolia_beer and a VkusVill Brand Function specification follow-up. New H10 result: 58/121 positive (48%), mean = +.001, binomial sign test p = .716 two-sided, null result. Mongolian-language subgroup exception (8/8 models, mean -4.9 DCI). Supplementary Run 10 corrective comparators added (126 calls). VkusVill specification test added (147 calls). Native templates rewritten as natural native-speaker prose. Section 4.6.3 added: Run 11 Roshen multi-city extension (7 cities × 7 LLMs × 3 runs = 315 calls, 0 errors). Run 11 findings: (a) Kyiv uniquely low (DCI 34.78); every other city clusters 39-45 regardless of geopolitical alignment. (b) Manufacturing presence does not save the brand: Vilnius (Klaipeda factory, ~15500 t/yr) collapses MORE than Warsaw, which has no manufacturing in Poland but does have an active commercial distribution arm (Roshen-Polska Sp. z o.o. in Jarosław + Roshen Europe Sp. z o.o. in Warsaw); commercial-distribution discourse beats manufacturing-record discourse. (c) Local-language prompting reduces DCI by 3.31-9.50 across all non-Kyiv cities; biggest effect Astana kk -9.50 (p=.002, all 7 models reduce). H12 reinterpreted as discourse-layer activation rather than country-of-origin/animosity. H10 null + Run 11 native-language effect both follow from the same mechanism applied to two different discourse geometries (homogeneous-discourse vs sparse-foreign-discourse). Abstract updated.
  license: "CC-BY-4.0"
  abstract: >
    Large language models (LLMs) are displacing traditional search as the primary intermediary
    in consumer brand evaluation. Within Spectral Brand Theory's eight-dimensional framework,
    LLMs collapse brand perception to Experiential and Economic dimensions, rendering brands
    differentiated on narrative, ideological, cultural, or temporal dimensions metameric ---
    functionally equivalent in AI recommendations despite structural differences. The PRISM-B
    instrument is administered across 21,350 API calls spanning 24 models, nine cultural
    traditions, and 15 native languages to compute a Dimensional Collapse Index (DCI). Mean DCI
    significantly exceeds the uniform baseline (global = .291, p = .017; cross-cultural = .357,
    d = 3.449). Cross-model convergence is extreme (cosine = .977). Local brands collapse 25%
    more severely than global brands (d = .878). Native-language prompting on home-market pairs
    is null (p = .716), but a 7-city extension reveals strong effects on foreign-market frames
    (up to -9.50 DCI, p = .002), supporting a discourse-layer mechanism. Geopolitical context
    independently modulates collapse (p < .001). Legally verifiable ideological commitments
    survive AI mediation. Structured Brand Function specifications reduce collapse by ~20%.
    Dimensional collapse is a structural feature of text-based AI observers with direct
    implications for search advertising strategy and dual-track brand measurement.
  keywords:
    - AI-mediated search
    - brand perception
    - spectral metamerism
    - large language models
    - advertising effectiveness
    - consumer search
    - dimensionality reduction
    - observer heterogeneity

claims:
  - id: H1
    type: hypothesis
    statement: >
      LLMs assign systematically higher implicit weights to Economic and
      Semiotic dimensions than to Narrative, Ideological, Cultural, and
      Temporal dimensions when processing brand comparison queries.
    testable: true
    tested_in_paper: true
    status: supported  # global DCI = 0.291 vs 0.250 baseline, p = 0.0170; local DCI = 0.353, p = 0.0006; cross-cultural DCI = 0.357, d = 3.449. BH-corrected across H1-H4.
    falsification: >
      H1 is falsified if LLM spectral profiles show uniform or near-uniform
      dimensional weights (no statistically significant departure from equal
      weighting across all eight SBT dimensions, Bonferroni-corrected p > 0.05).
    depends_on: []

  - id: H2
    type: hypothesis
    statement: >
      Brand pairs that are spectrally distinct to human observers on Narrative,
      Ideological, Cultural, or Temporal dimensions become functionally
      equivalent in LLM-mediated recommendations, producing cross-model
      convergence in dimensional weight profiles.
    testable: true
    tested_in_paper: true
    status: supported  # cosine similarity across 24 models from 7 training traditions = 0.976; collapse structural not model-specific
    falsification: >
      H2 is falsified if pairwise cosine similarity of spectral profiles across
      LLM architectures is low (< 0.70), indicating that dimensional collapse
      is model-specific rather than structural.
    depends_on: [H1]

  - id: H3
    type: hypothesis
    statement: >
      Different LLM architectures and training origins (Western cloud, Chinese
      cloud, local open-weight) and deployment contexts (cloud-aligned vs.
      local open-weight) exhibit measurably different spectral profiles,
      constituting distinct AI observer cohorts.
    testable: true
    tested_in_paper: true
    status: not_supported  # MANOVA: cross-model heterogeneity non-significant; collapse uniform across architectures
    falsification: >
      H3 is falsified if MANOVA shows no significant effect of model identity
      on the eight-dimensional weight vector (p > 0.05), indicating that all
      six LLMs produce statistically indistinguishable spectral profiles.
      [This is the actual result: H3 not supported.]
    depends_on: []

  - id: H4
    type: hypothesis
    statement: >
      Among the soft dimensions (Narrative, Ideological, Cultural, Temporal),
      collapse is differential rather than uniform: Narrative and Ideological
      dimensions collapse more severely than Cultural and Temporal dimensions
      because they are harder to operationalize in training data.
    testable: true
    tested_in_paper: true
    status: not_supported  # collapse is approximately uniform across all soft dimensions
    falsification: >
      H4 is falsified if paired t-tests show no significant between-soft-dimension
      differences in collapse rates, indicating uniform rather than differential
      collapse across Narrative, Ideological, Cultural, and Temporal dimensions.
      [This is the actual result: H4 not supported; collapse is uniform.]
    depends_on: [H1]

  - id: H14a
    type: hypothesis
    statement: >
      Enhanced Experiential Brand Function specification (3 additional key signals)
      reduces Experiential-dimension DCI relative to standard Brand Function.
    testable: true
    tested_in_paper: true
    status: not_supported  # Wilcoxon p = .742, rank-biserial r = .431, delta = -.083
    falsification: >
      H14a is supported if paired Wilcoxon signed-rank test shows p < .05
      (one-tailed, enhanced < standard) for Experiential-dimension deviation.
    depends_on: [H1]

  - id: H14b
    type: hypothesis
    statement: >
      Enhanced Ideological Brand Function specification (3 additional key signals)
      reduces Ideological-dimension DCI relative to standard Brand Function.
    testable: true
    tested_in_paper: true
    status: not_supported  # Wilcoxon p = .508, rank-biserial r = .498, delta = +.024
    falsification: >
      H14b is supported if paired Wilcoxon signed-rank test shows p < .05
      (one-tailed, enhanced < standard) for Ideological-dimension deviation.
    depends_on: [H1]

  - id: H14c
    type: hypothesis
    statement: >
      Enhanced Brand Function does not regress Economic, Cultural, or
      Narrative dimensions (no collateral damage on non-targeted dimensions).
    testable: true
    tested_in_paper: true
    status: supported  # Narrative p = .132, Economic p = .573, Cultural p = .148; all non-significant
    falsification: >
      H14c is falsified if any non-targeted dimension shows p < .05
      (two-tailed Wilcoxon) indicating significant regression.
    depends_on: [H1]

methodology:
  type: empirical
  design: >
    Structured weight elicitation design measuring implicit spectral profiles of
    24 LLMs across brand pairs in 9 runs. Runs 2-4 used 6 LLMs across 15
    brand pairs (10 global, 5 local) for 4,860 API calls. Run 5 (cross-cultural)
    used 22 LLMs across 7 cross-cultural brand pairs
    (11,410 calls, 7,999 successful, 70.1% success rate) plus 69 native-language
    prompt calls. Run 6 added a banking sector pair with backfill models Qwen Plus
    (DashScope) and Fireworks GLM, bringing total unique models to 24 (1,018 calls).
    Run 7 (framing experiment) tested H12 prompt-framing effects. Run 8 (native
    language expansion) tested H10 across 815 native-language calls in 11 languages.
    A Brand Function resolution test (Run 4, 90 calls) demonstrates that providing
    behavioral specifications reduces local-brand collapse by 20%. Models directly
    allocate 100 points across SBT's eight dimensions via structured JSON output.
    Three prompt types: weighted recommendation, dimensional differentiation, and
    dimension-specific probes. Each prompt administered 3 times per model at
    temperature 0.7. Total: 21,602 calls across 12 runs; ~6.4M tokens;
    ~$6.40 total cost (including Run 14 per-dimension targeting, 252 calls).
  sample:
    size: 26585  # 21,350 core (Runs 2-11) + 5,235 supplementary (Runs 12-15b + Exps A-E)
    description: "Core: 21,350 calls across 10 runs (Runs 2-11), 24 models from 9 cultural traditions, 15 native languages, ~$6.10 cost. Supplementary: 5,235 calls across Runs 12-15b (brand function, synthetic cohorts) + Experiments A (agentic collapse, 425), B (cross-language, 450), D (specification paradox, 1,440), E (primacy generalization, 2,400). Total: 26,585 calls, 8 distinct model architectures in supplementary, ~$1.48 additional cost. HuggingFace datasets: core DOI 10.57967/hf/8284; supplementary DOIs 10.57967/hf/8435-8443."
    models: 24  # 24 unique models across all runs; T-Pro 2.0 excluded from Run 5 analysis due to infrastructure cost
    brand_pairs: 23  # 10 global + 5 local + 7 cross-cultural + 1 banking (Run 6)
  instrument: "PRISM-B (Perception Response Instrument for Structured Measurement — Brand variant)"
  measures:
    - variable: "dimensional_weight_allocation"
      instrument: "Structured JSON weight allocation (100 points across 8 SBT dimensions)"
      reliability: "Automated parsing; < 3% call failure rate; renormalization applied"
    - variable: "dimensional_collapse_index"
      instrument: "DCI = (w_Economic + w_Semiotic) / 100; baseline 0.250 under uniform allocation"
    - variable: "cross_model_convergence"
      instrument: "Pairwise cosine similarity of 8D spectral profiles across LLM pairs"
  analysis:
    primary:
      - "One-sample t-test of DCI against 0.250 baseline (H1)"
      - "Pairwise cosine similarity across 6 model spectral profiles (H2)"
      - "MANOVA with model identity as IV, 8D weight vector as DV (H3)"
      - "Paired t-tests on mean dimensional weights within soft-dimension set (H4)"
      - "Conditional metamerism: independent samples t-test, global vs. local DCI"
    secondary:
      - "Johnson-Lindenstrauss information loss quantification"
      - "Brand Function resolution: DCI change with behavioral specifications (Run 4)"
      - "Planned contrast: Gemini Flash (cloud) vs. Gemma 4 (local) — alignment-layer effect"
    software: "Python 3.12, scipy, numpy"
  tools:
    - "Python 3.12 (experiment script)"
    - "Anthropic API (Claude Sonnet 4.6)"
    - "OpenAI API (GPT-4o)"
    - "Google AI Studio (Gemini 2.5 Flash)"
    - "DeepSeek API (DeepSeek V3)"
    - "Ollama (Qwen3 30B, Gemma 4 27B)"
    - "DashScope API (Qwen Plus) — Run 6 backfill model"
    - "Fireworks AI API (GLM) — Run 6 backfill model"

