    dimensions (Semiotic, Narrative); low weights on perception-dependent dimensions (Ideological, Social,
    Cultural, Temporal) that require embodied/social/cultural/temporal grounding text-only corpora encode
    sparsely. This generates four primary hypotheses (H1 dimensional bias, H2 metameric collapse, H3 observer
    heterogeneity, H4 differential collapse).'
