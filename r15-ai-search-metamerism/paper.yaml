limitations:
- description: All observations are LLM-generated with no human validation of dimensional weight profiles;
    connecting AI spectral profiles to actual purchase decisions requires consumer experiments beyond
    scope.
  severity: moderate
  addressable: true
- description: All five local brand pairs are in the food and beverage sector, confounding locality with
    category effects; the conditional-metamerism effect (n = 5 pairs) needs replication across additional
    categories.
  severity: moderate
  addressable: true
- description: Forced-allocation self-report measures what models report as important when explicitly
    asked, which may differ from implicit weighting in unconstrained responses; responses are also sensitive
    to prompt engineering, and some national-model APIs had 20-30% invalid-JSON rates, potentially biasing
    the cross-cultural sample toward more reliable responders.
  severity: moderate
  addressable: true
- description: Findings are bounded to text-conditioned LLMs of comparable training scale; multimodal,
    retrieval-grounded, cross-modal-trained, and non-text-primary (voice/AR-VR/in-store) agents may exhibit
    attenuated collapse — the DCI estimates here are upper-bound for those settings.
  severity: moderate
  addressable: true
