provenance:
  paper_title: "Spectral Metamerism in AI-Mediated Brand Perception: How Large Language Models Collapse Multi-Dimensional Brand Differentiation in Consumer Search"
  citation_key: "2026v"
  repository: "spectralbranding/sbt-papers/r15-ai-search-metamerism"

  versions:
    - version: "1.0"
      date: "2026-04-04"
      description: "Full empirical results. v2 structured weight allocation. Run 2 (3,240 calls, 10 global pairs), Run 3 (1,620 calls, 5 local pairs), Run 4 (90 calls, Brand Function resolution). 4 hypotheses tested, 2 supported. Conditional metamerism confirmed. 28 refs, 17.9% self-citation. Published on Zenodo: 10.5281/zenodo.19422427."
    - version: "2.0"
      date: "2026-04-06"
      description: "Incorporates Run 5 cross-cultural results. 21 active models, 8 cultures, 7 cross-cultural brand pairs. 11,410 calls (7,999 successful, 70.1%). 69 native-language calls (H10). H1 SUPPORTED (p<0.0001, DCI=35.6 vs 25.0 baseline). H2 SUPPORTED (cosine=0.976). Cultural dimension most collapsed (-4.9 points). H5-H10 pre-registered 2026-04-05. T-Pro 2.0 excluded (requires dedicated paid instance). Zenodo upload pending."
    - version: "2.1"
      date: "2026-04-08"
      description: "Full 9-run paper complete (Runs 2-9). Adds Run 6 banking pair (H6 p=0.0013, d=3.449), Run 7 framing experiment (H12 p<0.0001, delta=0.040), Run 8 native language expansion (815 calls, 11 languages; H10 NOT SUPPORTED, mean=-0.005), Run 9 temperature sensitivity (DCI spread=0.012). v2.0 baseline: ~21,000 calls across 9 runs, 24 models, 9 cultural traditions, ~6.1M tokens, $5.52. Abstract trimmed per JAR target. Leading-zero convention applied throughout. 13 hypotheses formalized (H1-H13; H13 future direction)."
    - version: "3.0"
      date: "2026-04-10"
      description: "Supplementary Run 10 corrective comparators experiment added. 126 calls, 3 focal brands x 2 comparator conditions x 7 models x 3 runs. Tests whether comparator choice drives dimensional weights. Run 10 is a methodology probe added after the main paper was drafted; it does not alter the headline 9-run results. DATA_MANIFEST.yaml updated with run10 files. metadata.yaml updated with run index. CONTRIBUTORS.yaml updated."
    - version: "3.1"
      date: "2026-04-11"
      description: "v2.1-final. H10 recomputed on updated dataset (58/121 positive, mean +.001, p=.716, null result). Mongolian-language subgroup exception (8/8 models, mean -4.9 DCI). VkusVill Brand Function spec test (147 calls). Section 4.6.3 added: Run 11 Roshen multi-city extension (315 calls, 7 cities × 7 LLMs × 3 runs, 0 errors). Run 11 findings: Kyiv uniquely low; manufacturing-anchor null (Vilnius with Klaipėda factory collapses MORE than Warsaw, which has no manufacturing in Poland but does have active commercial distribution via Roshen-Polska Sp. z o.o.); local-language prompting reduces DCI 3.31-9.50 for every non-home city (Astana kk: -9.50, p=.002). H12 reinterpreted as discourse-layer activation rather than country-of-origin animosity. v2.1-final canonical total (validate.py output): 21,350 calls across 10 runs, 17 JSONL files, 24 models, 7 training traditions, 15 native languages plus English, 999 native-language calls, ~6.4M tokens, ~$6.10."

