paper_key: 2026v
schema_version: 0.1

owns:
  - term_key: dimensional-collapse
    label: "Dimensional Collapse"
    canonical_form: "dimensional collapse"
    definition: "The systematic compression by LLMs of an eight-dimensional brand emission profile toward a low-rank (chiefly Experiential and Economic) silhouette, rendering brands differentiated on other dimensions functionally equivalent in AI recommendations."
    first_section: "The Problem / Abstract"
  - term_key: dimensional-collapse-index
    label: "Dimensional Collapse Index"
    canonical_form: "Dimensional Collapse Index (DCI)"
    definition: "A scalar summary statistic (uniform baseline = .250) quantifying how severely an LLM concentrates implicit spectral weight onto verifiable dimensions, measuring the extent of dimensional collapse."
    first_section: "Abstract / Mechanism Summary"
  - term_key: metameric-observer
    label: "Metameric observer (LLM)"
    canonical_form: "metameric observers"
    definition: "The characterization of LLMs as observers that produce convergent brand recommendations from structurally divergent brand inputs because their spectral weights collapse the differentiating dimensions to near-zero."
    first_section: "The Problem"

imports:
  - {term_key: spectral-brand-theory}
  - {term_key: perception-cloud}
  - {term_key: observer-spectral-profile}
  - {term_key: brand-conviction}
  - {term_key: cohort}
  - {term_key: spectral-dimensions}
  - {term_key: prism-b}

refines: []

