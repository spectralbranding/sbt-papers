# ============================================================================
# Methods — the measurement and analysis protocol
# ============================================================================
methods:
  - id: M1
    statement: >-
      PRISM-B forced-allocation elicitation: each model allocates exactly 100
      points across the eight SBT dimensions under three prompt types (weighted
      recommendation, dimensional differentiation, dimension-specific probes),
      revealing its implicit observer spectral profile as a weight vector;
      responses are JSON-parsed, validated within a 15% sum tolerance, and
      renormalized to 100. A budget constraint elicits comparative weight
      (which dimensions are elevated relative to alternatives), which Likert
      importance ratings cannot identify and which pre-empts acquiescence
      inflation.
    type: "structured_weight_elicitation"
    inputs: ["brand comparison queries", "per-model chat-completion API"]
    outputs: ["per-call eight-dimensional normalized weight vector"]
    code_anchor: "experiment/ PRISM-B pipeline (PL0-PL4 scaffold)"
    reproducibility:
      seed: "fixed-seed L4_analysis layer; Python 3.12 + scipy + numpy pinned"
      runtime_environment: "paid cloud + free cloud + local Ollama on Apple M4 Pro"
    body_sections: ["§Method: Research Design and Instrument", "§Method: Prompt Protocol", "§Method: Measurement Protocol"]
  - id: M2
    statement: >-
      Dimensional Collapse Index: DCI = (w_Economic + w_Semiotic) / 100, the
      concentration on the two verifiability anchors (attributes checkable from
      training data alone); uniform baseline = (12.5 + 12.5)/100 = .250.
      Experiential is reported separately because its inflation reflects
      functional-descriptive abundance, not the verifiability asymmetry the DCI
      isolates. Repetition-level variance yields a standard error and
      confidence intervals on every DCI.
    type: "derived_statistic"
    inputs: ["per-call normalized weight vectors"]
    outputs: ["per-model / per-pair DCI with SE"]
    code_anchor: "experiment/L4_analysis/"
    body_sections: ["§Method: Measurement Protocol (Step 4)", "§Method: Statistical Model"]
  - id: M3
    statement: >-
      Confirmatory-vs-exploratory analysis plan: Runs 2-4 pre-registered
      (H1-H4, alpha = .05, Benjamini-Hochberg correction); one-sample t-tests of
      DCI against .250; pairwise cosine similarity of model spectral profiles;
      MANOVA on the eight-dimensional vector with model identity as factor;
      paired t-tests on soft-dimension variation; spectral entropy. Run 5
      (H5-H12) is exploratory and pattern-confirming.
    type: "statistical_analysis_plan"
    inputs: ["per-model DCI and spectral profiles"]
    outputs: ["hypothesis test statistics and effect sizes"]
    code_anchor: "experiment/L4_analysis/run_all.py"
    body_sections: ["§Method: Study Design", "§Method: Analysis Plan"]

