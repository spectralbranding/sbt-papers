# ============================================================================
# Propositions — the theoretical backbone
# ============================================================================
propositions:
  - id: P1
    statement: >-
      Brand perception is a multi-dimensional construct that established
      frameworks (Aaker personality, Keller CBBE, Brakus experience, Kapferer
      prism) partition separately; Spectral Brand Theory unifies them as eight
      typed emission dimensions (Semiotic, Narrative, Ideological, Experiential,
      Social, Economic, Cultural, Temporal), with Temporal as SBT's unique
      contribution having no predecessor.
    conditions: ""
    antecedents: []
    evidence:
      - type: theory_mapping
        anchor: "Table 1 maps each established framework's constructs to SBT dimensions; Appendix A specifies the eight dimensions."
        citation_keys: [aaker-1997-dimensions-brand-personality, keller-1993-conceptualizing-measuring-managing, brakus-2009-brand-experience-what, kapferer-2012-new-strategic-brand]
    body_sections: ["§Theoretical Framework: Brand Perception as Multi-Dimensional Construct", "Appendix A"]
  - id: P2
    statement: >-
      Emission is not perception: each observer type applies a characteristic
      spectral weight vector on the simplex that determines which dimensions are
      salient in forming brand conviction; observers with similar weights
      cluster into cohorts, and two observers can form structurally different
      brand convictions from identical emission. This replaces the
      single-observer assumption shared by the established frameworks.
    conditions: ""
    antecedents: [P1]
    evidence:
      - type: theory
        anchor: "SBT observer spectral profile; cohorts cf. Wedel and Kamakura (2000)."
        citation_keys: []
    body_sections: ["§Theoretical Framework: SBT as Dimensional Framework", "Appendix A.4"]
  - id: P3
    statement: >-
      LLMs are a structurally distinct observer class that lacks embodied
      experience, social context, and cultural memory; they operate on
      statistical regularities in overlapping text corpora, are near-
      deterministic, and hold a utilitarian-competence advantage. Established
      frameworks describe what consumers perceive but cannot predict how an AI
      mediating layer transforms perception before it reaches the consumer (the
      prediction gap).
    conditions: ""
    antecedents: [P2]
    evidence:
      - type: analytic
        anchor: "Three distinguishing properties of AI observers; directional prior work that lacks a perceptual measurement model."
        citation_keys: [dawar-2018-marketing-age-alexa, hermann-2024-artificial-intelligence-consumer, hermann-2026-trusting-ai-agents, longoni-2022-artificial-intelligence-utilitarian, li-2024-frontiers-determining-validity]
    body_sections: ["§Theoretical Framework: The AI Observer Problem"]
  - id: P4
    statement: >-
      Spectral metamerism: projecting brand perception from eight dimensions to
      fewer (Johnson-Lindenstrauss distortion) causes well-separated brands to
      overlap, because the observer's spectral weights assign near-zero weight to
      the differentiating dimensions — structurally analogous to optical
      metamerism and to Tversky's elimination by aspects. The count of metameric
      pairs increases combinatorially (not merely linearly) as effective
      dimensionality falls.
    conditions: ""
    antecedents: [P2]
    evidence:
      - type: theory
        anchor: "JL lemma; optical metamerism analogue; elimination-by-aspects mechanism."
        citation_keys: [johnson-1984-extensions-lipschitz, wyszecki-1982-color-science-concepts, tversky-1972-elimination-by-aspects]
    body_sections: ["§Theoretical Framework: Spectral Metamerism and Dimensional Collapse"]
  - id: P5
    statement: >-
      The predicted LLM spectral profile is structured: high weights on
      verifiable dimensions (Economic, Experiential) densely encoded in training
      data; moderate weights on textually-represented dimensions (Semiotic,
      Narrative); low weights on perception-dependent dimensions (Ideological,
      Social, Cultural, Temporal) that require embodied/social/cultural/temporal
      grounding text-only corpora encode sparsely. This generates four primary
      hypotheses (H1 dimensional bias, H2 metameric collapse, H3 observer
      heterogeneity, H4 differential collapse).
    conditions: "C1"
    antecedents: [P3, P4]
    evidence:
      - type: prediction
        anchor: "Convergent evidence from collapse in related domains predicts over-weighting of quantifiable and under-weighting of perception-dependent dimensions."
        citation_keys: [hashimoto-2025-exploring-personality-structure, liu-2026-alignment-tax-response, sourati-2026-homogenizing-effect-large]
    body_sections: ["§Theoretical Framework: Hypotheses", "§Dimensional Collapse in Related Domains"]
  - id: P6
    statement: >-
      Causal mechanism: text-conditioned training data is dimensionally
      non-uniform with respect to brand signals (Economic/Experiential densely
      encoded; Cultural/Temporal/Ideological/Narrative sparsely), so encoders
      inherit a low-rank perception subspace in which only densely-encoded
      directions retain variance; PRISM-B reads it out as an implicit weight
      vector, the DCI summarises the verifiability concentration, and because all
      text encoders train on overlapping corpora the subspace is shared,
      producing the cross-model cosine convergence.
    conditions: "C1"
    antecedents: [P5]
    evidence:
      - type: mechanism
        anchor: "Figure 1 flowchart: corpora -> encoder bottleneck -> low-rank subspace -> implicit weights -> DCI + shared-subspace cosine convergence."
        citation_keys: []
    body_sections: ["§Theoretical Framework: Mechanism Summary (Figure 1)", "§Method: Statistical Model"]
  - id: P7
    statement: >-
      DCI admits an information-theoretic reading as a rate-distortion
      functional: the collapse to Economic + Semiotic is a minimum-distortion
      encoding given the model's effective channel capacity, and the cross-model
      cosine quantifies independent encoders converging on the same
      rate-distortion-optimal codebook (vector-quantization convergence under a
      small rate budget).
    conditions: ""
    antecedents: [P6]
    evidence:
      - type: theory
        anchor: "Rate-distortion and vector-quantization framing; full R(D) curve in companion study."
        citation_keys: [gersho-1991-vector-quantization-signal, shannon-1959-coding-theorems-discrete]
    body_sections: ["§Method: DCI as a rate-distortion functional"]
  - id: P8
    statement: >-
      The collapse reframes search-advertising strategy from a platform-switching
      problem to a dimensional-specification problem: brand visibility acquires
      dimensional structure, the zero-click paradigm makes the LLM's spectral
      profile the gate on which dimensions reach the consumer, portfolio brands
      can compete against themselves (spectral self-competition), and the
      operative defense is making collapsed dimensions machine-readable rather
      than choosing the right AI vendor — AI defensibility in the Hermann et al.
      sense is identical to dimensional verifiability in the SBT sense.
    conditions: "C1"
    antecedents: [F1, F2, F4, F5]
    evidence:
      - type: synthesis
        anchor: "Implications for search advertising theory; managerial and practical implications; convergence with the AI-defensibility directive."
        citation_keys: [hermann-2026-trusting-ai-agents, sabbah-2026-marketing-machines-how]
    body_sections: ["§Implications for Search Advertising Theory", "§Discussion: Practical/Managerial Implications"]

# ============================================================================
# Findings — what the experiments demonstrate (mapped to the hypotheses)
# ============================================================================
findings:
  - id: F1
    statement: >-
      H1 SUPPORTED — Dimensional bias: LLMs exhibit non-uniform spectral
      profiles, systematically over-weighting Experiential (150% global / 131%
      local) and Economic (114% global / 168% local) while suppressing Cultural,
      Temporal, Ideological, and Social below the uniform baseline; DCI is
      elevated above .250 in every model and both runs.
    type: "confirmatory_result"
    source_measurements: [m_dci_global, m_dci_local, m_dci_crosscultural]
    generating_method: M2
    antecedents: [O1, O2, O3]
    falsifier: "If DCI did not exceed .250, or Experiential/Economic were not the dominant weights, H1 fails."
    citation_role_in_paper: "primary_evidence_for_P5_P6"
    body_sections: ["§Results: H1 Dimensional Bias"]
  - id: F2
    statement: >-
      H2 SUPPORTED — Metameric convergence: cross-model cosine = .975 (six
      confirmatory models) and .977 across 24 architectures from nine cultural
      traditions; dimensional orderings are near-identical despite differences in
      architecture, training corpus, and deployment, so collapse is structural
      and platform-switching is not a hedge.
    type: "confirmatory_result"
    source_measurements: [m_cosine]
    generating_method: M3
    antecedents: [O1, O3]
    falsifier: "If cosine fell substantially below unity across architectures, the shared-subspace claim (P6) fails."
    citation_role_in_paper: "primary_evidence_for_P6_P8"
    body_sections: ["§Results: H2 Metameric Convergence"]
  - id: F3
    statement: >-
      Conditional metamerism SUPPORTED: locally embedded brands collapse ~25%
      more than global brands (d = .878, p < .001), with an Economic-default
      spike (168% of baseline) — AI substitutes price for every dimension it
      lacks brand-specific data on. Collapse severity is conditional on
      training-data embeddedness, which outweighs architecture, cultural origin,
      and deployment context.
    type: "confirmatory_result"
    source_measurements: [m_conditional, m_dci_local]
    generating_method: M3
    antecedents: [O1, O2]
    falsifier: "If local and global DCIs did not differ, the embeddedness-moderator claim fails."
    citation_role_in_paper: "primary_evidence_for_P5_P8"
    body_sections: ["§Results: Conditional metamerism"]
  - id: F4
    statement: >-
      Brand Function resolution SUPPORTED (partial): structured Brand Function
      specifications recover ~20% of lost dimensionality (local DCI .353 ->
      .284), driven primarily by Cultural-dimension recovery, but DCI stays above
      baseline and Economic stays elevated — collapse is partly information-driven
      and partly a structural property of text-based processing.
    type: "intervention_result"
    source_measurements: [m_brandfunction]
    generating_method: M2
    antecedents: [O4]
    falsifier: "If specification produced no DCI reduction, the recoverability/defensibility claim fails."
    citation_role_in_paper: "primary_evidence_for_P8"
    body_sections: ["§Results: Brand Function resolution (Run 4)"]
  - id: F5
    statement: >-
      The Patagonia/Columbia pair is the diagnostic exception: DCI = .194, BELOW
      baseline, because Patagonia's ideological dimension is grounded in legally
      binding, machine-readable commitments (1% for the Planet pledge, the 2022
      non-profit ownership transfer). This is the empirical signature of a
      defensible dimension — a brand value articulable in verifiable terms the
      model can process.
    type: "diagnostic_exception"
    source_measurements: [m_dci_global]
    generating_method: M2
    antecedents: [O1]
    falsifier: "If a brand with legally-grounded soft-dimension signal still collapsed to baseline, the defensibility mechanism fails."
    citation_role_in_paper: "mechanism_demonstration_for_P8"
    body_sections: ["§Results: Confirmatory; §Discussion: Summary of Findings"]
  - id: F6
    statement: >-
      Discourse-layer reinterpretation of geopolitical framing (H12, Runs 7/11):
      same brand evaluated in different city x language contexts shows DCI deltas
      exceeding the noise floor (mean .040, p < .001), but the mechanism is not
      country-of-origin priming or consumer animosity — it is discourse-layer
      activation. Kyiv is uniquely low (home-market canonical layer), every
      foreign city collapses to a narrow band regardless of geopolitical
      alignment, and local-language prompting unlocks the city-local layer
      (Astana in Kazakh: -9.50 DCI points, p = .002).
    type: "exploratory_reinterpretation"
    source_measurements: []
    generating_method: M3
    antecedents: [O3]
    falsifier: "If foreign cities differed by geopolitical alignment rather than discourse density, the discourse-layer account fails."
    citation_role_in_paper: "refines_H10_null"
    body_sections: ["§Results: Geopolitical Framing (Runs 7 and 11)"]

# ============================================================================
# Negative findings — the hypotheses NOT supported (load-bearing for the thesis)
# ============================================================================
negative_findings:
  - id: NF1
    statement: >-
      H3 NOT SUPPORTED — AI observer heterogeneity: per-model DCI variation falls
      within sampling noise (F(5,54) = 0.59, p = .712; Run 5 t = .221, p = .413,
      d = .043). There are no distinct AI observer cohorts at the DCI level;
      collapse is shared across architectures. This is load-bearing: it forecloses
      platform-switching as a strategic hedge.
    expected_observation: "Measurably different spectral profiles across architectures and training origins."
    source_method: M3
    affects_nodes: [P5, F2, P8]
    motivates: [P8]
    body_sections: ["§Results: H3 — NOT SUPPORTED"]
  - id: NF2
    statement: >-
      H4 NOT SUPPORTED — differential soft-dimension collapse: paired t-tests
      found no differential collapse among Narrative, Ideological, Cultural, and
      Temporal (all pairwise p >= .05). Soft dimensions collapse approximately
      uniformly, so the verifiable/non-verifiable distinction operates as a
      binary rather than a gradient — brand managers cannot invest in surviving
      soft dimensions as a hedge.
    expected_observation: "Narrative/Ideological collapsing more severely than Cultural/Temporal."
    source_method: M3
    affects_nodes: [P5, P8]
    motivates: [P8]
    body_sections: ["§Results: H4 — NOT SUPPORTED"]
  - id: NF3
    statement: >-
      H10 NOT SUPPORTED in aggregate — native-language prompting is null across
      121 model-pair combinations (48% showed reduction; binomial p = .716; mean
      reduction +.001). It is null for home-audience conditions (English already
      accesses the canonical discourse) and substantial only for foreign-audience
      conditions where local language is the sole path into a city-local discourse
      layer (e.g., Mongolian APU Chinggis: 8/8 models, mean 4.9 points).
    expected_observation: "Native-language prompting uniformly reducing collapse (language-as-key)."
    source_method: M3
    affects_nodes: [F6]
    motivates: [F6]
    body_sections: ["§Results: H10 — NOT SUPPORTED"]

# ============================================================================
# Robustness checks — supplementary experiments hardening the core result
# ============================================================================
robustness_checks:
  - id: RC1
    statement: >-
      Temperature invariance (Run 9, 540 calls; Kruskal-Wallis H = 1.83,
      p = .610): DCI is stable across T = 0.0, 0.3, 1.0, confirming collapse is a
      property of learned representations, not sampling stochasticity.
    type: "stochasticity_check"
    sensitivity_of: [F1, F2]
    body_sections: ["§Results: Robustness", "§Supplementary Experiments"]
  - id: RC2
    statement: >-
      Temporal stability (Experiment H13, 450 calls, 4 model pairs): all pairwise
      profile cosines > .97 across model versions, ruling out the hypothesis that
      model scaling will naturally resolve collapse.
    type: "version_stability_check"
    sensitivity_of: [F2, P8]
    body_sections: ["§Results: Robustness", "§Limitations and Future Research"]
  - id: RC3
    statement: >-
      Specification-as-constraint (Experiments D1/D2/Q1): information framing
      amplifies collapse (d = .820) while constraint framing reduces it 42%
      (d = -.983) — "tell the model what to DO, not what to KNOW"; injecting
      constraint framing at every pipeline step compresses DCI variance (Levene
      F = 64.77, p < .001) rather than shifting the mean, preventing catastrophic
      collapse events in agentic contexts.
    type: "intervention_robustness_check"
    sensitivity_of: [F4, P8]
    body_sections: ["§Supplementary Experiments"]
  - id: RC4
    statement: >-
      Serial-position / cross-domain controls (Experiments E, F1, F2): primacy
      bias is driven almost entirely by one architecture (GPT-4o-mini, d = 1.748)
      and is domain-specific to brand perception (absent in political-attitude
      measurement), ruling out a universal LLM positional artifact; Likert-format
      elicitation eliminates positional effects, validating PRISM-B design.
    type: "instrument_validity_check"
    sensitivity_of: [M1, F1]
    body_sections: ["§Supplementary Experiments"]

# ============================================================================
# Alternative explanations — rivals the collapse claim must clear
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      The collapse could be an artifact of RLHF/alignment training,
      e-commerce-skewed training data, or commercial API safety layers (a quirk
      of one model family) rather than a structural property of text-conditioned
      brand observation.
    rules_out_required: [P6, F2]
    ruled_out_by: [F2, NF1, RC2]
    rules_out_status: "rejected"
    reasoning: >-
      Cross-model cosine .977 spans cloud and local open-weight, Western and
      Chinese and seven further traditions, and aligned and less-aligned systems;
      H3 heterogeneity is null and the profile is stable across versions — so the
      collapse cannot be a single-family training artifact.
    body_sections: ["§Discussion: Summary of Findings"]
  - id: A2
    statement: >-
      High aggregate agreement between LLM and human perceptual maps (>75%, Li et
      al. 2024) could imply LLMs preserve multi-dimensional perception, making
      the collapse claim overstated.
    rules_out_required: [F1]
    ruled_out_by: [F1, NF2]
    rules_out_status: "rejected"
    reasoning: >-
      Aggregate ordinal agreement can persist under severe dimensional
      compression when the compressed dimensions happen to align with the
      full-dimensional ranking — the low-rank-projection signature; the paper
      measures perceptual-level dimensional weight directly, not aggregate
      ranking.
    body_sections: ["§Theoretical Framework: The AI Observer Problem", "§Connection to Broader Trends"]

# ============================================================================
# Limitations — honest scope of the empirical claims
# ============================================================================
limitations:
  - id: L1
    statement: >-
      All observations are LLM-generated with no human validation of dimensional
      weight profiles; connecting AI spectral profiles to actual purchase
      decisions requires consumer experiments beyond scope.
    severity: "external-validity"
    affects: [F1, P8]
    body_sections: ["§Limitations and Future Research"]
  - id: L2
    statement: >-
      All five local brand pairs are in the food and beverage sector, confounding
      locality with category effects; the conditional-metamerism effect (n = 5
      pairs) needs replication across additional categories.
    severity: "confound / small-sample"
    affects: [F3]
    body_sections: ["§Results: Conditional metamerism", "§Limitations and Future Research"]
  - id: L3
    statement: >-
      Forced-allocation self-report measures what models report as important when
      explicitly asked, which may differ from implicit weighting in unconstrained
      responses; responses are also sensitive to prompt engineering, and some
      national-model APIs had 20-30% invalid-JSON rates, potentially biasing the
      cross-cultural sample toward more reliable responders.
    severity: "instrument / sampling"
    affects: [M1, F2]
    body_sections: ["§Method: Validity of forced-allocation self-report", "§Limitations and Future Research"]
  - id: L4
    statement: >-
      Findings are bounded to text-conditioned LLMs of comparable training scale;
      multimodal, retrieval-grounded, cross-modal-trained, and non-text-primary
      (voice/AR-VR/in-store) agents may exhibit attenuated collapse — the DCI
      estimates here are upper-bound for those settings.
    severity: "scope-bounding"
    affects: [P5, P6, P8]
    body_sections: ["§Discussion: Boundary Conditions", "§Limitations and Future Research"]

