spine_version: "0.2"
spine_doc_version: "0.1.0"
provenance: retrofit
paper_key: "2026v"
title: >-
  Dimensional Collapse in AI-Mediated Search: Large Language Models as
  Metameric Observers of Brand Advertising

thesis: >-
  Large language models increasingly mediate consumer brand evaluation in
  search and agentic commerce, and they act as metameric observers: they
  systematically collapse the eight-dimensional brand emission profile toward
  the verifiability anchors (Economic and Semiotic, with Experiential inflated
  separately), rendering brands differentiated on Narrative, Ideological,
  Cultural, or Temporal dimensions structurally different but functionally
  equivalent in AI recommendations. Measured with the PRISM-B forced-allocation
  instrument across 21,350 API calls to 24 models from nine cultural traditions
  and 15 languages, the Dimensional Collapse Index (uniform baseline = .250) is
  elevated (mean .291 global, .356 cross-cultural) and convergent across
  architectures (cosine .977), so the collapse is structural rather than a
  platform quirk. Collapse is conditional on training-data embeddedness —
  locally embedded brands collapse about 25% more — and partially recoverable
  (~20% of lost dimensionality) by encoding soft dimensions as verifiable,
  machine-readable Brand Function specifications. For search advertising this
  reframes strategy from platform selection to dimensional defensibility:
  advertisers must encode soft brand dimensions in machine-readable form or
  risk effective erasure by LLM intermediaries. The findings are bounded to the
  text-conditioned LLM observers tested here.

# ============================================================================
# Boundary conditions — where the collapse mechanism is specified to hold
# (paper §Discussion "Boundary Conditions")
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      The mechanism is specified for TEXT-CONDITIONED AI observers; multimodal
      models receiving Semiotic, Experiential, and visually-encoded Cultural
      signal through additional channels should exhibit softened collapse.
    observable: "Whether the observer's grounding is text-only vs. multimodal."
    excludes: "Multimodal / image-text / audio-grounded encoders."
    body_sections: ["§Discussion: Boundary Conditions"]
  - id: C2
    statement: >-
      The collapse holds at inference time absent retrieval grounding;
      retrieval-grounded systems with verified domain feeds (legal registries,
      B-Corp records, controlled brand-asset stores) can convert
      perception-dependent claims into machine-readable evidence and partially
      bypass the training-corpus asymmetry (the architectural counterpart of
      the Patagonia exception).
    observable: "Presence/absence of verified retrieval grounding at inference."
    excludes: "Retrieval-augmented agents over verified soft-dimension feeds."
    body_sections: ["§Discussion: Boundary Conditions"]

