# DATA_MANIFEST.yaml — R15: Spectral Metamerism in AI-Mediated Brand Perception
# External data dependencies per the Research-as-Repository protocol

data_manifest:
  - id: "ai-search-metamerism-experiment"
    description: >
      Full experiment data from 7-model spectral metamerism study.
      1,050 organic responses + 2,800 calibration responses across
      seven LLMs in four clusters. Raw session logs (JSONL), model
      configs (YAML), prompts, analysis scripts, and derived results.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/"
    format: "JSONL + YAML + Python"
    access: public
    note: >
      Data will be generated by experiment scripts in this repository.
      See experiment/README.md for reproduction instructions.
      Data collection pending — manifest will be updated with checksums
      and exact file sizes after experiment execution.
