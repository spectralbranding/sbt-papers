# DATA_MANIFEST.yaml — R15: Spectral Metamerism in AI-Mediated Brand Perception
# External data dependencies per the Research-as-Repository protocol

data_manifest:
  - id: "run2-global-brands"
    description: >
      Run 2: 3,240 API calls across 6 LLMs, 10 global brand pairs,
      3 runs each. Structured weight allocation (100 points across 8
      SBT dimensions). Full JSONL session log with prompt/response pairs.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/L3_sessions/run2_global.jsonl"
    format: "JSONL"
    access: public
    records: 3240

  - id: "run3-local-brands"
    description: >
      Run 3: 1,620 API calls across 6 LLMs, 5 local brand pairs
      (Cyprus, Latvia, Kenya, Vietnam, Serbia), 3 runs each.
      Tests conditional metamerism hypothesis.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/L3_sessions/run3_local.jsonl"
    format: "JSONL"
    access: public
    records: 1620

  - id: "run4-resolution"
    description: >
      Run 4: 90 API calls. Brand Function resolution test.
      Same 5 local brand pairs with behavioral specifications prepended.
      Tests whether specification resolves dimensional collapse.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/L3_sessions/run4_resolution.jsonl"
    format: "JSONL"
    access: public
    records: 90

  - id: "local-brand-specs"
    description: >
      Brand Function specifications for 5 local brands (AlphaMega,
      Laima, Tusker, Vinamilk, Knjaz Milos). Created from publicly
      available information with provenance notes.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/local_brand_specs.json"
    format: "JSON"
    access: public

  - id: "run5-crosscultural"
    description: >
      Run 5: 11,410 total calls (7,999 successful, 70.1% success rate) across
      22 LLMs, 7 cross-cultural brand pairs, 8 cultural contexts (China, Japan,
      UAE, Russia, Ukraine, Mongolia, South Korea, India). Includes 69 native-
      language calls for H10 (Prompt Language Effect). Models span Western,
      Chinese, Russian, Japanese, Korean, Arabic, and Indian clusters.
      T-Pro 2.0 excluded from analysis (0 successful responses).
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/L3_sessions/run5_crosscultural.jsonl"
    format: "JSONL"
    access: public
    size_mb: 14
    records: 7999  # successful responses; 11,410 total calls

  - id: "run5-results"
    description: >
      Run 5 aggregated results (10.8MB JSON): DCI per model per culture pair,
      diagonal advantage matrix (H5), capacity comparison (H9), language effect
      (H10), geopolitical exploratory (H7). H1 SUPPORTED (p<0.0001, DCI=35.6),
      H2 SUPPORTED (cosine=0.976).
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/run5_results.json"
    format: "JSON"
    access: public
    size_mb: 10.8

  - id: "run5-analysis"
    description: >
      Post-processed analysis outputs: run5_dci_table.csv (models x cultures DCI
      matrix), run5_diagonal_advantage.csv (H5 primary measure),
      run5_analysis_results.json (full H5-H10 test statistics).
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/experiment/L4_analysis/"
    format: "CSV, JSON"
    access: public

  - id: "results-aggregated"
    description: >
      Aggregated results: dimensional weight profiles, DCI, cosine
      similarity matrices, hypothesis test statistics for Runs 2-4.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r15-ai-search-metamerism/results_v2_global.json, results_v3_local.json, results_v4_resolution.json"
    format: "JSON"
    access: public
