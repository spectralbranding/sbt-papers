# R19 Model Configuration
# Confirmatory core: 17 architectures spanning 17 distinct training pipelines
# (6 Western × 11 cross-cultural)

confirmatory_core:
  # ── Western (6) ─────────────────────────────────────────────────
  - key: claude
    provider: Anthropic
    model_id: claude-haiku-4-5
    lineage: Anthropic Western
    api_key_var: ANTHROPIC_API_KEY
    cost_per_call_usd: 0.001

  - key: gpt
    provider: OpenAI
    model_id: gpt-4o-mini
    lineage: OpenAI Western
    api_key_var: OPENAI_API_KEY
    cost_per_call_usd: 0.0002

  - key: gemini
    provider: Google
    model_id: gemini-2.5-flash
    lineage: Google Western
    api_key_var: GOOGLE_API_KEY
    cost_per_call_usd: 0.0002
    notes: requires thinking_budget=0 patch (see run11 pattern)

  - key: grok
    provider: xAI
    model_id: grok-3-mini
