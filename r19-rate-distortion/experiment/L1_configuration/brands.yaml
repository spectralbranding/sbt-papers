dimensions:
  - semiotic
  - narrative
  - ideological
  - experiential
  - social
  - economic
  - cultural
  - temporal

dimension_descriptions:
  semiotic: Visual identity, logo, design system, packaging — the brand's sign system
  narrative: Brand story, founding narrative, purpose and mission
  ideological: Values, ethics, social stance, sustainability commitments
  experiential: Customer experience quality, service, unboxing, touchpoints
  social: Social signaling value, community, what owning this brand communicates
  economic: Price point, value-for-money, pricing strategy and accessibility
  cultural: Cultural significance, connections to traditions and social movements
  temporal: Heritage, longevity, historical depth, relationship with time
