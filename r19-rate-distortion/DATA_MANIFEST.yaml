# DATA_MANIFEST.yaml — R19: Empirical Rate-Distortion Curve for AI Brand Perception Encoders
# External data dependencies per the Research-as-Repository protocol.
# All paths are relative to the package root (r19-rate-distortion/).

data_manifest:

  # ----- L0 PRE-REGISTRATION -----

  - id: "pre-registration-protocol"
    description: >
      R19 pre-registration protocol. Written before any API calls to L3_sessions/.
      Specifies hypotheses (H1-H5), sampling plan (7 models x 5 brands x 5 conditions
      x 5 reps = 875 calls), distortion measure (L1/2 total variation), analysis plan
      (Spearman + Bonferroni for H1, CV for H2 and H5, Welch t-test for H4), and
      stopping rules (hard cost cap $5.00, soft time cap 45 min).
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L0_specification/PROTOCOL.md"
    format: "Markdown"
    access: public

  # ----- L1 CONFIGURATION -----

  - id: "model-configuration"
    description: >
      R19 model configuration. 7 confirmatory cloud architectures: claude (Anthropic),
      gpt (OpenAI), gemini (Google), deepseek (DeepSeek), groq_llama33 (Meta via Groq),
      cerebras_qwen3 (Alibaba via Cerebras), grok (xAI). Includes simulated model for
      --demo mode.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L1_configuration/models.yaml"
    format: "YAML"
    access: public

  - id: "brand-configuration"
    description: >
      R19 brand configuration. 5 canonical SBT reference brands: Hermes, IKEA, Patagonia,
      Tesla, Erewhon. Includes canonical 8D profiles and dimension descriptions.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L1_configuration/brands.yaml"
    format: "YAML"
    access: public

  - id: "rate-condition-configuration"
    description: >
      R19 rate condition configuration. 5 rate conditions (R1-R5): 100-point allocation
      (~26 bits), 1-5 scale (~19 bits), Low/Medium/High (~13 bits), Yes/No binary (~8 bits),
      single dimension (~3 bits). Includes normalization rules and output schemas.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L1_configuration/rate_conditions.yaml"
    format: "YAML"
    access: public

  # ----- L2 PROMPTS -----

  - id: "prompt-templates"
    description: >
      R19 prompt templates. Five templates, one per rate condition (R1-R5). All English.
      All expect structured JSON responses. Includes dispatch table and RATE_BITS constants.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L2_prompts/r19_prompts.py"
    format: "Python"
    access: public

  # ----- L3 SESSION LOGS (raw API responses) -----

  - id: "rate-sweep-session-log"
    description: >
      R19 rate-distortion sweep session log. 1,652 records (1,621 valid; 98.1% parse
      rate): 17 models x 5 brands x 5 rate conditions x variable repetitions (3-5 per
      cell). Each record includes: timestamp, model, rate_condition, rate_bits, brand,
      prompt, raw response, parsed_output (8D normalized vector),
      distortion_vs_canonical (L1/2 total variation), elapsed_ms, cost_usd. Total cost
      $0.225; wall clock 1977s (33 min). Note: original pre-registration specified 7
      confirmatory models (875 calls); final run expanded to 17 models from distinct
      training lineages for full cross-architectural coverage.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L3_sessions/r19_rate_sweep.jsonl"
    format: "JSONL"
    access: public
    size_records: 1652

  # ----- L4 ANALYSIS RESULTS (post-processed) -----

  - id: "aggregated-results"
    description: >
      R19 aggregated results JSON. Contains: per-cell distortion statistics (model x rate
      x brand), per-model R(D) curves (mean distortions + power-law fit parameters),
      cross-model CV by rate condition, and hypothesis verdicts (H1-H5). Generated by
      run19_rate_sweep.py --analyze-only.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_results.json"
    format: "JSON"
    access: public

  - id: "per-cell-csv"
    description: >
      R19 per-cell distortion data in long format. Columns: model, rate_condition,
      rate_bits, brand, n_valid, mean_distortion, std_distortion. 425 rows
      (17 models x 5 rate conditions x 5 brands). Direct input for stats software.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_per_cell.csv"
    format: "CSV"
    access: public

  - id: "rd-curves-csv"
    description: >
      R19 per-model R(D) curve data with power-law fit. Columns: model, rate_condition,
      rate_bits, mean_distortion, fitted_distortion, residual. 85 rows (17 models x 5
      rate conditions). Includes fitted values from D = a * R^(-b) + c.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_rd_curves.csv"
    format: "CSV"
    access: public

  - id: "results-summary"
    description: >
      R19 human-readable results summary. Includes per-model R(D) table, cross-model
      CV by rate condition, hypothesis verdicts, and limitations. Generated automatically
      by run19_rate_sweep.py.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_summary.md"
    format: "Markdown"
    access: public

  - id: "pre-registration-audit"
    description: >
      R19 pre-registration audit. Verifies that analysis was executed exactly as
      pre-registered. Documents compliance table and hypothesis verdicts.
      No deviations logged.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_pre_registration_audit.md"
    format: "Markdown"
    access: public

  - id: "h4-supplementary"
    description: >
      R19 H4 supplementary: Welch t-test on per-model R(D) slope estimates (Western vs
      cross-cultural). Result: NOT SUPPORTED — t(4.60) = -.671, p = .534, Cohen's d = -.464.
      Severely underpowered (n = 4 vs n = 3).
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_h4_supplementary.md"
    format: "Markdown"
    access: public

  - id: "jshape-supplementary"
    description: >
      R19 J-shape formal test. Exploratory analysis addressing H1 failure interpretation.
      Paired t-tests confirm J-shaped curve with minimum at R2: t(6) = 5.81 (R1 vs R2,
      p < .001, d_z = 2.20), t(6) = 6.04 (R3 vs R2, p < .001, d_z = 2.28), t(6) = 7.70
      (R4 vs R2, p < .001, d_z = 2.91). Fisher combined p < .0001. J-shape SUPPORTED.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_jshape_supplementary.md"
    format: "Markdown"
    access: public

  - id: "per-brand-rd-csv"
    description: >
      R19 per-brand R(D) curves. Columns: brand, rate_condition, rate_bits,
      mean_distortion, std_distortion, n. 25 rows (5 brands x 5 rate conditions),
      each averaging 7 per-model means. Tesla is the outlier: minimum at R3 rather than R2.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_per_brand_rd.csv"
    format: "CSV"
    access: public

  - id: "per-brand-supplementary"
    description: >
      R19 per-brand R(D) curves supplementary narrative. J-shape analysis by brand,
      steepest-drop ranking, lowest-R2-distortion ranking. Notes on Erewhon and Tesla
      anomalies.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/L4_analysis/r19_per_brand_supplementary.md"
    format: "Markdown"
    access: public

  # ----- EXPERIMENT SCRIPT -----

  - id: "experiment-script"
    description: >
      R19 main experiment script. Reuses API callers from R15 (read-only via sys.path
      insert). Implements all 5 rate-condition parsers, distortion computation, power-law
      curve fitting, Spearman/CV hypothesis tests, and JSONL/CSV/Markdown output writers.
      Supports --demo (offline), --smoke (1 brand), --live (full 1,652-call run across
      17 models), and --analyze-only (re-aggregate from existing JSONL).
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "experiment/run19_rate_sweep.py"
    format: "Python"
    access: public
