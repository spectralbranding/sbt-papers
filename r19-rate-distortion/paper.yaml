meta:
  title: 'Optimal Response Formats for AI Brand Perception Measurement: Evidence for a J-Shaped Rate-Distortion
    Curve'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19528833
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-NC-ND-4.0
  keywords:
  - rate-distortion theory
  - brand perception
  - large language models
  - dimensional collapse
  - codebook convergence
  - instrument design
  abstract: 'This study applies Shannon rate-distortion theory to measure how response-format constraints
    affect the fidelity of AI-generated brand perception profiles. Seventeen large language model architectures
    from distinct training lineages are prompted to evaluate five canonical reference brands under five
    response formats spanning 3 to 26 bits of information rate. Distortion is measured as total variation
    distance between each model''s normalized output and a canonical eight-dimensional brand profile.
    The resulting rate-distortion curve is J-shaped: minimum distortion occurs not at the highest-rate
    format (100-point allocation, 26 bits) but at an intermediate bounded format (1-5 ordinal scale, 19
    bits), corresponding to a 49.4% reduction in mean distortion (R1 = .172 → R2 = .087). All 17 models
    exhibit this pattern (paired *t*(16) = 11.92, *p* < .001, Cohen''s *d*~z~ = 2.89 for R1 vs R2). Cross-model
    coefficient of variation averages .140 across all five rate conditions (CV = .171 excluding the structurally
    degenerate R5 single-dimension condition), indicating codebook convergence across architectures. These
    findings demonstrate that structured response formats suppress encoder bias and yield higher-fidelity
    brand perception measurements than unconstrained elicitation, with direct implications for AI-mediated
    brand research instrument design. *Keywords:* rate-distortion theory, brand perception, large language
    models, dimensional collapse, codebook convergence, instrument design The measurement of brand perception
    through AI systems has become a practical concern as large language models (LLMs) increasingly mediate
    consumer information search, product recommendation, and purchase decisions. Li, Castelo, Katona,
    and Sarvary [-@li-2024-frontiers-determining-validity] demonstrated that LLM-generated brand similarity
    and attribute ratings match human survey data with greater than 75% agreement, establishing LLMs as
    valid perceptual instruments. However, their study treated the response format as fixed. Recent empirical
    work demonstrates that LLMs exhibit systematic dimensional collapse when encoding brand perceptions:
    multi-dimensional brand profiles are compressed toward a small number of salient dimensions, producing
    distortion that varies by elicitation format and model architecture [@zharnikov-2026-dimensional-collapse-ai-mediated-search].
    The question of *how much* distortion different elicitation formats produce, and whether an optimal
    operating point exists, has not been addressed. Information theory provides a natural framework. Shannon''s
    [-@shannon-1959-coding-theorems-discrete] rate-distortion function R(D) characterizes the minimum
    information rate required to represent a source within a given distortion tolerance. In the classical
    formulation, distortion decreases monotonically as rate increases: more bits always mean better reconstruction.
    The theory has been applied extensively to signal compression [@cover-2006-elements-information-theory;
    @gersho-1991-vector-quantization-signal] and more recently to human perceptual cognition [@sims-2016-ratedistortion-theory-human],
    but not previously to the measurement of AI-generated brand perception, where the encoder''s internal
    priors produce non-monotonic behavior absent from the classical memoryless-source formulation. This
    paper reports the first empirical rate-distortion curve for AI brand perception encoders. The contribution
    is threefold. First, the study operationalizes rate as the information capacity of the response format
    and distortion as the distance between AI-generated and canonical brand profiles, establishing an
    information-theoretic measurement framework for AI brand research (Method section). Second, the empirical
    curve is J-shaped rather than monotonically decreasing: the intermediate 1-5 ordinal format (19 bits)
    outperforms the highest-rate 100-point allocation (26 bits), demonstrating that bounded quantization
    suppresses encoder bias (Results section). Third, 17 architectures from distinct training lineages
    trace essentially the same curve, demonstrating cross-architectural codebook convergence in brand
    perception encoding across the five tested conditions including R5 (Results section, H2).'
