limitations:
- description: Canonical brand profiles are theoretically derived reference signals, not human-validated
    ground truth; the distortion measure captures deviation from theory, not from any specific human cohort's
    perception.
  severity: moderate
  addressable: true
- description: Only English prompts were used; native-language effects on the R(D) curve are untested.
    The H4 architectural-separation test is severely underpowered (panels of 15+ models per group needed).
    The R5 condition produces extreme distortion by construction (a 1-of-8 indicator cannot approximate
    any realistic eight-dimensional profile).
  severity: moderate
  addressable: true
- description: 'H3 (the Shannon bound) is deferred: the analytical Dirichlet-source R(D) lower bound is
    not computed here, so the empirical curve is reported without its theoretical baseline (a companion
    theoretical note).'
  severity: moderate
  addressable: true
