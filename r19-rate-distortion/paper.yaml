hypothesis_results:
  - id: H1
    description: "D decreases monotonically as R increases (Spearman rho < 0, Bonferroni-corrected)"
    status: not_supported
    note: >
      H1 failure is a test-power artifact. n = 5 rate conditions is insufficient for
      Bonferroni-corrected Spearman significance (adjusted alpha = .00294). All 17 models
      show negative rho (-.3 to -.9) but none reach corrected significance. The J-shape
      supplementary provides the informative characterization.

  - id: J_shape
    description: "J-shaped R(D) curve with minimum distortion at R2 (1-5 scale, ~19 bits)"
    status: supported
    note: >
      Exploratory but overwhelming: R2 < R1, R3, R4 for all 17 models (17/17). Paired t-tests
      (df=16): t(16) = 11.92 (R1 vs R2, p < .001, d_z = 2.89), t(16) = 8.53 (R3 vs R2,
      p < .001, d_z = 2.07), t(16) = 9.35 (R4 vs R2, p < .001, d_z = 2.27).
      Combined Fisher chi-sq(6) = 69.06, p < .001.

  - id: H2
    description: "Common R(D) curve: mean cross-model CV < .15"
    status: supported
    note: "Mean cross-model CV = .140 across all 5 rate conditions (threshold .15). 17 models."

  - id: H3
    description: "Shannon lower bound comparison"
    status: deferred
    note: "Requires analytical computation of Dirichlet source R(D) bound. Follow-up note."

  - id: H4
    description: "Architectural separation (Western vs cross-cultural slope)"
    status: not_supported
    note: >
      Welch t(11.4) = -1.21, p = .250 (two-sided), Cohen's d = -.466. Underpowered
      (n = 6 vs n = 11, ~22% power). Neither p < .05 nor |d| > .50. Two outlier slopes
      (GLM-4, ALLaM > 13) drive group variance; excluding them: t = .77, p = .456, d = .42.

  - id: H5
    description: "At R1, cross-model CV of distortion < .20"
    status: supported
    note: "CV at R1 = .210 (threshold .20, n = 17 models). NOT SUPPORTED in full panel. 7-model core subset: CV = .196, marginally supported."

