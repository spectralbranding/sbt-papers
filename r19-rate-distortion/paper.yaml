methodology:
  type: empirical
  design: >
    Rate-distortion sweep: 5 response-format conditions (R1-R5) applied to 5 canonical
    SBT reference brands across 17 LLM architectures from distinct training lineages
    (6 Western, 11 cross-cultural). Distortion measured as total variation distance (L1/2)
    between AI output (normalized to 8D simplex) and canonical brand profile. 5 repetitions
    per cell; 1,652 recorded calls (1,621 valid); 98.1% parse rate.
  sample:
    size: 1652
    valid: 1621
    description: >
      17 models x 5 brands x 5 rate conditions x variable repetitions (3-5 per cell).
      17 architectures from distinct training lineages spanning Western (Anthropic, OpenAI,
      Google x2, xAI, Meta), Chinese (DeepSeek, Alibaba x2, Zhipu, Moonshot), Russian
      (Sber, Yandex), Indian (Sarvam), Saudi (SDAIA), and Japanese (Tokyo Inst. Tech.)
      providers. Total cost $0.225; 33 min wall clock.
    models: 17
    brands: 5
  instrument: "PRISM-B rate-distortion variant (5 rate conditions)"
  measures:
    - variable: "distortion_vs_canonical"
      instrument: "L1/2 total variation distance between normalized AI output and canonical profile"
      reliability: "100% parse rate across 875 calls"
    - variable: "rd_curve_fit"
      instrument: "Power-law D = a * R^(-b) + c, fitted via scipy.optimize.curve_fit"
    - variable: "cross_model_cv"
      instrument: "Coefficient of variation of mean distortion across 17 models per rate condition"
  analysis:
    primary:
      - "Spearman rank correlation (rate_bits vs mean_distortion) per model, Bonferroni-corrected (H1)"
      - "Cross-model CV of distortion, averaged across rate conditions (H2)"
      - "Cross-model CV of distortion at R1 (H5)"
    secondary:
      - "Paired t-tests on per-model means: R1 vs R2, R3 vs R2, R4 vs R2 (J-shape test)"
      - "Fisher combined test across 3 paired t-tests (J-shape combined p)"
      - "Welch t-test on R(D) slope estimates: Western vs cross-cultural (H4)"
      - "Per-brand R(D) curves (exploratory)"
    software: "Python 3.12, scipy, numpy"

