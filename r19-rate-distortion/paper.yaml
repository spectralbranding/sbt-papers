hypothesis_results:
  - id: H1
    description: "D decreases monotonically as R increases (Spearman rho < 0, Bonferroni-corrected)"
    status: not_supported
    note: >
      H1 failure is a test-power artifact. n = 5 rate conditions is insufficient for
      Bonferroni-corrected Spearman significance (adjusted alpha = .0071). All 7 models
      show negative rho (-.4 to -.9) but none reach corrected significance. The J-shape
      supplementary provides the informative characterization.

  - id: J_shape
    description: "J-shaped R(D) curve with minimum distortion at R2 (1-5 scale, ~19 bits)"
    status: supported
    note: >
      Exploratory but overwhelming: R2 < R1, R3, R4 for all 7 models. Paired t-tests:
      t(6) = 5.81 (R1 vs R2, p < .001, d_z = 2.20), t(6) = 6.04 (R3 vs R2, p < .001,
      d_z = 2.28), t(6) = 7.70 (R4 vs R2, p < .001, d_z = 2.91). Combined Fisher p < .0001.

  - id: H2
    description: "Common R(D) curve: mean cross-model CV < .15"
    status: supported
    note: "Mean cross-model CV = .107 across all 5 rate conditions (threshold .15)."

  - id: H3
    description: "Shannon lower bound comparison"
    status: deferred
    note: "Requires analytical computation of Dirichlet source R(D) bound. Follow-up note."

  - id: H4
    description: "Architectural separation (Western vs cross-cultural slope)"
    status: not_supported
    note: >
      t(4.60) = -.671, p = .534 (two-sided), Cohen's d = -.464. Severely underpowered
      (n = 4 vs n = 3). Neither p < .05 nor |d| > .50. Requires >= 15 models per group.

  - id: H5
    description: "At R1, cross-model CV of distortion < .20"
    status: supported
    note: "CV at R1 = .196 (threshold .20, n = 7 models)."

