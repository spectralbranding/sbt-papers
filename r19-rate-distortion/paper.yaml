    severity: moderate
    addressable: true
  - id: L3
    description: "n = 4 vs n = 3 for H4 (architectural separation) severely underpowered"
    severity: major
    addressable: true
  - id: L4
    description: "English prompts only; native-language effects on R(D) curve not tested"
    severity: moderate
    addressable: true
  - id: L5
    description: "R5 produces indicator vectors; distortion at R5 dominated by 1D vs 8D mismatch"
    severity: minor
    addressable: false

