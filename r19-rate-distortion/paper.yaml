methodology:
  type: empirical
  design: 'Operationalize rate as the information capacity (bits) of the response format, assuming a uniform
    distribution over the output alphabet: log2(multinomial count) for R1 (~26), 5^8 for R2 (~19), 3^8
    for R3 (~13), 2^8 for R4 (8), log2(8) for R5 (~3). Compute distortion as total variation distance
    d(w_hat, w_canon) = 0.5 * sum_i |w_hat_i - w_canon_i| between the model''s normalized output and the
    normalized canonical eight-dimensional brand profile, ranging 0 (perfect reconstruction) to 1 (maximally
    distant). Test the five pre-registered hypotheses: H1 per-model Spearman rate-distortion monotonicity
    (Bonferroni alpha .00294); H2 mean cross-model CV below .15; H4 Welch t-test of per-model power-law
    slope b (Western vs cross-cultural); H5 R1 CV below .20; plus paired t-tests across the 17 per-model
    means for the J-shape, with Cohen''s d_z and a Fisher combined chi-squared.'
  analysis:
    software: sbt-papers/r19-rate-distortion/code/analysis.py (SEED=42)
    method: uv run python analysis.py
