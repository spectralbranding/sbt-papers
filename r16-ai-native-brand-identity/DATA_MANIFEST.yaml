# DATA_MANIFEST.yaml — R16: AI-Native Brand Identity
# External data dependencies per the Research-as-Repository protocol

data_manifest:
  - id: "behavioral-metamerism-pilot"
    description: >
      Full experiment data from 7-model behavioral metamerism pilot.
      Raw LLM session logs (JSONL), model configs (YAML), analysis scripts,
      and derived results. Stored in experiment/ directory within this repository.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r16-ai-native-brand-identity/experiment/"
    format: "JSONL + YAML + Python"
    access: public
    note: >
      Data is generated by experiment scripts in this repository.
      See experiment/README.md for reproduction instructions.
