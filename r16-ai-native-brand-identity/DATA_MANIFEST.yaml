# DATA_MANIFEST.yaml — R16: AI-Native Brand Identity
# External data dependencies per the Research-as-Repository protocol

data_manifest:
  - id: "behavioral-metamerism-pilot"
    description: >
      Full experiment data from 6-model behavioral metamerism pilot (684 API calls).
      Pre-registration protocol, LLM session logs (JSONL, 684 entries),
      reproducibility metadata (YAML), experiment script (Python),
      results (JSON, 6956 lines), and summary tables.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers"
    path: "r16-ai-native-brand-identity/experiment/"
    format: "JSONL + JSON + YAML + Python + Markdown"
    access: public
    models:
      - claude-sonnet-4-6
      - gpt-4o-mini
      - gemini-2.5-flash
      - deepseek-chat
      - qwen3:30b (local, Ollama)
      - gemma4:latest (local, Ollama)
    key_files:
      - experiment/behavioral_metamerism_pilot.py
      - experiment/results.json
      - experiment/summary_tables.md
      - experiment/L3_sessions/session_log.jsonl
      - experiment/L3_sessions/metadata.yaml
      - experiment/L0_specification/protocol.md
    note: >
      Data generated 2026-04-03 (68 minutes). All 4 pre-registered
      hypotheses supported. See experiment/README.md for reproduction.
