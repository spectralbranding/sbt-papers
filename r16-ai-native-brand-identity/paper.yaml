# paper.yaml — R16: AI-Native Brand Identity
# Citation key: 2026x
# Paper Spec schema: https://github.com/spectralbranding/paper-spec/SPECIFICATION.md

paper_spec_version: "0.1.0"

metadata:
  title: "AI-Native Brand Identity: From Visual Recognition to Cryptographic Verification"
  authors:
    - name: "Dmitry Zharnikov"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
      corresponding: true
  citation_key: "2026x"
  doi: "10.5281/zenodo.19391476"
  date: "2026-04-16"
  version: "1.7"
  status: working_paper
  license: "CC-BY-4.0"
  abstract: >
    This paper advances four contributions to brand identity research. First, we propose the
    observer-driven evolution thesis: identity verification technologies change discontinuously
    in response to shifts in the observer type. Wax seals served bureaucratic observers, hallmarks
    served asymmetric-information buyers, trademarks served mass-market consumers, and SSL
    certificates served web browsers. Second, we introduce behavioral metamerism: brands that
    produce identical statistical profiles but exhibit structurally different behavioral patterns,
    creating AI-native brand confusion that statistical optimization cannot resolve. We extend
    Spectral Brand Theory to define the Brand Function as the complete behavioral specification
    of how a brand operates when observed by machines, and argue that cryptographic signatures on
    behavioral specifications will serve as the primary brand identity mechanism for AI-mediated
    commerce. Drawing on emerging standards (W3C Verifiable Credentials, GLEIF vLEI,
    .well-known/brand.json) and empirical evidence on LLM brand bias, we propose six formal
    propositions connecting identity verification technology to observer type. We report pilot
    results from a synthetic cohort experiment (1,359 calls across two experiments) testing
    whether the Brand Function's effect on dimensional collapse varies across observer types.
    Logos will persist for human observers but face structural irrelevance for AI agents;
    organizations face pressure to develop dual identity infrastructure: visual for humans,
    cryptographic for machines.
  keywords:
    - AI-native brand identity
    - cryptographic verification
    - behavioral metamerism
    - brand function
    - agentic commerce
    - observer-type transition
    - spectral brand theory

claims:
  - id: P1
    type: proposition
    statement: >
      Identity verification technology characteristically changes not through
      incremental improvement but through discontinuous response to a change
      in the observer type.
    falsification: >
      P1 is falsified if the current AI-observer transition produces only
      incremental extensions of existing logo-based identity rather than a
      structurally different verification mechanism.
    depends_on: []

  - id: P2
    type: proposition
    statement: >
      When the observer changes, the previous identity technology persists
      for legacy observers but becomes functionally irrelevant for the new
      observer class.
    falsification: >
      P2 is falsified if AI agents demonstrably use logos as informational
      inputs in purchasing decisions, weighting visual brand identity in
      recommendation quality.
    depends_on: [P1]

  - id: P3
    type: proposition
    statement: >
      AI agents perceive brand identity primarily through structured data
      evaluation, behavioral pattern analysis, and third-party corroboration
      rather than visual recognition. The logo carries minimal incremental
      informational weight for machine observers beyond what structured
      data conveys.
    falsification: >
      P3 is falsified if multimodal AI agents that process visual brand
      elements make measurably better purchasing decisions than text-only
      agents with identical structured data.
    depends_on: [P1, P2]

  - id: P4
    type: proposition
    statement: >
      The Brand Function is the root specification from which all brand
      emissions and identity artifacts derive. Existing AI commerce protocols
      (ACP, UCP, brand.json) address brand discovery and transaction but not
      brand perception or coherence.
    falsification: >
      P4 is falsified if existing protocols prove sufficient for AI agents
      to measure brand coherence and predict behavioral responses without
      additional specification layers.
    depends_on: []

  - id: P5
    type: proposition
    statement: >
      Cryptographic signatures on behavioral specifications will replace logos
      as the primary brand identity mechanism for AI-mediated commerce,
      following the historical pattern where each observer-type change
      produces a new identity technology.
    falsification: >
      P5 is falsified if AI-mediated commerce scales to significant market
      share (>20% of category transactions) without adopting cryptographic
      brand verification.
    depends_on: [P1, P2, P3, P4]

  - id: P6
    type: proposition
    statement: >
      Behavioral metamerism --- where brands have identical statistical
      profiles but structurally different behavioral signatures --- is the
      AI-native equivalent of visual brand confusion, and can only be
      resolved through behavioral specification.
    testable: true
    tested_in_paper: true
    status: supported
    falsification: >
      P6 is falsified if LLMs can reliably distinguish behaviorally
      different brands using only statistical profiles (reviews, ratings,
      public web content) without structured behavioral specifications.
    depends_on: [P3, P4]

methodology:
  type: mixed
  approach: >
    Historical analysis of five observer-type transitions combined with
    pre-registered empirical pilot testing behavioral metamerism across
    six LLMs in three clusters (Western cloud, Chinese cloud, local
    open-weight). 684 API calls, 0 errors, all 4 hypotheses supported.
  tools:
    - "Python 3.14.3 (experiment script)"
    - "Anthropic API (Claude Haiku 3.5)"
    - "OpenAI API (GPT-4o-mini)"
    - "Google AI Studio (Gemini 2.5 Flash)"
    - "DeepSeek API (DeepSeek V3)"
    - "Ollama (Qwen3 30B, Gemma 4 27B)"

