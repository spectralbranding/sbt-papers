  statement: 'Brand identity is observer-contingent rather than brand-intrinsic: it is a function of observer
    type, and different observer types require structurally different identity technologies. This reframes
    customer-based brand equity, which presupposes a human mind forming associative networks, as one observer-specific
    case rather than the general model.'
  testable: false
  tested_in_paper: true
  status: not_tested
