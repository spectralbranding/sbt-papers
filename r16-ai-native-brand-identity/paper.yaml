contradictions: []
limitations:
- description: 'The paper is conceptual: the six propositions are not empirically tested (only the supplementary
    format-optimization experiment and the companion R15 study 2026v provide data), behavioral metamerism
    is theorized but not measured in deployed commerce, and the Brand Function is not implemented at scale.
    The format experiment is prompted-LLM, so generalization to deployed agentic commerce needs further
    validation.'
  severity: moderate
  addressable: true
- description: 'P5''s open-coordination adoption prediction is a critical premise, not a detail: if a
    single platform locks in proprietary brand verification, the Brand Function reduces to that platform''s
    product spec and the open-standards prediction is foreclosed. Whether the agentic stack lands in the
    open-coordination or closed-platform regime is a research-agenda question.'
  severity: moderate
  addressable: true
- description: The historical analysis draws on Western European / North American examples (English hallmarks,
    European trademarks, American SSL); non-Western identity traditions (Chinese chops, Islamic calligraphic
    seals, Indian guild marks) may follow different evolutionary patterns, and the Brand Function assumes
    Western legal infrastructure (trademark law, contract enforcement).
  severity: moderate
  addressable: true
- description: 'Other scope gaps left to future work: privacy / tiered-disclosure of the specification;
    ethics of concentrating specification authority in the brand (large-vs-small asymmetry, strategic
    opacity / gaming); multi-brand portfolio interactions between Brand Functions; and a behavioral-metamerism
    index analogous to the CIE Special Metamerism Index.'
  severity: moderate
  addressable: true
