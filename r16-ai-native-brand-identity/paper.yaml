methodology:
  type: empirical
  design: Cross five format conditions (F1 JSON scores+positioning+key-signals; F2 prose narrative; F3
    tabular; F4 ranked list; F5 score-only vector, revised in Run 2 to qualitative ordinal levels) against
    5 brands x 5 models x 3 replications, measuring cosine fidelity of each model's reconstructed profile
    to the canonical brand profile; analyze format effect by ANOVA with Bonferroni-corrected pairwise
    contrasts and Kendall's W for cross-model consistency.
  analysis:
    method: LLM APIs; reference implementation in the public mirror
acceptance:
- claim_id: P1
  criterion: Holds if identity verification technology characteristically changes not through incremental
    improvement but through discontinuous response to a change in the observer type (the observer-driven
    evolution thesis).
  falsification: P1 fails if the AI-observer transition produces only incremental extensions of logo-based
    identity (animated logos, richer visual metadata) rather than a structurally different verification
    mechanism.
- claim_id: P2
  criterion: Holds if when the observer changes, the previous identity technology persists for legacy
    observers but becomes functionally irrelevant for the new observer class (wax seals in legal ceremonies,
    hallmarks in metals regulation, logos on websites despite SSL handling actual verification).
  falsification: P2 fails if AI agents demonstrably weight logo presence/absence as an informational input
    that meaningfully affects recommendation quality.
- claim_id: P3
  criterion: Holds if aI agents do not perceive brand identity through visual recognition but through
    structured-data evaluation, behavioral-pattern analysis, and third-party corroboration; the logo carries
    near-zero informational weight for text-based agents and minimal weight in text-only AI mediation
    more broadly.
  falsification: P3 fails if multimodal agents processing visual brand elements make measurably better
    purchasing decisions than text-only agents with identical structured data.
- claim_id: P4
  criterion: Holds if the Brand Function f(query, context, observer_type, time) -> response is the root
    specification from which all brand emissions and identity artifacts derive; technologies are the primary
    rendering engines and organizational structure is coordination overhead.
  falsification: P4 fails if existing protocols (brand.json, Brando Schema, ACP) prove sufficient for
    AI agents to measure coherence and predict behavioral responses without additional specification layers.
- claim_id: P5
  criterion: Holds if cryptographic signatures on behavioral specifications will replace logos as the
    primary brand identity mechanism for AI-mediated commerce, following the observer-driven pattern.
  falsification: P5 fails if AI-mediated commerce scales past ~20% of category transactions without adopting
    cryptographic brand verification; conditional on agentic-commerce adoption.
- claim_id: P6
  criterion: Holds if behavioral metamerism — two Brand Functions with equal expected values on every
    observable aggregate statistic in observation set G yet differing on at least one behavioral dimension
    outside G — is the AI-native equivalent of visual brand confusion.
  falsification: P6 fails if LLMs with only statistical data distinguish behaviorally different brands
    at rates statistically indistinguishable from LLMs with Brand Function specs (no significant accuracy
    gain, p < .05, across >=3 categories).
