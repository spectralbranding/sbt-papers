contradictions: []
limitations:
- description: The enacted channel consists of reports of concrete events, not the events themselves;
    the instrument measures the gap between two registers of the public record, and a talk-action reading
    of that gap leans on the verifiability of enacted-channel artifact classes (AA3).
  severity: moderate
  addressable: true
- description: Stage-1 validation generalizes to real artifacts only insofar as the constructed vignette
    bank is distributionally representative of real intervention descriptions; representativeness is argued
    by construction (rung x register x minimal-pair coverage), not measured.
  severity: moderate
  addressable: true
- description: 'No causal or performance claims: the instrument measures a descriptive property of public
    signals; whether deep optimizers outperform, and whether gaps predict reversion, are downstream questions
    requiring outcome data.'
  severity: minor
  addressable: true
- description: Confirmatory power holds only at the pre-registered minimum resolved panel (45 organizations
    for a half-rung gap); below it, hypothesis claims demote to descriptive reporting by rule.
  severity: moderate
  addressable: true
- description: 'The pre-registered tie-breaker sensitivity (RC1) was not executable within the original
    design — the downward tie-break binds inside the frozen classifier prompt, not in the estimator (a
    PL0 v1.0 design oversight discovered at analysis) — and was EXECUTED via the labeled post-campaign
    re-read arm (PL0 v1.2 §10.2), whose results are F10: conclusions stable across all three regimes.'
  severity: minor
  addressable: true
