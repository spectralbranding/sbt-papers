meta:
  title: 'Measuring Optimization Depth: A Pre-Registered Instrument for the Stated-Actual Optimization
    Gap in Organizational Self-Description (PRISM-O)'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.21159815
  date: '2026-07-04'
  venue: Organizational Research Methods
  license: CC-BY-4.0
  keywords:
  - optimization depth
  - decoupling
  - content analysis
  - large language models
  - measurement instrument
  - preregistration
  - organizational change
  - noise floor
  abstract: 'Organizations improve themselves at different depths — economic outputs, coordination structure,
    activity chains, delivered value — and a long literature holds both that deeper interventions are
    the durable ones and that organizational talk decouples from organizational action. Neither claim
    has a general-purpose measurement instrument. This paper introduces PRISM-O, a pre-registered instrument
    in which large language model operators classify every improvement intervention in a frozen two-channel
    panel of public artifacts — strategy prose versus reported concrete interventions — onto a four-rung
    optimization-depth ladder under a fixed mechanical rubric, reporting the stated-actual optimization
    gap only beyond twice the cross-family operator noise floor. Constructed-ground-truth validation is
    a ceiling result (macro accuracy 1.000, identity masking inert). On a pinned 40-organization filing
    panel, the floors speak: 4 of 35 organizations resolve, so by pre-registered rule the decoupling hypotheses
    demote to descriptive reporting — pooled depth distributions separate in the predicted stated-deeper
    direction (p < .001) but the permutation falsification bar is not cleared. Nearly half of segmented
    improvement spans specify nothing codable, more in strategy prose than in enacted reports. The instrument,
    rubric, bank, logs, and estimator publish for reuse; the instrument measures the public record, never
    internal ground truth.'
