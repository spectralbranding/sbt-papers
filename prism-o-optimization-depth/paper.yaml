methodology:
  type: empirical
  design: 'Two-channel artifact-panel construction: at least 60 sector- and size-stratified public organizations,
    one STATED and one ENACTED artifact set each from a fixed 12-month window, channel assignment by ex-ante
    artifact class, artifacts pinned byte-identical at freeze. Rubric classification: at least three cross-family
    operator pairs read each artifact and code every improvement intervention onto the D4-D1 ladder under
    the frozen decision tree (deepest-specified rung wins; specified-not-promised tie-breaker, ties break
    downward), returning structured records (rung, evidence span, confidence) logged as append-only JSONL.
    Gap estimation with floors: per organization, depth distributions per channel over coded interventions;
    the gap = mean depth rank(STATED) minus mean depth rank(ENACTED); operator floor = across-pair dispersion
    of the gap on the identical pinned panel; resolved iff the absolute gap exceeds twice the floor; source-cluster
    bootstrap CIs with artifacts as clusters; ordinal-safe co-primaries (two-sample KS agreement in direction;
    median-rank and stochastic-dominance robustness). The estimator''s formal definitions — rung scores
    D4 = 1 through D1 = 4, the per-pair gap, the across-pair floor, the k = 2 resolution criterion, and
    the section-10.1 nested criterion |gap| > k max(operator floor, artifact band) — are displayed as
    equations in the paper, and the frozen power computation (.80 power at 45 resolved organizations for
    a half-rung gap at SD 1.0, alpha .017, exact noncentral t) is reproduced by the companion power script
    and displayed as the power-curves figure.'
  analysis:
    software: PREREGISTRATION.md §3, published with the dataset (panel manifest at freeze)
    method: panel manifest, pinned artifact store
acceptance:
- claim_id: P1
  criterion: 'Holds if optimization depth is a well-defined ordinal property of an organizational improvement
    intervention: the rung of the four-rung ladder (economic outputs, coordination structure, activity
    chain, delivered value) whose object the intervention specifies a change to, decidable by a mechanical
    rubric.'
  falsification: If trained coders (human or AI) cannot apply the rubric consistently to constructed cases
    with depth fixed by construction — Stage-1 accuracy below the pre-registered threshold with disagreement
    spread across rungs rather than localized — depth is not rubric-decidable as defined.
- claim_id: P2
  criterion: 'Holds if the ladder''s order is a dependency chain: interventions at a deeper rung cascade
    outward to shallower rungs, while surface interventions leave the deeper specification unchanged and
    tend to revert — the durable-change locus is the process and product rungs.'
  falsification: Systematic evidence of durable economic improvement from pure D4 interventions absent
    any deeper respecification, or of D1/D2 interventions failing to propagate outward at rates comparable
    to D4 reversion, would break the asymmetry.
- claim_id: P3
  criterion: 'Holds if optimization depth is machine-readable: AI operators under the frozen rubric recover
    constructed ground truth at or above the pre-registered accuracy threshold and resolve real organizations''
    depth readings beyond the operator floor.'
  falsification: Stage-1 macro accuracy below .80, or a majority of panel organizations unresolved at
    the per-pair criterion — either publishes as the measured capability bound and withdraws the instrument
    claim.
- claim_id: P4
  criterion: 'Holds if the stated channel reads systematically deeper than the enacted channel: organizations''
    strategy prose claims deeper optimization than their reported interventions specify, and the signed
    gap clears the operator floor at panel level.'
  falsification: A panel-level gap unresolved against the floor, centered at zero under permutation, or
    negative — each is a committed publishable outcome; a floored null reads as measured consistency of
    public organizational communication.
- claim_id: P5
  criterion: 'Holds if the stated-actual gap is a property of the organization''s public signal, not of
    the measuring model family: across cross-family operator pairs, per-organization gap dispersion stays
    within the operator floor for resolved organizations.'
  falsification: Family-dependent gaps (across-family dispersion exceeding the floor) falsify signal-attribution;
    the finding then demotes to a family-conditional reading under the no-rescue rule.
- claim_id: P6
  criterion: Holds if the instrument-family scaffold and its metrological discipline (pre-registration,
    operator noise floors, per-pair resolution, cross-family operators, mechanical concordance screening,
    committed nulls) transfer unchanged from observer-side perception constructs to a producer-side organizational
    construct, crossing the producer-observer seam at the rendered artifact.
  falsification: If the producer-side construct had required new floor machinery, new resolution logic,
    or a new scaffold layer beyond domain-specific prompts and rubric, the domain-neutrality claim would
    fail; NF1/NF2 locate what is genuinely new (the construct and rubric), and the apparatus diff against
    the sibling instruments is the check.
