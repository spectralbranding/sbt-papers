spine_version: "0.2"
spine_doc_version: "0.2.0"
paper_key: "2026bd"
provenance: generative
title: >-
  Measuring Optimization Depth: A Pre-Registered Instrument for the
  Stated-Actual Optimization Gap in Organizational Self-Description (PRISM-O)

thesis: |
  What organizations say about how they improve themselves and what they
  actually do are two registers of one public record, and the depth at which
  improvement interventions bind — economic outputs, coordination structure,
  activity chains, or delivered value — is readable from that record. PRISM-O
  turns both claims into floored measurements: AI operators classify every
  improvement intervention in a frozen two-channel panel of public artifacts
  onto a four-rung optimization-depth ladder under a fixed mechanical rubric,
  and the instrument reports the stated-actual optimization gap — the signed
  depth difference between strategy prose and reported interventions — only
  when it clears twice the measured operator noise floor. The construct
  promotes two long-asserted organizational claims to measured quantities: the
  lean/reengineering doctrine that deep interventions are the durable ones,
  and the decoupling tradition's claim that organizational talk systematically
  outruns organizational action. The instrument never claims access to
  internal ground truth: it measures communicated decoupling in the public
  record, with constructed-ground-truth vignettes supplying validation where
  ground truth is needed.

# ============================================================================
# Boundary conditions
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      PRISM-O measures the organization's PUBLIC signal: the stated and
      enacted registers of its public record. Internal configuration is
      formally out of reach from bounded outside observation, and no claim in
      this paper concerns what the organization internally is or does — only
      what its public record specifies.
  - id: C2
    statement: >-
      Single-window instrument: both channels draw from one fixed 12-month
      window per organization; depth trajectories and drift across windows
      are outside scope.
  - id: C3
    statement: >-
      The panel frame is organizations with sufficient public artifact
      coverage in BOTH channels under the ex-ante artifact-class rules;
      conclusions do not extend to organizations that publish too little for
      the channel split to be satisfiable.
  - id: C4
    statement: >-
      The depth ladder spans the operational stack (product/value, process,
      organization) plus its economic output surface; the meta rung (adopting
      a specification framework itself) is out of instrument scope and codes
      UNCLASSIFIED.
  - id: C5
    statement: >-
      Gap claims are conditional on cross-family operator concordance and the
      per-pair resolution criterion; a gap that does not clear twice the
      operator floor is reported unresolved, never rescued by a single
      family's reading.

# ============================================================================
# Assumption atoms
# ============================================================================
assumption_atoms:
  - id: AA1
    statement: >-
      Rubric-guided classification of business text is within current LLM
      capability at the reliability level social-science annotation work
      reports; the vignette bank measures, rather than assumes, the residual.
    type: "instrument_capability"
    relaxable: true
    relaxation_consequence: >-
      If operators cannot code depth reliably, H1 fails at Stage 1 and the
      instrument claim is withdrawn — the paper publishes the measured
      capability bound instead.
    affects: [M2, P3]
    evidence:
      - type: citation
        anchor: >-
          LLM annotation matches or exceeds crowd-worker reliability on
          political/social text classification; LLMs as social-science
          measurement instruments.
        citation_keys:
          [gilardi-2023-chatgpt-outperforms-crowd, ziems-2024-can-large-language-models]
        citation_role: methodological_source
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["The AI Operator as Coder"]
  - id: AA2
    statement: >-
      The ex-ante artifact-class rules separate the stated register (strategy
      prose) from the enacted register (reports of executed interventions)
      well enough that the two channels measure different things; ambiguous
      artifact classes are excluded by rule.
    type: "measurement_design"
    relaxable: true
    relaxation_consequence: >-
      If the registers do not separate, the gap attenuates toward zero —
      channel-label permutation (RC5) and the same-organization negative
      control (RC3) measure the separation empirically.
    affects: [M1, P4]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Two Channels of the Public Record"]
  - id: AA3
    statement: >-
      Enacted-channel artifacts (restructuring filings, layoff notices,
      executed-reorganization and shipped-change reports) are reports of
      verifiable, consequential events and therefore closer to behavior than
      strategy prose, without being behavior itself.
    type: "data_source_trust"
    relaxable: true
    relaxation_consequence: >-
      If enacted-channel reports are themselves systematically rhetorical,
      the instrument measures a talk-talk gap rather than a talk-action gap;
      the construct then still measures register decoupling but the
      Argyris/Meyer-Rowan interpretation weakens (recorded as L1).
    affects: [M1, P4]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Two Channels of the Public Record", "Limitations"]
  - id: AA4
    statement: >-
      Cross-family operator pairs are sufficiently independent that agreement
      across families reflects the artifact signal rather than shared model
      priors; the masked-identity arm bounds the prior-knowledge residual.
    type: "operator_independence"
    relaxable: true
    relaxation_consequence: >-
      If families share priors about famous organizations, agreement
      overstates signal; the masked-vs-named delta (RC2) is the measured
      bound, and masked-arm readings are the conservative reference.
    affects: [M2, M3, P5]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["The AI Operator as Coder"]
  - id: AA5
    statement: >-
      For claims about how the public record reads under AI observation, AI
      observers are the measurement construct itself, not a proxy for human
      raters: analysts, counterparties, and AI agents consume the same public
      record the instrument reads, and human gold standards are required only
      for human-perception claims, which this paper does not make.
    type: "construct_validity"
    relaxable: true
    relaxation_consequence: >-
      If a consumer of the instrument needs human-interpretability of the
      depth readings, the deferred human-coded subsample (M6 placeholder)
      must be collected before that use; until then such claims are out of
      scope.
    affects: [M2, M6, P3]
    evidence:
      - type: citation
        anchor: >-
          LLM-derived psychological measurement validates against human gold
          standards where humans are the construct; the deployed-surface
          argument inverts the direction of the validity burden for
          machine-consumed records.
        citation_keys:
          [
            rathje-2024-gpt-effective-multilingual,
            abdurahman-2024-perils-opportunities-llms,
            trott-2024-augment-psycholinguistic-datasets,
          ]
        citation_role: methodological_source
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-collection amendment v1.1"
    body_sections: ["The AI Operator as Coder"]

