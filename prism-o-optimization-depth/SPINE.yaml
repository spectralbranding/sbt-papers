#
# Schema v0.2 ([internal path removed]). POST-CAMPAIGN STATE
# (FORK 2026-07-03): the frozen-PL0 campaign ran end-to-end (O1 Stage-1, O2
# Stage-2); findings F1-F8 carry the empirical layer; P3 resolved partially,
# P4/P5 DEMOTED TO DESCRIPTIVE by the frozen minimum-resolved rule (F2).
