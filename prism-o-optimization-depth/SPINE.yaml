methods:
  - id: M1
    statement: >-
      Two-channel artifact-panel construction: at least 60 sector- and
      size-stratified public organizations, one STATED and one ENACTED
      artifact set each from a fixed 12-month window, channel assignment by
      ex-ante artifact class, artifacts pinned byte-identical at freeze.
    type: "archival_search"
    inputs: []
    outputs: []
    code_anchor: "PREREGISTRATION.md §3, published with the dataset (panel manifest at freeze)"
    reproducibility:
      seed: "N/A (deterministic selection rule fixed ex ante)"
      version: "PL0 v1.0 (2026-07-03)"
      runtime_environment: "panel manifest, pinned artifact store"
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "frozen before any reading"
    body_sections: ["Two Channels of the Public Record"]
  - id: M2
    statement: >-
      Rubric classification: at least three cross-family operator pairs read
      each artifact and code every improvement intervention onto the D4-D1
      ladder under the frozen decision tree (deepest-specified rung wins;
      specified-not-promised tie-breaker, ties break downward), returning
      structured records (rung, evidence span, confidence) logged as
      append-only JSONL.
    type: "ai_invocation"
    inputs: []
    outputs: []
    code_anchor: "RUBRIC.md (frozen with PL0, published with the dataset); prism_core.llm_call_logger"
    reproducibility:
      seed: "temperature 0 where honored; PL1 pins + model_epoch stamping per reading"
      version: "PL0 v1.0; PL1 config pinned at campaign start"
      runtime_environment: "prism_core provider layer"
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "frozen before any reading"
    body_sections: ["The Depth-Coding Rubric", "The AI Operator as Coder"]
  - id: M3
    statement: >-
      Gap estimation with floors: per organization, depth distributions per
      channel over coded interventions; the gap = mean depth rank(STATED)
      minus mean depth rank(ENACTED); operator floor = across-pair dispersion
      of the gap on the identical pinned panel; resolved iff the absolute gap
      exceeds twice the floor; source-cluster bootstrap CIs with artifacts as
      clusters; ordinal-safe co-primaries (two-sample KS agreement in
      direction; median-rank and stochastic-dominance robustness). The
      estimator's formal definitions — rung scores D4 = 1 through D1 = 4, the
      per-pair gap, the across-pair floor, the k = 2 resolution criterion,
      and the section-10.1 nested criterion |gap| > k max(operator floor,
      artifact band) — are displayed as equations in the paper, and the
      frozen power computation (.80 power at 45 resolved organizations for a
      half-rung gap at SD 1.0, alpha .017, exact noncentral t) is reproduced
      by the companion power script and displayed as the power-curves figure.
    type: "statistical_analysis"
    inputs: []
    outputs: []
    code_anchor: "PL4 estimator (publishes with the paper per computation-script standard); power_analysis.py (power curves, seed 20260703)"
    reproducibility:
      seed: "fixed seed for bootstrap; run command in script docstring"
      version: "PL0 v1.0 §6"
      runtime_environment: "Python 3.12 + uv"
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "frozen before any reading"
    body_sections: ["Floors and Resolution"]
  - id: M4
    statement: >-
      Stage-1 constructed-ground-truth validation: a planted vignette bank
      (approximately 40-60 synthetic intervention descriptions with depth
      fixed by construction, spanning all rungs, both channel registers, and
      masked/named variants, including matched minimal pairs at the hardest
