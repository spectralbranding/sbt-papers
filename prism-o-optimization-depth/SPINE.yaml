findings:
  - id: F1
    statement: >-
      Stage-1 measurability is a ceiling result: macro depth-classification
      accuracy 1.000 for BOTH Stage-1 pairs on the full 52-unit bank AND on
      the 14 held-out bases (whose answers are not in the prompt), with zero
      malformed outputs and masked = named agreement 1.0 on identical text.
    source_measurements: ["data/pl4_stage1_results.json"]
    generating_method: M4
    statistical_strength: "104 readings; per-rung recall 1.00 at every rung; ceiling effect noted"
    antecedents: [O1, M4]
    falsifier: "any held-out misclassification would have lowered the held-out macro below 1.000"
    provenance:
      created_by: "tool:score_stage1.py"
      created_at: "2026-07-03T00:00:00Z"
    body_sections: ["Stage 1: Constructed Ground Truth"]
  - id: F2
    statement: >-
      Panel resolution is the boundary result: 35 of 40 organizations carried
      at least three pair-complete readings, and 4 of 35 (11 percent) resolved
      at the pre-registered criterion (|gap| > 2 x across-pair floor; median
      floor .584 rung units, swallowing the median absolute gap) — far below
      the minimum-resolved target of 45, so H2 and H3 demote to descriptive
      reporting by the frozen rule. One resolved organization has a
      degenerate floor of .000 (few interventions, identical pair gaps).
    source_measurements: ["data/pl4_stage2_results.json"]
    generating_method: M3
    statistical_strength: "resolution counts are mechanical; k-sweep: 4 resolved at k=1.5, 2 at k=3"
    antecedents: [O2, M3]
    falsifier: "45+ resolved organizations would have licensed confirmatory H2/H3 tests"
    provenance:
      created_by: "tool:estimator_stage2.py (seed 20260703)"
      created_at: "2026-07-03T00:00:00Z"
    body_sections: ["Stage 2: The Organization Panel"]
  - id: F3
    statement: >-
      Descriptive gap structure tilts in the decoupling direction without
      confirming it: all-organization mean gap .176 rung units (median .059;
      20 of 35 positive); the four resolved organizations average .815 (d =
      .754, p = .229 at n = 4), and one resolved organization is NEGATIVE
      (acts deeper than it talks) — the pre-registered heterogeneity case.
    source_measurements: ["data/pl4_stage2_results.json"]
    generating_method: M3
    statistical_strength: "descriptive by rule (F2 demotion); no confirmatory claim"
    antecedents: [F2]
    falsifier: "a negative or zero-centered panel tilt would have reversed the descriptive direction"
    provenance:
      created_by: "tool:estimator_stage2.py (seed 20260703)"
      created_at: "2026-07-03T00:00:00Z"
    body_sections: ["Stage 2: The Organization Panel"]
  - id: F4
    statement: >-
      The pooled depth distributions differ across channels in the decoupling
      direction: two-sample KS D = .158, p < .001, stated deeper — the
      ordinal co-primary agrees in direction with F3 at distribution level.
    source_measurements: ["data/pl4_stage2_results.json"]
    generating_method: M3
    statistical_strength: "pooled over interventions; distribution-level, not org-level inference"
    antecedents: [O2, M3]
    falsifier: "KS direction reversal or p >= .017"
    provenance:
      created_by: "tool:estimator_stage2.py (seed 20260703)"
      created_at: "2026-07-03T00:00:00Z"
    body_sections: ["Stage 2: The Organization Panel"]
  - id: F5
    statement: >-
      The channel-label permutation falsification bar is NOT cleared: the
      observed panel mean .176 lies inside the central .95 permutation
      interval [-.193, .184] (1,000 within-organization label shuffles, seed
      20260703) — panel-level label exchangeability is not rejected.
    source_measurements: ["data/pl4_stage2_results.json"]
    generating_method: M7
    statistical_strength: "pre-registered falsification test; binding"
    antecedents: [O2, M7]
    falsifier: "observed mean outside the interval would have cleared the bar"
    provenance:
      created_by: "tool:estimator_stage2.py (seed 20260703)"
      created_at: "2026-07-03T00:00:00Z"
    body_sections: ["Pre-Registered Hypotheses", "Stage 2: The Organization Panel"]
  - id: F6
    statement: >-
      The negative control is not clean: 9 of 46 within-channel disjoint
      artifact splits pseudo-resolve at the same criterion — within-channel
      artifact heterogeneity is comparable to between-channel differences
      for a fifth of testable organization-channels, so the across-pair
      floor alone under-prices artifact sampling variance.
    source_measurements: ["data/pl4_stage2_results.json"]
    generating_method: M3
    statistical_strength: "mechanical count; control pre-registered to produce ~0"
    antecedents: [O2, M3]
