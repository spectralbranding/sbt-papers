  - id: F10
    statement: >-
      The tie-breaker sensitivity (RC1), executed via the labeled re-read arm
      (every named-arm span re-classified under ties-upward and
      ties-flagged regimes; 4,288 spans each; Stage-1 bank macro .99 and
      1.00), leaves every conclusion unchanged: resolved counts 3-4 across
