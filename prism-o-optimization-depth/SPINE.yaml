      pair-dominant shares (between-pair variance exceeding between-artifact
      in most organization-channels) would have located the instrument's
      noise in operator disagreement rather than artifact heterogeneity
    provenance:
      created_by: "tool:variance_decomposition.py (seed 20260703)"
      created_at: "2026-07-04T00:00:00Z"
    body_sections: ["Stage 2: The Organization Panel"]

# ============================================================================
# Negative findings (from Phase-2 DR; pre-campaign)
# ============================================================================
negative_findings:
  - id: NF1
    statement: >-
      No LLM-read organizational-maturity or optimization-depth instrument
      was found in the target methods literature 2023-2026 — at registry
      depth or in the pre-submission full-text sweep extended to preprint
      servers; existing LLM work covers qualitative-analysis assistance,
      supervised text scoring, measurement-error mitigation, sentence-level
      commitment and greenwashing classifiers, and one maturity-rating proof
      of concept without reliability floors — none an ordered
      intervention-depth ladder read by LLM operators against measured noise
      floors.
    expected_observation: >-
      A published instrument in which AI operators classify organizational
      improvement interventions onto an ordered depth scale against measured
      reliability floors.
    source_method: "Phase-2 DR registry sweep (Crossref, 2026-07-03) + full-text web sweep incl. arXiv/SSRN preprints (2026-07-04; the owed extension, executed)"
    affects_nodes: [P6]
    motivates: [P3]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: >-
        registry-depth sweep 2026-07-03; owed full-text extension EXECUTED
        2026-07-04 — novelty holds; nearest neighbors recorded in changelog
    body_sections: ["Position Among Measurement Approaches"]
  - id: NF2
    statement: >-
      Prior empirical decoupling measurement is construct-specific archival
      design — announced versus executed stock repurchases being the
      canonical case — and the process-maturity tradition measures by
      practitioner self-report; there is no general-purpose, reusable,
      noise-floored instrument for the depth gap between organizational talk
      and reported action.
    expected_observation: >-
      A reusable talk-action depth instrument applicable across intervention
      types without a construct-specific archival design or self-report grid.
    source_method: "Phase-2 DR verification reading (2026-07-03)"
    affects_nodes: [P4, P6]
    motivates: [P3]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "anchors verified via Crossref before spine entry"
    body_sections: ["Position Among Measurement Approaches"]

# ============================================================================
# Derivations
# ============================================================================
derivations:
  - id: D1
    statement: >-
      Because the ladder's rungs are ordered by the dependency chain (P2) and
      each intervention codes at the deepest rung it specifies (P1), the
      signed difference of mean depth rank between channels is a meaningful
      one-dimensional summary of register decoupling — direction carries the
      espoused-versus-enacted interpretation and magnitude carries rung units.
    from: [P1, P2]
    to: P4
    reasoning_type: "deductive"
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Floors and Resolution"]
  - id: D2
    statement: >-
      The downward tie-breaker (unspecified depth codes toward the surface)
      biases the STATED channel toward shallower readings, which shrinks the
      stated-minus-enacted gap; the H2 test under the default rubric is
      therefore conservative, and the three-regime sensitivity (RC1) bounds
      the tie-breaker's contribution.
    from: [P1]
    to: P4
    reasoning_type: "deductive"
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["The Depth-Coding Rubric"]

  - id: D3
    statement: >-
      Source-agnosticism follows from the apparatus's parameterization: the
      panel frame and the channel-to-artifact-class mapping are protocol
      parameters, not commitments, so a disclosed-to-instrument corpus
      (structured intake responses, internal change records, process
      documentation) instantiates the same instrument under the same floors
      and controls. Two guards carry over rather than dissolve: self-reported
      depth claims remain stated-register wherever they appear (the
      process-audit argument), and the scope statement becomes
      per-deployment — the instrument measures the record submitted to it.
      The expected precision gain concentrates on the enacted channel, where
      the campaign's own noise decomposition locates the pathology
      (unspecific spans; within-channel artifact heterogeneity).
    from: [P6, F6, F8]
    to: P6
    reasoning_type: "deductive"
    provenance:
      created_by: author
      created_at: "2026-07-04T00:00:00Z"
    body_sections: ["Discussion"]

# ============================================================================
# Alternative explanations (registered rivals; status open until campaign)
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      A positive stated-enacted gap reflects model priors about famous
      organizations (transformation branding absorbed from training data)
      rather than the artifact text.
    rules_out_required: [RC2]
    ruled_out_by: [F1, F7]
    rules_out_status: "rejected"
    reasoning: >-
      The masked-identity arm re-codes with organization identity removed; if
      the gap survives masking, priors do not carry it. Pre-registered as the
      contamination bound, not assumed away.
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Rivals and Controls"]
  - id: A2
    statement: >-
      A positive gap is an artifact-genre effect: strategy prose is
      linguistically deeper-sounding regardless of substance, and the rubric
      merely detects genre, not decoupling.
    rules_out_required: [M4, RC5]
    ruled_out_by: [F1]
    rules_out_status: "rejected"
    reasoning: >-
      The vignette bank plants both registers with depth fixed by
      construction — if the rubric tracked genre rather than specified depth,
      Stage-1 accuracy would fail on register-crossed vignettes; the
      specified-not-promised test codes unspecified depth language toward the
      surface by design.
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Rivals and Controls"]
  - id: A3
    statement: >-
      Any measured gap is instrument noise: operator disagreement, not
      organizational decoupling.
    rules_out_required: [M3, M5]
    ruled_out_by: [F2]
    rules_out_status: "partially_ruled_out"
    reasoning: >-
      The per-pair resolution criterion makes noise the null: a gap is
      claimed only beyond twice the measured across-pair floor, concordance
      is screened mechanically before reading, and an unresolved gap is
      reported as unresolved under the no-rescue rule.
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Floors and Resolution"]

# ============================================================================
# Robustness checks (all planned; pre-registered in PL0 v1.0)
# ============================================================================
robustness_checks:
  - id: RC1
    statement: >-
      Tie-breaker sensitivity: all hypothesis statistics recomputed under
      downward (default), upward, and ties-excluded regimes; conclusions must
      survive all three or the discrepancy is reported as a limitation.
    varied_parameter: "rubric tie-breaking rule"
    range_explored: "three regimes"
    result_stability: "confirmed"  # EXECUTED via the labeled re-read arm (PL0 v1.2 §10.2); F10: conclusions stable across regimes; median-sign fragility reported
    affects_nodes: [P3, P4]
    source_method: M2
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-registered"
    body_sections: ["Stage 2: The Organization Panel"]
  - id: RC2
    statement: >-
      Masked-identity contamination bound: vignette bank fully, and a Stage-2
      subsample, re-read with organization names and identifying strings
      replaced; the masked-vs-named reading delta is reported as the
      prior-knowledge bound.
    varied_parameter: "organization identity visibility"
    range_explored: "named vs masked"
    result_stability: "confirmed"  # F7: masked-minus-named -.018 (SD .206)
    affects_nodes: [P3, P4, P5, A1]
    source_method: M2
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-registered"
    body_sections: ["Rivals and Controls", "Stage 2: The Organization Panel"]
  - id: RC3
    statement: >-
      Same-organization negative control: disjoint artifact draws from the
      same organization, window, and channel must not produce a gap beyond
      the floor.
    varied_parameter: "artifact draw within channel"
    range_explored: "disjoint splits"
    result_stability: "unstable"  # F6: 9/46 pseudo-resolutions — artifact heterogeneity under-priced by the across-pair floor
    affects_nodes: [P4, AA2]
    source_method: M3
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-registered"
    body_sections: ["Rivals and Controls"]
  - id: RC4
    statement: >-
      Ordinal-safety: mean-rank gap conclusions cross-checked against
      median-rank gap, two-sample KS direction agreement, and first-order
      stochastic dominance.
    varied_parameter: "gap operationalization"
    range_explored: "four statistics"
    result_stability: "partial"  # F3/F4: mean .176 vs median .059 (skew); KS direction agrees
    affects_nodes: [P4]
    source_method: M3
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-registered"
    body_sections: ["Stage 2: The Organization Panel"]
  - id: RC5
    statement: >-
      Channel-label permutation: observed gap must fall outside the .95
      interval of the within-organization label-permutation distribution.
    varied_parameter: "channel labels"
    range_explored: "1,000 permutations"
    result_stability: "confirmed"  # ran as registered; bar NOT cleared (F5) — the test worked, the claim did not
    affects_nodes: [P4, A2, AA2]
    source_method: M7
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-registered"
    body_sections: ["Pre-Registered Hypotheses"]

# ============================================================================
# Limitations
# ============================================================================
limitations:
  - id: L1
    statement: >-
      The enacted channel consists of reports of concrete events, not the
      events themselves; the instrument measures the gap between two
      registers of the public record, and a talk-action reading of that gap
      leans on the verifiability of enacted-channel artifact classes (AA3).
    affects: [P4]
    severity: "medium"
    mitigation: >-
      Enacted-channel classes restricted to filings and executed-change
      reports; matching to accounting outcomes is future work and no
      performance-consequence claim is made.
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Limitations"]
  - id: L2
    statement: >-
      Stage-1 validation generalizes to real artifacts only insofar as the
      constructed vignette bank is distributionally representative of real
      intervention descriptions; representativeness is argued by construction
      (rung x register x minimal-pair coverage), not measured.
    affects: [P3]
    severity: "medium"
    mitigation: >-
      Human-coded real-artifact subsample (M6) supplies convergent validity
      on real text; per-rung accuracy reported so weak rungs are visible.
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Limitations"]
  - id: L3
    statement: >-
      No causal or performance claims: the instrument measures a descriptive
      property of public signals; whether deep optimizers outperform, and
      whether gaps predict reversion, are downstream questions requiring
      outcome data.
    affects: [P2, P4]
    severity: "low"
    mitigation: "Scoped to future work; the depth doctrine (P2) is cited theory here, not a tested causal claim."
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Limitations", "Discussion"]
  - id: L4
    statement: >-
      Confirmatory power holds only at the pre-registered minimum resolved
      panel (45 organizations for a half-rung gap); below it, hypothesis
      claims demote to descriptive reporting by rule.
    affects: [P4, P5]
    severity: "medium"
    mitigation: "Panel sized at 60+ with sibling-campaign exclusion rates priced in; minimum-resolved-N rule frozen in PL0 §7."
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
    body_sections: ["Limitations"]
  - id: L5
    statement: >-
      The pre-registered tie-breaker sensitivity (RC1) was not executable
      within the original design — the downward tie-break binds inside the
      frozen classifier prompt, not in the estimator (a PL0 v1.0 design
      oversight discovered at analysis) — and was EXECUTED via the labeled
      post-campaign re-read arm (PL0 v1.2 §10.2), whose results are F10:
      conclusions stable across all three regimes.
    affects: [P4]
    severity: "low"
    mitigation: >-
      Deferred re-read arm (three-regime prompts on the pinned panel) at any
      future version; the conservativeness argument (D2) bounds the direction
      of the bias meanwhile.
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "post-campaign"
    body_sections: ["Limitations"]

# ============================================================================
# Propositions
# ============================================================================
propositions:
  - id: P1
    statement: >-
      Optimization depth is a well-defined ordinal property of an
      organizational improvement intervention: the rung of the four-rung
      ladder (economic outputs, coordination structure, activity chain,
      delivered value) whose object the intervention specifies a change to,
      decidable by a mechanical rubric.
    type: ontological
    conditions: "C4"
    antecedents: []
    assumptions: []
    falsifier: >-
      If trained coders (human or AI) cannot apply the rubric consistently to
      constructed cases with depth fixed by construction — Stage-1 accuracy
      below the pre-registered threshold with disagreement spread across
      rungs rather than localized — depth is not rubric-decidable as defined.
    evidence:
      - type: citation
        anchor: >-
          Rungs ground in the published organizational tier stack: delivered
          value, activity chain, and coordination structure are the
          operational tiers; economics is the stack's output surface, and
          coordination structure exists because activity chains do not
          self-coordinate.
        citation_keys:
          [
            zharnikov-2026-dual-hierarchies-organizational-transferability-six,
            zharnikov-2026-organizational-schema-theory-test-driven,
          ]
        citation_role: definitional_source
      - type: citation
        anchor: >-
          The structure rung and the intervention-as-coded-element draw on
          canonical accounts of coordination structure and of routines as the
          unit of organizational activity.
        citation_keys:
          [
            mintzberg-1979-structuring-organizations-synthesis,
            pentland-2005-organizational-routines-as,
          ]
        citation_role: definitional_source
    body_sections: ["The Depth Ladder"]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"
  - id: P2
    statement: >-
      The ladder's order is a dependency chain: interventions at a deeper
      rung cascade outward to shallower rungs, while surface interventions
      leave the deeper specification unchanged and tend to revert — the
      durable-change locus is the process and product rungs.
    type: ontological
    conditions: "C4"
    antecedents: [P1]
    assumptions: []
    falsifier: >-
      Systematic evidence of durable economic improvement from pure D4
      interventions absent any deeper respecification, or of D1/D2
      interventions failing to propagate outward at rates comparable to D4
      reversion, would break the asymmetry.
    evidence:
      - type: citation
        anchor: >-
          The deep-intervention doctrine: process redesign over output
          manipulation; waste eliminated by respecifying activity chains, not
          by accelerating them; structure mirrors the process topology it
          coordinates, so structure-only change reverts.
        citation_keys:
          [
            hammer-1993-reengineering-corporation-manifesto,
            ohno-1988-toyota-production-system,
            womack-1996-lean-thinking-banish,
            conway-1968-how-do-committees,
          ]
        citation_role: theoretical_predecessor
    body_sections: ["The Depth Ladder"]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "cited theory; not causally tested in this paper (L3)"
  - id: P3
    statement: >-
      Optimization depth is machine-readable: AI operators under the frozen
      rubric recover constructed ground truth at or above the pre-registered
      accuracy threshold and resolve real organizations' depth readings
      beyond the operator floor.
    type: measurement_result
    conditions: "C1, C3, C5"
    antecedents: [P1]
    assumptions: [AA1, AA4]
    falsifier: >-
      Stage-1 macro accuracy below .80, or a majority of panel organizations
      unresolved at the per-pair criterion — either publishes as the measured
      capability bound and withdraws the instrument claim.
    evidence:
      - type: empirical
        anchor: >-
          RESOLVED PARTIALLY (FORK 2026-07-03): H1(i) supported at ceiling
          (F1: macro accuracy 1.000 full-bank AND held-out, both pairs);
          H1(ii) FAILS the majority criterion (F2: 4 of 35 resolve) — depth
          is machine-readable on constructed texts while per-organization
          gap resolution on real filings is floor-limited.
    body_sections: ["Stage 1: Constructed Ground Truth", "Stage 2: The Organization Panel"]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "H1(i) ceiling on constructed bank; H1(ii) boundary result (F2)"
  - id: P4
    statement: >-
      The stated channel reads systematically deeper than the enacted
      channel: organizations' strategy prose claims deeper optimization than
      their reported interventions specify, and the signed gap clears the
      operator floor at panel level.
    type: empirical_finding
    conditions: "C1, C2, C3, C5"
    antecedents: [P1, P2]
    assumptions: [AA2, AA3]
    ruled_out_rivals: []
    falsifier: >-
      A panel-level gap unresolved against the floor, centered at zero under
      permutation, or negative — each is a committed publishable outcome; a
      floored null reads as measured consistency of public organizational
      communication.
    evidence:
      - type: citation
        anchor: >-
          Direction predicted by the decoupling tradition (formal claims
          decouple from operational practice) and the espoused-versus-in-use
          asymmetry; the canonical archival measurement found announced
          programs systematically unexecuted.
        citation_keys: [meyer-1977-institutionalized-organizations-formal, argyris-1978-organizational-learning-theory]
        citation_role: theoretical_predecessor
      - type: empirical
        anchor: >-
          DEMOTED TO DESCRIPTIVE by the frozen minimum-resolved rule (F2: 4
          resolved < 45): the descriptive tilt agrees with the pre-registered
          direction (F3: mean .176, 20/35 positive; F4: pooled KS
          stated-deeper, p < .001) but the permutation falsification bar is
          not cleared (F5) — no confirmatory decoupling claim is made.
    body_sections: ["Floors and Resolution", "Stage 2: The Organization Panel"]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "descriptive by rule; committed-null pattern honored"
  - id: P5
    statement: >-
      The stated-actual gap is a property of the organization's public
      signal, not of the measuring model family: across cross-family operator
      pairs, per-organization gap dispersion stays within the operator floor
      for resolved organizations.
    type: measurement_result
    conditions: "C5"
    antecedents: [P3]
    assumptions: [AA4]
    falsifier: >-
      Family-dependent gaps (across-family dispersion exceeding the floor)
      falsify signal-attribution; the finding then demotes to a
      family-conditional reading under the no-rescue rule.
    evidence:
      - type: empirical
        anchor: >-
          DESCRIPTIVE ONLY (demoted with H2 per F2): all 4 resolved
          organizations pass the leave-one-out family-dispersion check —
          consistent with signal attribution at a sample too small to claim
          it.
    body_sections: ["Stage 2: The Organization Panel"]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "descriptive by rule"
  - id: P6
    statement: >-
      The instrument-family scaffold and its metrological discipline
      (pre-registration, operator noise floors, per-pair resolution,
      cross-family operators, mechanical concordance screening, committed
      nulls) transfer unchanged from observer-side perception constructs to a
      producer-side organizational construct, crossing the producer-observer
      seam at the rendered artifact.
    type: rendering_equivalence
    conditions: "C1"
    antecedents: [P1]
    assumptions: []
    falsifier: >-
      If the producer-side construct had required new floor machinery, new
      resolution logic, or a new scaffold layer beyond domain-specific
      prompts and rubric, the domain-neutrality claim would fail; NF1/NF2
      locate what is genuinely new (the construct and rubric), and the
      apparatus diff against the sibling instruments is the check.
    evidence:
      - type: citation
        anchor: >-
          The scaffold's domain-neutrality claim; the seam map licensing
          producer-side reading through rendered public artifacts; the
          observability limit that scopes the reading to the public signal;
          organizational configurations observationally equivalent from
          outside — the stated channel can be metameric exactly where the
          enacted channel resolves.
        citation_keys:
          [
            zharnikov-2026as-prism-structured-measurement,
            zharnikov-2026bc-producer-observer-seam,
            zharnikov-2026-specification-impossibility-organizational-design-high,
            zharnikov-2026-organizational-metamerism-when-distinct-configurations,
          ]
        citation_role: theoretical_predecessor
      - type: self_application
        anchor: >-
          The paper itself is the transfer: PL0-PL4 instantiated for the
          organizational construct with only PL2 prompts, the rubric, and the
          panel design new.
    body_sections: ["Position Among Measurement Approaches", "Discussion"]
    provenance:
      created_by: author
      created_at: "2026-07-03T00:00:00Z"
      under_conditions: "pre-campaign spine lock"

