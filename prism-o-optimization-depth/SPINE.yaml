    provenance:
      created_by: "tool:estimator_stage2.py (seed 20260703)"
      created_at: "2026-07-03T00:00:00Z"
    body_sections: ["Rivals and Controls", "Stage 2: The Organization Panel"]
  - id: F7
    statement: >-
      The prior-knowledge contamination bound is empty at the mean: masked
      minus named gap = -.018 rung units (SD .206, 13 evaluable
      organizations) — organization identity moves readings by essentially
