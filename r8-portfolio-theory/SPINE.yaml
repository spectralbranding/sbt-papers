    spine_nodes: [P1, P2, P5, P6]
    note: >-
      Spectral Brand Theory (Zharnikov 2026a) supplies the whole foundation —
      brands as eight-dimension emitters, observer spectral profiles, perception
      clouds, the five single-brand coherence types, and the conviction
      asymmetry — which this paper extends from single-brand to portfolio level.
  - paper_key: 2026d
    relationship: applies
    spine_nodes: [P2, P4]
    note: >-
      Brand-space geometry (Zharnikov 2026d) supplies the metric structure
      underlying the spectral-distance / weighted-ell1 interference calculations.
  - paper_key: 2026e
    relationship: applies
    spine_nodes: [P6, F2]
    note: >-
      Metamerism / projection bounds (Zharnikov 2026e) explain why portfolio
      contradictions are invisible to scalar brand-health metrics, and ground
      the observer-spectral-resolution limitation.
  - paper_key: 2026f
    relationship: applies
    spine_nodes: [C1, P2]
    note: >-
      Cohort-boundary concentration analysis (Zharnikov 2026f) formalizes the
      cohort-overlap conditions that gate interference.
  - paper_key: 2026g
    relationship: extends
    spine_nodes: [P9, PF7, m_capacity_bounds]
    note: >-
      Sphere-packing positioning capacity (Zharnikov 2026g) provides the market
      positioning-capacity ceiling and E_8 kissing number that portfolio
      capacity cannot exceed; this paper extends those bounds to the multi-brand
      interference-constrained case. Category interference is referred there.
  - paper_key: 2026j
    relationship: applies
    spine_nodes: [P2, L3]
    note: >-
      Non-ergodic diffusion dynamics (Zharnikov 2026j) underpin the conviction
      formation function and provide the foundation for the deferred dynamic-
      interference extension.
  - paper_key: 2026o
    relationship: applies
    spine_nodes: [L3]
    note: >-
      The non-ergodic framework (Zharnikov 2026o) explains why interference
      effects compound over time rather than averaging out — the basis for
      modeling dynamic interference.
  - paper_key: 2026p
    relationship: applies
    spine_nodes: [P7, F1]
    note: >-
      The longitudinal Dove decomposition (Zharnikov 2026p) supplies the primary
      empirical illustration: the Dove 2023 emission profile, the Purpose-Aligned
      and Skeptic-Critic cohorts, and the formalization of the Dove-Axe
      contradiction as spectral interference on the Ideological dimension.

