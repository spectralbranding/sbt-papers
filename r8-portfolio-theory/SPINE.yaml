spine_version: "0.2"
spine_doc_version: "0.1.0"
provenance: retrofit
paper_key: "2026q"
title: >-
  Spectral Portfolio Theory: Interference, Coherence, and Capacity in
  Multi-Brand Perception Space
target_venue_primary: "TBD (brand portfolio / strategy theory venue)"
status: >-
  Retrofit spine extracted 2026-06-18 from completed paper.md (Working Paper
  v1.2.0, March 2026, revised June 2026; status superseded). Faithful
  description of the paper as written; no new claims introduced.

thesis: |
  Brand portfolio theory classifies portfolios by ARCHITECTURE (monolithic,
  endorsed, house-of-brands) but never formalizes how brands within one
  portfolio INTERACT in the observer's perception space. Within Spectral
  Brand Theory — brands as emitters across eight typed dimensions perceived by
  heterogeneous observer cohorts — this paper formalizes spectral
  interference: signals from one portfolio brand perturbing the perception
  cloud of a sibling within shared cohorts. Constructive interference (signals
  compatible, same-sign deviation from category mean) reinforces mutual
  perception; destructive interference (contradictory, opposite-sign) undermines
  it. Interference is gated by a parent-brand recognition (awareness) gate
  alpha, scales linearly with alpha and with the cohort's dimensional weight,
  is bounded by cohort overlap and spectral proximity on high-weight
  dimensions, and is generally asymmetric. Single-brand coherence is extended
  to a three-layer portfolio coherence metric (within-brand, cross-brand,
  aggregate), cross-brand coherence being cohort-dependent. Four interference
  archetypes are identified — spectral cluster (LVMH), spectral spread (P&G),
  spectral contradiction (Unilever), spectral layering (Toyota/Lexus) — and a
  portfolio capacity bound (tighter than positioning capacity) follows. Seven
  testable propositions are derived. The central demonstration is that
  architecturally identical portfolios (LVMH and Unilever are both
  house-of-brands) produce structurally opposite interference dynamics, which
  architectural taxonomy cannot capture. The framework gives a formal basis
  for acquisition evaluation, portfolio rationalization, and cross-brand risk
  assessment. All emission profiles and coherence/interference numbers are
  assessed cohort-mean estimates illustrating model mechanics, not empirically
  measured; empirical validation is the priority next step.

# ============================================================================
# Boundary conditions — the modeling assumptions under which the results hold
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      Cohort overlap is the precondition for interference: if two brands share
      no observer cohort with non-trivial perception clouds for both
      (O(B_i,B_j) = 0), no interference can occur regardless of spectral
      profiles. This is the perceptual mechanism behind the house-of-brands
      architecture (minimize shared cohorts to reduce interference).
    observable: "Proportion of a cohort holding formed perception clouds for both brands above threshold tau."
    excludes: "Brand pairs with disjoint observer cohorts (e.g. spectral-spread P&G pairs)."
    provenance:
      created_by: "author"
      created_at: "2026-03"
  - id: C2
    statement: >-
      Awareness of shared parentage is a cognitive precondition: interference
      requires the observer to recognize that the two brands share a parent
      entity (awareness gate alpha > 0, effectively alpha > alpha_min). Below
      the awareness threshold the brands are independent objects in perception
      space and interference is effectively zero; alpha_min is to be estimated
      empirically, not derived.
    observable: "Observed parent-brand recognition level alpha per cohort, from controlled disclosure experiments."
    excludes: "Category interference (market-level spectral proximity without ownership awareness) — a distinct phenomenon."
    provenance:
      created_by: "author"
      created_at: "2026-03"
  - id: C3
    statement: >-
      Emission profiles are cohort-mean estimates, not per-observer or
      objectively measured signals: e_B(t) models the brand's communication
      OUTPUT, and the mapping to perception is observer-dependent. The worked
      examples use illustrative assessed cohort-mean profiles; empirical
      implementation would require spectral-profile instruments applied to
      representative observer samples.
    observable: "Cohort-mean spectral profile measured by a validated instrument on a representative sample."
    excludes: "Treating the illustrative emission/coherence numbers as empirically measured rather than assessed estimates."
    provenance:
      created_by: "author"
      created_at: "2026-03"

# ============================================================================
# Methods — the closed-form computation behind every cited illustrative number
# ============================================================================
methods:
  - id: M1
    statement: >-
      Closed-form spectral-interference + portfolio-coherence computation:
      the per-dimension interference I_d = alpha · w_d · (e_d^{Bj} - mu_d)
      (Definition 5), the weighted-ell1 total interference and its triangle-
      inequality bound (Definition 8, Theorem 1), the constructive/destructive
      sign test (Definitions 6-7), the three-layer coherence metric kappa_W /
      kappa_X / kappa_P (Definitions 9-11), and the portfolio-capacity /
      interference-budget constructs (Definitions 12-13). Inputs are assessed
      cohort-mean emission profiles, cohort weight vectors, a category-relative
      mean, and an awareness gate; outputs are the worked interference values
      and pairwise coherence tables. Deterministic arithmetic, no RNG.
    type: "closed_form_computation"
    inputs: ["assessed cohort-mean emission profiles (Tables 2-4)", "cohort weight vectors w (§8.5)", "category mean mu", "awareness gate alpha"]
    outputs: ["§8.5 worked interference values", "Tables 5-7 pairwise cross-brand coherence", "Table 8 structural comparison"]
    code_anchor: "https://github.com/spectralbranding/sbt-framework (SBT computational pipeline; §Data Availability)"
    reproducibility:
      seed: "deterministic (no RNG; closed-form arithmetic on assessed estimates)"
      runtime_environment: "SBT framework toolkit"
    provenance:
      created_by: "author"
      created_at: "2026-03"

