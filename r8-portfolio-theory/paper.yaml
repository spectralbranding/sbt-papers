results:
  - claim_id: "P1"
    status: not_tested
    notes: >
      Formally derived from definitions D1-D3. Illustrated through Unilever case (all
      three conditions hold for Purpose-Aligned cohort regarding Dove-Axe relationship).
      No controlled empirical test conducted.

  - claim_id: "P2"
    status: not_tested
    notes: >
      Formally derived from D3. Illustrated through LVMH (same-sign luxury deviations
      produce constructive interference) vs. Unilever (opposite-sign Ideological
      deviations produce destructive interference). Directional predictions have not
      been tested against measured perception cloud perturbations.

  - claim_id: "P3"
    status: supported
    notes: >
      Illustrated through Table 6 (Dove-Axe cross-brand coherence = 0.15 for Purpose-
      Aligned cohort) vs. Table 7 (Dove-Axe coherence = 0.75 for Product-Pragmatist
      cohort). Coherence values are computed from estimated emission profiles, not
      measured from representative observer samples.

  - claim_id: "P4"
    status: not_tested
    notes: >
      Corollary (Shielding Theorem) derived formally. Unilever awareness gate dynamics
      documented qualitatively through journalism, social media, and Murray (2013). No
      experimental test of the threshold effect or linear scaling above threshold.

  - claim_id: "P5"
    status: not_tested
    notes: >
      Formally derived from coherence-type asymmetry in perception cloud variance.
      Not tested empirically. Prediction: Dove (higher coherence) suffers greater
      proportional perturbation from Axe (lower coherence) than vice versa.

  - claim_id: "P6"
    status: not_tested
    notes: >
      Illustrated through LVMH Fashion & Leather Goods cluster. Superlinear compounding
      mechanism described through awareness gate positive feedback loop. No empirical
      test of superlinearity vs. linearity in conviction strength vs. cluster size.

  - claim_id: "P7"
    status: not_tested
    notes: >
      P&G 2014 divestiture (170 to 65 brands) cited as candidate test case. Prediction
      that divested brands were high-interference has not been verified against actual
      interference computations for the pre-divestiture P&G portfolio.

limitations:
  - description: >
      The spectral interference model has not been empirically tested through controlled
      measurement. Emission profiles and coherence scores in case analyses are assessed
      estimates from public sources, not values measured via spectral profile
      instrumentation. Precision of computed coherence scores reflects internal
      arithmetic, not empirical measurement accuracy.
    severity: major
    addressable: true

  - description: >
      The interference model operates at a point in time. Dynamic interference —
      how interference effects evolve as awareness gates shift, emission profiles change,
      and cohort compositions evolve — is not formally modeled. Integration with the
      non-ergodic dynamics of Zharnikov (2026o) is a required extension.
    severity: major
    addressable: true

  - description: >
      Observer spectral resolution is assumed sufficient to distinguish dimensional
      signals. In practice, some observers compress perception to 2-3 salient dimensions
      (Zharnikov 2026e). Interaction between observer spectral resolution and
      interference susceptibility is not modeled.
    severity: moderate
    addressable: true

  - description: >
      Emission profiles and coherence assessments are based on perceptual patterns from
      Western academic literature. Cross-cultural variation in dimensional salience,
      cohort structure, and awareness gate dynamics may produce structurally different
      interference profiles in non-Western markets.
    severity: moderate
    addressable: true

