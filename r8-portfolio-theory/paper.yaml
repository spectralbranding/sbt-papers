- claim_id: PF2
  criterion: Holds if (Proposition 2, Interference Direction Predictability) The constructive-vs- destructive
    direction of interference on a dimension is determined by sign concordance of the brands' deviations
    from the category mean, and is predictable from emission profiles alone without measuring the interference
    effect.
  falsification: Falsified if the sign-concordance-predicted direction matches observed perception-cloud
    perturbation direction in no more than 50% of cases.
- claim_id: PF3
  criterion: Holds if (Proposition 3, Cohort-Dependent Portfolio Coherence) The same portfolio can be
    simultaneously coherent for one cohort (kappa_P > spectral-alignment threshold) and contradictory
    for another (kappa_P < spectral-contradiction threshold), because kappa_X depends on the cohort weight
    vector and SBT permits arbitrary weight vectors.
  falsification: Falsified if cohorts identified by distinct spectral weight vectors return statistically
    indistinguishable portfolio-coherence assessments of a portfolio known to contain dimensional contradictions.
- claim_id: PF4
  criterion: 'Holds if (Proposition 4, Awareness Gate Moderation + Shielding Theorem corollary) Interference
    magnitude is moderated by alpha: below alpha_min, contradictions produce no interference regardless
    of their magnitude; above threshold, destructive interference increases monotonically (indeed linearly)
    with alpha.'
  falsification: Falsified if perception-cloud perturbation under varying ownership disclosure does not
    transition from negligible (below threshold) to increasing (above threshold) as alpha rises.
- claim_id: PF5
  criterion: Holds if (Proposition 5, Interference Asymmetry) Interference is asymmetric, and specifically
    the higher-single-brand-coherence brand suffers greater relative perturbation from a lower-coherence
    sibling than vice versa, because a tight (high-coherence) perception cloud is proportionally more
    sensitive to a given perturbation than a diffuse (incoherent) cloud.
  falsification: Falsified if, upon disclosure of a sibling relationship, the higher-coherence brand does
    not exhibit a larger proportional increase in cloud dispersion than the lower-coherence brand.
- claim_id: PF6
  criterion: 'Holds if (Proposition 6, Constructive Interference Compounding) In a spectral cluster, constructive
    interference compounds across pairs: each additional compatible brand reinforces every existing brand,
    and because each new compatible brand raises the observer''s conviction that the parent curates the
    category (raising the awareness gate for future acquisitions), the total constructive interference
    scales SUPERLINEARLY with cluster size up to a saturation point set by the cluster''s spectral density.'
  falsification: Falsified if conviction strength for a brand presented in progressively larger compatible
    clusters does not increase superlinearly up to saturation.
- claim_id: PF7
  criterion: 'Holds if (Proposition 7, Portfolio Capacity Constraint) The maximum number of brands a portfolio
    can sustain without exceeding any brand''s interference budget in any shared cohort is constrained
    by spectral structure: for a cluster, capacity is bounded by local packing density over the minimum
    inter-brand distance for constructive interference; for a contradiction portfolio, each additional
    brand on a contested dimension reduces the effective capacity of all existing brands sharing that
    dimension.'
  falsification: Falsified if brands divested in portfolio rationalizations (e.g. P&G's 2014 cut from
    170 to 65 brands) are not disproportionately those that generated the highest destructive interference
    in the remaining portfolio.
