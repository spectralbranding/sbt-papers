- id: P5
  type: proposition
  statement: 'Spectral interference is generally asymmetric: I(B_i<-B_j) != I(B_j<-B_i), because the perturbation
    depends on the focal brand''s existing position relative to the observer''s conviction, not only the
    interfering signal. A premium brand contaminated by a mass-market sibling suffers more than the mass-market
    brand gains, connecting to the negative-faster / more-resistant conviction asymmetry of SBT.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
