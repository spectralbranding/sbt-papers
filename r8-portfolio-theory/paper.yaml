- id: P6
  type: proposition
  statement: 'Portfolio coherence extends single-brand SBT coherence to three layers: within-brand coherence
    kappa_W (the standard SBT coherence type, scored 5..1), cross-brand coherence kappa_X (the cohort-weighted
    fraction of constructive dimensions for a pair, in [0,1]), and aggregate portfolio coherence kappa_P
    (within-brand coherence weighted by cohort-overlap- weighted mean cross-brand coherence). A portfolio
    has emergent coherence beyond the sum of individually coherent brands.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
