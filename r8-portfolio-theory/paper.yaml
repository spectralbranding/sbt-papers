limitations:
- description: The model has not been empirically tested through controlled measurement. All emission
    profiles and coherence/interference numbers are assessed estimates (from public communications, advertising
    content, academic perception studies), not values measured by spectral-profile instrumentation on
    observer samples; the precision of computed scores (e.g. kappa_X = .92) reflects the model's internal
    arithmetic on those estimates, not measurement accuracy. The propositions are testable in principle
    but the tests have not been conducted.
  severity: moderate
  addressable: true
- description: alpha_min (the awareness threshold below which interference is zero) is a parameter to
    be estimated empirically, not derived theoretically; the illustrative computations set it to a plausible
    lower bound and the propositions remain testable only conditional on alpha_min estimation as a preliminary
    calibration step. Observer spectral resolution also varies and its interaction with interference susceptibility
    is unmodeled.
  severity: moderate
  addressable: true
- description: 'Scope limits: profiles/assessments rest on Western academic literature (cultural variation
    in cohort structure, dimensional salience, and awareness dynamics is unmodeled); the model is static
    (point-in-time), whereas interference dynamics evolve as awareness gates, emission profiles, and cohort
    compositions change; the Dove-Axe profiles reflect the historic peak contradiction (Axe repositioned
    since ~2016, narrowing the gap); and digital-native platform portfolios (high alpha, algorithmic/implicit
    awareness) are a distinct archetype the framework does not yet cover.'
  severity: moderate
  addressable: true
