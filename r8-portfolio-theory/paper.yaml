meta:
  title: 'Spectral Portfolio Theory: Interference, Coherence, and Capacity in Multi-Brand Perception Space'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19145099
  date: '2026-03-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand portfolio
  - spectral interference
  - constructive interference
  - destructive interference
  - portfolio coherence
  - observer cohorts
  - multi-dimensional brand perception
  abstract: Brand portfolio theory classifies portfolios by architecture — monolithic, endorsed, house-of-brands
    — but does not formalize how brands within the same portfolio interact in the observer's perception
    space. This paper develops spectral portfolio theory within Spectral Brand Theory (SBT), which models
    brands as emitters across eight typed dimensions perceived by heterogeneous observer cohorts. *Spectral
    interference* — signals from one brand perturbing the perception cloud of another within shared cohorts
    — is formalized, distinguishing *constructive interference* (compatible signals reinforcing mutual
    perception) from *destructive interference* (contradictory signals undermining it). Interference magnitude
    is bounded by cohort overlap and spectral proximity on high-weight dimensions, modulated by a parent-brand
    recognition gate. Single-brand coherence is extended to portfolio-level coherence through a three-layer
    metric (within-brand, cross-brand, and aggregate). Four portfolio archetypes are identified — spectral
    cluster (LVMH), spectral spread (Procter & Gamble), spectral contradiction (Unilever), and spectral
    layering (Toyota/Lexus). A comparative analysis of LVMH and Unilever demonstrates that architecturally
    identical portfolios produce structurally opposite interference dynamics. Seven formal propositions
    are derived. The framework provides a formal basis for acquisition evaluation, portfolio rationalization,
    and cross-brand risk assessment that existing taxonomies cannot support.
claims:
- id: P1
  type: proposition
  statement: A brand portfolio is a set of brands under common ownership, each with an eight-dimensional
    emission profile; portfolio theory's architectural taxonomy (branded house / endorsed / house-of-brands)
    describes organizational form but not the perceptual relationship between brands as processed by observers.
    Architecture is how brands are structured by the firm; interference is how they interact in the mind.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: 'Spectral interference is the perturbation to cohort C_k''s perception cloud for brand B_i
    caused by awareness of sibling B_j''s signals: per dimension d, I_d = alpha_{C_k} · w_d^{(C_k)} ·
    (e_d^{Bj} - mu_d). Interference operates dimension-by-dimension — a brand may interfere constructively
    on one dimension and destructively on another — and the net effect depends on the observing cohort''s
    spectral weights.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'Interference direction is fixed by sign concordance of the two brands'' deviations from
    the category mean on a dimension: same-sign deviation = constructive (sibling reinforces the focal
    brand), opposite-sign = destructive (sibling undermines it). Direction is therefore computable ex
    ante from emission profiles and the category mean alone.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
- id: P4
  type: proposition
  statement: '(Theorem 1, Interference bound) The absolute total interference is bounded by |I|(B_i<-B_j,C_k)
    <= alpha_{C_k} · d_max · max_d w_d^{(C_k)} via the triangle inequality on the weighted ell1 distance,
    revealing three levers for managing interference: reduce awareness (house-of-brands), reduce spectral
    distance on critical dimensions (coherence), or reduce cohort overlap (different observer populations).
    Interference is significant when it exceeds the cohort''s perception-cloud dispersion sigma_{C_k}.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
