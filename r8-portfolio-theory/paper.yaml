# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026q): Spectral Portfolio Theory
spec_version: "0.1.0"

meta:
  title: "Spectral Portfolio Theory: Interference, Coherence, and Capacity in Multi-Brand Perception Space"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19145099"
  date: "2026-01-01"
  version: "1.0"
  venue: "Working Paper (Zenodo)"
  license: "CC-BY-4.0"
  keywords:
    - brand portfolio
