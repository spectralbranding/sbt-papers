- id: P7
  type: proposition
  statement: 'Cross-brand coherence is cohort-dependent: the same brand pair may be coherent for a cohort
    that weights dimensions where the brands agree and contradictory for a cohort that weights a dimension
    where they contradict. Five portfolio coherence types follow (spectral resonance P_{A+}, alignment
    P_{A-}, independence P_{B+}, tension P_{B-}, contradiction P_{C-}), classified by kappa_X thresholds
