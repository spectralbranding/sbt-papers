methodology:
  type: mixed
  design: 'Closed-form spectral-interference + portfolio-coherence computation: the per-dimension interference
    I_d = alpha · w_d · (e_d^{Bj} - mu_d) (Definition 5), the weighted-ell1 total interference and its
    triangle- inequality bound (Definition 8, Theorem 1), the constructive/destructive sign test (Definitions
    6-7), the three-layer coherence metric kappa_W / kappa_X / kappa_P (Definitions 9-11), and the portfolio-capacity
    / interference-budget constructs (Definitions 12-13). Inputs are assessed cohort-mean emission profiles,
    cohort weight vectors, a category-relative mean, and an awareness gate; outputs are the worked interference
    values and pairwise coherence tables. Deterministic arithmetic, no RNG.'
  analysis:
    software: https://github.com/spectralbranding/sbt-framework (SBT computational pipeline; §Data Availability)
    method: SBT framework toolkit
acceptance:
- claim_id: PF1
  criterion: 'Holds if (Proposition 1, Interference Conditionality) Spectral interference between B_i
    and B_j operates iff three conditions hold simultaneously: (a) they share at least one cohort (O>0),
    (b) the awareness gate exceeds threshold (alpha_{C_k} > alpha_min), and (c) their profiles differ
