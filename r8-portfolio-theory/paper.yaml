- id: P8
  type: proposition
  statement: 'The interaction of spectral proximity and cohort overlap yields four structurally distinct
    portfolio archetypes — spectral cluster (proximate profiles, high overlap, constructive: LVMH), spectral
    spread (distant profiles, minimal overlap, negligible interference: P&G), spectral contradiction (proximate
    enough to share cohorts but contradictory on high-weight dimensions: Unilever), spectral layering
