meta:
  title: Why Eight? Completeness and Necessity of the SBT Dimensional Taxonomy
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19207599
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - dimensional taxonomy
  - brand perception
  - completeness argument
  - independence proof
  - multi-dimensional scaling
  - meaning channels
  - Spectral Brand Theory
  abstract: 'How many distinct channels transmit meaning from brands to consumers? Extant frameworks diverge
    widely -- five personality dimensions [@aaker-1997-dimensions-brand-personality], six prism facets
    [@kapferer-2008-new-strategic-brand], two-to-three MDS solutions -- yet none provides theoretical
    justification for its chosen dimensionality. This paper derives an eight-dimensional taxonomy from
    first principles. Brand perception occurs through eight independent meaning channels -- semiotic,
    narrative, ideological, experiential, social, economic, cultural, and temporal -- each rooted in a
    distinct academic tradition. Independence is demonstrated through counter-example brand pairs differing
    on one channel while matched on the others; non-redundancy follows because removing any channel collapses
    discriminative power for at least one pair. Completeness is shown by reducing five proposed ninth
    dimensions to combinations of existing channels. The apparent conflict with low-dimensional MDS solutions
    is resolved via concentration-of-measure mathematics: low-dimensional projections capture most variance
    while losing the profile-shape information that distinguishes coherence types. Robustness checks using
    synthetic observers confirm that each dimension carries non-trivial variance (5-19%) and rank stability
    deteriorates below eight dimensions. The taxonomy integrates prior meaning frameworks while satisfying
    psychometric criteria for theoretical derivation [@borsboom-2003-theoretical-status-latent; @rossiter-2002-coarse-procedure-scale],
    offering consumer researchers a coordinate system for studying meaning transfer, cultural branding,
    and perceptual coherence.'
claims:
- id: P1
  type: proposition
  statement: 'The dimension-selection problem is real and consequential: existing brand frameworks disagree
    on dimensionality (Aaker 5, Kapferer 6, De Chernatony 11, MDS 2–3) with no theoretical justification
    for the count, and choosing the wrong dimensionality is a structural error that propagates through
    every downstream analysis.'
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: Two routes to justifying dimensionality exist — empirical discovery (factor analysis, bounded
    by the input items measured) and theoretical derivation (arguing channels from established theory,
    bounded by inventory completeness). SBT takes theoretical derivation because factor analysis cannot
    identify a construct domain from within; it only recovers structure the researcher placed into the
    item set.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'A meaning channel is a pathway through which a brand''s emissions are interpreted by an
    observer to form a component of perception; observers inevitably interpret brand emissions through
    ALL available meaning-processing systems regardless of brand intent (the three-cone analogy). A channel
    qualifies as a distinct dimension iff it satisfies three criteria: (a) it is the subject of an established
    academic tradition, (b) brands emit signals processed through it, and (c) it does not reduce to another
    channel.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P2
- id: P4
  type: proposition
  statement: 'Eight meaning channels satisfy all three criteria, each rooted in a distinct tradition:
    Semiotic (semiotics), Narrative (narratology), Ideological (ideology critique), Experiential (experience
    economy / phenomenology), Social (social identity theory), Economic (signaling theory), Cultural (cultural
    sociology), Temporal (temporal psychology).'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P3
- id: P5
  type: proposition
  statement: Dimensions are MEANING CHANNELS (the bandwidth at which signal travels between brand and
    observer), NOT perceptual FACTORS (how the signal is internally processed). Brakus et al.'s four experiential
    sub-dimensions, and the self-congruence/group-signaling split within the social channel, are internal
    modalities of a single channel — analogous to red/green/blue cone responses within one visual channel
    — not separate channels.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P3
- id: P6
  type: proposition
  statement: 'The eight channels are INDEPENDENT: for each dimension there exists a counter-example brand
    pair differing primarily on that dimension while approximately matched on the other seven (Apple/Samsung
    semiotic; Patagonia/North Face narrative; Chick-fil-A/Popeyes ideological; Ritz-Carlton/Four Seasons
    experiential; Supreme/Carhartt social; Costco/Sam''s Club economic; Uniqlo/H&M cultural; Hermès/Gucci
    temporal). The examples are illustrative judgments, not measured spectral profiles; strict psychometric
    independence is deferred to future observer-rated work.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P4
- id: P7
  type: proposition
  statement: '(Proposition 1, Dimensional Non-Redundancy) For each dimension d_i there exists a brand
    pair distinguishable in the 8D taxonomy but indistinguishable in the 7D taxonomy obtained by removing
    d_i: the witness pair''s Euclidean distance is dominated by the d_i component, so removing d_i collapses
    the distance to approximately zero. Each dimension is therefore necessary. (Conditional on the §3
    pairs being approximately matched off-focus.)'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P6
- id: P8
  type: proposition
  statement: '(Proposition 2, Minimal Completeness) No proper subset of the eight dimensions covers all
    established meaning-transmission channels: the one-tradition-to-one-channel mapping is injective,
    so removing any dimension leaves the meaning channel of its tradition uncovered (e.g. removing Temporal
    loses heritage/nostalgia/future-orientation as perception components).'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P4
- id: P9
  type: proposition
  statement: (Completeness via the candidate-ninth-dimension test) Five candidate ninth dimensions — aesthetic,
    functional, ethical, digital, environmental — each reduce to combinations of existing channels (aesthetic→semiotic+cultural;
    functional→experiential+economic+narrative; ethical→ideological; digital→a medium re-routing existing
    channels; environmental→a content domain processed through ideological+narrative+experiential+economic).
    None survives the reduction test, so the eight channels are complete.
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P8
- id: P10
  type: proposition
  statement: 'The MEANING-CHANNEL versus CONTENT-DOMAIN distinction is the principled stopping rule: channels
    are transmission pathways (rows); content domains are semantic fields a brand may address (columns);
    any content domain travels through multiple channels and no content domain is itself a channel. Confusing
    the two is the most common source of dimension- counting errors and is what prevents indefinite dimensional
    inflation.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P9
- id: P11
  type: proposition
  statement: 'The eight-dimensional taxonomy is a SUPERSET of competing frameworks: every dimension of
    Aaker''s brand personality, Keller''s CBBE, Kapferer''s prism, De Chernatony''s roles, Holbrook''s
    value typology, and Sheth et al.''s consumption values maps onto one or more SBT channels, while no
    alternative covers all eight (Economic and Temporal are SBT-only). This is the empirical signature
    of completeness, and it reveals the cost of under-dimensionality.'
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P4
- id: P12
  type: proposition
  statement: '(Proposition 3, Projection Consistency) Concentration of measure on the simplex predicts
    that a k≤3 dimensional projection of 8D brand profiles captures the majority of between-brand variance
    while losing the within-profile SHAPE information that distinguishes coherence types. Low-dimensional
    MDS solutions are therefore a useful MAP, not the TERRITORY: their "sufficiency" is a feature of the
    projection (and of artificially sharp low-dimensional boundaries), not a property of perceptual reality.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P4
methodology:
  type: empirical
  design: 'Drop-one dimension reduction (8D→7D): remove each dimension in turn, renormalize remaining
    weights to 100, recompute DCI = (w_Economic + w_Semiotic)/total, and measure rank stability vs the
    8D baseline via Spearman rho, cosine similarity of the 22-element DCI vector, and mean absolute rank
    displacement. Drop-pair dimension reduction (8D→6D): remove all 28 dimension pairs (27 computable;
    Semiotic+Economic leaves DCI undefined), renormalize, recompute DCI and rank stability vs the 8D baseline.
    Dimension expansion (8D→10D): split Experiential into Functional/Hedonic and Economic into Price/Accessibility
    via noise-perturbed 50/50 splits (split_ratio = 0.5 + N(0,0.1), clipped [0.20,0.80]), recompute DCI
    from the two Economic sub-dimensions, and test rank stability — testing whether subdivision adds discriminative
    power.'
  analysis:
    software: gap5_dimension_robustness.py
    method: Python 3.12 + numpy + scipy (uv run --with numpy,scipy)
