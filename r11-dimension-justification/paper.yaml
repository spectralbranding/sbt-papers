# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026r): R11 — Why Eight? Dimension justification paper
spec_version: "0.1.0"

meta:
  title: "Why eight? Completeness and necessity of the SBT dimensional taxonomy"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19207599"
  date: "2026-01-01"
  version: "1.0"
  venue: "Working Paper (Zenodo)"
  license: "CC-BY-4.0"
  keywords:
    - dimensional taxonomy
    - brand perception
    - completeness
    - necessity
    - multidimensional scaling
    - concentration of measure
    - semiotic theory
    - factor structure

claims:
  - id: "P1"
    type: proposition
    statement: >
      The 8 SBT dimensions (Semiotic, Narrative, Ideological, Experiential, Social,
      Economic, Cultural, Temporal) are mutually non-redundant: for each dimension D_i,
      there exist two brands B and B' that differ on D_i but are identical on all
      other 7 dimensions. No dimension can be expressed as a linear or nonlinear
      function of the remaining seven.
    formal: >
      For each i in {1,...,8}, there exist p, q in R^8_+ such that:
        p_j = q_j for all j != i, and p_i != q_i.
      Furthermore, no function f: R^7 -> R exists such that s_i = f(s_1,...,s_{i-1}, s_{i+1},...,s_8)
      across the space of brand profiles.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "P2"
    type: proposition
    statement: >
      The 8 SBT dimensions are minimally complete: any proposed 9th dimension that
      is distinct from the existing 8 can be shown to reduce to a combination of
      existing dimensions, a measurement artifact, or a sub-dimension already captured
      within one of the 8. No dimension from the existing 8 can be removed without
      losing discriminative power over known brand archetypes.
    formal: >
      For any proposed dimension D_9, either:
        (a) D_9 = g(D_i) for some i (sub-dimension), or
        (b) D_9 = h(D_i, D_j) for some i,j (interaction term), or
        (c) D_9 is empirically indistinguishable from noise in high-dimensional
            perception space (concentration of measure: see P3).
      Furthermore, removing any D_i from {D_1,...,D_8} creates at least one pair
      of known brands (B, B') that becomes indistinguishable.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["P1"]

  - id: "P3"
    type: proposition
    statement: >
      The concentration of measure phenomenon on the 7-sphere (S^7) explains why
      multidimensional scaling (MDS) studies of brand perception consistently recover
      only 2-3 dimensions: when observers are uniformly distributed on S^7_+, the
      projection onto any 2-dimensional subspace captures most of the pairwise distance
      structure with bounded distortion, making the 8-dimensional space appear
      low-dimensional in aggregate. This does not imply that 2-3 dimensions are sufficient
      to characterize individual brands — it implies only that aggregate pairwise
      distances are approximately preserved.
    formal: >
      By the Johnson-Lindenstrauss lemma applied to S^7_+:
      For epsilon in (0, 1/2), a random projection f: R^8 -> R^k with
      k = O(log(n) / epsilon^2) preserves all pairwise distances within (1 +/- epsilon)
      with high probability, for n brand profiles.
      For n = 100 brands, k = 2-3 suffices for epsilon = 0.30.
      This is not a dimensionality result for individual profiles; it is a
      pairwise-distance result for aggregate samples.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["P1", "P2"]

methodology:
  type: theoretical
  design: >
    Theoretical and argumentative. P1 (non-redundancy) is demonstrated via
    counter-example brand pairs — for each dimension D_i, two real or constructed
    brands are identified that are indistinguishable on all other 7 dimensions but
    clearly distinct on D_i. P2 (minimal completeness) is argued by testing candidate
    9th dimensions proposed in alternative taxonomies (Aaker 5, Keller 4, Kapferer 6)
    and showing each reduces to an existing SBT dimension or sub-dimension. P3
    (concentration of measure) is derived analytically using the Johnson-Lindenstrauss
    lemma applied to the SBT perception space. No primary data collection.
  analysis:
    method: "Counter-example construction; dimensional reduction analysis; JL lemma application"
    software: "None (analytical). Python (numpy) for JL bound computation."

acceptance:
  - claim_id: "P1"
    criterion: >
      For each of the 8 dimensions, a panel of independent raters (N >= 50) agrees
      (kappa > 0.60) that the proposed counter-example brand pair differs on the
      target dimension and is equivalent on all others. The agreement is consistent
      across at least 3 independent panels.
    falsification: >
      For at least one dimension D_i, no brand pair can be found that raters agree
      differs on D_i while being equivalent on all other 7 dimensions, suggesting
      the dimension is not independently discriminable.

  - claim_id: "P2"
    criterion: >
      All candidate 9th dimensions proposed by alternative taxonomies (e.g., Aaker's
      "ruggedness", Kapferer's "physique") can be assigned to existing SBT dimensions
      by independent raters with kappa > 0.70 agreement, OR they are empirically
      indistinguishable from noise when added as a 9th dimension in a factor analysis
      of real brand perception data.
    falsification: >
      A 9th dimension is identified that (a) shows reliable inter-rater agreement on
      independent assignment, (b) does not load onto any existing SBT dimension in
      factor analysis, and (c) provides significant incremental predictive validity
      for a brand outcome variable.

  - claim_id: "P3"
    criterion: >
      Reanalysis of existing MDS brand perception datasets (e.g., Green & Rao 1972,
      Bijmolt & Wedel 1999) shows that the 2-3 recovered dimensions explain aggregate
      pairwise distances but fail to explain individual brand profile differences when
      compared against an 8-dimensional reference structure.
    falsification: >
      MDS recovers 8 or more stable dimensions from brand perception data, or the 2-3
      recovered MDS dimensions prove sufficient to discriminate all brand archetypes
      that P1 predicts require 8 dimensions.

data:
  available: false
  url: ""
  notes: >
    No primary data collected. Counter-example brands in P1 are drawn from publicly
    known brands and assigned profiles using structured judgment (same methodology as
    Zharnikov 2026a). Empirical validation of all three propositions requires
    survey data — see replication section.

code:
  available: true
  url: "https://github.com/spectralbranding/sbt-framework"
  notes: >
    The JL bound computation for P3 can be reproduced using the projection_bounds
    module in sbt-framework (Module 3, from Zharnikov 2026e). No new code was
    developed for this paper.

replication:
  feasible: true
  estimated_cost: "$15,000 - $40,000 USD (survey + factor analysis)"
  estimated_time: "12-24 months"
  requirements:
    - "Item battery covering all 8 SBT dimensions (minimum 3 items per dimension)"
    - "Minimum 300 respondents per brand, minimum 20 brands"
    - "Brands sampled from at least 5 product categories"
    - "Confirmatory factor analysis software (R lavaan or Python semopy)"
    - "Exploratory factor analysis as pre-test to determine recovered dimensionality"
    - "Independent rating panels for counter-example validation (P1)"

