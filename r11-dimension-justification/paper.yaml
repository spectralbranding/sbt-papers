contradictions: []
limitations:
- description: 'The completeness argument is THEORETICAL, not empirical: it rests on a scholarly inventory
    of academic traditions, not on human-subject factor analysis. Some dimensions may merge under EFA
    (e.g. semiotic and cultural loading on one factor), or unanticipated dimensions may emerge. §8A''s
    AI-observer test partially addresses this but a definitive test requires human-subject factor analysis.'
  severity: moderate
  addressable: true
- description: The independence examples (§3) are illustrative judgments about brand positioning, not
    measured observer spectral profiles; formal psychometric independence requires a large-scale study
    rating many brands across all eight dimensions and analyzing inter-dimensional correlations.
  severity: moderate
  addressable: true
- description: The enumeration assumes Western academic traditions; non-Western philosophical systems
    (Chinese yi integrating form/meaning/morality; Islamic muamalat integrating economic and ethical reasoning)
    and holistic-vs-analytic processing differences may carve the meaning space differently. Cross-cultural
    brand-personality work shows culture-specific factors (Peacefulness in Japan, Passion in Spain), illustrating
    the empirical form such variation could take.
  severity: moderate
  addressable: true
- description: The temporal dimension is the least established in prior brand theory (Zimbardo & Boyd's
    time-perspective theory was built for individual psychology, not brands), occupying a position parallel
    to HEXACO's theoretically motivated Honesty-Humility factor before large-scale validation. It may
    prove to be an attribute of specific heritage/future-oriented brands rather than a universal channel.
  severity: moderate
  addressable: true
- description: §8A's research questions were specified AFTER the R15 data were collected and are therefore
    exploratory, not confirmatory; results are illustrative support for the theoretical argument, not
    pre-registered hypothesis tests. The DCI numerator structure (Economic + Semiotic) imposes a mechanical
    asymmetry on Table 1 that must be borne in mind.
  severity: moderate
  addressable: true
