results:
  - claim_id: "P1"
    status: supported
    notes: >
      Counter-example brand pairs are provided for all 8 dimensions. For example:
      Semiotic — Hermès vs. Bottega Veneta (identical narrative/ideological/experiential
      profiles, differ on semiotic iconography density). Temporal — Rolex vs. Apple
      (similar profiles on all other dimensions, differ markedly on temporal signal
      orientation). The argument is illustrative, not subject to inter-rater testing.

  - claim_id: "P2"
    status: supported
    notes: >
      Aaker's "Ruggedness" is shown to map to the Narrative + Ideological dimensions
      of SBT. Kapferer's "Physique" maps to Semiotic + Experiential. Keller's
      "Brand Imagery" maps to Narrative + Cultural. No proposed 9th dimension
      resists reduction in the theoretical argument. Empirical confirmation pending.

  - claim_id: "P3"
    status: supported
    notes: >
      The JL computation shows that for n=100 brands, a 2-dimensional projection
      preserves all pairwise distances within 30% distortion with high probability.
      This matches the empirical finding of 2-3 MDS dimensions in the literature.
      The result reframes MDS low-dimensionality as a projection artifact, not evidence
      against 8-dimensionality.

limitations:
  - description: >
      All counter-example brand pairs in P1 are author-assigned. The non-redundancy
      argument is illustrative and has not been tested with independent raters assessing
      inter-rater reliability.
    severity: major
    addressable: true

  - description: >
      The paper makes no empirical claim about whether 8 is the correct number in
      a data-driven sense. Factor analysis may recover a different number of stable
      dimensions. This limitation is explicitly acknowledged and deferred to future
      empirical work.
    severity: major
    addressable: true

  - description: >
      The counter-example brands are drawn predominantly from Western consumer markets.
      The Cultural and Temporal dimensions may capture different variance in non-Western
      market contexts, potentially requiring dimension-specific calibration.
    severity: moderate
    addressable: true

  - description: >
      The reduction of alternative taxonomy dimensions to SBT dimensions (P2) depends
      on the author's interpretation of those frameworks. Alternative interpretations
      may not yield the same reductions.
    severity: moderate
    addressable: true

  - description: >
      The JL bound computation in P3 uses a uniform distribution assumption over
      brand profiles. If real brand profiles cluster (concentrated distribution),
      the effective dimensionality recovered by MDS would be even lower, strengthening
      P3. This case is analyzed in Zharnikov (2026f) R3.
    severity: minor
    addressable: false

