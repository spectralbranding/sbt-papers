  criterion: 'Holds if the eight channels are INDEPENDENT: for each dimension there exists a counter-example
    brand pair differing primarily on that dimension while approximately matched on the other seven (Apple/Samsung
    semiotic; Patagonia/North Face narrative; Chick-fil-A/Popeyes ideological; Ritz-Carlton/Four Seasons
    experiential; Supreme/Carhartt social; Costco/Sam''s Club economic; Uniqlo/H&M cultural; Hermès/Gucci
    temporal).'
  falsification: If observers rate the witness pairs as substantially different on multiple non-focal
    dimensions, the focal-dimension independence claim weakens for that pair.
- claim_id: P7
  criterion: 'Holds if (Proposition 1, Dimensional Non-Redundancy) For each dimension d_i there exists
    a brand pair distinguishable in the 8D taxonomy but indistinguishable in the 7D taxonomy obtained
    by removing d_i: the witness pair''s Euclidean distance is dominated by the d_i component, so removing
    d_i collapses the distance to approximately zero.'
  falsification: If a large observer-rating study finds that for some d_i no pair becomes indistinguishable
    on its removal, Proposition 1 is falsified.
- claim_id: P8
  criterion: 'Holds if (Proposition 2, Minimal Completeness) No proper subset of the eight dimensions
    covers all established meaning-transmission channels: the one-tradition-to-one-channel mapping is
    injective, so removing any dimension leaves the meaning channel of its tradition uncovered (e.'
  falsification: If a survey with items for all eight channels yields a stable EFA solution with fewer
    than eight factors (two channels load on one factor across diverse samples), Proposition 2 is falsified.
- claim_id: P12
  criterion: Holds if (Proposition 3, Projection Consistency) Concentration of measure on the simplex
    predicts that a k≤3 dimensional projection of 8D brand profiles captures the majority of between-brand
    variance while losing the within-profile SHAPE information that distinguishes coherence types.
  falsification: If a survey with items for all eight channels yields lower-variance factors that carry
