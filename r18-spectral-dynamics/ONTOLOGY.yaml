# ONTOLOGY.yaml module - 2026z
#
# Per-paper ontology module per [internal path removed]
# §"ONTOLOGY.yaml schema (v0.1)". owns = terms THIS paper introduces (unique
# authority); imports = terms owned by other modules it uses (reference only).
# Linked into the substrate `terms` graph by build_ontology.py; rendered per-paper
# by render_paper_glossary.py. Bootstrapped 2026-06-13 from per-paper term
# extraction; definitions paraphrase each paper's own definitional text.

paper_key: 2026z
schema_version: 0.1

owns:
  - term_key: spectral-dynamics
    label: "Spectral Dynamics"
    canonical_form: "spectral dynamics"
    definition: "A differential calculus for multi-dimensional brand perception that extends SBT's static eight-dimensional profiles to velocity and acceleration vectors and a 16-dimensional phase space."
    first_section: "Section 3 (The Differential Calculus of Brand Perception)"
  - term_key: brand-velocity
    label: "Brand Velocity"
    canonical_form: "brand velocity"
    definition: "The first time derivative of a brand's spectral profile, v(t)=dx/dt, a vector in R^8 encoding the rate and direction of perceptual change across dimensions."
    first_section: "Section 3.1 (Definition 2)"
  - term_key: brand-acceleration
    label: "Brand Acceleration"
    canonical_form: "brand acceleration"
    definition: "The second time derivative of a brand's spectral profile, a(t)=d^2x/dt^2, capturing whether brand movement is intensifying, stabilizing, or reversing."
    first_section: "Section 3.1 (Definition 3)"
  - term_key: brand-phase-space
    label: "Brand Phase Space"
    canonical_form: "brand phase space"
    definition: "The 16-dimensional space P=R^8 x R^8 in which each brand occupies a point (x(t),v(t)) combining its spectral profile (position) and velocity, yielding a complete dynamic state description."
    first_section: "Section 3.5 (Definition 6)"
  - term_key: directional-coherence
    label: "Directional Coherence"
    canonical_form: "directional coherence"
    definition: "The cosine similarity between a brand's velocity vector and an a priori strategy direction vector, quantifying alignment between actual brand movement and strategic intent."
    first_section: "Section 3.4 (Definition 5)"
  - term_key: trajectory-clustering
    label: "Trajectory Clustering"
    canonical_form: "trajectory clustering"
    definition: "Grouping brands by their dynamic state (x,v) rather than static position, enabling detection of competitive convergence and divergence before they manifest in position."
    first_section: "Section 5.1"

imports:
  - {term_key: spectral-brand-theory}
  - {term_key: perception-cloud}
  - {term_key: observer-spectral-profile}
  - {term_key: cohort}
  - {term_key: spectral-dimensions}
  - {term_key: non-ergodic-perception}
  - {term_key: absorbing-state}

refines: []

