claims:
  - id: "P1"
    type: proposition
    statement: >
      The mean squared error of the velocity estimator is minimized when the measurement
      interval Delta_t* balances truncation error (proportional to Delta_t^2 for smooth
      dynamics) against noise amplification (proportional to 1/Delta_t^2). The optimal
      interval satisfies Delta_t* ~ (sigma_x)^{1/3} / f''^{1/3}.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "P2"
    type: proposition
    statement: >
      Under the SDE dynamics of Zharnikov (2026j), conditioned on the same realization of
      the driving Brownian motion, phase space trajectories (x(t), v(t)) are unique: two
      brands starting from distinct phase space points remain distinct for all t > 0 with
      probability 1.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "T1"
    type: theorem
    statement: >
      Let brands A and B have identical spectral profiles at time t. If their velocity
      vectors differ, then: (a) the brands are distinguishable in phase space; (b) under
      the SDE dynamics, their profiles will diverge for t' > t with probability 1; (c) the
      magnitude of divergence is to first order proportional to the velocity difference
      times the time elapsed.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["P2"]

  - id: "P3"
    type: proposition
    statement: >
      For brands with convergence indicator CI > 0 and constant velocities, the time to
      positional convergence is approximately ||x_A - x_B|| / ||v_A - v_B||.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

methodology:
  type: theoretical
  design: >
    Conceptual paper developing a differential calculus for multi-dimensional brand perception.
    The framework extends Spectral Brand Theory from static profiles (Order 0) to velocity
    (Order 1) and acceleration (Order 2). Illustrated using author-assigned Dove brand profiles
    across four temporal cross-sections (2003-2023) from Zharnikov (2026p).
  analysis:
    method: >
      Finite difference estimation of velocity and acceleration vectors from discrete-time
      brand profiles. Noise amplification analysis. Phase space construction. Directional
      coherence computation. No primary data collection.
    software: >
      Computations are straightforward finite differences reproducible in any numerical
      environment. Kalman filter implementation deferred to post-publication.

acceptance:
  - claim_id: "T1"
    criterion: >
      Identify two brands with similar current spectral profiles but different trajectories
      (different velocity vectors). Verify that their profiles diverge in subsequent measurement
      waves as predicted by the velocity difference.
    falsification: >
      Brands with identical profiles and different velocities do NOT diverge in subsequent
      measurements, or divergence direction is unrelated to velocity direction.

  - claim_id: "P1"
    criterion: >
      Apply velocity estimation to brand tracking data at multiple measurement frequencies
      (monthly, quarterly, semi-annual, annual). Verify that MSE follows the predicted
      U-shaped curve with minimum near the theoretically optimal interval.
    falsification: >
      MSE does not exhibit a minimum at intermediate frequencies, or the minimum occurs at
      a frequency inconsistent with the theoretical prediction.

