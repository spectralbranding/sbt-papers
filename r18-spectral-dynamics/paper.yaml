  url: "https://github.com/spectralbranding/sbt-papers/tree/main/r18-spectral-dynamics"
  notes: >
    Dove profiles from Zharnikov (2026p, Table 1). Author-assigned based on qualitative
    assessment. No new primary data collected. Illustration only.

