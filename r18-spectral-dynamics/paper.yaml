  url: "https://github.com/spectralbranding/sbt-papers/tree/main/r18-spectral-dynamics/code/"
  entry_point: "compute_velocity_acceleration.py"
  notes: >
    Companion computation script reproduces Tables 2 and 3 (velocity and acceleration
    vectors) from the Table 1 spectral profiles via centered finite differences. Python
    3 standard library only; deterministic; fixed seed for any future Monte Carlo
    extension. Outputs JSON and CSV for both tables.

