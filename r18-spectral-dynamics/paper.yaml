meta:
  title: 'Spectral Dynamics: Velocity, Acceleration, and Phase Space in Multi-Dimensional Brand Perception'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.19468204
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand dynamics
  - brand velocity
  - phase space
  - trajectory clustering
  - Spectral Brand Theory
  - differential calculus
  - non-ergodic perception
  - Kalman filter
  abstract: 'Brand tracking routinely measures static position but rarely quantifies trajectory velocity
    or acceleration. This paper introduces a differential calculus for multi-dimensional brand perception,
    extending Spectral Brand Theory''s eight-dimensional space from static profiles to velocity and acceleration
    vectors, and defines a 16-dimensional phase space combining position and velocity. Three theoretical
    contributions emerge. First, velocity resolves metric ambiguity: brands with identical spectral profiles
    but different velocities are distinguishable in phase space, providing a constructive resolution to
    a problem structurally analogous to the Bonnet pair problem in differential geometry. Second, the
    paper introduces a directional coherence metric that quantifies alignment between a brand''s actual
    trajectory and its strategic intent. Third, trajectory clustering groups brands by their dynamic behavior
    rather than static position, enabling detection of competitive convergence and divergence before they
    manifest in position. The framework is illustrated using author-assigned illustrative profiles for
    Dove across four strategic periods (2003-2023); computed velocity and acceleration vectors are illustrative
    of the method, not validated empirical measurements. The framework connects state-space models in
    marketing science to the geometric structure of brand perception space, embedding existing Kalman
    filter approaches within a unified kinematic theory.'
claims:
- id: P1
  type: proposition
  statement: Brand velocity v(t) = dx/dt and acceleration a(t) = d2x/dt2 are well-defined vector quantities
    in R^8, encoding both direction (which dimensions are changing) and magnitude (how fast); the SDE
    drift term is already the expected velocity, so velocity is implicit in SBT's dynamical model and
    the calculus only makes it explicit and computable.
  testable: false
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: Differentiation amplifies measurement noise (velocity noise ~ sqrt(2)/dt, acceleration noise
    ~ sqrt(6)/dt^2), so the velocity-estimator MSE is minimized at an optimal interval balancing truncation
    error against noise amplification; for typical brand-tracking noise this interval is roughly 6-12
    months, consistent with standard tracking cadence. (Proposition 1.)
  testable: false
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
