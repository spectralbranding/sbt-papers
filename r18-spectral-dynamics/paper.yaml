limitations:
- description: The Dove illustration uses author-assigned (qualitative) profiles, not survey or experimental
    data, and only four time points over 20 years (three velocity, two acceleration estimates — the bare
    minimum). All computed velocity, acceleration, and DC values are illustrative of the method and are
    NOT validated empirical measurements; validation requires real brand-tracking data with known measurement
    properties and external criteria.
  severity: moderate
  addressable: true
- description: Noise amplification under differentiation makes raw finite-difference velocity (and especially
    acceleration) estimates unreliable from few noisy measurements; raw differences should be treated
    as illustrative, with the Kalman filter the recommended practical estimator. Third-order derivatives
    (jerk) are impractical at current tracking frequencies.
  severity: moderate
  addressable: true
- description: Dimensional-creation events (null-to-positive transition, e.g. Dove's Ideological dimension
    2003->2006) and crisis-driven jumps are topological discontinuities the differential calculus cannot
    capture as standard derivatives; a general treatment needs jump-diffusion (Poisson-driven) extensions
    of the SBT SDE.
  severity: moderate
  addressable: true
