results:
- claim_id: P1
  status: supported
  notes: 'In the Dove illustration the velocity/acceleration layer surfaces dynamics that static position
    cannot: Cultural is a leading indicator that decelerates years before its position falls; Narrative
    and Social follow with a lag; brand speed traces an inverted-U; and the Experiential dimension stays
    near-zero velocity throughout, consistent with an unchanged product while brand meaning transforms
    — demonstrating that the kinematic decomposition isolates experience-level from meaning-level dynamics.'
