    coherence DC = cos(angle between v and the a-priori strategy vector d) ranges in [-1, +1] and distinguishes
    aligned progress (DC -> +1) from activity without progress (DC ~ 0) and counterproductive movement
    (DC -> -1). (Definitions 4-5.)
