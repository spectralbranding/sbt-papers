results:
  - claim_id: "T1"
    status: supported
    notes: >
      Proved via pathwise uniqueness of the SBT SDE. Illustrated with Dove example showing
      velocity-based disambiguation of brands at similar positions.

  - claim_id: "P2"
    status: supported
    notes: >
      Follows from Lipschitz continuity of drift and diffusion coefficients in the SBT SDE,
      which guarantees pathwise uniqueness (Zharnikov 2026j, Theorem 1).

  - claim_id: "P1"
    status: proposed
    notes: >
      Theoretical derivation from bias-variance tradeoff. Illustrative parameters suggest
      6-12 month optimal interval. Empirical validation requires measured brand tracking data.

  - claim_id: "P3"
    status: proposed
    notes: >
      First-order estimate under constant velocity assumption. Degrades with acceleration.

limitations:
  - description: >
      The Dove illustration uses author-assigned profiles, not measured data. Velocity and
      acceleration values are illustrative of the method, not empirically validated.
    severity: major
    addressable: true

  - description: >
      Four time points over 20 years provide only three velocity and two acceleration estimates.
      Denser time series would enable detection of nonlinear dynamics.
    severity: major
    addressable: true

  - description: >
      The SDE produces non-differentiable sample paths. Velocity is defined as the drift
      expectation (not a pathwise derivative), estimated via Kalman filtering or finite
      differences from discrete measurements.
    severity: moderate
    addressable: true

  - description: >
      Dimensional creation events (null-to-positive transitions) are topological changes
      that the differential calculus cannot capture as standard derivatives.
    severity: minor
    addressable: false

