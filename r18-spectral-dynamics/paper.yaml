methodology:
  type: empirical
  design: 'Centered finite-difference estimators: first-order (velocity) v_hat at the interval midpoint,
    and second-order central difference (acceleration) a_hat from three measurements; the Kalman smoother
    is the recommended noise-optimal practical alternative. Applied to the four Dove cross-sections to
    compute three velocity and two acceleration vectors.'
  analysis:
    software: sbt-papers/r18-spectral-dynamics/code/compute_velocity_acceleration.py and phase_portrait.py
      (deterministic; no RNG)
    method: Python 3.12; numpy + matplotlib (PEP 723 inline deps)
