# SPINE.yaml — Research as Repository (2026u / R14)
#
# Backbone spine for the Research-as-Repository protocol paper, built per
# CLAUDE.md rule 0aa (spine-first drafting) ahead of the 2026-06-13 substantive
# revision that adds the "realized system as existence proof" section.
#
# Scope of this spine: the paper's argument backbone — the seven protocol
# claims (paper §1.6 C1–C7, here P1–P7), plus the realized-system nodes
# (observations of the built metadata system → methods → measurements →
# findings → the existence-proof proposition P8) added by the revision. Every
# NEW prose claim in the realized-system section traces to a node here; the
# pre-existing protocol prose traces to P1–P7 + the structural-diagnosis
# propositions P0a/P0b.
#
# Schema v0.2 ([internal path removed] §"Schema v0.2"):
# observations / methods / measurements / findings are first-class so the
# realized system (a built, tested, running artifact) is represented as
# evidence, not asserted in prose. The protocol claims P1–P7 remain analytic
# design propositions.

spine_version: "0.2"
spine_doc_version: "0.1.0"     # backbone spine first lock (2026-06-13 realized-system revision)
paper_key: "2026u"
title: >-
  Research as Repository: Infrastructure for Transparent, Attributed, and
  Machine-Readable Scholarly Communication
target_venue_primary: "TBD (between venues; JASIST + JLSC rejected)"
status: >-
  Backbone spine locked 2026-06-13 for the realized-system revision. Paper is
  a working paper between venues, so edits go in the paper directly.

thesis: |
  Scientific publishing is the only knowledge-intensive domain without formal
  version-control and provenance infrastructure. Treating every research
  program as a version-controlled repository — of which a paper is a render at
  a point on its timeline, a submission a fork, peer review attributed commits
  on a review branch, and publication a merge — closes five persistent
  structural gaps (no version history, no contributor traceability, no
  submission provenance, no review attribution, no machine interface) without
  replacing peer review or mandating a centralized platform. The protocol
  optimizes the knowledge-production process, not the rendered paper. As of the
  2026-06-13 revision the protocol is no longer only a proposal: the author's
  own corpus runs a working instantiation — a single content-addressed
  substrate unifying terms, claims, and citations, a link-time compatibility
  checker that treats each paper as a module in a typed codebase, and a
  CI-style anti-drift gate — which is an existence proof of the repository
  reconception on a live body of work. The strong claim (a new mode of
  scholarly communication) is warranted as an existence proof and design;
  full validation requires multi-author adoption and an explicit negotiation
  protocol, which are future work.

# ============================================================================
# Boundary conditions — when the protocol's claims hold
# ============================================================================
boundary_conditions:
  - id: C1
    statement: "Research artifacts are authored under version control (commit/revision history with attribution exists)."
    observable: "Presence of a commit graph with author attribution."
    excludes: "One-shot handwritten manuscripts with no revision history."
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
  - id: C2
    statement: "The research program is an evolving body of work (an SSOT), not a single isolated artifact."
    observable: "Multiple renders/papers derive from one maintained source over time."
    excludes: "A single standalone paper with no surrounding program."
    provenance:
      created_by: "author"
      created_at: "2026-06-13"

