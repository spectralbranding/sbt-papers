# ============================================================================
# Propositions — the seven protocol claims (paper §1.6 C1–C7) + diagnosis +
# the realized-system existence-proof proposition (P8)
# ============================================================================
propositions:
  - id: P0a
    statement: >-
      Scientific publishing is the only knowledge-intensive domain that never
      developed formal version-control and provenance infrastructure, a gap
      visible against legal, financial, clinical, supply-chain, and software
      domains that each independently adopted provenance tracking.
    conditions: ""
    antecedents: []
    evidence:
      - type: citation
        anchor: "Cross-domain provenance comparison (paper Table 1)."
        citation_keys: [renear-2009-strategic-reading, borgman-2015-big-data-little, edwards-2013-knowledge-infrastructures, torvalds-git]
    body_sections: ["§1.1 A Gap Every Other Domain Has Already Solved"]
  - id: P0b
    statement: >-
      The document assumption (a paper is a static binary artifact) is the
      structural constraint underlying every recent publishing reform; each
      reform improves one dimension while leaving the document form intact.
    conditions: ""
    antecedents: [P0a]
    evidence:
      - type: analytic
        anchor: "Reform-by-reform analysis (open access, preprints, registered reports, post-publication review)."
    body_sections: ["§1.1", "§1.2 What the Protocol Replaces"]
  - id: P1
    statement: >-
      (Paper claim C1) Fork-based submission creates cryptographic provenance
      that makes submission history structurally auditable.
    conditions: "C1"
    antecedents: [P0b]
    evidence:
      - type: analytic
        anchor: "Fork = a commit-anchored share of a render; the fork chain records venue history."
    falsifier: "If forks can be created without preserving a verifiable commit lineage, C1 fails."
    body_sections: ["§2.2 Fork-Based Submission", "§2.7 Provenance by Design"]
  - id: P2
    statement: >-
      (Paper claim C2) Blinding-as-function replaces manual anonymization with a
      configurable system property.
    conditions: "C1"
    antecedents: [P0b]
    evidence:
      - type: analytic
        anchor: "Blinding is computed from the repository on fork, not hand-applied."
    falsifier: "If de-anonymization is recoverable from the blinded render, C2 fails."
    body_sections: ["§2.4 Blinding as a System Function"]
  - id: P3
    statement: >-
      (Paper claim C3) Review-as-commits creates attributed, portable review
      records with measurable depth.
    conditions: "C1"
    antecedents: [P0b]
    evidence:
      - type: analytic
        anchor: "Reviews are attributed commits on a review branch, owned by the reviewer and portable across venues."
    falsifier: "If review commits cannot be attributed or ported, C3 fails."
    body_sections: ["§2.5 Review as Attributed Commits", "§2.6 Reviewer Ownership"]
  - id: P4
    statement: >-
      (Paper claim C4) Collections-as-users unifies preprint servers, journals,
      and archives under a single protocol.
    conditions: "C1"
    antecedents: [P0b]
    evidence:
      - type: analytic
        anchor: "A collection is a curating user that merges forks; eLife 'publish then review' is the closest real-world instance."
        citation_keys: []
    falsifier: "If a venue type cannot be expressed as a collection-user, C4 fails."
    body_sections: ["§2.8 Collections as Users"]
  - id: P5
    statement: >-
      (Paper claim C5) A compliance gate (journal_spec.yaml) substantially
      reduces formatting-related desk rejections.
    conditions: "C1"
    antecedents: [P0b]
    evidence:
      - type: analytic
        anchor: "Compliance is checked as CI against a journal-published spec before submission."
    falsifier: "If formatting desk-rejection rates are unchanged under the gate, C5 fails."
    body_sections: ["§2.3 The Submission Gate: Compliance as CI/CD"]
  - id: P6
    statement: >-
      (Paper claim C6) Provenance-by-design makes dual submission structurally
      detectable.
    conditions: "C1"
    antecedents: [P1]
    evidence:
      - type: analytic
        anchor: "Concurrent forks of the same commit lineage to multiple collections are queryable."
    falsifier: "If concurrent submissions leave no detectable trace, C6 fails."
    body_sections: ["§2.7 Provenance by Design"]
  - id: P7
    statement: >-
      (Paper claim C7) The protocol's machine-readable structure enables
      structured querying across the full research lifecycle, including
      AI-assisted cross-paper analysis.
    conditions: "C1, C2"
    antecedents: [P0b]
    evidence:
      - type: analytic
        anchor: "Markdown + paper.yaml + substrate are queryable without lossy PDF extraction (contrast Goldberg et al. 2026 olmOCR preprocessing)."
    falsifier: "If cross-paper queries still require lossy extraction under the protocol, C7 fails."
    body_sections: ["§2.11 The AI-Native Layer", "§1.2 Gap 5"]
  - id: P8
    statement: >-
      The author's corpus runs a working instantiation of the repository
      reconception: the content-addressed substrate IS the repository, the
      ontology linker (build_ontology.py) is its type-checker, the anti-drift
      gate (verify_paper_bundle.py) is its continuous integration, the
      spine-first protocol is its drafting discipline, and the terms / claims /
      citations graphs are the compiled symbol tables. This is an existence
      proof of the protocol on a live body of work, not merely a proposal.
    conditions: "C1, C2"
    antecedents: [P7, F1, F2]
    evidence:
      - type: self-application
        anchor: "The realized system runs on this corpus and on this very paper's bundle (paper.md + SPINE.yaml + ONTOLOGY.yaml + rendered glossary), checked by the gate."
      - type: empirical
        anchor: "167 terms across 50 linked modules; gate clean; 20/20 tests."
    falsifier: "If the system does not actually run on the corpus, or the gate does not fail on injected drift, P8 fails."
    body_sections: ["New §: A realized instance"]

# ============================================================================
# Findings — what the built system demonstrates
# ============================================================================
findings:
  - id: F1
    statement: >-
      A single-author research corpus can be operated as a typed module system:
      each paper exports the terms and claims it introduces and imports others',
      a linker enforces link-time compatibility, and an anti-drift gate is the
      corpus's continuous integration. The link-time check (unique-owner,
      no-dangling, compatible-refine, acyclic) is a software-engineering pattern
      with no equivalent in existing ontology/publishing standards.
    type: "system_demonstration"
    source_measurements: [m_corpus_terms]
    generating_method: M1
    antecedents: [O2]
    falsifier: "If the linker cannot resolve the 50 modules without manual override, F1 weakens to a partial demonstration."
    citation_role_in_paper: "primary_evidence_for_P8"
    provenance:
      created_by: "tool:build_ontology.py"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance"]
  - id: F2
    statement: >-
      The bundle (paper.md + SPINE.yaml + ONTOLOGY.yaml + rendered glossary +
      substrate) is kept from drifting by a CI gate that fails the build on
      dangling imports, incompatible refinement, definitional drift, or a paper
      drifting from its companions — verified clean corpus-wide (auth_fail=0,
      missing=0, phantom=0) with a 20-test suite including a docs-alignment
      control.
    type: "system_demonstration"
    source_measurements: [m_gate_clean]
    generating_method: M2
    antecedents: [O3]
    falsifier: "If the gate passes on an injected dangling import or incompatible refine, F2 fails."
    citation_role_in_paper: "primary_evidence_for_P8"
    provenance:
      created_by: "tool:verify_paper_bundle.py"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance"]

# ============================================================================
# Robustness checks — does the result hold under the federated regime?
# ============================================================================
robustness_checks:
  - id: RC1
    statement: >-
      The link-time compatibility check generalizes from the single-author
      regime to the federated (multi-author) case: a cross-owner linker
      (negotiate_modules.py) that, instead of aborting on a unique-owner
      collision, classifies every cross-owner interaction into exactly one of six
      classes — AGREEMENT (identical def_hash; skos:exactMatch; MERGE), CONFLICT
      (same key, divergent def_hash; skos:closeMatch/relatedMatch; NAMESPACE+FORK),
      CROSS_REFINE (refine-with-narrows_to; skos:narrowMatch; REBASE),
      INCOMPATIBLE_REFINE (refine-without-narrows_to; BLOCK), CROSS_IMPORT (clean
      cross-author dependency edge), DANGLING_IMPORT (import neither author owns;
      BLOCK) — and proposes a typed, justified reconciliation
      (SSSOM mappings + lock/fork/rebase/merge operations); the three unresolved
      classes (CONFLICT / INCOMPATIBLE_REFINE / DANGLING_IMPORT) are what --gate
      fails on. The body presents this taxonomy as an interaction-class table and a
      cross-owner decision flowchart. Demonstrated on a
      deliberate two-author fixture exercising all four interaction classes;
      report mode exits 0, gate mode exits nonzero on unresolved interactions.
      Subsequently exercised on two REAL corpus vocabularies (SBT perceptual vs OST
      operational), presented as two independently namespaced module sets
      (EXP-2026-06-13-NEG-SBT-OST): 6 cross-owner interactions classified, 0
      unresolved (4 cross-import + 2 cross-refine), shared concepts matched by
      content-addressed def_hash (manifest-verified against the live graph), the
      program bridge recovered before any prose was read. Further exercised against
      two GENUINELY INDEPENDENT vocabularies the author did not build for
      compatibility — an incumbent brand-equity vocabulary (Aaker 1991/1996;
      EXP-2026-06-14-NEG-AAKER-SBT) and information-economics signaling theory
      (Spence 1973; EXP-2026-06-14-NEG-SPENCE-SBT) — which surfaced the adversarial
      classes the convergent pair could not: a genuine dangling reference (an
      incumbent primitive neither side owns) and a genuine same-key CONFLICT on a
      shared bare term ('signal': economic costly signal vs brand signal across the
      eight dimensions; differing def_hash), gate-failing, for which the linker
      refused exactMatch and proposed a namespaced closeMatch curation. Across the
      three real-corpora runs the full interaction-class set (clean import/refine,
      dangling, conflict) is now exercised on real vocabularies. What is NOT yet
      done is a LIVING independent co-author authoring their own modules and
      resolving a conflict in dialogue (the modules here are author-transcribed; see
      L2).
    type: "generalization_check"
    sensitivity_of: [P8]
    mitigates: [L2]
    falsifier: "If the federated linker cannot classify a cross-owner collision without erroring, the generalization fails."
    provenance:
      created_by: "author + tool:negotiate_modules.py"
      created_at: "2026-06-13"
    body_sections: ["5.6 Companion Experiments and Reproducibility (interaction-class table + cross-owner decision flowchart)"]

# ============================================================================
# Alternative explanations — rivals the realized-system claim must clear
# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      The realized system is just an application of existing semantic-publishing
      standards (nanopublications, RO-Crate, SKOS, SSSOM, CiTO) under new names,
      not a distinct contribution.
    rules_out_required: [P8]
    ruled_out_by: [F1, F2]
    rules_out_status: "rejected"
    reasoning: >-
      The standards are EMITTED as projections from the substrate and CITED, not
      reinvented; about half the stack maps to them. What none of them provide —
      and what the system contributes — is the per-paper-module = codebase-symbol
      framing, the single substrate unifying terms + claims + citations, the
      link-time compatibility checker plus anti-drift CI gate, the spine-first
      generative drafting protocol, and the single-author temporal-rebase regime.
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance (prior art + novelty)"]

# ============================================================================
# Limitations — honest scope of the existence-proof claim
# ============================================================================
limitations:
  - id: L1
    statement: >-
      The realized system is single-author: modules are temporal slices of one
      author's program reconciled by rebase, not the multi-author federation the
      semantic-publishing standards assume. The strong claim (a new mode of
      scholarly communication) is warranted as an existence proof and design, not
      as a validated social practice.
    severity: "scope-bounding"
    affects: [P8]
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance (limitations)", "§5.3 Limitations"]
  - id: L2
    statement: >-
      Full validation requires multi-author adoption and an explicit negotiation
      protocol (how two authors reconcile incompatible modules). The cross-owner
      reporting mode is prototyped (RC1, negotiate_modules.py), demonstrated on a
      two-author fixture, AND exercised on the real SBT/OST vocabularies
      (EXP-2026-06-13-NEG-SBT-OST) — but that real run is across two namespaces of
      ONE author and links cleanly by construction. What remains future work is
      exercising it on two genuinely INDEPENDENT authors' corpora, where at least
      one real conflict or dangling reference arises and must be reconciled — true
      multi-author adoption as a validated social practice, not the mechanism itself.
    severity: "future-work"
    affects: [P8]
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance (future work)"]

# ============================================================================
# Negative findings — what is absent in the prior art (motivates the contribution)
# ============================================================================
negative_findings:
  - id: NF1
    statement: >-
      No existing standard provides a gate that fails the build on dangling
      import / incompatible refinement / definitional drift across one corpus:
      Trusty URIs make single artifacts tamper-evident, OAEI evaluates matchers,
      OBO has QC — but the link-time compatibility check plus cross-artifact
      anti-drift CI is a software-engineering pattern absent from
      ontology/publishing prior art.
    expected_observation: "A prior standard with a corpus-level link-time + drift CI gate."
    source_method: M2
    affects_nodes: [P8, F2]
    motivates: [P8]
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance (prior art)"]

# ============================================================================
# Cross-paper engagement
# ============================================================================
corpus_precedents:
  - paper_key: 2026t
    relationship: extends
    spine_nodes: [P7, P8]
    note: >-
      Paper Spec (paper-as-specification) defines paper.yaml's internal schema;
      Research-as-Repository is the process layer it travels in. The realized
      bundle (paper.md + SPINE + ONTOLOGY + glossary + gate) is the spec bundle
      Paper Spec describes, now realized.
  - paper_key: 2026i
    relationship: applies
    spine_nodes: [P0b]
    note: "OST's 'specify the process, then derive structure' applied to scholarly communication (§1.4)."
  - paper_key: 2026ao
    relationship: refines
    spine_nodes: [P8]
    note: >-
      The ontology layer is the semantics companion to 2026ao's meaning /
      meaningfulness split: the SPINE is the meaning, the ONTOLOGY is the
      semantics, the prose is the meaningfulness.

