# ============================================================================
# Methods — how the realized system is constructed and checked
# ============================================================================
methods:
  - id: M1
    statement: >-
      The linker (build_ontology.py): resolve each paper's ONTOLOGY.yaml module
      against the others, enforcing one owner per term, no dangling import/refine,
      compatible refinement, and acyclicity; assign each term a content-addressed
      def_hash (sha256 of its definition) so a changed definition surfaces its
      dependents.
    type: "link_time_type_check"
    inputs: ["[internal path removed]*.yaml"]
    outputs: ["terms / term_relations / paper_terms substrate tables"]
    code_anchor: "code/build_ontology.py"
    reproducibility:
      seed: "deterministic (no RNG)"
      runtime_environment: "Python 3.12 + uv"
    provenance:
      created_by: "author + tool:build_ontology.py"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance"]
  - id: M2
    statement: >-
      The anti-drift gate (verify_paper_bundle.py): a read-only CI-style check
      run after every paper create/edit and before commit, failing the build on
      dangling import / incompatible refinement / definitional drift / a paper
      drifting from its SPINE/ONTOLOGY companions.
    type: "continuous_integration_gate"
    inputs: ["paper.md", "SPINE.yaml", "ONTOLOGY.yaml", "substrate"]
    outputs: ["PASS / DRIFT verdict; nonzero exit on hard drift"]
    code_anchor: "code/verify_paper_bundle.py"
    provenance:
      created_by: "author + tool:verify_paper_bundle.py"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance"]
  - id: M3
    statement: >-
      The spine-first drafting protocol: no prose may be written without a
      corresponding SPINE node; new claims require FORK (extend the spine first)
      or REBASE (drop the claim) — a generative gate, not post-hoc annotation.
    type: "drafting_discipline"
    inputs: ["SPINE.yaml"]
    outputs: ["prose whose every claim traces to a node"]
    code_anchor: "[internal path removed] + sync_claims_from_spine.py"
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
    body_sections: ["New §: A realized instance"]

