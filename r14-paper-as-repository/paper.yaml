  abstract: 'Scientific evaluation relies on a self-reinforcing loop: universities evaluate researchers
    by journal prestige, journals evaluate papers partly by institutional affiliation, and no one evaluates
    the research directly — because direct evaluation at scale has lacked the necessary infrastructure.
    This paper proposes a protocol that provides that infrastructure by treating every research program
    as a version-controlled repository. A paper is a render of the research at a point on its timeline:
    a frozen snapshot forked to a journal so the community can confirm the findings. Grounded in information
    science scholarship on structured knowledge objects [@renear-2009-strategic-reading-ontologies], compound
    scholarly outputs [@borgman-2015-big-data-little], and knowledge infrastructures [@edwards-2013-knowledge-infrastructures-intellectual;
    @leonelli-2016-datacentric-biology-philosophical], the protocol introduces fork-based submission,
    automated compliance gates, attributed reviewer commits, provenance chains, structural funding and
    affiliation metadata, AI-traceability by design, and a commit-reveal privacy primitive that lets researchers
    establish cryptographic priority and provenance through public commit hashes while keeping content
    disclosure under their control. The protocol optimizes the knowledge production process, not the paper:
    existing publishing reforms improve the rendered artifact; this protocol makes the research itself
    structurally transparent. Combined with the Paper Spec standard [@zharnikov-2026m-projection-cascade-why],
    which specifies what a paper claims, the repository protocol specifies how the research was built,
    evaluated, and decided upon.'
