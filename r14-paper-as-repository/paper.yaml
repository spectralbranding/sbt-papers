    - "A journal or preprint server willing to pilot fork-based submission"
    - "Developer resources to implement fork lifecycle (estimated 3-6 months)"
    - "Git hosting infrastructure (GitHub, GitLab, or self-hosted)"
    - "IRB approval if studying researcher adoption behavior"

