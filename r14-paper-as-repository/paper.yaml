limitations:
- description: 'The realized system is single-author: modules are temporal slices of one author''s program
    reconciled by rebase, not the multi-author federation the semantic-publishing standards assume. The
    strong claim (a new mode of scholarly communication) is warranted as an existence proof and design,
    not as a validated social practice.'
  severity: moderate
  addressable: true
- description: Full validation requires multi-author adoption and an explicit negotiation protocol (how
    two authors reconcile incompatible modules). The cross-owner reporting mode is prototyped (RC1, negotiate_modules.py),
    demonstrated on a two-author fixture, AND exercised on the real SBT/OST vocabularies (EXP-2026-06-13-NEG-SBT-OST)
    — but that real run is across two namespaces of ONE author and links cleanly by construction. What
    remains future work is exercising it on two genuinely INDEPENDENT authors' corpora, where at least
    one real conflict or dangling reference arises and must be reconciled — true multi-author adoption
    as a validated social practice, not the mechanism itself.
  severity: moderate
