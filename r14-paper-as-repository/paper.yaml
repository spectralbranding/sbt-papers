methodology:
  type: empirical
  design: 'The linker (build_ontology.py): resolve each paper''s ONTOLOGY.yaml module against the others,
    enforcing one owner per term, no dangling import/refine, compatible refinement, and acyclicity; assign
    each term a content-addressed def_hash (sha256 of its definition) so a changed definition surfaces
    its dependents. The anti-drift gate (verify_paper_bundle.py): a read-only CI-style check run after
    every paper create/edit and before commit, failing the build on dangling import / incompatible refinement
    / definitional drift / a paper drifting from its SPINE/ONTOLOGY companions. The spine-first drafting
    protocol: no prose may be written without a corresponding SPINE node; new claims require FORK (extend
    the spine first) or REBASE (drop the claim) — a generative gate, not post-hoc annotation.'
  analysis:
    software: [internal path removed]
    method: Python 3.12 + uv
