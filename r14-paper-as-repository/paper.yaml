results:
  - claim_id: "C5"
    status: supported
    notes: >
      Supported by prototype: the compliance gate validator (validate_paper.py) successfully
      validates a paper repository against Journal of Marketing specifications (130 fields,
      46 compliance checks). Execution time < 1 second. The validator correctly identifies
      self-citation ratio violations, missing AI disclosure statements, and word count
      exceedances. Full fork lifecycle validation not implemented.

  - claim_id: "C1"
    status: proposed
    notes: >
      Not yet tested. Fork-based submission requires implementation of the fork lifecycle
      (freeze, transfer, provenance recording) which is specified in Section 2.2 but not
      prototyped. The PROVENANCE.yaml schema and structure are defined and demonstrated
      in the self-referential implementation.

  - claim_id: "C7"
    status: proposed
    notes: >
      Partially demonstrated by self-referential implementation: R14's CONTRIBUTORS.yaml
      lists 4 contributors (1 human + 3 AI tools) with disclosure statements. Commit-level
      AI attribution metadata is specified but not enforced by the current prototype.

limitations:
  - description: >
      Partial prototype only. The compliance gate, schemas, validator, and self-referential
      implementation are working (github.com/spectralbranding/paper-repo). The full
      fork-and-review lifecycle — fork creation, blinding function, reviewer branch
      management, provenance chain propagation, federation — is conceptual.
    severity: major
    addressable: true

  - description: >
      Git literacy barrier. The majority of researchers outside CS and engineering have
      never used Git. The protocol requires a GUI abstraction layer for adoption beyond
      computationally literate disciplines.
    severity: major
    addressable: true

  - description: >
      No empirical adoption data. No evidence that journals, reviewers, or researchers
      would adopt the protocol. The evaluation framework (Section 5.2) defines success
      metrics but none have been measured.
    severity: major
    addressable: true

  - description: >
      Legacy corpus. The existing 50+ million published papers have no repository structure.
      The protocol applies to new papers going forward; legacy papers are referenced by DOI
      in dependencies without conversion.
    severity: moderate
    addressable: false

