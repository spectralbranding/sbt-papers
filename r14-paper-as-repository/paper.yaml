# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026u): R14 — Research as Repository
spec_version: "0.1.0"

meta:
  title: "Research as Repository: A Git-Native Protocol for Scientific Knowledge Production"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19294864"
  date: "2026-04-10"
  version: "1.3"
  venue: "Zenodo preprint (JASIST desk-rejected 2026-04-02; submitted JLSC 2026-04-02)"
  license: "CC-BY-NC-ND-4.0"
  keywords:
    - scientific publishing
    - version control
    - peer review
    - research infrastructure
    - open science
    - provenance
    - knowledge production
    - research evaluation
    - AI transparency
    - prestige loop
    - fork-based submission

claims:
  - id: "C1"
    type: proposition
    statement: >
      Fork-based submission creates cryptographic provenance that makes submission history
      structurally auditable. Every fork is irrevocably recorded in the author's repository,
      making dual submission structurally detectable without relying on author declarations.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "C2"
    type: proposition
    statement: >
      Blinding-as-function replaces manual anonymization with a configurable system property.
      The blinding configuration is deterministic, complete (covers metadata, code comments,
      figure properties), verifiable, and reversible — properties that manual blinding cannot
      guarantee.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "C3"
    type: proposition
    statement: >
      Review-as-commits creates attributed, portable review records with measurable depth.
      Each reviewer's branch is a timestamped, diffable record of their intellectual
      contribution, enabling reviewer portfolios and structural assessment of review quality.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "C4"
    type: proposition
    statement: >
      Collections-as-users unifies preprint servers, journals, and institutional repositories
      under a single protocol. Each collection is a registered user that curates forks according
      to its own criteria, eliminating format conversion, multiple uploads, and version
      fragmentation.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "C5"
    type: proposition
    statement: >
      A compliance gate (journal_spec.yaml validated by CI/CD) substantially reduces
      formatting-related non-compliance. Target: 80% reduction in formatting desk rejections
      for journals that adopt the gate, with resubmission turnaround reduced from weeks to
      minutes for compliance-related fixes.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "C6"
    type: proposition
    statement: >
      Provenance-by-design makes dual submission structurally detectable. Every fork is
      permanently recorded in the author's PROVENANCE.yaml; any subsequent fork to another
      venue carries the full provenance chain, making concurrent identical submissions
      visible to all fork recipients.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: ["C1"]

  - id: "C7"
    type: proposition
    statement: >
      The protocol's machine-readable structure enables AI-native querying across the full
      research lifecycle. Every AI-assisted edit becomes a commit with metadata (tool, model
      version, prompt hash, diff), making AI contribution structurally transparent and
      auditable — solving the disclosure problem that journals currently address with
      honor-system forms.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

methodology:
  type: conceptual
  design: >
    Conceptual protocol proposal with partial prototype. The paper applies a lean value-stream
    analysis (Ohno, 1988; Womack & Jones, 1996) to scientific publishing, identifying five
    structural gaps in the document-based paradigm (no version history, no contributor
    traceability, no submission provenance, no review attribution, no machine interface).
    The protocol is specified across thirteen subsections (2.1-2.13) covering repository
    structure, fork-based submission, compliance gate, blinding, review, reviewer ownership,
    provenance, collections, federation, AI-native layer, normative specification roadmap,
    and the research wiki (structured knowledge accumulation with intellectual work proofs).
    A comparative analysis against twelve existing systems (Table 1a) demonstrates that no
    prior system integrates all six protocol features.
  analysis:
    method: >
      Lean value-stream analysis to identify waste (muda) in the publishing pipeline.
      Comparative feature analysis against 12 existing systems. Self-referential implementation:
      this paper is structured as a compliant paper repository with 7 typed claims,
      4 contributors (1 human + 3 AI tools), and a functioning compliance gate validator.
      Working prototype at github.com/spectralbranding/paper-repo.
    software: >
      Python (validate_paper.py, 290 lines, compliance gate validator).
      YAML (journal_spec.yaml schema, paper.yaml specification).
      Git (version control, fork semantics).

acceptance:
  - claim_id: "C1"
    criterion: >
      Implement fork-based submission for a single journal or preprint server. Verify that
      every fork creates a cryptographic link (SHA hash) recorded in the author's provenance.
      Test: create 10 forks from 5 authors; verify all 10 appear in provenance with correct
      commit hashes.
    falsification: >
      The fork mechanism fails to create a unique, verifiable link to the source repository
      in more than 10% of cases, or the provenance record can be modified by the author
      after fork creation.

  - claim_id: "C5"
    criterion: >
      Deploy the compliance gate for an existing journal. Measure: (a) number of submissions
      that pass the gate on first attempt; (b) average time from gate failure to resubmission;
      (c) comparison of formatting desk rejection rate before and after gate deployment.
      Target: 80% reduction in formatting desk rejections.
    falsification: >
      Formatting desk rejection rate decreases by less than 30% after gate deployment,
      suggesting that the majority of desk rejections are not formatting-related or that
      the gate's validation rules do not match actual editorial standards.

  - claim_id: "C7"
    criterion: >
      Analyze commit histories from 20+ paper repositories that used AI tools. Measure:
      (a) what fraction of AI-assisted commits contain tool metadata; (b) whether an auditor
      can reconstruct which sections were AI-assisted from commit history alone. Target:
      90% of AI commits carry tool metadata; auditor reconstruction accuracy > 85%.
    falsification: >
      Fewer than 50% of AI-assisted commits carry tool metadata in practice, indicating that
      the commit-based disclosure mechanism is no more reliable than self-reported forms.

