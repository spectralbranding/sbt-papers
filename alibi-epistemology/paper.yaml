meta:
  title: 'The Atom-Cloud-Fact Epistemological Pipeline: From Financial Document Processing to Brand Perception
    Modeling'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.18944770
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - epistemology
  - probabilistic knowledge
  - observation pipeline
  - domain transfer
  - computational framework
  - brand perception
  - confirmation bias
  abstract: 'This paper argues that the atom-cloud-fact pipeline constitutes an epistemological architecture
    demonstrably transferable across at least two structurally distinct domains. The pipeline models knowledge
    formation through three formally specified stages: atomic observation (typed, source-bound data extraction),
    probabilistic cloud formation (weighted multi-dimensional clustering), and fact collapse (threshold-based
    crystallization with full re-collapse on new evidence). Four propositions are developed: (P1) the
    pipeline''s external-corroboration requirement structurally reduces confirmation bias relative to
    single-source methods; (P2) multi-model replication produces more robust assessments because framework-driven
    conclusions are replicable while model-specific artifacts are not — conditioned on architectural divergence
    and structural convergence, with human-subject validation required; (P3) three-stage epistemic separation
    prevents category errors conflating brand signals, perception clouds, and brand convictions; and (P4)
    cross-model disagreement is diagnostic of evidential ambiguity, not model failure. The architecture
    originated in financial document processing; its seven principles transfer with parametric extension
    to brand perception modeling, producing Spectral Brand Theory (SBT). Existing approaches — Bayesian
    updating, AGM revision, Dempster-Shafer theory, and symbolic expert systems — each fail structurally
    for at least one of four requirements: path-independence, observer heterogeneity, epistemic separation,
    or linguistic implementability. The cross-domain transfer supports the claim that the pipeline captures
    a general structure of knowledge formation from heterogeneous observation.'
claims:
- id: P_ARCH1
  type: proposition
  statement: Knowledge formation from heterogeneous observation has a three-stage structure — atoms (typed,
    source-bound, immutable observations), clouds (probabilistic, multi-source, revisable hypotheses),
    and facts (threshold-crossed, stable, but re-collapsible knowledge) — with a feedback path from arriving
    evidence back to the atom layer.
  testable: false
  tested_in_paper: false
  status: not_tested
- id: P_ARCH2
  type: proposition
  statement: Seven architectural principles — dimensional typing, source binding, identity gating, asymmetric
    tolerances, weighted multi-dimensional scoring, re-collapse on new evidence, and epistemic separation
    — govern the pipeline's operation and were discovered through the financial implementation.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH1
- id: P_RECOLLAPSE
  type: proposition
  statement: Re-collapse — full dissolution of facts and rebuild from the complete atom set on contradicting
    evidence, rather than incremental patching — is the architectural commitment that most strongly distinguishes
    the pipeline from incremental updating systems and guarantees consistency with total evidence regardless
    of arrival order.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH2
- id: P_FINIMPL
  type: proposition
  statement: The financial reconciliation problem — a variant of probabilistic record linkage on unstructured
    documents — instantiates all seven principles, maintaining three-stage epistemic separation rather
    than collapsing to a direct match/non-match decision.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH2
- id: P_TRANSFER
  type: proposition
  statement: 'The seven principles transfer from financial reconciliation to brand perception without
    domain specialization: atom→brand signal, source→ encounter type, identity gate→brand recognition,
    cloud→perception cloud, fact→brand conviction, re-collapse→conviction rebuild — because the underlying
    epistemic structure is identical.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_FINIMPL
  - P_ARCH2
- id: P_HETOBS
  type: proposition
  statement: 'The critical parametric extension producing Spectral Brand Theory is replacing the single-observer
    assumption with a heterogeneous-observer model: each cohort applies its own observer spectral profile
    (spectrum, weights, tolerances, priors) to the same signal environment, so the same brand produces
    different convictions in different observers — not errors, but the perceptions the architecture recovers
    from available signal.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_TRANSFER
- id: P1_CONFBIAS
  type: proposition
  statement: External corroboration structurally reduces confirmation bias in brand assessment, because
    the pipeline requires convergent evidence across independently typed sources before any fact collapse,
    subordinating single-source conclusions to the multi-source cloud.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH2
  - P_TRANSFER
- id: P2_MULTIMODEL
  type: proposition
  statement: 'Multi-model replication produces more robust brand assessments than single-model analysis:
    conclusions surviving across architecturally distinct models (treated as distinct observation sources
    under source binding) are high-confidence clouds approaching collapse, while single-model conclusions
    are unconfirmed clouds possibly reflecting model-specific artifacts.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH2
  - P_HETOBS
- id: P3_EPISTSEP
  type: proposition
  statement: Three-stage epistemic separation prevents category errors that conflate brand signals (atoms),
    perception clouds (clouds), and brand convictions (facts) — errors such as treating signals as convictions,
    clouds as facts, or convictions as permanent.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH2
- id: P4_DISAGREE
  type: proposition
  statement: 'Cross-model disagreement is diagnostic of evidential ambiguity (a cloud below collapse threshold),
    not model failure: if unambiguous evidence existed, all model implementations would converge, so disagreement
    identifies where available atoms are insufficient to push the cloud past threshold in all observers.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_RECOLLAPSE
  - P2_MULTIMODEL
- id: P_EMERGENT
  type: proposition
  statement: 'The transfer surfaces three properties latent in the financial domain but central in the
    brand domain: observer heterogeneity as a feature (not a bug), structural absence as a signal (designed
    restriction generating perception effects, with a scarcity multiplier extending the atom model), and
    valence asymmetry (a conjectured greater resilience of evidence-free negative convictions than experientially-grounded
    positive convictions).'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_HETOBS
- id: P_GENERAL
  type: proposition
  statement: The pipeline is a candidate framework for any domain meeting one structural condition — typed
    observations from multiple sources clustering under uncertainty into revisable knowledge — with medical
    diagnosis, legal evidence assessment, and intelligence analysis as the highest-priority cross-domain
    replication tests.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH2
- id: P_RIVALS
  type: proposition
  statement: Four requirements define an adequate multi-domain knowledge-formation framework — path-independence,
    observer heterogeneity, epistemic separation, linguistic implementability — and Bayesian updating,
    AGM revision, Dempster-Shafer theory, and symbolic expert systems each fail at least one structurally;
    the atom-cloud-fact pipeline passes all four.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_RECOLLAPSE
  - P_HETOBS
- id: P_LLMIMPL
  type: proposition
  statement: 'The pipeline is linguistically implementable: its seven principles describe cognitive operations
    (perceive, cluster, weigh, decide, revise) expressible as a natural-language system prompt, so an
    LLM can execute and audit the cloud-to-fact transition as a typed verification contract — unlike frameworks
    requiring explicit probability distributions or formal rule bases.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_RIVALS
  - P_TRANSFER
- id: P_DESIGNSCI
  type: proposition
  statement: The work sits within the design-science tradition (artifact = the pipeline; utility = systems
    natively supporting observer heterogeneity and non-incremental revision), but its primary frame is
    epistemological — the pipeline as a candidate general structure of knowledge formation, not solely
    an IS design recommendation.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P_ARCH1
