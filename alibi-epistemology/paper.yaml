    relationship: "applies"
    critical: false

  - reference: "Nickerson, R. S. (1998). Confirmation bias: A ubiquitous phenomenon in many guises. Review of General Psychology, 2(2), 175-220."
    claim: "Defines confirmation bias as operating through selective attention — the mechanism P1 claims the pipeline structurally prevents"
    relationship: "applies"
    critical: true

  - reference: "Peters, O. (2019). The ergodicity problem in economics. Nature Physics, 15, 1216-1221."
    claim: "Non-ergodicity formalism — motivates the path-dependence of brand conviction rebuild through re-collapse (Principle 6) as sequence-dependent outcome"
    relationship: "applies"
    critical: false

  - reference: "Argyle, L. P., et al. (2023). Out of one, many: Using language models to simulate human samples. Political Analysis, 31(3), 337-351."
    claim: "LLM-as-simulacrum validity framework — methodological template for the human-subject validation proposed to confirm P2's LLM convergence claims"
    relationship: "applies"
    critical: false

results:
  - claim_id: "P1"
    status: not_tested
    notes: >
      The structural argument is presented through architectural analysis: the pipeline's
      multi-source requirement is shown to be a necessary condition for fact collapse,
      logically preventing single-source confirmation. No controlled analyst study has
      been conducted to measure whether the structural prevention translates to lower
      empirical confirmation bias rates.

  - claim_id: "P2"
    status: not_tested
    notes: >
      The four conditions for LLM convergent validity (C1) are analyzed theoretically and
      supported by a prompt-sensitivity observation referenced in Section 7.2. No systematic
      retest reliability comparison between multi-model and single-model conclusions has
      been conducted.

  - claim_id: "P3"
    status: not_tested
    notes: >
      The three error types are defined and their causal mechanism in pipelines without
      stage separation is argued. No coding study of published brand audits has been
      conducted to measure empirical error frequency.

  - claim_id: "P4"
    status: not_tested
    notes: >
      The diagnostic interpretation of cross-model disagreement is argued from the
      re-collapse principle. No empirical study cross-referencing model disagreement
      logs with consumer research ambiguity data has been conducted.

  - claim_id: "D1"
    status: supported
    notes: >
      The seven-principle, three-stage architecture is demonstrated through the working
      financial implementation. All seven principles are operationalized in the alibi
      codebase and shown to produce correct transaction reconciliation on development data.
      The architectural properties (path-independence via re-collapse, epistemic separation
      via distinct storage layers) are verified by implementation.

  - claim_id: "D2"
    status: supported
    notes: >
      The cross-domain mapping (Table 3 in the paper) is demonstrated through qualitative
      analysis of five SBT case-study brands. Each of the seven principles is shown to
      operate identically in the brand domain. Observer heterogeneity is shown to be the
      critical extension that produces the multi-cohort structure of SBT.

  - claim_id: "C1"
    status: supported
    notes: >
      Condition 4 is partially tested via the sensitivity analysis in Section 7.2: five
      prompt reformulations of the same brand analysis produced stable structural
      classifications (dimension identification, coherence type) while producing variable
      numerical scores. Conditions 1-3 are argued from public knowledge of model
      architectures and training procedures.

limitations:
  - description: >
      The atom-cloud-fact pipeline and SBT were developed by the same author, making
      the cross-domain transfer self-confirming. Independent replication of the pipeline
      in a domain not developed by this author (political perception, medical diagnosis)
      would provide stronger evidence of domain-agnosticism.
    severity: major
    addressable: true

  - description: >
      All four propositions (P1-P4) are untested. The paper establishes structural
      arguments and testable predictions but does not report empirical results. Empirical
      testing requires controlled studies that have not yet been conducted.
    severity: major
    addressable: true

  - description: >
      LLM training corpora overrepresent Western, English-language consumer brand discourse.
      Multi-model convergence on prominent brands (Hermes, IKEA, Tesla) may partly reflect
      shared training signal rather than independent structural inference. This bias is
      most severe for globally prominent brands.
    severity: moderate
    addressable: true

  - description: >
      The financial implementation's scoring weights (vendor 0.30, amount 0.40, date 0.20)
      were hand-tuned on approximately 500 development transactions without formal sensitivity
      analysis. Different business contexts would likely require recalibration, and the
      specific weight values should not be treated as theoretically motivated constants.
    severity: minor
    addressable: true

  - description: >
      The path-independence claim for the brand domain requires qualification: financial
      atoms persist, but perceptual atoms decay. Brand conviction rebuild is not fully
      path-independent because the available atom set at re-collapse time is the set of
      signals that survived temporal decay plus crystallized priors — which depends on
      the order and timing of prior encounters.
    severity: moderate
    addressable: false

