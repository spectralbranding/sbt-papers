  - doi: "10.1371/journal.pmed.0020124"
    claim: "Ioannidis (2005): Why Most Published Research Findings Are False — establishes the verification crisis this paper addresses"
    relationship: "applies"
    critical: true

  - doi: "10.1038/sdata.2016.18"
    claim: "Wilkinson et al. (2016) FAIR principles — paper.yaml is positioned as the missing FAIR layer for claims (not just data)"
    relationship: "extends"
    critical: true

  - doi: "10.1126/science.aac4716"
    claim: "Open Science Collaboration (2015): reproducibility of psychological science — documents the replication crisis motivating the verification infrastructure"
    relationship: "applies"
    critical: true

  - doi: "10.5281/zenodo.18945912"
    claim: "Zharnikov (2026a) SBT — one of nineteen papers in the demonstration corpus; foundational node in the dependency graph"
    relationship: "applies"
    critical: false

  - doi: "10.5281/zenodo.18946043"
    claim: "Zharnikov (2026i) OST — one of nineteen papers in the demonstration corpus; OST paper provides the organizational isomorphism for paper specification"
    relationship: "applies"
    critical: false

  - doi: "10.5281/zenodo.19064426"
    claim: "Zharnikov (2026l) Rendering Problem — Section 7.1 frames the specification gap in science as an instance of the rendering problem"
    relationship: "applies"
    critical: false

results:
  - claim_id: "P1"
    status: supported
    notes: >
      Supported by demonstration: the twenty paper.yaml files in the corpus were authored
      at an average of 36 minutes per paper. Papers with clearly stated propositions and
      explicit methodology required 20-25 minutes; papers with implicit claims embedded
      in discursive prose required 45-50 minutes. The dependency structure revealed
      (depth-4 cascade from foundational paper through formal metric, projection bounds,
      cohort boundaries, sphere packing) is argued to be recoverable from the YAML files
      but not from unstructured reading of the same papers. Formal multi-rater validation
      not conducted.

  - claim_id: "P2"
    status: supported
    notes: >
      Supported by demonstration: in the process of writing acceptance criteria for the
      twenty-paper corpus, three claims were identified whose falsification conditions were
      genuinely unclear in the original papers — not because the claims were unfalsifiable
      but because the original papers had not articulated the boundary between confirmation
      and refutation. Writing the paper.yaml prompted revisions to the papers themselves.
      This rate (3/20 = 15% of papers had at least one issue requiring paper revision;
      substantially more had issues requiring YAML clarification without paper revision)
      is consistent with the >=70% flag rate claim at the file level. Formal L1/L2
      sensitivity study not conducted.

  - claim_id: "P3"
    status: supported
    notes: >
      Supported by demonstration: the dependency graph of the twenty-paper corpus reveals
      that the foundational paper (Zharnikov, 2026a) is a critical dependency for 16 of
      the remaining 19 papers. Two bridge papers (formal metric 2026d, diffusion dynamics
      2026j) are identified as bottlenecks with cascading retraction impact nearly as severe
      as retraction of the foundational paper. Formal precision/recall comparison against
      human expert identification not conducted.

  - claim_id: "P4"
    status: supported
    notes: >
      Supported by demonstration: the author's own experience writing twenty paper.yaml
      files. The most time-consuming step in all cases was articulating acceptance criteria.
      Three papers received substantive revisions prompted by the YAML authoring process.
      Self-reported evidence from single author; prospective multi-researcher study not
      conducted.

limitations:
  - description: >
      Single-author corpus. All twenty demonstration paper.yaml files were written by the
      author of the papers themselves, who had complete access to ground truth — intended
      claims, actual methodology, genuine dependencies. The thirty-six minute average may
      not generalize to third-party specification writers. Dependency structures are
      unusually rich because the papers were designed as a coherent program.
    severity: major
    addressable: true

  - description: >
      No adoption data. No evidence that researchers outside the author's program would use
      Paper Spec, find it useful, or encounter anticipated adoption barriers. The four
      propositions are stated but not empirically tested outside the demonstration corpus.
    severity: major
    addressable: true

  - description: >
      Theoretical papers overrepresented. Fifteen of twenty corpus papers are primarily
      theoretical. The standard's expressiveness for empirical research, computational
      research, and meta-analyses is demonstrated by the remaining five but not extensively
      tested. Fields with complex statistical designs (clinical trials, ethnographic research)
      may require standard extensions.
    severity: moderate
    addressable: true

  - description: >
      No institutional validation. Journals would need to accept paper.yaml as supplementary
      material, repositories would need to index it, and tooling would need to validate and
      visualize it. These coordination requirements are achievable but undemonstrated.
    severity: moderate
    addressable: true

  - description: >
      Version 0.1.0 instability. Field names, enum values, and section structures may change
      based on community feedback. Early adopters face specification instability risk,
      partially mitigated by semantic versioning policy and migration commitment described
      in the specification document.
    severity: minor
    addressable: true

