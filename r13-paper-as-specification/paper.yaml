# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026t): R13 — Paper as Specification
spec_version: "0.1.0"

meta:
  title: "Paper as Specification: A Machine-Readable Standard for Scientific Claims"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19210037"
  date: "2026-03-24"
  version: "0.1"
  venue: "Working Paper (Zenodo)"
  license: "CC-BY-4.0"
  keywords:
    - scientific verification
    - machine-readable claims
    - paper specification
    - YAML
    - reproducibility crisis
    - structured science
    - dependency graphs
    - retraction cascades
    - open science
    - verification layers

claims:
  - id: "P1"
    type: proposition
    statement: >
      Expressiveness: A paper.yaml file can represent the core claims, methodology, acceptance
      criteria, and results of any empirical or theoretical paper without loss of essential
      structure. Specifically: for any paper P, a domain expert reading only the paper.yaml
      file can reconstruct the paper's claim structure — the number, type, and logical
      dependencies of claims — with at least 90% agreement with a domain expert reading
      the full paper.
    formal: >
      For all papers P: let Y = yaml(P), let E = domain_expert.
      agreement(E.read(Y).claims, E.read(P).claims) >= 0.90
      where agreement is measured as F1 score on {id, type, dependency_structure} triples.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "P2"
    type: proposition
    statement: >
      Verification utility: Given a corpus of paper.yaml files, automated verification of
      internal consistency (L1) and completeness (L2) can identify specification deficiencies
      that would take a human reviewer minutes to hours to detect. Specifically: L1 and L2
      checks will flag at least one issue in at least 70% of first-draft paper.yaml files,
      where each flagged issue corresponds to a genuine specification deficiency (missing
      acceptance criterion, inconsistent claim status, results not mapped to claims).
    formal: >
      For corpus C of first-draft paper.yaml files:
      |{f in C: L1_check(f) OR L2_check(f) identifies >= 1 genuine issue}| / |C| >= 0.70
      where genuine issue = confirmed by human expert review of the underlying paper.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "P3"
    type: proposition
    statement: >
      Dependency analysis: The dependency graph constructed from paper.yaml files enables
      automated retraction impact analysis. Specifically: when a paper in the corpus is
      designated as retracted, the dependency graph identifies all downstream claims with
      critical: true dependencies on the retracted paper's claims, and this algorithmically
      identified set matches the set a domain expert would identify with at least 85%
      precision and recall.
    formal: >
      Let G = dependency_graph(corpus). Let R = retracted_paper.
      Let A = {p: p in G AND critical_dep(p, R)} (algorithmic set).
      Let H = {p: domain_expert identifies p as critically dependent on R} (human set).
      precision(A, H) >= 0.85 AND recall(A, H) >= 0.85.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "P4"
    type: proposition
    statement: >
      Cognitive value: The specification overhead of writing a paper.yaml file (estimated
      thirty to sixty minutes per paper) is dominated by the cognitive work of articulating
      claims and acceptance criteria — work that improves the paper itself. Specifically:
      researchers who write paper.yaml files for their papers before submission will report
      that the process identified at least one substantive issue (unclear claim, missing
      falsification criterion, unacknowledged limitation) in at least 60% of cases.
    formal: >
      For sample S of researchers writing paper.yaml pre-submission:
      |{r in S: r reports >= 1 substantive issue identified via yaml process}| / |S| >= 0.60
      where substantive issue = issue that affected the final paper (confirmed by author).
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

methodology:
  type: mixed
  design: >
    Two-part methodology: (1) theoretical framework construction arguing that the verification
    crisis is a specification crisis, supported by historical pattern analysis (printing press
    + scientific method; internet + structured data; LLMs + paper specification). The standard
    is presented as the specification solution. (2) Demonstration on a twenty-paper corpus:
    nineteen papers in the SBT (Zharnikov, 2026a) and OST (Zharnikov, 2026i) research programs
    plus the present paper. All twenty paper.yaml files were written manually without LLM
    assistance over approximately twelve hours (average thirty-six minutes per paper).
    The demonstration reveals dependency structures, self-citation patterns, and specification
    deficiencies (three claims whose falsification conditions were genuinely unclear, prompting
    paper revisions) that are invisible in the unstructured originals. Five verification layers
    (L0-L4) are defined: schema validation, internal consistency, completeness, plausibility,
    and external integrity (retraction cascade analysis, contradiction detection).
  analysis:
    method: >
      Historical pattern analysis (two prior generation-specification cycles). Review of
      existing partial solutions (registered reports, FAIR, Semantic Scholar, micropublications,
      nanopublications, JATS XML, RO-Crate, CRediT) identifying the missing layer. Standard
      design (seven design principles, seven questions answered by paper.yaml). Corpus
      demonstration (20 papers, dependency graph analysis, bottleneck identification, claim
      density measurement, falsification gap identification). Connection to rendering problem
      (Zharnikov, 2026l) in Section 7.1.
    software: "YAML (paper specification); JSON Schema (validation); standard YAML parser"

acceptance:
  - claim_id: "P1"
    criterion: >
      Multi-rater study: recruit domain experts in at least two fields (e.g., marketing science
      and organization theory). For each field, randomly sample 10 papers. Have Expert A read
      only the paper.yaml; have Expert B read the full paper. Measure agreement on claim
      structure (number of claims, claim types, dependency relationships) using F1 score.
      Target: F1 >= 0.90 in both fields.
    falsification: >
      Average F1 agreement across experts and fields falls below 0.75 (substantially missing
      the 0.90 criterion), indicating that paper.yaml files systematically misrepresent the
      papers they summarize — either omitting important claims or adding claims not in the paper.
      This would suggest the standard lacks expressiveness for the tested paper types.

  - claim_id: "P2"
    criterion: >
      Collect first-draft paper.yaml files from researchers who are new to the standard.
      Run L1 (internal consistency) and L2 (completeness) checks automatically. Have human
      experts review the same papers to identify genuine specification deficiencies. Measure:
      (a) what fraction of files receive at least one automated flag; (b) what fraction of
      automated flags correspond to genuine deficiencies confirmed by expert review. Target:
      70% of files flagged, and >= 80% of flags confirmed as genuine.
    falsification: >
      Fewer than 40% of first-draft paper.yaml files receive automated flags, suggesting
      that researchers naturally write well-specified papers even without the standard's
      prompting — or that L1/L2 checks are not sensitive enough to detect real deficiencies.

  - claim_id: "P3"
    criterion: >
      Construct the dependency graph from the twenty-paper corpus. Designate one foundational
      paper as simulated retraction. Run automated traversal to identify all papers with
      critical: true dependency paths. Compare to human expert identification of the same
      set. Target: precision >= 0.85 and recall >= 0.85.
    falsification: >
      Precision or recall falls below 0.70, indicating that the critical: true annotations
      in paper.yaml files do not reliably capture which dependencies are genuinely load-bearing
      for downstream claims — either because authors over-annotate (low precision) or under-
      annotate (low recall) criticality.

  - claim_id: "P4"
    criterion: >
      Prospective study: recruit researchers who agree to write paper.yaml files before
      submitting their next paper. At submission, ask them: "Did writing the paper.yaml
      identify at least one substantive issue you then addressed in the paper?" Target:
      >= 60% of respondents report yes.
    falsification: >
      Fewer than 30% of researchers report substantive issue identification, suggesting that
      the cognitive work of articulating claims and acceptance criteria does not reveal issues
      that authors had not already considered — or that the thirty-to-sixty minute authoring
      overhead is not well spent on improving paper quality.

data:
  available: false
  url: ""
  notes: >
    No primary survey data collected. The twenty-paper demonstration corpus consists of
    paper.yaml files authored by the author of this paper (Zharnikov) for his own research
    program. This is a single-author, single-program demonstration, not a multi-author,
    multi-field validation study. Authoring time data (average 36 minutes; range 20-50 minutes)
    is self-reported.

code:
  available: true
  url: "https://github.com/spectralbranding/paper-spec"
  notes: >
    The paper-spec repository contains: SPECIFICATION.md (full standard description),
    JSON Schema for paper.yaml validation (schema/paper-schema.json), reference validator
    implementation, and the twenty-paper demonstration corpus in examples/. The validator
    implements L0 (schema validation) and L1 (internal consistency) checks. L2 (completeness)
    requires LLM assistance and is not yet implemented as a standalone tool.

replication:
  feasible: true
  estimated_cost: "< $2,000 USD (multi-rater study, sample of 20 papers per field)"
  estimated_time: "3-6 months"
  requirements:
    - "paper-spec repository (spectralbranding/paper-spec) for standard specification and validator"
    - "Domain experts willing to read and rate paper.yaml files against full papers"
    - "A sample of papers with pre-existing paper.yaml files, or researchers willing to write new ones"
    - "Statistical software for inter-rater agreement analysis (kappa, F1)"

