claims:
  - id: "P1"
    type: proposition
    statement: >
      Brand spectral profile estimation from multiple observer cohorts is a weighted least-squares
      positioning problem whose mathematical structure is exactly analogous to GPS satellite
      positioning. Observer bias enters as a scalar offset unknown per cohort that is identified
      simultaneously with the 8-dimensional brand position via a normal equations system. The system
      is identifiable if and only if the observer weight matrix W has rank ≥ 8 (full-rank condition
      for 8-dimensional targets).
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "P2"
    type: proposition
    statement: >
      Perception DOP (PDOP) is a computable scalar metric derived from the Gram matrix (W^T W)^{-1}
      that quantifies pre-study measurement precision for an 8-dimensional brand position given a
      set of observer cohorts with known spectral weight profiles. Lower PDOP indicates better
      geometric resolution. PDOP enables principled cohort selection before data collection,
      replacing demographic heuristics with geometric optimization.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["P1"]

  - id: "P3"
    type: proposition
    statement: >
      Differential brand measurement — a calibration protocol using reference brands with known
      spectral profiles (Hermes, IKEA, Patagonia per Zharnikov 2026a) — estimates systematic
      observer bias per cohort and enables removal of that bias from target brand measurements.
      The protocol separates brand position change from observer drift in longitudinal studies,
      addressing a confound that current fixed-effects approaches cannot resolve structurally.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["P1"]

  - id: "P4"
    type: conjecture
    statement: >
      Multi-constellation positioning — combining human observer cohorts, AI observers, and
      behavioral proxies that possess structurally non-collinear spectral weight profiles — reduces
      overall Perception DOP below what any single observer constellation achieves alone. The
      Economic Default mechanism of AI observers (over-weighting Economic and Semiotic dimensions)
      is not a defect but a structured bias that differential correction can address, yielding
      dimensionally complementary positioning precision.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: ["P2", "P3"]

  - id: "P5"
    type: conjecture
    statement: >
      The admissibility corridor framework of Medesani & Macdonald (2026) extends to 8-dimensional
      brand positioning: a brand's position is admissible if and only if it satisfies the tri-binding
      conditions within per-dimension corridor bounds defined by governance specifications. The
      sensitivity plateau property ensures robust anomaly detection: deviations from the corridor
      signal either genuine brand events or observer infrastructure changes, distinguishable by
      calibration brand stability.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "P6"
    type: conjecture
    statement: >
      Brand perception trajectories are estimable via a Perception Kalman filter that jointly tracks
      the 8-dimensional spectral profile and its first derivative (perception velocity). The filter's
      prediction error provides a real-time anomaly detector: deviations exceeding a threshold —
      calibrated via the sensitivity plateau of Medesani & Macdonald (2026) — signal either genuine
      brand events or observer infrastructure changes, distinguishable by calibration brand stability.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: ["P5"]

methodology:
  type: mixed
  design: >
    Geometric framework with empirical demonstration. The paper develops the GPS-SBT mapping as a
    precise observation model (Sections 2–5), extends it to dynamic brand tracking (Sections 6–8),
    and demonstrates key predictions using the R15 dataset (Zharnikov 2026v): 4,860 API calls across
    six LLMs scoring 15 brands on eight SBT dimensions. The framework is anchored in established
    GPS positioning theory (Kaplan & Hegarty 2017) and the multi-dimensional brand perception
    formalism of Spectral Brand Theory (Zharnikov 2026a).
  analysis:
    method: >
      Geometric analysis with computational validation. The paper derives the identifiability
      conditions under which 8-dimensional brand positioning is unique (Section 5, Theorem 2),
      computes Perception DOP for the R15 observer constellation (Section 9.2), demonstrates
      differential correction on canonical calibration brands (Section 9.3), and reinterprets the
      R15 finding on conditional metamerism as a DOP-driven underdetermination effect (Section 9.4).
    software: >
      Python for DOP computation from weight matrices. All numerical results are derived from the
      R15 dataset and are reproducible via spectralbranding/sbt-papers/r15-ai-search-metamerism/.

acceptance:
  - claim_id: "P1"
    criterion: >
      Implement the least-squares observation model for three concrete brand measurement scenarios:
      (a) single observer cohort vs. single brand (underdetermined, single equation); (b) two observer
      cohorts vs. single brand (determined, two equations); (c) six observer cohorts vs. eight-dimensional
      brand position (overdetermined, normal equations). Verify that in cases (b) and (c), the
      mathematical structure matches the GPS pseudorange equations exactly (with observer bias as clock
      error analog). Test: produce three worked examples in export/ with explicit matrix derivations.
    falsification: >
      The mathematical mapping fails to produce well-posed least-squares problems for any of the three
      scenarios, or the observer bias term does not enter as a scalar offset unknown as claimed.

  - claim_id: "P2"
    criterion: >
      Compute PDOP for (a) the six-model R15 constellation (AI-only), (b) subsets of 2, 3, 4, 5 models,
      and (c) synthetic observer weight profiles designed to have high vs. low dimensional diversity.
      Verify that PDOP decreases monotonically as models are added, and that profiles designed for high
      diversity (e.g., one model weighting Temporal/Cultural heavily, another weighting Economic/Social
      heavily) produce lower PDOP than homogeneous profiles. Test: produce PDOP computation code and
      validation against GPS DOP reference implementations.
    falsification: >
      PDOP fails to decrease when additional observer cohorts are added, or fails to distinguish between
      high-diversity and low-diversity observer configurations.

  - claim_id: "P3"
    criterion: >
      Apply differential correction to the R15 dataset using Hermes, IKEA, and Patagonia as calibration
      brands. Measure: (a) per-model systematic error vector; (b) variance of triangulated brand position
      before and after correction for three target brands not used in calibration; (c) correlation between
      model variance and the magnitude of systematic error in that model's Economic dimension. Target:
      variance reduction ≥ 15% for at least two target brands; correlation ≥ 0.60 between Economic
      Default magnitude and cross-model variance.
    falsification: >
      Differential correction produces no consistent variance reduction, or the variance reduction is
      inversely correlated with systematic error magnitude (suggesting the protocol makes predictions
      worse, not better).

  - claim_id: "P6"
    criterion: >
      Implement the Perception Kalman filter on synthetic longitudinal brand data where ground truth is
      known (simulated brand position drifting + simulated observation noise). Measure: (a) prediction
      error as a function of signal-to-noise ratio; (b) sensitivity of anomaly detection threshold to
      calibration choices; (c) rate of false positives and false negatives for injected anomalies. Target:
      false positive rate ≤ 5%; anomaly detection sensitivity ≥ 80% when anomaly magnitude equals 0.5
      standard deviations of observation noise.
    falsification: >
      Prediction error does not decrease over time (suggesting the filter is not learning state dynamics),
      or anomaly detection threshold cannot be calibrated to simultaneously achieve <5% false positive
      and >80% true positive rates.

