methodology:
  type: mixed
  design: 'Compute PDOP = sqrt(trace((W^T W)^{-1})) per cohort configuration; estimate brand position
    by OLS; regress observed MSE on σ²·PDOP² (and log RMSE on log PDOP) across the 2,000 trials with bootstrap
    CIs (1,000 resamples). Differential correction: for each calibration brand compute e_k = y_{k,b} −
    x_b against canonical profiles (Hermès/IKEA/Patagonia), average across the three calibration brands
    to a per-model systematic-error vector, then subtract from target-brand scores before triangulation;
    compare corrected vs uncorrected cross-model variance. Simplex-constrained PDOP optimization at the
    N=9 minimum case via Nelder-Mead with 100 restarts; perturbation analysis (Gaussian noise of s.d.
    ε on the optimal W) to map the sensitivity plateau.'
  analysis:
    software: R17_pdop_simulation.py (SEED=42; uv run --with numpy,scipy)
    method: Python 3.12 + uv (numpy, scipy)
acceptance:
- claim_id: P1
  criterion: Holds if (Paper Proposition 1) For N observer cohorts with spectral weight profiles w_1.
  falsification: P1 fails if PDOP does not predict estimation variance relative to a known ground-truth
    profile across many random cohort configurations, multiple brands, and multiple estimation conditions.
- claim_id: P2
  criterion: Holds if (Paper Proposition 2) Differential brand measurement — using calibration brands
    with known spectral profiles to estimate each cohort's systematic error and subtract it from target-brand
    assessments — reduces systematic cross-cohort variance.
  falsification: P2 fails if calibration correction does not reduce cross-cohort variance for target brands
    — i.e. if calibration-brand bias is uncorrelated with target-brand bias within a cohort — assessed
    across multiple targets and configurations.
- claim_id: P3
  criterion: Holds if (Paper Proposition 3) A brand's 8-D spectral profile is uniquely identifiable from
    N cohorts iff (a) for collapsed (scalar) observations, N ≥ 9 and the cohort weight vectors span R^8;
    (b) for full 8-D observations, N ≥ 2 and the weight matrices are linearly independent.
  falsification: P3 fails if unique profiles can be recovered from fewer cohorts than specified — e.g.
    if brand profiles are constrained to a lower-dimensional manifold, reducing the effective degrees
    of freedom below eight.
- claim_id: C4
  criterion: Holds if (Paper Conjecture 4) Multi-constellation positioning — combining human cohorts,
    AI observers, and behavioral proxies whose weight profiles are geometrically non-collinear — is expected
    to yield lower PDOP than any single constellation alone.
  falsification: C4 fails if adding AI/behavioral observer data to human-cohort data does not reduce PDOP
    — i.e. if the added constellations are collinear with human profiles and supply no new geometric information.
- claim_id: C5
  criterion: 'Holds if (Paper Conjecture 5) A brand position is admissible iff three independent bindings
    hold simultaneously: geometric (measured profile within the Brand Function''s admissible corridor
    C ⊂ R^8), governance (a valid Brand Function specification + an enforcement mechanism exists), and
    temporal (the measured trajectory is coherent with the brand''s historical path).'
  falsification: C5 fails if brands satisfying only one or two bindings show equivalent long-term brand-health
    outcomes to fully admissible brands.
- claim_id: C6
  criterion: Holds if (Paper Conjecture 6) Brand perception trajectories are estimable via a Perception
    Kalman filter jointly tracking the 8-D spectral profile and its first derivative (perception velocity);
    its prediction error is a real-time anomaly detector whose threshold, calibrated via the corridor
    sensitivity plateau, distinguishes genuine brand events from observer- infrastructure changes (separable
    by calibration-brand stability).
  falsification: C6 fails if the filter's prediction errors show no correlation with actual brand events
    (launches, crises, repositioning campaigns).
