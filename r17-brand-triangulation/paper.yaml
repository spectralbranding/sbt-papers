limitations:
- description: 'The human observer constellation is absent: the empirical demonstration is AI-only (Option
    A). The multi-constellation DOP-reduction conjecture (C4) cannot be fully tested without human-cohort
    data with demonstrably different weight profiles (Option B).'
  severity: moderate
  addressable: true
- description: The data are a single measurement epoch; R15 Runs 1–4 vary experimental conditions, not
    time. The Perception Kalman filter (C6) and trajectory framework (§8) require longitudinal data and
    remain untested.
  severity: moderate
  addressable: true
- description: 'Circularity asymmetry: unlike GPS, where satellite positions are independently known from
    orbital mechanics, cohort weight profiles must be estimated from the same observer pool (or PRISM-B
    applied to it) whose measurements then triangulate the brand. The GPS analogy is precise on the geometric
    side and weaker on the absolute-accuracy side; calibration profiles are framework-internal, requiring
    only stability, not external correctness.'
  severity: moderate
  addressable: true
- description: The linear observation model is a first-order approximation; bounded scales, ceiling/floor
    and anchoring/order effects may induce nonlinearities beyond the bias term. Six AI cohorts may sit
    below the collapsed-case identifiability floor (N≥9), though the 8-D observation case lowers the requirement
    to N≥2.
  severity: moderate
  addressable: true
