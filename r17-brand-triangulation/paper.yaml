results:
  - claim_id: "P1"
    status: supported
    notes: >
      Supported by the derivation in Section 3. The observation model is formalized as a weighted
      least-squares system x* = argmin_x ||W(y - x) - c||^2, where W is the observer weight matrix,
      y is the vector of (biased) brand convictions from all cohorts, x is the target 8D brand profile,
      and c is the per-cohort bias vector. The normal equations and their rank properties are derived
      explicitly (Theorem 1, Theorem 2).

  - claim_id: "P2"
    status: supported
    notes: >
      Supported by empirical computation on R15 data (Section 9.2). PDOP for the six-model constellation
      is 8.341. PDOP for all six-model subsets shows monotonic improvement: dropping any single model
      raises PDOP. Per-dimension DOP values quantify underdetermination in Cultural (3.21) and Temporal
      (3.14) dimensions. The pattern is consistent with the geometric diversity hypothesis: models with
      diverse weight profiles contribute more to DOP reduction.

  - claim_id: "P3"
    status: supported
    notes: >
      Supported by differential correction demonstration on Hermes, IKEA, Patagonia (Section 9.3).
      Per-model systematic error vectors are computed; largest error magnitudes are in the Economic
      dimension (mean error magnitude 2.34 points). Variance reduction after correction: 18% for target
      brands not in calibration set. Correlation between Economic Default magnitude and cross-model
      variance: r = 0.67, consistent with the mechanistic prediction.

  - claim_id: "P4"
    status: proposed
    notes: >
      Not yet tested. Multi-constellation DOP reduction requires empirical data from human cohorts with
      known spectral weight profiles that differ structurally from AI observers. This is the primary
      limitation of the Option A demonstration (Section 9.5). An Option B study with 5+ human cohorts is
      required to validate P4.

  - claim_id: "P5"
    status: proposed
    notes: >
      Partially specified by integration with Medesani & Macdonald (2026). The 8-dimensional corridor
      framework is conceptually sound (Section 7) but requires formal proof of sensitivity plateau
      existence in 8D, which is identified as an open problem (Section 11). The tri-binding admissibility
      conditions are formalized in Section 7.1.

  - claim_id: "P6"
    status: proposed
    notes: >
      Not yet tested. Perception Kalman filter is specified in Section 8.3 with the filter's state space,
      prediction, update, and anomaly detection properties. Empirical validation requires longitudinal
      brand measurement data (same observer constellation scoring the same brands across 3+ time periods),
      which is not available in R15 (Runs 1–4 vary experimental conditions, not time).

limitations:
  - description: >
      The human observer constellation is absent. Human cohort data with demonstrably distinct spectral
      weight profiles are required to test P4 (multi-constellation DOP reduction) and validate differential
      correction against an external standard. Option B — a survey study with 5+ demographically diverse
      cohorts scoring the same 15 brands — remains the necessary empirical extension.
    severity: major
    addressable: true

  - description: >
      The present data constitute a single measurement epoch. Proposition 6 (Perception Kalman filter) and
      the trajectory framework require longitudinal data (minimum two epochs). Runs 1–4 of R15 vary
      experimental conditions, not time; they do not constitute a temporal panel.
    severity: major
    addressable: true

  - description: >
      Six AI observer models may produce PDOP estimates that are optimistic relative to a human cohort
      constellation. All six LLMs are "clustered" in the Experiential-Economic region of weight space,
      leaving Cultural and Temporal dimensions poorly resolved (PDOP 3.14 and 3.21, respectively). A
      human cohort with heavy Cultural weighting would reduce these DOP values substantially.
    severity: moderate
    addressable: true

  - description: >
      Calibration brand validity is untested across cultural contexts. The canonical profiles of Hermes,
      IKEA, and Patagonia are established in Western markets but may vary substantially in Asian and
      African contexts. Cross-cultural replication is a prerequisite for global application.
    severity: moderate
    addressable: true

  - description: >
      The 8-dimensional corridor proof is incomplete. Medesani & Macdonald (2026) establish the corridor
      in 1D; extension to 8D requires proof of sensitivity plateau existence and characterization of the
      multi-dimensional contraction operator, both identified as future work in Section 11.
    severity: moderate
    addressable: true

  - description: >
      Temporal stability of Perception DOP is empirically unknown. As observer cohorts' weight profiles
      drift over time — tastes evolve, LLMs are retrained — the W matrix changes, and pre-study PDOP
      computations may not hold at measurement time. Magnitude and timescale of AI observer weight drift
      across retraining cycles requires empirical characterization.
    severity: minor
    addressable: true

