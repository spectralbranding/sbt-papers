results:
- claim_id: P1
  status: supported
  notes: 'Under the linear observation model, PDOP is a sharp predictor of RMSE: the log-log slope of
    .995 (R²=.994, ρ=.996) confirms the GPS-theory power law MSE = σ²·PDOP², holding per-dimension (ρ
    .978–.990) and across two orders of magnitude in PDOP. Observer geometry dominates measurement precision
    (24-fold RMSE spread across PDOP quartiles at fixed noise). This is a mathematical confirmation under
    the model''s data-generating process; transfer to real cohort responses is an empirical question (Option
    B).'
- claim_id: P2
  status: supported
  notes: On the R15 AI constellation, the aggregate weight matrix is dominated by Experiential/Semiotic/Economic,
    leaving Cultural and Temporal the least-resolved (highest per-dimension DOP); differential correction
    reduces cross-model variance most on Economic (where the Economic Default is active) and least on
    Experiential, and a Brand Function specification cuts local-brand DCI by 20% — geometric evidence
    that metamerism is an observer-infrastructure property resolvable by added dimensional information.
- claim_id: P_metamerism
  status: supported
  notes: On the R15 AI constellation, the aggregate weight matrix is dominated by Experiential/Semiotic/Economic,
    leaving Cultural and Temporal the least-resolved (highest per-dimension DOP); differential correction
    reduces cross-model variance most on Economic (where the Economic Default is active) and least on
    Experiential, and a Brand Function specification cuts local-brand DCI by 20% — geometric evidence
