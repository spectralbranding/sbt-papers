# DATA_MANIFEST.yaml — R17: Brand Triangulation
# External data dependencies per the Research-as-Repository protocol

data_manifest:
  - id: "r15-experiment-data"
    description: >
      R15 experimental dataset: 4,860 API calls across six LLMs (Claude Sonnet 4.6, GPT-4o, Gemini
      2.5 Flash, DeepSeek V3, Qwen 3 30B, Gemma 4 27B) scoring 15 brand pairs on eight SBT dimensions.
      Runs 1–3 standard weight elicitation; Run 4 with Brand Function specifications for local brands.
    archive: "GitHub"
    repository: "spectralbranding/sbt-papers/r15-ai-search-metamerism/experiment/"
    format: "CSV (weight profiles), JSON (API metadata)"
    access: public
    doi: "10.5281/zenodo.19422427"  # R15 paper DOI; data available in repository
    citation: "Zharnikov (2026v)"

  - id: "canonical-brand-profiles"
    description: >
      Canonical spectral brand profiles from Spectral Brand Theory (Zharnikov 2026a):
      Hermes [9.5, 9.0, 7.0, 9.0, 8.5, 3.0, 9.0, 9.5]
      IKEA [8.0, 7.5, 6.0, 7.0, 5.0, 9.0, 7.5, 6.0]
      Patagonia [6.0, 9.0, 9.5, 7.5, 8.0, 5.0, 7.0, 6.5]
      Erewhon [7.0, 6.5, 5.0, 9.0, 8.5, 3.5, 7.5, 2.5]
      Tesla [7.5, 8.5, 3.0, 6.0, 7.0, 6.0, 4.0, 2.0]
    archive: "Zenodo"
    repository: "spectralbranding/sbt-papers"
    format: "Documented in SBT paper Table 2"
    access: public
    doi: "10.5281/zenodo.18945912"
    citation: "Zharnikov (2026a)"
    notes: >
      These profiles are used as calibration brands in Section 9.3. The first three (Hermes, IKEA,
      Patagonia) are used for differential correction calibration; all five are part of the R15
      dataset used for validation.

  - id: "medesani-macdonald-corridor"
    description: >
      Medesani & Macdonald (2026) invariant corridor framework: mathematical formalizations of
      admissibility conditions, tri-binding theorem, sensitivity plateau, and governance protocols.
      Used for integration in Section 7 (admissibility-based brand positioning) and Section 8.3
      (anomaly detection via Kalman filter).
    archive: "Zenodo"
    repository: "Medesani & Macdonald (2026)"
    format: "PDF (paper) + supporting materials"
    access: public
    doi: "10.5281/zenodo.18822552"
    citation: "Medesani & Macdonald (2026)"

  - id: "gps-positioning-references"
    description: >
      Standard GPS positioning theory texts and papers used for DOP formalism, multi-constellation
      fusion, and Kalman filtering precedents.
    archive: "Academic literature"
    key_references:
      - "Kaplan & Hegarty (2017) Understanding GPS/GNSS (3rd ed.)"
      - "Misra & Enge (2011) Global Positioning System: Signals, Measurements, and Performance"
      - "Mitchell, Bayen & Tomlin (2005) on Hamilton-Jacobi reachable sets"
    format: "Books, journal articles"
    access: public (via institutional access)
    notes: >
      These provide the formal machinery for DOP computation, differential DGPS correction, and
      Kalman filtering. All are cited in the References section.

no_new_data_collection: >
  This paper reanalyzes the R15 dataset (Zharnikov 2026v). No new experiments or surveys were
  conducted for this work. The framework is theoretical; the empirical demonstration is Option A
  (AI-only constellation). Option B (human cohort validation) is identified as future work
  (Section 11).

reproducibility:
  - step: "DOP computation"
    data: "R15 weight matrix from sbt-papers/r15-ai-search-metamerism/"
    software: "Python numpy/scipy"
    expected_result: "PDOP = 8.341 for full six-model constellation; per-dimension DOP values reported in Table 1, Section 9.2"

  - step: "Differential correction"
    data: "R15 profiles for Hermes, IKEA, Patagonia (calibration brands)"
    software: "Python; subtract per-model error vector from target brand scores"
    expected_result: "Variance reduction ~18% for non-calibration target brands; correlation r ≥ 0.60 between Economic Default magnitude and cross-model variance"

  - step: "Conditional metamerism interpretation"
    data: "R15 Run 2–4 DCI values (Zharnikov 2026v) + R15 Run 4 Brand Function specifications"
    software: "Direct calculation; no external dependencies"
    expected_result: "Local brand DCI drops from 0.355 to 0.284 with specifications (20% reduction), consistent with DOP improvement from reduced underdetermination"

data_availability_statement: >
  The R15 dataset is publicly available in spectralbranding/sbt-papers/r15-ai-search-metamerism/
  (GitHub, DOI: 10.5281/zenodo.19422427). All scripts and intermediate results needed to reproduce
  the Section 9 empirical demonstration are included in that repository. Canonical brand profiles
  are provided in Table 9.2 of this paper and in Zharnikov (2026a) Table 2.
