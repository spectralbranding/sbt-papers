  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand activation
  - audience reachability
  - perceptual cohort
  - self-selection
  - broadcast channel
  - comparison of experiments
  - contextual advertising
  - post-cookie targeting
  abstract: 'The correspondence principle of brand management prescribes acting on the highest-payoff
    dimension and cohort, but presumes a perceptual cohort is reachable without showing how. A cohort
    defined by perceptual proximity has no native media address, unlike the channels, cookies, and lookalike
    segments of conventional activation. This applied companion closes that gap. It demonstrates that
    being actionable decomposes into three measurable bridges, unified by a measurement-to-activation
    handoff contract: the instrument supplies the target and the cost of reaching it; the manager runs
    the campaign. The first bridge emits a signal strong on the dimension a cohort is sensitive to and
    lets self-selection route it, requiring no address. Formalized on a degraded broadcast channel, the
    self-selection sharpness equals the same off-axis variance the parent paper counts as a perception-metamerism
    loss: the targeting bug becomes a self-selection filter. The second traces reflections back to the
    surfaces where each perception was found. The third maps the cohort to addressable proxies and makes
    measurable the garbling loss of doing so. A calibrated simulation and two case studies show the contract
    selecting bridges by distinctiveness. Because the address-free bridge is where post-cookie activation
    is already moving, the reach answer is a structural tailwind, not a patch.'
claims:
- id: P1
  type: proposition
  statement: 'The handoff-contract rule. For a target (dimension, cohort), the measurement->activation
    contract emits (i) the recommended bridge mechanism and (ii) its quantified cost: dimension-distinct
    cohort (sin^2(beta) > threshold) -> broadcast-a-dimension (b), cost = predicted spill; reflections
    clustered on few live surfaces -> provenance-as-address (c), cost = coverage bias; else -> minimal-loss
    proxy (a), cost = L(P*). SBT supplies target + bridge cost; media execution is the management layer.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: Resonance over-index (broadcast-a-dimension). A signal emitted strong on dimension d produces
    salience/response for observer i monotone in <signal_d, w_i>; therefore a dimension-strong creative
    over-indexes on the dimension-d-sensitive cohort relative to a dimension-neutral control, and the
    magnitude of over-index is increasing in the cohort's dimensional distinctiveness sin^2(beta) — the
    SAME quantity that is the perception-metamerism LOSS in 2026au. The mis-targeting bug is, read forward,
    the self-selection filter; formally a degraded broadcast channel (Cover 1972) with channel quality
    |<signal, w_i>| and resonance bandwidth = sin^2(beta).
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: Proxy-join loss ordering. Targeting cohort C through an addressable proxy P is a Blackwell
    garbling of targeting on the perceptual cohort directly; the expected decision loss L(P) is non-negative
    and ordered by the informativeness of P about cohort membership, with a minimal-loss proxy P* identifiable
    from the mutual information I(C; P). When even P* leaves L(P*) above the predicted spill of route
    (b), the contract (P1) routes to (b) instead — making the reach choice a measured comparison, not
    a default to addressability.
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
methodology:
  type: empirical
  design: 'PRIMARY empirical spine: two-cell field experiment — dimension-strong vs dimension-neutral
    creative delivered via contextual slots, linked to PRE-MEASURED individual perceptual profiles (PRISM-style
    elicitation), >=1,500 complete profiles per cell, >=4 product categories spanning involvement x sin^2(beta).
    Tests P2 (resonance over-index) at the individual level. EXECUTED empirical spine (the realized path;
    no data partnership available, so the JAR-acceptable methods-companion fallback rather than ME1).
    Calibrated broadcast-channel Monte Carlo: the cohort single-dimension distinctiveness distribution
    is calibrated to an OBSERVED public proxy — the five canonical SBT brand profiles (the corpus''s public
    anchors), NOT a non-public perception instrument — by the concentration of each centered profile on
    its dominant dimension; cohorts are drawn from the method-of-moments Beta and run through the M1 two-type
    model; over-index, effect size, and routing fraction are reported with bootstrap 95% CIs. Two case
    studies instantiate the P1 contract: a maintenance campaign (established distinctive brand, Hermes)
    and a category-creation campaign (undifferentiated new entrant, distinctiveness at the 1/8 floor).
    Supports P1 (contract bridge-selection) and P2 (resonance over-index). Proxy-join loss estimation:
    mutual information I(C;P) and decision-loss L(P) between perceptual cohort membership and addressable
    proxy features in the reflection corpus / panel; identify P* and bound unobservables.'
acceptance:
- claim_id: P1
  criterion: Holds if the handoff-contract rule.
  falsification: A setting where a single fixed bridge strictly dominates the contract's selection across
    all cohort geometries would refute the value of conditioning the bridge on cohort geometry.
- claim_id: P2
  criterion: Holds if resonance over-index (broadcast-a-dimension).
  falsification: A dimension-strong creative that does NOT over-index on the dimension-sensitive cohort
    vs a dimension-neutral control (over-index CI includes zero) in a positive-scope category (C3) would
    refute the resonance mechanism.
- claim_id: P3
  criterion: Holds if proxy-join loss ordering.
  falsification: Observe targeting via a proxy strictly outperform targeting on the true perceptual cohort
    (same budget) outside measurement-cost differences — Blackwell forbids this on information alone,
    so a robust such finding would refute P3.
