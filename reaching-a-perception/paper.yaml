meta:
  title: 'Reaching a Perception: From Perceptual Cohort to Reachable Audience'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.20765556
