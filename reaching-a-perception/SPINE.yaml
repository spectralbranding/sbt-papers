spine_version: "0.2"
paper_key: "2026av"
title: "Reaching a Perception: From Perceptual Cohort to Reachable Audience"
self_citation_key: "zharnikov-2026av-reaching-a-perception"
concept_doi: "10.5281/zenodo.20765556"   # reserved 2026-06-19
version_doi: "10.5281/zenodo.20765557"   # v1.0.0
thesis: |
  The correspondence principle (2026au) shows that an aggregate brand score is a Blackwell
  garbling of the eight-dimensional perception cloud and prescribes acting on the highest-
  payoff (dimension, cohort) — the directed-intervention rule P6. But P6 presumes a cohort
  is ACTIONABLE without showing it is REACHABLE: a cohort defined by perceptual proximity has
  no native media address, unlike the addressable audiences (channels, cookies, lookalikes)
  of traditional activation. This applied companion closes that gap. "Actionable" decomposes
  into three measurable bridge mechanisms from perception space to action, unified by a
  measurement->activation HANDOFF CONTRACT consistent with SBT's metrology posture (the
  astronomer supplies coordinates and the bridge cost; the manager flies):
    (b) BROADCAST-A-DIMENSION — emit on the dimension the cohort is sensitive to and let
        self-selection route the signal; zero address required. Formally a separating signal
        on a degraded broadcast channel (Cover 1972): the observer's channel quality is the
        inner product of the signal vector with the observer's spectral-sensitivity vector,
        so off-peak observers receive a metamer-to-null. The self-selection sharpness equals
        the same sin^2(beta) that the parent paper counts as a perception-metamerism LOSS:
        the targeting BUG becomes a self-selection FILTER. This is the headline.
    (c) PROVENANCE-AS-ADDRESS — the atomic-perception architecture's atoms carry the surfaces (and recency)
        where each perception was found; a cohort of atoms traces back to re-reachable channels.
    (a) PERCEPTION->PROXY JOIN — map the cohort to addressable proxies and QUANTIFY the
        Blackwell-garbling decision loss L(P) of doing so; report the minimal-loss proxy P*.
  The reach answer is a structural TAILWIND, not a patch: the only route needing an address
  (a) is a measurable, lossy projection, and the address-free route (b) is exactly where post-
  cookie activation is already heading (the industry's own Topics-API cohort pivot), so SBT does
  not depend on the identity-addressability the advertising industry is losing. The individual
  observer spectral profile is the primitive; cohorts are derived clusters in that space.

# ---------------------------------------------------------------------------
# Boundary conditions (cannot be relaxed — the theory does not apply outside them)
# ---------------------------------------------------------------------------
boundary_conditions:
  - id: C1
    statement: "Inherits 2026au C1-C2: a brand is an observer-completed probability measure mu on the eight-dimensional SBT perception manifold; the managerial problem is a statistical decision problem with SBT supplying the experiment and the manager choosing the action. Reach is the delivery of an action to the observers whose perceptions constitute a target cohort."
  - id: C2
    statement: "The individual observer spectral profile w (a sensitivity weight vector over the eight dimensions) is the primitive; a perceptual cohort is a derived cluster of observers/atoms in profile-and-perception space. Results are stated at the individual level and aggregated to cohorts; settings with no recoverable individual profile (e.g. a single undifferentiated aggregate) are out of scope for the resonance mechanism (b)."
  - id: C3
    statement: "Scope conditions for broadcast-a-dimension (b) — POSITIVE: (i) the perceptual dimensions are approximately separable for the target so a dimension-strong signal is identifiable; (ii) the cohort's dimensional distinctiveness sin^2(beta) exceeds a critical threshold (~0.35) so resonance is sharper than spill. NEGATIVE (theory does not apply / route (b) fails): (iii) highly correlated dimensions (category-image collapse); (iv) high-involvement deliberate processing that swamps resonance; (v) regulatory prohibition on dimension-strong messaging. Outside the positive conditions the handoff contract routes to (c) or (a)."
  - id: C4
    statement: "Provenance-as-address (c) requires atoms carrying source/where/when (content_date, platform, geography); perception->proxy join (a) requires addressable proxy features stored alongside the 8-dim vector. Absent these the corresponding bridge is unavailable (the handoff contract reports it as such)."

# ---------------------------------------------------------------------------
# Assumption atoms (assumed without test; relaxable, consequences traced)
# ---------------------------------------------------------------------------
assumption_atoms:
  - id: AA1
    statement: "Salience/response is monotone increasing in the projection of the emitted signal onto the observer's spectral-sensitivity vector (graded reception, not binary). Used for P2."
    type: response_form
    relaxable: true
    relaxation_consequence: "Under a threshold (binary tuning) response the over-index prediction sharpens rather than reverses; tested in RC1."
    affects: [P2, M1]
  - id: AA2
    statement: "Broadcast spill cost is linear in impressions delivered to non-resonant observers (pay-per-impression). Used to price route (b) against (a)/(c)."
    type: cost_structure
    relaxable: true
    relaxation_consequence: "Convex spill cost raises the relative attractiveness of (a)/(c); the bridge-selection ordering (P1) is recomputed but its form is unchanged."
    affects: [P1, P3, M1]
  - id: AA3
    statement: "The eight SBT dimensions are a justified measurement basis (imported from R11 / 2026r); the garbling and channel arguments hold for any finite dimension count."
    type: construct_validity
    relaxable: true
    relaxation_consequence: "Dimension-count does not affect the qualitative results; 2-vs-8 robustness shown in RC2."
    affects: [P1, P2, P3]
  - id: AA4
    statement: "Observer spectral profiles have non-degenerate cross-observer variance (heterogeneous tuning). Used for self-selection to do work in (b)."
    type: distributional
    relaxable: true
    relaxation_consequence: "As profile variance -> 0 the cohort is not perceptually distinct, sin^2(beta) -> 0, and (b) degenerates to undifferentiated broadcast (boundary C3-iii)."
    affects: [P2]

# ---------------------------------------------------------------------------
# Propositions (the theoretical contributions) — 3 numbered, per Grok house-style
# ---------------------------------------------------------------------------
propositions:
  - id: P1
    statement: "The handoff-contract rule. For a target (dimension, cohort), the measurement->activation contract emits (i) the recommended bridge mechanism and (ii) its quantified cost: dimension-distinct cohort (sin^2(beta) > threshold) -> broadcast-a-dimension (b), cost = predicted spill; atoms clustered on few live surfaces -> provenance-as-address (c), cost = coverage bias; else -> minimal-loss proxy (a), cost = L(P*). SBT supplies target + bridge cost; media execution is the management layer."
    type: decision_rule
    conditions: "C1, C3, C4"
    antecedents: []
    assumptions: [AA2]
    evidence:
      - type: analytic
        anchor: "Construction: the contract is the argmin over the three bridges of (targeting loss + delivery cost), each term defined in P2/P3 and the provenance coverage estimate."
      - type: citation
        anchor: "Metrology/management split inherited from the parent correspondence principle."
        citation_keys: [zharnikov-2026au-correspondence-principle-brand]
        citation_role: theoretical_predecessor
    falsifier: "A setting where a single fixed bridge strictly dominates the contract's selection across all cohort geometries would refute the value of conditioning the bridge on cohort geometry."
    body_sections: ["The Measurement-to-Activation Handoff Contract"]
  - id: P2
    statement: "Resonance over-index (broadcast-a-dimension). A signal emitted strong on dimension d produces salience/response for observer i monotone in <signal_d, w_i>; therefore a dimension-strong creative over-indexes on the dimension-d-sensitive cohort relative to a dimension-neutral control, and the magnitude of over-index is increasing in the cohort's dimensional distinctiveness sin^2(beta) — the SAME quantity that is the perception-metamerism LOSS in 2026au. The mis-targeting bug is, read forward, the self-selection filter; formally a degraded broadcast channel (Cover 1972) with channel quality |<signal, w_i>| and resonance bandwidth = sin^2(beta)."
    type: mechanism
    conditions: "C2, C3"
    antecedents: [P1]
    assumptions: [AA1, AA4]
    evidence:
      - type: analytic
        anchor: "2-D, 2-type broadcast-channel model (M1): channel quality is the inner product of signal and sensitivity vectors; the separating-signal over-index is sin^2(beta) by direct computation, recovering the parent paper's loss term as the filter's selectivity."
      - type: simulation
        anchor: "ME2 calibrated Monte Carlo (OB2): over the public-proxy-calibrated cohort population the resonance over-index is 1.202 [1.196, 1.207] with d=1.61 — a calibrated demonstration of the monotone over-index, not a field test."
        source: ME2
      - type: citation
        anchor: "Degraded broadcast channel: one sender, receivers of differing channel quality, one signal decoded differently."
        citation_keys: [cover-1972-broadcast-channels]
        citation_role: methodological_source
      - type: citation
        anchor: "Self-selection / separating equilibrium: a costly/targeted signal sorts types."
        citation_keys: [spence-1973-job-market-signaling, rothschild-1976-equilibrium-competitive-insurance, narasimhan-1984-price-discrimination-coupons, shaffer-1995-competitive-coupon-targeting]
        citation_role: theoretical_predecessor
      - type: citation
        anchor: "The metamerism loss term being weaponized."
        citation_keys: [zharnikov-2026-spectral-metamerism-brand-perception-projection, zharnikov-2026au-correspondence-principle-brand]
        citation_role: theoretical_predecessor
    falsifier: "A dimension-strong creative that does NOT over-index on the dimension-sensitive cohort vs a dimension-neutral control (over-index CI includes zero) in a positive-scope category (C3) would refute the resonance mechanism."
    body_sections: ["Broadcast a Dimension: Self-Selection by Spectral Resonance", "A Minimal Broadcast-Channel Model"]
  - id: P3
    statement: "Proxy-join loss ordering. Targeting cohort C through an addressable proxy P is a Blackwell garbling of targeting on the perceptual cohort directly; the expected decision loss L(P) is non-negative and ordered by the informativeness of P about cohort membership, with a minimal-loss proxy P* identifiable from the mutual information I(C; P). When even P* leaves L(P*) above the predicted spill of route (b), the contract (P1) routes to (b) instead — making the reach choice a measured comparison, not a default to addressability."
    type: management_outcome
    conditions: "C1, C4"
    antecedents: [P1]
    assumptions: [AA2]
    evidence:
      - type: analytic
        anchor: "Direct application of Blackwell-Sherman-Stein: the proxy experiment is a garbling of the perceptual experiment, hence weakly less valuable for the targeting decision; L(P) is the decision-loss gap, minimized at the highest-I(C;P) proxy."
      - type: citation
        anchor: "Dominance of the finer experiment (garbling)."
        citation_keys: [blackwell-1953-equivalent-comparisons, cover-2006-elements-information-theory]
        citation_role: methodological_source
      - type: citation
        anchor: "Empirical benchmark: address-based personalization lift is modest (calibrates the tailwind)."
        citation_keys: [yeo-2025-personalized-advertising-meta-analysis]
        citation_role: empirical_anchor
    falsifier: "Observe targeting via a proxy strictly outperform targeting on the true perceptual cohort (same budget) outside measurement-cost differences — Blackwell forbids this on information alone, so a robust such finding would refute P3."
    body_sections: ["Perception-to-Proxy Join and Its Quantified Loss"]

# ---------------------------------------------------------------------------
derivations:
  - id: M1
    statement: "Minimal model: 2-D perceptual space, 2 observer types (peak on dim-1 vs dim-2), ternary signal (emit dim-1 / dim-2 / neutral). Extends Cover (1972) degraded broadcast channel; channel quality q_i = |<signal, w_i>|; capacity region <-> resonance bandwidth; decision loss L(P) = Blackwell garbling on the posterior over cohort membership. Yields Figure 1 (loss surface over sin^2(beta) x spill cost) and, under the ME2 calibration, Figure 2 (resonance over-index vs distinctiveness, with the public anchors marked)."
    supports: [P2, P3]

methods:
  - id: ME1
    statement: "PRIMARY empirical spine: two-cell field experiment — dimension-strong vs dimension-neutral creative delivered via contextual slots, linked to PRE-MEASURED individual perceptual profiles (PRISM-style elicitation), >=1,500 complete profiles per cell, >=4 product categories spanning involvement x sin^2(beta). Tests P2 (resonance over-index) at the individual level."
    supports: [P2]
  - id: ME2
    statement: "EXECUTED empirical spine (the realized path; no data partnership available, so the JAR-acceptable methods-companion fallback rather than ME1). Calibrated broadcast-channel Monte Carlo: the cohort single-dimension distinctiveness distribution is calibrated to an OBSERVED public proxy — the five canonical SBT brand profiles (the corpus's public anchors), NOT the WIP atom instrument — by the concentration of each centered profile on its dominant dimension; cohorts are drawn from the method-of-moments Beta and run through the M1 two-type model; over-index, effect size, and routing fraction are reported with bootstrap 95% CIs. Two case studies instantiate the P1 contract: a maintenance campaign (established distinctive brand, Hermes) and a category-creation campaign (undifferentiated new entrant, distinctiveness at the 1/8 floor). Supports P1 (contract bridge-selection) and P2 (resonance over-index)."
    supports: [P1, P2]
    status: executed
    script: "code/broadcast_channel_me2.py (seed 20260619)"
    outputs: [OB1, OB2, OB3, F1, F2, F3]
  - id: ME3
    statement: "Proxy-join loss estimation: mutual information I(C;P) and decision-loss L(P) between perceptual cohort membership and addressable proxy features in the atom corpus / panel; identify P* and bound unobservables."
    supports: [P3]

# ME2 simulation outputs (calibrated demonstration, NOT field evidence). All
# reproducible from code/broadcast_channel_me2.py at seed 20260619.
observations:
  - id: OB1
    type: calibration
    statement: "Observed single-dimension distinctiveness of the 5 canonical public profiles: Hermes .760, Erewhon .358, IKEA .348, Tesla .336, Patagonia .335; mean .427 (sd .186, N=5 public anchors). Method-of-moments Beta(2.59, 3.47). Routing threshold s* = 1 - L0/C_REF = .355 inherited from the Figure 1 calibration."
    source: ME2
  - id: OB2
    type: simulation
    statement: "Monte Carlo over N=10,000 calibrated cohorts: resonance over-index (matched vs off-target salience for the dimension-strong creative) mean 1.202, 95% CI [1.196, 1.207]; standardized matched-vs-off-target salience gap Cohen's d = 1.609; mean broadcast spill cost .177, 95% CI [.176, .178]."
    source: ME2
  - id: OB3
    type: simulation
    statement: "Fraction of calibrated cohorts clearing the broadcast routing threshold s*=.355: .626, 95% CI [.617, .636] — i.e., among brands with a canonical-like concentrated profile, a majority route to the address-free broadcast bridge; the complement routes to proxy/provenance."
    source: ME2
findings:
  - id: F1
    type: simulation_demonstration
    statement: "DEMONSTRATION (not field evidence): the resonance over-index is positive and increasing in distinctiveness across the entire calibrated population (CI strictly above 1), with a large standardized matched-vs-off-target gap (d=1.61) — consistent with P2's monotonic over-index prediction. A calibrated simulation, not a test; ME1 remains the confirmatory design."
    supports: [P2]
    caveat: "Calibration anchored on 5 public profiles (all established, distinctive brands); the population over-represents distinctiveness. Stated as a scope limitation."
  - id: F2
    type: case_study
    statement: "Maintenance case (Hermes, distinctiveness s=.760 > s*): the P1 contract recommends broadcast-a-dimension at spill cost .074, dominating the minimal-loss proxy (L0=.20); resonance over-index 1.724. An established distinctive brand is reachable address-free."
    supports: [P1]
  - id: F3
    type: case_study
    statement: "Category-creation case (undifferentiated new entrant, distinctiveness at the 1/8 floor s=.125 < s*): the P1 contract DECLINES broadcast (spill .271 > proxy loss .20) and routes to the minimal-loss proxy / provenance-as-address; resonance over-index 1.017 (no separation). Forming the distinctiveness — moving the cohort off the floor — is the perception-FORMATION problem deferred to the spectral-dynamics companion (2026z), confirming the boundary L1."
    supports: [P1]
    links: [L1, "boundary: Reaching versus Forming"]

robustness_checks:
  - id: RC1
    statement: "Threshold (binary) reception vs graded reception (AA1); placebo on non-sensitive dimensions; dimension-neutral falsification creative."
    addresses: [P2, AA1]
  - id: RC2
    statement: "Dimension-count robustness (2 vs 8); alternative perceptual bases (PCA on same items; Likert vs semantic-differential) to pre-empt the proprietary-instrument objection."
    addresses: [P2, AA3]
  - id: RC3
    statement: "Bounding exercise on unobservables for the proxy-join loss (omitted-variable / endogenous-content threats)."
    addresses: [P3]

alternative_explanations:
  - id: AE1
    statement: "Content-contextual targeting (Haglund & Bjorklund 2024; Ye/Wedel/Pieters 2026 'Ad Gazer') could explain over-index without invoking perceptual resonance."
    rebuttal: "Those operate on CONTENT features; the prediction here is keyed to PRE-MEASURED observer spectral profiles and predicts magnitude = sin^2(beta). Placebo on non-sensitive dimensions (RC1) separates resonance from content-context."
    citation_keys: [haglund-2024-ai-contextual-advertising, ye-2026-ad-gazer-contextual]
  - id: AE2
    statement: "Endogenous content creation: surfaces generating atoms may already be selected by the resonant cohort (provenance-as-address survivorship)."
    rebuttal: "Stated as a coverage-bias limitation; the handoff contract reports the reachable-fraction estimate rather than claiming full coverage."

limitations:
  - id: L1
    statement: "Substrate-adjustment / perception-FORMATION dynamics (demand/category creation; belief maintenance; the 'stop advertising -> sales decay' relaxation) is a DISTINCT activation mode handled here only as a boundary condition + practitioner-objection pre-emption. Full treatment (campaign as forcing function + cloud relaxation-rate measurement) is DEFERRED to a 2026z spectral-dynamics companion. This paper scopes itself to activation GIVEN a perception (routing), not formation."
    anchor_keys: [zharnikov-2026z-spectral-dynamics, gijsenberg-2011-adstock-advertising-decisions, broadbent-1979-one-way-tv-advertisements, zajonc-1968-mere-exposure, binet-2013-long-short-of-it, sharp-2010-how-brands-grow, romaniuk-2016-how-brands-grow, sethuraman-2011-advertising-elasticities-meta, durand-2017-market-categories, luffarelli-2023-brand-personality-cbbe-time]
  - id: L2
    statement: "The atomic-perception measurement architecture invites a replicability objection. Pre-empted by shipping an open PRISM-style elicitation script and the RC2 alternative-instrument robustness."
  - id: L3
    statement: "Causal threats: endogenous content creation, omitted-variable bias in proxy mapping, measurement-error attenuation in profiles — addressed (RC3), not deferred to the management layer."

