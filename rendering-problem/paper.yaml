results:
  - claim_id: "P1"
    status: not_tested
    notes: >
      Biological evidence is cited but not newly collected. Noble (2006) and Oyama (2000)
      are cited as establishing the structural claim. The measurement challenge (quantifying
      phenotype information content) is acknowledged as unresolved. The structural claim is
      treated as established in the biological literature; organizational and brand measurement
      is not conducted.

  - claim_id: "P2"
    status: not_tested
    notes: >
      Fraga et al. (2005) and Kaminsky et al. (2009) data are cited as supporting the
      biological instance. Franchise organization divergence is asserted but not measured.
      Brand perception cloud divergence across cultural markets is asserted but not measured.
      No primary data collected.

  - claim_id: "P3"
    status: not_tested
    notes: >
      The irreducible emergence claim is argued through reference to consciousness theories
      (Tononi, Baars, Rosenthal), all of which agree consciousness is not reducible to
      specification or implementation. The organizational and brand instances are argued by
      reference to SBT's observer heterogeneity. No empirical test conducted.

  - claim_id: "P4"
    status: not_tested
    notes: >
      Fraga et al. (2005) is cited as confirming the biological instance. Sterman (2000)
      provides system dynamics support for organizational divergence. Brand divergence is
      predicted from Peters (2019) non-ergodicity. No primary measurement conducted.

  - claim_id: "P5"
    status: not_tested
    notes: >
      DNA persistence vs. cell turnover is cited from Spalding et al. (2005) and Sender &
      Milo (2021). Organizational specification persistence is argued but not measured.
      Brand identity element persistence vs. campaign personnel turnover is asserted but
      not measured.

  - claim_id: "P6"
    status: not_tested
    notes: >
      AI acceleration argument is theoretical. The prediction is directional (organizations
      with explicit specifications extract more coherent value from AI) and consistent with
      Meadows' leverage point framework. No empirical comparison of AI-augmented specified
      vs. unspecified organizations conducted.

limitations:
  - description: >
      Cross-domain measurement challenge: the specification gap is defined as an information
      differential, but measuring implementation information content is non-trivial. In
      biology, no accepted quantification of phenotype information exists. In organizations
      and brands, "implementation information" lacks standardized measurement. Propositions
      1-4 require operationalization specific to each domain before empirical testing.
    severity: major
    addressable: true

  - description: >
      All six propositions are stated but not empirically tested. The paper is entirely
      theoretical. No primary data collection. Claims are supported by existing literature
      citations rather than new evidence.
    severity: major
    addressable: true

  - description: >
      Western bias: the empirical grounding draws primarily on Western biology, Western brands
      (Hermes, IKEA, Patagonia, Tesla, Erewhon), and Western organizational theory. Whether
      the rendering problem's structural claims hold in non-Western organizational forms
      (keiretsu, chaebol, guanxi-based enterprises) requires separate investigation.
    severity: moderate
    addressable: true

  - description: >
      Emergence criteria: Definition 5's weak emergence criterion ("not derivable from S
      alone") may be too weak — it could be satisfied technically by systems where emergence
      is derivable given sufficient computation. The paper adopts a pragmatic stance
      (if no known derivation exists, criterion is met) without fully resolving this.
    severity: moderate
    addressable: true

  - description: >
      The boundary between "coordinate system" specifications (which exhibit the rendering
      problem) and "blueprint" specifications (which do not, e.g., thermostats, sorting
      algorithms) is acknowledged as a matter of degree. The theory does not provide a
      principled threshold for when the rendering problem's properties become negligible.
    severity: moderate
    addressable: true

  - description: >
      Reductive risk: by identifying a common pattern across biology and business, the
      paper risks biological determinism readings. The paper explicitly disclaims this
      (Section 6.1) but the structural language may invite such readings.
    severity: minor
    addressable: true

