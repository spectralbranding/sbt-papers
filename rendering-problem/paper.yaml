- id: P9
  type: proposition
  statement: (Proposition 6 — Specification Value Amplification under Acceleration) As the rate of implementation
    generation increases, the value of specification quality increases; organizations with explicit, testable
    specifications extract more coherent value from implementation acceleration (including AI) than organizations
    without them. A between-groups, testable directional hypothesis restating Meadows' leverage-point
    hierarchy under AI acceleration. Falsified if increasing implementation speed reduces the value of
    specification quality.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P10
  type: proposition
  statement: 'The cross-domain correspondence is neither analogy (surface similarity) nor homology (shared
    evolutionary origin) but ISOMORPHISM: the same formal pattern arising independently because the underlying
    constraint (the specification gap) is universal. This is why the rendering problem extends Morgan''s
    organizational metaphors, deepens Neilson et al.''s shallow "organizational DNA" mapping, and adds
    to Beer''s Viable System Model the structural impossibility of full specification.'
  testable: false
  tested_in_paper: false
