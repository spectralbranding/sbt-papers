- id: P2
  type: proposition
  statement: The specification gap — the descriptive-complexity differential between implementation and
    specification — is a STRUCTURAL property of specification-to-implementation chains, not an artifact
    of incomplete specification. A specification that fully determined its implementation would not exhibit
    the rendering problem (paper Definition 3).
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
