  abstract: 'Specifications underspecify their implementations. This paper identifies the *rendering problem*
    — the structural pattern in which a specification of bounded complexity is rendered into an implementation
    of vastly greater complexity, producing emergent phenomena no specification contains. Three primary
    domains are identified: biological (genome to phenotype to consciousness), organizational (org-schema
    to operations to customer experience), and perceptual (brand emission policy to signal field to perception
    cloud). In each domain, three structural properties hold: (1) a specification gap — the implementation
    contains substantially more information than the specification; (2) a configuration layer — identical
    specifications produce different implementations under different contextual parameters; and (3) irreducible
    emergence — phenomena not derivable from any lower layer [@bedau-1997-weak-emergence-philosophical].
    These claims are grounded in biology [@dawkins-1976-the-selfish-gene; @fraga-2005-epigenetic-differences-arise],
    process philosophy [@whitehead-1929-process-reality-essay; @maturana-1980-autopoiesis-cognition-realization],
    systems theory [@beer-1972-brain-of-the; @checkland-1981-systems-thinking-systems; @ackoff-1981-creating-corporate-future],
    and non-ergodic dynamics [@peters-2019-ergodicity-problem-economics]. Six propositions are advanced,
    each testable within its home domain. Prior organizational models capture aspects of the same phenomenon
    but do not formalize the specification gap or configuration dependence as structural properties. As
    artificial intelligence accelerates implementation, specification becomes the binding constraint and
    locus of value in biology, business, and beyond.'
