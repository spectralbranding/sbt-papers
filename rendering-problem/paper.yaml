# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026l): The Rendering Problem
spec_version: "0.1.0"

meta:
  title: "The Rendering Problem: From Genetic Expression to Brand Perception"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19064426"
  date: "2026-01-01"
  version: "1.0"
  venue: "Working Paper (Zenodo)"
  license: "CC-BY-4.0"
  keywords:
    - rendering problem
    - specification gap
    - emergence
    - non-ergodicity
    - organizational specification
    - brand perception
    - epigenetics
    - systems theory
    - viable system model
    - design theory

claims:
  - id: "D1"
    type: definition
    statement: >
      A specification S is a finite, explicit encoding of constraints and parameters that a
      system must satisfy. The key property is boundedness: S can be fully enumerated,
      inspected, and compared across instances.
    formal: "S = {c_i}: finite, enumerable, bounded complexity"
    testable: false
    tested_in_paper: false
    status: not_tested
    depends_on: []

  - id: "D2"
    type: definition
    statement: >
      An implementation M is the realized system produced through the execution of specification
      S in context C. The implementation's descriptive complexity substantially exceeds that
      of the specification.
    formal: "M = render(S, C): complexity(M) >> complexity(S)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "D3"
    type: definition
    statement: >
      The specification gap is the complexity differential between implementation and specification.
      The rendering problem asserts that this gap is a structural property of specification-to-
      implementation chains, not an artifact of incomplete specification. A specification that
      fully determined its implementation would not exhibit the rendering problem.
    formal: "gap = complexity(M) - complexity(S) >> 0; structural, not reducible by adding detail to S"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2"]

  - id: "D4"
    type: definition
    statement: >
      A configuration layer is a set of contextual parameters that determine which elements
      of specification S are active in a given context. The same specification S produces
      different implementations under different configurations — the biological proof being
      identical twins with divergent epigenomes (Fraga et al., 2005).
    formal: "gamma: context -> active_subset(S); M = render(S, gamma(C))"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "D5"
    type: definition
    statement: >
      An emergent phenomenon E is a property of the integrated system that satisfies Bedau's
      (1997) criteria for weak emergence: E is derivable in principle from the micro-level
      dynamics but is not deducible from the specification alone without simulation of the
      full system. Examples: consciousness (from genome/organism), customer experience (from
      org-schema/operations), perception cloud (from brand guidelines/signal field).
    formal: "E: P(E | S) < 1; E is weakly emergent in the sense of Bedau (1997)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D2"]

  - id: "D6"
    type: definition
    statement: >
      A system exhibits the rendering problem if and only if: (1) there exists a bounded,
      enumerable specification S; (2) the implementation M has substantially greater
      descriptive complexity than S (specification gap); (3) a configuration layer mediates
      between S and M such that identical S produces non-identical M under varying configurations
      (configuration dependence); and (4) the system produces an emergent phenomenon E
      satisfying Definition 5 (weak emergence).
    formal: >
      rendering_problem(S, M, gamma, E) :=
        bounded(S) AND complexity(M) >> complexity(S) AND
        (gamma_1 != gamma_2 => M_1 != M_2) AND weakly_emergent(E, S)
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2", "D3", "D4", "D5"]

  - id: "P1"
    type: proposition
    statement: >
      Structural Specification Gap: In any system exhibiting the rendering problem, the
      descriptive complexity of the implementation substantially exceeds that of the
      specification, and this gap cannot be closed by making the specification more detailed.
      In biology: the genome (~6.4 billion bits) specifies organisms of vastly greater
      descriptive complexity (37 trillion cells, 200+ cell types, 86 billion neurons).
    formal: >
      For all delta > 0, there exists S' with complexity(S') = complexity(S) + delta such that
      complexity(M(S')) > complexity(M(S)) + delta: adding detail to the specification does not
      close the gap; it may widen it through increased configuration space.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D3"]

  - id: "P2"
    type: proposition
    statement: >
      Configuration Independence: Identical specifications produce non-identical implementations
      when the configuration layer differs: S_1 = S_2 AND gamma_1 != gamma_2 implies M_1 != M_2.
      Biological evidence: identical twins (same genome, different epigenetic configuration)
      diverge measurably over time (Fraga et al., 2005). Organizational evidence: franchise
      operations using identical operating manuals produce measurably different customer experiences.
    formal: "S_1 = S_2 AND gamma_1 != gamma_2 => M_1 != M_2"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D4"]

  - id: "P3"
    type: proposition
    statement: >
      Irreducible Emergence: The emergent phenomenon E cannot be predicted from the specification
      S alone, even given complete knowledge of S: P(E | S) < 1. In biology: genotype does not
      fully determine consciousness. In organizations: org-schema does not fully determine
      customer experience. In brands: brand guidelines do not fully predict observer perception.
    formal: "P(E | S) < 1; equivalently: E is not a computable function of S alone"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D5"]

  - id: "P4"
    type: proposition
    statement: >
      Temporal Divergence: For any two implementations M_1, M_2 of the same specification S,
      the distance d(M_1, M_2) increases over time: d/dt d(M_1, M_2) > 0 in expectation.
      Evidence: Fraga et al. (2005) report increasing epigenetic divergence in identical twins
      with age. Organizational: operational variance across franchise locations increases from
      opening. Brand: perception cloud divergence across cultural markets increases over time.
    formal: "E[d/dt d(M_1, M_2)] > 0 for M_1, M_2 = render(S, gamma_1), render(S, gamma_2) with gamma_1 != gamma_2"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D4"]

  - id: "P5"
    type: proposition
    statement: >
      Specification Persistence: In systems exhibiting the rendering problem, the specification
      persists through implementation turnover: the specification's lifespan exceeds the
      average component lifespan by at least one order of magnitude. In biology: DNA persists
      while cells turn over (avg cell lifespan << organism lifespan). In organizations: core
      operating principles persist longer than employee tenure. In brands: brand identity
      elements persist longer than marketing personnel and campaigns.
    formal: "lifespan(S) >= 10 * avg_lifespan(component of M)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2"]

  - id: "P6"
    type: proposition
    statement: >
      Specification Value Amplification under Acceleration: As the rate of implementation
      generation increases, the value of specification quality increases. Organizations with
      explicit, testable specifications extract more value from implementation acceleration
      (including AI) than organizations without such specifications. This is equivalent to
      Meadows' (2008) leverage point prediction: specification-layer interventions are higher-
      leverage than implementation-layer interventions, and this leverage differential increases
      as implementation speed increases.
    formal: >
      Let v(S, r) = value of specification S when implementation rate = r.
      Proposition: dv/dr > 0 — value of specification quality increases with implementation rate.
      Testability: compare output quality variance of AI-augmented organizations with vs.
      without explicit operational specifications (OST-compliant).
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2"]

methodology:
  type: theoretical
  design: >
    Framework construction identifying the rendering problem as a domain-independent structural
    pattern that manifests wherever three conditions hold simultaneously: specification gap,
    configuration dependence, and irreducible emergence. The paper proceeds through: (1) mapping
    three domain instances (biology, organizations, brands) in Section 2; (2) providing formal
    structural definitions in Section 3; (3) positioning against prior work — Morgan (1986),
    Neilson et al. (2003), Dawkins (1976, 1982), Beer (1972), Checkland (1981), Ackoff (1981),
    Whitehead (1929), Maturana & Varela (1980), Peters (2019) — in Section 4; (4) stating
    six testable propositions in Section 5. No primary data collection. Grounded in established
    biology, process philosophy, information theory, and non-ergodic dynamics.
  analysis:
    method: >
      Conceptual synthesis across three domains (biology, organizations, brands) using structural
      isomorphism argument (not analogy, not homology). Prior work positioning through critical
      comparison against each predecessor framework. Proposition derivation from structural
      definitions. Testability conditions specified for each proposition within at least one domain.
    software: "None"

acceptance:
  - claim_id: "P1"
    criterion: >
      In biology: measure genome complexity (~6.4 Gbits) vs. phenotype complexity (by any
      accepted information-theoretic measure). The structural claim (implementation >> specification)
      is uncontested in biology (Noble, 2006); quantification is the challenge. In organizations:
      compare specification document size (org-schema, brand guidelines) to total operational
      information produced in a comparable period — orders-of-magnitude difference predicted.
    falsification: >
      Identify a non-trivial system where adding detail to the specification closes the gap —
      where a sufficiently detailed specification fully determines the implementation and the
      system nevertheless produces emergent properties. If such a system exists, P1 requires
      qualification with boundary conditions.

  - claim_id: "P2"
    criterion: >
      In biology: measure epigenetic divergence in identical twins over time; predict increasing
      divergence with age (Fraga et al., 2005 data confirm this). In organizations: measure
      customer experience variance across franchise locations with identical operating manuals
      at 6-month and 18-month intervals from opening; predict increasing variance over time.
    falsification: >
      Identical specifications with different configurations produce identical implementations
      across extended time periods (> 5 years). This would contradict the configuration
      independence claim and suggest that implementation dynamics converge to a unique
      attractor regardless of initial configuration differences.

  - claim_id: "P4"
    criterion: >
      Epigenetic divergence in identical twins increases monotonically with age (Kaminsky et al.,
      2009, confirm this). Operational variance across franchise locations increases from opening
      to 18 months. Perception cloud divergence across cultural markets measurable through
      SBT cohort composition comparison at T1 vs. T2.
    falsification: >
      Implementations of identical specifications converge over time rather than diverge. If
      identical twin epigenomes become more similar with age (not less), P4 is falsified in
      the biological domain.

  - claim_id: "P6"
    criterion: >
      Organizations deploying AI with explicit operational specifications (OST-compliant) show
      lower output quality variance and higher customer experience consistency than organizations
      deploying AI without such specifications. Measurable as: SD(quality) across AI-generated
      outputs is lower for specified vs. unspecified organizations in same domain.
    falsification: >
      Increasing implementation speed reduces the value of specification quality — unspecified
      systems benefit equally or more from AI acceleration. This would contradict both the
      rendering problem prediction and Meadows' (2008) leverage point hierarchy.

