- id: P3
  type: proposition
  statement: A configuration layer mediates between specification and implementation, selecting which
    elements of S are active in a given context, so that identical S yields non-identical implementations
    under varying configuration (paper Definition 4). The gap is filled by three information sources —
    environmental input, self-organizational dynamics, and configuration selection — each independently
    identified in biology and applicable across domains (paper §3.1).
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P4
  type: proposition
  statement: (Proposition 1 — Structural Specification Gap) In any system exhibiting the rendering problem,
    the implementation's descriptive complexity substantially exceeds the specification's, and this gap
    cannot be closed by making the specification more detailed. Falsified by a non-trivial system where
    adding specification detail closes the gap yet emergence persists.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P2
- id: P5
  type: proposition
  statement: (Proposition 2 — Configuration Independence) Identical specifications produce non-identical
    implementations when the configuration layer differs (S1 = S2 ∧ Γ1 ≠ Γ2 ⟹ M1 ≠ M2). This is the inverse
    of spectral metamerism, where distinct profiles project to equivalent outputs; here identical specifications
    project to distinct implementations through configuration variance. Falsified if identical specifications
    with different configurations yield identical implementations over extended time.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P3
- id: P6
  type: proposition
  statement: (Proposition 3 — Irreducible Emergence) The emergent phenomenon E cannot be predicted from
    the specification S alone, even given complete knowledge of S (P(E | S) < 1), satisfying Bedau's weak-emergence
    criterion — derivable in principle from micro-dynamics but not deducible from the specification without
    full-system simulation. Falsified by a system where complete specification knowledge yields complete
    prediction of the emergent layer.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P7
  type: proposition
  statement: (Proposition 4 — Temporal Divergence) For any two implementations M1, M2 of the same specification
    S, the distance d(M1, M2) increases over time in expectation. Because the gap is filled partly through
    path-dependent self-organization and time-varying environment, implementations of the same specification
    DIVERGE rather than converge — a structural consequence of non-ergodicity, not a failure of implementation
    fidelity. Falsified by implementations of identical specifications converging over time.
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P3
  - P5
- id: P8
  type: proposition
  statement: '(Proposition 5 — Specification Persistence) In systems exhibiting the rendering problem,
    the specification persists through implementation turnover: the specification''s lifespan exceeds
    the average component lifespan by at least an order of magnitude (DNA persists while cells turn over;
    L0 contract persists while staff and process turn over; semiotic identity persists while campaigns
    are rebuilt). In organizations the persistence is conditional — specifications are revisable but persist
    because revision is costly (Ackoff''s purposeful systems; canalization). Falsified by a domain where
    the implementation outlasts the specification.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
