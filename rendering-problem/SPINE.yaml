# ============================================================================
# Open questions / boundary edges
# ============================================================================
open:
  - >-
    No functional form for the interaction among environment, self-organization,
    and configuration is proposed; the rendering problem is a structural
    characterization, not a predictive model (paper §3.1). Future formalization
    is invited.
  - >-
    Cross-domain measurement of the specification gap is unsolved: no accepted
    quantification of phenotype information content exists, and implementation
    information lacks standardized measurement in organizations and brands;
    Proposition 1 requires per-domain operationalization (paper §7).
  - >-
    The boundary between "coordinate system" and "blueprint" specifications is a
    matter of degree with no principled threshold; future work should
    characterize the specification complexity below which the rendering
    problem's properties become negligible (paper §7).
  - >-
    The propositions are stated as testable but are UNTESTED (single-author
    theoretical framework); empirical validation requires collaboration with
    domain specialists in biology, organizational behavior, and consumer
    psychology (paper §7).
  - >-
    Western bias: whether the structural claims hold for relational/tacit
    specifications (keiretsu, chaebol, guanxi-based forms; Polanyi's tacit
    dimension) requires separate investigation; Proposition 5 may need a
    tacit-specification-persistence extension (paper §7).

