paper_key: "2026ba"
self_citation_key: zharnikov-2026ba-prism-t-version-floor
concept_doi: 10.5281/zenodo.21128779                  # always resolves to latest version
version_doi: 10.5281/zenodo.21128780                  # v1.0.0
provenance: generative
title: >-
  Separating Instrument Drift from Brand Signal: A Pre-Registered
  Model-Version Tracking Instrument for AI Brand Perception (PRISM-T)
status: >-
  Spine locked after the frozen PL0/PL1 campaign completed VE-1 end-to-end
  (pilot + floor + three ladders + controls + robustness, 2026-07-02;
  2,080/2,080 cells). Drafting proceeds against this spine. H2's live-panel
  decomposition completes at a later calendar epoch by design.

thesis: |
  Every longitudinal claim made with an LLM-observer instrument is confounded
  by the instrument itself: when a brand's eight-dimension reading moves
  between epochs, either the brand's public signal changed or the vendor
  shipped a model version that reads the same artifacts differently — and
  practice cannot tell the two apart. PRISM-T resolves the confound with a
  two-panel identification strategy: a pinned panel (public artifacts captured
  once, hash-sealed, byte-identical at every reading — so ALL movement is
  apparatus drift) and a live panel (fresh artifacts each epoch — apparatus
  drift PLUS brand signal), yielding a version floor that extends the
  operator floor of the Brand Spectrometer from a same-time cross-model band
  to an across-time cross-version band, with the no-rescue nesting rule
  (operator inside version) making "the brand moved" a claim that must clear
  the version floor. The instrument is grounded metrologically — the version
  floor is classical test-retest dispersion with the locus of error inverted
  from respondent to apparatus, a non-parametric bound on longitudinal
  measurement non-invariance, and the mirror image of concept-drift
  monitoring (data fixed by construction, model moving) — and delivered
  empirically at epoch VE-1 across three real shipped version ladders
  (five Anthropic Opus versions, three OpenAI snapshots spanning eighteen
  months, three Alibaba Qwen releases) read against a sealed 160-artifact
  panel under cross-family operator pairs, with a same-version negative
  control, a designated distant-pair positive control, a pre-registered
  mechanical operator-exclusion rule that replicated the known discordant
  renderer a third time, and a simulation power analysis that fixes ex ante
  what drift magnitude the design can certify. Both outcomes are results:
  drift makes the version floor mandatory equipment for longitudinal LLM
  measurement; the null makes version-robustness a measured, citable
  property with an interval rather than an assumption.

# ============================================================================
# Boundary conditions
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      Calibrated population: public digital artifacts (owned media, press,
      review, forum text) of consumer and B2B brands, in English, read by
      major API families with stable versioned release channels and
      open-weights families. Non-English artifacts, multimodal artifacts, and
      private artifact classes are out of scope.
  - id: C2
    statement: >-
      Version epochs are real vendor releases only: synthetic versioning
      (fine-tunes, quantizations, prompt variants) and any prompt change
      between epochs are excluded as confounds — the prompt bytes are part of
      the pinned input.
  - id: C3
    statement: >-
      The version floor is defined per (family ladder, matched extractor,
      panel); it is not a universal constant of a family, and endpoints
      without a version identity (silently mutating aliases) support only a
      weaker live-endpoint drift design.
  - id: C4
    statement: >-
      The pinned panel is a calibration standard, not a representation of the
      current brand: its staleness is constitutive (the metrological fixed
      point), so pinned-panel readings must never be reported as current
      brand perception.
  - id: C5
    statement: >-
      Floors nest and the no-rescue rule governs: operator ⊆ version; a
      longitudinal difference that fails to clear the version floor is
      sub-resolution and is reported as such, never rescued by auxiliary
      argument or operator re-selection after the fact.

# ============================================================================
# Assumption atoms
# ============================================================================
assumption_atoms:
  - id: AA1
    statement: >-
      For claims about AI-mediated consumption surfaces, AI observers are the
      measurement construct itself, not a proxy for human raters; the version
      floor characterizes the deployed instrument's temporal reliability, so
      no human convergent-validity sample is required for the apparatus-drift
      claim.
    evidence:
      - type: citation
        anchor: >-
          the AI-observer-sufficiency position established for the PRISM
          family; human panels required only for human-perception claims
        citation_keys:
          [
            zharnikov-2026az-prism-m-metamerism,
            zharnikov-2026ax-brand-spectrometer,
          ]
        citation_role: applies
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "same position as the 2026az gate decision"
    body_sections: ["The AI-Observer Surface"]
  - id: AA2
    statement: >-
      Temperature-0 readings are treated as operator-deterministic within an
      epoch; residual within-cell non-determinism is absorbed by the
      same-version negative control, which bounds it against the operator
      floor.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "Anthropic 4.7+ rejects sampling params; omitted and logged as-sent"
    body_sections: ["Instrument Configuration"]
  - id: AA3
    statement: >-
      Brand readings pool the four artifact channels with equal weight
      (channel salience is not modeled); the reading is the channel-mean
      eight-vector, matching the base instrument's aggregation.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Version-Floor Estimator"]

