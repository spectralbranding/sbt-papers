# ============================================================================
alternative_explanations:
  - id: A1
    statement: >-
      Rival: the null reflects an insensitive estimator rather than
      version-robustness. Addressed three ways: the seeded synthetic
      positive path detects planted drift at the pre-computed magnitudes
      (power analysis + unit suite); the negative control shows the
      instrument's own re-run noise sits BELOW the floor (so the floor is
      not degenerate-wide); and the excluded discordant operator
      demonstrates the pipeline registers large reading differences when
      an observer actually reads differently (.556 discordance).
    antecedents: [F2, F3, F5, M6]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Alternative Explanations"]
  - id: A2
    statement: >-
      Rival: back-catalog rungs are served through updated stacks, so the
      old version read today is not the old version as shipped, deflating
      measured drift. Acknowledged as a scope condition (L1): the design
      measures version identity as SERVED at the reading date; open-weights
      rungs (the Qwen ladder) pin checkpoints by construction and show the
      same null, which bounds the serving-stack account.
    antecedents: [F1, C3]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Alternative Explanations", "Limitations"]
  - id: A3
    statement: >-
      Rival: the artifact-reading renderer prompt anchors readings so hard
      that version differences cannot express. Partially addressed: the
      excluded operator shows a renderer CAN read the same artifacts
      radically differently under this prompt (.556 vs .0055), and Semiotic
      shows systematic per-dimension structure — the prompt leaves room for
      observer differences to express; what does not appear is
      version-to-version movement above the operator band.
    antecedents: [F4, F5]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Alternative Explanations"]

# ============================================================================
# Robustness checks
# ============================================================================
robustness_checks:
  - id: RC1
    statement: "Resolution-threshold sweep k in {1.5, 2, 3}: H1 verdict unchanged (no pair clears any k; the largest CI lower bound is .89)."
    antecedents: [F1]
    provenance:
      created_by: "tool:estimator.py --robustness"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Robustness"]
  - id: RC2
    statement: "Distance-metric alternates (Euclidean, diagonal Mahalanobis): H1 verdict and negative-control pass unchanged."
    antecedents: [F1, F3]
    provenance:
      created_by: "tool:estimator.py --robustness"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Robustness"]
  - id: RC3
    statement: "Operator-exclusion sensitivity: including the discordant pair inflates the floor threefold (mean .0078 → .0237) and the H1 verdict is unchanged in both directions — the null does not depend on the exclusion."
    antecedents: [m1, F1]
    provenance:
      created_by: "tool:estimator.py (exploratory re-run, excluded_ops = none)"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "exploratory"
    body_sections: ["Robustness"]

# ============================================================================
# Limitations
# ============================================================================
limitations:
  - id: L1
    statement: >-
      VE-1 reads the back-catalog at one calendar time: version epochs are
      real shipped versions, but any vendor-side serving change to an old
      pinned ID (silent re-quantization, serving-stack drift) is folded into
      that rung's reading; open-weights rungs are the replicable guard
      against this class.
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations"]
  - id: L2
    statement: >-
      H2 is design-complete but data-pending: at VE-1 the live panel
      coincides with the pinned capture by construction, so the brand-signal
      decomposition is demonstrated on the estimator's synthetic path and
      completes empirically at the next real vendor release (VE-2).
    antecedents: [M3]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations", "The Two-Panel Design"]
  - id: L3
    statement: >-
      Four artifacts per brand bound the panel's channel resolution, and 40
      brands bound the brand-cluster bootstrap; the power analysis reports
      exactly which drift magnitudes are certifiable at this size (H3 well
      powered; the H1 interval criterion conservative).
    antecedents: [M6]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations", "Power Analysis"]
  - id: L4
    statement: >-
      English-language, text-only readings of prominent global brands from
      one index frame; the calibrated population is stated as a scope
      condition and travel beyond it is untested.
    antecedents: [C1]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations"]
  - id: L5
    statement: >-
      The measured floor is a RENDERER-version floor: within a ladder the
      extractor is pinned by design (matched-operator isolation), so drift
      introduced by a version change of the extractor model is not measured
      at VE-1; an extractor-side ladder under a fixed renderer is the
      symmetric VE-2+ extension.
    antecedents: [M4, M5]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Limitations"]

# ============================================================================
# Propositions
# ============================================================================
propositions:
  - id: P1
    statement: >-
      The version floor is a well-posed metrological construct: classical
      test-retest dispersion with the locus of error inverted from
      respondent to apparatus, made estimable for LLM observers by the fact
      that a text stimulus plus prompt can be held genuinely byte-identical
      while the vendor replaces the apparatus — no human-instrument analogue
      permits this isolation.
    depends_on: [M2, M3]
    evidence:
      - type: method
        anchor: "THEORY_GROUNDING.md §1-§3; the pinned-panel identification"
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Version Floor as a Metrological Construct"]
  - id: P2
    statement: >-
      Floors nest across time: operator ⊆ version, so a longitudinal
      "the brand moved" claim is licensed only when live-panel movement
      clears the version floor measured on the pinned panel for the same
      epoch pair — the no-rescue rule extended to the temporal axis.
    depends_on: [M5, C5]
    evidence:
      - type: citation
        anchor: "nested-floor architecture"
        citation_keys: [zharnikov-2026ay-substrate-floor]
        citation_role: extends
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Version Floor", "The Two-Panel Design"]
  - id: P3
    statement: >-
      Version drift, where it exists, is dimension-structured rather than
      uniform: the model's contribution to a pinned-artifact reading is
      largest where the reading leans on model priors beyond the text
      (Ideological, Cultural, Social, Temporal, Economic) and smallest where
      the artifact text anchors it (Semiotic, Narrative, Experiential) — the
      mechanism taxonomy (alignment updates vs world-knowledge refresh vs
      format change) makes the two-set contrast a discriminating test, not a
      descriptive split.
    depends_on: [M2, M5]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "sets fixed ex ante before collection"
    body_sections: ["Hypotheses", "The Version Floor as a Metrological Construct"]
  - id: P4
    statement: >-
      Both H1 outcomes are results a longitudinal measurement practice
      needs: measured drift makes the version floor mandatory equipment
      (subtract it before attributing movement to the brand); a measured
      null makes version-robustness a citable property with an interval —
      the pre-registered either-way interpretation, with the power analysis
      stating exactly which magnitudes the design can certify.
    depends_on: [M1, M6]
    evidence:
      - type: citation
        anchor: "the boundary-result-as-validation precedent"
        citation_keys: [zharnikov-2026az-prism-m-metamerism]
        citation_role: applies
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Pre-Registered Protocol", "Discussion"]
  - id: P5
    statement: >-
      At the July-2026 epoch, LLM brand instruments are version-robust on
      pinned text panels within the design's certifiable bound: across
      eleven real shipped versions in three families — including an
      eighteen-month cross-generation pair — no version change moved the
      pinned reading beyond the contemporaneous operator floor.
      Version-robustness is thereby a measured, interval-carrying property
      rather than an assumption, and the version floor's role at this epoch
      is verification equipment: re-measure at each release, subtract when
      it ever binds.
    depends_on: [P1, P2, P4]
    evidence:
      - type: finding
        anchor: "F1 (H1 null across all ladders), F2 (bounded-null reading), F3 (negative control), RC1-RC3 (robustness)"
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "epoch-specific; re-measurable at every vendor release"
    body_sections: ["Confirmatory Results", "Discussion"]

