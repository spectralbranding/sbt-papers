external_anchors:
  - citation_key: chen-2024-chatgpt-behavior-changing
    use: >-
      The canonical LLM behavioral-drift demonstration (GPT-3.5/GPT-4
      March-vs-June 2023 snapshots differ substantially on task behavior);
      PRISM-T's contrast case — observational, task-accuracy units, no
      contemporaneous floor, no fixed-panel identification, no
      pre-registered either-way reading.
  - citation_key: novick-1966-classical-test-theory
    use: >-
      CTT axiomatization: the version floor is test-retest dispersion with
      the error locus inverted from respondent to apparatus.
  - citation_key: widaman-2010-factorial-invariance-longitudinal
    use: >-
      Longitudinal factorial invariance (measuring the same construct across
      time): the version floor as a non-parametric magnitude bound on
      instrument non-invariance over time.
  - citation_key: putnick-2016-measurement-invariance-conventions
    use: "MI reporting conventions backing the invariance framing."
  - citation_key: gama-2014-concept-drift-survey
    use: >-
      Concept-drift monitoring (data drift under a fixed model) — the frame
      PRISM-T inverts: data fixed by construction, model moving.
  - citation_key: lu-2019-learning-concept-drift
    use: "The updated concept-drift review; same inversion contrast."
  - citation_key: flake-2017-construct-validation-practice
    use: >-
      Measurement-practices discipline: construct validity requires the
      measurement layer to be interrogated, not assumed — extended here to
      the temporal layer.
  - citation_key: flake-2020-measurement-schmeasurement-questionable
    use: "Measurement-quality discipline for the protocol layer."
  - citation_key: nosek-2018-the-preregistration-revolution
    use: "Preregistration frame for the frozen PL0 + pre-collection amendments."
  - citation_key: binz-2023-using-cognitive-psychology
    use: >-
      Cognitive grounding for the prior-dependence mechanism taxonomy: LLM
      responses carry systematic model-internal priors probeable with
      psychological instruments — the leakage channel T1/T2 predict version
      changes to move.
  - citation_key: argyle-2023-out-one-many
    use: >-
      Stakes anchor for LLM observers replacing human measurement layers
      (cited for the deployment fact and its calibration burden, not as
