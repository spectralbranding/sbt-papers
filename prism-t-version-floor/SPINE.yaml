# ============================================================================
# Methods
# ============================================================================
methods:
  - id: M1
    statement: >-
      Frozen pre-registered protocol (PL0): three hypotheses (H1 version
      drift exists above the contemporaneous operator floor; H2 the
      pinned/live decomposition isolates apparatus from brand; H3 drift
      concentrates on prior-dependent dimensions), the drift criterion
      (pinned inter-version S/N bootstrap CI lower bound > 2), family-wise
      alpha .05 Bonferroni-split to .017 per hypothesis, stopping rules
      (epochs added only at real vendor releases), and pre-collection
      amendments recorded before any API call (back-catalog epoch
      interpretation; H3 two-set collapse; panel reuse; pilot exclusion
      rule).
    evidence:
      - type: citation
        anchor: "preregistration + measurement-discipline anchors"
        citation_keys:
          [
            nosek-2018-the-preregistration-revolution,
            flake-2020-measurement-schmeasurement-questionable,
          ]
        citation_role: uses_method_of
    provenance:
      created_by: author
      created_at: "2026-07-01T00:00:00Z"
      under_conditions: "PL0 locked before any API spend"
    body_sections: ["Pre-Registered Protocol"]
  - id: M2
    statement: >-
      Metrological grounding of the version floor: classical test-retest
      dispersion with the locus of error inverted from respondent to
      apparatus (the stimulus is genuinely fixed, the instrument is
      replaced); a non-parametric magnitude bound on longitudinal
      measurement non-invariance in construct units; and the mirror image of
      concept-drift monitoring (their data drift under a fixed model; here
      the data are fixed by construction and the model moves).
    evidence:
      - type: citation
        anchor: "CTT axiomatization (test-retest dispersion)"
        citation_keys: [novick-1966-classical-test-theory]
        citation_role: extends
      - type: citation
        anchor: "longitudinal factorial invariance (same construct across time)"
        citation_keys: [widaman-2010-factorial-invariance-longitudinal]
        citation_role: extends
      - type: citation
        anchor: "MI reporting conventions"
        citation_keys: [putnick-2016-measurement-invariance-conventions]
        citation_role: supports
      - type: citation
        anchor: "concept-drift monitoring, inverted"
        citation_keys: [gama-2014-concept-drift-survey, lu-2019-learning-concept-drift]
        citation_role: contrasts_with
      - type: citation
        anchor: "measurement-practices discipline"
        citation_keys: [flake-2017-construct-validation-practice]
        citation_role: supports
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "authored before drafting, from the verified Phase-2 DR worklist"
    body_sections: ["The Version Floor as a Metrological Construct"]
  - id: M3
    statement: >-
      Two-panel identification: the pinned panel (byte-identical inputs)
      isolates apparatus drift by construction; the live panel (fresh
      artifacts per epoch) carries apparatus drift plus brand signal;
      live-minus-pinned estimates the brand signal. At the birth epoch the
      live panel coincides with the pinned capture, so the decomposition's
      H2 test completes at the next real vendor release.
    evidence:
      - type: citation
        anchor: "contrast: observational cross-snapshot drift without a floor or fixed panel"
        citation_keys: [chen-2024-chatgpt-behavior-changing]
        citation_role: contrasts_with
    provenance:
      created_by: author
      created_at: "2026-07-01T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Two-Panel Design"]
  - id: M4
    statement: >-
      Version ladders from the live back-catalog: three families with real
      shipped versions simultaneously servable at collection time (Anthropic
      Opus 4-1/4-5/4-6/4-7/4-8; OpenAI gpt-4o-2024-11-20 /
      gpt-5-2025-08-07 / gpt-5.5-2026-04-23; Alibaba qwen3-max-2025-09-23 /
      qwen3.5-plus-2026-02-15 / qwen3.7-max-2026-06-08 — the open-weights
      replicable ladder); within a ladder only the renderer version moves
      and the cross-family extractor is fixed, so pinned-panel movement
      across rungs is renderer-version drift under a matched operator.
      Rungs are pinned to exact IDs verified live on the collection date;
      no fallback substitution exists (an unavailable rung is dropped and
      reported). DeepSeek serves only its current generation and
      participates as an operator family only.
    evidence:
      - type: citation
        anchor: "cross-family operator discipline within each epoch"
        citation_keys: [zharnikov-2026ap-same-meaning-different-prose]
        citation_role: uses_method_of
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "PL0 §9.1 pre-collection amendment records the back-catalog epoch interpretation"
    body_sections: ["The Version Ladder"]
  - id: M5
    statement: >-
      Floors and estimator: per-brand contemporaneous operator floor = max
      pairwise distance (1 − cosine on channel-mean eight-vectors) across
      the post-exclusion operator pairs; per-brand version floor = max
      inter-rung pinned distance under the ladder's matched extractor; H1
      S/N per version pair = mean-over-brands distance over mean-over-brands
      operator floor with a seeded 2,000-draw brand-cluster bootstrap CI;
      H3 = one paired two-set contrast over brands (high-drift
      {Ideological, Cultural, Social, Temporal, Economic} vs format-anchored
      {Semiotic, Narrative, Experiential}, fixed ex ante) with one-sided t
      and bootstrap CI; robustness = k in {1.5, 2, 3} and Euclidean +
      diagonal-Mahalanobis alternates. Fixed seed 20260702.
    evidence:
      - type: citation
        anchor: "operator floor + per-pair S/N criterion"
        citation_keys: [zharnikov-2026ax-brand-spectrometer]
        citation_role: uses_method_of
      - type: citation
        anchor: "nested floors + no-rescue"
        citation_keys: [zharnikov-2026ay-substrate-floor]
        citation_role: applies
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "test suite green before collection"
    body_sections: ["The Version-Floor Estimator"]
  - id: M6
    statement: >-
      Simulation-based power analysis run BEFORE collection, executing the
      real estimator on synthetic record sets whose noise scales are
      anchored to the empirical record (2026ax operator floors .0034–.057;
      H13 inter-version distances below .03): across 7,200 replicates the
      H3 two-set contrast reaches .80 power at a per-dimension drift of
      about .1 scale points at every floor tested (null false-positive .03–
      .07), while the H1 interval criterion (S/N CI lower bound > 2)
      requires roughly .75 scale points per rung at the tightest floors and
      is not certifiable at the loosest — fixing ex ante what magnitude of
      drift the design can and cannot certify.
    provenance:
      created_by: "tool:power_analysis.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "published with the companion code per PAQS 37a-37e"
    body_sections: ["Power Analysis"]
  - id: M7
    statement: >-
      Pre-registered mechanical operator screen: before the PL1 freeze, a
      pilot applies the leave-one-out vector-concordance diagnostic and the
      fixed exclusion rule (score > 3 x median of remaining operators); an
      excluded pair is still collected and reported as an exploratory
      observer but enters no floor and no pooled vector.
    evidence:
      - type: citation
        anchor: "the rule and its two prior applications"
        citation_keys:
          [
            zharnikov-2026az-prism-m-metamerism,
            zharnikov-2026bb-prism-c-choice,
          ]
        citation_role: uses_method_of
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "rule fixed before the pilot ran"
    body_sections: ["Pre-Flight Pilot"]
  - id: M8
    statement: >-
      Controls: negative = the same version (top Anthropic rung, matched
      extractor) run twice over the full pinned panel — the re-run distance
      must sit within the operator floor; positive = the designated distant
      version pair (gpt-4o-2024-11-20 vs gpt-5.5-2026-04-23, eighteen-plus
      months apart, fixed ex ante) — it must exceed the floor, else the
      estimator is insensitive to real version change. The positive-control
      pair is excluded from the H1 support decision.
    provenance:
      created_by: author
      created_at: "2026-07-01T00:00:00Z"
      under_conditions: ""
    body_sections: ["Controls"]

