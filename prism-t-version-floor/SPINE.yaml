# ============================================================================
# Findings
# ============================================================================
findings:
  - id: F1
    statement: >-
      Confirmatory H1 at the pre-registered criterion: NO version pair in
      any ladder drifts above the contemporaneous operator floor — the
      largest signal-to-noise is 1.19 (qwen3-max-2025-09-23 →
      qwen3.7-max-2026-06-08; bootstrap 95 percent CI [.89, 1.55]); the ten
      Anthropic Opus pairs span S/N .44–.98 and the OpenAI pairs .28–.50.
      H1 is not supported: a version change moves the pinned reading LESS
      than swapping same-generation cross-family operators does. This is
      the pre-registered reassuring-null branch, and it disciplines the
      corpus's unfloored H13 spot-check (cosines above .97) into a floored,
      interval-carrying bound.
    antecedents: [O3, m1, m2, M1, M5]
    falsifier: >-
      Any version pair whose brand-cluster bootstrap S/N lower bound
      exceeded 2 would overturn this finding.
    provenance:
      created_by: "tool:estimator.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "k = 2, cosine, three post-exclusion operator pairs"
    body_sections: ["Confirmatory Results"]
  - id: F2
    statement: >-
      The designated distant-pair positive control (gpt-4o-2024-11-20 vs
      gpt-5.5-2026-04-23, eighteen-plus months and a full model generation
      apart) also returned sub-floor: S/N .50 (CI [.38, .65]). Under the
      pre-registered reading this is either estimator insensitivity or
      genuinely deep version-robustness; the seeded synthetic positive path
      (the power analysis and the unit suite, which detect planted drift at
      and above .75 scale points per rung) rules out gross insensitivity,
      so the verdict is a BOUNDED null: real version changes at this epoch
      move pinned readings below the design's certifiable magnitude.
    antecedents: [M6, M8, F1]
    provenance:
      created_by: "tool:estimator.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "control pair excluded from the H1 support decision by construction"
    body_sections: ["Controls", "Confirmatory Results"]
  - id: F3
    statement: >-
      The same-version negative control passed: re-running the top Anthropic
      rung over the full pinned panel produced a mean re-run distance of
      .0043 against a mean post-exclusion operator floor of .0078, with 32
      of 40 brands' re-run distances inside their own per-brand floors —
      the instrument's residual non-determinism sits within the operator
      band, so the sub-floor version distances are not an artifact of an
      inflated floor.
    antecedents: [O3, M8, m1]
    provenance:
      created_by: "tool:estimator.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "post-exclusion floor (the same band every test uses)"
    body_sections: ["Controls"]
  - id: F4
    statement: >-
      Confirmatory H3 is not supported — and the point direction REVERSES:
      the format-anchored set's per-dimension drift exceeds the
      prior-dependent set's in all three ladders (paired contrast over
      brands: Anthropic mean difference −.236, d = −1.02; OpenAI −.181,
      d = −.79; Qwen −.043, d = −.15; pre-registered one-sided p > .999,
      > .999, .829). The reversal is concentrated in a single dimension:
      Semiotic drifts 1.25 / .87 / 1.19 scale points across the three
      ladders — roughly double any other dimension in every ladder.
    antecedents: [O3, M5, m2]
    provenance:
      created_by: "tool:estimator.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "sets fixed ex ante (PL0 §9.2); per-dimension decomposition exploratory"
    body_sections: ["Confirmatory Results", "The Semiotic Reversal"]
  - id: F5
    statement: >-
      The pre-flight pilot's mechanical exclusion rule fired on the same
      operator pair as in both prior PRISM campaigns — deepseek-v4-pro as
      renderer, leave-one-out vector discordance .556 against a
      median-of-others of .0055 (roughly one hundredfold, an order of
      magnitude more extreme than on the internalized-knowledge instrument)
      — the third independent replication of the discordant-renderer
      finding, now on an artifact-reading variant, plus a new regime fact:
      the same model returns empty content at default token allowances when
      rendering (reasoning-budget consumption), requiring a per-rung
      override.
    antecedents: [O2, M7]
    provenance:
      created_by: "tool:run_pilot.py"
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: "rule fixed ex ante; OP4 collected and reported, excluded from floors"
    body_sections: ["Pre-Flight Pilot", "Localizing the Discordant Operator"]

negative_findings: []

# ============================================================================
# Derivations
# ============================================================================
derivations:
  - id: D1
    statement: >-
      The H1 null is a bounded version-robustness claim, not an absolute
      one: "no version drift above the operator floor, at magnitudes the
      design can certify (about .75 scale points per rung at the tightest
      floors, per the pre-collection power analysis)." Within that bound
      the practical rule inverts the anxiety: at the July-2026 epoch a
      longitudinal Spectrometer series survives vendor version changes
      without a correction term — but the version floor remains mandatory
      VERIFICATION equipment, because the bound is epoch-specific and
      re-measurable at every release for a few tens of dollars.
    antecedents: [F1, F2, M6]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["Discussion"]
  - id: D2
    statement: >-
      The Semiotic reversal has a coherent reading the ex-ante taxonomy
      missed: on a TEXT-ONLY pinned panel, visual identity is the least
      text-recoverable dimension, so its reading leans most on model
      inference beyond the artifact — the "format-anchored" classification
      of Semiotic was wrong for text panels specifically. Because all
      per-dimension movement is sub-floor, the reversal is reported as
      structure in the instrument's noise, not as supra-floor drift; the
      taxonomy correction is a pre-registerable prediction for VE-2 and for
      multimodal panels (where Semiotic should re-anchor).
    antecedents: [F4, F1]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["The Semiotic Reversal", "Discussion"]
  - id: D3
    statement: >-
      The floors nest empirically, not just by rule: version floors (.0049–
      .0124 mean) are the same order as the operator floor (.0078 mean) and
      above it in two ladders, so the version axis contributes real,
      nonzero apparatus variance even in a null regime — subtracting the
      pinned version floor from live-panel movement remains the correct
      decomposition even when the H1 existence test abstains.
    antecedents: [m1, m2, F1]
    provenance:
      created_by: author
      created_at: "2026-07-02T00:00:00Z"
      under_conditions: ""
    body_sections: ["What the Floors Measured", "Discussion"]

