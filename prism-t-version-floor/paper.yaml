methodology:
  type: empirical
  design: 'Frozen pre-registered protocol (PL0): three hypotheses (H1 version drift exists above the contemporaneous
    operator floor; H2 the pinned/live decomposition isolates apparatus from brand; H3 drift concentrates
    on prior-dependent dimensions), the drift criterion (pinned inter-version S/N bootstrap CI lower bound
    > 2), family-wise alpha .05 Bonferroni-split to .017 per hypothesis, stopping rules (epochs added
    only at real vendor releases), and pre-collection amendments recorded before any API call (back-catalog
    epoch interpretation; H3 two-set collapse; panel reuse; pilot exclusion rule). Metrological grounding
    of the version floor: classical test-retest dispersion with the locus of error inverted from respondent
    to apparatus (the stimulus is genuinely fixed, the instrument is replaced); a non-parametric magnitude
    bound on longitudinal measurement non-invariance in construct units; and the mirror image of concept-drift
    monitoring (their data drift under a fixed model; here the data are fixed by construction and the
    model moves). Two-panel identification: the pinned panel (byte-identical inputs) isolates apparatus
    drift by construction; the live panel (fresh artifacts per epoch) carries apparatus drift plus brand
    signal; live-minus-pinned estimates the brand signal. At the birth epoch the live panel coincides
    with the pinned capture, so the decomposition''s H2 test completes at the next real vendor release.'
