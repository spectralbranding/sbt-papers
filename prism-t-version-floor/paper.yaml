limitations:
- description: 'VE-1 reads the back-catalog at one calendar time: version epochs are real shipped versions,
    but any vendor-side serving change to an old pinned ID (silent re-quantization, serving-stack drift)
    is folded into that rung''s reading; open-weights rungs are the replicable guard against this class.'
  severity: moderate
  addressable: true
- description: 'H2 is design-complete but data-pending: at VE-1 the live panel coincides with the pinned
    capture by construction, so the brand-signal decomposition is demonstrated on the estimator''s synthetic
    path and completes empirically at the next real vendor release (VE-2).'
  severity: moderate
  addressable: true
- description: Four artifacts per brand bound the panel's channel resolution, and 40 brands bound the
    brand-cluster bootstrap; the power analysis reports exactly which drift magnitudes are certifiable
    at this size (H3 well powered; the H1 interval criterion conservative).
  severity: moderate
  addressable: true
- description: English-language, text-only readings of prominent global brands from one index frame; the
