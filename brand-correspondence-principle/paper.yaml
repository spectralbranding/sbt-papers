contradictions: []
limitations:
- description: This is a theory paper; the numerical illustration is an existence proof of the dominance
    gap, not a field validation that cloud-based management measurably beats score-based management in
    practice.
  severity: moderate
  addressable: true
- description: SBT's measurement carries a cost; in the classical (low-sigma/slow/human/firm-signal) corner
    the residual information it recovers may not pay for its measurement, so SBT is not universally more
    efficient.
  severity: minor
  addressable: true
- description: The directed-intervention rule (P6) presumes a target (dimension, cohort) is not only ACTIONABLE
    but REACHABLE; a perceptual cohort has no native media address, so P6 is silent on delivery. This
    reach gap is a scope limit of the present paper.
  severity: minor
  addressable: true
