    statement: "Monte Carlo computation of expected decision loss of score-based versus cloud-based management as a function of the four regime-departure parameters, with mu a von Mises-Fisher mixture on the perception manifold calibrated to a real high-frequency dataset; fixed seed, >= 5000 draws per parameter combination."
    type: simulation
    inputs: [O1]
    outputs: [F1]
    code_anchor: "[internal path removed]"
    reproducibility:
      seed: "fixed (published in script docstring + README)"
      version: "Python 3.12 + numpy; uv-run"
      runtime_environment: "deterministic given seed; no network"
    provenance:
      created_by: "author + ai:claude-opus-4-8 (software)"
      created_at: "2026-06-19"
    body_sections: ["Numerical Illustration", "Companion Computation Script"]
observations:
  - id: O1
    statement: "Calibration anchor: the R15 AI-search-metamerism corpus provides empirical AI-vs-human cohort perception divergence used to set the alpha (AI-observer share) and dispersion scales of the vMF mixture, so the loss surface is anchored to a real dataset rather than purely synthetic draws."
    raw_data_pointer: "HuggingFace dataset zharnikov-2026-hf-r15-ai-search-metamerism (DOI in reference_hf_dois)"
    instrument: "published HF dataset (R15)"
    timestamp: "2026"
    conditions_at_capture: "AI-mediated search cohort vs human cohort spectral profiles"
    provenance:
