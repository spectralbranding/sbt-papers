      created_at: "2026-06-19"
    body_sections: ["Numerical Illustration"]
findings:
  - id: F1
    statement: "The expected decision-loss surface of score-based relative to cloud-based management is monotone non-decreasing in each of the four regime-departure parameters and approaches zero at the classical corner, numerically instantiating the P4 lower bound and the P2 zero-loss limit."
    source_measurements: []
    generating_method: M1
    statistical_strength: ">= 5000 draws per parameter combination; loss surfaces stable to Monte Carlo error reported as standard errors"
    conditions: "C1, C4; AA1; calibration via O1"
    antecedents: [O1, M1]
    falsifier: "A computed surface that decreases in any parameter or is bounded away from zero at the classical corner."
    provenance:
