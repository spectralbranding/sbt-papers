# ---------------------------------------------------------------------------
robustness_checks:
  - id: RC1
    statement: "Robustness of the loss-surface monotonicity to (a) alternative payoff forms (quadratic, linear, threshold), (b) dimension count (2 vs 8), (c) mu distributional assumptions (vMF mixture vs alternative), and (d) comparison against the BEST POSSIBLE scalar index (not just the incumbent's particular score)."
    varied_parameter: "payoff form; dimension count; distributional family; benchmark scalar"
    range_explored: "three payoff forms; D in {2,8}; vMF vs alternative mixture; argmin-over-scalar-indices benchmark"
    result_stability: "planned — executed in the companion computation script"
    affects_nodes: [P3, P4, F1, AA1, AA2, AA3]
    source_method: M1
    body_sections: ["Numerical Illustration — Robustness", "Discussion"]

# ---------------------------------------------------------------------------
# Alternative explanations (rivals ruled out)
# ---------------------------------------------------------------------------
alternative_explanations:
  - id: A1
    statement: "The contribution is merely finer segmentation or a higher-resolution survey, not a new ontology or decision-theoretic result."
    rules_out_required: [P1, P2, P3]
    ruled_out_by: [P1, P2, P3]
    rules_out_status: rejected
    reasoning: "The move is ontological (the brand IS an observer-completed distribution with no privileged frame) and decision-theoretic (Blackwell dominance over a garbling), not a resolution increase on a fixed construct. STP segments by demographics and still aggregates to a privileged mean; the projection-operator unification and the correspondence theorem are not restatements of segmentation-targeting-positioning."
    body_sections: ["Related Work and Positioning", "Discussion"]
  - id: A2
    statement: "The correspondence theorem is tautological once mu is assumed (it merely restates that a coarser statistic loses information)."
    rules_out_required: [P2]
    ruled_out_by: [P2]
    rules_out_status: rejected
    reasoning: "The non-trivial content is the IFF with four named, separately-estimable regime conditions and the metameric counterexample for insufficiency; the theorem locates an exact boundary and is empirically diagnostic (the regime test), not a definitional restatement. The eight-dimension basis is justified independently (AA3, R11), so mu is not free scaffolding."
    body_sections: ["The Correspondence Theorem", "Related Work and Positioning"]

# ---------------------------------------------------------------------------
# Limitations
# ---------------------------------------------------------------------------
limitations:
  - id: L1
    statement: "This is a theory paper; the numerical illustration is an existence proof of the dominance gap, not a field validation that cloud-based management measurably beats score-based management in practice."
    affects: [P4, F1, P6]
    severity: medium
    mitigation: "Field validation is earmarked as a separate empirical/methods companion paper (the R14 -> 2026at concept-to-methods pattern); the regime test bounds where SBT is even worth its measurement cost."
    body_sections: ["Discussion — Limitations", "Future Research"]
  - id: L2
    statement: "SBT's measurement carries a cost; in the classical (low-sigma/slow/human/firm-signal) corner the residual information it recovers may not pay for its measurement, so SBT is not universally more efficient."
    affects: [P6]
    severity: low
    mitigation: "The regime test (P6a) is precisely the rule that prevents over-prescription; the Einstein discipline (do not use relativity to throw a ball) is stated as a scope boundary."
    body_sections: ["Discussion — Scope and Boundary", "Managerial Implications Derived from the Theorems"]
  - id: L3
    statement: "The directed-intervention rule (P6) presumes a target (dimension, cohort) is not only ACTIONABLE but REACHABLE; a perceptual cohort has no native media address, so P6 is silent on delivery. This reach gap is a scope limit of the present paper."
    affects: [P6]
    severity: low
    mitigation: "Decomposing reach into a measurement-to-activation handoff contract — which supplies the target and the quantified cost of each bridge from perception space to delivery, leaving the media buy to the management layer — is the subject of the dedicated applied companion 2026av (added 2026-06-19, files-only, NO version bump per user directive; the parent's published v1.0.0 is unchanged until the next substantive revision)."
    anchor_keys: [zharnikov-2026av-reaching-a-perception]
    body_sections: ["Discussion — Limitations"]

