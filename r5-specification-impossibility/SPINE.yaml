spine_version: "0.2"
spine_doc_version: "0.1.0"
provenance: retrofit
paper_key: "2026h"
title: >-
  Specification Impossibility in Organizational Design: A High-Dimensional
  Geometric Analysis
target_venue_primary: "TBD (organizational-design / strategy theory venue)"
status: >-
  Retrofit spine extracted 2026-06-14 from completed paper.md (Working Paper
  v1.1.0, March 2026). Faithful description of the paper as written; no new
  claims introduced.

thesis: |
  Comprehensive organizational specification is geometrically impossible.
  OrgSchema Theory's 8×6 activation matrix is formalized as a 48-dimensional
  specification space [0,1]^48, and three closed-form results follow. (1)
  Coverage Impossibility: at resolution epsilon = 0.1 per dimension the space
  admits 10^48 distinguishable specifications, each covering a ball of volume
  V_48(0.1) ≈ 1.38e-60, so even 10^20 templates cover only ~10^-40 of the
  space. (2) Effective Dimensionality Reduction: OST's cascade model collapses
  effective dimensionality from 48 to d_eff = 8(1-(1-gamma)^6)/gamma, i.e.
  15.75 at gamma = 0.5 (a 67% reduction), making per-organization specification
  tractable without making the space coverable. (3) Forkability as Subspace
  Decomposition: the fork model partitions [0,1]^48 into a shared and a private
  subspace (24+24 at the canonical k=3 fork), formalizing franchises,
  open-source ecosystems, and denominational structures. An information-theoretic
  reading shows a full specification carries 159.4 bits — far above human
  working-memory capacity — so cascade and fork compression is cognitively
  necessary, not merely convenient. The results are strictly complementary to
  Simon's bounded rationality and to NK landscape search complexity: geometric
  impossibility holds regardless of cognitive capacity or any fitness function.

# ============================================================================
# Boundary conditions — the modeling assumptions under which the results hold
# ============================================================================
boundary_conditions:
  - id: C1
    statement: >-
      OST parameters are metric (equal-interval) rather than ordinal, so a 0.1
      difference on the [0,1] scale is meaningful and the volume/resolution
      argument applies; OST's continuous [0,1] parameterization is designed to
      satisfy the Liddell & Kruschke (2018) conditions, but empirical validation
      of the metric interpretation remains open.
    observable: "Parameter discriminability at ~10-point resolution per dimension."
    excludes: "Purely ordinal OST instruments without an equal-interval metric."
    provenance:
      created_by: "author"
      created_at: "2026-03"
  - id: C2
    statement: >-
      The coverage bounds assume a uniform prior over [0,1]^48 (every point
      equally relevant). If viable organizations cluster on a low-dimensional
      viability manifold of intrinsic dimension d_sub, the bound applies to that
      subspace with V_d_sub(0.1); impossibility persists as long as d_sub ≳ 20.
    observable: "Intrinsic dimensionality of the viability manifold (TDA estimate)."
    excludes: "A viability manifold of dimension below ~20."
    provenance:
      created_by: "author"
      created_at: "2026-03"
  - id: C3
    statement: >-
      The cascade coupling parameter gamma ∈ (0,1] is a structural modeling
      input, not a derived constant; quantitative claims (e.g. d_eff = 15.75)
      are illustrative at gamma = 0.5 until gamma is empirically estimated from
      cross-organizational panel data.
    observable: "A sample estimate gamma_hat from a hierarchical mixed-effects model."
    excludes: "Treating d_eff = 15.75 as descriptive without estimating gamma."
    provenance:
      created_by: "author"
      created_at: "2026-03"

# ============================================================================
# Methods — the closed-form computation that produces every cited number
# ============================================================================
methods:
  - id: M1
    statement: >-
      Closed-form high-dimensional volume computation: the unit-ball volume
      V_n(r) = (pi^{n/2}/Gamma(n/2+1)) r^n evaluated against the unit cube, the
      geometric-series sum d_eff = 8(1-(1-gamma)^6)/gamma, the subspace-product
      decomposition [0,1]^48 = [0,1]^{8k} × [0,1]^{8(6-k)}, and the Shannon
      entropy H = n·log2(1/epsilon). No stochastic computation; all results are
      exact (companion script carries a fixed SEED=42 only for policy compliance
      and asserts each cited figure to stated precision).
    type: "closed_form_computation"
    inputs: ["n=48 (8×6 activation matrix)", "epsilon=0.1 resolution", "gamma cascade coupling", "fork depth k"]
    outputs: ["Tables 1–9", "Figure 3 volume series", "V_48(0.1)", "d_eff(gamma)", "H_48", "compression ratio"]
    code_anchor: "[internal path removed]"
    reproducibility:
      seed: "SEED=42 (no RNG; closed-form, included for policy compliance)"
      runtime_environment: "uv run --with numpy,scipy python ..."
    provenance:
      created_by: "author + companion computation script"
      created_at: "2026-03"

