  design: 'Closed-form high-dimensional volume computation: the unit-ball volume V_n(r) = (pi^{n/2}/Gamma(n/2+1))
    r^n evaluated against the unit cube, the geometric-series sum d_eff = 8(1-(1-gamma)^6)/gamma, the
    subspace-product decomposition [0,1]^48 = [0,1]^{8k} × [0,1]^{8(6-k)}, and the Shannon entropy H =
    n·log2(1/epsilon). No stochastic computation; all results are exact (companion script carries a fixed
