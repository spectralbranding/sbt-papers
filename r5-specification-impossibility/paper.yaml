claims:
  - id: "T1"
    type: theorem
    statement: >
      Coverage impossibility: let S = [0,1]^48 be the specification space of
      OST's 48-dimensional activation matrix. At resolution epsilon = 0.1:
      (i) the number of distinguishable specifications is N = 10^48;
      (ii) a single specification covers a ball of volume V_48(0.1) approx 1.38*10^{-60};
      (iii) even 10^20 specifications cover only 1.38*10^{-40} of the space.
      Exhaustive specification is geometrically impossible.
    formal: "N = (1/0.1)^48 = 10^48; V_48(0.1) approx 1.38*10^{-60}; 10^20 * V_48(0.1) = 1.38*10^{-40}"
    testable: false
    tested_in_paper: true
    status: supported
    depends_on: []

  - id: "C1_1"
    type: proposition
    statement: >
      To cover even 1% of [0,1]^48 with balls of radius 0.1 requires
      M_{1%} approx 7.26*10^{57} specifications — far beyond any practical
      enumeration. Every organizational library, consulting template collection,
      and management textbook combined covers a negligible fraction of the space.
    formal: "M_{1%} = 0.01 / V_48(0.1) approx 7.26*10^{57}"
    testable: false
    tested_in_paper: true
    status: supported
    depends_on: ["T1"]

  - id: "P1"
    type: proposition
    statement: >
      Cascade per-level dimensions: under OST's cascade model with coupling
      strength gamma = 0.5, effective free dimensions per level are L0=8.00,
      L1=4.00, L2=2.00, L3=1.00, L4=0.50, L5=0.25.
    formal: "d_i = 8 * (1-gamma)^i; at gamma=0.5: d_0=8, d_1=4, d_2=2, d_3=1, d_4=0.5, d_5=0.25"
    testable: true
    tested_in_paper: false
    status: supported
    depends_on: []

  - id: "T2"
    type: theorem
    statement: >
      Effective dimensionality reduction: under OST's cascade model with coupling
      strength gamma in (0,1], the effective dimensionality of the specification
      space is d_eff = 8 * (1 - (1-gamma)^6) / gamma. At gamma=0.5:
      d_eff = 15.8, a 67.1% reduction from the unconstrained 48 dimensions.
    formal: "d_eff = 8 * (1 - (1-gamma)^6) / gamma; at gamma=0.5: d_eff = 15.75 approx 15.8"
    testable: true
    tested_in_paper: false
    status: supported
    depends_on: ["P1"]

  - id: "T3"
    type: theorem
    statement: >
      Forkability as subspace decomposition: the fork model sharing levels L0
      through L_{k-1} while diverging on levels L_k through L5 is geometrically
      equivalent to decomposing [0,1]^48 into a shared subspace [0,1]^{8k} and
      a private subspace [0,1]^{8(6-k)}. For the canonical fork at k=3 (shared
      L0-L2, divergent L3-L5): [0,1]^48 = [0,1]^24 x [0,1]^24. The private
      subspace alone admits (1/epsilon)^{8(6-k)} distinguishable configurations.
    formal: "[0,1]^48 = [0,1]^{8k} x [0,1]^{8(6-k)}; at k=3: shared=24D, private=24D"
    testable: false
    tested_in_paper: true
    status: supported
    depends_on: ["T1"]

  - id: "R1"
    type: proposition
    statement: >
      Cognitive necessity of compression: a full 48-dimensional specification
      at resolution 0.1 contains 159.4 bits of information (= 48 * log2(10)).
      Human working memory capacity (~7 chunks, ~7*log2(7) approx 19.6 bits)
      cannot hold this directly. Cascade and fork compression is cognitively
      required, not merely convenient.
    formal: "I = n * log2(1/epsilon) = 48 * log2(10) = 159.4 bits; WM capacity ~ 7 chunks"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["T1"]

methodology:
  type: theoretical
  design: >
    Mathematical analysis of the geometry of high-dimensional specification
    spaces. The OST activation matrix A in [0,1]^{8x6} is vectorized to
    a = vec(A) in [0,1]^48. Volume computations use the formula V_n(r) =
    pi^{n/2} * r^n / Gamma(n/2+1). The cascade model is formalized as
    linear coupling x_{i+1} = gamma*f(x_i) + (1-gamma)*z_{i+1}. Effective
    dimensionality is derived as the sum of a geometric series. The fork
    model is formalized as a Cartesian product decomposition of [0,1]^48.
    Information-theoretic analysis uses Shannon entropy at resolution epsilon.
    All proofs are analytical; no simulation required.
  analysis:
    method: >
      High-dimensional volume calculations (Gamma function); geometric series
      summation for cascade effective dimensionality; Cartesian product
      decomposition for fork model; Shannon entropy for information-theoretic
      bound; comparison table across frameworks at n in {2, 5, 8, 16, 48}
    software: "None (analytical)"

acceptance:
  - claim_id: "T1"
    criterion: >
      The volume formula V_48(0.1) = pi^24 * 0.1^48 / Gamma(25) is verified
      numerically to equal approximately 1.38*10^{-60}. All three parts of
      Theorem 1 follow by arithmetic.
    falsification: >
      The specification space has effective dimensionality substantially below 48
      (e.g., due to biological constraints on organizational form), making coverage
      impossibility less severe. This would require showing that the viable
      organization manifold has dimension < ~20.

  - claim_id: "T2"
    criterion: >
      Empirical organizational data (comparing variation at each level to
      variation at the level above) yields cascade coupling estimates gamma
      in the range [0.3, 0.7], consistent with d_eff in [11.4, 23.5] — a
      substantial reduction from 48 without collapse to 8.
    falsification: >
      Empirical coupling estimates gamma fall near 0 (no cascade; d_eff approx 48)
      or near 1 (near-perfect cascade; d_eff approx 8), with no support for
      intermediate values.

  - claim_id: "T3"
    criterion: >
      Organizations identified as forks at level k (e.g., franchise systems
      sharing L0-L2) exhibit low variance on shared dimensions and high
      variance on private dimensions, consistent with the subspace decomposition.
    falsification: >
      Organizations nominally sharing L0-L2 specifications show high variance
      on those shared dimensions, inconsistent with the fork model's geometric
      interpretation.

  - claim_id: "R1"
    criterion: >
      Organizational design practitioners, when asked to specify all 48 activation
      matrix parameters, experience cognitive overload and rely on templates,
      heuristics, or simplifying frameworks — consistent with the 159.4-bit
      information load exceeding working memory capacity.
    falsification: >
      Practitioners can reliably specify all 48 parameters independently without
      cognitive aids, or the effective number of independent choices is consistently
      below working memory capacity (~7).

