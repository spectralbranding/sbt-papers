results:
  - claim_id: "T1"
    status: supported
    notes: >
      Direct computation: N = 10^48 (distinguishable specs at epsilon=0.1);
      V_48(0.1) = pi^24 / (24! * 10^48) approx 1.38*10^{-60}.
      Coverage of 10^20 specs: 1.38*10^{-40}. All arithmetic verified.

  - claim_id: "C1_1"
    status: supported
    notes: >
      Follows from T1: M_{1%} = 0.01 / V_48(0.1) = 0.01 / (1.38*10^{-60}) = 7.26*10^{57}.
      Plain-language interpretation: all organizations that have ever existed
      (~10^10 specs) cover approximately 10^{-50} of the space.

  - claim_id: "P1"
    status: supported
    notes: >
      Direct computation: d_i = 8*(0.5)^i for i = 0,...,5 gives
      8.0, 4.0, 2.0, 1.0, 0.5, 0.25. Sum = 15.75 approx d_eff from T2.

  - claim_id: "T2"
    status: supported
    notes: >
      Geometric series: sum_{i=0}^{5} 8*(1-gamma)^i = 8*(1-(1-gamma)^6)/gamma.
      At gamma=0.5: d_eff = 15.75. Reduction from 48: 67.2%.
      Range across gamma shown in sensitivity table (Section 4.3).

  - claim_id: "T3"
    status: supported
    notes: >
      Cartesian product decomposition follows from the vectorized form of the
      activation matrix. Fork at k=3: shared subspace = [0,1]^24 (3 levels * 8 dims),
      private subspace = [0,1]^24 (3 levels * 8 dims). Even k=5 (sharing all but
      artifacts) leaves 10^8 distinguishable artifact configurations.

  - claim_id: "R1"
    status: not_tested
    notes: >
      Information-theoretic calculation: 48 * log2(10) = 48 * 3.322 = 159.4 bits.
      Working memory reference is Miller (1956) "7 +/- 2 chunks." The cognitive
      necessity claim is supported by the calculation but not empirically tested
      against practitioner behavior.

limitations:
  - description: >
      The coverage impossibility theorem computes volumes assuming all points in
      [0,1]^48 are equally relevant. Real organizational configurations cluster
      in certain regions (not all combinations are viable). If the viable
      organization manifold has effective dimension below ~20, coverage impossibility
      becomes less severe. Characterizing the viability manifold is identified as
      a future research direction.
    severity: moderate
    addressable: true

  - description: >
      The activation matrix treats 8 configuration dimensions as independent at
      each level. Dimension-level correlations (e.g., semiotic and narrative at
      L5 may be tightly coupled) reduce effective dimensionality. The cascade
      model approximates but does not precisely capture within-level correlation.
    severity: moderate
    addressable: true

  - description: >
      The cascade model assumes linear coupling (x_{i+1} = gamma*f(x_i) + (1-gamma)*z_{i+1}).
      Real organizational cascades may be nonlinear: purpose may strongly constrain
      values on some dimensions while leaving others free. A nonlinear cascade would
      produce dimension-dependent reduction rather than the uniform reduction here.
    severity: moderate
    addressable: true

  - description: >
      The paper analyzes the specification space at a single point in time. Real
      organizations evolve, and their activation matrices change as they adapt.
      A dynamic extension would model organizational evolution as trajectories in
      [0,1]^48, connecting to diffusion-on-manifolds frameworks.
    severity: minor
    addressable: true

  - description: >
      The cascade coupling strength gamma is treated as a single scalar. In
      practice, coupling may vary across levels (L0->L1 may be stronger than
      L4->L5) and across dimensions (ideological dimension may cascade more
      strongly than economic). Empirical estimation of gamma is deferred to
      future work.
    severity: moderate
    addressable: true

