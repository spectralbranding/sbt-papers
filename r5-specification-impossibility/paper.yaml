limitations:
- description: The coverage bounds assume a uniform distribution over [0,1]^48; real organizations cluster
    on a viability manifold. A viability-weighted analysis would reduce the volume to be covered, though
    impossibility persists for any manifold of dimension ≳ 20 (conjectured; TDA estimation is open).
  severity: moderate
  addressable: true
- description: gamma (cascade coupling) is treated theoretically and the cascade is assumed LINEAR with
    a uniform gamma across dimensions and levels; real cascades may be nonlinear and dimension-dependent,
    and the 8 within-level dimensions are treated as independent. Empirical estimation of gamma and the
    within-level correlation structure is required before quantitative claims (d_eff = 15.75, H_48 = 159.4)
    are read as descriptive.
  severity: moderate
  addressable: true
- description: The analysis is static (a single point in time). Real organizations evolve; activation
    matrices change as organizations adapt, learn, and respond to environments, and observer-relative
    measurement at L1 adds response-process variability beyond geometric projection loss — a dynamic extension
    (trajectories in [0,1]^48) is left to future work.
  severity: moderate
  addressable: true
