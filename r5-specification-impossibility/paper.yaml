  status: supported
  notes: 'Exhaustive organizational specification is geometrically impossible: any finite library of templates
    covers a negligible fraction of [0,1]^48, so ''best practices'' cannot be comprehensive and organizational
    design must be generative (derive from first principles) and dimensional (move along axes), not enumerative
    or categorical.'
