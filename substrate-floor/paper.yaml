spec_version: 0.1.0
meta:
  title: 'The Substrate Floor: Nested Noise Floors for Auditable Abstention Across Heterogeneous Instruments'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.20840422
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - auditable abstention
  - noise floor
  - heterogeneous instruments
  - verdict reconciliation
  - uncertainty quantification
  - ontology alignment
  - selective prediction
  - reproducibility of results
  abstract: 'An instrument abstains honestly when its signal falls below a noise floor it computes for
    itself. This paper generalizes that discipline to an ensemble of heterogeneous instruments: a finding
    survives only if its signal clears the outermost noise floor in play, where floors nest — operator
    within artifact within substrate. The same move lifts up a level: a cross-instrument ensemble abstains
    below a *substrate floor*, the dispersion of instruments'' verdicts on one aligned claim. Reconciliation
    returns a typed verdict — corroborated, contested, substrate-conditional, or jointly-unresolved —
    never a forced point estimate; agreement is triangulation, disagreement is the floor itself. A no-rescue
    lemma forbids agreement among individually-noisy instruments from manufacturing a finding. The rule
    composes instruments of different kinds that share no output space, reconciling an eight-dimensional
    measurement vector and a categorical specification audit on an aligned ordinal verdict, and below
    a specification instrument''s coherence floor abstention is mandated by a coverage-impossibility result.
    The contribution is an open-source computational framework — already shipped, with worked cases reproducing
    all four verdicts and a seeded Monte-Carlo map of where it diverges from meta-analysis, sensor fusion,
    and selective prediction. It is a typed-verdict lattice over nested floors, not a relabeling of heterogeneity
    statistics.'
claims:
- id: P1
  type: proposition
  statement: 'THE NESTED-FLOOR RULE + NO-RESCUE LEMMA. Floors nest operator ⊆ artifact ⊆ substrate; a
    finding survives only if its signal clears the OUTERMOST floor in play: effective_floor = max(substrate_dispersion,
    each endpoint''s own combined floor). LEMMA (no rescue): if any participating endpoint''s signal is
    below its OWN combined floor for C, no degree of cross-instrument agreement can lift the consensus
    above the effective floor — because the effective floor is a max that already includes that endpoint''s
    floor. Cross-instrument agreement among individually-noisy instruments is therefore not evidence.
    This is the single robustness criterion that composes WITHIN one instrument (operator→artifact) and
    ACROSS instruments (artifact→substrate) without a new mechanism at the cross-instrument step.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: 'THE RECONCILIATION LATTICE. On the aligned verdict axis the integrator returns a TYPED verdict,
    never a pooled point estimate: corroborated (≥2 resolve, agree within their floors, consensus clears
    the effective floor — cross-instrument replication); contested (≥2 resolve, disagree BEYOND their
    floors — genuine conflict, escalate to human judgment by construction); substrate-conditional (exactly
    1 resolves above its floor — holds only under that apparatus, report the condition); jointly-unresolved
    (all abstain, OR resolvers agree but the consensus is below the effective floor — agreement on noise).
    Two gates precede the lattice: STEP-0 SSSOM alignment (apparent conflict is often vocabulary mismatch;
    a non-exactMatch predicate is surfaced as a false-(dis)agreement risk), and SELF-CERTIFICATION (an
    instrument with audit_pass=false is EXCLUDED, never averaged — an unvetted lens cannot pull the verdict).'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'CROSS-KIND ABSTENTION (the unification). The rule holds across instrument KINDS that share
    no output space. A MEASUREMENT instrument''s noise floor (operator/artifact dispersion over LLM operator
    pairs and artifact draws; 2026ax) and a SPECIFICATION instrument''s COHERENCE floor (incoherence 1−SCI
    from 2026an + an audit-coverage gap from 2026ar) are two instances of ONE nested-floor discipline,
    reconciled on the aligned claim''s verdict (e.g. an M&A experiential-fit misfit in [0,1]) rather than
    on the incommensurable 8-vector vs categorical audit. Below the coherence floor, abstention is MANDATED
    — not conventional — by the coverage-impossibility theorem (2026h): no specification audit can certify
    coverage below it, so a specification instrument that resolves below its coherence floor is provably
    asserting noise.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
  - P2
- id: P4
  type: proposition
  statement: 'DIFFERENTIATION FROM PRIOR ART (the backbone). The typed-verdict lattice over nested floors
    is NOT a relabeling of (a) meta-analysis heterogeneity, (b) sensor fusion / belief combination, (c)
    metrology uncertainty budgets, or (d) selective/conformal prediction; it returns verdicts each of
    those four, by construction, does not. LEMMA 4a (NON-POOLING): where high heterogeneity (large I²/τ²;
    Higgins & Thompson 2002) makes a random-effects meta-analysis report a wide interval AROUND a pooled
    mean, the lattice emits CONTESTED and NO pooled mean — because the four verdict types are not a function
    of any pooled point estimate. LEMMA 4b (EXCLUSION-NOT-DOWNWEIGHTING + NO-RESCUE vs FUSION): Dempster-Shafer
    / sensor fusion combine all sources into one estimate (and can mask conflict, cf. Zadeh''s counterexample)
    and down-weight a faulted source; the lattice EXCLUDES an uncertifiable source (C3 gate) and, by P1''s
    no-rescue lemma, forbids agreement among below-floor sources from producing any verdict — a different
    output on the exact inputs where fusion yields a confident combined value. LEMMA 4c (CROSS-KIND):
    GUM (JCGM 100:2008) propagates Type A/B uncertainty within ONE measurement chain to a combined standard
    uncertainty and conformal/selective prediction (Angelopoulos & Bates 2023; deep ensembles, Lakshminarayanan
    2017) deliver coverage/abstention for ONE model under exchangeability; neither composes instruments
    of different KINDS with no shared output space — the lattice reconciles an 8-vector and a categorical
    audit on the aligned ordinal verdict, an object none of the four constructs. Measurement invariance
    (Putnick & Bornstein 2016) is the PRECONDITION the SSSOM step-0 + common verdict axis operationalize,
    after which the lattice proceeds to a typed verdict rather than stopping at an invariant/not-invariant
    test.'
  testable: true
  tested_in_paper: true
  status: not_tested
  depends_on:
  - P1
  - P2
  - P3
methodology:
  type: theoretical
  design: 'MONTE-CARLO VERDICT-REGION CHARACTERIZATION. Sweep two-instrument cases over (dispersion D,
    per-endpoint floor width f, k_resolve/k_marginal) at ≥10,000 draws per cell, fixed seed, published
    script (PAQS 37a-37e); map the fraction landing in each verdict region and the boundaries where the
    lattice diverges from (a) random-effects pooling, (b) Dempster-Shafer fusion, (c) a conformal abstain-or-predict
    rule. The divergence boundaries are the empirical content of P4. SHIPPED CORPUS WORKED EXAMPLES. substrate_floor.py
    + the reconciliation cases exercise all four verdicts incl. agreement-on-noise, audit-exclusion, and
    a closeMatch alignment risk; both endpoints instrument-owned with LIVE floors (SBT 0.0103 from example_harbor_full;
    OST 0.03 from a spec-audit). EXAMPLE_meridian_transfer.yaml: resolves a 0.21 gap, abstains on 0.05.
    Test suite green. ONE NON-CORPORATE WORKED EXAMPLE (cross-vendor — ''do it once, use it twice'').
    Reconcile a model-ranking claim (''model X ranks above model Y'') across TWO PUBLIC, non-corporate
    LLM benchmark leaderboards of different kinds (e.g. a coding benchmark and a reasoning benchmark)
    as two instruments: align rankings to a common ordinal verdict (SSSOM step-0), give each its dispersion
    floor from public per-task variance, and run the lattice → a typed verdict (expected: contested where
    the two public benchmarks disagree beyond their floors). Establishes the cross-KIND claim on data
    outside the author''s corpus. Alternative if leaderboard variance is unavailable: a public psychology
    multiverse dataset (specification-curve dispersion as the floor).'
acceptance:
- claim_id: P1
  criterion: Holds if tHE NESTED-FLOOR RULE + NO-RESCUE LEMMA.
  falsification: A construction in which agreement between two instruments, each individually below its
    own floor for C, legitimately raises confidence in C above the effective floor would refute the no-rescue
    lemma.
- claim_id: P2
  criterion: Holds if tHE RECONCILIATION LATTICE.
  falsification: A pair of instruments that genuinely conflict beyond their floors yet for which the lattice
    returns corroborated (or a pooled mean), or an apparent conflict that is pure vocabulary mismatch
    yet returns contested after exactMatch alignment, would refute the lattice's correctness.
- claim_id: P3
  criterion: Holds if cROSS-KIND ABSTENTION (the unification).
  falsification: A specification instrument that resolves a finding below its coherence floor and is shown
    to be correct (coverage demonstrably certified below the floor) would refute the mandated-abstention
    claim and, with it, the cross-kind unification.
- claim_id: P4
  criterion: Holds if dIFFERENTIATION FROM PRIOR ART (the backbone).
  falsification: Exhibiting, for any of lemmas 4a/4b/4c, that the named prior method ALREADY returns the
    lattice's verdict on the claimed-divergent input (i.e. the divergence is illusory) would collapse
    that lemma and weaken the incremental-advance claim — the lead reviewer objection made concrete and
    testable.
