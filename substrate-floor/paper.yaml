limitations:
- description: External validity of the cross-kind claim currently rests on corpus-internal instruments;
    ME3 (one public non-corporate example) is the single most important empirical addition and is scoped
    as MODEST data collection, not a field study.
  severity: moderate
  addressable: true
- description: The common verdict axis assumes a defensible SSSOM alignment exists (C1); where alignment
    is genuinely contested, the framework surfaces the alignment risk but cannot itself adjudicate the
    meaning dispute — that is handed to the upstream negotiator (2026at) and, failing that, to human judgment.
  severity: moderate
  addressable: true
- description: Floors are only as honest as their source artifacts (AA2); an instrument with neither a
    live floor_ref nor a certifiable declaration is inadmissible (C2), which narrows applicability to
    instruments that have done the metrology work — a deliberate scope cost, not a bug.
  severity: moderate
  addressable: true
