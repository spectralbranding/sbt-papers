# ONTOLOGY.yaml module - substrate-floor
#
# Per-paper ontology module per [internal path removed]
# §"ONTOLOGY.yaml schema (v0.1)". owns = terms THIS paper introduces (unique
# authority); imports = terms owned by other modules it uses; refines = an imported
# term this module specializes.
#
# The §0aa SPINE-FIRST protocol is satisfied (SPINE.yaml authored, claims synced). Owned terms below
# carry full definitions and are LINKED into the substrate terms graph (build_ontology
# --apply). The reference implementation already exists (code/substrate_floor.py
