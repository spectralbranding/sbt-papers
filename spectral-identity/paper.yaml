limitations:
- description: 'The most important gap is empirical: the four propositions (P1–P4 in §5.1) generate testable
    predictions that await testing against independently collected consumer data. Until then SBT remains
    a theoretical framework with demonstrated analytical utility but unconfirmed empirical validity.'
  severity: major
  addressable: true
- description: The eight dimensions are a working decomposition synthesized from prior frameworks, derived
    formally in the companion paper but not yet established by human-subject factor-analytic work on brand-perception
    data; their empirical dimensionality remains to be confirmed.
  severity: moderate
  addressable: true
- description: The spectral profiles in the worked examples are expert estimates, not survey/conjoint
    measurements; the coherence taxonomy has been demonstrated on five brands and its generalizability
    across industries, cultures, and lifecycle stages is unestablished.
  severity: moderate
  addressable: true
- description: 'The limiting-case claim (Aaker = SBT under spectral homogeneity) is a working geometric
    argument, not a formal metric-space proof: how similar cohort weight vectors must be before the reduction
    holds, and what metric-space properties are required, remain to be established. T''s weights are likewise
    illustrative and require empirical calibration on shared samples.'
  severity: moderate
  addressable: true
