meta:
  title: 'From Brand Identity to Spectral Identity: Formalizing Aaker''s Framework for Testable, AI-Operable
    Brand Analysis'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
