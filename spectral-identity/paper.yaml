  date: '2026-03-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - brand coherence typology
  - brand identity formalization
  - brand perception measurement
  - computational branding
  - observer heterogeneity
  abstract: 'Aaker''s Brand Identity Model [-@aaker-1996-building-strong-brands] remains the most widely
    taught brand management framework, yet it relies on practitioner judgment at three critical points:
    which identity perspectives matter, which elements are core versus extended, and how to resolve the
    identity-image gap. This paper proposes Spectral Brand Theory (SBT) as a conceptual formalization
    that preserves Aaker''s multi-perspectival structure while adding parametric precision, testability,
    and computational operability. The paper demonstrates that Aaker''s four perspectives map onto eight
    parametrized perceptual dimensions; that core and extended elements correspond to empirically discoverable
    spectral weights; and that the identity-image gap becomes a formally specified rendering problem.
    The formalization advances a threefold contribution: an explicit perspective-to-dimension mapping
    showing why eight dimensions are required, spectral counterparts for Aaker''s core/extended distinction
    and brand essence, and observer-specific predictions the original framework cannot express. Applying
    both frameworks illustratively to Patagonia, IKEA, and Tesla shows that SBT reproduces Aaker''s strategic
    diagnoses while generating new predictions about coherence type, disruption response, and AI operability.
    The relationship mirrors behavioral economics to classical economics: the predecessor is preserved
    as a limiting case within a more general theory.'
claims:
- id: P1
  type: proposition
  statement: Aaker's Brand Identity Model requires unresolved practitioner judgment at three decision
    points — perspective selection (which of the four perspectives matter), element prioritization (which
    of the six-to-fourteen elements are core vs extended), and identity-image gap resolution (why the
    gap exists and whether it is closeable) — each useful at single-brand scale but disabling for portfolio-level
    analysis or computational delegation.
  testable: false
  tested_in_paper: false
  status: not_tested
- id: P2
  type: proposition
  statement: 'Observer invariance fails: the assumption that one sender-defined brand identity is perceived
    with noise by all audiences is empirically untenable. Different observers processing identical signals
    through different perceptual apparatus construct structurally different brands; the identity-image
    gap is a structural property of perception, not a communication failure closeable through better execution.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P3
  type: proposition
  statement: 'Element selection cannot be verified empirically within Aaker''s framework: no validated
    instrument covers all four perspectives simultaneously, operationalization requires custom scales,
    and the core/extended distinction can be assigned differently by two practitioners with no mechanism
    to adjudicate — a manageable ambiguity for one brand but disabling at portfolio scale.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P4
  type: proposition
  statement: 'Consistency is a scalar that conflates structurally distinct types of alignment: two brands
    can score identically on consistency yet have entirely different coherence types (e.g. signal coherence
    vs ecosystem coherence) and therefore opposite disruption responses. Aaker''s framework never taxonomizes
    the structural types of consistency or links them to differential resilience.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P1
- id: P5
  type: proposition
  statement: 'Aaker''s four perspectives are a coarser partition of the same perceptual space that SBT
    decomposes into eight parametrized dimensions: Brand-as-Product bundles Semiotic + Experiential +
    Economic; Brand-as-Organization bundles Ideological + Social + Cultural; Brand-as-Person bundles Semiotic
    + Narrative; Brand-as-Symbol bundles Semiotic + Cultural + Temporal. Unbundling yields diagnostic
    precision Aaker''s bundled perspectives cannot — distinguishing which channel is failing for which
    cohort.'
  testable: false
  tested_in_paper: false
  status: not_tested
  depends_on:
  - P3
